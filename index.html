=====《人类传播理论》=====

人类传播理论
第三章 系统论（重点）
系统论探讨一个规模较大的过程中各元素间的互动；控制论探讨系统内部的管理和智
慧；信息论聚焦符号的测量和运输。
系统论起源可追溯到19世纪黑格尔的辩证法（世界是动态的，总处于一定的程序中，
并受控于对立双方之间的张力作用）；之后马克思借黑格尔实习解释社会内部权力分配；达
尔文借助黑格尔思想，提出物种进化和适者生存；德国生物学家Ludwig von Bertalanffy
首先用系统论作为其研究基础。
第一节 系统的基本原理
一、什么是系统
任何系统都包含四要素：
一是实体：即系统内部的部分、元素和变量。
二是属性，即系统和其实体所具有的特质和性能。
三是系统内部各个实体之间的内在联系。
四是系统存在于某一特定的环境中。
定义：系统即是在某种特定的环境之中互相影响的一系列事物，它们形成了一个不同于系统
内部任何一个部分的、更为宽泛的模式。
二、系统的特质（06年考题，说说系统的特征，15分简答）
1、完整性和相互依赖性。
完整性：每一个系统就是一个独一无二的整体。它所包含的是与其他系统截然不同的关系模
式。整体不仅是部分的总和，它必须是各个部分相互作用和交流的产物。系统的任何一个部
分，总是受制于它对其他部分之间的依赖关系。
相互依赖性：相互依赖性是系统中最为重要的特征之一。系统中变量之间的相互依赖性可以
用“相关性”（correlation）及其有关系数来表示。在“相关性”概念中，两个或者更多
的变量共同发生变化。有些变量之间的联系较强，而有些则较弱。在一个较为复杂的体系中，
许多变量相互关联，结成一张关系网，但这些变量产生的影响有强有弱。有时候，某一变量
的变化会影响到另一个变量。系统内部的因果关系是双向的，即变量A、B之间会相互影响；
在某些情况下，变量之间的是联系是间接的；在一条影响链当中，往往会引起更为复杂的联
系。
2、等级关系：系统之间是相互“嵌入”的，呈现出“你中有我，我中有你”的形式，所以
某个系统必须是另一个更大规模系统的一部分。（超系统和亚系统：一个系统是由从简单到
复杂的一系列层面所组成的。由这些系统组成的更大规模的系统称之为“超系统”。系统内
部包含的小规模的系统称之为“亚系统”。）
3、自我管理和控制：许多系统都规定了十分明确的目标，通过对自身行为的管理以期达到
一定的目标。系统内部的各个部分必须按照一定的规则来采取行动、进行回应和反馈。
4、与外部环境的交流：开放性的系统与其外部环境之间进行交流，它可以吸收和释放物质
和能量，既有输入，也有产出。
5、平衡：是自我调控的一种方式。系统一旦探测出失衡的状态，会立即进行调适，直到系
统重新回到正轨上。系统可以暂时容忍偏离常规和变化，但时间不会太长。一旦系统无法自
我调控，最终便会分崩离析。
6、变化和适应性：由于系统存在于一个动态的外部环境中，因此它必须具备一定的适应性。
7、同等终极性：终极性是指系统达到目标或者完成的任务；同等终极性指一种从不同的起
点、以不同的方式完成的特定的终极状态。具备了一定适应性的系统可以在各种不同的环境
条件下达到预期的目标。
系统是一个动态的整体，其中的各个部分以较为复杂的形式联系和互动。
第二节 信息论
信息论随二战后电讯业发展而日益成型，它研究关注以系统为单位进行的传播活动，包括对
信号进行量化的研究，也包括对电子学中相关知识的实际运用。它在行为科学和社会科学领
域都有广泛运用。
一、基本概念（与传理交叉1）
1、熵：是从热力学中借用来的。体现的是一种随意性，是在某一特定条件下的缺乏组织的
表现。一个完全处于“熵”的状态是不可预测的，我们所处的大多数状态部分地或并非完全
不可预测，因此“熵”是一个变量。熵值越高，其组织程度和预测性就越低。
2、所谓“信息”就是指在一定条件下，对不确定性或者熵值的测量。不确定性越大，熵值
越大。在一个完全可以预测的条件下没有任何信息可言，这种情况称之为“负熵”。
这里的“信息”强调的不是意义，而是强调刺激因素或者信号的量化过程。
（1） 把信息作为减少不确定性所需要的信号的数量。
（2） 信息也可以视为一个人预测结果时拥有的选择或替代性方案的数量。
二、语言和信息
1、过剩信息：语言（无论是单词的拼写还是句子结构）通常是以能够预测的不同模式出现，
都是有一定规律的，在一定程度上是可以预测的，在信息论上被称为过剩信息。另一方面，
语言也包含了一定的不确定性，具有的是适度的过剩信息。这使得人们在解码相对容易的同
时，拥有了编码的充分自由。
2、马尔可夫过程（Markov process）：在一过程中，一系列事件呈链状一个接一个地依次
发生。这根链条上的某个元素的出现为随后紧接的因素的出现奠定了较高的概率。语言信息
是这个过程的典型例子。除语言外，许多其他现象也遵循着这一模式，EG：从A城到B城，
需要依次经过一系列的弯道。
三、信息传递
信息论与信息的意义关系不大，它所关注的是信息的传递和接收。
信息传播的目的：在目的地精确地重新构建信息。
1、香农-韦弗的传播理论：信源、发射器、噪音、接收器、信宿。
2、噪音：指在信道内出现的任何形式的干扰，可能造成信号的失真或被屏蔽。过剩信息弥
补了噪音带的的负作用，使得接收者能够纠正错误的信息或者填补丢失的信息。
3、信道容量（channelcapacity）：指在单位时间内由一个信道所传递的信息量的最大值。
信道内的信息的实际容量被称作“信息吞吐量”（throughput）。如果信息吞吐量超过了信
息容量，便会出现失真的现象。（上网的例子）
4、高效的信息传递条件：
（1）适量的过剩信息代码，以此来抵消信道内存在的噪声音（过多，信息传递效率下降；
过少，信息传递不准确。）
（2）不超过信道容量的最大限度的解码率。
第三节 控制论
控制论研究的是系统内的管理和监控。简言之，控制论就是对反馈的研究。
一、 反馈的程序
控制论研究的是系统如何对效应进行测量，从而进行必要调整的过程。
1、反馈机制具有不同的复杂程度。反馈机制内最基本的区别就是主动行为（来自系统本身）
和被动行为（完全来自外界的刺激）。主动行为又可以再分为无目的的和有目的的行为。一
切有目的的行为都需要反馈。
反馈的复杂程度分简单的和复杂的。简单的：分“开”和“关”两种方式对反馈产生反映；
复杂的：用正面和负面的反馈做出反映，并在行动过程中进行自身的调节。
2、反馈可以分为积极反馈（系统可以选择保持甚至于放大偏差。）和消极反馈（表现为一
个指示着系统出现偏差的错误信息，系统会及时做出调整，减少或抵消偏差。对维持系统的
平衡和稳定状态非常重要。）
3、系统的三种状态：
在稳定状态下：系统使用消极反馈来确保系统在正常轨道上运行。消极反馈意味着系统在偏
离正常轨道后，经过调整回到正常的轨道上。
在成长状态下，当系统出现偏差时，积极反馈维持着这一偏差，其结果是系统离原来的状态
越来越远。在这种状态下，系统会促进某种新行为的发生，但如果这种偏差无休止地继续下
去，系统便会有解体的危险。eg相关螺旋（relational spiral）现象
变化状态：系统从一个状态转化为中一个状态。在此过程中，系统既需要积极反馈，也需要
消极反馈。积极反馈使系统向着新的方向运行，消极反馈在某一层面上起作用，从而使系统
回归到平衡状态。
二、复杂的网络
系统不仅作为一个整体对界的反馈作出回应，一些高级系统包含了一系列按等级关系排列的
亚系统，这时，一个复杂系统的各个亚系统之内和之间包含着一系列反馈循环圈，有时候反
馈圈是积极的，有时候是消极的，但都遵循着最基本的反馈原则——系统的产出最终还是以
反馈输入的形式回到系统中。不管网络本身如何复杂，它总是会回到起始状态。
控制论是一种思维方式，它所强调的循环式推理向传统的线性思维方式提出了挑战。
三、第二级控制论
（1）不论你是在什么时候观察一个系统，你总会对系统产生影响，同时也会被系统所
影响。它阐释了观察过程本身如何通过观察者和被观察者对象之间的反馈循环作用而构成一
个控制机制。也称为“有关求知的控制论”，阐明了知识本身就是求知者和求知对象之间反
馈循环的产物。
（2）我们在一个系统中所观察到的结果部分地是由观察的类别和方法所决定的，而
后两者反过来也受到了观察结果的影响。这个循环圈就构成了一个系统论体系。它提出纯客
观的观察和知识都是不可能的，不仅对系统论发展产生影响，对认识论哲学也产生重大影响。
自体生成：指生物系统表现出的一种趋势——千方面计地与其他系统区别开来，保持
自身的自治与分离状态。但是，系统内部的结构关系限制了系统追求个性的种种努力。
（3）当我们在观察另一个系统时，我们对别的系统的看法很大程度上是由我们自身的
历史和性质所决定的。同时，也会受到另一个系统结构和历史的影响，在“第二级控制论”
中被称为“结构性配对”。在此，两个系统彼此会产生影响，他们彼此协调各自的行动，从
而达到共同演化的目的。
（4）有时，观察者所观察的系统就是自身所处的环境。观察者必须意识到这种观察关
系本身已经构成了一个新系统，观察者本人所观察的应当是一个更大的系统，即观察者本人
也是被观察系统的一部分。
（5）人类本身具有一整套不同的方式对反馈进行回应，这就意味着，你在观察一个系
统时，可以设计不同的观察框架。而当你所观察的事物作出回应时，你也能以各种富于创造
性的方式来采取行动。
第四节 动态社会影响理论
动态社会影响理论（DSIT）将整个社会设想为一个巨大的传播系统，其包含了许多文
化的亚系统。在这些系统内，人与人之间进行交流和互动。
人与人彼此互不相同，但人与人之间也有一些共同的特点，所以志同道合的人往往形成
群体，在共同或相似的意识形态的基础上形成文化。动态社会影响理论试图用系统论来阐释
这种共同性是如何发展起来的以及文化是如何形成的。
个人并不是彼此孤立和相互隔绝的，在一定的社会空间内，他们彼此之间进行交流和互
动。所谓的社会空间就是人们相遇、互相交流和影响的“区域”。它一方面，受到个人之间
实际的身体距离的限制，但不是唯一方面，社会排列组合的不同方式（例如种族和阶级）阻
碍了人们之间的相互交流。另一方面，广泛应用的传播和交流的媒介又可以打破身体距离的
限制，使人们具有相同的社会空间。
个人之间的相互影响在三个层面上表现出不同特征：1、处于相同社会空间的不同个体
之间相互影响的力度；2、亲密度；3、社会空间内个体的数量。
个人按照他们在社会空间内的接近程度形成不同的群体。而群体一旦形成，其成员之间
的相互交流会强化其所共享的思想信念和实践经验。这种控制机制有效地确保了一个较大规
模的系统内多样性的存在。Eg 少数民族群体的形成
消极反馈圈会逐渐化解系统的多样性，使系统趋同。积极反馈圈会促使系统趋于分化，
呈现出更强的多样性。社会就是这样一个由个体的交流组成的庞大系统，其中不同的循环圈
共同作用，在维持秩序和稳定的前提下，促进社会朝着多样化的方向发展。
第四章 符号和语言理论
约翰·鲍尔斯：信息包含了三层结构：较为独立的符号和象征体系；作为形式符码的语言；
彼此之间联系较为紧密的话语结构。
第一节 三个分支
符号学的三个分支（查尔斯·莫里斯Charles Morris）：
语义学：研究符号是如何与事物发生关系的学科，关注的是符号被确定指示什么东西，符号
世界和物质世界之间的关系。
句法学：研究符号是如何与其他符号发生关系的学科。重点研究的是语法和句法结构。
语用学：符码是如何在日常生活中得以运用的。包括符号对人类行为所产生的影响以及人们
以何种方式在互动和交流的过程中塑造符号及其意义。
大部分谈话和写作具有句法和语用符号的双重特征。
第二节 经典语义学理论
现代符号学理论最早是由19世纪哲学家和逻辑学家皮尔斯发展起来的。
一、皮尔斯关于符号的基本概念
指号过程（semiosis）：符号（阐释物interpretant）、事物（指涉物referent）和意义
发生关系的过程。
二、查尔斯·莫里斯的理论
1、人类的一切行为都包含了符号和意义。
2、行为分为三个阶段：在感知阶段：人们意识到符号的存在。在操控阶段：人们对符号进
行读解和阐释，并确定对它进行回应。最后，行为以实际回应的方式得以完成。
行为阶段：感知、操控和完成。
表意层面：指明的；规定的；评估的
价值观层面：疏离的；主宰和控制的（符号规定指导我们应该做什么）；依赖的（依赖符号
完成价值评估）。
三、苏珊·朗格的理论（“话语象征体系”）
1、动物的生命体验是以情感为主的，但人类的情感和体验受到了概念、象征和语言的
影响。
2、符号对其所指代的事物有严格的对应关系，指示着另一种事物的存在；象征不是事
物的替代物，而是对事物进行概念化的工具。
3、意义反映的是象征、事物和语言使用者之间的复杂关系。
4、语言真正的意义并不存在单个的词语中，而存在于话语当中。
5、任何象征传递的都是概念，即一个高度概括性的主张、类型或者形式。意义是由个
人化的概念与其他交流者共享的概念所组成的。
6、朗格理论语汇中还包括其他三个术语：表意（指符号的意思或者说一种简单的刺激
因素，是符号与事物之间简单的、一一对应的关系）、本义（符号与其所指代的事物之间的
关系）、引申义（符号与概念之间的直接关系，包括语言使用者一切与该符号有关的个人情
感和联想）。
第三节 语言和符号关系学研究
一、古典学派的基础（索绪尔）
1、包括语言在内的所有符号都带有主观性和随意性。不同的语言运用不同的词语来指代同
一事物，而词语和指涉物之间不存在任何必然的联系，所以符号实质上就是受制于一定规则
的惯例。上述假设不仅支持了“语言是一种结构”，还强化了“语言与现实分离”的主张。
索绪尔把语言看做是表现现实世界的结构体系。
2、词语与事物的关系带有主观性和随意性，但对语言的使用却不是主观随意的，你并不能
随心所欲地使用词语，也不能任意更换语法规则。
3、语言是按照一定的形式关系严格构建的、非物质性的系统。理解系统结构的关键在于“差
异性”。（包括语言符号/语言单位）
4、人类对世界的了解是由语言所决定的，符号并不指代事物，而是构成了事物本身，如果
没有指代事物的符号存在，也谈不上事物的存在。（在此，索不仅在结构语言学领域，还在
交互理论和阐释性的批判理论领域的发展开辟了道路）
5、索对不同的语言形式进行了区分：
形式语言——语言（language）/书面语，稳定性，共时性
传播过程中对语言的实际运用——言语（parole）/口头语，历时性
二、 结构语言学
20世纪30-50s期间，在索绪尔影响下，发展出来的一套关于句子结构的标准模式。
1、按照等级的形式把句子分解为：音素、词语和词组
2、“重写语法结构”：旨在将句子或者其他语言单位“重写”为语言的“零部件”
虽然对语言结构做出清晰的描述，但是却未能解释人类是如何构建语言的。
三、 生成语法
乔姆斯基（Chomsky）是创始人。用来解释句子的产生过程，即语言使用者是如何构建句子
的，句子如何在脑海中形成的。
1. 基本假设是句子的生成对句子的结构来讲至关重要。
2. 生成语法旨在总结出一整套独立的规则，从而可以被用来解释句子的产生过程。
3. 生成语法具有转换性，也被称作“转换-生成语法”。句子的外在形式是由某种深层结
构转换而来的。
第四节 非言语行为的语义学和符号关系学
非言语符码的特征（Judee Burgoon）：
1. 模拟性，而非数字化的；
2. 一部分非言语符码具有图像的特征，或者说是形似性
3. 某些特定非言语符码具有普遍意义。
4. 非言语符码使得多个不同信息的同时传播成为可能。
5. 非言语符码可以引发不受思维控制的无意识反应。
6. 非言语符码的传播具有自发性。
一、伯德惠斯泰尔的身势学理论
RayBirdwhistell其观点在很大程度上是建立在身势和语言相似性的基础之上的，称为“语
言——身势类比”。“身势”就是被视为一个整体的一系列动作和姿势。
二、艾克曼和弗瑞森的身势学理论
1、从三个角度来分析非言语行为：来源、编码和用途。
来源：指行为发生的根源。非言语行为有一定的内在性，从种类上说是故地ingd，
但因文化、群体和个人的不同而不同。
编码：指把某种行为跟特定的意义联结起来。行为本身具有主观随意性、图像性、内
在性（行为本身包含一定的意义，同时该动作本身就是其所指代的事物的一部分，比如：哭
泣。）
用途：非言语行为在多大程度上有效传递了信息。
（信息行为：行为本身不是传播行为，但向对方提供了一些信息；传播—互动行为：
某种行为既是有意识的也是有影响的。）
2、非言语行为的分类：象征性、说明性、转移性、规范性、情感的表达。
三、霍尔的空间关系学理论
1、空间关系学（proxemics）：研究的是传播过程中对空间的使用。交流过程中对空间的使
用方式在很大程度上与文化有关，不同的文化会导致对空间的不同感受。
2、三种不同类型的空间形式
固定特征的空间：包括一些不可移动的东西。比如墙和房间。
半固定特征的空间：包括家具这类可移动的东西。
非正式的空间：属于个人的领地，是随着个人的活动而不断变换的周围环境，它决定
了人际传播中参与者之间的身体距离。
4. 在对话过程中，影响人们如何使用空间的八个因素：
姿态-性别；社会离心-向心轴线；身势；触碰；视觉符码；热量符码；嗅觉符码；音量。
第五章 话语理论
话语（discourse）：大多数传播过程（不论是日常生活中的还是较为复杂的）都包括
构成信息的复杂的语言表达和行为方式。
话语分析使我们更加仔细地观照信息究竟是如何被组织、使用和理解的。
话语分析的三种类型（斯科特·雅各布）：一是有关意义的问题，二是有关行动（表达
方式）的问题，三是有关一致性（如何使表达方式更容易被理解，更符合逻辑）的问题。
交流者使用语言来达一定的目的，而他们使用话语的方式是受制于一定的规则。
第一节 言语—行为理论
1、维特根斯坦（普通语言哲学）和奥斯丁（言语行为）奠定了言语—行为理论的基础，
由席尔勒发展而来。
2、言语—行为是指遵循那些能够实现意图的规则，用来表达一定意义和意图的最基本
单位，一般来说是一个句子。
3、当人们在说话时，他们实际上也在实施一种行为，如陈述、质疑、命令、许诺等等。
言语—行为理论强调的并非是符码分别所直射的单个事物，而是行为作为一个整体所体现的
意图。
“我保证把钱还给你”作为言语行为理论的角度，实施的是为了实现意图而设计的语
内表现行为。你许下了一个诺言，对于交流本身来说，对方理解你的意图才是最重要的。你
在说“我保证把钱还给你”时，实际上实施了三四种行为：表达行为：把一些词语说出来；
建议行为：陈述内容的某一个方面；语内表现行为：希望对方能够理解其意图；言语表达效
果行为：不仅希望对方理解其意图，还要在理解的基础上行动。
5、组成性规则和规范性规则
组成性规则：组成性规则实际上创造游戏本身。游戏是由其规则所创造的或组成的。在
言语—行为中，听话人是根据组成性规则来判断说话人的意图是在许诺，而非请求或是发号
施令。EG：许诺的规则、建议的规则。
规范性规则：为游戏的进行提供行动上的指南。在付诸行动之前，人们已经通过这些规
则了解到可以采取怎么样的行动，以及如何运用言语实现特定的意图。
6、五种类型的语内交流行为（席尔勒）：断言式：表明说话人坚决维护建议的真实
性。（陈述、肯定、下结论、相信）；指令式：旨在促使听话人做某件事情。（命令、请求、
呼吁）；委托式：旨在使说话人承担起对未来的某种义务。（许诺、发誓、保证）；表达式：
是说话人心理状态的某个方面。（感谢、祝贺）；宣告式：旨在做出建议性陈述，并通过肯
定和强调等手段使之成为现实（任命、解雇、辞职）。
7、成功的言语—行为：指说话人做出了清晰的陈述，而听话人也准确理解了说话人
的意图。
第二节 谈话分析
谈话分析特点是，按照实际次序对谈话进行仔细的分析，关心的是语言、文本和话语
本身的运作和话语中的交流和互动。其中最为重要的是参与各方通过何种方式使谈话既有稳
定性，又有条理性；其次，它涉及说话人对谈话本身的了解，即他是否知道谈话进行的规则；
再次，所涉及到的问题还包括参与谈话的各方如何破坏了谈话的规则，以及如何防止和纠正
谈话中出现的错误。
一、谈话原则(格瑞斯)
1、合作性原则：即谈话各方的参与必须是适宜和得体的。
2、合作：每个人都愿意根据谈话的主旨来做出贡献。
3、合作的四原则：
数量原则：谈话的参与者应当提供足够的，但并非过量的信息。
质量原则：谈话的参与者贡献的信息和思想必须是真实的。
相关性原则：发言必须与谈话的主旨有关。
表达方式原则：谈话中切勿闪烁其词、故弄玄虚或缺乏条理。
4、一旦交流中出现公然违背这些原则的行为，需要交流者共同合作来解决。
(1)“谈话蕴含”（conversation implicatures）：
A当出现违背合作原则时，谈话的参与者一时间会无所适从，为了解决这一问题，我们
就需用要进行一些读解和阐释，便于我们理解这类公然违背原则的行为所蕴含的意义。
B听话人假设说话人本意上是想遵守合作原则，只不过无意中忽略了它们，因此，他在
读解的过程中便增加了一些新的意义，使得这些话基本能够符合那些原则的要求。
eg你说“天上掉馅饼了”虽然违背了质量原则，但听话人都理解你不过是采用了隐喻
的手法。用间接传播的方式说出自己想说的话，问：“你拿了多少稿费”；答“没有多少”，
表面上违背数量原则，实际上的一种委婉的拒绝。
C谈话蕴含可以使我们自如地运用各种有趣的，间接的说法来达到目的，使谈话变得生
动，同时，对谈话蕴含的研究是搞清楚人们究竟运用哪些规则来解释自己违背规则的合理性。
（2）违规特许：说话时提供一定的线索，暗示自己虽然违背了原则，但本意上仍然
希望与其他参与者合作。eg“我刚才说的是有点过火，但是……”使得说话人可以违背某些
原则，但不致招致其他参与者的异议。
（3）信息操控理论：人们通常会采用违背原则的手段来有意欺骗对方。
二、谈话的一致性
一致性：交流者如何创造出清晰的意义
（一）运用地方性原则：排序取向：谈话包含着一系列受制于规则的言语—行为；只
要确保其中一个行为是对前一个行为适宜的回应，那么谈话就取得了一致性。
1、毗邻配对（adjacency pair）：即两个紧密联结的言语—行为，分别称为“第一
对组成部分”（first-pairpart，FPP）和“第二对组成部分”（second-pairpart，SPP）。
通过SPP最终实现一个完整的言语—行为。如果一次谈话中的FPP和SPP都前后一致地运用
了适宜的原则，那么这次谈话就具有一致性。
Eg提议/断言-赞同/异议、提问-回答、问候-问候、结束-结束、请求-准予/拒绝、
侮辱-回应、道歉-接受/拒绝、赞美-接受/拒绝、吹牛-欣赏/嘲笑、指控-否认/坦白、威胁-
回应……
2、预先排序（presequence）：是指一组“毗邻配对”，其意义有赖于另一组尚未表
达出来的言语—行为。在此开始出现的FPP召唤着下一个言语—行为的出现。
Eg FPP你洗手了没有？ SPP没有，怎么了？
3、插入：指在一组毗邻配对的两个部分之间出现的另一组“毗邻配对”，它隶属于
前者。
Eg FPP1你什么时候有空出去？ FPP2 跟你一起？SPP2 是啊，跟我。SPP1 哦，好啊
（二）运用全球性原则：推理—策略取向：
1、概念：这一取向假定谈话是为了达到某种目标而进行的实践性行为。为了达到谈
话的目标，参与者必须运用推理的方法。因此谈话的一致性有赖于交流者的推理过程。他们
必须决定说什么，如何达到他的意图。我们必须根据整个推理过程来判别谈话是否取得了一
致性。
谈话必须与他人合作才能进行。需要参与谈话的各方在目标和视角的互动上取得一定
的共识，任何发言都蕴含着一种影响力，要求听者理解说话人的意图；而对说话人而言，他
必须表达清晰得体，从而确保听者能理解其意图。参与谈话的各方不仅要对某一个人的言语
—行为做出回应，而且要对所有参与者的意图从整体上做出回应。在熟知规则的情况下，运
用规则达到自己的意图。
2、谈话一致性的两规则
正当性规则：规定了确保言语—行为出于真心实意的必要条件。
理性规则：要求说话人按照其他参与者的信念和视角来调整自己的表述。即从听众的
视角，对自己的表述从内容和形式上进行构思。
3、意义一致性原则：对话语的理解是一个务实的行为。通过这一行为，交流者运用
共享的意义来取得交流的一致性。
话语具有三方面的特征才使理解成为可能：明白易懂性、组织性、证实性。
第三节 谈话中的争论
谈话中争论的目标就是取得一致的意见。争论的一致性在很大程度上取决于为了达到上
述目标而采取的言语—行为是否具有合理性。
一、争论的分类
1、引发争论：即陈述观点，给出理由。
2、进行争论：即与与对方相互交换反对意见。
二、争论与其他类型谈话一样，遵循一定的次序，体现一定的合理性，争论四阶段：
冲突：识别意见上的不一致；
开场
辩论：立场和观点的交锋
总结
矛盾得以解决或维持，不能把它们看作是四个“步骤”，因为它们很少按照这样的顺序
出现。
第六章 信息生产理论
把信息的生产和接受视为心理现象，聚集于个体特征和过程。
此理论的三种类型：特征阐释、行为阐释、认知阐释。
第一节 特征和行为
一、 有关特征的三个例子（具体内容见书P113）
1、谈话自恋：即不自觉地沉浸于谈话中的一种倾向。具有此倾向的人喜欢操控谈话流
程，制造谈论自己的机会。常忽视其他参与者。
2、喜好争论：喜欢参与对各种敏感话题的争议，千方百计地支持自己的观点和驳斥各
种反对意见。喜好争论的特性有助于学习和了解别人的观点，同时提高可信度，培养传播技
巧。
3、交往恐惧：是一种持续性的心理倾向，通常表现为对各种条件下交往的恐惧心理。
二、 特征、性情和生物学
特征就是深深植根于神经生物结构（或称大脑活动）中的性情倾向。这一结构或行为都是由
基因所决定的。
三、 调节和适应
1、调节理论：传播学研究最具影响力的行为理论之一，由贾尔斯等学者构建。
（1）其中重要的两个概念是聚合和离散。聚合（convergence）：交流者有模仿对方行
为的倾向。离散（divergence）：说话人开始夸大彼此之间的差异。
调节的两种表现形式差不多在所有的交流行为中都可以找到，聚合和离散即可以是交互
性的即双方走到一起来或彼此分离，也可是非交互性的。
（2）虽然有时候交流双方有意进行调节，但大多数情况下，说话人并未意识到自己在
进行调节。
（3）调节在交流过程中起到了十分重要的作用，调节可以导致社会认同和社会契约的
形成，也可以导致疏离和反目。
聚合行为出现在你想赢得别人赞同的情况下，具有很多相似之处的群体中，更易于产生
聚合行为。聚合行为会提高吸引力、预见性、可理解性和相互参与性。聚合往往容易受到对
方的认可，也可能意味着个人身份/认同的缺失。
当交流者想强化自己的身份/认同时，会努力保持自己原有的风格。eg某一族群的成员
说话带有浓重的口音，但为了抵御主流文化对他们的“同质化”，他们往往会努力保留这种
口音，因此离散行为起到了强化“内集团”的身份/认同，抵御“外集团”影响的作用。
2、互动适应理论
（1）交流者具有一种互动同步性，即一种经过组织和协调的有来有往的模式。当你与
别人开始交流的时候，你的互动位置即交流的起点取决于要求、期待和愿望的共同作用，参
与者最初的行为是语言和非语言行为的结合，反映的是你在互动中所处的位置、环境及互动
水平的高低。在谈话的某些时段，双方的言语—行为相似，以交互的方式来彼此“聚合”；
而在另一些时段，两人以补偿的方式表现出退缩或离散。
（2）在大多数互动过程中，你和同伴的行为会由于你们之间的相互影响而逐渐发生变
化。而这种变化比你预想的要大得多。
如果在交流过程中，你发现自己比预想的更喜欢对方的行为，你会以同样的行为回报对
方——即“弃权式回应”，即让自己的行为更接近对方；如果你发现自己对对方的反感程度
比预想的还要糟，你会采取“补偿式回应”——即坚持自己的风格，甚至夸大你从一开始的
所作所为。
（调节理论实际上只是互动适应过程中适应的一部分）
第二节 认知理论（聚焦于思维过程）
一、 规划和行动理论
（一）行动集合理论（约翰格林）
1、人们占有两种类型的知识：
内容性知识：对某个事物有所了解或是指了解如何做成这件事。
程序性知识：包括与行为、后果和情况有关的彼此相连的节点。（在行动集合理论中
程序性知识占据中心地位）
2、程序性记录：是指一个行为网络中各节点之间的联系。Eg开门一脚踩油门一脚踩
刹车，它们之间产生联系，成为程序性记录。
3、产出再现：把相关的程序都集合起来，以便完成某目标，其结果是把这套有要有
理的行为集合加以理念化。
4、处理过程：首先：某情况会引发或激活一系列关于某主题的节点。每个被激活的
节点都是不同程序性记录的一部分；然后，这些节点合并为一个“集合体”；在集合的同时，
大脑会迅速将一整套动作，从低水平的（例如说出单词）到高水平的（例如完成目标），集
合起来，即产出再现。
5、实施性过程：这类特别的行为对人们的交流起到了指导，监督，调节和改变的作
用。
（二）规划理论（查尔斯伯格）
主要解释个人是如何来规划他们的交流行为的。
1、 规划：就是人们脑海里设想的实现目标所必经的步骤。
2、 元目标：我们想要达到的许多目标是规划过程本身的一部分。（ 例如：效率、得体、
彬彬有礼）。
3、 罐头式规划：以前使用过的现成的规划。
4、 为实现目标而付出努力遭到失败，有两种不同的行动路线：一是尝试采取不同的具体
行动，即低层次的规划等级变更。二是抽象变更，即策略变更。
5、 行为流动性：把人们毫不费力地按照规划行事的状态称之为行为流动性。
二、信息选择理论
1、策略选择理论：主要探讨的是有哪些种类的信息可供交流者选择，以及选择策略的相关
过程。
2、目标探索理论：聚集于人们是如何根据自己的目标来积极主动地创制或设计信息的。
（1）顺从获得
概念：获得对方的顺从是交流过程中最具普遍性的目标之一。具体说，就是让对方按照你的
意愿来行事。
交换理论取向：即寻求顺从的人向对方提供了特定的东西，从而换取了后者的顺从。交换理
论的基本假设是：人们从本质上说都是期望提供一些东西来从对方那里换取另一些东西。
五种获得顺从的整体策略：回报型、惩罚型、熟知型、非个人化义务型（进行道德召唤）、
个人化义务型（唤起欠人情心理）。
交流者在获得对方顺从的过程中所使用的三种权力类型：驾驭某些行动所产生的后果的能
力；确定自己与对方的相对位置的能力；确定价值观和义务的能力。
（2）构成主义
1、 概念：每个人都是按照个人思维中固有的概念和范畴来进行阐释和采取行动的。
2、 个人构建理论：人们在理解对外部世界的体验时，按照相似性来把事物进行分类，并
且按照差异性来区分事物。这些被用来理解事物的二元对立组（高/矮、冷/热、黑/
白）就是“个人构建”。
3、 构成主义理论强调建构有其社会根源，并且是在与别人的交流过程中习得的。构成主
义理论关注的是个人建构的复杂性和交流中所使用的策略的差异性。
4、 视角获得：认知的复杂性有利于对他人视角的理解，并有助于说话人设计出更容易被
对方所接受的信息。
5、 人本传播：在交流中主动适应对方被称作人本传播。随着信息越来越复杂，其所包含
的目标也会越来越多，也会变得越来越以人为本。
三、信息设计理论
（一）礼貌
1、礼貌是人们在交流过程中希望能够同时达到的几个目标中的一个。讲礼貌的目地是维护
对方的面子。
2、面子需求：人们都有获得别人欣赏和保护的欲望。积极的面子，是指获得别人的欣赏、
肯定、喜欢和尊重的欲望。（表达关心的和祝愿、运用各种尊称等）消极的面子：摆脱强加
和侵扰的愿望。（我们在向对方提出请求时，通常会强调把自己的愿望强加给了对方，并且
为此道歉。
3、威胁面子的行为：我们的行为未能达到积极和消极的面子需求。
（二）信息设计逻辑
1、 概念：人们对传播和信息有不同的想法，他们在特定地情境中决定跟对方说些什么样
时候，运用了不同的逻辑。
2、 表达性逻辑：把交流看作是自我表达的一种模式，可以用来交流感情和思想，但是并
未对他人的需求和欲望表现出足够的重视。
3、 成规性逻辑：把交流看作是一场按照特定规则来进行的游戏。这一逻辑旨在设计出符
合礼节的、得体的、以每个参与者应当了解的规则为基础的信息。
4、 修辞性逻辑：把交流看作是通过谈判来改变规则的一种方式。这一逻辑设计的信息较
为灵活、深刻和以人为本，这类信息设计了新的情境，以便将各种不同的目标整合为
一个严丝合缝的整体。
第七章 信息接受和处理理论
（阐释信息：一节；组织信息：二节；处理信息：三节）
1、 认知系统的三个层面：符码、结构和过程。
认知符码：是组成信息最基本的元素。常见符码包括：语言命题、视觉形象、对事件的记忆、
行为的轮次和感情等。
认知结构：即组织符码的方式。
认知过程：即符码的运作。一种为散布—激活取向：主张人们在完成某项任务时，把储存在
记忆中的相关“指令”按照一定的次序集合起来。（第六章“行为集合”理论就是典型例子）
第一节 信息阐释（理解和意义生产的过程）
一、奥斯古德论意义（有些过时）
1、假设：个人对外部环境中的刺激产生回应，形成一种刺激—回应的关系，这种刺激回应
的关系正是建立在意义的基础。意义就是对刺激所产生的内在的、思维上的回应。
2、 有形刺激物——内在回应——内在刺激——外在回应
3、 当某个符号与意义配对的时候，该符号就会引发相同的或者相似的回应。
4、 相当多的意义并非通过对外界刺激的直接体验而习得的，而是通过一个符号与另一个
符号之间的联系而习得的。这一符号联系的过程就是人们把与刺激物的亲身体验进行
抽象化的过程。
5、 对意义的测量，采用语义级差法（semantic differential）和因子分析法（factor
analysis）
6、 语义空间（semantic space）理论：人们赋予符号的意义位于一个隐喻性的空间。它
可被分为评估、活动和效力三个层面。任何一个符号都可以引发人们的反应，这一反
应由评估（是好是坏）、活动（积极还是消极）、和效力（是强是弱）组成。意义的
内涵便位于这个假设空间的某个位置上。
二、 归因理论
（1）探讨的是人们如何来推断行为的原因。聚焦于普通人日常生活行为的可以感知到的原
因与试图确证行为真实原因的“科学心理学”不同。
（2）弗里茨·海德尔概括了几种人们经常采用的归因方式：情境环境（受外部环境影响）、
个人效应（从个人角度影响事物）、能力（能够做某件事）、努力（试图做）、愿望（要做）、
情感（情愿做）、归属（继续做）、义务（觉得应该做）和准许（被允许做）。
（3）人们很自然会用语境来帮助他们确定行为的原因。对原因的感知就是通过中介找出人
们自身心理结构中的变量。其中一个重要变量是意义。你赋予所观察的食物以一定的意义，
这一意义决定了你究竟“看到”了什么。意义有助于人们对观察和感知到的事物进行整合和
组织，形成一定的模式，从而有助于理解外部世界。
（5）感知风格（perceptual style）：每个人处理那些模糊不清的问题的方式以及他们建
立的具有一致性的模式都各不相同，这种个人化的感知模式即感知风格。
（6）在实际生活中，人们在归因过程中往往不顾逻辑，并且带有偏见。人们可以用符合逻
辑的和不符合逻辑的方式来处理信息，是由当时的具体情况。eg动机（维护面子、控制局
面）等来决定的。
（7）基本归因错误：归因研究中反复出现的结果之一。人们倾向于把某个事件归因于个人
的品质，即个人似乎应该对他们身上所发生的事情负责。从总体上看，人们对那些引发事件
的情境因素不敏感，因此容易忽略那些并非个人的错误。但当人们评估自己的责任时，这种
倾向会减少，往往会怪罪于外部环境。如果事情发生在别人身上，我们往往会怪罪他们。
第二节 信息组织（信息如何被整合到认知系统中）
一、信息—整合理论（与传理交叉2，见P204，安德森信息整合理论）
1、信息整合理论
（1）概念：聚焦于人们是如何积累和组织有关某个人、某个事物、情境或思想的信息，
并在此基础上形成态度。态度是一种性格趋向，这种趋向表现为人们对某个事物是以积极的
还是消极的方式采取行动，信息整合理论是有关态度本质和态度变化的最常见的模式之一。
（2）在这一理论中，两个重要变量：
信息价位（或指向valence）：指信息是支持还是驳倒了你的信念。支持是正价的，反
之，是负价的。
信息的重要性（weight）：信息所具有的可信度的功能。
价位决定了信息如何影响人们的态度，而重要性决定的是信息在何种程度上影响了人们
的态度。
（3）当信息的重要性较低时，不管它是正价还是负价，它都不会产生什么效应，但当
重要性较高时，负价：会使态度受到影响甚至改变；正价：进一步强化原来的立场。
2、期望值—价值理论：对某个事物的态度等于对该事物各种信念的总和再乘以对它的
评估。
（1）人们通常有两种信念，一是对事物的信念，当你相信某种事物时，你就会坚信它
的存在；二是对可能性的信念，当你相信某种可能性时，你就会坚信事物之间存在着某种特
定的关系。
（2）与信念不同，态度是具有评估性的。态度与信念紧密相连。
（3）态度是有组织的，人们对具体事物所持的态度经过累加，便产生了总体态度。
对某事的态度=对该事物各种信念的总和*对它的评估
（4）根据这一理论，态度改变来源于三个方面：首先，信息会改变特定信念的可信度
或重要性，其次，信息可以改变信念的价位，最后，信息还可给原有态度结构加入新的信念。
3、推理行动理论
概念：行为部分地是由意图引起的，而意图是各种态度的复合产物。即你愿意采取的行
动一方面取决于你自己对该行为的态度，另一方面出也取决于你所推断的别人的看法。
意图=行为的态度*态度重要性+别人的看法*别人看法的重要性
上面的公式预测了你的行为意图，但是它并不一定预测实际行为，因为所作所为并不不
总是与意图一致。
二、 一致性理论
1、认知不和谐理论（与传理交叉3）（06年考题，谈谈认识不和谐理论，15分简答）
（1）任何两种认知因素，包括态度、感知、知识和行为之间必定会产生以下三种关系
中的一种：
一是无效关系，即毫不相干；二是一致关系，或称和谐；三是不一致关系，或不和谐。
当一个因素没有按照预期的那样接在另一个因素之后出现，便产生了不的谐。
（2）不和谐理论的两个前提：一是不和谐会产生压力和张力，从而导致变化；二是
当系统出现不和谐时，人们不仅会去努力减少它，而且会设法避免更多的不和谐现象出现。
不和谐的程度越高，减小它的需求就越迫切。
（3）不和谐两个相关变量：认知因素的重要性、不和谐关系中包含的因素的数量。
如果你同时遇到几个不一致的因素，而且它们对你来说又都很重要，那么你就会感到强烈的
不和谐。
（4）处理认知不和谐的五种办法：一是改变其中一个或几个行为或态度。二是在构
成紧张关系的任何一方添加一些新的因素；三是调整自己对某些因素的原有看法；四是寻找
一些增进和谐的信息；五是有意歪曲和误读相关信息。
（5）不和谐可能导致以下情况：
A做决定：不和谐的产生往往源于人们所做的决定，人们所体验的不和谐程度取决于
以下四个变量：决定的重要性/人们选择替代物的吸引力/未选择的替代物的吸引力/替代物
之间的相似性
B被迫服从：即被人诱导做了有悖于自己信念和价值观的事，这类情况通常是在有奖
赏的情况下出现的。
2、罗凯奇：信念、态度和价值观。
（1）在信念、态度和价值观的基础上发展出了一套有关人类行为的综合性阐释理论。
（2）他相信每个人都具有一套包括信念、态度和价值观的组织严密的系统。 这一系统
对人类行为起着指导作用。
（3）信念：是人们做出的有关自身和外部世界的成千上成种阐述。在系统中，信念是
按照它们相对于自我的中心地位和重要性来排列的。居于信念系统中心的是那些已被确立
的、具有相对稳定性的信念，信念越是接近中心地们，就越是难以改变。而一旦改变，对整
个系统的影响就会越大。
（4）态度：是有关某个特定事物的信念组合。每种态度都包含了对某个事物的好几种
信念。两种重要态度：对事物的态度、对情况的态度。两种态度要放在一起进行观照，一个
人在特定情况下的行为是这两种态度综合作用的结果。行为源于各种态度和包含各种中心信
念的系统的复合作用。
（5）价值观：居于系统中心地位的、起到人生指南作用的特定类型的信念。工具价值
——例如努力工作、忠诚——指导我们的日常生活和行为；终极价值是指我们为之奋斗的最
终目标——例如财富和快乐。
（6）在信念-态度-价值观系统中，另一个具有全局性重要意义的组成因素是自我概念。
自我概念（self-concept）：即对自身的概念。即我是谁？自尊心是认知系统中的首要动
力，它影响着系统中的其他因素，因此，自我概念对整个系统的目标起着指导的作用。
（7）罗的主张还是属于一致性理论的范畴，态度结论是人们对一致性的追求对他们的
行为起着指导作用，而不一致所产生的压力则会引发变化。个人心理系统中最值得关注的不
一致性表现在他对自己的认知上，只有在自我概念出现不一致的情况下，才会出现具有重要
意义的、持久的变化。这一矛盾增强了人们对自身的不满意程度。既然人类心理系统的最终
目标是维持自尊，那么变化就自然而然发生了。
第三节 判断的过程
一、社会判断理论（该理论由谢里夫等人提出，主要探讨了人们是如何对信息做出判断
的）
1、人们是在支点或参照点的基础上做出判断。人们感知社会的支点是内在的，是建立
在以往经验的基础上的，这些内在的支点影响着人们对信息作出回应的方式。某事物对于一
个人的自我意识来说越重要，支点对他的认知所产生的影响就越大。
2、人的接受或者拒斥范围受到一个关键性因素影响——自我的介入（ego
involvement）：指个人与特定事物的相关程度，即一个人对某件事物在多大程度上影响了
自我概念或者是他对该事物重要性的估价。（臭氧层空洞化，自我介入程度低，如果你确诊
患上皮肤病，那么介入程度高。）
3、人们以自身内在的支点和自我介入为基础来判断信息是否受欢迎。
4、人们通过对比和吸收的方法对相关信息进行歪曲。当信息与个人的立场较为接近时，
它就会被吸收；而对于那些远离个人立场的信息，人们会进行对比。这种吸收和对比，会因
自我介入程度而得以加强。eg中立的陈述—>吸收—>支持；中立—>对比—>反对
5、社会判断理论对态度变化的预测：
首先，如果信息在你的接受范围内，那么它就会促进态度的变化；其次，如果信息在你
拒斥范围内，那么变化就会小得多；再次，如果信息在你接受或中立范围内，那么，该信息
与你的立场越是不一致，态度变化的可能性就越大；最后，对某事物的自我介入程度越深，
拒斥范围越大，中立范围越小，态度变化可能性就越小。
二、深思的概率理论（elaboration likelihood，与传理交叉4，精心的可能性模式）
（1）人们是以不同方式来评估信息的，有时人们会用一种繁复的方式和批判式的思考，
有时却比较简单。
深思概率大致可以归为两种：指对论点进行批判式评估的可能性。深思概率取决于人们
处理信息的方式即：中心路线和边缘路线。
深思，批判式思考，往往出现在中心路线上，一般性思考，则出现在边缘性路线上。如
果说你是在中心线路上处理某个信息，那就意味着你对该信息进行了积极的思考，并结合已
获得的信息对其进行评估，如果是在边缘性路线上，你的思考就不那么深入了。
（2）采用中心路线时，改变的态度较为持久，也会对你的实际行动产生一定的影响。
而边缘路线导致的则是暂时的改变。
（3）批判式思考的两个因素：动力和能力。
动力较大时，会采用中心路线的方式；动力较小时，往往会采用边缘路线。动力的三因
素：包括介入因素（个人与信息主题的相关程度）、论点的多样性（如果存在多种不同的信
源和论点，信息接收者往往更倾向于采用中心路线来处理它）、个人对批判式思考的偏好程
度（遇事喜欢深入思考的人往往更倾向于采用中心路线，而不喜欢多费脑筋的人…）。
但是不论你动力多大，你必须具备一定的能力，才能采取中心路线。
（4）采用中心路线时起作用的因素：一是信息与你原有态度的契合程度，较为契合的
信息往往得到正面的评价，不符合你观点的信息往往得到负面的评价；二是论点本身的说服
力，在运用中心路线时往往采用批判式思考，能识别出各种信息的好坏，好观点对你的影响
大；采用边缘路线时起作用的因素：信源的可信度、喜欢程度、论点的数目。
（5）采用边缘路线处理问题时，你不会仔细考虑论点是否有说服力，而是会根据一些
简单的线索匆忙地下结论。
（6）人们在处理信息时，常常把中心和边缘路线结合起来，同时受到这两条路线的影
响。
（7）这种模式给予态度改变研究中的接收者更主动的角色。
三、期望破坏理论
理论前提：交流者愿意调整自己的行为，在交流的过程中努力做到相互适应。
期望取决于三个因素：社会规范，我们以往对他人的了解和体验，以及行为出现的具体
情境。这一期望可通过各种非言语行为体现出来，如目光的交接，身体的距离和角度等。
1、基本假设：如果期望得以满足，那么他人的行为就可以得到正面的评价，反之，如
果期望被破坏，那么其行为就会被判为负面的。
但是期望破坏有时得到的亦是正面的评价。
2、不论评价如何，期望破坏总会引起观察者的兴趣。
3、回报价值：它是人们对交流进行的评价，指的是交流的回报程度到底有多大。
4、期望来源于三个因素：人们对另一方特征的感知、双方关系的现状、行为出现的具
体语境。
5、在期望破坏—评价过程中，破坏对判断起到了强化的作用：破坏期望的行为唤起了
你某种情绪，反过来又强化了你对他的评价，对交流过程、对信息意义的评价。
四、人际欺骗理论
1、欺骗是指通过信息、行为和形象的精心操控，导致对方接受一个虚假的信息或结论。
2、欺骗焦虑（发出者）和怀疑（接收者）会通过有节制的策略性行为表现出来。但更
易于通过非策略性行为（行为失控）表现出来。
3、影响发现欺骗的相关因素：
一是期望是否被破坏，交流者的期望是他做出判断最为重要的支点或参照点；二是交流
者的互动性；三是交流双方关系的直接性，即关系的紧密程度；（真理偏见：交流者之间关
系不错，他们会相信彼此之间所说的都是真话，阻碍人们发现欺骗，谎言偏见则反之。）四
是谈话需求，即我们在交流中需要完成的内容。内容越复杂越不容易发现。五是彼此熟悉程
度；六是欺骗动机的强弱；七是欺骗和发现欺骗的技巧。
第八章 符号的互动、建构和聚合理论
互动理论主张，意义是在社会群体之间的互动过程中得以创制和维持的。互动建立、维持和
改变了某个社群或文化中的特定成规——包括角色、模式、规则和意义等。范恩认为，互动
理论整合以下几个问题的研究：群体成员如何协调他们的行为，如何理解和控制情感，现实
是如何构建的，较大规模的社会结构是如何建立起来的，以及如何影响公共政策。
第一节 符号互动主义
1、理论基础：所有社会结构和意义都是由社会互动所创制和维持的。
2、早期互动主义分为芝加哥学派和衣阿华派。
一、芝加哥学派
1、布鲁默—芝加哥学派的基本观点：
（1）对人类的研究必须采取与对事物的研究完全不同的方式，研究者要努力融入对象
的体验中去。
（2）避免采用量化的科学取向，转而强调生活经历、自传、个案研究、日记、信件和
间接访问。
（3）把人们看作是具有创造性和富于创新精神的，他们能随心所欲地对不同情境做出
难以预测的定义。
（4）社会和自我被视为过程，而非结构。
2、 芝加哥学派
米德被认为是互动主义的始作俑者，他的论述是芝加哥学派的核心。
（1）社会、自我和思维是米德理论中三个最为核心的概念，是社会行为的不同侧面。
社会行为几乎包括了一切心理和社会性过程。
（2）社会行为最基本形式由三元素构成：一是某个人做的最初表示；二是另一个人对
此做出的回应；三是结果。结果通常是传播者所赋予行为的意义，意义由三者之间的相互关
系决定的。意义和行为都是在社会交往的过程中习得的。
联合行动：涉及到群体，是由较小规模的互动行为之间的联结所组成。例如：婚姻、贸
易、战争或宗教仪式。正是群体生活中的社会性创造和维护了规则，而不是由规则创造和维
护了群体生活。
（3）社会：是由社会成员经过合作而完成的行为所组成的。合作：由读解他人的行为
和意图；以适宜的方式做出回应组成。
意义是传播最重要的结果之一，所获得的意义是与他人交流的结果。
意义符号：米德把具有共享意义的表现称为意义符号，意义符号使社会的形成成为可能。
人类用声音把这些符号表达出来，所以我们能够听到对方并彼此回应，我们既是信息的发出
者，也是信息的接受者，都要经过接受信息和作出回应的过程。
社会就是由人们之间的互动所构成的网络，在这个过程中，参与者运用符号给自己和他
人的行为赋予一定的意义。
（4）自我：人们把自己当作一个对象来做出回应。
被类化的他者：指的是你用来观照自己的复合视角，即你站在别人的角度对自己的感知。
通过与别人长期的符号互动中，形成这一自我概念。
意义重大的他者：指那些与你最为亲近的人。他们意义重大的原因是因为他们做出的回
就应会对你产生很大影响。青少年的形象：通过与意义重大的他者的互动形成的自我形象。
自我概念的两个侧面：主我、客我
主我：是自我中冲动性的、无组织的、无方向的和不可预测的部分。是行为的驱动力，
富于创造性的，无法预测的行为。
客我：即被类化的他者，由与他人共享的具有组织性和一致性的模式所构成的。使自我
的行为符合社会化规范，调适性的行为。
很多人会有意改变自己的生活环境，以此来改变自我形象。
（5）思维：思维是一个过程，一个与自己进行互动的过程。这种思维能力是与自我共
同发展起来的，任何一个行为都离不开思维，思维就是人们对所处情境进行解读的过程。人
们会仔细地考虑现状并对未来行动进行规划，人们可以想像出各种不同的结果，对各种方案
进行选择和测试。
二、衣阿华学派
曼福德·库恩和赫卡尔·考奇是衣阿华学派的代表人物，认为互动理论的各个概念是具
有可操作性的，强调客观的研究方法。
1、两方面的创新：对自我概念进行具体化；采取量化取向。虽然库恩和他的学生坚持
了基本互动理论原则。
2、理论前提：符号互动是所有行为的基础，人们通过社会性互动来处理外部环境中的
事物，同时给后者赋予了意义。命名是传递事物意义的主要方式。个人不是被动的反应器，
而是主动的策划者。个人把与自我的“对话”作为其行为的一个组成部分，也强调了语言在
思维和传播中的重要地位。
3、事物：可以是个人现实生活中的任何一个方面。成为事物的唯一条件是个人为它命
名，即运用符号再现它。这些事物都是从社会性的角度加以定义的。
4、行动规划：个人对某一事物所采取的总体性行为模式。态度对个人的行动和规划起指
导作用。态度是用语言表述的，因此人们可以观察并测量到他。
5、导向性他者：即以某个人生活产生重大影响的他人。既可以是身边人也可以是历史
人物，总之，个人是通过他人，尤其是与那些对其生活产生重大影响的人的互动来形成自己
世界观的。
6、自我：即个人针对自我进行的行为规划，包含了个人的身份、好恶、目标、意识形
态和自我评价。
自我概念是个人对其他事物做出判断时最常采用的参考框架。对态度起着引导作用。
所有随后进行的行动规划都源自这一自我概念。
7、二十项陈述的自测：是一套测量自我概念的各个不同侧面的方法。
有几种不同的方法来分析测试结果：排序变量；中心变量
排序变量：指个人所具有的身份/认同的相对显著性。Eg 把“浸礼会教徒”排在“父
亲”前，可推断其对宗教信仰要比对家庭关系的认同强烈的多。
中心变量：指个人对整体性身份的认知程度。Eg受试者更易认知“美国人”这样引
起共鸣的群体性分类而非一些特有的主观性的特质如“强壮”。
三、互动主义的拓展（戈夫曼——在社会学理论中运用戏剧的隐喻而著名，把社会比作
舞台，人们都是台上的演员，通过表演给观众留下印象）
1、最初假设：人们都要设法给日常生活中遇到的事件赋予一定的意义。
2、人们对情况的定义可以分为片段和框架。
片段：指一系列动作的组合。（打开冰箱、拿出牛奶、倒进杯子、喝下去。）
框架：用来定义片段的最基本的组织模式（喝点东西）
框架分析：对个人如何组织自身的体验进行分析。人们借助于框架来识别和理解事件，
给生活中出现的行为赋予一定的意义。
自然性的框架：指不具有导向性的自然性事件。
社会性的框架：指受到一定的思维过程的控制和引导的。（如筹划一次请客）（框架
就成为我们理解自身体验的模式。）
首要框架：指那些最基本的组织形式，如交谈、饮食、穿衣等。
首要框架可以变为次要框架，在此，首要框架的基本组织原则被用来满足不同的目的。
比赛是一个次要框架，它模仿的“打斗”这一首要框架。我们所具有的框架中，有很大一部
分并非首要框架，而是对首要框架的模仿。
3、用框架分析来观照交流行为
当面相遇：人们集中精力进行交流时，就出现了当面相遇，（在侯车时，与某位乘客
进行交谈，出现当面相遇）当面相遇可以表现为语言行为，也可以表现为非语言行为。
演戏：处于当面状态下的人们，轮流演戏给对方看。为了吸引听者，说话人要把某种
特征展示给他们看。说话人与舞台上的演员一样，用特定的角色来展示某种性格特征。
4、你只需关心你展现自我形象的种种情境。在不同场合中，你展现的形象是不同的。
EG：在好朋友面前和父母面前
定义某种情况的两步骤：一是了解处于同一情况下其他人的信息，然后再提供有关自
己的信息。在这一信息交换过程中，使人们了解到别人对自己的期望，这个过程通常是通过
观察别人的行为，再构建自己的行为，以期给别人留下深刻的印象。
5、同处于某种情况下的参与者共同展示形象，这样就形成了对这种情况概括性的定
义，这种总体性的定义通常是统一的。一旦定型，就会产生道德上的压力来压制怀疑和冲突，
从而维持这一定义。人们可以在这一定型的基础上进行完善，但永远不背离最初那个定型形
象。
第二节 符号建构理论
一、建构理论是关于社会性行为的总体性理论，由社会学家吉登斯及其追随者创制。它
认为人类行为是一个生产和再生产不同的社会体系的过程。交流者按照规则有策略地采取行
动来实现其目标，从而创制出新的结构，反过来会对未来的行动产生影响。
这些结构既对社会性行为产生影响，又反过来受到社会性行为的影响。
这些结构为个人提供了指导他们行为的规则，这些行为反过来又创制出新的规则，同
时也在复制旧的规则。
二、人类行为的起因，长期以来有两派观点的争论：一是主张人类行为是由外部力量引
起，一是强调主观意图。吉试图超越这一理论，他认为，我们有意采取某种行动，旨在实现
我们的意图，同时，我们的行动也会产生一些意料之外的后果，从而建立一些新的结构，对
我们今后的行为产生影响。（收拾会议室的例子）。
三、构建的三种模态：阐释或读解、道德感或得体的行为举止、行动中的能力感。这是
我们用以指导行为的准则，即如何理解事物/哪些是应该做的/如何做。反过来我们自身的行
为也强化了上述这些结构—阐释、道德、能力。
四、在实际生活中，你的行为不大会只受一种结构的倾向，相反，你的行为同时受到几
种不同的结构性因素的影响。与此同时，你的行为也在影响这些结构性因素。这样便会产生
两种结果：
一种结构可以间接产生另一种结构；一种结构的产生过程中需要建立另一种结构来对该
结构起破坏作用。这是一个经典的自相矛盾的“吊诡”，通过矛盾性因素之间的辩证关系，
系统会出现变化。eg任务和关系。
第三节 符号聚合的过程
一、肯尼斯·伯克的认同理论
1、行为：是指有目的性的、自发性的行为；动作：是指无目的、无意义的行为。物体
和动物会有动作但只有人才有行为。
2、人类是创制、运用和误用符号的动物。创制符号是为了给事物命名、运用符号是为
了传播和交流；滥用符号造成不良后果。这里，符号涵盖的范围非常广，包括一系列语言和
非语言的元素。
3、现实是以符号为中介来传递的。语言是行动的工具，由于人们在行动过程中需要社
会性的合作，所以说语言塑造了行为。在伯克看来，语言承载着感情，人们的态度、判断和
感觉都无一例外地通过其使用的语言表达出来。
4、罪感：涵盖了人们各种类型的紧张情绪，包括：焦虑、难堪、自我憎恨等。他认为
符号的使用导致了罪感的产生。
罪感的三个来源：
第一个来源是负面因素：人们通过语言来进行道德训诫，他们构建了各种各样的规
则和禁忌，这些规则是不完全一致的，你遵循一条就会打破某条禁忌时罪感便产生了；
第二个来源是尽善尽美原则。用语言想象出一种尽善尽美的状态，在生活中为在一
定程度上实现这种想像而努力奋斗，理想和现实的差异导致了罪感的产生；
第三个来源是等级原则，为了维持秩序，人们以社会金字塔的形式来构建社会。这
一构建也是通过符号来完成。竞争和分歧导致了社群等级和阶级的出现，从而引发罪感
罪感是一切行为和交流背后的首要动力，人们之所以要进行交流，就是为了排遣罪
感。
5、同体性
每个事物都具有本质或实体，实体是指事物总体上的本质或者实质。人也具有实体，而
每个人又具有不同的实体，所以任何两个人的实体在一定程度上是相互交叉的，但这种交叉
又不会是完全彻底的，因此不可能实现完美无缺的交流。
无论人与人之间进行怎么样的交流，其中发挥作用的是他们共享的实体，即同体性。（在
游泳池里轻松自由的交流，是因为共享了使用语言的意义）。一个有意义的符号，是通过同
体性而获得共享意义的。
6、认同：总体上看，认同与同体性概念十分相似，认同的反义词是分歧。分歧以及由
此产生的罪感是促成交流的最主要动力，通过交流可以促进认同，随着认同的增强，共享的
意义也会增加，从而增进理解。这一过程是螺旋式上升的趋势，因此认同就成为说服和有效
交流的一种方式。
人与人之间有三种认同的来源：物质性认同：通常来源于商品、占有物。理想化认同：
来源于共享的主张、态度和价值观。形式上的认同：来源于交流双方对共同参与的事件的组
织、安排和形式。
认同并不是一个非此及彼的现象，而是一个程度大小的问题，只有在认同大于分歧的情
况下，交流才会更成功。
神秘作用下的认同：尽管存在着巨大的明显的分歧，处于社会较低层的人通常还是会认
同处于上层的人。一方面，人们在他们身上看到了自己为之奋斗的尽善尽美的状态，其次，
领袖人物身上表现出的神秘色彩和魅力掩盖了他们与普通民众间的巨大分歧。
7、戏剧性五元法：
行为：是由演员（动作发出者）完成的
场景：实施行为时所处的情况和背景
中介人：即演员本人
中介：中介人用来实施行为的方式或工具
目的：行为的动因，语言交流的目标、期望达到的效果等。
二、符号聚合理论（也称想像—主题分析，这是一套有关在传播过程中如何使用叙述的
十分完备的理论。）
1、理论假设：人们有关现实生活的形象受到一些故事的引导，这些故事是在小规模群
体的符号互动中创制出来的，反映了人们对事物的看法，并且在人与人之间，群体与群体之
间形成一个个故事链。
2、想像性主题：出现在那些较长较复杂的故事中，包括人物、情节、场景和公认的中
介（eg权威，某种信仰）
3、修辞性视野：是对事物过去、现在和未来的看法。在我们无法体验到的只能通过符
号来了解的那些领域，修辞性视野构建了我们对现实生活的认识。
修辞性视野从来不是以完整的面目出现的，而是通过分离相关想像性主题一点一点积累
起来的，主题构成了谈话的核心，人们通过这样的谈话创制和链接了修辞性视野。
在某个特定的集体中，某些主题是时常被讨论的，也是人尽皆知的。想像性主题发展到
这种程度，就成为幻想性典型。这些反复讲述的故事通常是关于个人集体或者社区取得的成
就，采取的传奇的方式。
4、聚合现象：人们通过想像性主题形成修辞性视野，人们通过共享想像性主题而聚合
到一起，并逐渐形成相同的看法。修辞性视野创制和维持了群体共享的意识。
5、修辞性视野并非只是叙述性的故事，而且还包含了某种深层结构，这种结构体现并
影响了我们对现实的认识。故事中蕴含的一些主要比拟相互竞争，看哪一个最能吸引人们的
注意。Eg道义性比拟，社会性比拟，实用性比拟
6、想像性主题是说服过程中一个非常重要的因素，对公共传播利用阅听群最主要的想
像性主题来进行传播，通过改变、放大和增加想象性主题的方式来对想像性主题目进行扩展
或修正。
对想像性主题的利用远远超出了说服的范围。作为社会关系的中介，人们利用它来创制
一些叙事结构。这些结构使生命变得有意义，也使人们具有社群意识。对其进行评估的更好
的方式是艺术性，即创造性、时新性和智慧。
第九章 社会与文化现实理论
第一节 现实的社会构建（非重点）
彼得·伯格和托马斯·拉克曼的《现实的社会构建》，舒茨的《社会领域的现象学》推
动了这一派理论的建立，肯尼斯·格尔根将其命名为“社会构建流派”。
1、理论前提：现实不是独立于人类自身之外的一系列客观的排列与组合，而是在各个
集体、社群和文化之间的互动过程中构建起来的。
2、理论假设：
（1）交流行为是自发的（但是是受到意义、道德秩序、角色和规则的限制的）；
（2）知识是社会的产物（知识不是发现的客观存在，而是通过与他人的交流获得；语言及
其运用方式决定了意义并对行为产生很大影响）；
（3）知识是语境化的（人们给事件赋予的意义是从特定的时间地点社会背景下进行的交流
中派生出来的，随时间变化而变化）；
（4）理论创造了世界（学术研究不是用来发现真理的客观性工具，而是有助于人们创造新
的知识）；
（5）学术研究受到价值观的影响。
3、视角：观察或者思考某种事物的方式。
传播视角：意味着你在观察现实是如何在人们的互动中构建起来的。
一、社会构建的一些例子
（一）自我
（1）哈瑞及其同事创立的“行为起源学”，承认自我既是个人化的，也是社会化的，
研究人们如何理解自己在某一片段中的行动。“片段”（episode）即指一个可以预测的行
为序列。
（2）人们通过交流和互动创造出某一套理论，描述了某个片段的特征，预测了人们在
该片段内的行为所产生的符合逻辑的结果。人们给某一片段内的事件赋予的意义引发了一系
列规则的产生，这些规则对所有参与者在该片段内的行动起着指导作用。但是，由于个人对
规则的理解不同，对片段赋予的定义不同，所以其行为会有不同。（eg恋人如何进入“做
爱”这一片段）
（3）人：是在公开场合中展示的存在，它体现的是在在特定的文化背景下和社群内建
立起来的属性和特征。
自我：和人相比，自我是你对自己做为人的整体性、个人化的概念。自我是一个“个人
化” 的概念。
所以，人的存在具有两面性，社会性的存在（即“人”）和个人化的存在（即“自我”）。
人们关于自我的理论是通过长期与别人的交流和互动所习得的。我们所有的思想、意
图和情感都是以我们在社交过程中习得的术语来归类和命名的。由于不同的社会文化所构建
的社会现实各不相同，所以“自我”概念所涉及的范围就是千差万别。
（4）自我是由处于三个不同层面上的因素所构成的。
第一个层面是展示：自我的某个侧面是在公开场合展示出来，还是保持个人化的状态。
第二个层面是实现或者是资源：即自我的某些属性在多大程度上是来源于个人，或在多
大程度上是来源于群体。一个人的自我不同与另一个人，是由于自我的不同侧面都具有不同
的定义。
第三个层面是中介：是自我具有多大程度的主动性。
（5）所有有关自我的理论包含的三个共同因素：
首先都包含了自我意识，这就意味着人们都把自己当作是一个客体，当你思考和谈论自
己的时候，你展现的是你的意识。自我概念中最重要的方面是人们在定义和实践I1（能够
了解的自我）和I2（被了解的自我）时必须保持一致，即双重惟一性原则，即你总是得把
你自己看作是你本人。
其次是中介：人们把自己视为具有意图和能够实施行动的中介。（作规划时，中介作用
明显）
自传：指对个人历史和未来的感觉。（跟别人讲述自己时自传作用明显。）
（二）情感
情感是一种信念体系，它指导人们给所处的情境下定义，从本质上说，情感就是控制人
类感受的内在化的社会规范和准则。
（1）情感综合症：情感是由一系列生理和心理的反应所聚合而成的，单凭某一种反应
感觉到不足以定义一种情感。情感是社会构建的产物，人们是通过交流和互动来逐渐习得采
取某一系列行为构建特定的情感意义，以及如何来表现这种情感。
（2）给各种情感命名，或给他们贴上某种标签，对于人们的情感体验起到了推动作用。
人们把某种情感体验称为嫉妒，而把另一种称为“孤独”，什么是“愤怒”、“恐惧”，
“嫉妒”和“孤独”。人们都会构建出一定的规则。同理，如何对这些情感作出回应，人们
也会构建出一定的规则，这些规则都是在人们长期的社会交流和互动中构建起来的。
（3）情感受制于四类规则：
评估规则告诉我们感情是什么，它指向何方，是积极的还是消极的；行为规则告诉我们
如何对情感做出回应：是隐藏，表露还是发泄；预测规则界定了情感的发展过程，持续多久？
可以分为哪几个阶段？；归因规则规定了我们应当如何解释某种情感并使之合理化，如何对
别人讲述它？如何在公开场合表达它？。
人们是按照自身的社会建构来为情感定性的。
（三）解释
（1）人们构建社会性现实的主要方式之一便是做出描述和解释，从而使自己的行为合
理化。
（2）人类体验是无法与彼此的交流分开的，做出解释是联结交流和体验的中心环节。
（2）从本质上说，解释就是对那些时间进行重新构建——具体说来，就是为重新读解
那些事件创造出新的语境。
（3）个人与社会是不可分割的，我们的注意力不就集中于人的“外在”行为和“内在”
机制的假定关系上，即我们根本不应聚焦于个人，而是应当聚焦于人们彼此的关系。
二、意义的协调与管理（coordinated management if meaning，CMM）
（1）意义的协调与管理理论：它是社会构建理论中最具综合性和条理性的，整合了系
统论、符号互动主义、社会构建理论、言语-行为理论和人际关系传播等领域。CMM是一种
规则理论，阐明了人们如何以规则为基础来进行阐释和行动。处于某种社会条件下的人，首
先要运用规则来阐释所发生的事情，然后运用规则来确定哪种行动是合适的。
（2）组成性规则是有关意义的规则，传播者利用它来阐释和理解某个事件，规定性规
则是有关行为的规则，传播者利用它来决定如何回应和采取什么行动。
（3）语境：不论规则是关于意义的还是关于行动的，都是在一定的语境内起作用的。
语境是指用来阐释和行动的参考框架。一种语境通常嵌入了另一个语境中，每一个语境都是
一个更大的语境的组成部分。
四种典型语境：关系语境（群体中各个成员彼此之间的期望）、片段语境（某个事件）、
自我概念语境（人对自身的定义）、原型语境（一个体现普遍真理的形象）
（4）文本语境：任何一种被阐释的事件或者行动都可以被称为文本。（比如：交流的
言辞是文本，交流者的关系是语境）文本和语境构成一个循环圈，这体现的是自反性——即
每种语境都反射了其他语境，自反性总是会在某个时刻进入语境的等级体系中，由于这种体
系不可能永远维持下去，在某个时刻，这一语境阶梯会走到尽头，然后从头运行。
（5）魔圈和怪圈
魔圈（charmed loop）：在整个循环过程中，意义的规则能够保持一致，就称之为魔
圈或是自我肯定的循环圈。
怪圈（strange loop）：在循环圈的每一个节点上，阐释的规则会随着节点的变化而
变化，从而出现了似是而非的矛盾状况，形成一个怪圈：即每一个环节都否定了另一个。
（6）传播过程中，起作用的四种逻辑力（logical force）
一是预兆力或是因果力：这是一种在行为之前出现的联系，人们觉得受到了某种先决条
件的压力，必须以一定方式来行动。
二是实践力：是一种作为行为的结果而出现的联系。指人们以特定的方式来行动，从而
导致未来出现的某种状况。
三是语境力：指来自语境的压力，行为或阐释自然而然地成为语境的一部分。
四是蕴含力：指以某种方式改变或者转换语境的力量。（读大学的例子）
（7）在现代社会中，每个人都是各个系统的组成部分，每个系统都有自己一套意义和
行为规则。这些规则是通过社会群体中的互动而习得的。长期以来，人们将这些规则内化，
用来指导自己的行为。而当某个人进入互动过程时，他无法立即知道其他参与者所使用的规
则，因为，首要的任务是获得并且维持某种形式的协调。
（8）协调：指把某个行为与其他的行为结合起来，最终使行为的排序即合适又符合逻
辑：
甲以某种方式行动—>乙将此行动看作某种信息并用意义规则对信息作出阐释—>乙按
照行为规则对甲做出回应—>甲按照意义规则对乙的行为进行阐释—>如果甲乙的规则结构
迥异，则发现一个人的行为并未引发预期的效果—>重新调整规则直至某种程度协调。
意义的协调和管理理论最重要的贡献是：人们可以在彼此不了解的情况下取得令各方面
满意的、近乎完美的协调。
交流者可以运用对各方来说都是合乎逻辑的方式来组织他们的行为，但是，他们各自对
当时情况的阐释和理解却有可能不同（演讲的例子）
第三节 语言和文化
一、语言的相对性
1、萨丕尔-沃尔夫假说/语言相对性假说：阐明了语言结构决定某个文化群体成员的行
为和思维习惯。这个假说阐明了我们的思维过程和看待世界的方式都是由我们所使用的语义
的语法结构来塑造的。
2、与社会构建理论的区别：
社构：人们能够在交流和互动过程中创制现实。
假说：现实已嵌入语言当中，现实不是“构建”出来的，而是“表现”出来的。
二、精心设计的符码和限制性符码
该理论阐明了日常会话所采用的语言结构是如何反映和塑造社群的假设性观念的。
1、基本假设：社群内部建立起来的关系会影响到该社群使用何种类型的语言，同时，
该社群使用的语言结构把不同的事物联结起来，并赋予它们以不同的意义。
2、符码：指社群成员所使用的语言背后所蕴含的一套组织原则。
精心设计的符码：为表达同一个事物提供了各种各样的方式。它使得说话人能够阐明
自己的想法和意图。较为复杂，需要更多的规划和思考。
限制性符码：所提供的可供选择的范围要窄得多，因此预测其形式较为容易。
3、限制性符码适用于成员具有较多的共享的假设性观念，不需要对各自的意图进行
进一步的阐述，强调的是社会性范畴，要求成员有相同的意义体系。
精心设计的符码适用于成员具有不同的视角，强调的是个人化范畴，成员不一定有相同
的意义体系。如果说话人认为个性比群体更重要，他就会采取精心设计的符码。
4、（1）具有多大程度的开放性是运用这两种符码的不同类型的群体之间的最主要差别。
（2）系统中使用哪种符码主要取决于：该系统中最主要的社会化中介（eg家庭、学校、
工作单位）的本质及价值观（是强调个性发展多元化还是封闭狭隘的社会）。
5、（1）精心设计的符码能够增强说话人的能力，使他能够适应不同的情况，从而吸引
各种层次的听众，但是，另一方面，精心设计的符码也会产生疏离作用。
（2）限制性符码虽然有其局限性，但是，它蕴含着相当大的意义潜力，能够表达出各
种文化形式的精致、微妙和多样化的特征。
6、在这两种符码发展过种中，家庭起到了相当重要的作用。
位置型家庭：泾渭分明，严格界定的角色结构。
个人中心型家庭：以个人的取向为基础来确定各自的角色。
第十章 体验和阐释理论
第一节 现象学
现象学研究的是来自意识的知识，以及人们如何通过有意识的体验来理解万事万物。
1、现象学基本理论
现象（phenomenon）：是人类感知当中物体、事件或情况的外观。
现象学把实际生活体验作为现实最基本的资料，提出人们所能获知的就是他们所体验的。
梅洛庞帝说，“我所掌握的所有知识——甚至包括科学知识——都是以我自己独特的视角
获得的，或者说是从我对世界的体验中获得的。如果没有这一体验，那些科学的符号就没有
任何的意义。”
现象学三个基本原则（斯坦利迪兹）：一是知识是有意识的，不是从体验中推断出来的，而
是在有意识的体验中直接找到的；二是事物的意义是由该事物在人们生活中所具有的潜在
性构成的，即你与事物有怎样的联系决定了它对你的意义；三是语言是意义的工具，我们通
过语言来定义和表现世界，我们通过语言来体验世界。
2、胡塞尔的现象学（过时）：胡塞尔是现代现象学的奠基人
（1）任何独立于实际的直接体验的概念框架都不足以发现真理，相反，个人对现实的
有意识的体验是发现真理的唯一途径。
（2）但是他的偏颇在于对主体/客体过于绝对化的区分，认为人与事物能截然分开。要
求人们认真地清除偏见，就能够自然而然地理解事物。
3、梅洛—庞蒂
（1）认为体验是主观性的而非胡塞尔说的客观的。
（2）人类是意义的创造者，作为主体与世间万物联系起来，人类的生命受到了世界的
影响，同时，人类也给世界下定义，给它赋予一定的意义。独立于世界的人类体验是不存在
的。
（3）人们的思想是言语的产物，意义本身也是在言语中被创造出来的，我们借助于日
常生活当中的语言来理解世间万物。
（4）知识与语言和传播是紧密联结在一起的。你在某个时候使用的语言给你所体验到
的事物赋予的一定的意义，但是，这种意义是暂时的也可能是变化的。不可能把事物简约为
某种抽象的“本质”。
4、阿尔弗莱德舒茨
（1）认为人们在日常生活中做了三种基本假定：一人们假定现实是恒定不变的；二假
定自身对世界的体验是合理的；三假定自己具备了采取行动和实现目标的能力。
（2）人们对世界的理解取决于从其所处的社会和文化群体中的其他成员身上所学到的
知识，现实是在某一群体内社会构建的产物。所以我们无法找到一种具有普适性的现实。
（3）每个人的现实取决于从其所处文化中采用的概念范畴。这些范畴是经过概括的产
物，即典型化产物。这些典型因社会条件的变化而变化。所以舒认为，要对特定文化和群体
中的典型化产物加以研究，可以发现有关个体历史的具体真相。
（4）社会知识是各种常规和惯例所组成的。各种社会行为都是按照这些社会“菜谱”
——即在特定条件下典型的、被大家所熟悉的做事方式——所组成。这些常规或惯例使人们
能够按照某种共同理解的逻辑来对事物进行分类、解决问题、承担社会角色、传播以及在不
同的情境下采取得体的行动。
5、海德格尔，创立阐释现象学
（1）只要世界存在，自然体验就不可避免。“存在阐释学”
（2）人们是通过自然体验来理解现实的，而自然体验是由日常生活对语言的使用创造
出来的。所以现实就是在某一特定语境下通过对语言的自然使用而获得的体验。
现象学的这一传统——把体验与语言和社会互动联系起来——与阐释学紧密联结在一
起。
第二节 文本阐释学
现代阐释学起源于19世纪初德国神学家施莱艾尔马赫，运用科学取向进行文本分析，
19世纪下半叶迪尔塞认为，要理解人类社会方方面面不是借助科学方法，而是通过主观性
的阐释。人类世界既是社会性的，也是历史性的，需要从其生活和工作的社群的角度来理解，
人类行为并非固定不变，也无法通过客观的方式来理解。（历史相对主义）
阐释学是对理解，尤其是对行为和文本进行的解读进行研究。任何一种读解或诠释行为
都可以贴上“阐释学”的标签。
阐释学大致分为：文本阐释学、社会/文化阐释学
阐释循环圈：在阐释某个事物的时候，要么是从总体概念到细节，要么是从细节到总体
概念。在这个循环圈内，首先，你会把自己对事物的观察与你已经知道的情况联系起来，得
到一个初步的解释；然后再去理解较陌生的情况；接下来，再运用他所获得的信息去修正最
初的理解，如此循环往复。
一、保罗·瑞柯
1、疏离（distanciation）：把文本和其所处的情境分离开来被称之为疏离，文本自
身所具有的意义与作者的本义无关。一旦成文，文本可以由任何读者来解读，这就为读解提
供了无限的可能性。
2、但是，这样的读解并不是没有界限的，任何读解都要受制于文本本身。
3、瑞柯提出的“阐释循环圈”是由解释和理解组成的。
解释是经验性和分析性的，它用对各个部分进行观察中得来的整体模式来解释事物。
理解是从整体上对事物进行综合解释。
阐释包括了：把文本分解为片段—>从主观上确定其整体意义，即从理解—>解释—>理
解，这个过程循环往复。
4、移用（appropriation）：瑞柯赞同文本和阐释者之间进行亲密互动，文本可以直
接与阐释者对话，瑞柯把进行开放式阅读称为移用。如果你对文本进行了开放式的解读，就
是你移用了它，把它变成了自己的东西。
二、斯坦利·费什
1、否认意义可以在文本中找到，意义只产生于读者中。
2、文本能激活读者的主观能动性，文本本身没有任何意义，是读者赋予其不同的意义。
3、阐释群体：意义的赋予并不是个人化的行为，你不可以随心所欲地把意义赋予文本，
你的讲解也不能古怪离奇，因为读者是某个群体的成员，他们进行交流和互动，构建共同的
现实和意义，并且在阅读文本的过程中运用这些意义。因此，意义实际上位于这个读者阐释
群里。
4、不存在对文本做出“正确的”读解，文本的意义完全取决于受众的读解。
瑞柯与费什理论的异同
同：不要到作者那里寻找意义。
瑞柯：读者通过对文本特征的考察来找出文本的意义。（意义可以从文本中找到）
费什：认为读者把自己的意义投射到文本的特征中去，最终得出的是对文本意义的解读。
（意义产生于读者中）
三、汉斯—乔治·伽达摩尔（海德格尔的追随者）
1、个人没有必要为了阐释和分析事物而与它们保持距离，相反，我们进行阐释是日常
生活行为中自然而然的一个组成部分。我们的体验和我们阐释的世界之间紧密联结成了一
体。
2、理论主旨：人们总是从预先假设的角度来理解体验的。我们具有的传统给了我们理
解事物的方式，我们不能把自己与这一传统完全割裂开来。观察、推理和理解从来不是绝对
客观和纯粹的，它受制于历史和人们对其他人或事的体验。
3、结构主义语言观：把语言视为表达和指涉客观现实的主观性工具。
互动主义：语言和意义是在社会的互动过程中创制出来
伽达摩尔：体验是具有语言性的，语言本身预设了所有的体验，在传播过程中，双方
并不是通过语言来相互交流，相反，传播过程体现的是交流双方和语言三位一体的关系。
第三节 文化阐释
1、文化阐释：指理解某一文化群体的行为过程。文化阐释要求我们对某一群体的行为
进行观察和描述，就像对书面文本进行考察，对其意义进行读解一样。也称为人种志
2、（1）文化阐释也运用了循环圈，包括接近体验的概念和远离体验的概念。接近体验
的概念：指那些对文化群体中各成员有意义的概念。远离体验的概念：对群体以外的人有意
义的概念。
从本质上说，文化阐释者就在这两种概念之间进行翻译。
（2）阐释就成为一个局外人所观察到的和局内人所定义的事物之间来回运行的过程。
（3）逐渐发展出一套合适的词汇体系，来把局内人的观点向局外人做解释，同时，
也能保持局内人自身所具有的那套接近体验的概念，即也能为局内人所接受。
3、人种志研究的四阶段
一是确立研究主题及其基本取向；
二是确定所观察的行为的层次和种类；（EG：衣着）
三是应对其所研究的具体的文化现象进行理论化；
四是研究者回头再看看他所运用的整体性的理论框架，用具体的个案来检验它。
一、传播的人种志研究——说，语言
1、概念：就是把人种志研究的方法运用到对群体传播模式的研究当中。光靠形式语言
学并不能对语言做出充分的理解，这是因为形式语言学忽视了语言在日常传播过程中五花八
门的方式。
2、传播的人种志研究的四条假设
第一，同一文化群体的成员创造了共享的意义，即采用的符码具有一定的共性；
第二，传播行为必须具有一定的秩序或体系；
第三，对单个传播者来说，因为文化的不同，意义和行为具有特殊性；
第四，不同群体的行为和符码模式各不相同，每个群体理解特定符码和行为时所采用的
方式也不同
3、传播的人种志研究涉及的三方面问题
一是找出文化群体在传播过程中所创制的共享的身份/认同的类型。
二是找出群体中公共表演的共享意义
三是探索群体矛盾或者悖论。如何通过传播来处理这些矛盾。
4、虽然人种志研究突出了群体生活的方方面面，它也展现了其成员是如何把自己做
为个体来看待的。换言之，群体身份/认同导致了个人身份/认同。你是谁，你作为人的身份
/认同，在很大程度上取决于你如何传播、对象是谁，在什么样的情况进行传播。
5、我不能很好地理解人们所说的话，直到我深入探索了他们在具体社会场景中的一
些特别语；我在路上遇到不认识的人，直到我在他们所处的社会和文化场景中去听，我才开
始理解
6、EG：以色列人的牢骚话，证明了以色列人共同关心的问题，加强了他们的身份认
同，同时，发牢骚成为一处共同发泄沮丧情绪的方式，此外，还发挥了团结和娱乐的功能。
7、言语符码：指某种文化未经书写的、通常存在于潜意识层面有关如何在某种文化
语境内进行传播的“指南手册”。（）P231
二、表演性的人种志研究—做，行为
1、特纳首先提出文化具有表演性，人种志研究不应该仅聚焦于人们说了什么，对做了
什么关注不够。
2、阈限：指在某种文化语境中的公开表演就像社会性戏剧一样，这类戏剧通常是有阈
限的，即标志着从一种状态向另一种状态的转变，或是两个事物之间的边界。EG：生命由一
个阶段到另一个阶段。
3、社会性戏剧通常遵循某种程序，社会性戏剧的四阶段：一是破裂：对群体秩序的某
种破坏或威胁；二是危机：群内的成员针对破裂分成不同的派别；三是纠正或补偿的过程：
群体成员开始表演，试图修补破裂之处。（考察的主要方面）。四是重为一体：即回到和平
状态中。（体育比赛是典型例子）
4、表演性的人种志研究的重要意义在于，它突破了该领域只注重文本和语言的传统界
限，把它扩展到了表现性的范围。对传播学研究来说，传播行为本身可以被理解为表演。
三、组织文化
1、概念：即把组织当做文化来研究，某个组织对于其成员来说是一种生活方式。它创
造出一种共享的现实，把它与其他文化区分开来。组织文化是在成员的互动过程中被创制出
来的。
2、表演就是那些群体成员实施的，向自己和别人揭示其文化意义的行为。
3、传播表演行为的四个基本特征
一它们是互动的，更多的情况是对话，它们是社会性行为，组织性表现是由其成员共同
参与完成的；
二表演是语境化的，不能被视为独立的行为，而就被嵌入更大的行为框架；
三表演都是一个完整的片段，是一个有始有终的事件，表演者可以把它们与其他片段区
分开来；
四表演是即兴创作的。
4、组织传播中的几种表演行为
一是仪式：定期重复进行的、为群体成员所熟悉的常规性程序（例如每周的例会）；
（1）个人仪式
（2）任务仪式：帮助群体成员完成其工作的重复出现的行为：交警检察驾照
（3）社会仪式：组织内十分重要的表演行为，与任务无关，下班后的集体泡吧
（4）组织仪式：全体成员定期参与的常规活动：年度野餐会
二是激情：群体成员通过表演的方式把原本枯燥无味的常规行为变得有趣、充满激情。
最常用的方式就是讲故事。
三是交际活动：充分利用组织内部的社会性规则，加强群体成员对礼仪的认识。客套和
打趣
四是组织政治：这类活动创造并加强了权力影响力
五是适应文化环境：向组织内部的成员“传授”文化的过程。
四、阐释性的媒介研究
1、概念：把受众视为不同的阐释群体，其中每个群体所看到的、听到的和读到的东西
都有自己的读解。不同的阐释群体给媒介赋予了不同的意义。
2、（1）阐释性群体（费什）：是围绕着特定的媒介和内容组织起来的，其成员所看见
的，所听见的和所读到的内容有共同的理解，同时也具有相同的效果。
（2）电视观众是由不同文化背景的观众群组成的，如果想研究电视对观众的影响，首
先要理解这些观众群所处的不同文化背景。
（3）因为媒介使用的结果取决于受众群的文化构建，所以媒介研究需要进行文化阐释，
即大众传播的人种志研究。
3、样式：通过阐释群体的内部活动阐释的媒介效果的整体类型
4、阐释群体的三个不同层面：一是内容：由群体所观看的不同类型的节目和媒介组成。
（对同一类型的节目不同的人也可能有不同的看法）二是读解的样式：围绕共享意义而构成
的，群体中的成员以相似的方式来理解节目的内容或是其他媒介。三是社会性行为的样式：
即群体成员对所讨论的媒介共同采取的行动。
第十一章 批判理论
批判性社会科学的三种共同本质性特征：
1. 批判取向认为有必要结合不同语境理解人们真实的生活体验（与阐释理论相同，差异在
其聚焦于社会压制问题）
2. 批判取向考察了社会状况，揭示了压制性的权力分配。（结构主义）
3. 批判取向有意识地将理论和行动结合起来。
第一节 梳理批判理论
一、四种“话语位置”（Dennis Mumby）
1、有关再现的话语（discourseofrepresentation）：关于实证性的现代主义，严格
区分观察者和世界，人们可以感知身体以外的现实，并能够用语言来再现这种现实。eg符
号学、信息生产和接收理论；
2、有关理解的话语（discourse of understanding）：关于阐释性的现代主义，观察
者和被观察者的界限不够清晰，现实是通过研究者和被研究者之间的互动来定义的。观察者
构建观察的方式影响了他所观察到的事物。eg符号互动主义、社会构建、阐释和文化理论；
3、有并怀疑的话语（discourseofsuspicion）：批判性的现代主义——结构性传统。
它所批判的是有关人类感知之外永恒存在的、想象性的社会排列结构。
4、有并脆弱性的话语（discourse of vulnerability）：后现代主义——后结构的。
否认任何真正的、持久性的社会排列的存在。
二、区别
批判性现代主义：是以压制性的社会结构为中心的，试图揭示这些压制性的社会结构并
为之命名。
后现代：根本不存在客观、真实的结构或者中心意义，压制性的结构都是短暂的。虽
然斗争是存在的，但并不是在各个单一的意识形态之间进行的，而是在不断变动的利益和主
动之间进行的。
由于马克思主义作为一种现代理论偶高度的结构性和理论性，后现代理论家有时坚决
不承认自己是“马克思主义者”。将现代主义和后现代主义取向都视为批判性的，是基于它
们对传统的社会科学持有共同的反对立场。
第二节 结构取向
一、马克思主义基础
1、马义最基本的主张是：经济基础和上层建筑之间的关系，经济是所有社会结构的基
础。社会生产方式决定了社会的本质。工人阶级受到那些从利润中受益的强势群体的压制，
这种经济体系导致了资本主义社会中维持宰制关系的各种社会结构的产生。只有当工人阶级
起来反抗统治集团，才能改变生产关系，从而实现工人阶级的解放。
与早期马义的简单经济基础—上层建筑相比，大多数当代批判理论把社会过程看作是多
重决定的，它们把社会结构看作是一个许多因素彼此互动、互相影响的系统。
2、马义十分重视社会中的传播方式。传播实践是个人创造力与社会限制力之间的紧张
关系的结果。只有当个人获得真正意义上的自由，能够清晰地、有理性地表达自己的时候，
才会实现个人的解放。另一方面，批判理论相信矛盾、紧张关系和冲突是社会秩序不可避免
的方面。社会环境最理想的状态就是所有声音都可以听见，没有哪一种势力可以宰制其他的
力量。
语言是限制个人表达的最主要力量，工人阶级很难用统治阶级的语言来理解他们的生存
状况，更谈不上摆脱这种状态了。换言之，统阶的语言界定了对边缘弱势群体的压制，并使
之存在下去。批判理论就是要创制新的语言形式，从而揭示占统治地位的意识形态，让人们
有机会了解其他与之竞争的意识形态。
3、意识形态：
经典马义：是统治阶级中的政治势力长期维护的一系列虚假意识。主张用科学来发现真
理，从而战胜意识形态的虚假意识。
阿尔杜塞：意识形态存在于社会结构中，产生于社会机构所从事的实践行为当中。上层
建筑创造了意识形态，后者又影响到个人对现实的认识。
上层建筑：压制性的国家机器：军队、警察
意识形态的国家机器：教育、宗教、大众传媒
4、霸权：就是宰制的过程。从本质上说，如果对事件或文本的读解促使某个群体的利
益凌驾于其他群体之上，我们就可以说产生了霸权。这个过程十分微妙——把居于从属地位
的阶级利益进行同化，使其支持统阶的利益。（葛兰西）
5、组织内部的霸权理论（莫姆比）：某一组织内部的权力是通过一种意识形态对其它
意识形态的宰制而建立起来的。组织内部的传播不仅起到创造组织文化的作用，而且创造了
权力和宰制。
与其说，霸权是一个有关主动的，强而有力的群体如何宰制被动的，力量相对薄弱的群
体的问题，不如说是一个权力安排的过程。这一过程是多个群体主动参与社会构建的过程，
霸权是一个必然出现的结果——既不是好的，也不是坏的——它是日常生活各个利益群体斗
争的结果。
二、法兰克福派和普遍语用学
1、法兰克福学派（书P250第一段）
2、哈贝马斯指出，对社会的理解必须结合三种主要利益：工作、互动和权力。
工作：包括了创造各种物质资源的努力。具有鲜明的工具性本质；是一种技术性利益；
实证-分析。
互动：使用语言或其他种类的传播符号系统；实践性；实践性利益；历史学和阐释学。
权力：社会秩序自然而然导致权力分配，但人们仍期望能把自己从宰制中解放出来。
权力导致的是被扭曲的传播，但是，如果在社群成员意识到意识形态对社会的宰制作用，那
么就会努力改造社会。所以权力就成为一种“解放性利益”。（批判理论是具有解放性的，
因为它们给弱势群体赋予了权力）；自我反思性，解放性利益。
如果只考虑某一方面的利益，人类生活却无法正常运转，实际上，每一种行为都涵盖
了这三种利益。
3、普遍语用学：研究语言的普遍性规则。概括了三种言语行为：
断言（constatives）或坚持某种意见。
规范语（regulative）：对个人或群体之间的关系施加影响——如命令、许诺等。
宣称语（avowal）：表达说话人的内在情绪，从而强化说话人的自我表达。
言语行为的种类决定了你的陈述应该达到的合理性的程度。使用断言来阐明观点的真
实性；使用规范语来达到言语得体的标准；使用宣称语必须做到发自内心和真实坦诚。
哈用“话语”来描述说话人在遇到挑战时所必须采取的特殊的传播形式，指的是系统
化的辩论过程，其中说话人可以做出特殊形式的申诉来阐明其主张的合理性。
理论性话语用来为真理作辩护，强调证据。
实践性话语是有关的得体性的争论，强调模式
元理论话语是关于知识的正确构成的哲学争论。
理想化的言语状况（解放性传播）：言论自由；每人有同等发言机会；社会模式和义务不是
单面的，有助于权力在社会各阶层平等分配。
生活世界的殖民化：系统权力凌驾于个人之上。
第三节 后结构主义传统
一、文化研究
1、文化研究关注的文化是如何通过不同意识形态之间的斗争而产生的。
文化研究的中心论题是“大众传播”，这是由于媒体被视为传播统治阶级意识形态的有
力工具，除此之外，媒体的另一潜在功能是提高大众对有关阶级、权力和宰制的事物的意识。
2、文化研究中的文化，一是指群体或社会所依赖的共同思想、意识形态以及某个群体
理解其体验的集体方式，二是指某个群体的实践行为和生活方式。（即思想/行为）
这两种对文化的不同理解不能被截然分开，这是因为某个群体的意识形态是通过其实践
行为生产和复制出来的。
3、我们共享着有关事物的一些常识，这种共同理解就形成了一种意识形态。它是由各
种各样的影响所决定的，这些影响汇聚到一起，让我们相信那些共享的体验是真实的。
在文化研究中，这种运用多种来源强化我们对现实的认识的过程被称为连为一体
（articulation）。社会中的多种势力通常是多重决定的，没有一种情况导致另一种结果的
必然条件。eg对高等教育的优越性的认可，是连为一体的产物。
正是由于连为一体的作用，社会中现存的各种意识形态并不是处于同等的地位上，对工
人阶级来说，统阶的意识形态没有代表他们的利益，所以是虚假的。
5、霸权是一种流动的过程，各种彼此矛盾的意识形态之间的斗争总是处于不断的变动
中。社会中的各种势力通常是多重决定的，即由多种来源引起的，没有一种情况导致另一种
情况的必然结果。意识形态也是如此，多种意识形态并存，同处于动态的紧张关系中。
6、文化研究的主要目的是揭示强势群体是如何以难以察觉的方式来维持其意识形态的，
而那些被剥夺了权力的群体又是如何抵抗主流意识形态，从而颠覆整个权力体系的。Eg格
罗斯堡的摇滚乐研究
二、米歇尔·福柯（著述联结了批判传统中的结构主义和后结构主义。）
1、每一个时代都有鲜明的世界观或概念结构，后两者决定了那个时代知识的本质。福
柯把特定时代的知识特征称为哲学认识（episteme）或话语组成（discourseformation）。
每个时代的视点都是独一无二的，这就使得一个时代的人不可能用另一时代的观点来进
行观察和思考。所以哲学认识是取决于那个时代占统治地位的话语结构。
2、话语结构是一系列内在的法则。（它们决定了话语实践的形式和内容），这不仅仅
是指的是那些有关如何说话的规则，而且还包括那些决定了我们的知识、权力和伦理道德的
本质的规则。
3、我们不用为创造话语状况而负责，相反，话语决定了人们在世界体系中的位置。
4、当今时代，我们相信人类可以获得知识、拥有权力。这一观念是由当今占统治地位
的话语组成方式所创造出来的。而在历史上其他阶段，对知识和权力有着完全不同的看法，
这也是从当时所使用的话语中产生的。eg刑罚制度
（话语决定权力和知识）
5、福柯对话语的分析旨在揭示其规则和结构，他称之为考古学，是通过细致的描述来
发现话语的内在规律。展示的是差异和矛盾。
6、文本分析无法回避阐释（对文本意义的构建），但其作用应当被减小。因为阐释不
仅不能揭示反而模糊了话语结构。
第三节 女性主义研究
1、基本假设：性别是一个有关体验的无所不在的范畴，也是一种社会构建。它受到男
性偏见的宰制，尤其是对女性进行压制。
学术研究和理论构建与生活中的方方面面一样，受到了性别偏见的宰制。女性主义立场
理论：把女性作为不准“发声”的群体，聚集于她们对社会的体验。从总体上看，这一取向
认为，女性的体验导致她们产生了某种独特的理解，这类体验使她们具有男性所不具有的优
势和能力，看到男性看不到的东西。
2、自由女性主义：基于自由民主观念：即社会公正是要确保每个人的平等权利。妇女
做为一个群体受到了压制，她们没有享受到与男性一样的权利。自由女性主义要处理的是有
关女性的公众形象和权利问题。要求女性拥有男性已经拥有的权利。
3、激进女性主义：相信对女性的压制要比公共权利层面深入的多。问题不应停留在平
等权利的方面，而是应当深入到我们的社会结构的核心——父权制度，所以要求对社会的所
有方面进行根本性的重新定义。认为女性问题的最终答案是对人类体验进行全面的重新定义
和对世界的重新构建。女性获得与男性同等的社会地位，不过是把父权制度延续下去，而应
当对经济和商业体系——乃至整个社会——进行重视定义，从而保证女性和儿童的福利不再
受到侵害。
4、女性主义对传播学研究构成的挑战
第一种挑战（自由主义）：包容阶段：试图为女性所做的贡献得到更多的社会认可。
第二种挑战（激进主义）：修正阶段：挑战的是当今社会对传播的定义。
一、语言和权力
1、语言是人类社会和所有人类体验的中心，我们的文化和语言预示了我们的体验，所
以语言会成为压制性工具。人们从本质上接受语言，就意味着接受了其所包含的真理的范畴。
2、语言本身是父权制度的产物，在语言所创造的世界里，女性的声音受到极度的压制。
3、被噤声群体（muted group）的理论：由于人种志研究者偏重于对某一文化的男性
进行考察，因此，倾向于用男性语言来归纳某一文化特征。每一种文化中实际运用的语言都
具有内在的男性偏见——即男性为群体创造意义，而女性的声音被压制了，或者说被噤声了。
这种噤声导致了女性无法用男性的语言来流利而充分地表达自己。
4、女性表达自己要比男性困难得多，她们之所以无法用语言来表达其共同的体验，是
总感到缺少“那么一个词”，显然，是由于男性缺乏那样的体验，而没有创造出“那么一个
词”。
5、女性具有自身的表达形式。eg书信、日记等来表达一些独立于占统治地位的男性话
语体系之外的东西。
同时，在传播过程中，更加依赖于非语言表达，比男性更加频繁地使用各种非语言形式。
eg面部表情、手势。
6、女性只有创造出让自己觉得舒适和友善的传播形式，才能主宰自己所处的世界。如
何掌握语言的控制权，从父权的宰制下解放出来，提出了三种方法（克莱玛特）
一是我们应当对语言宰制形式进行分析，从而更好地理解。
二是应当对女性传播进行研究，更多地了解那些非主流的另类传播方式，更应当创造和
使用新的传播方式。eg创造新词，重新定义词汇。
三是采取新的交流和互动方式，打破男性宰制的循环圈，获得传播的主动权。EG：在谈
话中，对女性参与者给予更多的关注，更主动地回应她们。
二、邀请式修辞
1、邀请式修辞：（1）是从说服或影响转换到邀请的修辞学上的转向。以说服为主的传
统修辞学是基于父权制的世界观。它所投射的是变革、竞争和宰制等男性中心的价值观。而
提出了一种基于平等、内在价值和自决能力的女性主义价值观的修辞理论。
（2）邀请式的传播者所采取的不是改变他人的立场，而是邀请别人进入自己的世界，
从而获得别人的理解。
（3）这种传播形式是通过提供视角来实现的。在提供视角的过程中，传播者并不认为
自己的立场是高人一等的，而是把它做为一种观察方式来开头的。
2、重新溯源：是一种提供视角的方式，基本思想是不要关注当时条件下权力的来源，
而是重新寻找一个新的来源，使传播者可以摆脱冲突，去构建新的、创造性的视角。
如果你提供的视角被对方所接受，就可以成为谈话的起点，这时，传播者应该创造三个
外部条件
一是安全——让对方感到有保障，传播者应该表现出一种开放的姿态，愿意探讨各种不
同意见；
二是价值——尊重对方，让对方感动自己的意见受到重视；
三是自由——创造出一种自由的氛围，让另人享有充分自主的选择权。（吉尔哈特）
3、吉认为，所有说服或影响对方的尝试都是一种暴力形式，因数这些尝试旨在破坏或
改变别人的观念。改变本身不是问题，我们能够也应当改变，但是以高人一等的姿态去实施
强制性改变，实际上践踏了他人的价值，所以，我们不应当去改变他人，而应当努力去包容
别人。
4、包容的六个组成元素：认可、寻找共同的立场、视角的共享、让步的意愿、见证、
提出共享要求。
第十二章 人际关系中的传播
第一节 人际关系的本质
一、关系是系统的重要组成部分，两个人之间的交流行为定义了他们之间的关系。关系
是通过交流和互动建立起来的。
二、人际关系传播的五条基本原理
1、一个人没法不传播——不管我们是否愿意，我们总是在影响着别人的感知。
这条原理强调了任何一种可以感知到的行为都具有潜在的传播性。它意味着如果有另一
个人在场，你就会跟他进行交流，从而建立起某种关系。即便你不愿意与他建立任何关系，
你也会传播不愿与他建立交流关系的信息。
2、任何一次谈话都包含了两个信息：内容信息和关系信息
在传播信息的同时，每个人都在更高层面上评论着对方传播的信息。这一同时进行的关
系传播（通常是非言语的）被称为超传播。
关系传播的四个基本的独立的层面：一是情感唤起、控制和礼仪；二是亲密和相似；
三是直接性（喜爱或吸引）；四是宰制——顺从。
超传播中四种行为：接近、微笑、触摸、目光的交接。
3、交流者总是能够把互动行为组织成为有意义的模式。
这一原理被称为句读法：互动行为的系列就好像句子一样，不能分割开来一个个去理解，
要理解它们必须进行排序，就好象给句子加上标点符号一样。
一个互动行为由一连串的言语和非言语行为所组成。传播过程中，某些行为排列组合为
更高一级单位，这有助于我们从整体上把握这些行为的意义。但这一排列组合的过程很大程
度上与个人感知有关，不同的参与者可能用不同的方式来对同一互动行为进行“句读”。
eg进攻—撤退/忽视—恳求。
4、人们同时使用数字式和类比式符码。
数字式符码：具有随意性，其符号和指涉物虽然有一定关联，但它们之间并不存在内在
固有的关系。两者之间的关系完全是人为制定的。此外，数字式符码是彼此分离的，处于
“开”和“关”的状态，要么说，要么不说出来，不能只说一部分。最常见的数字符码是语
言。
类比式符码：与实际生活中的事物十分相像，比如手势；也可以是被表义的事物或者状
况的一部分，比如哭泣。此外，类比式符码是连续不断的，它们具有一定程度的持续性和强
度，不仅仅处于“开”和“关”的状态。大多数非语言符码都是类比式的。
两者虽然互不相同，但在传播过程中被共同使用。eg一个数字式词语可以用不同的类
比方式表达出来（大声的、轻柔的、高声的等）一系列互动行为的流程是数字工符码和类比
式符码的混合体。在交流中各自起到了不同的作用。数字式符码有较为准确的意义，传播的
是内容层面的东西，类比式具有较为丰富的情感和内涵，是传播关系信息的工具。当人们用
数字式符码传播内容的时候，他们同时在用类比式符码评述与他人的关系。
5、在互动过程中信息的组织和匹配问题。交流各方的回应可能是彼此相似的，也可能
是互不相同的。当处于特定关系中的交流双方实施相似的行为，而尽量减小彼此的差异，这
种关系是对称的。当双方差异被放大，存在的是互补关系。
三、人际关系的辩证法
（一）用辩证法的思维来看待关系
1、辩证关系的四个层面：（辩证关系：是系统内两个或两个以上的矛盾性因素之间的
辩证关系；辩证的分析：是系统内两个或两个以上的矛盾性因素之间的紧张关系。）
（1）矛盾：
势力股或矛盾结：矛盾是对立面之间的紧张关系，这些对立面不是简单的二元对立形式，
而是一个不同势力进行“拔河”式较量的复杂过程。某些宰制性势力与那些抵消性势力相抗
衡，宰制势力把系统向中心聚合，形成向心力，而抵消性势力使系统偏离中心，形成离心力。
每个势力股中都包括关系中可能出现的各种相关矛盾：聚合——分离；表达——不表
达；稳定——变化。
（2）变化
对矛盾的管理是导致关系发展的最重要的动力。
关系发展中的变化的五种特征：强度：感受和行为的力量；显著性：对过去、现在和
将来的关注；持久性：模式持续时间的长短；顺序：关系当中相关事件的排序；步伐/节奏：
关系当中事件的迅速性和事件之间的间歇。
在特定的时间内，关系是以上述变量的结合为特征的。追踪关系的发展过程意味着观察
事件的轮廓如何随着时间的变化而变化。
三种看待变化的方式：运用线性视角；运用循环式；螺旋式的视点。
（3）实践：关系不是由人们通过认知方式在头脑中思考出来的，而是在交流和传播过
程中“制造”出来的。
（4）整体性：指完整不可分割的状态。
2、许多关系辩证法的研究旨在发现交流双方是如何处理他们之间的紧张关系的。四种
矛盾的辩证管理模式：一是对矛盾重新定义；二是平衡；三是随机选择（即在某种情况下采
取一种选择而在另一种情况下采取另一种行动）；四是循环式更替。（EG：你想做的和对方
想做的不一致）
（二）友谊辩证法
1、语境辩证关系：探讨的是友谊在社会中的位置。第一重矛盾存在于公共领域和私人
领域；第二重是理想与现实间的矛盾。
2、互动辩证关系：即个人友谊中的多义性和复杂性心理。
自由既是独立的也是相互依赖的；情感和工具性的辩证关系；判断和接受的辩证关系；
表达和保护的辩证关系。
第二节 人际关系管理
一、不确定性削减理论URT
1、该理论关注两方面内容——自我意识和对他人的了解。
（1）自我意识分客观性自我意识和主观性自我意识；
在客观性自我意识中，人们关注的是自我，而非环境中的其他事物。eg发言时，意识
到观众在看着你，你成为一个客体；
在主观性自我意识中，把自我放在边缘的位置上，使之融入由不同时点的体验构成的
“体验流”中。eg在与好朋友进行谈话，表现放松而自然，此时自我意识具有主观性。
自我意识会因时而异，但客观性的更为常见。每一个个人还会有一个持久的自我意识模
式，持久性的客观性自我意识被称为自知之明，这种特征表现为一种自我控制的倾向。
（2）我们还有另一种需求：通过人际传播来获取对别人的了解，这是URT关注的焦点。
我们在碰到一个陌生人的时候，会产生一种削减不确定性的强烈愿望——通过获取此人的更
多信息来增加对他的了解。
2、在交流中，我们制定了如何实现目标的规划，这一规划的形成以我们自身的目标为
基础，同时，也要以在交流中获取的有关对方的信息为基础。
3、吸引力和归属感是削减不确定性的积极因素。随着交流双方逐渐发现他们具有越来
越多的相似之处，彼此之间的吸引力在不断增加，而彼此之间获取更多信息的需求则随之降
低。
4、伯克认为，不确定性是关系发展过程中一个极重要的因素。
5、获取别人信息的策略
被动性策略：与观察有关。 一是寻找反映：二是寻找解除禁忌；
主动性策略：观察者采取一些行动来获取信息：如向别人打听观察对象的情况
互动性策略：直接依赖与对方进行交流来获取信息。
二、焦虑情绪——不确定性管理理论（AUM）
1、扩展了不确定性理论，把不确定性和焦虑放在跨文化的背景下进行观照。
2、几乎所有的文化都是在关系的初级阶段进行削减不确定性的工作，但是他们采取的
方式各不相同。
高语境文化：依赖于总体的情况来对事件进行阐释。eg非语言的提示信息和个人背景
信息；
低语境文化：依赖于信息当中明确的言语内容。eg直截了当地提出有关体验、态度的
问题。
3、来自不能文化背景的交流者削减不确定性的过程也要受到其他因素的影响。
eg是否对所属的文化群体表现出强烈的认同，是，焦虑和不确定上升；
是否相信交流将产生积极的成果，是，焦虑和不确定下降
4、跨文化背景下的不确定性和焦虑情绪是出现无效交流和缺乏适应性的潜在原因。
了解少，焦虑感增加，交流效果下降，这就使得对不确定性和焦虑情绪的削减十分重
要。
5、每个人产生不确定性和焦虑的门槛是不同的。
不确定性和焦虑过高或过低，都会避免或不发生交流，所以群体间交流的理想善是不
确定性和焦虑处于“门槛”的上限与下限之间，这就会产生交流。
三、面子的管理（06年论述，20分，面子在人们的日常交往中，有很重要的影响，面
子也是一种文化，试用传播的角度分析面子问题及其影响。）
1、所谓面子是指在他人在场的情况下，一个人的自我形象，包括有关尊敬、荣誉、地
位、联系、忠心和其他类似价值的感受。换言之，面子意味着一个人在自己文化许可范围内
以任何方式所获得的良好的自我感觉。
面子工作，是指人们用来构建和保护自己面子以及用来保护、构建或者威胁别人面子的
交流行为。
2、在进行面子工作时，会包含好几个因素
面子工作的轨迹——面子的工作是指向自己还是指向他人
面子的价位—一个人的行为是积极的还是消极的，是在保护、维护或尊重面子，还是攻
击、毁坏面子
时间性——即交流行为是为了防止今后的面子遭到破坏，还是为了恢复已遭到破坏的面
子。
3、无论是哪种文化都有办法来完成预防性和修复性的面子工作。
预防性面子工作：指那些用来保护个人或群体面子不受威胁的交流行为。
修复性面子工作：指在丢面子以后，用来重新构建面子的交流行为。
4、影响面子文化因素主要有两个：
（1）个人主义——集体主义：许多文化把个人放在集体和社群之上，宣扬个人的责任、
自治力和个人成就，是个人主义的文化。有些文化则是把集体或社群放在个人之上，重要的
是人与人的联系，是集体文化。
（2）权力距离：许多文化中都存在着很严格的等级制，有强烈的地位观念。社会中某
些成员或者群体发挥着较大的影响，控制着其他成员和群体。而另一些文化中，个人和群体
之间并不存在多大的距离。
5、因为荣誉在不同的文化中有不同的意义，因此，面子工作因文化的不同而大相径
庭。
6、在发生冲突的情况下，面子成为一个重要问题。
（1）当你与别人发生冲突的情况下，尊严和荣誉往往会受到伤害，往往会对面子产
生威胁。所以，面子工作是冲突传播中一个常规的组成部分。此时，面子工作通常是消极的，
主要形式是对别人进行攻击。有时也可以利用积极性的面子工作来共同面对冲突，达到自己
目的的同时也帮助别人活得良好自我感觉。由于文化的差异，人们在冲突中往往表现出不同
的风格。eg个人主义的人会更多地进行直接的个人攻击，或直接表示尊敬，维护面子；而
集体主义者在冲突中较少进行个人攻击，表现得更为含蓄，他们回避矛盾，转而讨论一些次
要的事情，花更多时间逐渐进入正题。个人主义——直接面对问题；集体主义——关注的是
巩固关系。
（2）再考虑到权力距离的因素，面子工作和冲突管理就更复杂了。低权力文化——
咨询和参与，解决矛盾；高权力文化——决定由社会地位较高的人做出，较低的人接收。所
以，低：人们的交流更为直接，更为个人化；高：极高社会地位的人往往采取间接的交流方
式，避免威胁地位较低的人的面子，低地位的人表现毕恭毕敬，避免突出个人，所以在交流
过程中，使用很多的礼仪，旨在维持权力距离。
7、文化在很大程度上决定面子工作和冲突是如何进行的，但并非惟一因素，必须把
个人差异考虑进去。最主要的个人特征是自我解释，即个人的独立性和与他人的相互依赖性
的认识。
三、边界管理
1、心理学的第三股势力：传播旨在获得对自身和他人的精确理解，这种理解只有在真
实的自我信息透露的情况下才会产生。
（一）社会穿透理论
1、概念：指随着时间的流逝，交流双方会透露出越来越多的有关个人的信息，因此他
们之间的关系也越来越亲密。即社会穿透就是关系当中增进亲密感和信息透露的过程。
2、理论基础：如果关系具有回报性，那么就能维持下去，反之，如果关系的代价过于
高昂，那么就会逐渐冷淡下来。
交流双方不仅会在特定的时点上评估关系的回报和代价，也会利用他们搜集的信息来预
测未来关系的回报和代价。
3、关系发展的四阶段：导向阶段：主要是非个人传播，只会向对方透露一些自己的公
共信息；二是探索性情感交流，最初的信息得以扩展；三是情感交流，当双方都能感到实质
性的回报才会进入这个阶段；四是稳定交流，双方具有十分亲密的关系，可以较准确地预测
出对方的行动。
4、社会穿透理论重要性在于：把关系的发展视这一个传播的过程
5、早期的理论未能很好地理解日常生活中的实际的关系体验，所以修正的理论认为社
会穿透是一个循环往复的过程。
（二）边界管理理论
1、边界：指在思想和感情上愿意与对方分享的和不愿和对方分享的之间的界线，或者
说是私密性的和非私密性的事物之间的界线。关系双方不停的进行边界管理工作，主要是管
理公共领域和私人空间之间的边界。有时，这条边界是具有渗透性的，可以透露一些特定的
信息。有时，边界是无法渗透的，不能共享任何信息。一个封闭性的边界可以带来更大的自
主权和安全感；开放的边界导致更为亲密的关系和更多共享信息。
2、与人分享和保护自己的需求之间冲突是经常性的，这就需要双方商议和协商他们之
间的边界。一方面你何时、如何透露，另一方面，当对方透露了个人信息你当如何应对？
边界管理看作是一个以规则为基础的过程，它体现的不仅仅是个人的决定，说还是不说，
同时，还是一个有关如何管理信息规则的协商过程。人们既要决定何时，以何种方式来透露
信息，又要决定如何回应对方的要求。
3、边界管理的规则是在批评或判断的尺度和风险评估的基础上发展起来的。尺度：包
括特定的文化期望、性别差异、个人动机以及情境要求等；风险评估：意味着考虑透露信息
的回报和代价。
4、边界渗透性：指边界应当开放或者封闭到某种程度。即如何透露信息。
边界规则有些具有一致性、常规性，而有些具有高度可变性。
5、协商有磁信息共享的规则是一个复杂而微妙的过程，分享信息的各方必须协调各自
的行为达到一致。
首先，关系双方必须就有关边界渗透性的规则进行商谈；
其次，关系双方必须就有关边界联系性的规则进行商谈，即谁在边界内，谁在边界外；
第三，关系双方必须就有关边界所有权进行商谈，即做为共同所有者的权利和责任。
（三）家庭内的信息管理
三种类型婚姻关系:传统型、独立型和分离型。
四、冲突的管理
（一）博奕论
1、博奕论中各方对他人使用策略进行评估的三种方式。
一是观察对手的举动；二是观察冲突的总体情况；三是直接交流。
2、直接交流的好处：
一交流是在符码层面上进行的，不会产生实际的行为产生的后果；二交流可以改变招数
的概率，从发生冲突的各方来说，交流减轻了竞争的激烈程度；三交流也会改变对方看问题
的视角，你可以直接劝说对方，最终让他改变原来的想法。
博弈之前进行的讨论能够增进彼此的合作，从冲突发生开始就进行交流，那么才会取得
最佳的效应。
（二）冲突归因理论
1、冲突归因理论的前提：你如何解决冲突取决于你如何归咎责任。
2、在人际关系中解决冲突的三种策略
回避行为：通常不进行交流，最多进行间接的交流；避免减少冲突。
竞争行为：包括很多消极信息；在冲突中获胜。
合作行为：引发更为开放和积极的交流；双赢。
3、归因对于冲突的定义和结果尤为重要，表现在以下三方面：
首先，个人对冲突的归因决定了他将选择何种策略来处理冲突；其次，归因当中的偏见
（冲突是由别人引起的，自己仅是被动地回应）会降低使用整合策略的几率；第三，人们所
选择的策略会影响冲突的结果。
第十三章 群体决策中的传播
第一节 输入—过程—产出模型
一、一个总体性的组织模型（即输入—过程—产出模型）
1、任务障碍：是群体成员在完成分派给他们的工作时碰到的困难。群体成员些直接处
理这些问题，他们会分析所处的具体情境，提出可能的解决方案，并对替代性方案进行评估。
人际障碍：群体决策包含了人际关系因素，因此当两个或更多的人共同处理问题时，就
会出现人际障碍。其中包括向对方阐明你的想法，处理相互之间的冲突，协调彼此的分歧等。
因此任何一个群体讨论的过程中，所有成员都要同时面对任务障碍和人际障碍。
2、集合效应：把任务和人际关系有效地整合起来，由于这种效应，群体的解决方案要
比个人，即使是最好的那个人的方案要好得多。
3、回报：回报既有积极的，又有消极的，积极的回报是成功实现目标。此处积极的回
报还包括冲突的解决和成功的传播。
4、增效（synergy）：群体传播要花费一些精力，有些要花在克服任务障碍上，有些要
用来处理人际障碍，可以用增效来定义群体的努力。在克服人际障碍上花费的精力的总量被
称之为内在性增效；而剩下来完成任务的精力总量被称为效果性增效。
群体中的增效水平取决于其成员对待别人的态度。如果成员之间发生冲突，那么就要花
大量的精力来维持群体团结，就没有多少精力用来完成任务了。相反，如果群体成员具有相
似的态度，那么在人际关系上的投入就很少，效果性增效就会大大提高。
二、功能性的传统
1、群体功能理论把过程视为群体用来进行决策的一种手段，强调的是传播的质量和群
体产出的质量的关系。在决定群体的产出方面，传播能够以各种不同的方式发挥不同的功能，
eg共享信息的手段，是群体成员探索和识别思想上的错误的途径，还是说明的工具。
2、杜威提出解决问题分以下六个步骤：一说出遇到的困难；二定义问题；三分析问题；
四提出解决方案；五比较替代性方案，并按照一整套目标或评判标准来检验它们；六实施最
佳方案。
（一）一个总体性的功能理论
1、旨在发现群体传播中会出现的种种问题和错误，从而找出解决的办法，使传播更为
有效。
2、导致决策失误的因素：
一是对问题做出不恰当评估；
二是不适当的目标或宗旨，群体可能忽略了当前应达到的重要目标，而努力达到的是一
些无关紧要的目标；
三是对积极和消极的物质不恰当评价；
四是群体所依据的是一个不够充分的信息基础：可能是合理的信息被排斥在外，不合
理的被接收；或是搜集的信息过多或过少；
五是群体在信息的基础上做出了错误的推理。
群体会陷入上述这些陷阱，通常是在群体传播的过程中产生，群体受到某些成员的控
制，自觉不自觉地以某种方式误导了群体，在这种情况下，需要有人向群体施加积极的影响，
通过这种手段来抵制误导。
3、蓝迪广川还归纳了影响决策质量的四个方面：一对问题的恰当理解；二对决策目
标和标准的恰当理解；三对替代性方案中的正面特质的恰当评价；四对替代性方案中的负面
特质的恰当评价。
（二）贾尼斯的群体思维理论
1、阐明了为何有时候在群体满意度较高时，会出现低效能的情况。
2、群体思维是群体内部粘合性的直接结果。
粘合性：指群体成员之间彼此感兴趣的程度，即成员之间的高认同度；也反映了群体成
员对通过集体努力实现目标的认可程度，即成员之间不一定要具有相似的态度，但他们之间
相互依赖，依靠对方来实现共同的目标。
3、粘合性是一个积极因素，它能把群体成员聚合到一起，改进群体内部人际关系。但
也有其危险性：一方面有较高粘合性的群体把精力过多地投入到维持群体的团结上来，反而
对决策产生副作用；另一方面，是导致群体思维的出现。
4、群体思维会产生的负面效应：
6种消极的结果：
（1）群体讨论会局限于几种替代性方案，而未能对所有富有创造性的方案进行全面的
考虑。
（2）未能对最初受到大多数成员青睐的立场重新审视，因而也就不能发现其中不太明
显的一些漏洞。
（3）群体无法对最初未获大多数成员青睐的替代性方案进行重新审视。
（4）未能征询专家的意见，容易产生自满情绪，把局外人意见看成是威胁。
（5）群体在关注和搜集相关信息上具有高度的选择性，成员倾向于关注那些支持他们
所青睐的方案的信息。
（6）群体对自己的想法太过自信，因而未考虑对偶发情况做出预案。
8种标志性症侯：
（1） 无懈可击的幻象，导致盲目乐观的情绪。
（2） 群体会共同努力使其所决定的行动方案合理化。
（3） 群体坚持的是对其固有伦理道德的毋庸置疑的信念，
（4） 群体外的领袖人物往往被模式化为邪恶的、软弱的或是愚蠢的。
（5） 群体成员会受到直接的压力以至于不敢表达反对意见。
（6） 对不同意见的自我审查。
（7） 群体成员共享的一致同意的幻象。
（8） 群体内部出现一些自封的“卫道士”，阻止领袖及其成员接触任何反面意见或
者不需要的信息。
5、防止群体性思维的危险的9条措施。
（1）鼓励每个成员都成为具有批判意识的评估者，一有不同意见就表达出来。
（2）不要让群体领袖直接地、正面地表达他们的偏好。
（3）建立几个独立的、彼此分隔的决策群体。
（4）把现有群体再分为若干小组。
（5）与群体外的人讨论所发生的事情。
（6）邀请局外人参与群体讨论，带来新鲜视角。
（7）每次开会时指派某个成员“唱反调”，引发争论。
（8）花一定时间考察种种带有警告性的迹象。
（9）在做出最终决定之前，再次对所有方案进行考虑。
三、互动性传统
群体传播的结果在很大程度上依赖于群体内部的互动本质。群体互动理论具有特别重要
性，这是由于它把传播视为群体生产力的核心 。
（一）互动过程分析
1、贝尔斯对互动行为进行分类，分为十二个范畴，再将之组成四个更高一级的体系，
还可以给这些行为类型进行配对。
2、贝尔斯发现戏剧化（讲故事）是群体缓解紧张情绪的一种方式。（第八章鲍曼等的
符号聚合理论，特别适用于小组传播研究。组员之间的粘合性正是在“想象性主题”这一机
制中逐渐形成的。
3、从总体上看，传播行为可以分为的两大类（与任务功能和人际功能的分类一致）
社会情感行为：积极和消极的行为，eg客套、表明紧张关系和戏剧化等
任务行为：其代表是提出建议、发表意见和提供信息等
4、领导权，在同一个群体中，存在着两种不同类型的领导者。
社会情感领袖：促使成员发表与任务有关的意见，并进行协调，指导成员投入一定精力
来完成任务。
任务领袖：发送群体成员之间的关系。
5、UPF象限（前进的-积极的-上升的）：在某个特定群体内部，任何一个成员行为都
可放在这个三维空间中考察。当全体成员的行为类型在空间图上表示出来后，他们之间的关
系网络也就浮现出来。
（二）费希尔的互动分析
1、互动行为：是一个人的行动之后紧接着另一个人的行动，例如提问-回答、问候-问
候、陈述-陈述，在此，分析的基本单位不是个人行为，而是连续性的行为配对。互动行为
可以按照内容层面和关系层面来进行分类。
2、与贝尔斯的理论的区别
一是贝按功能对特定的互动行为进行分类，分为任务的和社会情感的；费假设所有的行
为都要同时实现这种功能；
二是贝只对单个行为进行分类，而费对某个时段内两个连续的行为进行分类。
3、费希尔的理论被称为“决策浮现理论”：指明了任务群体决策经过的四个阶段：介
绍、冲突、浮现、强化。
介绍：组员之间的彼此熟悉，讲清情况，和开始表达各自的观点。具有高度一致性。
冲突：组员巩固各自的态度导致对立和矛盾，组员进行争论，试图说服对方，也可能结
成临时同盟。
浮现：首次出现合作的迹象，组员不再死守自己的观点，立场，态度都会出现变化，正
面评价会增多，决策浮出水面。
强化：群体的决策会得以巩固，得到组员的肯定。群体统一了意见，支持最终达成的的
解决方案，组员的评价都是正面的和支持的。
4、（1）决策修正：是一个循环的过程，群体会形成几种不同的方案，对它们进行简要
讨论时，其中有些方案会暂时搁置一下，以后再重新引入讨论中，对这些方案的讨论是一阵
一阵来进行的。
（2）讨论以这种不规则的方式的方式来进行，是由于群体工作所具有的高强度特征，
组员只能在很短的时间内做到思想高度集中，因此，有限度的“溜号”行为可以缓解紧张和
冲突。
（3）群体在决策修正过程中，通常会以更具体的语言来重新介绍被搁置的方案。
如果冲突不严重，该群体会以更具体的语言来重新介绍被搁置的方案；如果冲突严重，
小组就不会使该方案具体化，在引入替代性方案时，其抽象程度与原来的方案相同，在讨论
的具体过程中，对逐渐具体化。
第二节 视角的构建
1、建构（第八章）：个人行为导致了意料之外的后果，限制了自己后来的行为。我们
总受到通过建构过程创造出来的社会性结构的限制。
2、群体决定理论：群体决策的过程旨在获得聚合效应即取得一致意见。这一决策过程
实际上也构建了他们的社会体系。
3、行为中的三种元素——阐释、道德、权力——影响了群体工作。（第八章）即如何
理解事物，哪些是该做的，如何做。
外部因素也会影响群体行为，但这些因素只有得到群体的理解和阐释才会产生一定意
义。
我们对待别人的方式反映了我们对他们在群体中所处位置的看法，“群体性”定义会影
响成员之间的互动，并且被一次次复制，从而形成各自在群体中的位置——分别成为任务领
袖、社会情感领袖、信息提供者和冲突管理者。
4、群体决策的运作方式取决于三种因素：
客观性任务特征：指任务的一些标准属性，例如现有问题与预先提出方案之间的相契合
程度，问题的清晰程度，解决它所需要的专业知识，问题产生影响的范围，问题所蕴含的价
值大小和本质，以及解决该问题是一次性的行动还是具有更广泛的政策含义。
群体任务特征:不同群体有不同因素，大体包括以前是否碰过类似问题；如果是，经验
的丰富程度；需要创制一种新的解决方案，还是采取原有的标准化行动路线——两者的对比
度；决策的紧迫程度。
群体结构性特征：包括粘合性、权力分配、冲突的历史和群体的规模，这三种因素共同
起作用，影响群体决策所采用的程序。
5、三种类型路线（按任务和关系取向进行互动过程中出现的种种不同决策路线）：
有的群体遵循统一标准程序；有的遵循复合循环程序（解决问题的循环圈：在定义问题和
设计解决方案之间循环）；有的选择解决问题指向程序。
6、行动轨迹：群体活动或发展所遵循的程序。主要包括：
任务过程轨迹：由那些直接涉及问题或任务本身的行动组成，包括分析问题、设计解决
方案、跑题等；
关系轨迹：包括那些影响群体内部人际关系的行动，如表示不同意见、进行调和等；
焦点轨迹：指的是某一时段内群体所关注的事物或主题。
群体所采取的决策路线是由这三股相互交织的行动轨迹组成。
7、多重程序模式构想：群体随着时间沿着不同轨迹运动。
8、群体讨论存在三类断点：
正常断点：那些预期的，自然而然的中止或转换，如休会、召开核心会议、转换话题；
拖延：导致群体正常动作暂停止的出乎意料的问题；
中断：标志着根本性分歧的出现，也标志着群体传播的失败。
第十四章 传播和组织网络
对组织考察的不同视角的比喻（Gareth Morgan）：
“机器”，组织由许多能够生产产品和提供服务的零件所组成；
“有机体”，组织在特定环境下出生、成长、发挥作用和适应变化，最终死亡；
“大脑”，组织处理信息、运用智力进行概念化和制定计划；
“文化”，组织创造了意义、价值观念和规范，并且依靠共享的故事和仪式来维持；
“政治体系”，组织包含了分配权力、施加影响和做出决策的过程；
“精神监狱”，组织塑造和限制了其成员的生活；
“流体和变形”，组织会在信息、反馈和逻辑势力的基础上调整、变化和成长；
“宰制的工具”，组织内部会出现利益的竞争，某些利益会压倒其他利益占据主导地
位。
第一节 组织网络
1、网络理论的基本主张：组织的结构是由其成员的互动模式所组成的。斯托尔把组织
传播定义为“产生和阐释信息的集体性和互动性过程”。联系性是网络理论最基本的结构性
概念，它指是人际传播存在着相对恒定的路线。处于交流状态的个人联结起来就成为群体，
而群体联结起来成为一个总体性网络。
2、个人网络：组织当中的个人与他人之间存在着某种独特的联系，这就是个人网络。
群体网络：就个人而言，他们倾向于跟组织内部特定的成员进行频繁的交流，这些人
聚在一起，成为联系更为紧密的群体，构成群体网络。
3、网络的特征：规模：即组员的数量；组织间的联系性：实际建立联系与可能建立联
系之比；中心性：某个网络与其他网络的联系程度（在一个去中心化的系统中，每个成员之
间在总体上具有更多的联系）。
4、网络理论将位置传统（组织内的形式结构和角色）、关系传统（组织内成员之间如何发
展关系，关系发展过程中如何形成网络）、文化传统（符码和意义）聚合到一起。
第二节 位置传统
一、古典理论基础：韦伯的理论
组织是为了协调任务而设计的一个有目的的人际活动系统。权力——某个人所具有的影
响他人和克服抵抗的能力——是大多数社会关系的基础。如果权力是“合法的”，或者说是
组织正式授权的，那么组员的服从就是有效而完整的。传播是否能在组织内部得以接受，取
决于领导或上级在多大程度上具备合法权威（legitimate authority）。
2、官僚体制是最有效率的大众管理模式。
（1）官僚体制是以规则为基础的；
（2）官僚体制是以能力范围为基础的；
（3）官僚体制的本质是等级制；
（4）管理者是依据其知识水平和接受的训练来任命的；
（5）官僚体制的成员不能分享组织的所有权；
（6）官僚应当在其影响的范围内自由地进行资源分配；
（7）官僚体制需要精心维护的档案记录。
二、莱克特的四种系统
人际关系流派，主要关注工作者的情感和需求，立足于位置和关系两种传统之上，从生
产和管理的角度考察人际关系。
1、四种系统：剥削性—权威性系统、仁政——威权系统、咨询系统、参与管理系统
2、管理者选择的系统会引发某种结果的出现，系统管理是一个因果变量。最佳方案是
参与管理系统，可调动积极性和责任感。除此以外，某些介入性变量也会对结果产生影响。
3、传播就是一个介入性变量。参与性管理的一大特征就是强大的上下双方传播，效果
准确而明显。
第三节 关系传统
关注如何通过个人之间的互动来完成组织的工作。
一、组织的过程（韦克的组织理论）
1、韦克理论把传播用做人类组织工作的基础，并且阐明了人类是如何进行组织的。理
论特征：组织不是由位置和角色组成的结构，而是传播行为。组织是在互动中产生的。
2、行为：指某个人的陈述或行动
互动行为：指一个行为及其后续的回应。
双重互动行为：一个人的行为紧接着别人的回应，然后再接着第一个人的调整或者其他
后续行为。
组织行为：所有的组织行为都是双重互动行为，这些行为实现的功能是降低从环境中所
接收到的信息的不确定性。
组织的过程就是要处理这些模棱两可的信息。 在此，信息的确切本质并不重要，重要
的是组织成员参与到处理这些信息的过程中。组员的互动旨在获得共同的意义，然后，他们
再把这些共同的意义赋予相关信息——即通过互动获得一定量的共同理解，降低了不确定
性。
3、韦克模式的几个基本要点：
（1）环境：组织者总是被一系列刺激物的混合体所包围，他们必须对这些刺激做出回
应。所以，对环境而言，除了个人赋予它的意义之外，没有其他的意义。所以，环境是个人
的产物，环境最为显著的意义在于个人对外部刺激的某些特定方面的关注。
（2）模棱两可的程度：韦克用“模棱两可”来指不确定性、复杂情况、多义性或缺乏
预测性。所有从外部环境中接收到的信息都是模棱两可的，只是程度不同。组织行为正是为
了降低这种不确定性而设计。
（3）组织是一个不断演化的过程，依赖于以下三个主要过程组织的系列。
界定：对情况的定义，或是记录从外部获得的信息。这是对外刺激的关注，也是承认模
棱两可的存在。不需要关注所有可能出现的问题，只需聚焦于某一特定的问题。实际上，是
缩小关注范围，降低不确定性。
选择：使团队接受信息的某些方面，拒绝另一些方面，这一过程消除了更多初始信息中
模棱两可的方面。
保留：信息中的某些特定方面会被留到以后再用，被保留的信息被整合到现有的体系中，
组织正是在这一体系的基础上动作起来的。问题当中的模棱两可方面被去除，更加清晰。
选择点：在出现保留情况后，组织的成员要面对一个选择点，决定是否再对环境进行界
定、选择、保留的程序。
（4）行为循环圈：是由一系列环环相扣的行为组成的，它使群体在接受和拒绝哪些意
义的问题上达成共识。
（5）集合规则：实际上是一系列评判标准，组织者据此来降低模棱两可的程度，指导
我们采取何种路线来完成组织过程。
二、组织过程中的谈话和文本 （泰勒）
1、理论：也把组织视为一个在互动过程，重点描述了组织是如何在谈话中产生的。组
织的结果取决于谈话和文本的双重过程。在这一过程中，组织成员通过互动共同阐释他们运
用语言创制的文本。
组织是一个在互动和阐释之间相互引发、不断循环的过程。泰勒所说的谈话就是互动，
文本则指谈话的语言产物。
2、双重翻译：两人进行交流时，首先：行为被翻译成特定的意义。说话人所使用的语
言和手势决定了他们所说的话。这是第一重翻译：从文本到谈话，即从说话的方式到实际说
话；同时，你也给行为赋予了一定的意义，你对某种行为的界定，聚集于它与其他行为之间
的联系，然后再决定该行为所代表的意义，这是第二重翻译：从谈话到文本。两重翻译同时
发生。
3、虽然我们在传播方式上享有充分的自由，但是我们在说话的方式上还是多多少少受
制于组织和社会早已建立起来的语言成规模式。对于阐释而言也同样如此，我们可以对文本
进行不同的阐释，但是这些阐释只能在由语言结构和预先建立起来的话语形式所决定的范围
内。
4、共同定向：互动的最终意义不仅是由最初的行为所决定的，而且还是由对这一行为
的回应所决定的。即：两个人确定指向某个共同的对象，传播者共同协商，从而产生对这一
对象的一致的意义。
5、“平地”观念:泰勒把组织比喻为相互关联的瓦片，每一个瓦片就好像是一次互动，
组织就是由一系列相互关联的瓦片组成的。
6、我们对谈话的连续不断的阐释给组织赋予一定的形式和生命力，组织就是在这样共
同对象的三角式互动中产生的，每一次互动都与其他的互动相连，从而构成一张相互交织的
互动网络。正是这张网络使组织成形，并且随着时间的推移维持和改变着组织。
7、如何通过谈话和文本来界定组织特征：通过文本（组织成员说过的话和写下的文字）
代表了组织成员是如何定义组织的。更好的办法是看组织地图。某些个人会承担组织中介人
的角色，用正式或不太正式的文本来阐释组织的某些方面。eg雇员手册、招聘广告等等，
这些阐释就是公司某方面的“地图”
8、组织的表层结构：即成员的日常行为。
深层结构：指那些使组织具备一定特征并且指导其行动的语法或结构安排。这一深层结
构规定了组织中的互动模式、成员义务、责任和期望。属于道德层面，反映了人们对于为人
处事的方式和理解。
在组织的深层结构和实际谈话之间存在着相互递归的关系，深层结构是在人们的相互交
流中产生的，这种深层结构反过来也指导着交流本身。
三、组织中的建构（回忆吉登斯的“建构理论”）
（一）结构
1、结构既是组织传播的表现形式，又是组织传播的产物。组织的形式结构通过雇员手册、
组织图表和政策表现出来，它实际包含了两种类型的传播：一是以间接方式告诉雇员有关组
织的价值观、程序和方法，二是超传播（第十二章）的一种形式——组织通过这种形式直接
探讨其传播模式。
组织结构是在人与人之间的交流中创制出来的。
2、三种建构中心（带有隐喻性的区域）：
（1）构想区域：包括组织生活过程中所有关于决策和选择的片段。这些决策和选择行为对
组织今后所发生的情况起到了限制作用。（eg决定某事）
（2）实施区域：决策和选择的阐释和公布形式。
（3）接受区域：组织的成员按照决策来行动。
（二）气候
1、概念：气候是指对组织进行的总体性和集体性的描述，或者是组织中塑造其成员的期望
和情感以至于最终影响组织的表现的部分。
从建构的角度看，气候是一种由成员的互动连续不断地创造和复制的集体性态度。气候
是建构的产物，它既是一种媒介，也是互动的产物。
2、气候的三层次
（1）概念集合：成员用来定义和描述组织的一系列术语。
（2）核心气候：是一个基本的、高度抽象的、共享的有关组织气氛的概念。
（3）特殊气候：把核心气候翻译成更为具体化的术语，从而对组织中某些特定的部分产生
影响。
三层次以线性的方式联结在一起：概念形成了对组织现状的理解；这些基本理解形成
核心气候；亚群体把这些总体性的原则翻译为具体气候元素；这些元素又反过来影响个人的
思想、情感和行为。
3、气候是在组织成员的实践中产生的，气候也反过来影响和限制了这些实践行为。
组织结构本身、不同的产生气候的手段（新闻简报、培训项目等）、成员特征（所
具备的技术和知识）是影响气候发展的三个互动因素。
四、组织控制和身份认同中的建构
1、四种控制方式：
（1）简单式控制：即公开地、直接地使用权力。
（2）技术式控制：使用机器（发给电脑，并告知在工作中如何使用）。
（3）官僚式控制：即使用组织程序和各种形式的规则（工作手册、备忘录）。
（4）协作式控制：运用人际关系和团队协作的手段。
2、协作式控制既属于位置传统也属于关系传统的范畴。协作管理的前提是管理性质的，在
协作式控制中，施加管制就意味着使行为的“规范化”，管制性控制通过四种方式来实现。
（1）采取含而不露的办法：管理不必明显或有意识地进行，而是组织内部正在进行的日常
生活的一部分，比如正常的工作时间。
（2）管制是在合作中产生的。比如会议，有一定的长度和模式，即规范化状态。
（3）管制也是社会关系的一部分。
（4）最有效的控制方式是构成组织成员行为动机的价值观—即为之奋斗的目标。
3、身份—认同中的二元性：我们的身份，即我们在组织中究竟是谁，在一定的程度上决定
了我们形成的认同；同时，我们的认同塑造了我们的身份，即我们是谁。
第四节 文化传统
1、组织研究中的文化传统强调的是人们如何构建组织性现实。具体说，它考察的是个人是
如何运用故事、仪式、象征和其他类型的活动来产生和复制一系列的理解。
2、组织文化的四块领地：
生态语境：指的是物质世界，包括组织运作所处的时间、地点、历史和社会语境。
区分互动：各种网络。
集体理解：阐释世界的共同方式，是组织文化的“内容”，包括主张、理想、价值观念
和实践。
个人领地：个人的实践或行动。
3、文化传统中两种不同的理论流派：
描述性的阐释学：描述的是传播创造组织的过程以及为组织事件提供有用的阐释的过程；
怀疑的阐释学：采用的是更具批判色彩的取向，把组织作为一个宰制的领域，即传播意
识形态和加强利益霸权的领域。
第十五章 传播和媒介
第一节 一个组织模型
大众传播的两张面孔：一是从媒介的角度来观察广义的社会及其相关机制（宏观），
即媒介/社会的联系，关注媒介如何嵌入社会，以及广义的社会结构和媒介之间是如何相互
影响的；二是从媒介的角度来观察人类——即群体和个人，聚焦于媒介交流中群体和个人的
效应和结果（微观）。
第二节 媒介内容和结构
一、媒介理论（把媒介视为一种传输手段加以研究）
1、伊尼斯和麦克卢汉的媒介理论：
除了媒介所传递的内容，媒介作为一种手段也影响着个人和社会。媒介作为人类思维的
延伸，因此，任何一个历史时期的潮流都体现了当时所用媒介的偏向。即媒介决定了某一历
史时期所发生的事件以及哪些事件具有历史意义的。
2、重媒介：如羊皮、粘土和石头，具有持久性，因此它们可能起到了联结时间的作用。
轻媒介：如纸张，轻便易运输，促进了不同地点之间的传播。
3、感官平衡：人们可以通过获得感觉上的某种比例或平衡来适应他们所处的环境。某一时
代的主要媒介能够带来这种特定的感觉比例，以此来影响人们的知觉。他把每种媒介都看作
是人类感官的延伸，对人类的感觉起到了放大的作用。
4、艾里斯对麦理论的发展：任何一个时代的主导性媒介都会塑造行为和思想。人类的思维
方式、管理信息的方式和人际关系都会随着媒介的变化而变化。
二、让·鲍德里来和媒介符号学
1、理论：符号正逐渐与其所代表的事物分离开来，而媒介推进了这一过程，以至于导致了
这样的状况出现：没有什么东西是真实的。
2、符号演化三阶段
（1）符号等级阶段：符号只是某个事物或者状况的简单再现，符号与其“意指”有着清晰
的联系。
（2）赝品阶段：从文艺复兴到工业革命以前，符号与生活中的事物之间的关系变得不那么
直接了。实际上，符号创造出来的新意义不一定是其所指代的体验中的自然而然的一部分。
（3）生产阶段：工业革命时期，机器被发明出来，取代了人类的位置，使得事物完全独立
于人们对符号的使用之外。
3、仿真时代：符号不再是指代，而是创造了我们的现实状况。仿真决定了我们的身份和行
动，我们的体验不再借助于外部工具来得以再现，符号建立起我们的体验。比如迪斯尼乐园、
网络的仿真。
消费文化也体现了我们生活的仿真世界中的一个方面。
第三节 作为社会机构的媒介
一、马克思主义的媒介理论的五个分支
1、经典马克思主义：媒介被视为统治阶级的工具。
2、政治—经济媒介理论：与经典马义一样，媒体的所有权是其痼疾，主张媒介内容是可以
在市场上出售的商品，传播的信息受到市场所能随的范围的控制，形成了不冒任何风险、趋
于保守的媒介运作体系，使得特定的媒介机构和特定
的节目占据主导地位，而把另类机构和节目边缘化。
3、法兰克福学派：把媒介视为构建文化的一种手段，强调节器的是无形的思想，媒介导致
了社会精英阶层意识形态的宰制。
4、霸权理论：霸权指一种虚假的意识形态或思维方式对真实状况的宰制。占主导地位的意
识形态维持了某些阶级的利益以及它们对其他社群的宰制。
5、文化取向：通常被称之为文化研究。主要依赖符号学理论考察媒介产品的文化意义以及
如何对媒介内容进行立秋，包括宰制性和反对性的阐释。
第四节 媒介和受众
一、大众社会与小型社群的对立
1、大众社会：受众被看作主要由媒体塑造的大规模人群。
2、小型社群：受众是由严格区分的各个群体所构成的，其中，每一个群体都有其自身的价
值观、主张和利益。群体是按照其所共享的意义来对媒介内容加以阐释的，就个人而言，同
一群体其他成员对他们的影响要比媒介大的多。
3、社会行动媒介研究的六个理论前提:
首先，意义不包含在信息中，而是在受众阐释的过程中产生的；第二，媒介信息的意义不是
被动决定的，而是主动“生产”出来的；第三，群体成员以不同的方式来对待媒介，因此，
媒介的意义处于不断的变化当中；第四，节目和信息的意义以集体的方式建立起来的；第五，
群体是通过其成员之间的互动来决定媒介内容的意义的；第六，研究者也加入到他们所研究
的群体中。
二、主动型受众与被动型受众的对立
1、被动型受众：人们很容易受到媒介的直接影响。
2、主动型受众：人们在如何使用媒介方面能够做出更多的主动性的决定。
3、“简约效应”蕴含的“主动型受众”的五个特征：选择性、实用性、意图性、参与性、
不容易被媒体说服。
第五节 文化结果理论
一、大众传播的功能
1、拉斯韦尔的三功能说（略）
二、信息的扩散及其影响
1、二级流动假设
2、意见领袖：从媒介当中接受信息，然后再传给其他成员。
3、信息和革新方案的扩散：信息的经常扩散促进了革新方案的采纳。
4、革新扩散：当新的想法、实践或者事物通过社会系统中传播被逐渐采纳时，就实现了革
新扩散。
三、公众舆论和“沉默螺旋”的效应
1、概念：如果人们觉得自己的观点会得到大家的认可，就会公开发表；反之就会保持沉默。
在这种情况下，就会出现“沉默的螺旋”，这一过程导致的结果是：一派的观点最终会占上
风，而另一派的观点则会销声匿迹。
2、前提：一人们知道哪些观点会受到欢迎，而哪能些不会。这被称为“类统计感觉”。这
由于人们会毫不犹豫地凭经验对公众舆论做出猜测；二人们会按照他们对公众舆论的猜测，
来对观点的表达进行调整。
四、培植分析
1、概念：培植分析所关注的是人们在长期观看电视的过程中积累起来的整体性模式。
2、文化的同质化（主流化）：电视所产生的一个总体性的附带效应。从这个意义上说，电
视不是变革的力量而是维护稳定的力量。
五、议程设置功能
1、概念：就是在公众的头脑里建立起突出的事务或形象。
2、设置分两个层面：一个是建立起了具有重要意义的总体性事务；二是决定了这些事务中
的哪些方面是重要的。
3、议程设置是一个线性的过程，媒介议程——公众议程——政策议程。
第六节 个人结果理论
一、效果研究的传统
魔弹论-有限效果论-强效果论
二、有限效果还是有力效果
1、有限效果：大众传播本身不一定也不足以对受众产生影响，其效果是由其他因素传递的，
因此媒介只是起到了一定的传递作用。
2、强化取向：与“子弹论”相比，强化取向认为大众传播是一个相当复杂的现象，其复杂
性要比人们以前想像的大的多。
三、使用、满足和依附
1、把受众成员设想为有辨别力的的媒介使用者。
2、期望—价值理论：态度是一系列信念和评价所组成的，你会按照自己的态度来调整自身
的行为。从媒介中获得的满足取决于你对该媒介的态度。
3、依附理论：人们要依赖于媒介信息来满足某些需求。决定依附程度的因素：
首先，媒介能够满足人们的需求越多，人们对媒介的的依附程度就越高，
其次，是社交能力。即在社会较为稳定时依附度较低，在战争期间则较高；满足需求的手
段越多，依附度越低，越少，越高。

一、基础理论
1. 健康
区别于传统观念中的是否有疾病的定义，健康不仅指身体健康、没有疾病，还包括精神健康
和社会适应良好，即身体、心理、社会和生活方式等相关因素之间能够相互平衡的一种全面
健康状态。我国在2016年印发实施的《“健康中国2030”规划纲要》，就明确提出要全面
推进健康中国战略，提高人民健康水平。新冠肺炎疫情爆发以来，民众的健康诉求越来越强
烈，各地区及国家都相继出台诸多应对策略，提升全民健康水平。
2.健康传播
健康传播包括与健康相关的所有人类传播活动，主要通过传统媒体、新媒体和其他创新的技
术手段向公众传播健康信息，提高公众对健康议题的认知，从而改变个人观念和行为来预防
疾病、促进健康。 健康传播的目的在于将医疗和健康专业知识与公众及其他健康问题联系
起来，使得相关研究结果能够应用于解决健康问题。 健康传播广泛的应用于疾病预防、治
疗、保健、康复等工作中，包括：医患沟通;做好风险传播和公共沟通；鼓励最佳临床实践
的广泛使用。 健康传播的首要功能在于支持科学转化为实践，并将有关健康问题的信息与
潜在的解决方案联系起来，在个体、社区和社会多个层面发生作用。
3.健康传播学科
健康传播研究最早起源于20世纪70年代的美国，杰克·法夸尔（JackFarquhar）和内森·麦
科比（NathanMaccoby）在美国斯坦福大学开展的“斯坦福心脏病预防计划”通常被视为健
康传播研究的开端。到1984年，第一本健康传播的理论著作《健康传播：理论与实践》出
版，此后该学科相关著作陆续出版，并在诸多学校建立了相关的专业课程及学位。 健康传
播研究本身是一个涉及多理论与实践的跨学科领域，通过传播与健康相关的信息、观点和方
法，影响个人、社区、患者、医疗从业者、政策制定者等多元群体的认知、态度和行为，从
而最终改善社会的总体健康状况。 我国在该学科的发展较晚，且主要来自健康教育学界。
1987年召开的“全国首届健康教育理论学习研讨会”第一次提出了传播学在健康教育中的
运用，并探讨了健康教育与传播的关系。2008年中国健康教育研究所更名为中国健康教育
中心，承担起了全国的健康教育工作，并相继在省、市、区（县）设立各级健康教育机构，
推动了全国健康传播研究的发展。
4.两大研究取向
①后实证主义取向
实证主义源于自然科学研究，认为知识只能通过科学方法考察的、可观察的、可衡量的现象
中获得，研究者且应该保持价值中立。 后实证主义既主张由科学方法指导的实证观察，也
认识到人类及其行为并非自然元素那样的常量。后实证主义聚焦于探讨健康传播环境中各类
传播策略的有效性，涉及的研究主题包括社会支持、医患沟通、健康促进运动与组织以及媒
介系统等。该取向强调对健康传播效果与行为结果的客观量化分析。
②诠释、批判、文化研究取向
诠释、批判和文化研究视角关注健康传播中的身份、权力、意义等问题，侧重以边缘群体为
研究对象或参与者，深入了解人们的生活经验，探讨语言和沟通如何影响健康话语，并致力
于推进健康传播中的社会公平。该研究取向更倾向于以质化研究方法认识、诠释与质疑健康
的意义、决策与实践，同时认为所谓的健康、疾病与医疗保健，皆是通过人类互动与意义构
建而成的信念与现象，会受到社会历史和环境因素的影响。 诠释、批判与文化视角的出现
与刑期打破了后实证主义取向的健康传播研究一统天下的的局面，大大拓展了健康传播研究
的主题、理论视野和方法，并带来了更多学术交流、争鸣与合作的机会。
5.常用研究理论
①健康信念模型
健康信念模型形成于20世纪50年代，由于1953年美国开展的免费肺结核X线筛查未能取
得较好效果，心理学家霍克鲍姆提出了，说服人们接受并采取某种健康行为，不仅需要让其
知道健康威胁的存在，还要树立相应的信念。健康信念模型是一个通过干预人们的知觉、态
度和信念等心理活动，从而改变人们的健康行为的健康教育模型。
健康信念模型的基本理论假设是，如果某人感到某种疾病可以预防，意识到只要自己采
取所推荐的措施就能成功避免感染疾病，并自信自己能够成功执行，其健康行为就会发生改
变，即知识能够带来改变。 影响健康行为的因素有：对健康问题易感性的感知；对健康问
题严重性的感知；对健康行为收益的感知；行动线索；对健康行为障碍的感知；自我效能。
其理论也存在若干局限性，即忽视非理性因素；人际因素；个体间存在的环境差异。健康信
念模型广泛被应用于艾滋病防控、营养改善、高血压筛查、安全带使用、乳腺自检等健康促
进活动，其主要贡献在于强调了知识的重要性、为理解受众的所思所想提供了很有用的框架。
②计划行为理论
计划行为理论是理性行为理论的“升级版”。理论认为人的行为是理性的，是经过深思熟虑
的计划的结果。首先个人行为与行为意向必须加以区分，其次，影响行为意向的因素可分为
三类：行为态度、主观规范、知觉行为控制，此外，计划行为理论还涉及行为态度、主观规
范和知觉行为控制的前因。
该理论受限于两个假设：一是调查者的量表必须反应被调查者的行为意向；二是行为必须在
意志控制之下。但美国心理学家、理性行为理论的创始人之一的伊塞克·艾奇森认为，该理
论仅适用于受意志控制的行为，当行为受到一些因素的影响时，它的预测精度会降低。艾奇
森在1985年在理性行为理论的基础上增加了知觉行为控制变量，初步提出计划行为理论。
1991年，艾奇森发表的计划行为理论和构建的计划行为理论模型标志着计划行为理论的成
熟。计划行为理论也常被用于解释经由各类媒介传播的健康信息如何作用于人的健康行为，
并用以制定更有利于形成良好健康行为的传播策略。
③社会认知理论
20世纪704代末到 80年代中期，美国心理学家阿尔伯特 •斑杜我(AlbertBandura）在其社
会学习理论的基础上提出社会认知理论。社会学习理论强调观察学习的重要性，而社会认知
理论强调的是社会因素（即外部环境，观察学习的来源)对个体行为的影响。
它在批判人类行为的单向决定论和环境决定论的基础上，强调人类的行为是个体与环境交互
作用的产物。个人因素指行为主体的信念、态度、目标、情绪结果期望等，行为因素指个人
的选择和行动，环境因素即行为主体所拥有的外部客观条件，任何一个因素的变化都有可能
导致其他两个因素的改变。其中，构成社会认知理论的重要概念还包括注意、保留、重复、
动机、表现、自我效能。
社会认知理论被广泛用方理解、预测和改变个体及群体的各种健康行为，如性与生殖健康、
妇幼保健、饮食、物质滥用、体育锻炼等。该理论对健康传播的主要贡献在于：针对健康行
为中的保留、重复和动机等元素，社会认知理论有助于理解其机制与影响因素，从而使健康
传播精准、高效地改变健康主体的行为。
④赋权理论
1976年，美国学者巴巴拉·所罗门在其《黑人赋权：受压迫社区中的社会工作》中首次提
出赋权理论。赋权作为一个跨层次的概念体系，从心理学的个体角度看，赋权是“赋能”或
者一种“自我效能”，它源于个体对自主的内在需求。从社会情景的角度看，“赋权”一词
的核心词是power，权力建构于社会关系网络中，是一个社会互动的过程，故赋权理论会有
三个取向。
赋权的对象主要是患者、贫困者、流动工人、残障人、老年人，儿童、女性等相对边缘、弱
势的群体。第二，赋权与传播息息相关。第三，赋权理论更具强烈的实践性，被广泛应用于
社会实践中。
赋权理论提供了新的理念和技术路线，具体可为三个层次指导实践：一是个人层次，即提高
个人权力感和自我效能感，使个体意识到自己有能力去影响或解决问题，二是人际层次，即
鼓励个人与他人合作促成问题的解决，提升个人影响他人能力的具体技术；三是政治层次，
即促成政策层面上的改变。
基于赋权理论的健康传播摒弃了自上而下的单向灌输而更尊重健康行为主体的多元经验，更
注重激发其使用媒介、创造信息的主观能动性，倡导在多方参与、平等对话的情境中促进健
康知识、理念的传播和健康行为的改变。
⑤符号学理论
“符号”(signs）一词源自希腊语 semeion，最早用于医学领域：对医生而言，只要能识别
各类符号，便可了解患者的病情。古希腊医学家希波克拉底所著的《论预后诊断》可视作西
方首部关于符号学的著作。索绪尔认为，符号由能指(signifier）和所(signified） 两种元素构
成，能指是表示具体事物或抽象概念的语言符号，所指则是语言符号所表示的具体事物或抽
象概念，二者之间的关联是约定俗成的，是历史与文化的产物，其意义或价值由社会赋子、
社会群体同意并认定。
如果要进一步考察并确认符号的意义，则需分析该符号与其他符号之间的关系，即通过系谱
轴和毗邻轴来识别，前者指来自一个谱系中的一组符号，后者则是由各个谱系中被选用的符
号所组成的信息。
对健康传播而言，符号学有助于分析各类传播主体如何构建健康信息的意义，并揭示其背后
的意识形态，尤其适用于拆解标识、绘画、海报、照片、电影、电视剧，短视频等视觉媒介，
剖析各类健康主题的虚假信息和错误信息的生产过程和传播过程。
⑥话语理论
“话语”(discourse）这一概念源自语言学研究，20世纪70年代以来，伴随着语言学从研究
语言的抽象符号系统转向语言的实际运用，“话语”及其相关理论逐渐被应用到社会学、心
理学等其他学科，成为语言学社会转向和社会科学语言转向的 “交汇点”。
米歇尔 •福柯 (MichelFoucault)、尚塔尔 •墨菲(ChantalMouffe）等学者认为话语是向构成
各种知识领域的规约及构建知识过程中的权力关系。冈瑟 • 克雷斯 （GuntherKress）对其
定义如下：“机构和社团会用清晰的语言对其特定意义和价值观进行系统化的表述。”我们
的社会中存在着各式各样的话语，当一种话语获得较为普遍的社会同和遵从时，
则被称为主流话语，与之相对的是另类话语，对于不同领域的专业，也都具备各自所属的话
语和话语体系。在健康领域，健康话语是指与健康、疾病和医疗相关的一系列观念和思考模
式，是一个对健康议题赋予意义的过程。健康话语既包括微观层面的日常对话，也包括宏观
层面的社会话语。在对健康话语进行分析时我们可以采用以下途径：非批判性的谈话分析
（CA）、批判性话语分析（CDA）。
一、媒介环境与健康传播
1.表演性媒介
表演性媒介以人的身体为基础，包括声音、表情和体态等“自然的”语言，拥有一对一。一
对多、多对多等传播形式。此类媒介赋予个体极大的表现空间，其传播效果多取决于传播者
对身体语言的开发和运用。整体而言，其优势在于传播者对身外资源的依赖程度低，而劣势
在于传播范围小，多局限在自然时空中视线、声音的可及范围之内。表演性媒介可以将其划
分为几种传播方式：面对面、诗词与歌曲、舞蹈与体操、戏剧与戏曲。
2.再现性媒介
再现性媒介包括书籍、绘画、书法、建筑、室内装潢、园艺等，它们需要借助植物、石块、
木头、金属、墨水、纸张等自然存在或工艺合成材料，经由人的创造力编织成各式各样的文
本（text），再现表演性媒介及其传播内容。相对于前者的转瞬即逝，再现性媒介能够脱离
传播者的身体而存在，从而获得更为持久的生命力和更宽广的传播范围。再现性媒介主要涵
盖书籍、书法与绘画、平面广告。
3.机械性媒介
18世纪60年代的工业革命开启了机器大生产时代，媒介技术在这一浪潮中开始迈进机械化
和电气化时代，为健康传播提供了更快、更广、更强的载体。机械性媒介包括电报、电话、
广播、电视、电影等，是表演性媒介与再现性媒介的载体。相比于再现性媒介，机械媒介多
了更多的可塑造性，在内容上和传播范围上，都有了较多的提升，满足了工业时代到来下，
人们对信息需求的增长。
4.数字性媒介
海量信息、多元形态、极速传输、实时互动。20世纪中后期兴起的数字技术和网络技术开
启了全新的媒介纪元。数字性媒介包括门户网站、社会化媒体、移动媒体以及方兴未艾的大
数据、虚拟现实和人工智能等，可将表演性媒介、再现性媒介与机械性媒介悉数网罗。它们
不仅满足了庞大受众群体的个性需求，更使之跨越时空结成了新锐势力“网民”群体，共同构
建“互联网十医疗健康”社会。
二、医患沟通
1.中国医患关系发展脉络
受政治经济格局与发展水平、医疗文化、媒介技术等因素的影响，医患关系及其相应的沟通
模式处于持续不断的演变之中。在封建时代，由于医疗生态的不完整，患者在医疗过程中担
负着最终责任。一方面，政府缺乏对行医资质的统一管理，中医师只能靠外貌、服饰等维持
其仪式的权威；另一方面，患者存在对医生既依赖又不信任的矛盾心理。清末民初之际，西
医传入中国社会，并逐渐打破了传统中医“登门问诊”时由患者主导的私密空间，而是将其
处于一个大的公共空间。在西医发展中，医生主导的新型医患关系是中国人在追求国家现代
化的过程中实现的，其政治意义显然超越了医术技术范畴。
2.“中国式”医患沟通现状
医患沟通缺位或效果不良。大部分医生在诊断过程中只有告知行为，不到一半的医生知晓在
紧急情况下抢救病危患者的正确告知顺序，84%的医生表示曾与患者因沟通问题发生摩擦，
超过一半的患者认为“医院和患者不够”。边缘群体在医患沟通中的脆弱性尤甚。
而导致沟通问题出现的原因有：医疗体制不完善，就医环境较差;医院追逐利润，资源分配
不均衡;沟通意识不足，权责认识不清;媒体报道不当，激化医患矛盾。
医患沟通问题带来的影响：患者权利受损，就一体验较差;医生职业荣誉感下降，加剧防御
性医疗倾向;医患矛盾激发，医疗秩序受损。
3.医患沟通改善策略
①推动“以患者为中心”的“共同决策”沟通模式
②提高新闻报道及影视创作的专业性
③灵活使用网络媒介技术，提高公众的健康素养
④支持跨界合作，开展政策倡导
三、健康报道
1.健康报道
健康报道（healthreports/news）即对“健康”主题新闻的报道，“医药报道”“卫生报道”
“医疗报道”“医卫报道”“医院报道”等均在此类。健康报道是健康传播极为重要的形式
之一，它所建构的拟态环境型塑着我们对健康的认知、态度和行为。首先作为公众获取健康
信息的主要渠道，健康报道在传播健康知识、改变健康观念方面具有不可替代的作用。其次，
作为社会的守望者和沟通的纽带，健康报道是应对公共卫生危机的关键角色，再次，作为信
息与意见的交换空间，健康报道为健康议题的讨论提供了公共领域。最后，作为健康教育的
生动素材，高质量的健康报道有助于提升从医者的职业素养和公众的健康素养。其中健康报
道的类型按健康主题划分有突发公共卫生事件、传染病、慢性非传染性疾病、精神与心理疾
病、营养与食品卫生、疫苗与接种、妇幼保健、职业卫生与中毒控制、环境卫生、边缘群体、
健康教育与健康促进、医疗行业与制度;按发布媒体划分，可分为行业媒体和非行业媒体两
部分;按新闻体裁划分，分为消息和通讯两大类。
2.健康报道的基本原则
①科学性
科学、公正的健康报道有助于推进全民健康教育、维护社会公序良俗；而失实、偏颇的
报道则可能导致或加深公众对疾病和公共卫生事件的疑虑和误解，使医患关系更为紧张，
甚至引发谣言、恐慌乃至社会动荡。科学性是健康报道的原则和底线，这一点值得反复
强调。
②从本人视角进行报道
健康报道的对象——医生、患者、研究者、健康志愿者等，都享有各项基本权利、具有主观
能动性和独立人格的个体，权利视角理应融会其中。对更具脆弱性的患者而言，媒体应时刻
注意保障其知情权、隐私权、肖像权等权利，避免二次伤害。除了尊重报道对象的各项权利，
健康报道还应积极保障并促进女性、儿童、残障人等相对边缘群体的权利。
③杜绝语言暴力
健康报道是语言暴力密集发生的领域，记者与编辑应予以重点关注。“瞎子”“聋子”等都属于
歧视性用语，应分别改为视障者、听障者等；而称呼精神障碍、心智障碍者为“呆子”“傻子”
等更且侮唇性应予以严禁。
④严禁“医疗广告新闻化”
“医疗广告新闻化”属于“新闻寻租”行为，将导致患者蒙受健康、精力和经济等多方面损
失，使读者对健康报道的关注度下降，让媒体陷入舆论监督职能和公信力双重丧失的恶性循
环，阻碍医疗行业、新闻行业和广告行业的良性发展。
3.健康报道的生产
选题上要做到双管齐下，多去医院、政府卫生部门等医疗体系中走动，在相关场所中发现新
闻线索。通过在旧中取新，打破固定模式，可有效提高新闻价值。同时挖掘冰点，相对于较
为关注的热点主题，一些慢性非传染疾病和职业卫生等问题就更少进入到记者的视野中。需
要积极的策划，捕捉新闻事实，深度思考和原创设计出健康选题，从而激活受众，通过畅通
来函问诊、征文、投稿、评论等渠道，媒体可以收集目标受众所关切的问题，在此基础上丰
富、扩展、深化为成熟的选题，以提升报道的独家性，维持报道内容及机构品牌在受众群中
的热度。
4.新媒体时代的健康报道
在“互联网＋医疗健康”时代，健康报道已开始全新演进。通过新媒介技术，健康报道的信源
及发布渠道不断拓展，与更多医疗服务相结合，和民间话语的关联也愈加紧密。
主流媒体记者常常从微博、微信等新媒体平台寻找报道线索，也会根据网络传播尤其是移动
端传播的特点对报道进行梳理、整合及加工，例如将标题、内容修改得更“接地气”。将传统
媒体上的新闻发布于“两微一端”（微博十微信十客户端），不仅提升了稿件的使用效率，更
能通过社会化媒体良好的交互性实现并加深与受众的“亲密接触”。例如，《钱江晚报》通过
报网互动，采用新的报道方式和多媒体传播手段，盘活版面资源，由封闭式办刊转为开放式
办刊，吸引医生、医学专家和受众的参与，链接线下交流活动，促进媒体、医生、受众三方
多维、立体的有效互动，继而转化为具有独家性和原创性的健康报道。
机遇与挑战总是共存并行，新媒体时代的健康报道虽然有新技术带来的新鲜活力和无限可能，
但在报道的深度和广度方面并未实现质的突破，并衍生出了新的问题。首先，新媒介技术冲
击了健康类媒体的格局，导致新闻从业者流动性增强，以往跑口记者固定、主动联系采访对
象的方式被逐渐打破，媒体与卫生部门的联系变成了“抓差”模式，不利于健康报道的专业化
积累。其次，传统主流媒体的新媒体功能设置多流于形式，健康报道的困境在新媒体中延续。
以“《人民日报》法人微博”的抑郁症报道为例，虽然表现形式更为多样，互动更为频繁，在
语态上更加亲和，但基本内容并无太大差异，缺乏连贯性和持续性的应景式报道依然大量存
在，对抑郁症等议题的报道严谨性不足，配图随意，缺乏对患者内心世界的平等关注，反而
加固了对病症的刻板印象。最后，网络世界众说纷纭、信源难辨，社会化媒体上“伪科普”“营
销号”和软广告泛滥，健康报道须进一步加强区辨、求证和辟谣的力量，坚守科学性原则。
因此，如何进一步运用新兴媒介技术，激活采编人才的能动性，突破制度桎梏，从本质上提
升健康报道的专业性，值得学界、业界与公众持续地研究、探讨与实践。
四、健康素养
1.健康素养内涵
1974年，西蒙兹发表论文《作为社会政策的健康教育》，文中提议各年级学生的“健康素
养”最低标准，是该术语出现的最早记录。20世纪80年代末90年代初，健康素养进一步
从素养/文化程度和科学素养中独立出来，开始为医学与健康教育机构所重视，健康素养理
论与研究方法全面发展起来。健康素养是一个层次丰富的内涵体系。舒尔茨根据对知识运用
的不同情况，将健康素养划分为：1陈述性知识，指获取健康信息或卫生服务的知识;2过程
性知识，指根据具体情况应用现有的健康知识;判断技能，指个体应对新情况时，对健康信
息进行评估、整合、利用以做出决策的能力。中国学者郭欣提出了健康素养的三个维度：对
科学的健康概念的理解、对健康的社会影响的理解、对基本健康知识的掌握。
2.健康素养的两取向三模式
取向一：临床取向
临床取向以美国为代表，多以临床环境中的特定人群为研究对象。该取向认为健康素养主要
是个体获取、识读、理解、处理、运用健康信息和服务并做出正确临床决策的能力。
取向二：公共卫生取向
该取向认为健康素养是更好掌握自身健康和改善健康环境的能力，其内涵远远超过阅读手册、
遵守医嘱等内容，是理念、知识和技能相互融合、个人和社会相互作用的产物，也是健康教
育与健康促进的结果。
三模式：功能性健康素养（注重阅读和写作等在健康系统活动中所需的基本能力）、互动性
健康素养（对认知与读写技巧有更高要求，将信息应用于各种情形的能力与功能性健康素养
的结合体）、批判性健康素养（具有更强大的认知与分析能力，并着力强调个体和社区层面
的赋权）
3.素养的影响因子
健康素养并不是一个孤立的概念，它与社会、经济、文化等因素相互作用，受到来自个体、
社区及医疗系统等多方面的影响。作为健康素养的主体，人的各种特征、经历和身体都有可
能影响健康素养水平，文化程度的影响最大，其次是媒介素养，最后是社会结构性因素。
4.中国健康素养提升策略
①重视城乡居民的媒介偏好和个性需求
我国地域辽阔，人口众多，经济文化发展水平和健康素养状况存在显著差异，需要制定有针
对性的健康传播方案，根据受众的媒介偏好和个性需求选择适当的内容、形式、渠道以及时
间、地点、情境以契合不同受众的特点并提高传播效果。
②发展社区传播，提高公众参与程度
发展社区传播是提高公众参与的良好策略。社区健康传播的场域既包括以血缘、地缘等为中
心的地理社区，也包括以身份、兴趣等为中心的网络社区。个体作为社区的一员，每天会花
大量的时间和精力参与社区活动，健康信息若能植入其中，则能伴随着日常生活中的主体经
验分享和同伴教育逐渐浸润式地、终身性地融入受众的知识结构，并自然地转化成行为。同
时，社区也为集体生产“接地气”的健康传播文本、理性发出集体声音并进行政策倡导、提
升批判性健康素养，提供了肥沃的土壤。
③立足本土文化，活用且慎用影视作品
帕克和加兹马拉里安强调，最缺乏健康资源的人往往最难理解官方开展健康教育时传递的信
息，但他们倾向于使用其他渠道，如亲友交流、听收音机、看记录片或肥皂剧等方式获取健
康信息。对于根植于当地文化形态的表演性和再现性媒介，只要能获得受众认可并达到传播
效果的，都是适宜进行健康传播的理想媒介。
④激活意见领袖与社会组织，开展“多级传播”
在健康传播中，意见领袖也起着重要作用，尤其是在资源匮乏和大众媒介难以触及的边、穷
地区。例如，农村居民与乡村医生接触频繁，对其较为信任，若能重点提高基层医务工作者
的健康素养和传播能力，使其对繁杂的健康信息进行有效筛选、提炼和转化后，在合适的场
合通过一对一、一对多的面对面沟通传达给本村居民，则可以使之在自然且聚焦的医患传播
中潜移默化地提升健康素养。此外，在以提升某一特定群体的健康素养为目标的健康促进活
动中，还应充分发挥非政府组织、非营利组织等第三部门与行业协会等机构的桥梁作用。
⑤强化“把关”机制，提升内容生产的针对性和专业性
有业界人士认为，我国主流媒体健康传播效果不佳的原因包括未转变健康观念局限于疾病和
生理健康;传播内容受自身利益和营销诉求驱动;对受众认识不足，针对性不强。因此媒体人
应首先提升自身健康素养，对卫生事业的发展方向、公众的健康需求和基本的健康知识有充
分把握，在对健康信息做出正确筛选的基础上进行高质量的内容生产，并开展精准的分众传
播，为提升公众的健康素养营造良好的信息环境。
五、健康政策
1.公共政策
当代社会的显著特征之一是政府管理越来越法制化、规范化，而公共政策是政府实施法制化、
规范化的主要手段之一。财政政策、金融政策、农业政策、产业政策、贸易政策、环境政策、
卫生政策、社会保障政策、民族宗教政策、外交政策、教育政策、科技政策和文化政策都是
我们日常生活中息息相关的公共政策。 截至目前公共政策一次未有明确的定义，国内外学
者也都有自己的界定，如宁骚认为，公共政策是公共权力机关经由政治过程选择和制定的，
解决公共问题、达成公共目标、实现公共利益的方案。
2.健康政策
健康政策又可以称作卫生政策或健康策略。健康政策是国民利益的体现，为了保障或改善人
们的健康状况，各国政府都需要制定自己的健康政策。但与此同时，健康政策不仅具有一般
性，还带有政治倾向性、价值选择性和很强的时效性。著名学者罗杰斯曾将健康政策视为公
共政策或社会政策的一个类型，它对人们的健康产生直接或间接的影响。英国社会政策学者
布莱克默认为，健康政策可分为广义和狭义两部分，狭义上指政府为改善公民的健康状况而
采取的医疗卫生服务政策，广义则是指政府的所有影响卫生和公民健康的活动。
3.政策倡导
政策倡导的概念最初源于西方，中文中“倡导”一词的说法就是来自英文advocacy这一术语。
advocacy从词源上看，最初用于法律领域，advocate一词原本是由拉丁语advocare衍生而
来，意即召唤证人，或律师为当事人的利益而进行辩护的过程。美国在20世纪60年代兴起
的公民权运动使得该词被扩大使用。如今的“倡导”（advocacy）概念不仅可以用于表示对个
体权利的捍卫、为弱势群体的利益发声，同时也包括针对法律实施困境以及社会政治制度的
系列努力与行动等。
在中文语境中，与“倡导”含义更为接近的一个概念是“呼吁”。在现实生活中，世界各国的很
多非营利组织近年来纷纷开始以advocacy（倡导）来定义自己的主要职能，并且在具体使用
中衍生出了不同的理解与定义。在学界里，政策倡导的概念有着不同视角，詹金斯认为其是
指“非营利组织针对一个特定观念的主张和辩护，主要目的为了公共利益，而去影响政府正
式决策所做的努力”。杨廷忠认为其是“针对某项社会关注的问题，向某些个人或组织进行
鼓吹并发起一系列的行动，促使其态度和行为发生改变的过程，是使倡导的主张得以实现的
努力”。
4.健康政策倡导的社会价值
有效的公共政策能够显著提升公民健康水平。科学的健康政策倡导是公民参与社会治理、营
造健康社会环境的重要手段。有效的健康政策倡导能够弥补政府与市场的不足，推动实现社
会公平。
5.倡导策略
直接倡导
①资讯策略
组织和个人运用资讯策略进行政策倡导，就是致力于将相关资讯信息传达给政府部门，并试
图影响决策者的政策制定。用此策略的关键在于倡导者不仅要从自身视角出发，单方面 推
动自己认为重要的议题和信息，更要从对方立场出发，尽量转换到政策制定者的视角去考量
问题。
②代表策略
代表策略的核心思想是通过寻找具有较强影响力的社会或政治精英人物来进行政策倡导活
动，以精英人物作为政策倡导活动的代言人。
③司法策略
司法策略意指在政策制定环境之外，倡导主体依循司法系统与途径进行影响公共政策的活动。
该策略主要通过诉讼的方式进行。同时由于司法部门并非决策部门，司法策略在政策倡导工
作中也多是作为后援策略。
④迟滞策略
该策略的运用可以借助大众传播媒体或专家学者的倡议，对政策制定机构提出建议，组织或
延迟相关政策进入审查程序;也可以通过陈情和请愿等方式，申言现阶段无立法、修改或政
策指定之必要，或要从长计议、不急于制定政策。
⑤合作策略
合作策略意指倡导主体和政府部门建立合作关系，通过合作活动对公共政策发挥影响作用。
良好的政府与民间机构合作，一方面能够取长补短，促进公共服务品质的提升，另一方面也
更加符合当代社会的民主政治精神。
间接倡导
①联盟策略
联盟是指不同的倡导主体，为了达成一致的公共政策倡导目标而聚集在一起，进行长期或短
期的合作或互动。联盟策略强调不同的倡导主体在倡议过程中通过合作与互动形成联合力量，
共同向决策者施压，以达到政策倡导的目标。联盟策略是为了顺应外在环境挑战而使用的一
种策略应用。
②媒介策略
随着我国经济步入新常态，社会进入了以网络社会为表征的新常态。在利用媒介进行政策倡
导时，倡导的主体要具备相关的常识的专业技能，拥有良好的媒体关系，才能获得正向的传
播效果。在倡导过程中要保证传播信息的准确性和权威性，明确其传播的目的，对传播过程
中的问题和规律加以科学化掌握。
③困窘策略
困窘策略意指倡导主体通过曝光现有政策的缺点以引起公众与舆论的关注，使问题的冲突性
扩张，由此塑造民意和政策压力，促使政府部门更改决策。
④抗议策略
抗议策略是指公众为了参与国家治理或维护自身利益，向立法机关或行政机关陈述其愿望或
意见，要求政府响应的一种策略行为。抗议策略一般分为积极抗议策略和消极抗议策略两种。
在行动中，倡导主体会根据自己的情况，选择策略的方式，以达到效果。
⑤日常策略
日常策略指倡导主体通过日常活动和服务等形式塑造组织形象、传递组织理念，进而影响或
改变社会公众的认知和行为，提升对某一议题的关注，最终影响公共政策制定或宣传品。
六、突发公共卫生事件
1.突发公共卫生事件的定义与特点
定义：根据我国《突发公共卫生事件应急条例》，突发公共卫生事件是指突然发生，造成或
者造成社会公众健康严重损害的重大传染病疫情、群体性不明原因疾病、重大食物和职业中
毒以及其他严重影响公众健康的事件。
特点：
1事发突然，反应时间短，其突发性事件难以预测、充满不确定性，破事各级政府等主体在
缺乏充分准备的情况下匆忙应对，极易造成形式的恶劣。
2危害巨大，影响深远，突发性公共卫生事件往往带来多重伤害，不仅仅影响人类的生命安
全和身心健康，还会影响经济发展，危及社会稳定。
3类型多样，专业门槛高，我国的《突发公共卫生事件分级标准》根据突发公共卫生事件的
性质、危害程度、涉及范围将其划分为重大（I级）、重大（II级）、较大（III级）和一般
（IV级）四个等级，每个突发，公共卫生时间都涉及一种或者多种专业知识，甚至横跨多
个学科，需要专业技术人员搜集、报告有关信息。
2.突发公共卫生事件公共沟通的目标与原则
总体目标：第一是履行政府等沟通主体的信息公开责任，及时、全面地提供事件应对相关信
息，保障各项干预措施的顺利执行;第二是提高公众的救助能力，动员公众积极参与相关应
对工作，以尽可能地降低此类事件给全社会带来的损害。
分阶段目标与原则：事前沟通目标，提高预警能力与预防意识;事中沟通目标，疏导恐慌情
绪并积极动员;事后沟通目标，修复多重创伤并重建共识。
3.突发公共卫生事件公共沟通策略
①日常沟通，提高国民危及意识
②及时沟通，主动公开核心信息
③科学沟通，确保信息准确无误
④全面沟通，兼顾各类群众利益
⑤精准沟通，灵活使用适宜媒介
⑥人性化沟通，加强民间话语使用
⑦平等沟通，拓展舆论监督空间
4.突发公共卫生事件公共沟通中的问题
①被动迟缓，隐瞒关键信息
②信息劣质，存在失实或偏见
③避重就轻，忽视边缘群体
④表达机械，人文色彩淡薄
⑤单向宣传，缺乏真诚互动
七、健康传播策划
1.传播目标
目标通常能够为传播策划提供基本方向、准则和效果评估依据。在健康传播的策划中，SMART
是常被使用的一种方法。S为special（明确的、具体的）、M为measurable（可衡量的）、
A为attainable（可实现的）、R为relevant（相关的）、T为time-bound（有限的）。
明确性：指的是对于传播目标的描述应该具体准确、清楚而无歧义，一般情况下传播目标的
描述应该杜绝使用指代不明的笼统术语。
可衡量性：指的是传播目标应该是可度量的，对应的具体测量指标应该是能够被量化评估的，
且用于衡量这些指标的数据或者相关信息是可获取的。
可实现性：传播目标不应脱离现实而存在，目标的可实现性指的就是传播目标在一定时期内
的可完成度。传播目标的制定中，要根据自身的资源与能力制定。
相关性：指实现此目标的策略与其他目标策略的关联程度，具体可以包括短期目标与长期目
标之间的关联性。
时限性：指对于传播任务所对应的时间周期要给出明确限定。
2.传播计划的制定与实施
传播计划的制定是根据传播目标和传播对象开展的，主要分为确定传播主题和核心信息、明
确传播预算和重要时间节点、选择传播平台或传播渠道、确定传播内容和形式创意、传播执
行发布等五个步骤。
在传播渠道的选择中应该遵循两个原则：一是从传播目标和传播对象出发确定传播渠道，增
强针对性，改进其态度和行为，扩张其影响力;二是在目标和预算允许的情况下积极尝试新
渠道。
在内容和形式上，其计划的核心内容在于打破桎梏，需要结合传播目标和传播对象来为计划
增添力量。

早期法兰克福学派
1 媒介观
1 在纳粹铁骑控制下的德国和看似民主自由的美国社会，媒介都是统治阶级操纵、利
用和控制的工具，是“工具性理性”的典型代表。在西方社会的技术理性下，人沦为
机器的奴隶，接受着工业产品及其掩盖下的资本主义文化灌输。劳动阶级依然是被
剥削和被奴役的阶级，但他们满足于工业社会带来的物质上的富足，对自己真实的
社会地位浑然不觉。
2 法西斯利用无线电广播无孔不入地向人们宣扬法西斯理论，使人们渐渐丧失了正确
判断事物的能力，在这里媒介成为了有可能毁灭人类的武器。
3 以美国好莱坞为代表的流行文化，以一种“和平”的方式导致了人的“异化”。各种媒介
都在宣扬和推崇后工业时代的文化特征：消费主宰一切。
4 早期法兰克福学派从政治经济学角度声讨媒介文化现象，他们对媒介所持的批判态
度，和传统经验学派对媒介的研究是迥然不同的。他们认为媒介在创造一个“文化帝
国主义”，使资本主义强权变得更加隐蔽也更有威力。大众媒介就是资产阶级对广大
人民的精神奴役和全面控制，文化由“双向度”变成了“单向度”，成为帮助大众消磨时
光的“时间杀手”，不仅丝毫不能动摇资本主义制度，反而加强了它在意识形态领域
的控制。
2 文化观
阿多诺和霍克海默在对传统“文化”定义批判的基础上，提出了“文化工业”的概念。他们
认为文化的基本功能应该是“否定”和“对幸福的承诺”。真正的文化是“异化”的，即包含着与社
会现实的不合理现象相互排斥的成分。然而在后工业社会，文化产品沦落为商品，出现了“文
化工业化”现象。“文化工业”的特征是：
1) 文化沦落为商品。2)文化产品的生产、流通、消费过程都严格按照商品的操作模式
进行；3)其生产目的是为了与其他商品进行交换。4)在“文化工业”时代，文化产品
不是由“大众”自发产生的，而是统治阶级将其包装于大众文化之下，大批量生产和
批发到人们的文化生活中。5)这是统治阶级维持其统治地位的一剂强有力的“精神
麻醉剂”。6)“文化工业”的文化产品具有隐蔽的欺骗性。7)它宣称大规模的重复生产
是为了满足全体社会成员的需要,并在此基础上对文化产品进行计划和管理。8)它
提供大量的娱乐，以“快感”麻痹人们的神经， 使人们丧失批判和思考的能力。9)
它还利用和招揽中间阶层，标榜高雅，实际上却日复一日地走向庸俗。
10)媒介是“文化工业”最得心应手的武器。
早期法兰克福学派的文化观，归根到底是在维护传统的“精英文化”，否定新兴的“大众
文化”，认为文化应该是少数人的专利。
3 意义和局限性
意义：最早从哲学思辨的角度关注媒介文化并提出了批判，而事实证明，媒介确实是为
专制服务的工具。媒介帝国主义正在威胁着第三世界国家和民族文化的独特性和连续
性。互联网在全球范围内的普及，使美国文化向全人类多样化的文化领域入侵，发展中
国家在“单向度”的文化传播中逐渐丧失了话语权。媒介是统治阶级在意识形态领域维持
其统治霸权的强有力武器，媒介技术越来越成为话语权垄断在谁手中的决定性因素。
局限性：虽然继承了马克思主义的批判意识，但在建构自己的理论体系时，却没有将辩
证的思维贯穿始终。对大众文化的分析缺乏辩证的视角，过于片面、极端、形而上学。
只破不立。只是对文化工业社会不断提出批判，却未能提出一个科学的理论体系和建立
新世界的科学方法。
哈 贝 马 斯
1 哈贝马斯的传播学理论研究及特色
可以划分为两个阶段：一是20世纪70年代以前，主要关注政治公共领域中的交往活
动，代表作为《公共领域的结构转型》；二是研究交往行动理论，代表作为《交往与社
会进化》《交往行动理论》。
1 特色：
1) 有破有立，
2) 从剖析公共领域的消解——“破”，
3) 到通过交往行动重建公共领域——“立”，
4) 其思想理论具有连贯性和完整性。
5) 从政治的角度研究交往，
6) 关注西方民主宪政的实现问题。
7) 继承传统又勇于创新。
8) 具有哲学与传播学的双重特征。
9) 致力于批判学派传播模式的构建。
10) 对以语言为媒介的人际交往尤为关注。
2 公共领域理论
公共领域也叫公共性，是指我们社会生活中的一个领域。在这个领域中，像公共意
见这样的事物能够形成。公共领域是私人领域的一部分，是一个由私人集合而
成的公众领域。它与公共权威领域相对立，是公共管理与私人自律紧张关系的
反映。它形成的基础是国家与社会的分离。公共领域的精髓在于它的批判性。
资产阶级公共领域形成的条件是：提供一种平等、自由的交往方式；公众的讨论应
限制在一般问题上；公开性。
哈贝马斯认为，从18世纪开始，资产阶级公共领域开始承担政治功能，主要体现
在对法制观念的讨论上。然而到了19世纪后期，随着新重商主义的干预政策
和社会权力本身获得公共权威的权限，公共领域开始走向衰落，渐渐丧失了其
对公共事务进行理性批判的功能。而公共领域的消解在很大程度上是拜文化工
业所赐。文化消费取代文学批判，使文学公共领域不复存在。而文学公共领域
正是政治公共领域的雏形。
文化工业对公共领域的消解集中体现在大众报刊上。
大众传媒是公共领域的组成部分和内在机制，但它却最终颠覆了公共领域。要重建
公共领域，必须把公共性原则推广到各种社会组织中去，如政党、大众传媒。
3 交往行动理论
交往行动理论是哈贝马斯思想发展的第二阶段，其理论渊源是60年代的公共领域理
论。
哈贝马斯从普通语用学出发，认为资本主义在丧失了公共领域之后维持生存的唯一出
路是重建交往理性。当生产力和生产关系之间的矛盾在当代资本主义国家逐渐
“消失”的时候，劳动和社会交往之间的矛盾就凸现出来，成为社会的基本矛盾。
理想的社会是“交往合理化”的社会。要实现这一理想，必须承认和重视社会中存在的
共同规范标准，从而使交往能力具有合理的基础，与工具性行为相区别；通过
对话，实现人和人之间的“理解”；选择恰当的语言，对话必须以语言为中介。
