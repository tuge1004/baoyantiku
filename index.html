第九章 网络重塑的文化
第一节 网络文化概述
一、网络文化的内涵
【网络文化】网络平台中的信息、现象、活动等，都具有文化的意义。网络文化是综合
的社会现象，是网络平台中各个主体互动的过程与结果的总和。
二、网络文化的构成层面
1、网络文化行为
2、网络文化产品
3、网络文化事件
4、网络文化现象
5、网络文化精神
6、网络文化产业
7、网络文化制度
8、网络文化秩序与格局
三、网络文化的特质
1、开放性与流动性
2、参与性与集群性
3、多元性与分权性
4、亚文化性与部落化
亚文化是整体文化的一个分支，它是由各种社会和自然因素造成的各地
区、各群体文化特殊性的方面。可分为民族亚文化、职业亚文化、越轨亚文化。
第二节 网络中的亚文化人群
一、网络中亚文化人群的形成
（一） 文化个性、文化区隔与文化资本
亚文化所具有的文化个性，成为文化区隔的标志。一些时候文化个性也可以
转化为文化资本。
布尔迪厄认为文化资本有三种存在形态：一是，一套培育而成的倾向，这也
是一种身体化的文化资本；二是，以涉及客体的客观化形式存在；三是，以机构
化的形式存在，主要指教育文凭制度。
（二）身份认同、群体归属于社会资本
经典伯明翰学派和后亚文化研究将亚文化的独特风格形成主要归结为“仪式
抵抗”和“身份认同”两种原因，认同是“个体将自我身份同至少另外某些身份
相融合的过程。”
二、亚文化人群之一：黑客
【黑客】来源于英文“hacker”，一种着迷于某种事物并具有超高技术的人。
因此从这个词本身来说，并非起源于计算机领域，它不仅无任何敌意和破坏性，
甚至还有一定的褒义。
三、亚文化人群之二：二次元
【二次元】一词源自日本，他在日文中的原意是二维空间、二维世界，日本
的动漫、电子游戏爱好者用这个概念指称这三种文化形式所创造的虚拟世界、幻
象空间。在中国，接受、爱好这类文化的青少年，一开始被称为日本动漫游戏爱
好者或沿用日本的“御宅族”称呼，后逐渐被称为“二次元人群。”
【模因】《牛津英语词典》的解释是“以非遗传的方式（如模仿）传递的文
化因素。”1976年，理查德·道金斯在《自私的基因》中首次讲通过模仿而传
播的文化基因成为模因。
四、亚文化人群之三：“粉丝”与“饭圈”
（一）从追星族到粉丝
【粉丝】来自英文fans，意味“迷”，在中国，目前主要指某些明星（或
平民偶像）、文化产品或品牌的崇拜者。
今天的粉丝已经从明星的粉丝向企业或产品的粉丝扩展。
（二）从粉丝到饭圈
【饭圈】是指某个（或某几个）偶像的粉丝们组成的共同体圈子。
（三）粉丝民族主义的出现
粉丝不仅为自己的偶像出力，也参与一些政治行动，如，帝吧出征。
（四）粉丝经济的兴起
粉丝情感主要有三类：
1、粉丝对明星偶像或“网红”等的情感，这是人与人之间的情感
2、粉丝对品牌或产品的情感
3、粉丝在内容创作上的热情
粉丝经济的兴起：
1、依赖个体号召力
2、以品牌为核心
3、以文化生产为主
第三节 网络孕育的典型文化
一、网络语言：“文化树”与“风向标”
（一）网络文化中不断生长的网络语言
网络语言的特点：
1、开放性与兼容性
2、民间主导生产与“模因式”进化
3、游戏性与解构性
4、流行性与流动性
（二）便利、多义、标签、认同：网络语言使用的社交动因
1、便利：降低网络交流成本的需要
2、多义：复合性表达的需要
3、标签：个性彰显、文化区隔的需要
4、认同：获得归谁感的需要
二、表情包：密码、标签、面具
（一）表情包的意义生产与多重密码
1、社会热点与群体文化：表情包生产与使用中的编码与解码
2、心境与情境：表情包发出与接收中的编码与解码
3、从编码、解码到加密、解密
（二）作为标签的表情包
1、中老年表情包：代际区隔的标签
2、小众表情包：群体认同与群体文化的标签
3、表情包大战：政治态度与政治行为的标签
（三）作为社交表演面具的表情包
1、柔性化表演
2、夸大性表演
3、伪装性表演
4、敷衍式表演
三、自拍：一种纠结的自我技术
（一）自拍与在场：我拍故我在？
在一定意义上，自拍是个体自我意识增强的体现，人们开始试图挣脱外在的摆布，自
主地决定自己存在的方式。
（二）自拍与自我建构：三重自我的调和与冲突
自拍被视为印象管理的一种，它包括身份认同的三个方面：一，我所理解的真实的自
我；二，我认为的他人的眼光；三，在他人眼中，我希望如何被看待。
自拍进行自我建构不一定都达到如期，可能会出现偏差与落差：
1、我所理解的理想自我与他人眼中自我间的偏差
2、自我放大后对他人形成的压迫感
（三）自拍与自我认同：基于身体的表演
【自我认同】起源于埃里克·H.埃里克森，虽然心理学领域的自我认同研究，关注的
更多是青少年社会化阶段中自我认同的形成，但自我认同过程其实会一直伴随着个体。自我
认同是指个体的生活实践中，通过与他人额及社会进行能动互动，以及通过内在参照系统形
成自我反思，使行为与思想逐渐形成并自觉发展成一致的情况。
（四）自拍：权力的规训还是自我的规训？
四、美图：幻象与驯化
（一）颜值即正义时代的技术赋权
颜值在今天之所以被放到格外重要的位置，除了审美上的需求外，另外一个原因是，
人们认为它与身体一样，是衡量一个人的自我管理能力与自我控制能力的一个标准。
（二）幻象与现实
（三）镜像与凝视
（四）文化消费与驯化
五、恶搞与鬼畜
（一）恶搞：一种另类的内容生产与表达
（二）挑战，抵抗，抑或表演？
（三）集体化的娱乐活动
恶搞这一种娱乐化方式，往往是集体性的。
（四）恶搞文化的破坏性
1、对个人隐私权、名誉权、肖像权等的侵害
2、对作品版权的可能侵害
3、恶搞可能演化为网络集体暴力方式
（五）从恶搞到鬼畜
鬼畜也是一种解构性创作，这不仅体现为对其原始视频内容上的解构，也体现为时间上
的解构，通过时间的重复、加速或减速，鬼畜视频在唤起人们记忆的同时又赋予其全新的视
觉、听觉效果，激发人们的再解读。
第十章 网络时代新的社会特征
第一节 网络社会与互联网社会
一、虚拟社会与网络社会
【虚拟】随着互联网的发展，“虚拟社会”这样的提法开始出现。虚拟使人类第一次
真正拥有了两个世界：一个是现实世界，一个是虚拟世界；拥有两个生存平台：一个是现实
的自然平台，一个是虚拟的数字平台。现实世界与虚拟世界，自然平台与数字平台，相互交
叉，相互包含，从而使人的存在方式发生了革命性的变革。
曼纽尔·卡斯特在《网络社会的崛起》一书中提出网络社会的概念。【网络
社会】指一种具有更广泛意义的社会结构，是指新经济所带来的与信息化、全球
化相平行的一种社会结构。网络由相互连接的节点构成，它在信息时代社会里扮
演了核心角色，网络是开放的结构，能够无限延伸，一个以网络为基础的社会结
构，是具有高度活力的开放系统，能够创新而不致威胁其平衡。空间的流动是网
路社会的主要特征。卡的“网络社会”概念并非是针对互联网的，而更强调“网
络化的社会”。他指出，新信息技术范式为社会组织的网络形式渗透扩张遍及整
个社会结构提供了物质基础。
卡斯特还提出了【流动社会】的概念，流动空间由三个层次构成：
(1)第一个物质支撑：电子交流的回路
(2)节点和枢纽
(3)占支配地位的管理精英的空间组织
二、互联网社会：网络社会的最大规模实践
（一）空间特征：解除现实空间约束的“流动空间”
（二）基本结构要素：个体化节点与连接性核心
1、基本节点：拥有多重虚拟角色、可自我定位的个体
2、核心：具有连接能力的平台
（三）内部运动的基本动力：节点互动
1、节点间的作用方式：形式多样、结构多元的中介性互动
2、节点的聚合单元：群体
（四）权力结构：开放、流动
第二节 平台社会
一、从应用到平台
【平台型媒体】乔纳森·格里克在2014年2月发表的《平台型媒体的崛起》
一文中提出了Platisher这一概念，它是Platform和Publisher两个词的合成，
国内将其译为平台型媒体。
需要达到平台效果，需要兼顾以下几方面的需要：
1、用户培育：实现规模化用户的聚集与维系
2、生产者培育：汇聚多元化内容生产者并为其提供有效的激励机制
3、内容分发与匹配：完成内容生产与消费之间的匹配
4、界面与用户体验优化：提供合适的界面及相应的用户体验
5、关联服务的拓展：促进内容与其他互联网服务的关联
二、从平台到平台社会
【平台社会】何塞·范·迪克指出，平台社会指一种社会生活，在这种社会
生活中，社会经济流动越来越多地受到由算法和数据驱动的全球化在线平台生态
系统的调节，平台社会并非指一种与我们生活的现实世界相分离的新的虚拟公共
空间，相反，平台社会如今位于我们生活的中心，我们越来越多地感受到他们对
几乎所有形式地日常实践的影响。
第三节 算法社会
一、 算法对认知、决策的影响
（一）作为界面的算法对认知的影响
不同目标、不同的数据维度、不同的算法模型，会带来不同的界面。算法对世界的界面
化重构，会影响人们的认知。
（二）作为模型的算法对决策的影响
算法对某些方面的决策之所以重要，一是因为它可以对与决策相关的对象进行历史、
现状甚至未来趋势的数据分析；二是因为它可以建立决策模型，基于这种模型可以对各种可
能性进行分析进而寻求最优解决方案。
二、算法对关系的影响
作为中介的算法，既有可能提供准确的匹配，也有可能提供无效或错误的连接，这取
决于算法模型的合理性、它所依据的数据的可靠性。
作为中介的算法，也常常会通过一定的机制条件与控制着各种对象及其相互关系。
在劳动平台，算法的调节、控制也很常见。
除了维护某些共同体的边界、维系现有的共同体外，算法还可能通过对相似人群的连
接，推动共同体的形成。
算法的运用，也可能使得“同温层”更加容易形成。
三、算法对经济与社会运行的影响
（一）算法对经济运行的影响
算法往往依附于平台，因此，算法对经济的影响，也多在平台层面表现出来。
（二）社会治理的算法化、智能化
四、算法权力及其约束
【算法权力】作为中介的算法，既影响着人们的认知与行为，也建构、调节、控制着各
种关系，他就会成为一种权力。算法权力包含算法本身的权力和数据的权力。算法权力的主
要作用方式有：通过对数据的占有、处理与结果输出，演化为资源、商品、财产、中介甚至
社会建构力；直接变为行为规范，影响甚至控制个体的行为；辅助甚至代替公权力，做出具
有法律效力的算法决策。
五、算法社会的算法素养
在算法广泛渗透到社会各个层面的时代，算法已经成为人的一种新的技术伴侣。一方面，
我们需要接受算法的存在，利用它来扩展人的自身能力，享受它所带来的便利；另一方面，
我们又要对它带来的控制和其他风险有足够的识别与反抗能力。
（一）算法开发者的素养
对于算法开发者的素养来说，新的技术理性、算法伦理的倡导与培养，尤为关键。
（二）算法使用者的算法素养
1、算法意识及与算是你发相关的知识、技能培养
2、与算法相关的思维方式培养
3、算法风险教育
一是，人的隐私、安全风险；二是，算法对人的“囚禁”。
第四节 元宇宙构想与虚实相融的社会
一、元宇宙构想中的空间
（一）元宇宙空间对身体的召唤
元宇宙之所以强调空间概念，特别是强化现实空间的孪生化，是因为空间带来了对身
体的召唤，这是以往虚拟空间少有的，因为种种原因，人们会对这种召唤做出积极的响应。
（二）孪生城市中空间意义的继承或重塑
列斐伏尔由此提出了三位一体的空间概念：第一，空间实践，它包括生产与再生产，
以及每一种社会形态的特殊位置与空间特征集合。第二，空间表象，它们与生产关系以及这
些关系所强加的“秩序”捆绑在一起，从而也与知识，与符号代码，以及种种台前的关系捆
绑在一起。第三，表象的空间，它们表现为星星色色的象征体系。
（三）虚拟空间中的场景与社会场景重建
由空间、空间中的物以及人共同构成的场景是空间的必要元素，是空间的“活”的构
成部分，也是空间体验的一部分。
空间虽然可以被孪生化，现实空间的场景却并不能被移植到虚拟空间中，它需要在虚
拟空间中重建，但这不应该是机械设计出来的，而是要由虚拟空间中用户的活动共同构筑，
人们成为彼此的场景或背景，如同现实空间。
（四）现实空间与虚拟信息、虚拟空间的叠加或融合
元宇宙构想下现实空间的变化，不仅仅在于它的数字孪生化，虚拟信息对现实空间的
补充、增强，也是一个重要方向。
（五）赛博空间的再认识
亚当斯指出，赛博空间不仅仅是一个技术现象、一个技术景观，它也是一套异质的符
码、机构和使用者，它们以某种特定的社会、心理、符号和物质关系而结合再一起。
二、元宇宙构想时空中的身体
（一）虚拟空间中现实身体的体验增强
元宇宙虚拟空间的互动将给身体感官带来更多的体验，身体不再是人机交互的工具，
或传达信息的手段，身体的体验本身也会成为目的。
沉浸感也对应于flow，在国内被译为“心流理论”（另译，流畅感理论）。由美国心
理学家契克森米哈赖提出的，是指一个人完全沉浸在某种活动当中而无视其他事物存在的状
态。
（二）分身：元宇宙空间中身体的分化
元宇宙空间中一种典型的身体分化，是“数字分身”。
数字分身往往是对真实身体整体的模拟与仿真，今天所谓的数字人、虚拟人便是在二
维空间力对人进行的复刻，未来这种复制将向三维方向发展。
（三）数字化身：虚拟空间中的身体再造
分身是人们为了应对多任务挑战而进行的自我繁殖，因此它们往往尽力模仿或复制人
的身体原貌。而化身则是在不同情境下的表演躯壳，化身并不一定在外表上复制身体原型。
与分身常常用于逃避现实任务、分解工作压力的情境不同，化身常常是人们主动选择的、具
有享受性与娱乐性的存在形式，化身也更多地折射了人们的内在心理。
化身形象也会反过来影响到人们在虚拟环境中的行为，普罗透斯效应便是其一，即，
在虚拟环境中用户会参考化身外表所预期的性情，然后表现出遵从这些预期的态度和行为。


=====《大众传播理论：基础、争鸣与未来》=====

大众传播理论：基础、争鸣与未来
第一部分 大众传播理论介绍
第一章 介绍
一、关于媒介的三个问题：
（1）媒介技术的新形式提供了何种潜在的可能性，以及带来了何种威胁？
（2）应该形成什么样的媒介行政管理机构或媒介产业来控制或规范媒介技术，从而发现其
潜在的可能性，减少其威胁？
（3）媒介如何为民主、多元文化的社会服务？
新媒介的倡导者和反对者
积极的受众：人们寻找到了使媒介服务于自己的方法，这样他们的生活会更加有趣，更加有
目的性
被动的受众：普通民众被新技术压倒，被新媒体催眠般的力量麻痹
大众传播的定义和再定义
大众传播：当消息来源（通常是某个组织）使用一项技术作为媒介与大规模受众进行沟通时，
被称为大众传播
人际传播：两个或几个人之间的传播，通常是面对面的
把经由媒介的传播看作处于一个连续统一体上，从一端的人际传播延伸到另一端的传统大众
传播形式。
二、媒介理论发展的五个时期
（1）大众社会与大众文化时期(19世纪末20世纪初)
新媒介技术的发明和推广；便士报和黄色新闻；工业化对传统生活的侵蚀；城市化和移民的
涌入，犯罪率提高和社会动荡的增加……
对于他们（精英：在社会系统中占据较高的位置或有特权的人）而言，大众媒介象征着19
世纪城市生活中一切错误的东西。
大众社会理论：将具有负面影响力的角色归结于媒介的关于西方工业社会的视角。其根本论
点是媒介对传统社会秩序起到破坏作用。
（2）大众传播科学研究视角时期（20世纪30-50s）
背景：纳粹的宣传控制
拉扎斯菲尔德和哥伦比亚大学应用社会研究中心
（3）有限效果论时期（20世纪50s）
有限效果视角（limitedeffectsperspective）：媒介在加强现有的社会趋势，对社会现状起到
加强而不是威胁的作用
有限效果范式
精英多元论（elitepluralism）：认为具有多样性的受众对媒介的使用会丰富民主
适度的、有限的效果
（4）文化批评理论时期（20世纪60s）
对有限效果的挑战
新马克思主义（neomarxism）：媒介使得有统治权的社会精英维持他们的权力的社会理论
大众媒介是公共竞技场，文化战争在其中打响，并熔炼出一种支配性文化或霸权文化
英国文化研究学派（Britishculturalstudies）：关注大众媒介和它们在社会不同子群体中推
行霸权世界观和主导文化的角色
文化批评（culturalcriticism）：关于社会中的各种利益冲突以及传播有助于某个集团对其它
集团的永久统治的看法的集合
（5）适中效应出现时期
社会符号学理论（socialsemioticstheory）：将传播科学和关注受众积极性的批判性理论及
文化研究结合起来，理解受众如何获取媒介信息的理论
媒介素养（medialiteracy）：获取、分析、衡量和传播媒介中的讯息的能力
重要的媒介效果可以作为观众或读者的自愿的直接后果而长期存在
获取意义的视角
当公众的吸引力被转移到某些社会趋势上去的时候，与之相对的那些可能有用的趋势就被破
坏了。
第二章 大众传播理论
一、科学与人类行为
因果律（causality）：当一个给定因数影响另一个的时候（甚至通过一个插入变量的方式），
就称之为因果律。
因果关系（causalrelationship）：当一个特定变量在特定条件下的改变总是导致另一变量
的相同效果时，就称之为因果关系。
科学方法：通过对事实进行准确的观察和解释得到真理的研究。在整个20世纪，一些社会
研究者一直试图将科学方法应用于人类行为与社会的研究之中。如拉扎斯菲尔德、霍夫兰、
贝雷尔森、卡茨等。
科学方法的执行对社会科学研究者而言存在的困难：
1、人类行为绝大多数重要和有趣的形式相当难以度量。
2、人类行为极度复杂而不易于进行因果描述。
3、人类有目标且会自我反省。
4、因果律的简单观点在被应用于我们自身时有时会相当烦人。（第三者效果：我们没那么
容易被影响，但我们中的大多数人确信其他人会更容易被媒介影响）
二、理论的定义
理论：对于现象的概念上的陈述或解释。“思想的不同学派会用不同的方法来定义理论，这
依赖于理论家的需要和关于社会和知识本性的信仰。”
eg麦奎尔的四种大众传播理论：
1、社会科学理论：基于并指引经验主义的研究，允许对大众传播的本质特性和运作及效果
陈述。通过对大众媒介、媒介使用和媒介影响进行系统和客观的观测，这些陈述或假设得到
了检测。
2、规范理论：解释理想的媒介应如何在某一特定的社会价值体系中运作。
3、操作理论：另一种形式的规范理论，但带有实用倾向：媒介应该如何理想化地运作以适
应特定目的。
4、日常理论：我们所有人通过参与媒介传播就能拥有的知识和观念（理论）。
廓清大众传播理论的另一种方法是看它们的目标。
社会科学理论：寻求预言和控制的理论。
批判理论：在占统治地位的社会秩序中寻求解放和改变的理论。
解释学理论：对于理解的研究，尤其是通过对行动和文本的解读
大众传播理论的关联点：特定的媒介、受众、时期、条件、理论家
第二部分 大众社会与大众文化时期
第三章 媒介产业崛起和大众社会理论
媒介的角色：保守人士哀叹自由主义的媒介精英加速了价值观念的衰落；自由主义人士害怕
媒介系统的力量与媒介拥有者的保守主义价值观更合拍，而不是和它的受众合拍。
一、综述
大众社会理论是对西方工业社会进行全方位洞察的视角，认为媒介的影响是巨大的但经常是
负面的。媒介能深刻影响我们对社会的理解，微妙地但高度有效地操控我们的行为。该理论
假定，媒介的影响必须得到控制。
文化战争（culturewar）：指我们试图解释生活于其中的、广泛社会秩序中的文化根基的
持续斗争。出版自由vs自由滥用和道德堕落——》限制媒介
二、起源
社会历史背景：工业化和城市化；新的社会精英阶层的崛起，旧的权力结构遭到挑战；电报
和电话的迅速普及，通讯社的诞生；印刷成本的低廉；大众对廉价媒介内容的需求；报纸发
行战争导致黄色新闻业的出现。
黄色新闻（yellow journalism）：耸人听闻、常常是不负责任的新闻报道。
大众社会理论就是对这种实践的回应——反对迅速成熟且高度竞争的媒介产业的不节制行
为的理论。
三、大众媒介发展与衰落的循环
功能置换（functionaldisplacement）：当现有媒介的功能被更新的技术所代替，旧有媒
介将寻找新的功能。
每当新媒介技术和产业得到发展，并能稳定地提供吸引人的内容时，这种技术和相应的媒介
产业就必然取代先前的媒介产业和传播形式。当人们调整自己适应新媒介和新内容的时候，
社会角色和社会关系长长早到严重的破坏。
随媒介产业的成熟，残酷的市场竞争转变为市场垄断时，媒介产业的社会责任感才会成为可
能。Eg普利策奖和赫斯特基金会
美国的大众媒介的历史是在成熟的。肩负社会责任的媒介产业主宰的阶段与革新的但有时不
负责任的媒介竞争时期之间潮起潮落的历史。报纸竞争得到控制时，出版商面临的是强大的
新兴娱乐媒介：唱片、电影和电台的挑战。这些新兴行业成长时，也经历了激烈的竞争时期，
也试探着跨过道德和伦理的界线。（Eg20c30s电影审查制度的争论）几乎所有的情况中，
新兴媒介产业都选择展开自我审查而不是接受外来的控制。
媒介产业重构中最强大的影响力量是技术的变化、内容的革新和消费者的需求。
四、大众社会的批判与关于媒介的大论战
当新媒介开始发展的时候，批评家总是与之对抗，要么阻止这些媒介的成长，要么试图控制
它的结构。而他们的担忧很可能是基于自身的私利。
大众社会理论最初出现于19世纪末，传统社会的精英阶层在现代化过程中丧失其权力，对
他们而言，大众媒介是所有现代社会病症的象征。
基本假设包括：
A)媒介是一种有害的，癌症般的社会力量，必须对之进行重构或净化；
B)媒介具有直达普通人头脑，并直接影响人们思维的力量；
C)媒介有长期的不良后果，能破坏人的生活甚至产生大规模的社会问题；
D)普通人从传统社会机制下被隔离和孤立开来，因此易受到媒介的影响；
E)建立极权社会秩序是解决媒介引发的社会混乱问题的良药；
F)大众传媒不可避免地降低文化的深度和高度，从而带来文明的衰落。
直接影响假说（direct effects assumption）：媒介的内容和媒介本身都产生直接影响。
20世纪30-60s，大众社会理论家勾勒出一幅经典的由大众社会衰落为极权社会的图景。（Eg
奥威尔的1984）他们认为大众媒介推动了这一进程。
在反对极权主义崛起的努力最具讽刺意味的是反对者常常要发展的另一种政府形式正是他
们要阻止的那种。（eg 麦卡锡时期）
媒介大论战的参与者：
实践派（practicus）：产业研究者，辩护者
学院派（academicus）：传统精英，理论家
经验派（empiricus）：社会科学研究者，使用社会科学研究方法
五、大众社会的早期例子：两个社会学的观点
①礼俗社会与法理社会 BY 滕尼斯（Tonnies）
礼俗社会(gemeinschaft）也称民间社区，将人们用坚固的家庭纽带，传统和固定的社会角
色联系在一起，因此社会风俗习惯非常强大；法理社会（gesellschaft）则由相对较弱的社
会风俗习惯联结在一起，建立在理性选择的基础而不是传统的基础之上。法理社会代表着工
业社会，代表着法律及其它正式的框架，于是社会关系更加正式，更没有了人情味，个体更
依赖自身而不是家族而生存，于是人们彼此之间在道义上责任也更少了。
②机械团结和有机团结 BY 涂尔干（Durkheim）
机械团结（mechanicalsolidarity ）是指的民间风俗社会，人们好比社会大机器中的小部
件，这些机器秩序井然，经久耐用，而人们在风俗和集体言论的迫使下扮演着传统的社会角
色；有机团结（organicsolidarity）是代指现代的社会秩序，它如同有机动物，人们像身
体里的专业化细胞，执行着特定的任务，并依靠整体的健康来维持自己的生存。
六、当代的大众社会理论：
①最具影响力的拥护者：罗杰·斯克鲁顿《聪明人的现代文化指南》对精英文化的支持：
大众娱乐是“幻想轻易代替了真实的、持久的、客观的世界。”
大众文化是“一种提供轻松容易的社会凝聚力的尝试；无需昂贵的仪式便带来道德上的认知
和情绪上的了解。”
②对大众社会理论回归的新因素：（1）因特网的兴起，新媒介意味着新形式的传播，这又
意味着新的权力和影响力中心的出现；（2）新技术和传媒行业的重构和所有权的集中/垄断。
第四章 宣传时代媒介理论的兴起
一、综述
社会历史背景：20世纪初的美国，黄色新闻记者和“扒粪者”在媒体上的唇枪舌战；移民
群体的拥护者和社会精英之间的对立冲突。
宣传引起早期媒介理论家注意，因为它构成对美国政治体系的威胁。让社会理论家两难的局
面：一方面担心放任极端主义者自由宣传民主制度会消亡，另一方面对宣传进行审查又意味
着对传播自由的限制，很可能破坏民主。
宣传的力量：大众社会理论家和他们所支持的精英们都认为，“普通民众”对蛊惑人心的宣
传特别缺乏抵制能力，因为那些“不幸的人”生活在一个快速工业化的世界，他们在心理和
文化上孤立无援，并已经失去了那些传统的、纽带似的、非正式的社会规则和社会职责所带
来的安全感。
宣传家的目的：改变人们的行为方式并让他们相信他们的行为都是自愿的，他们新采取的举
止及其潜在的主张都是他们自己的。
宣传（propaganda）：无限制地利用传播活动宣传特定的信仰和期望的活动。
白色宣传：刻意抑制潜在有害的信息和想法，同时故意推广积极信息和想法，目的是分散人
们对有疑问的事情的注意力。
黑色宣传：别用用心地策略性地传播谎言。
灰色宣传：传播可能错误或可能正确的信息或想法，从不费力去确定它们的确切性。
有效宣传的关键在于：1）将复杂问题简单化；2）不断重复已简化的东西。（希普勒）要
偷偷摸摸暗中行事，“对传播活动大规模组织、控制”，并“用精心设计的狡猾语言阻止深
刻的思考”。（斯普劳尔）
共识操纵法（engineeringof consent）: 在二战后的美国，由”现代公共关系之父”，爱德
华·伯奈斯（EdwardBernays）所提出的理论。一种劝服自由，只有通过对传播技巧的掌握，
政府才会卓有成效地实施复杂的现代民主，因为即使在民主国家中，民主的结果也非简单出
现。
二、宣传理论的影响来源：
行为主义（behaviorism）：认为人类的所有行动都只是对外部环境刺激的条件反射。媒介
是立即引起反应的外部刺激
弗洛伊德学说（Freudianism）：人类的行为是个体的本我（id）、自我（ego）、超我（superego）
相互斗争的产物。
•本我：人格中自私自利、按快乐原则行事的部分；
•自我：人格中理性的部分；
•超我：内在化的文化规则。
如果宣传能唤起本我并刺激本我压倒自我，宣传将获得最大的社会效应。如果有效的宣传能
将超我把个体人格推向本我的方向，人们阴暗、原始的冲动将变得正常。
三、魔弹论（magicbullet theory）：媒介能渗入人们大脑、迅速制造效果。认为受众无
力自觉抵制媒介操纵，讯息渗透入潜意识，改变了其思维方式和感知方式。
四、拉斯韦尔的宣传理论
1）反对过于简单化的魔弹论，认为在接受迥异的观念和行为之前，受众需要缓慢的准备过
程。传播者需要有一个精心谋划的长期宣传策略，一边细致耐心地引入新观念和新意象并加
以培养。要创造出象征符号，并且逐渐教会受众在这些象征符号与特定情感之间建立起联系。
如果成功便会形成能号召大规模行为的主导符号。
主导/集体符号（master or collectivesymbols）：指与强烈的情绪联系在一起，能激起
大规模群体行为的符号。Eg 观看升国旗
2）理性的政治辩论是不可能的，因为大众囿于他们自己的精神病症（参见行为主义与弗洛
伊德学说）里，只能屈从于宣传家的操纵；而我们只能期望科学技术专家驾驭宣传力量来宣
扬”正义”，抵制”邪恶”。大众媒介宣传的控制权应掌握在这些精英手中。
与魔弹论不同：预设了一个长期而复杂的条件作用过程，仅靠一两个极端分子的讯息是无效
果的。
科学技术专家（scientifictechnocracy）：受过良好教育的、有社会科学基础的精英，肩
负保护脆弱的普通大众免受有害宣传浸染的重任。
五、李普曼的舆论形成理论
吸收了拉斯维尔的怀疑主义，认为普通民众没有能力搞明白周围的世界并理性地决定自己的
态度；宣传活动带来了严峻的挑战，因此政治体制需要做必要的调整；既然公众易受宣传的
影响，所以需要一些专门的机制或机构来保护他们，对媒介进行温和但十分有效的控制是必
要的，媒介自我审查不足以满足需要。让善意的技术专家控制信息采集和发布，决定哪些信
息给民众知道，或反之。
六、杜威的回应
1）杜威是公共教育拥护者，他把公共教育看作是保护民主制度、抵制极权主义的最有效的
途径。拒绝科学技术专家的带领：“专家阶层”将不可避免地远离公众利益而成为一个具有
个人利益和个人知识的阶层。他认为，媒介的职能就是“使公众对公众利益感兴趣”。只要
传授人们正确的防御和思考方法，他们完全能学会如何保护自己。
2）有效的媒介必须要和它们所服务的团体紧密结合；媒介处于社会的复杂关系网的中心位
置。媒介不应被理解为外部的工具，而应该被理解为服务于公共讨论、公共辩论的公仆，被
理解为实践民主政治的公共论坛的守卫和协助员。是团体而非个人在通过传播来使连接、支
撑社会的文化得以形成和延续。
七、现代宣传理论
核心论点：权力派精英彻底控制着大众媒介及其内容，以至于他们可以轻易地把自己的“真
理”强加到文化之中去。
广告的潜在主题通常是：消费和资本主义是有益的。
左派：赫尔曼的五个过滤器（filters）：
•所有制和广告：它们使“底线的考虑更具有控制力……记者的职业自主权被削弱了”
•消息来源和宣传：提供新闻来源资助媒介的人会获得益处
•媒介对市场奇迹的信仰：市场被看作是行善的
莱廷南和雷库斯的三方面强化宣传视角：
宣传是“通过对媒介的操控来控制行为”的，认为受众“被绊住并陷入一种苦恼生活中，不
那么消息灵通且更少参政”，宣传者使用复杂的民意测验和调查，用所得的结果来增加其影
响力；媒介公司纷纷走向合并之路。这些因素赋予大公司和政府精英以巨大权力，而公众浑
然不知。
右派：对自由媒介的偏见进行批评
第五章 大众传播的规范理论
一、综述
规范理论（normative theory）：一种描述组织和运作媒介系统的理想方式的理论。
描述了在理想的价值观或规则得到实现的情况下，事物所应该具有的面目
社会责任理论（socialresponsibilitytheory）：一种规范理论，用媒介产业的公共责任心
取代了媒介的完全自由以及对媒介施加的外部控制。社会责任理论为美国大多数媒体提供了
一种可行的指导方针，并使他们所作的一切合法化。
二、规范理论的起源：两种极端
•一个极端：第一修正案绝对论者；激进自由主义（radicallibertarianism），对自由主义
的绝对信仰，坚信大众是好的，有理性的，媒介是完全无需规范的。
•另一个极端：技术专家控制论（technocratic control），由政府机构或委员会直接对媒
介进行规范的观点。其论点建立在宣传理论基础上或大众社会理论基础（高雅文化被破坏，
道德价值观琐碎化trivialization）上。
折衷：介于支持政府控制媒介和支持完全的出版自由的社会责任理论。
三、自由主义的起源
①自由主义思想可以追溯到16世纪的欧洲，在反封建贵族统治和宗教改革运动过程中，人们
针对独裁主义理论提出了自由主义理论；②早期的自由主义者表明，如果个体能挣脱教会和
国家对传播活动的专断控制，他们将会”自然”地接受良心的指引，探寻真理，参与公众辩
论，最终为自己和他人创造更美好的生活。他们坚信不受限制的公共辩论和讨论的力量会发
展出更自然的建构社会的方法；③1644年，约翰·弥尔顿（John Milton）出版了宣扬自由
主义的论著《论出版自由》（Aeropagetica），并在书中宣称，在公正的辩论中，好的和真
实的观点总会战胜谎言和欺骗，公众辩论会锻造出一个更好的社会次序。此观点又被称为“自
我修正原理”。
自由主义理想是美国民主自治的核心，建国不久就签署了《独立宣言》和《人权法案》。
•独裁主义理论（authoritariantheory）：一种规范理论，意为将所有形式的媒介都控制在
统治精英或权威人士的手中
•自我修正原理（self-rightingprincipal）：认为在公正的辩论中，好的和真实的观点总会
获胜，也是社会责任理论中的一个基本原则，by弥尔顿
四、观点市场：激进自由主义的新形式
（1）背景：19世纪连续经济低迷，腐败丛生和不公正现象，民众对商业和政府的信心大为
动摇。垄断公司制定不公平的价格；工人工资低廉，工作环境艰苦。便士报和黄色新闻的泛
滥，公众对报纸的尊敬也削弱了。“进步主义”（自由主义）和“人民党主义”（普通民众
的支持者）运动呼吁制定新法律并加强政府规范力度。反托拉斯法通过。自由主义者担心这
些法律和条例太过火。
（2）提出：一些媒介从业者对进步主义和人民党主义的批评进行强有力的回应，认为媒介
应被看成是一个具有自我调节（self-regulating）功能的观点市场（market place of
ideas），认为应该把所有的观点呈现给公众，公众可以从这个”市场”中选择最好的。（放
任主义学说）
自我修正理论应该适用于大众媒介的内容和公开的讨论。观点市场可以自我调节，所以不需
要政府机构来审查讯息。
（3）评价：
观点市场理论的二元性：基于经济理论的解释强调效率、消费者满意度和竞争，与反对政府
规范传播工业的意见关联；基于民主理论的解释强调公民知晓权、获得信息基础上的决策和
有效自治，与提倡政府规范的意见关联。
优点：①限制了政府的控制；②允许品味、理想和话语的自然波动；③信任受众；④假设好
的内容将会获得最后的胜利。
缺点：①错误地将媒介内容与有形的消费品等同；②过于信任受利益驱使的媒介经营者；③
忽略了一个事实，即有意“购买”的内容中常有其他不想要的内容；④对于受众的消费技能
过于乐观；⑤错误地认为受众而非广告商是消费者；⑥对“好”的定义不能通用。
五、政府对媒介的规范
联邦无线电委员会（FRC）——》联邦通信委员会（FCC）
六、新闻专业化
普利策和赫斯特设立职业奖项；业界游说资助建立培养媒介工作者的职业学校；媒介管理者
进一步保证会服务于公众的需要。
1923年，美国报纸编辑协会开始采用名为《新闻规约》（Canons of Journalism）的一系
列专业标准，1975年该标准被《新闻原则声明》（Statement of Principles）所替代。
业内伦理道德的规范逐渐成型，一个媒介角色的重要概念：保卫公共福利的看门狗。认为媒
介应不停审视社会并把问题警示给民众。
新闻调查受到广泛欢迎，媒介这个角色也被普遍接受。媒介被想像为一个独立的社会机构：
政府的第四极（FourthEstate），用于确保所有其他机构，即政府的三个部门、商业、宗
教、教育和家庭为公众服务的权力。
在专业化发展趋势中，媒介从业者宣誓支持专业标准。
七、专业化的限制
①不愿指认和谴责违反专业标准的同行，职业协会经常会形成封闭式的团体；
②专业标准可能是过度抽象和含糊，难以被贯彻执行；
③媒介的专业化不包括专业训练和专业执照标准；
④媒介从业者对自己的工作拥有较少的独立控制权；
⑤违反专业标准很少有立即的、直接可见的后果。
八、社会责任理论：战后的折衷
背景：要求政府对媒介加大规范力度的压力贯穿整个二战时期，并在随后的反共浪潮中继续
进行。作为回应，1942年出版自由委员会（赫钦斯委员会）成立。
委员会迅速形成两个阵营：自由主义观点vs赞成新闻出版规范
后者受芝加哥学派的公共传播观念影响。
芝加哥学派的观点是现代城市有成百上千的小社会团体组成的“大共同体”（Great
communities）；为了大共同体的发展，所有构成团体必须共同合作，作出贡献。芝加哥学
派反对观点市场的概念，认为不加规范的大众媒介将不可避免地为大团体或在社会中居统治
地位的团体利益和品味服务，小的或弱势的多元团体要么被忽视，要么被贬抑。还认为精英
分子会利用媒介作为获取个人政治力量的手段，操纵媒介进行宣传，在多数人中制造仇恨和
恐惧，并使他们联合反对少数派。Eg希特勒
•多元团体（pluralisticgroups）：在一个大共同体中由特定的统一特征定义的不同组成部
分。
最终委员会写了赫钦斯报告，其观点综合起来被称作“新闻出版的社会责任理论”。该理论
要求媒介将文化多元性置于首位；增加了媒介从业者的义务和责任；呼吁媒介从业者向理想
主义迈进，要求他们把自己当作一场民主保卫战的前线战士，帮助多元团体构筑一道围墙，
保护民主不受外部和内部的敌人的危害。
社会责任理论的基本原则(麦奎尔)：①媒介应该接受和履行对社会的特定义务；②这些义务
主要通过制定关于信息性、真实性、准确性、客观性和平衡性的高度或专业化标准而实现；
③媒介应该在法律和已有的规章制度的框架内进行自我规范；④媒介应避免任何可能导致犯
罪、暴力、平民骚乱和攻击少数群体的新闻；⑤媒介从整体而言应该是多元化的，反映社会
的多样性，给不同的观点表达的机会和回答的权力；⑥社会和公众有权企盼媒介的表现符合
高标准，而干涉是为了保障公众的利益；⑦新闻记者和媒介专业人士对于社会、雇主和市场
来说都是负责任的。
优点：①重视媒介的责任；②重视受众的责任；③限制政府对媒介运作的介入；④允许政府
合理地控制媒介；⑤重视差异和多元化；⑥帮助”少数派”；⑦呼吁媒介从业者和受众的理
想主义；⑧与美国的法律传统一致。
缺点：①对媒介履行责任的积极性过于乐观；②对个体的责任心过于乐观；③低谷了利益驱
动和竞争的力量；④使现状合法化。
社会责任理论在50年代麦卡锡时期经历了第一次检验。
70-80s社会学研究对日常新闻生产实践价值的质疑：是否得到贯彻？（传播市场的垄断和
限制）是否能把重要事件的准确信息传播给受众？（人们从新闻中获得东西很少，而且很快
会忘记）eg “策略性仪式”（盖伊塔奇曼）
九、公民新闻
公民新闻（civicjournalism）：积极地让受众参与报道重要公民事件的新闻实践，或称公
共新闻（public journalism）。是一种交互式的新闻形式，使报纸等媒介积极地募集到生活
中方方面面的人，让他们来生产新闻和新闻报道。可以看成是一种社会责任理论的体现。
•形式一：报道着重强调当地的人和团体、当地的问题和当地的解决办法
•形式二：公民讨论小组，公众对事态发展的反应被作为新闻来报道
十、其它规范理论
发展媒介理论（development media theory）
规范理论的一种，提倡媒介对现有政权及其发展国民经济的努力给予支持，呼吁政府和媒介
互相配合以确保媒介能协助有计划的、有利的国家发展。该理论主张，除非一个国家已经被
很好地建立起来，它的经济已步入正轨，否则媒介对政府必须支持而非批评。
独裁理论的升级版？
民主参与理论（democratic-participant theory）
•提倡媒介在草根层面上支持文化的多元性
•能够由社团直接控制的小媒介，如果他们不能承担费用，政府应予以补助以及培训他们如
何运作
第三部分 有限效果论的兴盛和衰退
第六章 有限效果理论的形成
一、综述
背景：《火星人入侵地球》广播事件后的二十年里，媒介视角的转变：
•媒介不再被视为政治压迫和操纵的工具，而是一种具备有益于社会利益的极大潜能的力量。
•坚信只有极少数人具有那些会对媒介的直接控制无力抵抗的心理特征。
•媒介在相对那些更强有力的插入变量（比如性格特征或群体成员身份）而言，在塑造民意
方面无力。
有限效果视角（limitedeffectsperspective）：媒介仅拥有极小或有限效果的指导性的观
点
二、范式和范式转变
范式（paradigm）：一种组织性的理论视角。范式能够包含许多紧密相连的理论，每种理
论彼此共享某些共通的假设。
范式转变（paradigmshift）：从一种有组织的理论上的视角向另一种转变。托马斯·库恩
（Thomas Kuhn）认为科学前进的方式是通过对理论的根本性的破坏。在一个时期内，某一
种理论上的视角支配了大多数研究。这些理论范式能够包含许多紧密相连的理论，每种理论
彼此共享某些共通的假设，成为一种提供指导的框架。因此新的，不同的观点或对立的结论
容易被摒弃。突破这样的框架理论便是难能可贵的转变。
三、大众传播理论中的范式转变
拉扎斯菲尔德和霍夫兰在经验主义和科学方法的调查中发现了大众社会理论的失误，在20
世纪50年代，跟随这两位大师的研究者进行了许多关于传播理论的实证调查，效仿耶鲁大学
和哥伦比亚大学的研究中心纷纷成立，许多经典研究成果出版，于是新的范式形成。
范式发展的因素：
•经验主义社会研究方法的精确微妙与广受赞同：惟一的科学的方法
•经验主义的社会研究者们成功地羞辱了大众社会理论
•开发了新研究方法的商业潜能并赢得了私有产业的支持
•行政管理研究（administrativeresearch）：检验受众从而理解消费者态度和习惯的研究，
用来指导实践和管理决定的经验主义研究的应用
•获得了不同的私人和政府基金的强有力支持
•媒介公司也提供了大量经费，因为媒介被认为不那么有威胁
•经验主义社会研究者们成功地在多种不同的社会研究学科中建立了他们的方法
四、信息和影响的二级流动
拉扎斯菲尔德和他的选举研究
①拉相信理论必须坚固地扎根于经验主义的基础之上；②应选择一种高度归纳的方法来进行
理论建构；另，归纳是一种理论建构的办法，它认为研究从经验主义的观察开始而不是从思
考推测开始；③通过结合各种概括总结以建立所谓的中层理论。
•信息和影响的两级流动（2-step theory）：舆论领袖存在于社会的各个层面,他们的影响
力的流动更趋向与水平而不是垂直;讯息从媒介经过舆论领袖并传递给舆论追随者。
•把关人（gatekeeper）：在两级流动中，审查筛选媒介讯息并传递信息以帮助他人共享其
观点的人。
•舆论领袖（opinionleader）：传递信息给舆论追随者的媒介重度使用者，会扮演把关人
的角色。
•舆论追随者（opinion follower）：从舆论领袖那里接受信息的人。
两极流动理论的优点：①集中注意力于能够或不能够导致影响的环境；②强调舆论领袖在民
意形成中的重要性；③基于归纳法而不是演绎推理；④有效挑战了魔弹论。
缺点：①受到时代（40s）和媒介环境（无电视）的局限；②仅仅把被报告的行为（投票）
用作对媒介效果的测试；③对同为媒介重要效果的强化不予重视；④使用低估了媒介影响的
数据调查方法；⑤后来研究修正了影响力的多级流动。
五、拉扎斯菲尔德模式的局限性：
①数据调查不能量度人们实际上在日常生活中使用媒介的方式；
②强调媒介使用的整体模式，在人们对媒介的具体使用方面缺乏力度；
③仅仅把被报告行为用作对媒介效果的测试；
④信息流动模式由于信息类型和特定历史时刻社会环境的不同而差异巨大；
⑤调查能有效地衡量随时间推移而发生的变化，但确不细致；
⑥过于强调那些能被现有技术所衡量的变量，对变量分类的完整性被大大削弱；
⑦拉氏研究所处历史时期的影响，同4小点。
六、有限效果理论
拉扎斯菲尔德的工作带来的媒介新视角：有限效果论或间接效果论。
•有限效果理论（limited effect theory）指媒介拥有最小限度或者有限效果，因为那些
效果被某种中介或插入变量减轻了。
•间接效果理论（indirect effects theory）指媒介看起来具有某种效果，但这种效果是
通过社会其它部分，例如通过社会团体中的朋友关系，而被”过滤”了的。
有限效果研究的一些重要概括：
1.媒介极少影响个人，人们不信任媒介时，会转向他人寻求建议或评论性的阐释
2.存在着媒介影响力的两级流动，舆论领袖不容易被媒介内容所操纵，是老练而有判断力的
媒介使用者，是媒介影响力的有效屏障
3.很多人会牢固忠实于一些团体的信念和行为，个别媒介讯息无力压倒它们
4.世界上不会被转变意见的人的数量是巨大的，只有很少人会被影响：这些人和对他有影响
的人之间的关系被切断，或者对团体的长期忠诚度被破坏。
七、态度改变理论
研究动机：1.二战中纳粹在欧洲的宣传努力的成功，挑战了关于人们的智慧的民主观点；2.
军队需要确定士兵在想什么并找到方法把他们从理智到情感地团结起来，去追求同样的目标
和理想；3.方便：士兵是容易追踪的研究对象。
霍夫兰和他的电影实验：
•军方宣传并不像假设的那样有威力，在影响态度和动机方面不太有效
•时间是态度改变的重要变量，态度会有缓慢改变的可能（睡眠效应）
•片面讯息对于那些已赞同此讯息的人更有效
•正反两面的陈述对那些持分歧视角者更有效，对受过更多教育者更加有效
霍夫兰的继续研究—耶鲁项目：
1953年《传播与劝服》
传播者：信源可信性，分为可信性和专业性。与态度改变呈正相关
传播内容：诉求的本来状态和诉求的组织方式
受众：群体成员身份和个人特质差异，可能影响到他们对劝服的“易感性”（susceptibility）
•更强的恐惧唤起（fear-arousing）的陈述将导致更大的态度改变；威胁的描述的生动程度、
受众的惊慌状态、对传播者的评价以及对话题的已有知识等也都能够减轻或加强态度改变。
•传播者的可信性、受众智力水平、话题的本来特性、对受众的重要性、受众与传播者之间
本来的一致程度，都能改变讯息的劝服能力。
•人们对他们成员身份评价越高，他们态度和所在群体越一致，也就越难被改变
•越聪明的人越有希望被劝服，如果他们接受的讯息基于可靠、有逻辑的论证。
态度改变理论优点：①深入关注讯息能够或不能产生效果的过程；②对于个体差异和群体关
系在塑造媒介影响力中的作用有所洞察；③关注选择性过程有助于阐明个人如何处理信息。
缺点：①对变量的实验控制，过高估计了它们的力量而过低估计了媒介的力量；②聚焦媒介
讯息中的信息，而没有关注更多当代的符号化媒介；③使用态度改变作为效果唯一量度，忽
视了强化和更微妙的形式的媒介影响力。
八、劝服研究实验方法的局限性：
1．人工设定的实验室中所得结论很难与现实生活的情境相联系；
2．实验不适于研究在数量巨大、异质化的人群中全部的媒介使用所累积的影响；
3．实验中其他变量并未像在调查数据分析中那样得到统计学意义上的控制；控制是通过从
实验室中排除变量和随机分配研究主体于控制团体实现的；
4．和调查一样，对于衡量随时间流逝的媒介的影响力来说，实验是一种非常粗糙的技术；
5．仍有许多变量是实验所无法探究的。
九、媒介效果研究成为焦点
20世纪50-90年代，效果研究居于媒介研究的主导地位。
大众媒介很少具有直接影响，它们需要经由（1）个体差异和（2）团体成员身份或关系的
中介。上述两个因素是对媒介影响力的有效屏障。
•个体差异理论（individualdifference）：个体的不同的心理上的构成，可以导致媒介影
响力在不同人之间的多样化。
•社会分类理论（socialcategories）：特定团体或集合体的成员身份会以或多或少统一的
方式回应媒介刺激。
十、选择性过程
态度改变理论的一个核心原则：认知一贯性的观念。（从拉式到克拉珀到德弗勒）
•认知一贯性（cognitiveconsistency）：人们会有意识或无意识地保持他们已存在的观点。
费斯廷格的认知不协调（cognitive dissonance）理论的原则性前提是：那些与某人已持
有的价值和信仰不一致的信息将会产生一种必须被减缓解除的心理上的不协调；人们通常会
努力使他们关于自身和世界的认识达到某种程度上的一致。
•选择性过程（selective processes）：选择性过程作为复杂和高度精密的过滤机制，使
我们屏蔽掉来自感官的无用数据，同时迅速识别和强调某些数据中最有用的模式，其形式有
三种：A）选择性暴露（selective exposure）：人们倾向于将自己暴露给那些与他们已有
的态度和信仰相一致的讯息；但从前那些能够避免或筛选讯息的媒介使用者在不断减少；B）
选择性记忆（selective retention）：人们倾向于最清晰最长久地记忆那些对他们最富有
意义的讯息；C）选择性认知（selective perception）：精神上或心理上对讯息的重塑，
这种重塑使讯息的意义与某人的信仰和态度相一致。
第七章 中层理论与有限效果范式的强化
一、综述
20世纪50s-60s美国电视业处于黄金时期，人们日常生活因电视发生了彻底改变。电视如
何影响这个国家和是否存在负面影响的问题上，在一些社会精英那里，大众社会理论重新以
新的形式浮现。这些担忧导致大量科研课题的诞生，如施拉姆的斯坦福研究队伍展开的对电
视对儿童影响的调查。
他们使用修正后的经验主义研究方法，但没有用一个单一的、表述清晰的理论框架来指导研
究，为了跟上有限效果范式，它使用了一堆早年研究的经验主义结论，包括选择性和个体差
异的概念，又与其他来源理论结合一起，包括弗洛伊德和行为主义理论。
所有的研究都是有代表性的（在某个特定时间点进行），施拉姆团队却试图从随时间流逝变
化的儿童发展中得出明确结论。（vs 班杜拉的儿童从媒介上习得攻击性的研究）
本章的经典研究见证了有限效果论越来越重要的地位和实用性。它们如施拉姆的研究一样，
展示了有限效果范式的威力和它生产具有直接实用价值的调查结果的能力。这些结果涉及关
于媒介角色的重要而麻烦的问题，但研究者总过于喜欢在关系不大的证据基础上发表笼统的
陈述并提出建议。关于媒介只有有限效果的观点就是一个让各类基金会、企业和政府的资助
者都感到宽慰的观点。
二、建立范式
库恩：尽管范式转换依靠重要人物的灵感，但巩固一个创新性观点的必要基层工作是由技师
们完成的，它们从事单个项目的研究，每个研究又组成建造该范式的一部分。
有限效果范式成为主导性研究范式的条件：
1．20世纪50s末，社会研究者为无数概念和调查结果苦恼，有限效果范式的出现很快受到
经验主义研究者的欢迎；
2．团体、基金会、政府的赞助都使其进一步合法化。
反对者：赖特·米尔斯：“抽象的经验主义”，认为它抑制了“社会学的想象力”，试图使
现状合法化，过于保守和过于约束。
三、罗伯特·默顿：范式制订大师
默顿在涂尔干和马克思的宏观社会学理论传统的世界以及拉式、霍夫兰和施拉姆从事的微观
社会学观察世界之间架起了桥梁。他认为，经验主义研究只有最终构建起一个抽象理论才算
成功。默顿发表了《社会理论和社会结构》（1949）和《关于理论社会学》（1967），提出”
中层理论”的定义，为新的范式提供了概念上的基础。与宏大的社会理论不同，中层理论仅
仅试图解释已经或能够被经验主义研究作为对象的有限范围内的行为。
默顿对中层理论的描述：①中层理论性由一些有限的假设组成，从这些假设中可以有逻辑地
得出一些特定的假想，并由经验主义的调查研究予以确定；②这些理论并不互相独立，而是
被并入更广阔的理论构架中；③这些理论足够抽象，能超越纯粹的描述或是经验主义的归纳；
④中层理论对忽视与无知敢于承认并加以说明和描述。
默顿认为所有这些研究工作最终会汇集在一起，首先形成一系列的中层理论，然后构建一个
像自然科学理论那般拥有强大能力和范围的全面的理论。
四、功能分析的方法
默顿《社会理论和社会结构》提出“功能分析范式”
•功能分析（functionalanalysis）：假定一个社会能够被看作是一个“平衡的系统”，也
就是说，社会包含着许多复杂的相互关联的行为，这些行为中的每一个都对其他行为构成支
持；任一种社会行为的形式都被假定为在扮演某种角色来维持这个系统的整体性。（价值中
立）
–显性功能（manifest functions）：预料中的可以稳定观察到的媒介使用结果；
–隐性功能（latent functions）：非计划中的不易观察到媒介使用结果。
功能分析的优点：①将媒介及其影响力投入更广大的社会体系中；②提供了关于媒介在社会
中的角色的平衡观点；③建立在经验主义研究的基础上并指导了经验主义研究。
缺陷：①过于接受现状；②负面的隐性功能易于被正面的显性功能所”平衡”； ③几乎无
法让人对媒介整体上的有效功能或不良功能下任何确定性的结论。
默顿所发展的结构功能分析方法被人称为经验功能主义,它有3个特点：①把结果层次的功
能分析转变为方法层次的功能分析；②把功能分析中理性主义的、抽象的方法转变为更具经
验性的中层理论指导的方法；③把社会的静止图景转变为动态图景。
典型的中层理论主要包括角色冲突、参照群体、社会调适性、规范的形成、异常行为与社会
控制等。
五、信息流理论
•信息流的广义定义是指人们采用各种方式来实现信息交流，从面对面的直接交谈直到采用
各种现代化的传递媒介，包括信息的收集、传递、处理、储存、检索、分析等渠道和过程。
•信息流的狭义定义是从现代信息技术研究、发展、应用的角度看，指的是信息处理过程中
信息在计算机系统和通信网络中的流动。
50s大量调查和实地研究评估媒介向大众传递信息的过程的有效性。模仿了说服研究的模
式，但研究的不是态度改变而是信息是否被获取。使用的不是控制实验，而是调查统计。
说服研究已找到大量对说服构成障碍的因素，新闻流的研究主要关注类似障碍因素是否会阻
碍从媒介到受众的信息流动。调查的障碍因素包括教育水平、为获取新闻使用媒介的数量、
对新闻的兴趣和跟他人谈论新闻的兴趣，还区分了软硬新闻。
•信息流理论（informationflowtheory）：关于信息如何从媒介流向受众并希望获得特定
预期效果的理论，是一种简单化线性的信息来源主宰论。它首先是针对传播效果的研究成果，
它有助于传播者更好地组织传播文本和形式，以达成其想要的传播结果。一个成功的公众信
息活动，也就是一个效果显著的传播活动，它在包含让受众得到讯息的同时，也要确保讯息
被正确理解。而讯息的价值观和意义则不在该理论的讨论范围内。
•信息来源主宰（source-dominated theory）：从一些精英信息源的观点出发衡量传播过
程的理论。
信息流理论的优点：①检验现实世界中大众传播的过程；②为成功的公众信息活动提供理论
基础；③识别妨碍信息流的障碍物；④帮助理解危机时刻的信息流情况。
缺陷：①是简单化的、线性的、信息来源主宰论的；②假设民众是无知的、漠不关心的；③
没有考虑到对于接受者来说信息的效用或价值；④过于接受现状。
六、信息扩散理论（information diffusion theory）
1962年，罗杰斯综合了信息流研究的成果，以及包括人类学、社会学和乡村农业推广工作等
若干领域内的信息流研究和个人影响的研究，发展出他所谓的扩散理论。他汇集了大量经验
主义研究的数据来证明，当技术创新问世后，在被广泛采纳之前必须经历的几个阶段：①从
大众媒介中获知；②革新派和早期采用者接受；③舆论领袖从早期采用者那里了解并开始试
用；④舆论跟随者的效仿；⑤多数人的使用带动滞后者。罗杰斯的媒介观认为大众媒介是非
常有限的；媒介的作用主要是用来增加人们对创新的认知；只有早期采纳者才会直接受到媒
介的影响，其他人都是在被别人影响后才去接受创新的。
罗杰斯在1962年和休梅克通过深入调查农村中新事物的采用和普及过程，出版了《创新的
传播》一书，对“二级传播”理论做了重要的补充。其主要的观点包括：
（1）大众媒介与人际传播的结合是新观念传播和说服人们利用这些创新的最有效的途径，
大众传播可以较为有效的有力的提供新信息，而人际传播对改变人的态度与行为有力。
（2）认为“创新扩散”过程至少包括四个环节：知晓（了解）、劝服、决定（决策）、确
认（证实）。
（3）认为大众传播早期过程比以后更有影响，传播过程呈“S”形曲线，即在采用开始时
速度很慢，当其扩大至居民一半时速度加快，而当其接近最大饱和点时又慢下来。
（4）大众传播和人际传播的结合是新事物的传播和说服人们采用它们的最有效途径。
信息扩散理论的优点：①综合大量经验主义的调查研究结果，形成有用的理论；②为行动提
供实际指导。
缺点：①是线性的，信息来源主宰的；②低估了媒介的力量；③让不情愿的人被动地参与。
七、克拉珀的现象主义理论
克拉珀在1960年出版了他在1949写的手稿《大众传播的效果》；该书是50年代中期所有重要
媒介效果研究结果的编辑和综合；克拉珀关心的问题是普通人对媒介力量的过于夸大。
现象主义理论（phenomenistic theory）：媒介几乎没有什么直接的效果，并且在与其他
的社会和心理因素诸如社会地位、团体成员身份、强烈的态度、教育等相比时，力量微乎其
微。①大众传播通常不作为受众效果的必要且充分的原因发挥作用，与其他的因素相比，作
用很小；②大众传播在强化现存条件的过程中，往往是构成促进作用的原因之一，而不是惟
一原因。
克拉珀的理论现在通常被认为是强化理论（reinforcement theory），因为它认为媒体的
首要影响是强化而不是改变现存的态度和行为。
克拉珀的结论主要建立在拉式、霍夫兰等人的研究基础上，而当时的研究媒介环境不包括电
视以及应对电视而改革过的报纸广播和电影工业。
随电视的到来，媒介越来越符号化而非信息导向，并产生可能错误的结论，此外二战后的美
国与二战前也大不一样。克拉珀的“中介性变量的紧密联系”（教会、家庭和学校）也开始
失去它们在人们社会化中的权威地位。最后克拉珀可能错误地将强化等同于没效果。
八、门德尔松和大众娱乐理论
1966年《大众娱乐》对电视娱乐在美国社会中的角色的考察。
哈罗德· 门德尔松认为批评家太过家长作风和精英作风，夸大电视娱乐的重要性和长期后
果。他提出大众娱乐理论（massentertainmenttheory）：认为电视以及其它大众媒介因
为使普通人放松或得到娱乐而实现了重要的社会功能。如果没有电视娱乐，人们也会寻找其
它途径舒缓日常生活的紧张。电视只是比其他途径更容易更有效地满足了人们的需求。
九、精英多元论
•精英多元论（elite pluralism）：媒介中的政治信息除了向一些早已通晓政治和参与政治
活动的人提供信息之外，几乎不能达到其它目的；这些人将会聪明地代表所有其他人。
这一论点部分源自拉式的选民研究，拉式假定经典民主理论应被经验主义研究的新视角所取
代。经典民主理论假定每个人都应该见闻广博并具政治活跃性。而新视角则显示普通人不太
知道或不太在乎政治。
认为选民的冷漠无知并不一定对整体的政治体系构成问题，一个大多数人基于长期的政治承
诺和联盟关系进行投票的政治体系将会是一个稳定的体系，哪怕这些承诺基于偏见和与亲朋
好友的情感纽带。
V.O.凯在《公共舆论和美国民主》（1961）强调了美国政治体系的优势和持久的价值。
精英多元论否定了自由主义的观念，认为媒介从稳定的名义出发应该加强政党忠诚度，并帮
助政党发展和维持大量的选民联合体。不应该期望媒介引导舆论，而是应该强化舆论。
优点：①解释了一个稳定的美国社会和政治体系；②基于大量经验主义调查的数据；③发展
的不错并令人信服的理论。
缺陷：①把认为美国政治不民主的观点合法化；②大大超出经验主义研究所提供的证据的范
围来得出结论；③过于接受现状；④为普通人及其媒介的使用描绘负面的图画。
十、米尔斯和《权力精英》
米尔斯认为，在美国社会，政治力量并没有在范围广泛的团体中散布；相反，政治力量集中
在一小群军界商界联合体的领导者手中；这些精英不是多元团体的代表，确切地说，是与多
元团体隔离并反对他们的利益的。
在米尔斯和凯的追随者之间进行大约十年的斗争，凯一方从政府和私人基金会获得丰厚的资
金保障，成功捍卫了自己的主张。当美国转向越南的共产主义威胁时，精英多元论的批评者
沉默了。
十一、有限效果范式
假设：
①经验主义社会研究方法能被用来通过归纳研究而形成理论；调查、描述研究〉经验主义结
论〉中层理论〉广泛有力的社会理论；
②大众媒介在社会中的角色是有限的；媒介首先会强化现有的社会趋势，几乎很少发动社会
变革；
③大众媒介在个人生活中的角色是有限的；它提供了一个方便且廉价的娱乐和信息来源，但
无论娱乐还是信息都没有对大多数人的日常生活构成长期或重要的影响；
④美国的政治和社会体系稳定、公正。
缺陷：
①调查研究和实验都有严重的方法论上的局限。
②由于方法论的局限，低估了大众媒介对社会对个体的影响。由于缺乏测量方法，忽略了多
种媒介效果。
③主要关注媒介是否具有即时的、强大的、直接的效果，而忽略了其他类型的影响。
•杂散效应（spuriouseffect）：对某个现象的某项调查研究中的一个发现结果只存在于这
项研究中；是一种研究假象。
贡献：
①有助于减轻要求政府直接审查媒介的压力，允许媒介从业者贯彻适用的自我审查方式(对
于媒介而言是好的）
②展示了经验主义研究的实用性和效用，并在其激励下，形成了创新性的数据收集方法和分
析技巧。（对于研究本身的发展是好的）
③为50-60s的研究提供了一个有用的框架（结构是好的）。
第八章 挑战权威的范式：儿童、系统与效果
一、综述
二战后美国出现的媒介研究的新视角：
①系统化的科技方法应用于传播领域研究，形成系统理论（systemstheory）：考察由互
相关联的部分组成，为达到某种目标而共同作用的大众传播过程的理论。
②心理学家从微观的个人角度解释某些社会动荡，关注人们（特别是儿童）通过大众媒介（特
别是电视）学习的方式，最终形成社会认知理论（socialcognitivetheory）：通过与环境
的互动而进行认知的理论，涉及行为、个人因素和环境事件之间的互相因果关系。
二、关注儿童和暴力
背景：电视的普及；技术进步的同时，美国由农业社会转变为高度城市化的国家；战后人们
休闲时间和收入的增加；消费品在市场的竞争，广告需求量的增加，给电视媒介提供了经济
基础；战后婴儿潮，到60s处于少年期，青少年人数迅速膨胀，随之而来违法犯罪现象急
剧增长；社会运动尤其民权运动和反越战运动，保守的父母与自由主义的孩子间的代沟；对
年轻人而言，家庭、学校和教堂的作用越发不重要，而媒介和同龄人成为主要的影响来源。
60s晚期，关于媒介在鼓动社会不稳定和煽动暴力方面的作用的争论达到顶点，总统约翰逊
在1968年设立了“美国国家暴力起因与防止委员会”，报告《暴力与媒介》对媒介提出严
肃批评。1969年联邦政府建立“电视与社会行为卫生局长科学咨询委员会”对电视效果进
行广泛研究，来判定电视对儿童行为是否具有重要影响，但其对结束争论作用微乎其微。
70s发展起来的“儿童电视行动组织”（ACT）。最终业界同意严格节目标准，限制暴力内
容。
三、电视暴力理论
暴力研究的最重要成果是形成一套中层理论，总结了前期的研究发现，并对媒介在儿童生活
中扮演的角色提供了有益的见解。
（一）宣泄理论（catharsis）：又被称为净化，指认为通过观看经由媒介传递的暴力内容
可以满足或减少人们天生的暴力冲动的观点。
“宣泄”一词源自亚里士多德解释观众对希腊悲剧的反应，它有基于传统而非观察的学术合
法性，其次意味着电视暴力为年轻人被压抑的攻击性和敌意提供了无害的出口。
最终社会学家认为一定媒介暴力内容能减少观看者随后的暴力倾向，但宣泄并非原因所在。
人们转向社会认知理论。
（二）社会学习
•社会学习（social learning）：包括模仿和认同，解释人们怎么在他们的环境里通过观
察他人而学习的理论。
①模仿（imitation）：对观察的行为的直接再现；
②认同（identification）：模仿的特殊形式，是从具体行为中进行归纳之后对模型的复
制，源于对与模型在广泛意义上的品质相类似的愿望和尝试。
米勒和多拉德认为，人们能够模仿他们看得见的行为；那些行为能够被强化并因此被学会。
这个理论描述了一个传统的“刺激-反应”学习的有效形式，但无法解释人们通过观察而非
世纪行为加强学会新反应的技能。
•社会认知理论（social cognitive theory）：认为观察者能获得行为的符号表征，这些
“图像”为他们提供了信息，他们随后的行为是基于这些信息的理论。
优点：①媒介和行为之间的因果关系得到展示；②适用于若干种观众和观看的情境；③有强
大的解释力（如情感宣泄、暗示）。
缺陷：①实验室研究的结果是否具有概括性还存疑问；②实验室研究可能高估媒介威力；
③很难解释媒介消费的长期影响；④低估人在使用媒介中的讯息时的积极性；⑤过于狭隘地
关注对个人的影响而不是对文化的影响。
四、来自大众媒介的认知
传统的学习理论：操作学习理论（operant learning theory）：早期的行为学家发展起来
的理论，认为人们在面临刺激物（环境中的东西）时会学习新行为，对那些刺激作出反应，
这些反应随后会得到肯定的或否定的加强。
•行为库（behavioral reperotoire）：个体在特定的境况之下可使用的习得的反应。
•建模（modeling）：通过观察获得行为模式。
这是一个低效率的学习形式，因为我们可以在各种环境中观察这些刺激、反应和加强的行为
链，并把它加入我们的行为库中。从大众媒介中建模是一种有效的、可以学习大量行为和问
题解决办法的方式。
通过观察环境进行学习是社会认知理论的基础。人们在环境（例如大众媒介）中获得的经验
能影响人们的行为，而这种影响又受到这些人的各种个人因素的影响（Albert Bandura）
通过媒介表征获得社会认知的方法：
①观察学习（observational learning）：对某行为的观察足以学会那种行为；
②抑制效果（inhibitory effects）：看到模型由于做出某种行为受到了惩罚，足以减小
观察者也这样做的可能性；
③去抑制效果（disinhibitory effects）：看到模型因为做出恐怖行为或违禁行为而得到
嘉奖,会增加观察者做出同样反应的可能性；
④替代性强化（vicarious reinforcement）：通过观察而非直接经验得到的强化；强化相
倚（reinforcement contingencies）：与特定的强化刺激有关的或正面或负面的价值。
⑤攻击暗示（aggressive cues）：包含在媒介对暴力的描绘中的信息；它建议或暗示针对
特定的受害者进行攻击的恰当性。媒介对暴力的描述经常具有戏剧化的语境，这些语境提供
了信息或暗示，告诉观众什么时候对什么人采取暴力是可以接受的。
⑥启动效应（priming effects）：媒介对行为的呈现增加了人们在真实世界里对那些事情
产生相似想法的可能性。
五、媒介暴力的语境
班杜拉1994年总结断定电视观众“会获得持续的态度、情绪反应和行为倾向，对象是和已建
模的情绪经验建立起联系的人、地方或其他东西”。
詹姆士·波特指出七个重要语境变量：奖赏/惩罚；后果；动机；现实性；幽默；对媒介人
物的认同；激发。
六、积极的电视收看理论
丹尼尔·安德森和伊丽莎白·洛奇认为，观众在总体上是积极地、自觉地去理解电视中的内
容的。该理论假定，理解引起注意力，从而导致观看的效果。
•收看图式（viewingschema）：帮助观众理解媒介内容管理的解释技巧。
七、发展的视角
发展的视角（developmentalspective）：关于对媒介的学习在儿童生活中区分为不同的
智力和交流阶段，影响了媒介互动和效果的观点。
八、传播过程的系统论
对系统的兴趣适于电子工程师，二战后系统论作为一种可使宏观和微观现象都形成概念的方
法，激起社会理论家的兴趣。
•系统（system）：由互相关联的、能通过传送和反馈回路彼此影响和控制的部分组成。
•控制论（cybernetics）：对复杂的系统中的调节与控制的研究。
•信息论（information theory）：将信息流的机械观念应用到对一切通信形式的理解上。
系统模式应用于人类传播容易过于简单和静态。
大众传播理论领域里，系统模式取代了早期的线性传播过程模式（5W→韦斯特利-麦克莱恩
传播过程模式）。革新的传递模式：传统的信息传递模式中，信源控制着主动权，信息从信
源经由媒介流向接受者，并对接受者产生某种效果（通常该效果受控于信源的意图）；是一
种线性的传播模式。革新的传播模式，如韦斯特利-麦克莱恩传播过程模式，则提出了带有
反馈回路的传播过程模式，其中信息接受者可以影响信源，它们互相之间的影响也可以实现。
优点：①通过概念化可运用于宏观和微观；②将通信作为一个过程表现出来；③可用来模拟
无限多的通信过程；④使大众传播理论超越简单的线性效果观。
缺陷：①很难评估因果关系；②过于简化复杂的通信模式；③被认为是过于机械论和非人性
的；④关注可观察的结构，忽视通信的实质；⑤不简约。
系统模式的批判者：
人文主义学者：认为其非人性化和过于简单化，系统模式只不过是精心阐述的隐喻，不能充
分表示出人类或社会的复杂互动关系。
社会科学家：认为研究重点应该集中于因果关系的解释和预测上。解释因果关系和确认有效
的动因是有限效果范式的核心，许多社会研究者认定其为科学方法的精髓。认为系统模式是
不见有的，包含太多不必要的变量和过于复杂的相互关系。
第四部分 当代大众传播理论——寻求共识、面对挑战
第九章 大众传播的批评和文化理论的兴起
一、综述
50-60s媒介研究的文化转向：两分法
文化研究理论：微观的、阐释性的理论，关注个人与社会团体如何运用媒介来创造和培育构
筑我们日常生活的文化形态。
政治经济学理论：宏观的、结构性的理论，关注社会精英如何运用它们的经济权力来控制和
利用媒介实践。
二、批判理论
1．公开支持某种价值观，并用这种价值观来评估和批评现状的理论。
2．将大众媒介和大众文化与各种社会问题联系在一起。
优点：①具有政治基础，是行动导向的；②通过理论和研究来计划现实世界中的变迁；③提
出关于媒介控制和媒介所有权的重大问题。
缺陷：①过于政治化，呼吁的行动太主观；②通常缺乏科学证明，建立在主观观察的基础上；
③当致力于科学证明的时候，经常使用具有创新性但有争议的方法。
三、文化理论在欧洲的兴起
理论来源：马克思主义→新马克思主义；
解释学（对宗教和文学文本的人文主义批评的传统）：文本分析与文学批评
发展：早期：30s 德国法兰克福学派
后期：60-70s 英国伯明翰学派和政治经济学派
文化研究理论优点：①关注个人怎样对社会形成理解；②就媒介的角色提出重要的问题；③
尊重受众消费内容的能力。
缺陷:①几乎不具有宏观层面的阐释力量；②过于狭隘地关注个人效果而不是社会效果；③
通常缺乏科学证明，建立在主观观察的基础上；④当致力于科学证明时，常采用非传统的研
究方法。
四、信息传递观点和仪式观点
詹姆士·凯里将有限效果范式和文化研究的对比：前者关注的准确的信息从一个支配性的来
源传递到被动的接受者的过程；后者关注的则是我们赖以建构和解释我们经验的日常仪式。
•仪式观点（ritual perspective view）：把大众传播看作现实得以产生、维持、修复和
转换的共同信仰的表现。
五、符号互动理论
20-30s由米德创立，早期称为社会行动主义，1969年布鲁默命名为符号互动理论。
我们通过互动从日常生活经验中学习社会角色，慢慢地将这种规则内化于我们的日常生活，
并依此建构我们的行为。
我们用符号生成我们对意识的经验（心灵），我们对自己的理解（自我）以及我们对宏观社
会秩序的知识（社会）。
《传播与社会行为：一种符号互动的视角》（1978）就符号互动和传播提出三个命题：
①人们对环境的理解和认知依赖于传播；②传播在被自我、角色和情境等概念指引的同时也
指引着这些概念，这些概念形成了在环境中的期待和对环境的期待；③传播包括“动作、互
相依赖、互相影响、意义、关系以及情境因素”的复杂互动。
五、对现实的社会建构
所有文化研究理论共同的根本假设：我们对于现实的经验是一个进行中的社会建构，而不仅
仅是某些权威或社会精英发送或传送给顺从的公众的东西。受众不只是被动地接受和储存信
息，而是积极地处理和重塑信息，并只储存符合文化需求的东西。
舒茨：现象学（phenomenology）：关注个体对物理世界和社会的体验。
典型化（typifications）：使人们将物体和行为快速分类并建构自己的行为作为回应的“心
理图像“。
彼得·伯格和托马斯·卢克曼的《现实的社会建构》（1966）
符号互动理论和现实社会建构理论对符号（signs）和象征（symbols）的定义正好相反。
第十章 媒介和受众：关于媒介在日常生活中所扮演的角色的理论
一、综述
70-80s，经验主义研究者和文化研究者越来越关注媒介受众。随研究的深入，人们发现受众
并不像想象的那样被动。早期的媒介研究并未全然忽略负责任的受众行为的可能性，但对受
众选择、解读和使用媒介内容的关注并不充分。受众中心理论在早期发展阶段，因为对“功
能”和“功能主义”的混淆以及方法论和理论上的争执而受阻。
功能分析（受众中心理论基础）；使用与满足理论（起源成熟和发展）；受众中心理论的重
要概念；接受研究和框架理论（人们如何获取意义）；信息处理理论（个体如何通过有意识
和无意识的信息处理从媒介讯息中获取意义）。
二、受众理论：从信息来源主宰论到积极的受众观点
赫佐格《日间连续剧听众的动机和满足》（1944）首次深入研究媒介满足问题。
施拉姆的《大众传播的过程和效果》（1954）选择分子式（fraction of selection）：
回报期望值/必需的努力
三、早期研究的限制：
30s政府、私人基金会和媒介产业很少愿意提供资金研究积极的受众理论；
40-50s研究人们使用媒介的原因是相当困难，可运用的科学方法相对匮乏，或不符合科学标
准，缺乏客观性；早期的受众研究被认为过于描述性。
四、媒介功能和媒介使用的混淆
60s积极的受众和寻求满意度的受众的概念被接受，但同时与功能分析混淆在一起。
赖特在1959年教材里明确把积极的受众与功能主义联系在一起：媒介四功能论。虽然他提醒
读者区分“社会活动的后果（功能）与活动背后的目的或意图”，但大部分学者却假设功能
等同于媒介产业的目的或意图。功能主义逐渐等同于对现状的合法化（第七章），积极的受
众理论也被认为是使现状合理化。
例如媒介四功能说，也许这些是特定媒介组织的目的，但不必然是服务于媒介消费者的功能，
可能和受众的使用意图相异。
预期的功能与可观察到的效果之间的差距使媒介研究者开始怀疑功能分析与积极的受众理
论。
五、使用与满足理论的复兴
第一次复兴的三个发展阶段：
1．新的调查研究方法和数据分析技巧，使研究和解释受众的使用与满足的新策略得以形
成；
2．70s一些媒介研究者越来越认识到，人们对媒介的积极使用可能是使效果或多或少显现
出来的一个重要因素；
3．效果研究过于关注无意中的、消极的媒介效果，而忽略了对媒介有意的、积极的使用。
第二次复兴源自互联网的发展和新的媒介特性：
交互性（interactivity）、去一体化（demassificaiton）、异步性（asynchroneity）
六、积极的受众理论修订
布鲁姆勒（Blumler）宣称（1979），使用与满足研究方法传统的发展赋予了“积极行为”
的概念以“大量的意义”，包括：
•效用（utility）：媒介对人们有用，人们使用媒介的用途。
•意图（intentionality）：人们预先的动机指引着对媒介内容的消费。
•选择性（selectivity）：人们对媒介的使用可能反映了他们现有的兴趣和偏好。
•抵制影响（imperviousness to influence）：受众是顽固的，他们可能会积极躲避特定
媒介的影响。
但没有考虑选择媒介之后的实际情况。
受众新的积极行为：人们给内容积极添加意义，建构新的意义来服务于自己的意图，而不是
听从讯息制造者和发行者的意向。
积极行为（activity）vs积极性（activeness）：前者更多是指受众的所作所为，后者更
多是指人们思想上的使用与满足，也就是受众在大众传播中的自由和自主权。
五个基本假设：
1. 受众是积极的，是带着意图使用媒介的。
2. 受众选择特定的媒介获取需求的满足，动机和他或她本身有关。
3. 媒介与其他资源竞争，满足受众的需要。
4. 人们对自己如何使用媒介、兴趣和动机所在，都有足够的自知之明，能够向研究者提供
如何使用媒介的精确描述。
5. 受众将需求和特定的媒介或内容联系起来形成的价值判断应该暂时不予考虑。
卡茨、布鲁姆勒和古尔维奇（1974）认为，人们身处的“社会情境”与“和媒介相关的需求
的产生有关”，可通过以下方式表现：
1. 社会情境造成的紧张和冲突，导致人们通过消费媒介来缓解压力。
2. 社会情境使你意识到需要关注的问题，然后从媒介中搜索相关的信息。
3. 社会情境可能消除现实生活中的机会，媒介成为替代品和补充品来满足特定的需求。
4. 社会情境经常导致特定的价值观，通过消费相关的媒介内容能够进一步肯定和加强这些
价值观。
5. 社会情境期待你对媒介有一定的熟悉程度，这样才能维持自己在某个特定社会团体中的
成员地位。
七、使用与满足
使用与满足研究方法与效果研究的结合：温道尔、布卢姆勒、鲁宾
优点：①集中关注大众传播过程中的个体；②尊重媒介消费者的智力和能力；③对于人们怎
样体验媒介内容进行富有洞察力的分析；④将对媒介的积极使用和消极使用区分开来；⑤把
媒介使用当作日常社会交互的一部分来研究；⑥对新媒介的使用提供有用的洞见。
缺陷：①对功能分析的依赖导致对现状的倾向性；②不容易解决效果存在与否的问题；③对
关键概念的衡量法遭到批评；④过于微观层面的分析。
八、接受研究的发展：解码和获取意义
来自英国文化研究者，与受众中心理论不同但相容。
1.斯图尔特·霍尔的报告（1973）认为：研究者应关注①分析内容产生的社会和政治语境（编
码）；②对媒介内容的消费研究，即日常生活语境（解码）。
2.霍尔的接受研究方法（reception studies）：受众中心理论，关注不同类型的受众怎样
理解特定形式的内容，又称接受分析。
3.霍尔认为大部分文本都可以用不同的方法解读：①倾向性解读（preferred reading）或
主导性解读：在批判理论中，指内容的生产者倾向于人们去解读的意义；假定能用来稳定目
前社会状态；②协商解读（negotiated reading）：在批判理论中，指受众对内容进行与
倾向性解读有巨大差异的个人的意义解读；③对抗性解读（oppositional reading）：指
受众对内容的解读与主导性解读完全相反。
接受研究的三阶段（pertti alasuutari）：①霍尔的编码与解码；②莫利的创新性的受众
人种学研究；③研究的目的从单个的受众个体或解读节目改变为对当今媒介文化的把握，特
别是媒介在日常生活中所扮演的角色，及其大的框架问题。
优点：①集中关注大众传播过程中的个体；②尊重媒介消费者的智力和能力；③承认媒介文
本中意义的范围；④试图深度理解人们如何解读媒介内容；⑤对媒介在日常社会语境中使用
的方法提供有洞察力的分析。
缺陷：①通常基于受众报告中的主观解释；②不能解决效果存在与否的问题；③定性研究排
除了对因果的解释；④过于微观层面的分析。（但正试图变得更宏观）
九、女性主义接受研究
珍妮斯·拉德威（Janice Radway）：女性读者对浪漫小说的对抗性解读(1984)；
琳达·斯坦纳（Linda Steiner）：女性对《Ms.》杂志的对抗性解码(1988)
十、框架理论和框架分析
80s的美国，一种受众研究的新方法成形。其理论基础就是符号互动和对现实的社会建构（第
九章）。这些理论认为，我们对自己或别人或社会的期望是社会生活中的一个基本因素。我
们的期望（1）以先前习得的某种经验为基础；（2）不那么容易改变，即使它们与许多事实
相抵触；（3）经常与强烈的情绪联系在一起并激发这些情绪；（4）可能不受意识的控制。
欧文·戈夫曼（Erving Goffman）的框架分析理论：
•框架分析理论（Frame Analysis）：关于人们如何使用期望和预测来理解日常生活的意义
的想法；戈夫曼认为我们会在不同的时间空间里，经常性地大幅度地改变我们对境遇、行为
和他人的定义或典型化。
•社会暗示（social cues）:在框架分析理论中指环境中的信息昭示着变迁或行为转变；戈
夫曼认为，我们在使用媒介的过程中学会的社会暗示也会被用来区分日常生活中不同社会场
景的边界。
•框架（frame）：指在某个特定时间用来理解社会境遇的一套特定的期望。（与伯格和卢克
曼的典型化图式类似）
•调低档和调高档（downshift and upshift）：用更严肃或更不严肃的态度来对待和体验
身处的境遇。
•首要现实（primary reality）：在框架分析理论中，指人和事都遵守特定的惯例和被普
遍接受的规则所构成的现实世界。戈夫曼认为，社会生活一种不断进化和改变的现象，但我
们仍旧以极大的连续性来经历它；尽管我们有能力不断重构我们的经验，但大多数人的经验
还是连续的、常规的。
戈夫曼的理论的宏观拓展：（1）关注构形发生的社会和政治语境；（2）从媒介中学会的框
架会对社会和政治造成什么样的长期后果等等。
优点：①关注大众传播过程中的个体；②微观层面的力量，但可轻易应用于宏观层面的效果
问题；③非常灵活开放；④与最新的认知心理学发现相符。
缺陷：①缺乏专一性；②不能解决效果存在与否的问题；③定性研究方法排除了因果解释；
④假设个体频繁犯构形错误；低估个体的能力。
十一、信息处理理论
信息处理理论（information processing theory）:对机械论进行类推，描述并解释人们
怎样处理接受到的所有刺激。一些心理学家认为，许多认知处理机制对于人类在社会关系中
的适应和生存至关重要。
①个体发展出一种复杂的机制来筛除无关或无用的信息；
②承认有意识认知的局限性。文化重视有意识思考的过程，而怀疑不由意识控制的或不与此
直接相关的心理处理的有效性。
处理电视新闻的信息处理范例：①人们习惯使用常规性的图式（schemas），消极地处理电
视新闻；很少对新闻内容进行深刻的思考；②电视新闻的视觉信息过于强大，压倒语言信息；
节目混编复杂。
卡茨和布鲁姆勒的《大众传播的使用》（1974）：
１）拒绝绝对的受众观；我们对受众积极行为的强调不应该等同于充分并简单了解受众的自
治能力；
２）社会角色约束着受众的需要、机会和选择……个体是社会结构的一部分，他或她的选择
比粗糙的满足学说所假设的情况更少自由度和任意性；
３）文本在某种程度上也是有限制的。
第十一章 关于媒介、文化和社会的理论
一、综述
本章中除了麦克卢汉和社会市场理论外，所有理论对当代媒介及社会角色的评价都是负
面的。一些理论认为媒介产业主要是商业性公司，几乎不向公众提供服务（如知识鸿沟和涵
化理论）另一些理论认为，媒介通常会破坏像政治或教育这样的重要社会制度（如沉默的螺
旋理论、媒介系统依赖理论、新闻生产研究）。
尽管这些媒介理论都持否定论调，但不应和大众社会理论相混淆。这些媒介理论中关于
文化的概念远比大众社会理论中核心的关于高雅文化的精英概念更为复杂。它们通常认为个
体是积极的，媒介不会操纵被动的个体，相反媒介的力量在于它能提供交流服务，个体可以
常规性地使用它，同时它对维持我们的社会秩序发挥关键作用。
另一方面，某些理论认为大众媒介已经将文化变成了商品（文化商品化），正在腐蚀政
治制度（媒介入侵理论）。我们的媒介体系的结构和内容不仅反映了也同时创造了我们在整
体上的社会结构和文化。
二、哈罗德·英尼斯：传播的偏向
英尼斯是最早对传播媒介和特定历史时期的社会结构形态之间可能存在的联系进行系统而
详尽的思考的学者之一。
社会秩序结构依赖于在当时拥有的媒介技术；媒介技术的发展使得集中在一起的精英们对空
间和时间的权力逐渐增强。
作为政治经济学家，他对中央集权抱有深刻的怀疑，并且相信新的传播技术形式将不可避免
地导致更大的权力集中。他将此称之为传播的偏向（bias of communication）；由于这种
偏向，来自非中心地区的人和资源不可避免地为处于”中心”的精英们所剥削并为他们的利
益服务。
三、马歇尔·麦克卢汉：媒介即讯息
麦克卢汉的理论假设：传播技术的变化将不可避免地导致文化和社会秩序的深刻改变；由于
他认为技术将不可避免地改变人们如何思考、社会如何结构和文化形态等方面，所以他也被
称为技术决定论者（technological determinist）；
地球村（global village）：即时的电子媒介把整个世界捆绑自来形成大的社会、政治和
文化体系时出现的新的社会组织形式；
人的延伸（the extension of man）：认为媒介在时间和空间上延伸了人的视觉、听觉和
触觉；电子媒介为普通人展开了新的景象并使他们瞬间到达各地；相反的评论：无处不在也
意味着到处都无-再也没有空间的感觉。拥有通往信息的各种渠道并不等同于能够有效地选
择和使用信息。
优点：①全面广泛的；②宏观层面的；③与普通公众有共鸣；④提升流行媒介内容的文化价
值；⑤介绍新兴电子媒介而享有长久生命力。
缺陷：①无法由经验主义研究证实；②对技术的影响力过分乐观；③忽视很多重要的效果问
题；④呼吁进行非线性思考遭到批评；⑤对电子媒介进行过度辩护。
四、社会市场理论(social marketing theory)
70s早期开始形成，它不是统一的思想整体，而是关于推广精英们认为具有社会价值的信息
的中层理论的集合体。
社会市场理论是一门指导性的理论，本质上是消息来源控制论；它假设存在某个善意的信息
提供者，此人试图带来有用的和有益的社会变化；社会市场理论给这样的信息提供者一个理
论框架去设计、实行和评价信息活动。
近来，该理论越来越关注受众的主动性，并认为应该向积极的受众提供他们所寻求的信息来
满足他们；根据受众对信息的需求可以确定谁是目标受众，然后在刺激受众寻找、组装和发
布信息方面提出建议，使受众更容易获得和使用信息。
社会市场理论也可看作是劝服理论（第六章）和扩散理论（第七章）的逻辑延伸：通过更好
地理解与操纵社会和心理因素，努力增强基于大众媒介的信息活动的有效性。
社会市场理论的组成：①促使受众知晓活动主题的方法，如利用流行的和新的媒介形式；②
锁定特定受众群发出讯息的方法；③在目标受众群中加强讯息，鼓励这些人通过面对面的沟
通影响其他人的方法；④培养受众对人、产品或服务的形象和印象的方法；⑤激发受众的兴
趣，诱引他们去搜寻信息的方法；⑥诱引受众做出所需决策或定位的方法；⑦激活受众群的
方法。
优点：①为媒介活动提供实用建议；②可用于服务好的目的；③建立在态度改变和扩散理论
的基础上；④被媒介活动策划者和研究者所接受。
缺陷：①由消息来源控制；②没有考虑到活动的目的；③低估普通人的智力；④忽视对信息
的相互流动的约束；⑤实施起来可能费用昂贵；⑥要跨越文化障碍有困难。
等级效果模式（hierachy of effects model）：提倡根据达到效果所需的时间和努力来区
分劝服效果的实用理论。这个模式采用一步接一步的劝服策略，首先从达到容易产生的效果
开始，例如使受众知晓，并通过调查研究和监控这些效果；研究得出的反馈被用来决定何时
传播下一步的讯息，以达到更难达到的效果，如促成决定；这些步骤可分为：知晓-培养形
象-引发兴趣-加强认知-做出决定-付诸实施。
布伦达·德文（Brenda Dervin）的受众中心社会市场理论：活动的策划者必须认识到传播
是精英和受众群之间的对话；活动的目的不应该被理解称诱导受众做精英阶层想让他们做的
事情，而更应该被理解为，帮助人们学会以对他们有用的方式负责任地重建自己的生活。
她假设消息来源和受众的互动比由信息来源控制的传播过程更为有效。但精英阶层和社会地
位较低的受众间鸿沟越大，就越不可能获得和使用有效的反馈。德文相信，新的传播技术有
可能大幅降低维持信息来源于受众间互动的成本。因此鼓吹德文的平等主义社会市场理论的
人反对过度管制网络和网络的过于商业化，担心这样会导致网络与电视等其他受精英控制的
媒介毫无区别。
五、知识鸿沟（knowledge gap）
明尼苏达州立大学的研究组发展的一套关于大众媒介与社会的理论。这个模式关注在不同规
模的城市中新闻媒介所扮演的角色。
认为新闻媒介系统性地向某些人群传递信息，具有更高社会经济地位的人比其他人获得更多
更好的信息；随时间的流逝，获得更多信息的群体和获得更少信息的群体的差异日益增长；
当冲突升级时，知识鸿沟将会变窄；这应该有助于地方获取信息、实行民主和决策；但这种
情况并未发生，因为来自大社会系统的精英对此进行了干预。
优点
优点：①能识别不同群体间潜在的、棘手的知识鸿沟；②为克服这些知识鸿沟提供意见；③
假设传播中存在互惠性和受众积极性；④建立在系统理论的基础上。
缺陷：①假定鸿沟是功能不良的；并非所有人都同意；②对鸿沟的关注仅限于新闻和社会冲
突上；③不能阐明鸿沟产生的基本原因。
六、议程设置（agenda-setting）
最早源自李普曼的《舆论学》（1922）“脑海中的世界图景”。
伯纳德·科恩（Bennard Cohen）（1963）：“新闻媒体远远不止是信息和观点的传播者；
也许在多数时候，它在使人们怎样想这点上较难奏效，但在使受众想什么上十分有效。”
麦库姆斯和唐纳德·肖（MaxwellE.McCombs&DonaldShawn）的经验主义研究证实（1972）：
通过选择和播发新闻，编辑、编辑室全部成员和播音员在塑造政治现实的过程中扮演着重要
的角色；受众不仅获悉一个特定的议题，而且也通过该新闻的信息量和它的编发位置来判断
该议题被赋予了何等程度的重要性…大众媒介可以决定什么是重要的议题。
从消极的方面看，议程设置的逻辑似乎非常适合于新闻和竞选，但对其他类型的内容和效果
而言则有待探究；也有可能是公众设置了媒介的议程，然后媒介加强了它。
Shanto Iyengar和Donald Kinder的一系列实验（1987）检验了议程设置、新闻报道的生动
性（戏剧化削弱了电视议程设置的力量）、新闻报道的位置（放在开头效果更好）和启动。
•启动（priming）：在议程设置中，指媒介引起对政治活动某些方面的注意力同时损害对其
他方面的注意力的观念。
议程设置最初是一种微观层面的效果理论，后有了宏观层面的阐释——议程建设。
议程建设（agenda-building）：在公共政策领域中媒介、政府和公民彼此之间相互影响的
全部过程。
它假定存在认知效果、积极的受众和社会层面的效果，基本前提是媒介能深刻影响一个社会
（国家或文化）对什么才是它应该关心的重大事件的决定，并因此促使各种社会机构去达到
目标。
最近麦库姆斯（2001）结合了框架理论，认为议程设置在两个层面：客体层面和属性层面起
作用。传统的议程设置研究集中在客体层面上评价媒介报道如何影响人们对客体（如议题、
候选人、事件和问题）的优先次序的安排。（想什么）而媒介通过影响属性议程告诉我们哪
个客体的属性是重要的，哪个是不重要的。（怎么想）
优点：①关注受众和媒介的互动；②通过实验证明媒介曝光率、受众寻找定位的动机及受众
对公共事件的认知之间的关系；③整合了许多相似的观念，包括启动、新闻位置和新闻生动
性。
缺陷：①根植于大众社会理论；②过于适合新闻和政治活动的特定情形；③议程设置效果的
方向遭到某些人的怀疑。
七、沉默的螺旋（spiral of silence）
伊丽莎白·诺尔纽曼（ElisabethNoelle-Neumann）认为，在某个语境中得出的观察结果会
传递到另一个语境中，鼓励人们要么声明自己的观点，要么把话咽回去保持沉默，直到经过
一个螺旋的过程，某种观点在公开场所所占领统治地位，其他观点因其追随者的沉默不语而
在公共意识中消失。
她的关注点不是微观层面上普通人如何感知公共议程，而是宏观层面上普通人对公共议程的
感知所带来的长期后果。如果和这些议程话题相关的多种观点被媒介忽视、排斥、轻视，人
们也就不愿意再谈论它们了。
她认为有限效果论的选择性感知限制了媒介的强化效果的说法有误；实际情况可能是，人们
基于已有的态度和信仰理解媒介的讯息，结果使这些态度和信仰得到加强。
她认为新闻采集和传播途径严重限制了公民选择的广度和深度，她总结了新闻媒介造成“感
知缺乏”的三个特征：
•普遍存在：作为信息来源的媒介无处不在。
•重复累积：不同的媒介倾向于在不同的时间段通过不同的节目和版本重复相同的事件和观
点。
•协调一致：新闻工作人员价值观的一致性或相似性对他们制作的内容产生影响。
导致这种协调一致性的原因：
①关于公众对记者工作的风格和内容的接受标准，各层次、各领域的记者都有相同的设想和
经验。
②记者通常倾向于相信自己的观点是正确的。
③他们依赖于共同的消息来源。
④他们在“建立参考框架时相互影响”。
⑤他们力争取得同事和上司的认可。
⑥因为新闻从业者共同的人口统计学特征和个人态度特征，他们的观点相对一致。
优点：①具有宏观层面和微观层面的解释能力；②是动态的；③解释了舆论的转移；④提出
关于新闻媒介的角色的重要问题。
缺陷：①对媒介影响力和普通民众持过于悲观的态度；②忽视其他更简单的保持沉默的原因；
③忽视可能存在于人口和文化差异上的原因；④低估了社区力量对沉默作用的抵消。
八、媒介系统依赖理论（media system dependency）
该理论认为一个人越依赖于通过使用媒介来满足需求，媒介在这个人生活中扮演的角色就越
重要，因此媒介对这个的影响力也就越大。
德弗勒和洛基奇（1975）：首先，媒介影响力的基础在于社会大系统、媒介在此系统中扮演
的角色和受众与媒介的关系三者之间的联系。效果之所以产生，不是因为全能的媒介或者无
所不能的资讯，而是由于媒介在特定的社会系统里以特定的方式满足了特定受众的需求。其
次，受众对媒介信息的依赖程度，是理解媒介中的讯息何时及为何改变受众的信仰、情感和
行为的关键变量；第三，在所处的工业社会中，我们越来越依赖于媒介（1）理解这个社会，
（2）做有效率有意义的事，（3）追求幻想和逃避。当我们通过媒介理解社会时，媒介塑造
了我们的期望。最后，对媒介需求越多，越依赖媒介，受到的影响也越大。
个人/社会层面上的依赖受下列因素影响：（1）由媒介提供的特定信息传递功能的数量和关
键性（重要性）的功能；（2）社会上变化和冲突的程度。
优点：①格调高，描述性的；②考虑到系统的定位；③整合了宏观和微观层面理论；④阐释
了危机时刻和社会变革时期媒介所扮演的角色。
缺陷：①很难通过经验主义研究证实；②依赖的涵义和威力不够清晰；③在解释长期效果方
面不具优势。
九、媒介的涵化理论（cultivation analysis）
关于电视”涵化”或创造出一个未必正确、却因人们相信它而成为现实的世界观的理论。格
伯纳（Gerbner）于70、80s提出，论述关于媒介在社会中所扮演的角色的宏观问题。
涵化理论的步骤：①讯息系统分析：对电视节目进行详细的内容分析，确定它最主要的重复
出现行前后一致的形象、主题、价值观和描绘；②形成关于受众的社会现实的问题；③受众
调查，用第二步里的问题提问受众，询问他们消费电视的程度；④比较看电视多的人与看电
视少的人的社会现实。
电视的涵化：电视对受众形成文化框架或文化认识以及形成基本概念方面发挥影响力。电视
涵化的途径有两种：一是主流化（main-streaming）,特别是对于看电视多的受众而言，电
视中的符号垄断和主导着世界的信息和观念的来源；被内化的社会现实最终在向主流，这不
是政治意义上的主流，而是一种更接近于电视上的现实而非客观上的现实的文化主导现实；
二是和谐（resonance），指受众在电视上所看到的情况和自己的日常生活相当一致。
电视的3B论：①电视模糊（blur）了人们看待世界时传统的区分；②将人们的现实混合
（blend）在电视的文化主流中；③使这种主流文化屈服（bend）于电视及其资助者的机构
利益。
优点：①综合了宏观和微观层面的理论；②对电视独一无二的角色进行详尽的阐释；③将经
验主义的研究应用到人文主义的假想中去；④将效果重新定义，不仅仅是可见的行为改变；
⑤应用于广泛的效果议题；⑥提供社会变革的基础。
缺陷：①使用的方法论给人造成了困扰；②假定电视的内容都是同质的；③仅关注电视的大
量使用者；④很难适用于其他媒介。
十、作为文化产业的媒介：文化的商品化（commodification of culture）
对文化被大规模制造并销售，与本土文化直接进行竞争时究竟发生了什么的研究。
媒介是一种专门生产和销售文化商品的产业。
以前的社会秩序中，地理上和社会上独立的社区创造并控制了日常生活文化。尽管君主国王
可能支配着社会的整体秩序并拥有自己的文化，但却与构筑日常生活经验的民间文化全然隔
离并影响甚微。而现代社会的精英们发展出颠覆性的大众文化，闯入人们的日常生活并破坏
其文化。这种新的文化形式作为一种微妙却相当有效的意识形态，让人们曲解自己的经验，
随后做出违背自身的利益的行为。
文化商品化的后果：①当日常文化中的元素被挑选出来进行重新包装时，只有非常有限的元
素被选中，而重要的元素往往被疏忽或是有意地忽略掉；②重新包装的过程包括对那些已被
筛选过的文化要素进行戏剧性改写的过程；③文化商品的推销采取了这样一种形式：使侵入
并最终破坏日常生活的可能性最大化，如文化商品的包装和长期影响；④操纵文化产业的精
英通常对自己工作的后果无知-与商品消费者的疏远的后果；⑤文化商品对于日常生活的破
坏有多种形式，某些显然与消费有害内容有关，另一些则相当微妙，需要长期才会显现。
优点：①提供了社会变革的基础；②识别出由于对文化内容进行再包装而产生的问题。
缺陷：①所谈论的效果未经经验主义研究论证；②对媒介的影响力和普通民众的看法过于悲
观。
广告：终极文化商品
广告将推销商品的讯息包含其中，使那些通常对绝大部分被推销商品和服务都毫无兴趣或并
不真正需要的人注意到它并受到影响；对特定产品的消费通常被描绘为一种建构一个值得建
构的身份。
十一、新闻生产研究（news production research）
来自70、80s的英美社会学家，对记者如何常规性报道新闻予以批判性分析。
兰斯·贝内特对新闻生产的偏向研究（1988）：①新闻个人化：大众更善于关注个人，而不
是群体或机构，所以大多数新闻报道围绕个人展开；②新闻戏剧化：新闻也同样有吸引人的
包装；③新闻片段化：由简短的事件摘要组成，试图以这种结构来履行客观性标准；④新闻
正常化：使灾难、危机等对现实的威胁报道正常化。
盖伊·塔奇曼（1978）认为新闻的客观性惯例设定了制造不含偏见的新闻报道的程序，但程
序在事实上却包含偏见。
优点：①为新闻生产实践潜在的有用的变化提供建议；②提出关于日常新闻生产实践的重要
问题；③可用于研究不同种类新闻的生产。
缺陷：①关注新闻的生产实践，但没有经验主义研究来展示效果；②对记者及其社会角色的
看法过于悲观；③被从事实践工作的记者认为是不实际的而加以忽视和拒绝。
十二、媒介入侵理论（media intrusion theory）
丹尼斯·戴维（Dennisdavis）（1990）命名，被认为是当代精英多元论（第七章）的变体。
关于媒介入侵并掌握政治甚至颠覆政治秩序的观点；认为按照等级结构来运作政治效果最
好；既有政治精英在公众和公众所选举的领袖间进行调和。
政治报道过于个人化，过于戏剧化，过于片段化；新闻报道总关注媒介奇观和大事件来博取
注意力；媒介更愿意鼓励观众成为政治看客。
优点：①提供社会变革的基础；②提出关于新闻媒介组织运作的重要问题。
缺陷：①关注新闻媒介的运作，但没有经验主义研究来证实效果；②对新闻媒介和它们的社
会角色的看法过于悲观；③过于关注对政治的入侵；④基于精英多元论的假想。
第十二章 大众传播理论的发展趋势：寻求共识，面对挑战
一、综述
当今的传播理论已经经历了意义深远的转变；新涌现的理论，如批判理论、文化理论和积极
的受众理论都给以前对狭隘，短期，直接的传播效果研究予以挑战。
喜欢把调查建立在经验主义定量研究方法之上的学者统一起来的视角：传播科学。
•传播科学：汇集各种观点和定量方法论来研究整体上的传播活动。
丹麦学者詹森提出批评研究与文化研究的可能理论框架：社会符号学理论。
•社会符号学理论：汇集了文化研究和批评研究的各种方法和理论学说。
对传播学的四大挑战：①传播技术革命带来的的快速变迁的媒介视域；②全球化的新世界秩
序；③现代社会秩序向后现代社会秩序的转换；④从生物学到认知心理学的角度认识人作为
一个有机体的信息处理能力。
二、传播科学
所谓传播科学，就是将所有定量的、经验主义的、行为科学的研究方法综合起来的视角。它
有效地将积极的受众理论和有限效果研究以及人际传播研究结合了起来。打破了经验注意传
统和有限效果论的紧密联系，拓宽了研究的范围。
查尔期·伯格（Charles Berger）和史蒂文·查菲（Steven Chaffee）在《传播科学手册》
（1987）里定义声称：①理论应该解释现象；②理论应该由合乎自然规律的概括组成；③可
以通过经验注意研究方法进行论证。
这样的标准将大多数文化研究和政经学理论排除在外，因而它还是忠于拉式与同时代学者提
出的定义的。
关于传播科学的两种观点：
查菲与伯格（1987）对传播科学的定义基于传播现象发生的四个层面：①自身传播层面，分
析发生在个体内部的传播；②人际传播层面，分析两人之间或小群体内人与人之间的传播关
系；③组织传播层面，分析较大群体内的人和传播的语境；④宏观社会层面，分析大社会系
统的传播特性和传播活动。由于所有层面都是相互联系的，因此某个层面上的变化必定影响
到其他层面。
平格利、魏曼和霍金斯的传播研究阶段说（1988）：
①传播的先决阶段（antecedents of communication），包括了对”导致传播行为的情景、
个性特征、取向、能力等”的研究，形成”关于选择和控制机制以及应用这些机制时需要的
规范和图式”的理论；
②传播的后果阶段（consequences of communication），包括对传播结果的研究，形成”
关于传播的必要特征、产生效果的机制以及效果的力量”的理论。
优点：①将许多不同的基于行为科学的理论和研究统一起来；②将人际传播和大众传播的概
念结合起来；③在微观和宏观层面上进行解释；④提供可验证的结论；⑤尊重受众的能力。
缺陷：①排斥文化理论、批评理论和其他非经验主义的研究和理论；②也许不能有效整合不
同理论；③趋于将注意力集中在微观层面上，只能提供相当有限的解释；④对整合理论的努
力会导致争议。
三、社会符号学理论
20世纪80年代，批判研究和文化研究开始流行，吸引了许多其他学科的学者参与进来，
然而，他们却不具有基础的文化研究理论和该研究视角在欧洲形成的学术传统；对流行文化
的纯粹描述性研究和真正的基于来猜片的文化研究被混为一谈；政治经济学家则责备文化研
究者打开了边缘学科的洪水闸门。可能的调解来自卡尔·詹森（Karl Jensen）的社会符号
学理论；该理论试图将批判和文化研究理论与传播科学结合起来。
詹森的理论在很大程度上归因于詹姆士·凯里关于传播的仪式观点：大众传播越来越被
用于构建西方城市的社会日常生活，它们象征着社会中政治、经济、文化等领域的习俗，持
续作为日常行事的参考……在不同的工作环境中，媒介可以作为不停息的情绪调节器，部分
缓解劳动的现实；可以作为一个机构中的构成元素；或者作为服务于特定目的的文化来
源。……在每种情形中，大众媒介都为维持个人日常生活和重建社会集体制度的指号过程做
出了贡献。
詹森的理论核心：大部分日常生活包含着指号过程，我们能这么做是因为我们具有从过
去的人际关系和大众传播中获得的符号学知识。（皮尔斯）
•指号过程（semiosis）：解释和使用符号的过程。
•情景活动（situated activity）：试图理解日常生活中的符号系统的活动；它出现在特
定的社会环境中，这种环境会影响我们对符号的理解，也被我们对符号的理解所影响，并且
此种互相影响是自反性的（reflexive）。
詹森的大众传播理论观点：①媒介只有相对的力量；②意义产生于人类社群内部，然后
流过媒介；媒介参与了对社会实践和习俗的再创造，但不能决定和控制这些实践或习俗；③
要想正确理解大众媒介的角色和力量，研究者必须了解媒介是如何推动和使话语、实践和习
俗的”再生产”产生偏向的；④话语和解释之间差异的形成能够导致社会差异的产生，它使
得其他社会权力得以付诸实践。
优点：①将对流行文化的描述性研究和理论研究区分开来；②提供微观和宏观层面的解释；
③能将基于经验主义研究的传播科学包含在内；④结合了不同的文化理论、批评理论和政经
理论；⑤对受众的弱点和能力进行现实的估测。
缺陷：①是非经验主义；②得出不可检验的结论；③对自己适用范围过分乐观。
四、大众传播的终结
查菲和梅茨格（2001）：新媒介正令大众传播走向终结，并且从根本上改变了21世纪媒介被
结构、使用和形成概念的方式。
分述：①对媒介内容的经验主义研究的一种假定：媒介是有限的（在数量上）、可辨别的，
因此是可以通过定量研究来进行了解的；②如今人们可以从新媒介中获得的材料数量惊人，
对媒介内容的研究也变得前所未有的困难；③新媒介环境中每个个体使用者对内容的经验都
不尽相同，因为互动技术允许使用者从所有可得到的内容中选择想要的子集；④新媒介环境
中，受众更难于辨识和监控，为媒介受众研究带来危机；⑤在大众传播的环境中，社会控制
是通过法律、行业道德和公共教育来维系的，在新媒介环境中，技术设施和监控成为约束人
们的力量。
五、全球化和媒介
冷战结束后，新的世界秩序出现。它建立在全球资本主义和资本及信息的跨国界自由流动的
基础上。这场革命就是全球化。
巴伯的《圣战对麦当劳世界》（1995）和亨廷顿的《文明的冲突》（1996）都认为，建立一
个有利于商业全球化的环境的努力激起了传统文化的反抗。
Morley和Robins质疑（1995），在一个似乎同时在内爆和外爆的世界中，一个国界越来越无
关紧要的世界中，个体上哪里去寻找自己的身份认同和意义？
媒介所扮演的角色：
全球化是比冷战时期推广资本主义意识形态和共产主义意识形态复杂得多的现象。全球资本
家的首要兴趣是如何通过生产和销售商品来获得利润，并无意让地方民众皈依自身的信仰。
大众媒介和新媒体可以被非政府组织用来推广本土文化。
•文化混合性理论（cultural hybridism）：认为在很多情况下，全球文化和本土文化的对
抗会促使有用的新文化形式的诞生；这种由于对抗而诞生的混合文化要优于导致它形成的各
种文化。
•发展传播理论（developmentcommunicationtheory）：为促进对社会有益的目标而对
传播进行策略性的、有意识的运用。
六、对现代性的后现代性批判
二战结束后，一些欧洲哲学家和社会思想家越来越表达出对科学价值及其控制物理世界和社
会的能力的怀疑。这些后现代理论家认为，现代性，这个从14世纪起开始主宰西方社会的社
会组织形式和文化形式有其黑暗面。大规模的机械化战争、大屠杀、对生态环境的毁坏等于
科学技术带来的伟大成就就是“现代”的一体两面。
后现代观点：①现代社会秩序难以为继，将不可避免地走向自身的灭亡；②迥异的文化和社
会秩序已经出现，并将在之后的几个世纪里占据统治地位；③新的社会运动开始出现，更关
注个人身份认同和本土文化，而不是关于社会不公和老式政治权力等的宏大命题；被认为摒
弃了现代主义者通过创建社会管理制度来施加命令的欲望；④现代性对进步的信仰和对使用
科学技术控制物理世界及社会的渴望，与其说是大众观，还不如说是一种精英论；⑤人们依
赖媒介中的刺激因素帮助建构和理解日常生活经验，这种依赖程度几乎等于将人们全方位置
于媒介的影响之下；其恶性循环可能是，媒介生产出越来越多的信息，逐渐破坏掉人们维持
现实统一经验的能力，促使人们对媒介使用发生变化，而这种变化又鼓励媒介提供更具破坏
性的内容。
现代性培育了很多神话或元叙事，也被它们所维系。大众媒介为宣传现代的元叙事提供了重
要手段。其中存在一个共同的主题就是发展的必然性。科学技术的发明和应用，工业化带来
的巨大物质财富，文明和高雅文化的发展，人类将发挥真正的潜能，摆脱贫穷、无知和疾病
的束缚，世界终将走向和平、繁荣、昌盛。这些目标为大规模的战争、种族灭绝和其他暴行
提供了借口和合法化的理由。
优点：①挑战广为流传的现代主义者的信仰；②对于科技对社会的影响提出批判性质疑；③
对科技与受众同时进行乐观的和悲观的评估。
缺陷：①没有认识到现代社会制度的力量；②对技术爱好者和媒介研究人员的很多核心信仰
进行挑战；③没有为现代性提供其他有建设性的选择。
七、来自认知心理学和生物科学的挑战
思想意识可被看作是一个主认知过程或元认知过程，它能够获取、组织和使用从大量较低层
面认知过程中传来的信息。意识最重要的作用是使我们生活在由共同文化结合起来的群体
中，我们试图理解他人并根据与他人的关系决定自己的行为。
人们的普遍假设是绝大多数人能够获得相同的较高程度的传统读写素养，它奠定了美国公共
教育系统和民主政府观的基础。但现在认知心理学家提出，支持传统读写素养的低层面认知
过程，在不同的人之间差异非常大。
八、媒介素养运动
媒介素养的假设：①受众是积极的，但未必是具有绝对控制力的（使用与满足理论）；②受
众的需求、机会与选择在某种成都上受到限制（批评文化研究）；③内容能够指导行为（社
会认知理论、社会符号学理论）；④人们必须实际地估测出他们与媒介文本的互动会怎样影
响这种互动在他们所处环境中的功能（文化理论）；⑤人类有着不同程度的认知处理能力（认
知与生物科学理论）。
对读写素养（传统意义上指阅读和书写的能力）的扩展，读写素养在历史上与民主有着密不
可分的联系。
•媒介素养（media literacy）：获取（access）、分析（analyze）、衡量（evaluate）
及传播（communication）讯息的能力。
艾伦·鲁宾（1998）补充道，媒介素养就是对传播的信息来源和技术、所用的符码、所产生
的讯息，以及对这些讯息的选择、读解和影响的理解。
五要素（1995）：①意识到媒介对个人和社会的影响；②了解大众传播的过程；③形成分析
和讨论媒介讯息的策略；④意识到媒介内容是对我们当今文化和我们自身提供洞识的“文
本”；⑤培养对媒介内容更深程度的享受、理解和欣赏。


=====《文化理论与通俗文化导论》=====

《文化理论与通俗文化导论》
第一部分 结构疏理
一、结构主义与后结构主义
1、结构主义代表：索绪尔、弗洛依德、列维—斯特劳斯
2、后结构主义：德里达、拉康、福柯、萨义德
3、马克思主义：法兰克福学派、新葛兰西学派、阿尔都塞
二、建构主义
韦伯、齐美尔、吉登斯、符号互动（米德、布鲁默、库恩）、现象学
三、功能主义
涂尔干、帕森斯
四、功利主义
马歇尔、帕累托、斯金纳、埃尔斯特
其他重要人物：哈贝马斯、
第二部分 重点人物
1、索绪尔：（03年名解索绪尔语言学《文化理论》《人类传播理论》）索绪尔
（Ferdinandde Saussure），1857-1913，瑞士著名语言学家，现代语言学的创始人。他
创立了的语言学被称为结构主义语言学。
一是他提出了语言的能指与所指的理论：即把语言分成两个组成部分能指和所指，能指
和所指合在一起产生了符号。能指和所指的关系是完全任意的，也就是词语和指涉物之间并
不存在任何必然的联系。语言系统的关键在于差异性，人们是通过语言符号之间的差异来区
分其所对应的指代物。
二是对不同语言形式进行了划分，（1）形式语言——称之为语言；（2）在传播过程
中对语言的实际运用——即言语。
三是区分了语言学研究两个研究方法：共时语言学：研究特定时间内的特定语言；历时
语言学：研究特定语言的历史发展。
同时，索绪尔指出，语言学研究的应当是语言而非言语。语言具有其稳定性以共时性为
特征，言语以历时性为特征，随着情况的变化而变化。
索绪尔所主张的符号学建立后，他的理论在西方已经越出语言学的范围而影响到人类
学、社会学等邻近学科，直接导致这些学科中的"结构主义"。从这个意义上说，索绪尔不但
是现代语言学的奠基者，也是符号学和结构主义的创始人。
2、弗洛依德《社会学》：奥地利医生兼心理学家，精神分析学派的创始人。其关键性以现
在于无意识心知对知觉和行为的影响。
一是（1923年）在《自我与本我》一书中，提出心理结构的三个组成部分：本我、自
我、超我。本我（id）包含要求得到眼前满足的一切本能的驱动力，它按照快乐原则行事，
是无意识的。自我（ego）处于本我和超我之间，代表理性，它按照现实原则来行事，根据
现实来表达和满足本我的愿望与超我的要求。超我（superego）代表良心、社会准则和自
我理想，它按照至善原则行事，指导自我，限制本我。
本我追求愉悦，超我追求完美，而自我则追求现实。
二是发现和确认了无意识（04年名解）心理现象，提出梦是愿望的满足，形成了梦的
分析技术。1900年出版《梦的解析》一书。这是用前所未有的思路，别出心裁的开创一种
研究心灵和精神病理现象的新领域。
无意识（04年名解）：是弗洛依德的关键性发现，这一发现来自临床环境，当他歇力
想理解一些特殊行为，它们表现出自毁的意思，因此无法用有意识驱动来解释。据此他关键
性发现在于无意识心智对知觉和行为的影响。
（三是1905年弗洛依德出版《性学三论》一书，他把生物发生原则用于研究心理性欲
的发展，对这一问题做了种系发生的和个体发展的观察与概括。1914年弗洛依德发现自恋
的心理现象，并以先天的内部驱力，即爱力来解释人的行为，认为生命由此得以支持。这一
能量称为生本能，其投注于外即为爱情的对象，投注于内即为自我爱恋。1920年，弗洛依
德修正关于本能驱力的理论，提出死本能作为补充。）
俄狄浦斯情绪即恋母情结。
3、德里达（《文化理论》《社会学》可能考点）：雅克·德里达， (1930～2004)20世纪下
半期最重要的法国思想家之一，法国哲学家、结构主义的代表。德里达是解构主义哲学的代
表人，他的思想在60年代以后掀起了巨大波澜，成为欧美知识界最有争议性的人物。德里
达的理论动摇了整个传统人文科学的基础，也是整个后现代思潮最重要的理论源泉之一。
德里达的第一个重要观点是符号变得有意义不仅是因为差异性也是因为其拖延性。索
绪尔设想语言是由能指、所指和符号之间的关系组成的，后结构主义者认为：能指不产生所
指，它们产生出更多的能指，这使得含义变得非常不稳定。只有当它被放置在某个上下文背
景中来解读时，其含义才被确定下来。
第二，通过对文本的解构试图说明，任何文本都会具有可以解读的潜台词并与文本本
身的立场相矛盾，并对它予以增补。 因为对立的双方不是纯粹的对立，每一个都有是由另
一方激活起来，它的在现和含义最终取决于在隐的另一方。解构式的阅读就是通过对对立面
进行解构，试图使看不见的东西看得见。
4、拉康（《文化理论》《社会学》）（05年名解）：法国哲学家，精神分析学家。结构主
义的主要代表。拉康主张从结构主义的方法论原则出发， “重新解释”弗洛伊德学说。同
时，引入了结构语言学的思想,注重语言分析。结构精神分析学也对结构主义及后结构主义
中的其他理论流派产生了极大的影响。
拉康提出了我们经历的三个决定性阶段：第一个阶段是镜像阶段、第二个阶段是荡
来荡去的游戏期、第三阶段是俄狄浦斯情结。
镜子时期是我们在镜子中认识自我的时期，大约在第6至18个月之间，儿童注意
到自身的映像，发现这并不是他人的依附性的延伸，而是一个完整和明确自主的个体。但我
们眼中的自己比我们实际的发育更完善，所以，个体将一直追求这种完美的自我形态和理想。
拉康将游戏（第二阶段）看作是孩子开始采用语言的一个表征，我们的需求可以通
过语言来表达，我们在语言中并通过语言具有人的主体性。拉康也认为无意识也是由我们与
语言的关系中所产生的，并指出无意识像语言一样被结构化，可以通过一种语言分析，来揭
示其内涵。
拉康从语言学的角度重新诠释俄狄浦斯过渡。父亲以象征形式进入到主体中，与双
亲的语言化一方面提供了父亲的权威，另一方面也提供了与母亲的中介和疏远。
5、福柯（《文化理论》《社会学》02年名解）：20世纪法国思想家（德里达主要对语言
进行解构，福柯对权力进行解构）
一是对权力的论述：以往权力研究多半停留在政治－法律的层面，福柯在巨著《规
训与惩罚》里详细地分析了古往今来压迫的不同形式，他指出在暴力的监禁和惩罚之外，其
实生活中更普遍存在的是规训，这是种柔性的控制。福柯认为，在现代社会，权力是弥散的，
浸透在社会生活的各个方面，存在于经济、知识、性等各种关系当中，直接发生影响。同时，
权力不应该被看作是一种负面力量、一种否认、压制的东西，权力是有生产性的。
二是权力和话语的关系。福柯认为人们控制他人大多是通过语言手段，通过话语行
为确定了语言并限定人们对其它可能性的思考，所以话语和权力密不可分，话语是各种机
构通过一种界定和排斥的过程运用其权力的手段。
同时他认为权力产生知识，权力与知识相互直接包含。所谓纯粹的、客观的知识是
没有的。
三福柯选择“性”作为其颠倒传统权力理论的重要场所。资阶性本性。
6、萨义德“东方主义”：他从福柯那里继承过来的“权力话语”的衣钵， 用“东方
主义”这一术语概括地表述了西方世界与东方世界之间的后殖民关系。在他的理论框架中，
“东方”（Orient）和“西方”（Occident）不是一个空泛的地理方位概念，而是一种文化
现象
指自18世纪末以来西方世界用来对待东方的共同规范，西方世界根据这一规范评论、
描述东方并对东方进行殖民统治。换言之，东方主义是一种西方对于东方的宰割、重建和
话语垄断。
总之，东方主义的实质是西方世界认识东方世界的一种认识体系，是西方世界企图主
宰东方的一种政治性话语，是西方视域下的东方。因此，萨义德认为，如果我们不是将东
方主义当作是一种“西方的话语”来研究的话，我们就不可能真正理解自启蒙时期以来欧洲
文化是如何在政治、社会、军事、意识形态以及科学技术等领域控制、甚至是“发明、创造”
出东方的。东方主义所表述的是西方世界对于东方世界的支配关系与霸权关系，它不是一
种单纯的西方对于东方的学术性话语，而是一种涉及到美学、经济、社会、历史以及哲学
等领域的不平等的话语交流。简而言之，东方主义并不是单纯受到自身客体的影响与限制，
而是更大程度上受到创造它的欧洲文化传统的影响与操纵。
8、哈贝马斯与公共领域：
简而言之，公共领域就是指政治权利之外，作为民主政治基本条件的公民自由讨论公共
事务、参与政治的活动空间。能够影响政治方向的公共讨论和争辩组成了公共领域。
所谓公共领域，首先意指我们的社会生活中的一个领域，某种接近于公众舆论的东西能
够在其中形成，这个领域向所有公民开放。当公民们以不受限制的方式进行协商时，他们作
为一个公共团体行事——也就是说，对于涉及公众利益的事务有聚会、结社的自由和发表意
见的自由。在一个大型公共团体中，这种交流需要特殊的手段来传递信息并影响信息接受者。
今天，报纸、杂志、广播和电视就是公共领域的媒介。
第三部分 《文化理论与通俗文化导论》梳理
第一章 什么是通俗文化
一、文化的三个定义
1、文化用来指智慧、精神和美学的一个总的发展过程。
2、指某一特定的生活方式，无论它是一个民族的还是一个时期的或是一个群体的。
3、文化是表义的实践活动。（在通俗文化中常用后两个）
二、通俗文化的六种定义方式
1、通俗文化是一种广受欢迎或者众喜好的文化。即对通俗文化的定义必须包括一定的
数量范围。
2、通俗文化是我们决定什么是高雅文化后剩余的那部分文化。
3、通俗文化就是大众文化。大众文化是大批量生产的商业文化，是麻木的头脑被子
动消费的文化；同时也被视为公众幻想的形式，是乌托邦式的自我精神逃避；结构主义把通
俗文化视为一种意识形态机器，可以轻而易举地复制占支配地位的意识形态。
4、通俗文化是来自于“人民”的文化。是民间文化的通俗文化，是为人民服务的文
化。
5、通俗文化是社会被统治群体的反抗势力与社会统治集团的兼并势力之间的斗争场
所。是霸权的折衷平衡。
6、围绕后现代主义的争论所引发的，认为后现代主义文化是一种不再区分高雅文化
和通俗文化差异的文化。
这些定义的共同之处：不论通俗文化会是什么样子，它都是一种伴随着工业化和城
市化的出现而兴起的文化。
第二章 “文化与文明”传统
1、马修·阿诺德：首开先河把通俗文化置于文化这个大范畴进行研究。阿诺德对文化的四
个定义：第一，文化是知识。文化是“世界上最好的思想和言论”；第二，文化是认知什么
是最美好的能力；第三，是心灵和精神上对美好的运用；第四，是对美好事物的追求。
阿诺德站在贵族和中产阶级的立场上，认为通俗文化是深刻政治骚动的先兆。
2、利维斯主义：是建筑在“文化是建立在少数人手中”的假设之上，认为工业革命后的的
文化分裂成两种，一种是少数人文化即体现了“世界上最好的思想和言论”；一种是大众文
明，是“没有受过教育”的大多数人消费的商业文化。利维斯主义继承了阿诺德的传统，有
助于维持和产生一个“受教育有教养的群体”，对通俗文化采取敌视的态度。
3、美国的大众文化。
美国战后辩论的三个立场：
一自由审美立场：如果让大多数人有机会进行选择，他们就会所所谓的二流和三流
文化作品和实践置于高雅文化之上；二自由合作或进化立场：通俗文化在全新的消费到上的
资义社会发挥缓和作用，使用权人们适应享受消费的社会需要。三激进的或社会主义立场：
认为大众文化是社会控制的一种形式或手段。
罗森堡：大众文化的创造者不是资本主义而是技术。
麦克唐纳（悲观主义者）：首先，大众文化破坏了高雅文化的生命力。是一种寄生文化，
从高雅文化汲取营养却没有任何回报。其次，大众文化诱惑高雅文化，一是其经济回报二是
其潜在庞大的消费群。最后他断言，大众文化是毒品，它降低了人们体验生活本身的能力，
它标志着生活将失去个性，永无休止地寻找弗洛伊德所说的“替代性快乐”阻碍了“真正的
快乐”。
范·登·哈格（悲观主义者）：消费大众文化空洞的作品和实践，以填补内心的空虚；
内心的空虚就会消费更多空洞的大众文化和实践。
希尔斯（乐观主义者）：对现在的悲观在于对过去的过分乐观。美国文化分为三个阶层：
上面是高雅的文化，中间的平庸的文化，下面是粗野的文化。大众社会改变了文化的分布，
压制了“优秀的和高雅的”文化的作用。这表明没有审美表达和接受能力的阶级，原先给他
们什么就接受什么，现在他们的审美意识刚刚觉醒。
菲德勒：一是认为美国是大众文化的第一个源头，贵族文化必将消亡；二是认为大众文
化是“不安分守己”的通俗文化。
4、其他人的文化
虽然文化与文明传统，尤其是利维斯主派的形式，为研究通俗文化创造了一个教育空间，
但是它总是假设通俗文化代表的充其量不过是文化衰落和潜在的政治混乱。文化与文明传
统并不注重对通俗文化作品和实践进行深入详细的分析。文化与文明传统是在贵族和中产阶
级的立场上，担心社会和文化的扩张，对文化和社会排它性的挑战。
第三章 文化主义
1、文化主义：以霍格特、威廉斯、汤普森、霍尔、沃内尔为代表，坚持通过对某一社
会的文化进行分析，可以恢复生产和消费该社会的文化作品和实践的男女老少们，应共同拥
有规范的行为和思想体系。强调人的力量对文化的主动生产，而不是被动消费。
2、霍格特《识字的用途》：分为两部分，一是描写20世纪30年代的工人阶级文化；
二是描写50年代传统的工人阶级文化受到大众娱乐新形式的威胁。他把工人阶级的美学形
容为“对日常生活细节的极大兴趣”；对已知事物的浓厚兴趣；30年代的工人阶级文化是
公共的、自娱自乐的通俗文化，是一个由人民创造的文化。而大众娱乐的快乐是“不负责任
的”和“替代性的”，是浅薄枯燥的，没有道德感召力的。而且它们正在破坏古老的健康的
工人阶级的文化组织。50年代“商业文化”的力量已经壮大，向旧文化发起攻击。
但霍格特并没对大众文化的进程彻底失望。认为工人阶级有一定的恢复力。
与利维斯主义的异同：同：都认识到了文化的衰落；都把教育看作是抵制大众文化
诱惑的手段。异：霍对工人阶级文化细致入微的关注；两者对“美好过去/糟糕现在”的界
定不同。
3、威廉斯《漫长的革命》：在《漫》中威列出了文化定义的三个分类：一是文化是
人类自我完善的一种状态或过程；二是存在着“文献记载”：有记录的文化作品和活动；三
是文化是对一种特殊生活方式的描述，即存在着文化的“社会”定义。在这三个定义中，文
化是某种生活方式，文化表现某种生活方式。文化分析是重建特定生活方式的手段。文化分
析的目的在于通过文字记录，重新建立“情感结构”（即指特定群体、阶级或社会所共享的
价值）。文化分析方式理解到文化传统的选择性至关重要，文化分析不能颠倒历史，但它能
把文化作品和实践推回到它的历史时期，向当代说明“它的当代价值”。
威的文化分析在很大程度上打破了利维斯派的垄断局面。艺术没有了特殊的地位，
艺术是人类活动的一种形式，文化是一种特定的生活方式。艺术是由“普通”男女在日常生
活中与日常生活的作品和实践相交流过程中创造的。
霍尔把《漫》书称为“英国战后知识分子生活的一个创新事件”，它为激进修正主
义提供了必要的理由奠定了对通俗文化研究非利维斯化的基础。
4、汤普森《英国工人阶级的形成》：他在书中从三个不同但又相互关联的观点详细研究了
英国工人阶级政治和文化的形成。首先，重建了18世纪末英国激进主义的政治和文化传统；
其次，着重分析了不同劳动阶层在工业革命中的社会文化经验；最后，分析工人阶级觉悟是
随着它政治、社会和文化力量的增加而提高的。从中，他得出两个结论，第一，在1730至
1830年的这一段时间里，最突出的事情就是工人阶级的形成；第二他主张这也许是英国所
熟知的最知名的通俗文化。
该书对通俗文化的意义在于它记录了历史的本质。通俗文化就是反抗那些在工业革
命中得利者的场所。这威胁着利维斯派奉若神灵的精英份子给文化下的定义。
5、霍尔与沃内尔《通俗艺术》：一方面他们认为，在高雅文化和通俗文化之间存在着一个
基本的差异，即价值观的差异，这种差异不一定就是高贵和低贱的问题，更多的是关于不同
类型的满足。所以要承认不同的目的，根据限定的范围来评价不同的成绩。另一方面，承认
在通俗文化中有一个非常清楚的类别，把好的通俗文化从差的通俗文化中精选出来。大众艺
术是变了味的通俗艺术，它刻板逃避现实，没有审美价值，而通俗艺术是表出于蓝的大众文
化，通俗艺术是最好的电影，最高档次的爵士乐。
该书的主要焦点集中于通俗文化的作品质量，同时也研究了作品与观众之间的相互
影响。作品在实际产生的作用与作者本身想达到的效果之间常常发生冲突。
他们提倡批评意识，是用于区分通俗文化中什么是好的，什么是不好的。
第四章 结构主义与后结构主义
1、索绪尔（略）
2、列维《神话研究》：列维著作的核心元素是通过分析神话来揭示结构。他认为，在神话
的多样性之外，还可以找出一种共性的结构。单个的神话都是言语的范例，都有是对一种内
在结构或语言的体现。神话同语言一样，由类似是而非于语素或音素等语言单位的“神话素”
所构成。跟语素和音素一样，神话素只有在以特定的形式组合在一起时才会产生意义。人类
学家的任务就是找出其内在语法，使神话有可能产生一定意义的各种规则和规定。
他认为神话是按“二元对立”的方式来谋篇布局的。其意义的产生是通过将世界分
为两个相互排斥的对立面来实现的。例如，好/坏，黑/白，男人/女人。
他还认为所有的神话都有一个相似的结构，同时所有的神话在社会内部都有一种相
似的社会文化功能，即神话是为了对世界进行解释说明，从而解决其间的各种问题的矛盾。
3、莱特和美国西部片：运用了列维的结构主义方法对西部片进行分析，认为西部片
的许多叙事来源于它的二元对立的结构。其比列维走得更远的是，理解某个神话的社会意义，
不仅要对其二元对立结构进行分析，还要对其叙事结构进行分析。
4、巴尔特《神话研究》：《神》是一本研究法国通俗文化的论文集。。他的目的就
是要通过浮华的表象揭示通俗文化的各种作品和实践中常常隐含不露的东西。他运用索绪尔
的语言学模式去分析法国的通俗文化，将符号学的方法论引入到通俗文化研究中来。
巴特尔运用索的“能指/所指=符号”的图表，并在此基础上又增加了表意的第二个层
次，第一层表意由一个能指和所指共同构成本义符号，本义符号又变成产生“所指”的“能
指”。神话具有一种双重的功能，它指出某些东西，同时又将这些告知我们，它使我们理解
某些东西并将其强加给我们。
各种转义不是仅由一幅图画制作者们创造出来的，是从现存的全部文化作品中激活
起来的。这个形象既是从全部文化作品中提取出来的，同时也为全部文化作品增加新的内容。
大量社会知识的积累使得由本义向转义变化成为可能。
图片很少单独出现，总要配以某种形式的语言文本，而且它还将被放在某份特定的
报纸或杂志中的上下文背景中。语言信息以两种方式发挥作用，一是帮助读者判定这幅图片
的本义；其次，它限制了这幅图片的各种转义发生扩散的可能性。
5、德里达
6、拉康
7、福柯
8、萨义德
第五章 马克思主义
1、古典马克思主义：马克思主义文化研究方法认为，必须将各种文化作品与其产生
的历史环境联系起来进行分析。其中心论断：一个社会生活资料的生产将最终决定这个社会
政治、社会和文化样式及其未来的发展。文化永远不可能是历史中的主导力量，但它可以是
历史变革中的一个积极因素或者是保持社会稳定的一剂良药。
2、法兰克福学派：指与法兰克福大学社会研究所有关的一群德国知识分子，该研究
所成立于1923年，1933迁往纽约，1949又迁回德国。该所将马克思主义与精神分析学融
为一体，被称为“批判理论”。代表人物有阿多诺、本杰明、霍克海默尔、劳文托尔和马尔
库塞等。
攻击大众文化，因为大众文化对文化标准构成了威胁，并使工人阶级非政治化从而
维护社会权威的统治。
A文化工业：47年霍克海默尔和阿多诺创造了文化工业一词，用来指称大众文化的
产品和过程。他们认为文化工业产品具有两大特征：文化同质性和可预料性。
认为通俗文化是为了维护社会权威服务的，从通俗文化中看到了顺从一致。
劳文托尔认为，文化工业通过生产一种以“标准化、老套、保守主义、虚伪、受操
纵的消费品”为标志的文化，致使劳动阶级非政治化。简言之，文化工业不鼓励大众超出现
存的范围去思考。资本主义通过为某些需要提供一定的满足，从而能够防止更根本的欲望的
形成。文化工业因而阻碍了政治想像力的形成和发展。
B、“真实的”文化或肯定性文化：马尔库塞认为，而肯定性文化包含着对明天的期
望，也包含对今天的批评，同时它也是一个让我们进入其中以便恢复活力、重振精神以继续
事业。而它正在不断受到文化工业生产过程的威胁。
C、文化工业在追求利润和文化同质性的过程中剥夺了真实文化的批评功能，商业化
将真实文化变成为另一种文化商品，使之变得太浅显，从而降低了“真实的文化价值”。
D、文化民主的结果是限制了全面民主的要求，起到了稳定现存社会秩序的作用。
工作导致了大众文化的产生，大众文化又引导人们重新回到工作中去。文化工业所
传播的艺术或真实的文化也以同样的方式发挥其作用。
E、本杰明《机械复制时代的艺术作品》：文化的技术性复制正在改变文化在社会中
的职能；技术复制改变了生产，从可复制性出发而设计；消费也发生了变化：从宗教仪式消
费变成美学仪式消费。
在机械复制中，开启了从“氛围”文化向“民主”文化发展的进程，在“民主”文
化中，意义不再被看作是“独一无二”而是可以质疑、使用和调动的。
阿多诺将意义生产定位在生产上，本杰明认为意义是在消费时发生的。
3、阿尔杜塞主义：最大的贡献在于他以各种不同的方法将意识形态概念理论化。
他坚持社会构成论，即社会构成是由三个实践构成的：经济、政治和意识形态。
A、意识形态理论化的第一个定义：人们通过意识形态实践了他们与现实生存环境之
间的关系。
意识形态实践使个体与社会构成之间的关系发生了转变，即意识形态是为了消除自
下而上中和各种矛盾而存在的。意识形态是我们在表征层次上实践我们与现实生存环境之间
的关系的方式，这种关系既是现实的也是假想的。
盖然性：只给自己提出能够回答的问题，而对那些可能超出其界限范围的问题保持

战，战争是发明之母，那么对于传播学同样也适用的二战。另一个，大
量的学者由于战争来到了美国。还有就是研究的必要性，为了更好的去
服务于战争，美国政府也把大量的科学家研究者们聚集在
一起，所以就形成了一个所谓的华盛顿的科学家知网，社会科学家之网。
施拉姆本人就处在这样一个社会学织网当中，他的传播观也是在这段
时间来形成的，书中第 10 页有写到。 而是施拉姆在这个过程当中，
不仅是形成了成熟的传播观，而且还可能从中产生了一个创立传播学学
科的冲动。那这部分呢，我们第一章在第 19 页讲老爸布莱尔及其弟子
们，这里面有专门提到，当然作者也没有明确说出来，他暗示我们施拉
姆可能受到了老爸布莱尔的影响，因为布莱尔相当于是新闻学一个学
科的重要创造人，特别是说他强调：新闻不只是一个职业教育，而且
强调了学术性。为此在新闻学院做了很多的工作， 那么老爸布莱尔的
很多弟子在华盛顿这样一个社会科学织网当中跟施拉姆有交集，所以
也促使是拉姆在某种意义上去努力的去缔造传播学的博士生课程，编写
传播学的教材。
那么从时间角度来讲的话，我们可以这么理解，施拉姆在这个大学期间
经历了三个学校，一个是早期的衣阿华大学，他从华盛顿回到衣阿华大
学之后就开始尝试进行大众传播的学科的初期建设，由于资金问题又转
移到了伊利诺伊大学。所以正式的传播学学科的建立，是在 1947 年之
后。但是后来他在伊利诺伊大学就没待多久，后来又跑到了斯坦福大
学，在那里呢，他培养了很多后来著名的传播学研究者。
12. Q：《传播学史》开头提到的三角测量法是什么？
A：第三页的三角测量法是什么意思呢？可以简单地理解成，当我们在测
量某个东西的时候，我们不只用一套东西去采访他。比如说想测量一个人
这个英语好不好，你可以通过给他出选择
题。但是你也可以换一些角度，我通过这个填空题或者连词成句。通过
阅读题，通过很多不同的这个测评体系去评价，去考核。这样的话就能
够更加全面的测定。所以三角测量法的一个初衷，或者说这个选项就是
说，我们通过不同的维度去测量一个东西，那么反过来我们在学习传播
学知识的时候，也可以利用这样一种思路。
如果我们只是按照传播学教材的这个顺序或者逻辑来背诵的话，你可能
感觉自己背得很熟，但是一旦换一个环境，换一种表达方式，就像把选
择题变成了填空题，可能很多时候你就突然忘记了这个学者，他到底讲
什么了。这也是这本书一个非常重要的这个价值，大家一方面可以去获
得一些对传播学的认知，同时，也可以把它作为一个帮助你进行练习和
巩固知识的工具。
13. Q：哪些因素推动了在美国的建立？这个问题学长好像讲到了战争和人
才，但没有讲到其他的政治经济学科的背景，所以我们是只根据书中的
内容来给出的结果吗？
A：传播学为什么最早在美国建立很多书里面都提到了，当然不只是我们刚刚提到的两
个因素，比如说还有美国自己本身的因素，比如说当时美国国力强大，工商业发达。
那么发达的工商业会形成什么呢？比如说发达的广告业发达的传媒公司出现。
这方面大家也可以去参考一下其他资料，包括我们这个胡师姐的蓝皮书，里面其实也有写
到。

1. Q：这一部分我们主要讲达尔文，弗洛伊德和马克思。那么问题来了，为什么这三个人会和

2. Q：他们的革命性到底在什么地方？对学术研究而言有什么重要的推动作用？
A：我们知道达尔文通过他的进化论让人们意识到其实人和动物并没有本质的区别。而在达尔文
提出进化论之前，当人们没有对此有任何意识之前，我们对于人的研究是很不一样的。有人曾

很难对人进行科学的研究。
那么弗洛伊德做出什么贡献呢？如果说达尔文打碎的是人在肉体上跟动物有别的观念。那么
弗洛伊德则在精神上把人类精神上的优越感也打碎了。原来我们人类在精神上很大程度上也

重大的启示作用。而传播学归根到底也是一门人学，是一门社会科学。如果没有他们两个关
键性的作用，今天传播学的很多的领域可能是开辟不了的。当然还有一个马克思这个我们下
节课会来谈。
3. Q：（P33-P38）简单讲一下这三个人的伟大思想是怎么来的？
A：这部分主要讲的这几个东西。文艺复兴期间的印刷术，大学机构，新的科学发明、科学观以
及地理大发现。为这三个人的思想提供了基础。大家可以结合罗杰斯的创新扩散来更好地理解
这样一个过程。也就是说这三个人的思想不是凭空出现的，而是有着很多很重要的现实基础。
比如印刷术。印刷术在我们传播学当中。是一个经常会被举到的例子。比如我们在讲技术如何
影响社会的时候，哪怕你其他的例子举想不到，你也可以把印刷术拿过来举例。
4. Q：印刷术到底对我们的社会造成什么样的影响？有同学知道吗？
A：大家提到了很好的一些点。比如的印刷术让知识变得更易得，比如印刷术让教会的权利被削
弱，当然还有同学提到了印刷术带来了传播形态的变化。但是这个传播形态的变化大家要注
意，不是说让这个口语时代到文字时代，一般我们认为是从文字时代进入了印刷时代。
5. Q：这里有一个新的问题，是不是因为印刷术 2 使得我们进入了印刷时代,我们就直接产生了
大众媒介呢？有了印刷术有了印刷机人类从此进入了大众传播时代，这样说对不对？ A：
我们书中在第 35 页罗杰斯专门讲了一下。罗杰斯认为要到廉价报纸《太阳报》的产
生，才真正算是大众传播的开始。这里还不是说报纸的产生，因为早期的报纸是政党报
刊，发行量很少。可能都不一定有胡师姐团队给大家发的一些纸质材料那么多。所以当
时的传播再加上受众有限，还不能算是大众传播。就像有同学提到的，大众传播意味着
覆盖面非常广泛，
而这是由廉价报纸开启的，是商业化时代，商业报纸时代的产物。这点大家一定要理解。
当然，印刷术还带来其他的作用，书中没有一一交代，我们可以补充一些：比如民族主义民
族国家的形成。因为一旦要用文字通过印刷的方式向大众向公众派发信息的话，比如发一些
《圣经》或者宗教刊物，就没办法用拉丁文。为了更好的传播给不同地区的人，会优先选择
他们本民族的语言，所以就进一步的产生了民俗的共同的感知和想象，形成了民族国家这样
一种想象的共同体。
除了印刷术之外呢，书中还讲到了另外一些非常重要的关键因素，比如说研究机构大学的出
现，马克思、达尔文、弗洛伊德都是接受过大学教育并从中受益的人，也因为学术机构的存
在，知识思想可以更好地保存交流。所以我们也可以把这部分结合到创新扩散的案例当中去
理解
6. 这个是第一部分最开头的一些内容，下面我们来进入达尔文的部分看看第二章。
A：首先我简单介绍一下达尔文，关于达尔文大家都很熟悉了，我们学生物的时候都学过他的进
化论。书中提到了一些比较有意思的点，大家可以关注一下。首先达尔文他家条件非常
好，算是英国的中上层阶级阶层，这是关于达尔文的空间定位。那么达尔文是什么时候的人
呢？大家可能看书的时候没有太注意，他跟后面的弗洛伊德其实差了很远。达尔文发表进化论
或者是说发表《物种起源》差不多是在 1859 年左右，当然他是等了好久之后才发表的。他

如杜威、米德他们是一个年代的，弗洛伊德经历过一战二战。
其次呢，书中也写到，其实不像我们想的那样到外面游历了一圈就有了关于《物种起源》中自

的手头的资料中获得的。所以这里就涉及到一个问题了，关于创新扩散的问题。就是达尔文，
他怎么最终成为历史上第一个提出完整的成熟的进化论的这样一个人。书中从创新扩散的角度
给了我们一个启示，就是达尔文不仅仅是一个局限在生物学领域的学者，他一方面广泛阅读，
涉及很多其他学科，另一方面他有着非常广泛的科学通信网络。他虽然从海外回来之后变成了

7. Q：为什么说自然选择说的直接促成者是一个社会学家、一个经济学家、一个统计学家。
A：（同学回答:社会哲学家斯宾塞，他在一社会达尔文主义著称的理论中将进化论应用于社会生
活。赞同将自由放任的资本主义作为体系决策的最有效机制“适者生存”；亚当·斯密对于自
由放任的经济学的论述，竞争作为企业生存斗争的结果在使经济建立秩序方面的作用，
给他留下深刻印象；统计学家阿道夫·奎特勒的著作，讨论了托马斯·马尔萨斯的观点，即 人
口呈几何级数增长，而食物供给只是呈算数级增长的观点。阅读了马尔萨斯《人口论》，以便回溯
讨论的源头）有同学已经把正确的答案给提上来了,我们简单的再来看看这几个人物。
首先第一个斯宾塞。这是一个历史上非常有名的人物。我们经常提到的一个词叫做社会达尔文
主义，就是斯宾塞首创的。斯宾塞还提出了适者生存的概念。达尔文一开始用的是自然选择，
后来他觉得斯宾塞这个概念很好，就把适者生存用来解释自己的进化论了。所以斯宾塞给达尔
文提供了一个很好的概念或者视角，就是适者生存。书中在第 59 页介绍了斯宾塞的社会达尔
文主义。今天我们社会当中还有很多思潮跟社会达尔文主义相关。（大家想一想我们很多的企
业，谈狼性，996。这些其实在很大程度上继承的是社会达尔文主义的一种思想。所以斯宾塞自
己在当时之所以是红极一时的人物，就在于他把这种相对来说比较残酷的竞争合理化了。人类
社会在他看来跟自然是一样的，都是适者生存的。在竞争中活下来，在自由竞争中活下来，就
是最优秀的。这种竞争带来的是效率，你适应不了这样的狼性这样的 996， 你不能按照这样的
效率进行奋斗，在斯宾塞看来，你就是应该被淘汰的人。所以今天虽然社会达文主义在很多地
方被认为是不好的。但它的一些变种形态在我们国内和世界其他很多地方，其实都还是有市场
的。）
书中在第 60 页也提到了。斯宾塞把这样一种适者生存跟进化进行关联。他认为这样的竞争之
下带来的社会的变化是进步。也就是说社会会越发展越进步，越竞争越进步。这样的观点随着
两次世界大战的到来破灭了。很多人发现人类社会并不是这样简单的进步的。发展并不等于进
步，文明本身并不一定是进步。但是在早期，因为他思想把自由资本主义给合理化 了，所以
很多资本家都非常支持他，比如说我们后面会提到的洛克菲勒。我们经常说传播学是建立在石
油基础之上的。为什么这么说呢？因为洛克菲勒就是一个石油大亨或者说是大资本家，他支持
了很多传播学的研究，洛克菲勒本人就是斯宾塞的粉丝。我们回过头来看，确实承认适者生存
是一个非常有道理的表达，但问题在于这是以一时一地的结果考虑的。本身并没有指出什么样
的特质是有利于生存的。比如狼性文化，比如一味地追求工业文明的效率真的在最终层面上有
利于人类的生存吗?有利于社会向好的方向发展吗？其实不一定,可能也会带来毁灭。
好，说完斯宾塞我们再来看看下一个人物，其实是两个人物。一个是作为统计学家学家的奎
特勒。还有一个是奎特勒经常提到的一个人物叫做马尔萨斯。或者我们可以简单把马尔萨斯
作为这个关键词。马尔萨斯的思想给达尔文带来的什么启发呢？我们说斯宾塞给达尔文送来
了适者生存这样一个概念让他能够更好地表达自己的思想。当然要注意，达尔文本身并不赞
同斯宾塞的社会达尔文主义，只是用了他的概念。而马尔萨斯则提供了另一个有说服力的证
据，就是物竞天择中的“物竞”。也就是说马尔萨斯通过他的人口论想阐述一个道理，就是
资源总是不够的，所以为了获取资源就一定会有竞争，会有淘汰。最终，适合环境的物种就
会得到发展。所以他通过对人口的分析，把生存压力淋漓尽致地表达了出来。他通过自己的
研究进一步给达尔文带来了信心。我们说进化论可以简单的表达为物竞天择，适者生存。达
尔文他不光提出观点，他还希望有证据，因为他的观点太惊世骇俗了。所以他在有这个思想
之后的很长一段时间里面都在各行各业各个学术领域寻找相关的证据。那么马尔萨斯思想其
实也是给他带来启发和信心的一个点。
当然最后还有一个亚当斯密。这是一个经济学家。他跟斯宾塞有些像，他们都为自由竞争提
供了合理化的理论依据。亚当斯密认为自由竞争看起来不是那么美好，但是却带来了社会利
益的最大化。所谓看不见的手，在每一个人都为自己的利益为自己的生存资源进行奋斗竞争
的过程中，反而在很大程度上能够有利于社会。比如创造了很多的物质财富，让大家的生活
水平相比过去而言都变得更好。OK，以上是达尔文思想的一些影响者。
8. Q：进化论有哪些版本？
A：（其实进化论思想的一些不同的版本和演变跟咱们传播学的很多理论很相似。）就是他看起来好
像是一个简单的不能再简单的道理，但其实内部是由很多不同的走向和可能性的，所以会产生
不同的派别。
有同学提到的拉马克。拉马克的进化论是一个什样的版本，他跟达尔文的差别在哪？拉马克
的进化论简单来说是一种后天进化论。也就是说他认为物种形态的演变跟祖先在后天获得的
一些特性有关。比如长颈鹿的祖先老是伸头去够树枝上的东西吃，久而久之脖子变长了，所
谓用进废退。所以他的后代就获得了这样的特性。但是显然，这样的观点是有问题的。比如
说我们把一只犀牛的角割掉，那它生下来的犀牛宝宝照样会有角。
达尔文的进化论呢？可以简单理解为一种先天进化论。也就是说是由于遗传方面的变异导致
后代产生了不同。但是这种进化论所提到的变异是一种渐变，每次可能变革那么一点点，久
而久之，积少成多就形成了重大的变化。但后来还有新的进化论认为变异真正起到作用的不
是渐变而是突变。进化论看似简单，但是其实是有很多不同的维度的。咱们传播学的理论很
多时候也是这样，随着时间的发展不断有人提出新的角度。
9. Q：达尔文的进化论除了在学术研究的意义上，让我们可以更加客观地看待人看待人类社
会，从而激励了很多人去对人进行更加科学的研究之外，还在哪些层面对传播学有着直接
或间接的影响呢？
A：这点罗杰斯在书中的第 63 页进行了一些简要的介绍。比如提到了达尔文对于非语言传
播的研究，还有很多概念和机制被一些群体生态学学者所使用。但其实我们其实还可以再补
充一些。
（P63 图）
达尔文的思想在很大程度上影响了我们后来传播学实证主义或者说经验研究当中的功能主义
研究。像拉扎斯菲尔德、莫顿以及其他一些对传播的社会功能进行区分的学者。这样一种功
能主义的视角其实很大程度上受到了达尔文的影响。因为他们把社会当做是一种有机体。要
完成一定的功能，实现一定的功能才能够存在下去。如果某些功能没有履行好，那么这个社
会就会出问题，甚至可能出现灾难，也就很难正常持续下去。这里其实就有一定的适者生存
的味道。当然，这种社会有机体的思想不只是达尔文提出来了，很多其他的早期学者也有提
出的。
我个人觉得呢，达尔文的贡献在于向我们揭示了人类变化的原理。在这样的启示之下，我们可
以把这样一种通过渐变或者突变产生变化的思想运用到对社会变迁的解释中去。在复杂的现象
背后都有一些简单的道理。所以马克思就在类似的基础之上发展出了辩证唯物主义，比如说像
经济基础决定上层建筑一些比较简单的原理。好，关于达尔文我们先简单介绍到这 里，接下
来我们看一看弗洛伊德。
10. 介绍费洛伊德
A：弗洛伊德和达尔文都是震惊了世界的人物。（刚刚我们讲过弗洛伊德相比达尔文是一个晚辈。
弗洛伊德从小就是一个学霸，智商很高经常拿高分。但是因为他是犹太人所以在发展的过程中
受到了一些挫折。他自己去搞这个精神方面的研究也跟因为犹太人受到的挫折有关 系，他没办
法在大学里面直接教书。）我们书中呢对弗洛伊德的生平、核心思想、相关人物都做了介绍。可
能大家读完之后还不是很能够了解这个精神分析为什么这么牛这么厉害，在当时怎么就吸引了
那么多人追随。因为我们用今天科学的眼光来看这套精神分析的技术，很像是一种伪科学。它
完全没有办法证伪，很玄乎。在心理学界很多的人并不把它当做是一种科学的心理学。
这里面其实有一个重要的历史背景大家需要知道一下。就是当时的心理学才刚刚起步。当时
有一个非常重要的心理学思潮，我们传播学中也提到了，叫做行为主义。这样一个思潮出发
点是好的、科学的，是去研究心理问题。但是人的精神人的心理看不见摸不着，每个人还都
不一样，似乎无从下手。那么该怎么办呢？行为主义就提出一个观点：我们不去研究黑箱。
所谓黑箱就是人的心灵，因为你反正也看不见。我们不如去研究什么呢？研究黑箱两端的输
入和输出，我绕过黑箱我只看行为。所以这样在他们看来，人其实没有什么本能不本能的东
西，一切都是刺激反应。比如行为主义就认为，我们人的很多行为。其实都是通过后天的强
化得来的。比如说我们做出某种行为之后，得到了很多的奖赏，可能是父母的微笑或者是好
评，这样我们就会更多的去采用这种行为。这一切都是刺激反应的结果。不需要通过什么内
在的本能或者看不见的这种心灵状态来解释。当然行为主义本身有很多不同的流派。总之，
当时行为主义在心理学当中是风头非常强大的。
弗洛伊德的理论之所以在当时也引起了众多的关注就是因为他站在了另一端。所以让很多不
满于行为主义的人，比如说偏向于人文研究的学者找到了靠山找到了组织。再加上弗洛伊德
本人提出了很多非常有想法的非常有创造力的概念。并且他早期的一些精神分析用来进行心
理治疗也确实有成功的记录，所以当时就引起了很多人的兴趣。大家听到这个理论之后感到
得到了重大的启发，从来没有想过可以去这么研究人的心灵，通过分析童年的精神世界明白
我们很多时候人的行为是受所谓的无意识影响的，并不完全是理性的抉择。这样好像很多情
都能说清楚，所以这样一来我们不必把人当成是10机器，是刺激反应的结果。人的心灵虽然有
很多非理性的要素，但是我们也依然是可以去进行探究的，所以使得很多人投到了他的门
下。
我们其实传播学=学中的很多人物或多或少都跟弗洛伊德有关。
11. Q：大家可以想一想哪些人是跟弗洛伊德有关或者是崇拜弗洛伊德深受他影响的人？
A：（同学回答：拉斯韦尔、沙利文、霍夫兰、荣格，阿德勒）
这其实可以理解，我们今天也是如此。因为人始终要认识你自己，对这种认识自己的渴望一
直以来都很强大。行为主义一句话说不看黑箱肯定是不能让人满意的，而且他们对于人类行
为的解释过于简单。我们今天的很多心理学还有一些星象学，之所以很热门其实就是因为他
在尝试给你提供一个你自己的画像，让你更好的认识自己。很多同学已经提到了一些人物。
哪些人受到了弗洛伊德的影响呢？我先说一个大家没有提到的——弗洛姆。这个是我们后面
会提到的批判学派的一个重要的人物。当然批判学派除了弗洛姆之外，像马尔库塞其实都受
到了弗洛伊德的影响。如何受到影响的这个我们下节课再谈。
像拉斯维尔为什么会受到弗洛伊德的影响呢？因为他作为一个政治学者，想要去研究政治人
物。因为很多政治的事件和行为都跟政治家个人的特征有关。所以这样一来他很容易就会想
到：我要不要去对这些政治人物做一些访谈，搜集一些他们的资料？更好地了解他们的人格心
灵世界。书中的第 86 页也提到了这些观点，大家可以看一看。因为精神分析理论强调把人类
行为的原因很大程度上归结于内心的精神。用弗洛伊德的话来说，这种内心的特质很 大，行
动上是受到本我、自我、超我之间相互作用的结果。
也因此我们的传播很大程度上作为一种行为也是如此。很多传统的传播研究，研究的通常是
人类什么呢？是人类比较有意识的理性的传播，但其实我们人类真实的传播不只是传递，还
有很多东西都是无意识的。书中第 87 页就举出了很多相关的这个例子。比如说海德的平衡
理论，费斯廷格的认知失调或者认知不和谐理论。这些都告诉我们想要说服一个人除了使用
霍夫兰那一套，还可以借助某种非线性的说服方式。利用人们的无意识进行说服，也正因为
如此，传播其实比我们想象的更加厉害，更加有效果。
像霍夫兰以及早期的一些研究者，他们得出的结论是传播的这个大众传播的效果很有限，都是
最终可能受到很多因素的影响和过滤才能产生效果，这其实是把人想象成为偏理性偏有意识的
人。如果我们人确实是这么的进行交往的，始终都是通过我们明确的意识进行思考和分析和接
受，那可能的确像传播、广告、政治宣传的这个效果就会比较有限。但其实人不是这样子的，
弗洛伊德的思想以及与之相关的一些心理学方面的研究其实就接受了这一点。你以为广告没有
效果，其实他在无意识层面已经在深刻地影响你，只是你暂时还不知道而已。我们早期的大众
社会理论，像魔弹论它在很大程度上就是建立在弗洛伊德的思考之上的。把人理解成很大程度
上是非理性的。所以很多时候高明的宣传家，在特殊的情境下就能够起到很大程度的对人的操
纵。（相关的内容。在后面乌合之众等其他书的带读中会有其他老师给大家来讲。
Q：弗洛伊德他的这个学派，他跟他的弟子之间为什么后来决裂了？他的思想被认为在哪些方
面存在局限性和不足？因此被他的弟子和后来的一些研究者进行了完善或者超越。
A：（同学回答:在儿童性方面的分歧；弗洛伊德对于性的强调以及诱奸理论的坚持）也就是说虽
然他提出了很多很有启发性的观点，比如说无意识、我们人有很多自我。但是他把这种无意识
的来源或者是说把这些重要的无意识的源头归结于小时候或者童年的一些性方面的不满足。这
种归类比较有局限性，所以引起了很多他弟子的不满意。（比如说如果我们根据弗洛伊德的解
释，如果你今天在某些方面出现了一些心理上的障碍或者是说精神上的一些困扰。那你是不是
小时候在这个在性方面遭到的问题？但其实对很多人来说并不是这样的情况，对 吧？但是按
照弗洛伊德的想法你肯定是有的，没有的话说明你自己把它给压抑了。这就很让人恼火，所以
很多人不接受而且也认为这个确实不符合事实。所以他的观点就触怒很多人。弗洛伊德的确是
一个天才但他也是一个狂人）因此，他的很多弟子就对他的学说进行了完 善。比如说他有一
个女弟子叫做霍尼，她就认为其实很多时候后天的文化氛围也会对我们的人格无意识地造成影
响，并不应该都归结于性。
（这个霍尼也很有意思，是一个非常厉害的女性理学家。跟我们前面提到的另一个著名的传播
学方面的人物弗洛姆有过一段爱情。他们两个还有一个非常著名的弟子。这个弟子就是大名鼎
鼎的马斯洛。马斯洛需求层次理论的那个马斯洛。所以真的学术的世界非常小。）
当然弗洛伊德对于我们传播学的影响不只是提供了很多新的启发和思路。很多的学者也是在
对弗洛伊德的反思中，在反对弗洛伊德观点的过程中，发展了自己的学说。还有些人比如说
像霍夫兰的老师以及霍夫兰他们把弗洛伊德的一些观点进行了定量研究。弗洛伊德他是一个
比较晚辈的人，他自己经历过两次大战，所以他的思想之所以会影响到美国传播学的学科的
生成很大程度上也是因为他的弟子们被迫从欧洲跑到了美国。当然，我们第二节课呢只是让
大家看到书本第 87 页。后面还有一个重要的跟弗洛伊德有一些关系的学派——帕洛阿尔托
学派。我们会留到下一节课跟批判学派一起来讲。
（达尔文和弗洛伊德这两个人考试一般不会直接考。因为他们跟传播学学科还是有一定距离
的，但是他们的思想很有利于我们去理解。我们这个学科本身发展的一些语境，比如说你了
解了弗洛伊德的观点之后你就可以更加好的去理解早期对于魔弹论，对于宣传的影响的一些
观点。其实从某种意义上来说人文社科领域是不分家的，学习传播学也一定要对于我们整体
的人文社会科学要有了解，否则很多时候你在读书的时候只能看懂字面意思，不知道这些东
西背后，历史上人们社会科学领域到底发生了什么？所以就很难去 get 到这个思想背后真
正的关键。）
【同学提问】
Q：前面说到，印刷有促进民族国家、民族主义的形成的作用，那再那之前人类社会没有这种
概念吗？希腊的城邦斗争、国内的大汉天朝啥的，算不算培育了民族国家的观念？
A：这其实就是古代跟今天的区别。古代的世界不像我们今天这样，我们在某个小地方足不出户
可以了解到天下大事，可以跟全国各地的其他的国民建立精神上的共同体。但是古代不是这样
的。比如说中国，我们更多强调的是家。天高皇帝远，比如皇帝驾崩了传到你这里可能都过了
好几个月了。大部分人所了解的事情都是自己村子里的周围的一些事情。可能有一些知识分子
家国情怀会比较浓厚一点。但是对于普通百姓而言他们比较缺乏这样的东西。
至于欧洲那边，就更加不用说了，本来就是各个国家林立。大家只是忠于什么呢？比如说，
我们经常说欧洲的封建是真正的封建，是一种等级制。我只需要对我的主人负责不需要对我
主人的主人负责。所以在很长一段时间之内，古代人世界里面对于国家这个东西其实不像我
们今天这样子，是把它跟民族给捆绑在一起的。国家可能就是一个统治者的头衔而已。也因
此很多人指出来说，正是因为大众报刊的出现，在某种意义上推动了想象的共同体的产生。
因为我们可以通过这种方式去跟更多的遥远的人联系在一起，我们有了更多的共同的经历和
经验，这就是传播在意识方面的作用。比如说我们可以一起来看阅兵，在古代是没有这样的
体验的。
Q:弗洛伊德利用如催眠术等方法探讨无意识和形成精神分析理论的过程，可不可以看作是一
个定性研究的过程呢？
A:好的，关于第二个问题确实这个是比较偏定性的。而且实际上在今天的定性研究当中依然 有
精神分析方面的定性研究。大家如果有兴趣的话可以去看陈阳老师的《大众传播学研究方法》。
好像是这个名字，里面专门有一节就是讲如何用精神分析来分析电影。
Q：民族国家、民族主义放到现在逆全球化浪潮下，要怎么理解这种民族国家与地球村的矛
盾？
A:关于第三个问题，这个问题比较大。我们可以这么理解，就是全球化在前期突飞猛进的过
程中可能过度乐观了。人类在很大程度上依然是活在过去的共同体当中的。而且很多的国家
和政府出于自身利益考虑，也会更多的鼓励这样一种民族主义的话语。虽然我们今天可以表
面上了解全球的大事，知道其他世界国家人民的生活情况，但是这样一种连接本身由于受到
语言文化等差异的影响，并不能够让大家通过互联网直接形成一个更大的共同体。相反，由
于互联网的语境本身不够完整，反而经常带来更多的误解。包括我们今天很多人出国旅行或
者说出国留学，看起来好像是对国外有了一定的接触，但是其实跨文化的交流是很难的，很
多时候我们在国外留学的时候，并没有去真正融入到国外的这个社群。很多外国人他对中国
的理解也是一知半解，所以只是通过互联本身还是很难实现人类心灵的这样一种和谐的连接
的。但这个问题非常的复杂，除了跨文化传播的因素之外，还有很多政治经济方面的因素。
总之我们可以简单这么理解，就是地球村代表了一种过于乐观的想象，可能会有地球村意义
上的比较能够互相理解的人类社群，但是这个时间可能需要等很久。

A：我的想法是原本全球化浪潮是基于经济层面的推动，现在你全球化也是基于经济层面上的
考量，会不会对文化而言，它的反应就没有经济那么剧烈
B：一带一路不是文化全球化的推手吗
C：全球化是 20 世纪 80 年代以来在世界范围日益凸现的新现象。其实全球化还没有统一的
定义。一般讲从物质形态看，全球化是指货物与资本的越境流动，经历了跨国化、局部的国际
化以及全球化这几个发展阶段。货物与资本的跨国流动是全球化的最初形态。在此过程 中，
出现了相应的地区性、国际性的经济管理组织与经济实体，以及以文化、生活方式、价值观
念、意识形态等精神力量为主体的文明的跨国交流、碰撞、冲突与融合。文化作为文明的核心
象征，历来是一个民族和国家的生存之本和发展之魂。文化建设始终与文明进步和社会发展紧
密相连,反映着一个民族的发展内涵和精神风貌，是一个国家综合国力的重要组成部分。在全球
化的背景下，文化在不断交流与冲突中变化发展中，文化建设始终与文明进步和社会发展紧密
相连,反映着--个民族的发展内涵和精神风貌,是一个国家综合国力的重要组成部分。
在全球化的背景下，文化在不断交流与冲突中变化发展着。进入 21 世纪之后，人类并没有因
为科学技术的发展和地球村的建立而出现和谐社会的盛景，由于文化冲突而导致的矛盾、战.
争、杀戳，时刻都在发生。从本质上来看，人类的文化历史，就是一部文化冲突的历史， 文化
冲突构成了人类文化发展的主旋律。
D：主要是我们说的全球化其实指的是经济全球化，至少文化全球化和政治全球化的说法还没成
为共识，但经济全球化成了共识，在这样的经济趋势下，文化和政治的表现或许因为经济而有
相同步调的地方，但毕竟三个东西不一样，肯定会有不同步调的地方。

各个方面的认识都有涉及】
好的刚刚有两位同学已经做出了回答，我再来补充一下。
首先这个学派很有意思。它的很多代表人物，都接受过精神分析相关内容的学习。但是呢？
学完之后，又并没有完全接受这个理论。而是用自己的方式重新去思考弗洛伊德所关注的人
的精神和心灵问题。
我们上一节课讲到过弗洛伊德的精神分析理论。主要是把我们今天人的很多的行为，包括精
神障碍，归结为过去所受到的经验无意识的压抑等等精神受创的内容。他们从这个角度来理
解精神疾病。这种理解，在当时非常具有启发性，突破了行为主义心理学的窠臼。但是帕洛
阿尔托学派的解释是有局限性的，他们认为很多的精神疾病并不是在过去受到了什么样的创
伤，导致经验或者无意识的压抑。而是在于传播的问题。书第 95 页对此做出了比较详细的
说明，大家课后也可以深入的看一看。
2. Q：帕洛阿尔托学派
A：这个学派其实很有意思，它在我们传播学的主流当中长期被忽视。但是其学说非常有价
值，核心人物贝特森，也是一个非常天才的学者。书上也写到，贝特森的老爸是一个非常
著名的遗传学家，正是他把孟德尔的著名遗传实验给普及了。而贝特森本人，也是一个跨
界的选手。他既有人类学的学科背景，也涉猎心理学，精神病学，社会学等。他的前妻或
者说是
妻子，就是我们前面提到过的另一位非常著名的人类学家：玛格丽特米德。
从狭义角度上来看的话，这个小组成员不多，比如说核心的人物有贝特森，瓦兹拉维克。如
果从广义的角度来说的话，如果把很多不在这个现场，但是跟这个小组有着长期的通信和交
往的人，也算做小组的成员话。那么像我们熟悉的戈夫曼，还有爱德华霍尔，其实都可以算
是这个小组的成员。这个我们书上没有具体讲，大家可以了解一下。
书上用了一个比较形象的比喻，来理解这个学派和弗洛伊德的关系。就地心说和日心说的关
系一样。
3. Q：怎么理解帕洛阿尔托学派的核心思想“元传播”？
A：【同学回答：（1）内容与关系；（2）即人们为了传播而进行的传播行为，包括对所传递符号
的定义及其诠释规则；（3）对于讯息进行分类】大家可以翻到书上的第 97 页，这里作者举出
了一个比较形象的例子来解释什么元传播。
也就是说我们其实在传播的时候，大家在互相沟通的时候，我们传递的不仅——比如两只猴
子互相开玩笑的咬对方的时候，除了一个咬的动作之外，其实还在传达非常重要的语境。就
是我不是真的要跟你战斗。而是开一个玩笑，我们只是在打闹嬉戏。所以书上提出来说，我
们的传播中其实有两个比较重要的维度：一个是关系，一个是内容。所以我们在进行传播的
时候，比如人际传播的时候，我们也在不停地尝试去理解对方的语境。
所以在这个意义上，通过这个学派的思想我们可以了解，传播是一个非常有意思的非常复杂的
活动，不是一个简单的编码解码的工作。所以很多时候传播是需要我们去理解背后的语 境。
元传播的存在，当然也会很多时候可能会带来困扰，出现没有正确理解对方的含义或者误解的
情况。但也正因为如此，我们在传播的过程中就获得了很多新的可能性，比如说通过语言的巧
妙用用法，来达到某种双关和幽默
4. Q：帕洛阿尔托学派的另一个观点：人不能不传播（P100），如何理解？
A：【同学回答：（1）传播即行为（2）因为人不经意的一个行动也可能传递一些信息，即使这个
人并不一定有这种传播意图，但是传播还是发生了。（3）所有行为都不是传播，但是人们在某
一个社会背景下可能无法避免传播，即使是拒绝传播的行为也传播“我不想交流” 这个信
息。】
其实这个思想和元传播本身也有一定的关系。
有同学已经提到了一些关键点，比如说，传播即行为源传播。我们可以认为，很多没有具体
诉诸某种文本或者语言的传播内容，它没有在内容的维度上信息。但是，它照样在关系的维
度上有意义。所把“传播”变得更广泛一点——不是所有有意进行的传递都是传播，在这个
意义上，即便是沉默，也能够提供一些在关系层面上的信息。所以这个学派非常有意思。
有同学问关系就是一种行为吗，不是这个意思。书中提到的行为，指的是传播的方式所借助
的东西。比如说你的衣服是非语言信息。这些东西。很多时候并不能传递具体的语言方面的
内容，比如我们前面提到的有一只猫在这里，但是它能够传达某种语境。甚至当两个人只要
他们相遇，就立刻会处在某种传播的场景当中。这个时候他们的这种传播就是一种最最纯粹
的元传播。当然，这种观点也会有受到一些争议。
当然由于这个学派重视元传播，重视的这种传播通常是建立在人际交往中的传播。而且尝试
去解读传播的微观过程。所以在当时就没有被主流学界所重视。因为那会儿主流的传播学者
忙着在研究大众传播及其效果。
当然源传播并不只是在人际交往中才有，我们也可以展开扩展一下。其传播中也是有元传播
的，比如说，很多时候我们看新闻，或者看其他的电视节目。我们并不是仅仅从它的内容层
面理解全部意义的。某个节目或者新闻，它的主题类型、言说的模式等等。其实就起到了一
种元传播的作用，它形成了一种关于特定主题的话语惯例。当然因为这个学派的很多的内
容、教材，或者说相关的研究不是很多。所以很难进行非常深入的理解，对这块内容大家简
单的了解一下。也就是在近些年陆续出现了一些相关的研究，胡师姐教研团队这边也会持续
关注。
5. Q：关于马克思
A：马克思是大家都非常熟悉的人物了，这里我就不多做介绍了。大家需要注意的就是他的时
间，我们前面也说了，这三大人物，弗洛伊德是晚辈，马克思呢？他比达尔文稍微小一 点，
但是要比弗洛伊德早。马克思发表《共产党宣言》的时候，达尔文还没有出版《物种起源》。
当然，马克思发表《资本论》的时候，《物种起源》已经出版了。当时马克思对达尔文也非常看重。恩格斯
还把马克思看作是社会学领域的达尔文。（马克思是一个非常天才的人物，马克思同学的博士论
文，没有经过答辩。因为他的导师觉得，马克思的文章写的太太厉害了，完全不需要答辩！！）
6. Q：马克思是怎么看待传播的？
A：【同学回答：大众传媒，统治工具，批判】
有同学提到了一些很重要的关键词。
大家要记住，马克思是一个历史上最伟大的资本主义的批判者。他的最重要的一个身份是社会
学家。他思考的问题是：人类社会为什么变成了这个样子？未来也会向何处去？他找到的一个
关键词是阶级。而阶级呢，又建立在某种生产方式和生产关系的基础之上。在他看来， 他所
身处的资本主义社会，之所以会出现问题，就是资本主义社会的劳动分工建立在和无产阶级的
对立之上。他认为将来的共产主义社会会超越资本主义,不再需要资本主义的那种劳 动分工和
私有制，人将会成为全面发展的人。而今天的资本主义因为通过劳动分工，通过私有制，使得
无产阶级处在一种叫做异化的状态。
媒体大众传播。它的一个重要的作用就是，在某种程度上有利于资产阶级进行统治。使无产
阶级，深陷在异化的泥潭当中。书上的第 109 页，对此有相关的介绍，大家可以看一看。
在他看来，统治阶级，由于占有优势。所以，他们的思想和意识形态，也会在社会上占有优
势。被剥削的阶级之所以没有能够集合起来进行清醒的反抗，很大程度上就是因为资产阶级
通过控制社会的精神生产资料，从而让无产阶级产生了虚假的意识，错误地认知了自己的身
份和周围的环境。这是马克思主义的一个非常核心的关于传播的观点。
7. Q：马克思主义的批判色彩
A：【什么是批判？】从马克思的意见上来说，我们进行研究，最终目的是为了改变世界，改变社会。
所以他的理论，不仅仅是一种简单的认知现实，而且还蕴含着变革的要素。马克思虽然对于资本
主义有很多批判。但是他对资本主义带来的生产力的突飞猛进还是非常值得赞扬的。他主要反
思的是这样一种资本主义体制上的工业化。在强化了人们对带来了极大物质财富的同时，也加
剧了内在的资源分配的不平等。
读过《人类简史》的同学。对此应该比较深有体会。《人类简史》当中就曾经说过：人类的进步很
多时候，是以集体为单位的。也就是说，对于人类整体而言，带来了很多的福祉。但是很多时
候，个体的生活并不见得会变得更好。比如说农业革命带来的生产力的巨大提高。
但是和以前的游牧采集渔猎时代相比，农民活的比较悲惨；比如说由于他们被固定在了土地
之上，所以他们无处可逃。
8. Q：为什么说批判学派（法兰克福学派）结合了马克思和弗洛伊德的理论？
A：我们书上，在第 110 页。提到了一个观点：“法兰克福学派或者说批判学派，将马克思
主义和弗洛伊德的理论进行了结合”。那这句话到底是什么意思？为什么说它们之间产生的
结合呢？
【同学回答：弗洛姆引入了对弗洛伊德理论的兴趣，马尔库塞将马克思的理论与弗洛伊德的
理论结合。以微观补充宏观，在其批判理论中，控制大众媒介的资本主义与社会精英的意识
形态具有弗洛伊德精神层面的理解，而其通过大众传播对受众的影响又具有马克思主义的色
彩】
很好，有同学已经提到了一些关键人物。再具体来介绍一下，大家可能听了之后就会更容易
理解这个问题了。
其实在很多法兰克福学派的学者看来，马克思的理论虽然很厉害。但由于时代的局限，它也
有些地方没有进行更加全面详细的论述。比如说法兰克福学派学者就认为马克思在资本主义
再生产方面，是一种不公平和剥削。前面有同学提到了马尔库塞。马尔库塞就是通过将弗洛
伊德的理论补充进来。从而更加深刻地对资本主义进行批判。
这里还有一个时代背景的问题。到了法兰克福学派的时代，资本主义的剥削，其实在表面上
并没有过去那么那么残酷。很多的时候，它带来了巨大的物质财富，社会上的底层人民也能
够从所谓的发达工业或者工业发达社会中受益。感觉上，好像无产阶级过得还可以，阶级矛
盾和冲突没有那么激烈了。大家可以自动代入我们今天的西方社会。比如说很多发达资本主
义国家，他们的国民，过的都挺嗨的。比如说很多外国公民，他们有很多休闲时间。很多美
国人跑到各种沙滩去度假，开一辆房车或者一个拖车，把自家的游艇给拖过去。这些游艇其
实相对来说并不贵，不是说巨富才有游艇的，很多住在海边的美国人家里面都有游艇。所以
你会看到，好像今天的很多人过得都挺好的。马克思的教育中理论似乎好像没有这种说服力
了。
但其实并不是这样子。所以马尔库塞就站出来了。他告诉我们说，在发达工业社会，虽然我
们的基本需求得到满足。但是发达工业社会是一个爱欲受到不合理压抑的社会，或者通俗来
说，就是资本主义给了我们很多虚假的需求。不断地去劳动，不断地去消费，反而带来了很
多新的精神的压力和困扰程度，甚至比过去还要强。而在这种压抑的背景之下，西方社会产
生了很多新的心理问题。因为弗洛伊德认为，人的总能量是保持一定的。所以我们的这样一
种爱欲，或者说生物本能被压制。
我们这里只是做了一个最基本的介绍。大家看过之后呢，可能会对书中那句话就能够有更深
的理解了，就是为什么他们把弗洛伊德和马克思的理论进行了结合。
当然，法兰克福学派或者说狭义的批判学派，也是非常有意思的。他们主要是一群犹太富二
代。他们生活的背景是一战和二战。也就是说他们多在青年时代经历了一战，有的甚至还参
加军队；然后在中年晚年又经历了二战。所以他们就在深刻地思考：为什么人类会走到今天
这样一个地步？所以在这个意义上，他们从弗洛伊德那里吸收了一些思考，比如说他们对于
人性的认识。
我们书上在第 118 页。讲到了法兰克福学派曾经组织的一个非常大型的研究，叫做权威人
格研究。研究就是偏向于精神和心理学的。想要去了解一下极权主义或者说权威人格到底是
什么样的？到底是怎么形成的？
9. Q：如何看待批判学派和经验学派之间的分析？
A：这块内容，我们在这本书里以及很多其他的教材里面其实都有涉及。简单来说，它的区 别
在于方法的区别，以及方法背后的世界观、价值观等方面的区别。有兴趣的同学可看一 看刘
海龙老师的那本教材。简单来说，经验学派更多的想要从科学的角度去寻找与传播相 关的各
种规律。而批判学派则认为，所谓的规律，或者说我们通过某研究发现的规律并不 是真正的
规律。就像我们前面说的，今天的很多无产阶级他们其实是被大众传播给误导了 的。他们对
于现实的认知和判断，是受到欺骗的。在某个特定历史时期，受特定意识形态 影响的某种结
果和情况，正是批判派所要打破的。他们现在的某些东西其实并不合理，所 以他们想要通过
自己的研究，找到那些在我们认为理所当然的事物背后存在的控制和权利， 从而引导大众去
寻求解放。当然我们书中的第 126 页，还进一步介绍了今日的批判理论， 但这块内容比较
较简短。有兴趣的可以去看其他的传播学教材，那里面会有更多详细的介绍。
这三位欧洲的智者（达尔文，马克思，弗洛伊德）他们都对我们的人文社会科学造成了巨大
的影响。这种影响对美国的传播学的生成起到了很大的作用，比如很多批判学派的学者都在
二战时期来到了美国，从而把思想火种也传到了美国。虽然批判学派本身，并没有直接被施
拉姆纳入最初的传播学的框架。但是上世纪 60 年代往后，随着传播学内部的反思的开始，
越来越多的人开始把批判学派纳入了我们传播学的框架。
以上是我们今天的一些简单的梳理
