=====《传播学史》/4.25Day4笔记.pdf=====
4.25 胡师姐公益带读 Day4
上几节课我们简单梳理了一下传播学的欧洲起源，重点了解了三位欧洲智者的思想和他们的
传承他，们是传播学欧洲起源的最核心的部分但不是唯一的思想来源。实际上在传播学的相
关的这个基础思想传到美国之前，有一些是由其他的一些重要的学者所完成的。这就是我们
今天要重点来了解的知识。
1. Q：书上第 134 页做出了具体的梳理，提到了涂尔干、西美尔、塔尔德、韦伯等学者。那
么他们的思想为什么会传到美国?
A：其实中间有一些比较有意思的故事。首先是因为，当时欧洲的大学非常的一流。所以很
多美国的学者，他们都有在欧洲留学的经历，特别是在德国。因为德国的大学比较早地采
取了研究型大学的路径。也就是说大学不不只是教已有的知识而且还要促进对新知识的研
究。大家今天可能也会比较羡慕当时德国大学的情况，就是大学里面没有课堂测验，到结
束的时候完成综合考试。然后是否上课，其实对于考试结果可能没有那么紧
要。你可以去随便听任何感兴趣的课，比较自由地从一个大学转到另一个大学。 所以掌握
德语甚至是很多美国的大学对博士生的要求。很多著名的美国传播学者，都有留德或者留
欧的经历。比如说我们今天要讲的这个芝加哥学派里面就有很多学者像这个帕克， 米
德。特别是听过一个德国学者叫做西美尔。我们书上会把美国的社会科学的直接根源归结
于我们刚刚提到的这些学者。
2. 介绍一下西美尔
A：书上写的比较简单，可能大家想要更深刻的了解的话，还需要再翻一翻其他的这个教材， 比
如说刘海龙老师的。教材里面就对其中的一些学者做的比较详细的解释。
我们先来看看这个西美尔。大家对西美尔有了解吗？能说出跟他相关的关键词吗？（社会网
络、城市生态学、社会距离以及边缘人等概念; 现代社会学、人类传播; 形式社会学、凝聚与
冲突；不被重视）有同学首先知道他是这个现代社会学的创立者之一。这是他的这个学科地
位。还有同学举出了它的核心的概念或者理论，比如说这个边缘人的问题。当然。像这个城市
生态学呢，我们这个严格来说，是西美尔对帕克的影响。还有同学讲到说西美尔生前不受重
视，确实是这样子的，因为他是一个犹太人所以他很难找到正教授的也就是一个长期的这个教
授席位，长期在德国学界处在一个边缘状态。那么西美尔他的社会学核心思想是什么 呢？他
的核心观点是认为社会学研究的重点应该是社会的互动形式，或者说是社会中人与人之间的互
动形式。在西美尔看来，所谓社会并不是一个实体，不是一个看得见的东西，社会其实就是一
个变动不居的过程。正是人和人之间的互动才构成了我们所说的这个现实的社 会，只不过是
由社会互动联系起来的很多个体的名字。所以我们这样就能理解为什么我们芝加哥学派后面会
有所谓的符号互动理论，这种对于互动的执着其实就是从西美尔这里来的。而当时的很多其他
的社会学的先驱们的关心重点就不是在于人与人之间的互动（比如涂尔 干）
还有一个很重要的思想，刚刚同学也提到了，就是陌生人。我们第一节课就提到说罗杰斯自
己写这本书的时候就感叹说他有一个遗憾，他没有能够把陌生人理论更加详细的说出来。
3. Q:这个陌生人说的是什么呢？什么是陌生人？为什么要研究陌生人？我们可以简单的这么理
解，陌生人有很多种类，有时间上的也有空间上的。空间上的陌生人比如说有一些移民。20
世纪初的时候有很多各国移民来到了美国，到了美国的芝加哥。他们没有能够融入当地的美国
的社区所以存在很多社会问题。这就是帕克他们研究城市生态学的由来，作为陌生人的移民。
就进入了帕克的视角。这样一些移民是从别的地方来的，但是不是今天来明天走的 人，来了
又落脚了，但是并没有完全融入当地。帕克就说，这样一些人他们是一种新的人格类型，是一
种文化的混血儿，既不愿意和自己的过去和原有的文化完全分离开但是又因为种族的原因没有
能够被他所融入的新的社会完全接受。所以他相当于站在两种文化，两种社会的边缘。帕克从
起码的陌生人发展出来边缘人。
当然还有时间角度的边缘人们，比如说在历史变化的这个档口，我们大家都知道有一个学者叫
做王国维，他后来是投湖自尽。他自己就是身处两个时代，一方面是这个封建社会的晚 期，
一方面是民主科学的时代。所以这里面就会有一种张力在里面。我们还可以从一些其他的角度
来理解这样一种边缘人或者说陌生人。比如从这个网络连接的角度。如果一个人他处在两个大
的群体的中间，他可能就是一个陌生人或者边缘人。
我今天看到一篇公众号的文章有同学也看到了，是在讲为什么今天很多年轻人不再崇拜美
国，而很多年纪大一些的人比较向往。文章把这个称之为代沟，说他们之所以向往就是因为他
们年轻的时候西方比较强大，就好像我们大家都会怀念小时候的明星一样。但是这并不代表西
方现在就很好。所谓人的世界观是在年轻的时候定型的，然后以此来批判老一波的年轻人说他
们还站在过去的那个角度，表扬或者赞美年轻人。年轻人的信息获取更加广泛，所以更加平等
等等，从中大家应该明白这篇文章在暗示什么。当然这篇文章它的道理说对了一 半，我们的
世界观等等很多价值观是在年轻的时候形成的。但是这篇文章错误的把很多老一辈人的世界观
和价值观等同于盲目崇拜美国，这个是一种曲解。因为实际上很多老一辈知识分子，其实也不
能算太老，很多人也就是中年，他们作为这样一个边缘人实际上是处在改革开放前后，他们看
到了改革开放的重大作用。所以他们并不是简单崇拜美国或者什么其他的西方，而是比较珍惜
改革开放本身带来的价值。当然确实有很多人会盲目崇拜美国，但这篇文章过度的往这个方面
进行了影射而忽视了很多知识分子对于改革开放精神的这样一种捍 卫。如果我们用边缘人的
理论来看的话，实际上并不是说一定是越年轻世界观和价值观就一定越先进，这不是判断的标
准。经历了两个不同时代的人，他们的这种边缘性有时候也是一种财富。
可以把这个跟麦克卢汉的理论结合起来看。想要真正的理解一种媒介的作用，最好的时机在新
媒介和旧媒介转换的这个中间。连接了两个时代的这种边缘人其实他们也是处在两种新的文化
中间。所以这其实也带来了一种使得他们有机会更加客观的研究文明和进步的过程。而相反时
代的新生儿他们可能没有机会接触那种媒介所带来的社会生活。可能在对媒介的理解上反而不
那么准确或者深刻。当然并不是完全这样，实际上要取决于人自己的视野。
4. Q:齐梅尔还提出了很多比较有意思的观点，比如说他非常坚持站一个看法，就是两个人无
法组成一个群体，群体一定要三个人起。大家想一想这是为什么？他为什么这么主 张？
A：（同学：二对一么；三个女人一台戏；打破二元对立）有同学提到了二对一。这个它很好玩，
就是如果我们打牌的话两个人打可能没什么意思，至少得三个人斗地主。西美尔是这么认为的:
当两个人想要形成纽带的话，如果一方跟另一方有冲突或者不一致，这个纽带就掉 了。但是
三个人不一样，三个人不一定要都一致，可以其中有一些人跟另外一个人不一致， 但是这个群
体可能依然会存在。从这个角度认为说至少要三个人才能算是一个真正的群体。总之我们通过
上面的一些理解就能发现为什么把它叫做形式社会学。人跟人之间的互动以及形成了这种关
系。他认为这种东西，这样一种群体的关系反过来会影响我们。
5. 讲塔尔德的时候，书里面提到了一个班杜拉。这个我们需要给大家梳理一下。
A： 我们前面在讲弗洛伊德的时候，提到了一个对立的主义叫做行为主义。那么行为主义中人的行
为，比如说是通过强化来形成的，是比较旧的行为主义。那么新的行为主义呢？班杜拉他认为人
类想要获得新的行为不一定需要通过强化作用，比如不停地给狗铃铛同时给它吃的。那么狗以
后只要听了铃铛声就分泌，是一种比较简单的一种强化。但是班杜拉认为人的很多行为是直接
通过模仿形成的，比如暴力对于儿童侵略性行为的影响，里面可能就有模仿的因素。
还有一个重要的人物，马克思韦伯。马克思的思想进行了一定程度的修正。我们都知道在一定
程度上更加强调经济基础对上层建筑的这种决定作用，虽然也说上层建筑可以对经济基础成反
作用，但是经济基础还是最关键的。那么马克思韦伯呢对此进行了一个修正，他很经典的书叫做
《新教伦理与资本主义精神》。是这个意思，就是资本主义并不是通过渐变的方式， 只要我的生活生
产随着物资的不断的丰富就会自然而然生长出来，不是这样子的。可能在中国虽然出现了所谓资
本主义的萌芽，但是如果没有西方或者说没有其他的因素的话，可能这个萌芽永远成不了资本真
正的资本主义。《人类简史》当中也提到了一些类似的观点，就是说资本主义不只是一套生产方式
而已，它也需要很多的文化和精神方面的支撑。而这种文化和精神，不一定是和某种物质条件直
接对应的。这个当然可能不是很好懂，可以举一个简单的例子，比如老牌的资本主义国家意大利
跟我们中国比起来意大利的资本主义来的更早，对 吧？但是现在呢？我们中国的工业文明可
能在很大程度上已经超过了意大利。为什么？我们中国有独特的文化。或者说整个东亚文明都
比较吃苦耐劳而且相对更顺从一点，服从指挥。所以我们愿意花费大量的时间去进行劳动生
产，因此就后来居上。而这种吃苦耐劳的精神， 跟资本主义并没有直接的关系。它是在封建社
会当中发展出来的独特的文化。这种文化使得我们国家的创新精神受到了遏制，但是谁也没想
到当我们开始工业化的时候，这种文化又很大的推动了国家的发展。所以很多时候文化的这种
反作用是让人想不到的。就好像进化过程当中有很多的突变。这些突变可能开始你甚至看不出
来它有什么优势，但就是这样一种突变使得某一种物种开始爆发。比如说人类有更大的脑容量
更高的智慧，早期可能还是一种负 担，但是一旦我们达到某个临界点的时候，文化不断积
累，就成为了我们超越其它生物的一个利器。所以韦伯的思考大概也是这样一种思想。本来新
教思想他并不是想要为资本主义服务的，但是新教中的这样一种观点反而促进了对世俗中积聚
财货精打细算的一种推动，从而使得新教更加有力地推动资本主义的发展。所以就相当于告诉
我们其实文化对于社会的反作用比我们想象的要大。经济基础对上层建筑的决定我个人认为也
不是说他是错的，而是说这是在一种更大尺度上的决定，比如说对于整个人类发展文明的决
定。但是在人类发展过程当中，哪个国家哪个种族会走在前头，这个很大程度上就是在文化起
作用了。
6. Q:为什么说芝加哥学派是经验的，但不是统计的？
A：（同学回答：实证主义）有同学提到说实证主义。能再具体讲一讲吗？嗯，是说芝加哥学派是
实证主义。还是说芝加哥学派不是实证主义。（同学回答：是实证主义；芝加哥研究依赖于调查
者和他们调查对象之间密切的私人关系，是通过移情来了解他们的对象的；他们主要依靠观察
深度访谈等方式而并不主张使用统计，计量等量化的方式来研究社会问题；早期芝加哥学派是
经验的，但并不是非常量化的。学派研究者也并未对量化的统计方法予以重视， 帕克认为统计
方法是“只会空谈的诡计”。）有同学已经提到了比较关键的点，也就是说，所谓的经验指的是
通过对外的观察收集经验数据，来为下一步的思考提供基础，而不是说坐在书斋里面拍脑袋。
所以我们看到说芝加哥学派会做深度访谈，参与式观察。但是大家要注 意，虽然芝加哥学派
是经验的但是他们走的路子是定性研究，或者说早期定性研究更占上 风。而不是我们所说的
这样一种统计，数字处理。而我们所说的实证主义，其实指的是后 者，也就是通过数字统计
进行分析处理，得出结论的一种研究方式。这样一种研究更接近科学研究，或者说自然科学研
究。所以科学研究是可以被证伪的，是可重复的，所以被称之为实证主义。
有同学问定性研究是不是经验以主义的主要方法？是的。经验研究包括定性和定量两种方
法。大家可以先了解一下，再学研究方法的时候还有机会进一步深入思考这个问题。（同学提问;
经验学派的主要方法不是定量研究吗?）经验研究和经验学派不是一回事。实际上我们在 翻译
的时候，经常会有混淆的地方。很多时候我们说的这个经验在英语当中对应的词实际上是实
证。大家如果去看刘海龙老师的教材的话就可以发现,刘海龙老师区分了两种经验主义。一种是
客观经验主义，一种是解诠释经验主义。早期的芝加哥学派有很多人就是走的第二 种。而拉
扎斯菲尔德主要是第一种。核心关键点就是我刚刚讲的，经验是跟非经验相对比 的。芝加哥
学派的城市生态学早期很多都是跑到外面去做人类学的观察的，这些观察是不可能被量化的。
但是他们也不是像以前的哲学家一样坐在书架里面思考。所以这是一种特殊的经验研究。大家
牢牢记住经验这个词，相对应的是思辨。经验本身可以用类似科学研究的方式去做实验或者说
发放问卷、收集数据、去做田野观察。关于区分，大家可以课后自己去看一看刘海龙老师的那
本书。
7. Q：芝加哥学派在何种意义上推动了传播学的研究。
A：大家可以翻到书本的第 157 页，这部分讲到了芝加哥社会学的特征，涉及到了芝加哥是
如何看待人和社会的。而传播或者说传播学就是在研究人跟传播的关系，传播跟社会的关
系。显然要搞清楚这个关系必须正确的认识人和社会。芝加哥学派中人是社会性的，甚至于我
们的自我都是在社会交往中构成的。所以我们在谈传播如何影响人的时候，结合这样的一些情
况来进行理解。比如传播就可以帮助我们构成我们的自我，不同的传播也因此可能在自我的构
建上或带来不同的这个影响。
芝加哥学派有他们强烈的经验主义，因为早期的很多研究是比较偏哲学理论思想化的，比如
说心理学的研究还有一些社会学的研究。那么芝加哥学派通过我刚刚说的，把人类学的方法
把观察的方法引入到了对现实当中去，所以这是一个非常重要的贡献。以及芝加哥学派在某
种意义上走出了一条跟后面的拉扎斯菲尔德不同的传播研究思路。也就是我们所说的这个解
释经验主义，强调说要理解人和传播的关系就必须理解人自己是怎么看待自己，看待世界，
看待传播的。我们之所以会对某传播内容产生某种反应，不是传播的内容或者媒介必然导致的
结果，而很大程度上受到我们自身对自己对世界的理解的影响。所以，在刺激-反应中间还应当
加上一个理解，是刺激-理解-反应。而想要真正理解每个人是怎么理解的？很多时候你 是通过
定量方法是得不到的。因为连当时人自己都不一定知道自己的内心。但是通过人类学的方法，
通过长期的观察我们是有机会发现其中的秘密的。
可能都听说过一个著名的非虚构写作者叫做何伟，他写过江城。这个写作就类似于芝加哥学派
的这样一种观察。他作为一个外国人来到中国的一个小城市，就好像是一个边缘人一样。但是
他把这种边缘人背后的财富给充分利用起来了。因为当局者经常迷而旁观者可能会清 楚，所
以在他的观察当中呈现出了我们中国人很多时候自己都没有注意到的我们中的一些文化的规则
和特征。大家课后可以去看一看。
8. 接下来重点看看芝加哥学派当中的重要人物。
这里有一个东西我们需要进行一个说明，大家翻到第 159 页来看看杜威。我没有去看罗杰
斯的英文原文。所以我这里还不清楚这个标题杜威和实证哲学是翻译错了还是罗杰斯就这么
写的。因为杜威他并不是一个实证哲学家而是实用主义哲学家。一字之差但是有一些不同。
当然实用主义到底是什么？这也是一个比较复杂的哲学问题。但是大家要明白这里说的实用
不是我们汉语里面说的那个实用。就是你买了一个东西然后觉得这个东西很实用，不是这个
意思。对于杜威的话可能有同学知道，他是中国的一个著名学者的老师，这个人是胡适。他
除了是哲学家之外呢，还是心理学家和教育家。
那么他对于传播。有自己比较独特的观点。有同学知道吗？（同学回答：传播是使人民成为社
会的完美的、参与性的成员的手段，对民主制度而言，共同体是基本的，个体只有在于他人的
联系中发现自我；教育大众，报纸治国；杜威在学生阶段一直学习哲学，毕业后也在哲学系任
教，是当时著名的哲学家。他认为，个体只有在与其他人的联系中才能发现自我意 识，因
此，对于民主制度来说，共同体是基本的。他觉得工业革命后形成的工业社会不是一个共同
体，也怀疑民主制可能不会在这一社会中存活下来，因此美国民主制对城市生活的适应，以及
社会共同体的建立，是杜威比较关注的问题。针对这一问题，他认为现代传播媒介能够将人们
彼此连接起来，帮助社会建立共同体，使得民主制能够存活）很多同学已经指出来了。这部分
内容在 160 页以及 165 页有相关的介绍，不熟悉的同学可以课后再去看一看。其实杜威之所
以有这样的思想也跟他的实用主义思想有关系。
（非哥，实用主义就是经验主义吗，还是说经验主义包括实用主义啊？就是说芝加哥学派都
是经验的，但只有杜威是实用主义的代表人吗？）这里的实用主义呢是一种哲学思想，涉及
到像这个认识论等比较复杂的问题。比如说我们都知道很多的这个真理观认为这里就是对于
现实的符合。这个叫做符合论。这是一个哲学问题。杜威本身的并没有完全否定这个观点但
是他认为这个不是最重要的东西。或者说真理其实并不适合把它这样去定义和理解。我们可
以举一个简单的例子。当我们在一个森林里迷路的时候，我们可以去用符合论的方法，给你
一个在你面前非常详细的森林的图像，比如说树木啊，有几颗苔藓长什么样啊？有没有这个
小虫子？但这样的一个图片没有意义你还是走不出去，你需要的是一个地图。所以说现实是
一个动态的东西。真理并不是说静态的，把我们有的想法或者观念跟现实做对比，然后看一
看是不是符合，不是这样的。真理是涉及到很多未知的东西。我们是需要去尝试看看能不能
走得通。所以这是他理解的这个实用主义的思想。所以这个不是我们说的实证主义或者说在
哲学意义上它们是不一样的。有同学问是不是说芝加哥学派都是经验的，然后只有杜威是实
用主义。我们刚刚说了，首先杜威确实他是实用主义但是他不是实证主义。虽然杜威本人也
被归为了芝加哥学派，但是他在这个学派里面，并没有做太多的经验研究。他更多的是提出
指导性的思想，这个思想呢，是跟我们刚刚讲的这个定性研究的方法相契合的，比如说强调
理解。
所以后面我们会提到一个杜威和李普曼的争议。李普曼所持的就是真理的符合观。他认为传
媒不能够反映现实真相，在这个情况下大众了解的都是假的或者说是不真实的。这样的话，
大众形成的舆论就不可能去引导社会走向正途。但是杜威并不这么想。他认为人与人之间进
行交互进行联系这个本身就是最重要的。因为在联系的过程中我们可以形成共识，更加合理
的去解决相关的问题。我们可能永远得不到一个完全客观的对于外在世界的这个真相。啊就
好像我们在森林里面不一定能够完全正确的认知森林的每一处草木。但是这个并不是最重要
的。
（实用主义就是能解决问题就行，黑猫白猫抓到耗子就是好猫。对吗？）有同学说，是不是
白猫黑猫的问题？我们可以先这么简单的理解。当然实际上，实用主义比这个要更加复杂。
这块内容可能不是特别好理解，因为它涉及到一些哲学思考。同学们也不需要强求，就像我
刚刚提到的，它涉及到的对认识论的看法这些都是比较复杂的终极的哲学问题。大家还有一
点要明白，就是芝加哥学派虽然叫做学派，但他不是一个只有一种思想，非常严密的一个学
派。他们当中有这些人之间有联系也有区别，不应当把他们简单化。比如既有像帕克那样投
入大量精力做田野观察人，也有像米德、杜威那样做哲学思考的人。只不过他们在很多大的

在开始之前我们对上一节课的一些东西再作一个说明。比如上节课的一些概

今天我们把芝加哥学派的最后一块内容进行一个梳理。首先我们来看 168页，
来看一看米德和符号互动论。
1. Q：米德和符号互动论
A：关于米德我们之前的课上有提到一些内容，大家首先要了解他的时空背景。
他是出生在什么时间？大概是在美国内战时期。大家可能会觉得美国内战好像
是一个很久远的事情，其实也没多少年。然后他跟库利、杜威基本上是同一代
的人。米德的思想基本上在很多教材当
中都有写到，大家一定非常熟悉了，但是有一些细节可能还是需要再进一步了解一下。
【补充：关于如何理解符号互动论，我们很多的传播学教材里面都有写到。
常会用到布鲁默的那个总结——就是我们一般认为人的行为不是直接受到刺
激带来反应，而是受到人对认知的影响。也就说我们不光生活在客观的世界
当中，我们对于现实也是有自己的主观认知的等等。大家可以在课后去看一
看。】
2. Q：库利、米德、布鲁默、戈夫曼，他们都被笼统地归在了符号互动论当中，那他们
之间到底有什么联系和区别？
A：【同学回答：（1）联系——米德：提出了符号互动论；布鲁默：引导重
视符号互动论，并将作为理论方向；戈夫曼：推动布鲁默了对米德的改造。
（2）库利是米德的老师，米德是布鲁默的老师。（3）库利的镜中我-米德的
自我构成.】
有同学提到了符号互动论的这个对，的确这个概念是在布鲁默那边被明确提
出来的，米德其实没有具体来提。那么关键是他们的思想到底有什么区别
呢？有些地方要进行澄清，就是其实库利严格来说，还不是米德的老师，他
们是同辈，相互影响。
3. Q：镜中我和自我的构成，两者之间有什么区别呢？
A：【同学回答：（1）库利提出的镜中我没有对自我如何构成的问题提出解释，
而米德提出自我是通过与他人的互动的社会过程形成的。（2）自我互动理论，
强调与他人的社会互动形成的内在化过程，认为人可以进行自我互动，从而不
断完善自己。镜中我，是认为人与他人的互动是反映自己的的一面镜子，个人
通过这面镜子来认识和把握自己，这种认知状况取决于他人传播的程度， 传
播活动越活跃，越是多方面，个人的“镜中我”也就越清晰，对自我的把握也
就越客观。】符号互动论有很大一部分内容是在谈自我的问题，也就是这是一
个跟精神跟心理学相关的问题，当然
后面还有进一步的扩展，我们首先来看一看自我的问题。关于自我大家可能
还有印象，这个弗洛伊德其实也提出了自己的观点。比如说本我自我超我。
也就是说自我这个东西是很复杂的，有的东西存在于我们的意识当中，有的
是存在于我们的潜意识当中，这种思想当时很具有启发性。库利是以人与人
之间的关系，米德是以个人与社会的关系。
一个影响芝加哥学派的学者，威廉詹姆斯，他是一个美国心理学家。他比较
早的提出了自己关于自我的看法，他把自我分成精神自我、物质自我、社会
自我。社会自我：我们对于自己的认知很多程度上源于对他人的感知。所以
在威廉詹姆斯那里就已经有了与后来很相似的看法了。
到了库利这里，他把威廉詹姆斯的思想进一步进行了突破和发展。其实库利
的镜中我，跟他的另一个概念是结合在一起的，也就是初级群体和次级群体。
詹姆斯只是笼统地讲了一个社会自我； 库利强调：我们所处的的群体对于
我们自我形成的认知是有着不同作用的。比如，初级群体或者说少数群体，
他们对于我们教育中自我概念的产生和保持更加重要。初级群体当中存在的
都是我们比较亲密的人——我们的父母，我们非常友好的兄弟姐妹。所以库
利特别强调说，我们这种所谓的最终自我，它其实是以群体为背景的。
并且库利还具体告诉我们说这样一种对自己的认知，是在跟他人的交往过程
当中，通过把自己和他人一起当成客体的方式来实现的。我们通过评价自己
以此获得不仅仅是这个对自己的认知，还有随之而来的某种情感态度，比如
说自卑或者自信。并且库利还进一步强调，是传播决定的自 我，而不是自我
决定了传播。所以在这个意义上，自我并不是一个先天存在的一个本能决定
的东西。所以在某种意义上库利可以说是消解了弗洛伊德的思想的那种对于
人的简单理解。人性不是说我们在自己的本性内部直接生成的，而是要取决
于跟社会的互动交往。
刚刚那位同学说的很好，就是自我如果进行这种频繁的这种交流，就可以更
好的认识自己。同时库利还强调社会也是这样子的。社会如果在很大程度上
能够让大家之间更频繁的进行交流，社会本身也会形成一个更加理想的有机
体。因为社会本身就是微观的人与人之间的互动所构成的。所以在库利看来
传播建构了社会，并且使得社会成为一个巨大的有机整体。这是
库利的一个基本的传播观点，这些思想对后来米德的思想提供了很多帮助。
4. Q：赫伯特米德怎么进一步发展了库利的思想？
A：【同学回答：米德提出来了，“普遍化的他人”】
很好，有同学提出来了，米德一个很关键的概念是是普遍化的他人。
我们知道库利说的是镜中我，米德提到的是普遍化的他人。但是米德说过的
“主我和客我”，两者什么关系呢？镜中我和客我是什么关系？和普遍化的
他人又是什么关系？（主我，客我，镜中我，普遍化的他人）
大家可以把书翻到 170页，在这里罗杰斯做了一些解释，当然还不是特别全
面。其中库利的镜中我。他是比较具体的——比跟你的兄弟聊天，这个时候
你根据他们的神态，他们的言谈来感知他对你的看法，形成你对自己的判断。
但是普遍化的他人，大家看到是叫做普遍化。所以它不是一个强调具体个案
的，而是说我们在长期的日常生活中，把很多从他人那边获得的各种经历和
意义平均化，从而形成了一个所谓的普遍化的他人。这个普遍化的他人就相
当于是客我。比如当小偷想要偷东西的时候，如果是镜中我的话，那可能要
设计旁边涉及到一个路人，这个路人正在看着
他。所以这个小偷心里觉得路人很鄙视他，然后他就不去偷东西了，决定要
重新做人。普遍化的他人呢？是指小偷在没有人的时候，当他要偷东西的时
候，他心里有一个另外的自己，有一个客我对他说你这样做是不对的。所以
这个客我或者说普遍化的他人，就相当于一种无形的社会规 范，我们把在市
场生活互动中的各种经验内化成了一种规范，人的行动就会受到这些规范的
制 约。我们可以从这个角度进行一个简单的理解。
赫伯特米德本人还举了很多其他的例子，比如说我们在踢足球的时候，这是
一场团队运动。你怎么知道该怎么做。我们人类就能够很自然很好地去了解
到自己的角色，对吧？我们能够很快的把所有队员的角色进行一个整体化的
设定。那么我们就可以更加有效率的进行比赛。如果我们只是一个一般的动
物，没有符号化互动的能力，以及形成的这样一种对自我的角色的认知，就
不可能从事像足球这种团体游戏。当然到这里为止呢，我们谈到的关键词是
互动和符号。实际上我们能够形成自我，关键在于我们的互动是通过符号进
行的，只有通过符号我们才能够实现把自己当成客体来把握、来反省。
比如说通过语言。正是因为我们有了语言或者类似的教育中这个象征性的符
号。我们才能够更有确定性的去把握自己和他人。比如说他人的某些语言，
某些动作。因为象征符号的意义相对来说会比较确定，比较稳定的去解读他
人的表情语言和动作。然后再通过客我对自己反省，比如说有的打工者特别
不想上班，特别想对老板竖中指。但是他明白老板也懂得中指是什么意思，
所以他的内心就会进行一个盘点，一次预演。他能够推测老板看到这个符号
之后就会立刻把他开除，所以他就不去做竖中指的行动了。这是我们人类进
行思考的一个非常突出的特点，我们不像是只是靠着直觉本能进行反应的动
物，虽然动物也能够发出一些简单的信号。当能够用这样的方式进行心理活
动的时候，他就有了心智，所以在米德看来心智不是一个结果。实际上就是
我们内心当中主我和客我不断互动的一个过程。
后来布鲁默才总结出符号互动论这种说法。传播学史书中说的相对比较简单，
所以我们补充了一些内容，然后大家再回过头来看的话，可能有些地方会更
加好懂一些。当然米德的弟子布鲁默， 对米德的思想又进一步进行了更加
系统化的阐述。我们今天所说的解释经验主义研究方法等很多的具体内容是
布鲁默总结的。
5. Q：为什么说帕克是大众传播的第一个理论家？
A：【同学回答：（1）他将传播限定为“一个社会心理的过程，凭借这个过程，
在某种意义和某种程度上，个人能够假设其他人的态度和观点；凭借这个过
程，人与人之间合理和道德的秩序能够代替单纯心理的和本能的秩序”。（2）
研究了被后来称之为大众传播媒介的报纸。
（3）帕克开创了 4个重要论题的学术研究：大众传播、种族关系、人类生态学和集体行
为.】
很多同学已经提出了一些比较关键的点，这些方面在我们书中都有。在书上
191页最后，有兴趣的同学可以去翻一翻。这里我在做一些背景的补充。
具体来说，帕克之所以被一些人冠上这样伟大的一个称号，是跟他的一部著作紧密相关的，

《移民报刊及其控制》。这部著作不只是研究了报刊这种大众传播形式，关键是
他的这个研究本身太厉害了。后来的施拉姆拉扎斯菲尔德等做的所谓行政研究
的很多东西，其实早就被帕克研究过了，只是帕克没有用那种定量的方法而已。
比如说把关人。帕克除了没有提出过把关这个概念，
他都通过这篇这本书进行了介绍。而且说的很多地方比怀特说的更加精彩。
比如说他专门指出之所以会存在这样一种把关的现象，或者说筛选的现象。
是因为信息的过载或者说过剩。而怀特 呢，他可能就没有从这些角度进行解
释，他还结合了很多报纸工作者的实际案例来分析他们是怎么把关的。
此外，对于报纸或者说大众传媒的功能，帕克也做了很精彩的论述。比如说对
于移民报刊而言， 这些报刊有什么作用呢？这个研究主要指那些在美国或者
其他国家的移民，这些移民报刊通常都是用他们原来国家的语言写的，而不是
用英语。那么这样的方式能让他们更好地融入到美国社会吗？还是说我们应该
推广英文报纸，让他们多学英语去看英文报纸？从常识来看的话，大家可能会
选择说你既然到了一个国家，那就应该入乡随俗，多去学学英语看看《纽约时
报》。但帕克说， 不是这样子，恰恰这样一些用外语写的报刊，用本国语言
写的报刊，反而很多时候更加有助于他们去融入社会，融入新的国家。在用本
国语言进行新闻报道的同时呢？这些报纸肯定跟他们家乡的报纸不一样。比如
说他要重点去报一些美国本地的新闻。所以虽然他不是直接的强行让受众融入
美国。但是他用一种比较巧妙的，而且更容易让人接受的方式，更好的让那些
移民融入美国当地。
帕克在这本书里面还讲了很多其他非常有意思的观点。这些观念都非常具有
启发性，他试图希望当局能够和更好的地控制利用战役中的移民报刊，而不
是简单进行粗暴的管制或者打压，或者提出某种过分的要求，他也看到了大
众传播在促进移民融合过程中的重大意义。其实这里面就涉及到了社会协调
的功能、遗产传承的功能等功能的论述。而且就像刚刚前面有同学说的，帕
克不只是对新闻传播研究提供了有益的思想，而且对社会科学也很有帮助，
原因就在于它的经验性。
帕克作为一个学者其实是大器晚成的。帕克其实跟前面讲的那那些人都是同
代人。但是他毕业之后做了很长一段时间的新闻工作者。他在大学开始教书
的时候都已经 50多岁了。当他开始做研究的时候，库利都已经离开这个领
域了。但是新闻工作的经历给了他很大的帮助，他把工作经验
（一线调查）带到了他的社会研究当中去。我们做研究不能只是在书斋里面
拍脑袋，或者去只是翻一些这个年鉴的统计资料，而是要跑到现场去，就像
写新闻一样。而当时的美国呢？前面也讲过，处在一个移民涌入的时期。城
市化正在快速的发展当中，然后也带来了很多的社会问题。这时候虽然问题
很多，但是也给研究者带来了前所未有的契机。所以这也是为什么帕克的研
究还有一个关键词就是城市生态学。
6. Q：芝加哥学派为什么会衰落？
A：【同学回答：（1）芝加哥的社会问题被解决，社会学结构功能主义转向。
（2）博士生离开，造就竞争者；芝加哥社会学系的教室之间的不和，偏离学
术工作；社会学领域本身发生了变化；欧洲社会学家来到美国；职业社会学家
的反叛。】
对很好，像人才的流失，比如说一个叫斯托佛的。这个人是帕克的弟子，而
且还参加了这个当时美国政府战时在华盛顿组织的很多的研究当中，他跟是
施拉姆他们也都认识。更主要的原因是， 形势变了。因为芝加哥学派的那种
思路呢，他们是在研究问题，研究社会问题。但这一方面随着移民问题的逐
渐解决，开始变得不那么重要。另外是随着战后美国的崛起，美国迫切需要
一个什么呢？一种新的官方意识形态去支持它现有的体制。所以像结构功能
主义来就更容易被官方认 同，得到大量的资金。而这个芝加哥学派的旧范式
就不那么受欢迎了。当然还有定量研究本身的崛起。甚至芝加哥后期也在很
大程度上去采取了定量的方式在做研究。早期的时候芝加哥虽然也
有一些定量研究。但是他们当时还是以定性为主的，比如说像库利，他就喜
欢研究自己的孩子， 这是一个典型的个案研究。而且对他来说比较方便，
只要深入观察就好了。
Q：芝加哥学派为什么后来又再度受到重视？
A：这个问题可以结合我们书中第 202页来进行思考。
【同学回答：解释学派需要它的方法论途径】
202页提到了解释学派，其实芝加哥学派本身的方法也是解释的。所以这样
一批新的研究者，他们从芝加哥那里看到了共识，引以为知己。此外呢，当
时的传播研究本身，特别是定量的研究也受到了很多的质疑。因为这样一种
定量研究这样一种行政研究，其实是把人类丰富多彩的传播现象给窄化到了
很窄的地步。比如说有意图的传播，想要达到某种效果控制。但实际上我们
在讲帕洛阿尔托学派时候就已经提到了，人类传播是非常丰富多彩的。支配
人类传播的并不是某些简单的绝对的客观规律，不能把人简单当成物当成自
然来研究。而芝加哥学派的第三代研究者，说像戈夫曼与梅罗维茨，他们在
后来也推出了非常惊艳的研究成果，所以跟当时的其他的解释学派一起重新
给传播学带来了新的活力。
那么这方面的内容呢？大家如果有兴趣的话，可以去看一看我们胡师姐的这
个传播学蓝皮书。 我们在这个资料里面都有详细的梳理。当时除了芝加哥学
派之外，还有很多其他学派，或者说研究者用民族志、田野观察等定性的方
法，取得了很多的成果。所以我们最后一道思考题的答案也就出来了。那么
我们书上在第 205页有写到，有兴趣的同学可以再回头去看一看。
那么芝加哥学派书里的内容呢，就先梳理到这里了，大家自己在复习的时候，
也可以多根据芝加哥学派的研究去了解一些当代的著名的学者。比如说我在
其他课程里面曾经给同学推荐的一个著名的华人学者项飚，他就是做人类学
研究的。他的研究其实跟当时芝加哥学派帕克们的思考很相似，帕克研究的
是美国的新移。那么他当年研究的是那些？北京的城中村。在北京打工的，
比如说温州的人。但是还有一些民族志研究。他跟许志远的最近的一次对谈，
也对我们这个传播学有很大的启发性。比如说在这个数字时代，人跟人的关
系到底发生什么变化？人跟社会之间的关系有什么变化？这些都是非常经典
的从定性角度进行思考的问题。
大家课后有时间也可以去把这个视频找出来去看一看。

A：对，解释，诠释都是一个意思。刘海龙老师书里面写的是诠释经验主义。

=====《传播学史》/4.28Day6笔记.pdf=====
4.28 胡师姐公益带读 Day6
今天起我们终于开始要进入大家比较熟悉的环节了。今天要讲的是咱们所谓传播学的四大奠
基人或者说先驱者之一的拉斯韦尔。提到拉斯韦尔这个人呢，大家可能会头脑中冒出一系列
的概念，比如说 5w、三功能，还有宣传研究。当然这些东西都很不错的，在很多教材里面
也看到对相关内容的一些简单介绍。但是我以前读了感觉之后就会觉得很困惑，怎么就谈了
这些思想就能够位列四大奠基人，这是不是来的太简单了？后来看的书多了之后才发现，原
来拉斯韦尔确实有很多把刷子。我们教材里面有很多的地方过于简化了，甚至对拉斯维尔有
一些不太公允的评价和判断。比如说提到 5w的时候总会批评说这个模式怎么怎么不好，显
得拉斯韦尔好像特别的幼稚。但其实并不是这样，稍后结合书本我们进行背景的介绍。
1. 关于拉斯韦尔和宣传研究
A： 首先拉斯韦尔这个人他也是一个美国人，是 20世纪的 00后。比我们之前提到的芝加哥
学派的代表人物，或者说第一代代表人物要小很多。所以他的青年时代是一战的时代，可以
说跟法兰克福学派是同代人。这也在很大程度上影响了他的研究。
特别有意思的是，虽然拉斯韦尔被施拉姆列为四大奠基人，跟拉扎斯菲尔德他们一起。但其
实他是来自芝加哥大学的，所以他跟芝加哥学派其实有着千丝万缕的联系。当然他在芝加哥
大学学的并不是社会学，更加不可能是还没有出现的传播学，他主要是做政治学研究的。但
是他在很大程度上一开始也受到了定性研究方法的影响。我们都知道他第一本比较出名的 书，
就是从他博士论文改编过来的。关于第一次世界大战的宣传研究，这个研究主要就是用偏定
性的方法。他阅读了大量的欧洲冲突双方的宣传材料，然后从中归纳双方都采用了什么样的
宣传的技巧、都有哪些宣传目标，还做了很多的访谈。我们书上在第 216页对此作了详细的
介绍，甚至在 217页还提到拉斯韦尔自己承认他当时主要受到米德的影响。米德， 大家还
记得是符号互动的思想的源头。而拉斯韦尔他把宣传理解为一种对于符号的操纵或者说是对
于暗示性符号的直接运用。除了米德等芝加哥学派的学者，他还深受弗洛伊德的影 响，尝试
把精神分析引入政治学的研究。我们书中在 211页最后，把他认定为政治心理学领域的创造
者。他的这些做法在当时引起了很大的争议或者说不被人理解。政治学家觉得他是异类，精
神分析学家也觉得他是异类。所以其实拉斯韦尔和施拉姆其实很相似，都喜欢跨界。而他之
所以研究世界大战中的宣传技巧，最初也是想要去用一种新的方式去研究政治 学。
关于《世界大战中的宣传技巧》这本书，可能有一些教材做过一些简单的介绍。比如有的把
这本书的结论认定是比较倾向于赞成魔弹论。但真实情况不是这样的，拉斯韦尔在这本著作
当中得出的结论恰恰相反，并不赞成魔弹论。比如评价有很多方面的宣传技巧是很愚蠢的，
比如说有的只是单纯的把敌人塑造的很愚蠢、不堪一击，试图让公众相信，但是这个做法可
能适得其反。他还专门强调宣传效果会受到很多因素的影响，比如说群体的偏见。所以如果
你在宣传中冒犯一些文化或者民族的偏见，那肯定也是愚蠢的。他还专门强调说很多时候想
要引起受众对于某个方面的仇恨，最好是要能够建立在公众情绪被制造的很紧张的前提下。
所以战争其实就是这样一个时期，在战争中，很多的时候宣传会起到一定的效果。他还强调
当受众已经经历过一战的密集宣传之后，会逐渐适应这种宣传模式，因此以后的效果会大打
折扣。书中在第 216页对拉斯韦尔的这方面研究做出了一定的介绍。有兴趣的同学可以再
去看一看。
当然，拉斯韦尔后来离开了芝加哥大学。这也成了他人生中的一个重要的转折点，书中第222
页讲到了拉斯韦尔的中年危机。他离开芝加哥大学之后想要去跟一些知名的学者一起合作研
究，比如说萨丕尔。结果最后没有能够成功，他自己还出了一个车祸，许多以前的材料和文
章都在这场车祸当中被毁掉了。在这段时间内就去各地方去做兼职当顾问等等，到了二战时
期顺理成章地去为政府部门进行工作。这其中洛克菲勒基金会也给了他很大的帮助， 5w就
是在洛克菲勒研讨会的期间提出来的。
2. 到底该如何评价这个 5w？书里面罗杰斯在第 227页认为这样一个 5w并不是一个传播模
式，他凭什么这么说？大家又怎么看待？
A：（同学回答：将复杂多元的传播行为窄化了；罗杰斯认为，实际传播行为的许多复杂性
未被拉斯韦尔的 5w陈述所涵盖，所以就任何完整的意义来说，它并不是一个传播模式；
5w使传播研究侧重于媒体效果，引导学者偏离了其他重要课题） 很多同学已经找到了罗杰
斯的评价。
为什么说这 5w把很多的传播现象给窄化了呢？简单来说，5w其实比较简单和笼统。比如我
们上一节课提到的符号互动论的很多复杂的现象，就没有非常具体的体现在这样一个模 式当
中。所以在这个意义上 5w 相当于给了我们一些传播中的基本的要素。基本上绝大多数传播
都包含这些要素。比如说传者、受者、渠道等等，这是它的贡献。但是我们实际传 播的这
样一个过程要更复杂。罗杰斯的第二层意思是说 5w也窄化了传播的类型，比如 5w更好像是
在说一种有意图的劝服，但是对此我们要补充一些。那是拉斯韦尔本人的传播观， 事实并不
是这样简单的。他在文章中明确提到过反馈的问题，比如他曾指出大众传播的受 众稍迟些
也会回应。他指出传播效果面对的阻碍因素，有一个就是传播者的无知等等。所 以他认识
到传播的复杂性，也知道环境本身的重要性。
5w其实更多是作为一个领域，特别是大众传播研究草创时期的一个比较方便的研究框架。根
据这个框架可以比较方便的去把握传播现象，并且划分出研究的领域。拉斯韦尔本人也并不
是不重视受众对意义的解码，他也指出了宣传者需要顺势利用受众已经接受的语言和观念进
行宣传才能取得成果。所以拉斯韦尔虽然被列为了四大奠基人，但长期是被忽视和误解 的。
拉斯韦尔的定量研究主要是在二战期间和之后进行的。这个时候他开始广泛运用内容分析的
研究方法对大量报纸的内容进行分析，书中 230页有讲到。所以他对传播研究的一大贡
献，就是内容分析法的运用。这个有点像我们现在经常用的词云图。前段时间关于方方日记
的争论，有人就做了统计，分析了方方日记当中正面的内容、负面的内容、追责性内容，建
设性内容等等的出现次数和比例，这都是类似的方法。我们想要客观的评价一个内容，定量
的数据分析很多时候可以是一个很好的工具。拉斯韦尔就发现二战早期德国媒体大量描述犹
太人的危险性，这其实就是大屠杀的前兆。后来拉斯韦尔还做了很多研究，比如胡佛研究又
是一次大型的量化研究项目。关于拉斯韦尔，我们简单介绍到这里，大家在了解他的一些思
想的同时，也要注意避免误解。
3. 我们来看看另一个研究者，李普曼A：跟拉斯韦尔相比，李普曼的人生要精彩得多。（大家
可能知道一些，比如他是多届美国总统的顾问，他写作今日与明日专栏长达几十年。他参加
过一战，应该是作为军官身份。他大学是在哈佛，老师中就有我们前几节课提到的威廉詹姆
斯。而且他硕士读到一半，准确说是快毕业了，居然不读了，因为当时有个著名的记者看中
了他把他给挖走了。所以人生非常传奇。）也因此，他并非学院派人士。美国传播学史上还有
一个人跟李普曼很相似，也是非学院派的。而且这个人跟李普曼类似，也是一个特别能写的
专栏作家。这个人大家可能不太熟悉，他的名字是路易斯芒福德。（巧的是他跟李普曼一样，
都是纽约人，都是城里人，家里经济实力都不错，当然李普曼家好像更厉害些。他们都是犹
太人，所以他两对学院生活可能不是特别留恋，芒福德都没有拿到大学文凭。芒福德也有些
偏左，不过我个人更愿意把他归入技术学派，他的思想比麦克卢汉要早。这个人我们在蓝皮
书里也有介绍，也是个传奇人物。他主要思考技术对社会的影响，还喜欢建筑设计， 城市规
划，也是一个跨界人物。）他们两个虽然不在学界，写起东西不一定按所谓学术界的套路，也
没有什么定量定性的问题，很多是靠思辨和阅读，但思想都很深刻。李普曼的很多思想涉及
了很多后来传播学研究的主题。书中提到了一个议程设置，其实议程设置研究很大程度上相
当于把李普曼的思想用定量的方式进行了验证。他提到的比较著名的概念有拟态环境，刻板
印象。
有一个很关键的问题，就是我们前面讲杜威的时候提到的，他为什么对舆论持有和杜威不同的
看法？也就是所谓的李杜之争。我们前面说过杜威等芝加哥派学者倾向于认为传播可以促进民
主，报刊等于民主等等。但李普曼不这么认为，为什么？（同学回答：民主的基础是真实客观
的认知，而拟态环境并不全是真实客观的；媒介环境是媒体所营造的，不是对现实环境（在舆
论语境中即民众的意见）的镜子式反映，所以舆论并不能真正反映民主）其实有这么几个层次，
首先媒介对显示的反应本身不是镜像式的，而是有选择的。比如政府有控制， 媒介有偏见。
其次受众自身在心理学上的刻板印象等因素，使得我们自身也更愿意去相信我们愿意相信的东
西。他有句名言：多数情况下我们不是先理解后定义，而是先定义后理解。所以哪怕媒介反应
的东西比较接近真实，受众的理解也不一定就客观，还是有可能造成各种“幻象”。李普曼是
从哲学层面谈的，不光是新闻，人的任何认知都不是绝对客观的。新闻学里所谓的新闻客观性，
更多是从实践角度谈的，是一种实践的追求和操作规则，不完全是一回事。所以李普曼对于能
否形成正确的舆论，符合客观的舆论，是悲观的，或者直接就不认为是可能的。我们一方面只
能看到现实的很少一部分，另一方面对于看不到的那方面，我们又会根据自己的偏好进行脑补，
很多时候还以为自己没有脑补，而是看到了真的。所以我们之前提到过的全球化时代的文化冲
突问题，也可以用李普曼的思想来进行解释。人必然是要带着有色眼镜看世界的。刻板印象在
很多时候虽然不客观，但它是一个文化长期延续不可或缺的东西，是我们个人传统的核心。也
因此，李普曼才会提出，要把治理交给精英，让独立专家们来进行决策，而不是靠民意。（同
学提问：“所以我们之前提到过的全球化时代的 文化冲突问题，也可以用李普曼的思想来进
行解释。”能具体解释下嘛？）就是之前谈全球化的时候，提到说为什么不同文化民族间不同
阶层间会有很多误解。比如这次疫情还有以前的很多案例可以用这个思想来解释。（同学提问：
这个意思是不是说过分民主不好呢？）是 这样，我们只是在梳理李普曼观点的来源。李普曼
的这个想法本身就是有很多解释不清的地方的，所以才给了杜威攻击的机会。比如凭什么专家
就一定能撇清自身的成见呢？等等。这本身其实也是一个难题，无论杜威还是李普曼都是强调
了某些方面。杜威一方面说李普曼把民主问题转换成了一个认知问题，但同时也指出很大程度
上，民主并不需要完全客观的认知现实，关键在于交流，而不是是否能够精确的反映世界。
【同学提问】
Q：划红线的这句不太懂
A：这段内容是在作者自己的语境下区分了说服和宣传的概念。即一个是人际的，一个是大众
传播的。其实都是大写的说服而已，无论是人际说服，还是大众传播说服，当然都得讲求技
巧，很多技巧是类似的，就是这个意思。
同学：感觉宣传和说服两者还是挺混的，人际关系意义上的宣传也往往具有互动性。
A：这里就是作者自己的定义而已，你也可以认为说服包括人际说服和大众说服给一个不一样
的定义。关键在于作者实际上要说的是人际传播和大众传播，既有区别，又有联系。
Q：为什么把宣传研究认为是早期的传播研究呢？有点不太理解这个宣传和传播怎么给捏合在
一起了。是因为拉斯维尔提出 5W以后，回过头一想宣传就符合这个传播 5W，所以就把宣
传认为是传播的一种么？
宣传本身就是传播的一种类型。传播可以是宣传带有劝服性质的，也可以是告知。比如单
纯的新闻报道，股市新闻，还可以是娱乐，比如娱乐节目。早期大众传媒在民族国家构建、
战争方面展现了巨大的作用，而这些作用很多跟宣传有关，所以激发了大家的研究兴趣。
就好像现在的互联网很火一样。当时人们突然发现居然一支笔，一张报纸就能左右一场运
动，所以就非常关注，因此投入了大量研究资源，也产出了很多成果。到了后来，战后商
业化时代，不怎么打仗，但是要卖产品的时候，就逐渐转变成对商业广告效果、政治广告
效果的研究了。
加上宣传这个词比较不讨人喜欢，所以就变成了新的效果研究。

=====《传播学史》/4.29Day7笔记.pdf=====
4.29 胡师姐公益带读 Day7
今天我们终于要开始来了解下另一个奠基人，拉扎斯菲尔德了。关于拉扎斯菲尔德，大家在
阅读教材的时候，一定也非常熟悉了。四大奠基人里有两个名字开头是拉的，大家一定要区
分开来——一个是拉斯韦尔，他是土生土长的美国人。一个是拉扎斯菲尔德，他是从欧洲过
去的犹太人。
1. Q：了解拉扎斯菲尔德
A：拉扎斯菲尔德也是 20世纪的 00后，我们书上一开头，就介绍了拉扎斯菲尔德的一段故
事。这个故事也很传奇，有点像文学作品的感觉。他和默顿的第一次正式联系，在书上第249
页。这两个人本来其实相当于是对手，因为他们的研究思路不太一样，一个是理论家， 理论
非常强大。因为默顿是我们之前提过的帕森斯的弟子，而拉扎斯菲尔德是一个方法论 者。本
来系里面的同学们要看着他们两个针锋相对的，结果一直没有出现这样的场景。他们第一次
正式的见面本来想要去在家里面吃饭，结果那天拉扎斯菲尔德临时有事，结果两个人就一起
去了电台的播音室看实验，把他们的妻子留在家里面。然后默顿就被拉扎斯菲尔德参与的这
个研究吸引了，两个人从此就成了长期的研究伙伴。
所以我们可以看到，当时研究者们还是比较自由的，很多研究真的就是一念之间，因为某种
人际上的机遇。包括拉扎斯菲尔德本人得到这个研究机会，也是这样，我们后面会讲。正如
我们前面所说，拉扎斯菲尔德本是一个奥利地的犹太人，他老爸没有什么特别的，但他母亲
很不一般，相当于是当时的女性专栏作家，情感指导专家。家中相当于是一个太太的客厅一
样，有很多名流过来聚会，所以拉扎斯菲尔德从小耳濡目染。
小拉扎斯菲尔德的启蒙者——阿德勒，就是一个很厉害的物理学家和数学家，还跟爱因斯坦
关系非常好，这使得他从小对数学很感兴趣。我们知道，拉扎斯菲尔德所领导的哥伦比亚学
派，非常重视定量研究。这种倾向，其实在拉扎斯菲尔德小时候就形成了。就连他的博士论
文，也是研究与爱因斯坦理论相关的数学问题，这与拉斯韦尔很不一样。我们知道拉斯韦尔
小时候痴迷的是精神分析的著作。
当然，拉扎斯菲尔德虽然才华出众，但因为当时的欧洲局势，其实他也过得并不如意。并没
有在大学拿到教职，而是去当了中学老师。但他很勤奋，当中学老师之余还和一些大学心理
系的教授有联系，在他们的项目里出力。他还开办了维也纳研究所，并把那位大学教授拉过
来做顾问。研究所做了很多项目，其中还跟前面提到的法兰克福学派合作过，但是一直缺 钱。
所以拉扎斯菲尔德后来之所以在美国搞行政研究，其实之前这种缺钱的经验也很重要， 穷人
的孩子早当家。
这一时期的拉扎斯菲尔德还没有涉足专门的传播研究。书中 263页提到了马林塔尔失业研究，
这是拉扎斯菲尔德一项非常重要的成果。如果大家仔细看的话，你会发现拉扎斯菲尔德此时
还是比较偏左派的，关注社会问题。这个研究既有定量方法，也有定性的方法，赢得了很大
的声誉。部分因为这个原因，后来拉扎斯菲尔德才有机会去到美国交流，进一步拓展了人脉。
2. Q：广播研究是传播学史上一个比较重要的项目，产出了很多研究成果。有同学知道有哪
些具体成果吗？A：【同学回答：赫佐格日间广播肥皂剧的研究，广播剧火星人入侵所引起
的恐慌性反应的
研究，阿多诺对于流行音乐与严肃音乐的研究，拉扎斯菲尔德关于听广播与阅读的比较研
究。
】
有同学提到了，像日间广播剧研究。这种研究在当时也是有创新意义的。因为那会儿很多学术
界人士没觉得这有什么研究价值，觉得这样的娱乐节目非常庸俗无聊。
有一本讲传播学研究的书，《大众传播效果研究的里程碑》，大家可能在郭书里看到过。在这本书
当中，就把广播研究列为里程碑之一。因为之前，其实大规模的大众传播调查，做得并不多，
我们前面讲芝加哥学派的时候提到过布鲁默曾经参与的研究，佩恩基金会，那个算是一个。但
那次比较局限，主要是研究电影如何影响儿童。而这里提到的广播研究，是非常系统化的。
但是当时拉扎斯菲尔德们把这些研究做下去了，而且产出了大量成果。甚至当时， 连广播公
司一开始也不太愿意做类似的研究，书中也有提到。主要是因为当时广播的信号还不是特别
好，所以很长一段时间内，听众选哪个节目，很大程度上取决于这个节目信号好不好。然后
大家就有思维的惯性，觉得以后也没必要去研究。但是其实技术发展是在不断进步的。信号
的影响因素很快就没有那么高了。而且当时，美国已经广泛被电子媒介所“媒介 化”。
拉扎斯菲尔德们的研究可谓正逢其时。
当然，大家开始重视广播，还有一个原因就是希特勒，对广播宣传的恐惧和兴趣。然后广播
也开始特别想吸引广告商，所以就更加推动了相关研究。开头默顿过去参观的，就是广播研
究的一次现场，然后默顿自己也被拉下水了。
3. Q：广播研究不只是产出了很多报告，还有研究方法上的贡献。有同学知道是哪些吗？
A：【同学回答：节目分析仪，焦点小组访谈】
焦点小组访谈，就是默顿和拉扎斯菲尔德相遇的结果，书中 285页有介绍。当然前面还提到
了作为资料收集一期的节目分析仪。而且我们书中 318页还提到了其他一些拉扎斯菲尔德贡
献的方法，大家课后可以去看下。还有其中一些具体研究，比如日间广播剧研究，里程碑那
本书里写得很详细，有兴趣的同学也可以去感受一下当时到底在研究什么。比如，当时他们
专门去研究听众，了解他们为什么收听，他们有什么特点。
这个研究甚至还涉及了使用与满足的问题。从心理学角度涉及听众们认为自己从连续剧中获
得了什么满足。也因此，书里面会提到说，广播研究在某种意义上，创造了大众传播研究的
领域。这其实就是一个专门的定量方向的效果（也包含受众）研究领域。当然也要注意，这
里面不只是采取了定量方法，也有比如深度访谈、焦点小组在内的偏定性的方法。后来的人
通常会喜欢用有限效果，来形容这些研究带来的启示。当然，另一个由此带来的标签，就是
所谓的管理学派，或者行政研究。
4. Q：法兰克福学派的阿多诺曾经参与过广播研究，但后来不欢而散，为什么会这样？
A：【同学回答：（1）背后的范式不同（2）经验与
批判（3）对于传播研究的性质认识不同。
阿多诺认为，学术研究应该推进知识的新领域，而不是使富有的媒体巨头更富有，把像音乐

者，抱负是很大的，他们希望通过研究能够给人类带来启示，当然如果能起到解放作用就更好。
然后阿多诺们对于当时的那种所谓定量研究方法，也比较怀疑，通过问卷或者分析仪， 收集
一堆数据，就真的能从中找出某种关联吗，比如受众效果到底受哪些因素影响？
学术是知识创新不是服务富人艺术不是商品。阿多诺们认为人类是很复杂的，所以他对定量
的方法本身，也是有一定的警惕，倒不是完全拒绝，而是觉得以这种方法为主太天真。这有

的变量并不能反映真实情况，真实世界是复杂的。
【同学：所以需要定性和定量一起研究，只是看具体研究问题是针对主观性一点的还是客观
性的】
我也赞同前面有同学提出的，定性和定量本身是可以联合起来的。拉扎斯菲尔德本人以前就
这样做过。而这次跟阿多诺的合作之所以破裂，不是说两个方法不能融合，而是说金主不认
同，行政导向的取向不认同批判导向的取向。
当然刚刚有同学指出的问题，就是研究本身取向的问题。也就是不应该为了让资本家更富有
而去搞研究。实际上，我们知道，拉扎斯菲尔德本人跟法兰克福学派关系挺好的，而且以前
拉扎斯菲尔德本人也是个左翼青年，双方还合作过。但现在不行了，拉扎斯菲尔德现在是在

扎斯菲尔德本人还是挺支持阿多诺的，为他申请资金。奈何资本家们不同意，所以阿多诺最
后走掉了。如果洛克菲勒基金会愿意给阿多诺投钱，他想怎么研究就怎么研究，我觉得合作

选择了抱洛克菲勒基金会的大腿，这本身其实也带来了一种规训。
5. Q：阿多诺们的“批判”研究
A：批判则首先是一种取向，就是说我研究不是为了服务资本家或者既得利益的，而是首先去
反思去找问题的，他们不回避价值取向。换句话说，他们不想当自然科学家，而是要为人类进
步的一面为公共利益服务，不是纯粹客观找某种自然或社会规律。
但是批判研究本身其实并不排斥经验研究，也不排斥经验研究中的定量研究。大家去翻传播
学教材，里面提到的培养理论，就是既有定量，但同时也具有批判性的。这个问题确实比较
复杂，大家如果不能很快消化也不用着急。先把各个学者，以及他们的经历，思想了解之 后，
就慢慢理解了。总之，拉扎斯菲尔德早期的研究生涯就是如此。我们下节课谈默顿的时候，
会更进一步谈这种行政模式背后的思路。以及受到的争议，比如米尔斯的批评。【同学提问】
Q：学长，定量与定性，经验与批判，这四个之间的关系，我有点懵，总是会弄混，可以具
体讲一下吗？
A：是这样，这些概念本身用的不规范，翻译得也不规范。提到定量你就想自然科学的定理，
放到社会科学中，定量研究的结论通常也是用数学方式表达的，比如 X越大，Y也越大等
等，一切都是可以操作化，测量，可以比较的，可以验证的。但定性很难如此，比如我们前
面提到的民族志，去观察某个文化如何理解死亡或者其他东西，这是没法用数学方式表达
的。
经验是说你有没有出去搜集经验资料。是说你用来证明或者说明你结论的东西是从哪儿来
的。
如果是通过常识，加上逻辑推理，那一般就是思辨。如果是跑到外面发问卷，收集问卷资 料，
就是经验研究但很多时候大家表达的时候没有这么规范，经常把经验研究和实证研究搞混。
Q：非哥，经验研究包括实证研究吧？
A：对，实证研究严格来说是经验研究的一种，经验这个词更大。
Q：非哥，有个“知其然，而不知其所以然”问题，困惑了很久。拉扎斯菲尔德进行了“广播
研究项目”，他进行的是“广播研究”，在很多书中都介绍拉扎斯菲尔德是早期的“大众传
播研究者”。理查兹是首次使用“大众传播” 这一术语的学者。那么，是如何（为何）把这
个广播作为了“大众传播”呢？
A：是这样的，做研究跟使用概念是不一样的。虽然他们不是第一个提出某个概念的人，但他
们做了扎实的研究，并且这些研究在很大程度上成为了后来的模板。这比提一个概念要重要得
多。
Q：非哥，这里的“经验”什么意思？
A：就是说经验研究中的这个经验，就是说你不能闭门早车、空想的意思，要跑到外面去接触
实际的情况，比如要去观察。有点像古代的格物致知的意思，你得实际去接触这个东西，收集
相关的实际资料。
（同学提供）Q：非哥，定量和定性是研究方法，那经验和批判是什么
呢？
A：经验研究包括定性和定量两种。批判是另一种分类方式，是跟非批判关联的。自然科学就
是非批判的，不涉及价值问题。但人文社会科学中很多是批判的，比如马克思主义旗帜鲜明地
指出对错问题是非问题
【小打卡笔记分享】
BySMILE
ByAya

=====《传播学史》/4.30Day8笔记.pdf=====
4.30 胡师姐公益带读 Day8
上节课我们介绍了拉扎斯菲尔德早期的情况，讲到广播研究。接下来我们讲广播研究之后
的情况，从书中 292页开始提到了拉扎斯菲尔德的各种方法贡献，其中有一些我们上节课
重点讲过。还有一些，比如偏差个案分析，大家也可以了解下。偏差分析就是去找“异
常”，找跟一般规律不一致的个案，然后专门分析。书中还提到了三角测量法，不过要注意，
这里只是说他是三角测量法的早期提倡者，同学们简单了解即可。
1. 关于伊里研究
293页开始，大家最熟悉的研究来了——伊里县研究，或者说人民的选择研究。伊里这个地
方挺有意思的，我之前查过，美国有好多地方叫伊里。这里的伊利是俄亥俄的伊里县， 靠
着五大湖，附近的宾州，纽约州，也有各自的伊里县。（最近有一个纪实纪录片比较火， 叫
富豪谷底求翻身。主角好像就是被安排到了宾州伊里市，只有 100美元，不靠旧关系，
要在 90天创立估值百万的企业。片子蛮有意思的，大家可以看看。）总之，这些伊里县都
相对偏远，相对传统。可能也因此，当年人民的选择选择了其中一个伊里县做研究。
当时广播研究基本上已经接近尾声了，经费也所剩无几，书中还专门讲了拉扎斯菲尔德如
何去为人民的选择项目筹钱。精打细算到了什么程度呢？为了从收音机制造商那里挖个 1
万美元赞助，专门同意在问卷里加入一个问题，就是喜欢用什么牌子的收音机等等。所以
大家可以感受到拉扎斯菲尔德为了筹钱也是拼了，不愧是管理研究。这个研究的方法也很
有意思，大家可以看看书中 294页，它不是一次性做完的而是历时的。也就是对一群人，
反复调查了好多次，这个是一种历时性的研究，固定样本反复调查。大家学研究方法的时
候，可以好好琢磨一下这个研究，把它作为早期的一个例子。
这个研究得出的结论也很经典，后来有学者称之为弱效果理论或者有限效果理论。大家在
看传播学教材的时候，应该都有见到过。但也因此，这个研究或者说这类效果研究，也遭
到了批评。有同学知道主要批评的是哪些方面吗？书中在第 297页，有提到吉特林等人的
批评，主要是认为这种研究只是看到了短期的可测量的个人层次上的态度变化。不过严格
来说，这些对人民的选择的看法很多是后人自己的总结。也有学者认为拉扎斯菲尔德本人
其实并没有说一定是有限效果。比如，他其实也提到了大众传播可能的强化作用。这跟后
来培养分析中提到的大众传播让受众认知甚至价值保持不变很类似。
2. Q：哪个机构被一些学者称为“大众传播研究的诞生地”？
A：广播研究之后，拉扎斯菲尔德并没有闲下来，而是开始了新的征程。他所在的机构， 甚
至被称作大众传播研究的诞生地。这个机构的名字是？（同学回答：应用社会研究局） 对
的，大家看它的名字，就能感受到浓浓的管理研究味道，直接冠上了“应用”。所以这个研
究局参与了一大堆各种各样的项目，成员也很多，一度非常壮大。原来的广播研究所， 最
后也变成了其中的一部分，研究局时期也产生了大量研究。（同学提问：为什么叫做管理研
究？）administrativeresearch，有的翻译为行政，有的翻译为管理。
3. Q：该机构产生了哪些经典研究？
A:像后来的个人的影响，医药扩散，战时公债广播节目研究，都是研究局时期的产物。书
中 307页有总结，指出个人的影响这些研究，很大程度上重新发现了库利的首属群体，或
者说初级群体，大家可以回顾一下之前提到的芝加哥学派。个人的影响，或者说人际影
响，这个研究其实也是一波三折。一开始是在四十年代启动的，米尔斯曾参与其中，负责
现场数据收集。但后来在数据分析和理论建构过程中，出现了问题。米尔斯，书中提到他
有自己的理论主张，主张从阶层分析这个框架进行思考，这是带有批判性的。他想看看报
纸编辑，政府官员这些人掌握了多大的权力，从而影响他人。因为这个研究本身是想要分
析 800名女性如何决策的，比如看什么电影，怎样投票等等。这个框架让拉扎斯菲尔德很
不满意。这也是一个很经典的案例，很多时候定量研究收集完数据之后，接下来怎么分析
也是一个重要的问题。分析数据，解读数据也是需要合适的框架的。甚至不同的人，不同
的范式，可能采取不同的框架。这个项目后来起死回生，是因为一个叫卡茨的进来了，他
从社会学引入小群体研究的框架，然后才柳暗花明。这个研究还有一个点很有趣，是它的
抽样方式。有同学知道这 800名女性是怎么抽样出来的吗？当然一开始还不是 800名，最
初的时候是通过一个叫滚雪球抽样的方式来选取样本的，这是一种非概率抽样。大家可以
留意一下，书中 306页有写。在看与定量研究相关的学者，经典案例时，大家除了被结论，
也可以多留意下他们当年是怎么研究的。
4. 默顿是谁？他为传播研究做出了什么贡献？
A:我们一开始就提到，拉扎斯菲尔德有一个亲密的合作者，默顿。作为帕森斯的弟子，默
顿也是一个非常杰出的社会学家。书中专门介绍了他在研究局做的一个项目，战时公债广
播。在第 316页，大家可以看一下。当然，默顿更关键的贡献，是提出了所谓的中层理
论，也是在 316页。但书里面说的不是很详细，只是提到了默顿对于理论的看法。书中的
那段大概可以这样理解，就是默顿比较提倡这样一种理论，它是一个具体的命题，比如涉
及 a和b的关系，对这个关系做出了某种判断。然后，这个判断是可以在经验层面接受科
学检验的。而很多大理论，比如马克思主义的某些预言，是不可或者至少目前不可能检验
的，这就不是默顿所强调的那种中层理论。默顿希望社会科学研究多去研究这种中层理 论，
不必去找那些宏大到可以解释一切，但又没法实际检验的理论。比如哥伦比亚学派的这些
研究得出的就是中层理论。具体内容，大家可以去翻看传播学的教材，或者胡师姐的蓝皮
书。总之，就像书中说的，拉扎斯菲尔德这一派通过引进大量的科学方法导致了对传播效
果研究的重视。但也因为方法的局限，所以对传播的研究是不够全面的，大家也可以结合
教材，看看罗杰斯最后的评价。
拉扎斯菲尔德这部分，我们就先讲到这里。这是比较重要的人物，所以一般的教材介绍的
也比较全面，思考题后两个关于拉扎斯菲尔德的可以在其中找到答案。

大家想一想，行为主义强调什么？是不是不太强调作为黑箱的人的心灵，而

如果按照刺激强化说，那么这个人再见到第二个信箱的时候，就会增加投信

的紧张系统。这种需求的满足与否，紧不紧张，也跟人们所处的具体环境有
关，跟人们对环境的认知有关。
我们书中第 331页举了勒温早期启发学生做的一个实验——咖啡馆实验。
这个实验其实揭示了——人的行为很多时候是由心理场中的不平衡而引发

务了就不紧张了，也就不记得了。所以大家可以看到， 勒温其实是在用经验
的、实证的方法来研究人的需求、意志，甚至于人格等问题。这是行为主义
回避的东西，也是弗洛伊德看重的东西。弗洛依德虽然也思考这些问题，但
他没有用实证的方法，更多靠自己的体验，靠思辨，靠个案。所以心理学界
基本上不认可，不承认他的理论和学说。但勒温不同，他是通过巧妙的实验
设计，来让以往不太好研究的精神现象呈现出来。然后用他的心理场理论，
心理紧张系统等等概念和理论，来解释人的需求、意志等和行为之间的关
系。
当然，这也因此跟传播有了一些关系。因为人的心理场，或者说心理的需求也好，
紧张也好， 动力也好，很多时候是基于主观认知的，这些认知，用我们书上

于跟行为主义，跟弗洛依德等比较，来把握勒温的学术研究，这样应该会
更容易理解一些。
2.Q：德国时期的勒温和美国时期的勒温
A：再回到勒温的早期生涯。勒温的出生比较一般，但他的学术背景还是
非常不一般的。他的老师都很强大，直系导师是斯顿夫，柏林学派的领军
人物。还有一个老师名气更大，叫卡西尔，勒温上过他的课。有同学知道卡
西尔是谁吗？卡西尔有句名言：人是符号的动物。大家看传播学教程或者教
材的时候应该都曾经接触过。他是个哲学家，思想家，对人性、符号等都
很有研究。如果考到类似题目，大家可以引用一些卡西尔的金句。
勒温的师兄们也非常厉害。应该是三个师兄，联手创立了一个叫做格式塔
学派的心理学派。格式塔这个名字，可能有的同学曾经听过。勒温的场论，
也跟这种格式塔有关系，格式塔心理学又叫做完形心理学。什么意思呢？
相信大家都看过女人-花瓶，妙龄女子-老妇人的图。就是同一张图，可以
看成是老妇人，换个角度又可以看成是年轻女子。
这就是格式塔或者完形心理学提出来的一个例子，也就是说，人在感知世
界的时候，并不是简单接受刺激，而是尝试对事物进行组织简化统一，从
而产生易于理解、协调的整体。比如刚刚前面提到的图，其实本身就像一个
完形填空一样，它是杂乱的，有很多不确定。但是人在感知的时候，会不自
觉地去协调它，把一些没有的东西组织好，补足好。但是每次我们只能按照
一个角度进行完形感知。换句话说，要么你看到的是年轻女子，要么是老妇人。
当然， 这只是完形心理学的一个例子。我们后面提到的认知不协调理论，其
实也受到了完形心理学的影响，勒温的场论同样也如此。只不过完形心理学
强调感知、研究感知，勒温扩展到了心理动力的问题。也就是说不只是感知
需要协调，受某种整体组织因素的影响，人的行为，也会如此。
以上就是勒温的早年，德国时期的勒温。接下来，我们来看一看美国时期的勒温。
勒温，人如其名，是一个很好相处的人，非常有吸引力。很多学生，研究者
都被他打动，或者追随，或者学习，或者保持很好的合作关系。比如施拉姆，
就跟勒温亦师亦友。前面提到
过的米德，也跟勒温关系很好。而像费斯廷格，是一个一直追随其后的弟
子，有点像孔子的弟子跟孔子的关系一样，基本上勒温去哪儿，他们也跟
到哪儿。

A：也就是在美国的期间，勒温将他的心理场思想，进一步延伸到了一个
具体的领域，也就是群体动力，或者说群体传播的领域。无论在衣阿华的

大家今天看起来，已经司空见惯， 但在当时，这样的想法还是不太多的。其
实社会科学研究当中，实验是看起来简单，但想要做好也不容易的一种方法。
很多时候既要严谨，也要有创意。有创意，才能解开人类生活中的某个新维
度。总之，通过这些实验，我们看到群体内部的组织、氛围等等情况，会影
响个体的效能、群体行为的改变，也跟群体中特定位置的某些节点有关。些
都为后来的群体传播研究，提供了部分理论和思想的基础。
5.Q：勒温的弟子——费斯廷格
A：关于费斯廷格，大家有哪些关键词？
【同学回答：认知不和谐理论】
对，此外，书中还介绍了一个西门研究。这个也可以看一看，这其实涉及到
空间与传播的关系，在 354页。这也是一个有趣的研究，但不是在实验室
里做的。而是在一个公寓当中，显然费斯廷格也收到了勒温的影响，研究
发现空间位置会显著影响人与人的联系频率，大家可
以自己去看原文，类似的例子在后来的研究中也被发现了。比如美国研究
者就发现，空间上坐得近的议员，更容易支持彼此的提案，哪怕他们的党
派是对立的。
这个研究还可以延伸到我们互联网时代。大家现在因为疫情都居家办公了。
但居家办公与实地办公，或者学习，究竟那个更有效率？这个也可以从传播
与空间，或者在场之间的关系去讨论思考。大家可以自己想一想。
6.Q：费斯廷格——认知不和谐理论
我们前面说了它跟格式塔，跟场论之间的一些联系。那么这个理论本质上
想表达什么？在传播学意义上，都有哪些例子，或者说可以用来解释什
么呢？
这个研究早期其实跟一个灾害相关，就是印度那边发生了地震。然后费斯廷
格就去了解了一些灾后的一些舆论情况。他发现在受灾地区，流言或者谣言
反而少。而受灾轻的，或者干脆就是外围地区，反而流言飞起。费斯廷格的
解释是，因为受灾地区，人们所见到的事实与害怕的情绪是协调的。所以已
经平衡了。但在之外的地区，所见到的，与害怕的情绪不协调。也就是说
大家很恐惧，很慌张，可是眼前似乎又还没有到那个地步。这时候，他们需
要有东西来“证实焦虑”，所以谣言就广泛传播了。这跟奥尔波特的谣言公
式有点像。也就是说，其实不是先有谣言，再有恐惧。而是先恐惧了，再
有谣言。
所以，在传播效果，受众反应，态度改变等方面，认知不和谐的心理机制经
常起作用，我们在分析类似现象的时候，也考虑到这个因素。这个角度是之
前很多研究者，特别是行为主义的研究者所忽略的。我们下节课讲霍夫兰的
时候也会再提到。比如，在说服理论当中，通常默认先说服，再让对方产生
某种行动。但其实，也可以先让对方做出某个看起来无关的行动， 造成某种失
调，然后再让对方的态度发生改变，进而产生想要达成的效果。
好的，以上就是关于勒温和群体动力学的一些梳理。
【同学提问】
Q：群体动力学怎么由场论发展过来的呢？
A：我们之前提到，场论强调心理场，强调个体所感知到的环境及对行为
的影响。也就是说行为不是简单外在的客观刺激，导致行为反应。而是群体
本身就是个体所处的一种环境。只不过早期场论在研究环境的时候，更多侧
重于个体的精神层面，所以有之前咖啡馆的心理紧张的实验，后来到了美国，
不再像以前那样侧重个体精神层面，而是到了团体层面。这种转变，也与他
个人经历有关。比如纳粹德国与美国的区别，他自己的朋友圈给与的支持
等等。所以就有了后来的领导风格研究，在某种意义上比较了专制团体和民
主团体对人的影响。早期他强调环境，这时候更突出所谓的生活空间，强调
群体在个人生活空间中的重要意义。并且试图通过研究证明：群体可以塑造
一个人的动力，需求，目标。紧张就在于目标，需求等的没有满足。以及团
体本身也是一个心理学的场，互相影响。所以说这是在社会心理学的层面上，
比如后来的西门研究，网络研究，就是在这个意义上开展的，来看一看场的
空间结构会导致什么。
Q：场域理论和场论是差不多的吗，还是说两个是继承的关系？有什么具体的区别吗？
A：场域跟场论不完全一样。场论偏心理学，场域结构更宏大，想要解释
结构和个体能动之间的关系。在传播学中，可以用来解释新闻生产的逻辑，
它们都受惠于物理学的场的概念。
Q：认知不和谐就是认识和现实不一致，或者信息冲突，产生紧张焦虑吗？
A：对，可以简单这么理解。但要注意，费斯廷格所说的会冲突的东西，
不只是某种认知跟现实的不一致。很多东西都可能冲突，比如你买了一台
贵的电脑，没有买另一台，这个选择本身就会造成失调，担心是不是买亏了。
所以为了平衡，你就避免看另一台电脑的广告。大概是这样，总之，它比我
们想象的更广泛。认知不和谐这个大家可以去参阅刘海龙老师的教材，里面
有一些案例的补充。
Q：非哥，批判范式的方法不算是定性的吗？
A：批判本身不排斥定量定性，只不过它不停留于简单的定量定性，因为
涉及价值问题，要判断什么是好什么是坏，甚至还可能有道德方面的主张。
所以会有很多思辨的成分在。现实中很多批判研究，也确实没有去做严格意
义上的定量或定性研究，很多人就是哲学家思想家， 在书斋里写东西的。并
没有去做实验，做田野。他们凭借的是自己强大的思辨能力在分析问题，看
到别人没有看到的维度。

=====《传播学史》/5.2Day10笔记.pdf=====
5.2 胡师姐公益带读 Day10
今天我们讲霍夫兰，这是四大奠基人中的最后一位。在四大之中，霍夫兰比较年轻，1912
年出生，一战的时候还是个小孩子。他 1934 年才硕士毕业，所以跟其他人相比算是晚辈。
但由于他在战时在政府项目中做了一系列研究，对传播学有很大贡献，而且其方法也很具有
代表性，所以被施拉姆选入了四大。如果说拉斯韦尔通过宣传研究贡献了内容分析，勒温通
过群体传播贡献了实验社会心理学，拉扎斯菲尔德通过效果研究贡献了问卷调查，那么霍夫
兰主要通过说服研究贡献了控制实验。
1. Q：霍夫兰的朋友圈有谁？霍夫兰与赫尔的关系是什么？
A：（同学回答:师生关系，朋友圈有凯利、斯托弗、麦奎尔？）对，赫尔是霍夫兰的老师。
之前讲弗洛伊德的时候曾经提到精神分析影响了一个美国学者，就是赫尔。朋友圈刚刚提
到的，有他的“领导”兼同事斯托弗。斯托弗我们之前讲芝加哥学派的时候可能也提过，
他也属于芝加哥学派，但是比较看重量化，所以带动了后来芝加哥的转型，是帕克的弟
子。还有一些人，比如麦奎尔，则是他的同事。当然麦奎尔也是他的弟子，一起做过不少
研究。我们要区分两个麦奎尔，还有一个麦奎尔是写了传播学教材的，跟这个不是一个
人。
当然，再往前看的话，他所在的人类关系研究所，也有很多著名学者。比如芝加哥学派的
托马斯的妻子，就在这个研究所里。这是霍夫兰的基本的人脉关系。
2. Q：这样的一些关系，如何影响了他的学术思想？书中说霍夫兰把行为主义和精神分析
结合在了一起，这个怎么理解？
A：其实这种融合，也跟他的老师有关。因为他老师赫尔就是在尝试融合的。赫尔学过精
神分析，同时也是行为主义的代表人物，而且是新行为主义，不同于早期的行为主义。新
行为主义也非常强调行为，但他们受逻辑实证主义影响也承认一定的逻辑推理的价值，不
完全只看经验可以观察的东西，所以没有早期那么激进。书中提到赫尔引入了一些弗洛伊
德的概念或者思想，所以赫尔跟之前讲究刺激-反应的那种行为主义相比多了一个东西，认
为刺激-内驱力-反应，也就是 s-o-r。这和勒温其实有点像。赫尔他还对数学有研究，所以他
的心理学是要建立一个解释一切心理反应的公式，虽然没有建立起来。总之我们看到， 到
了霍夫兰这里，他不是局限于早期的行为主义来做研究的，实际上在他的书里面经常提到
勒温。
3. Q：关于态度研究的发展阶段。有同学知道都有哪些阶段吗？
A:（同学回答：2-3 5-6 8-9十年代；态度测度、态度变化、重燃对态度和态度体系的兴 趣）
对很好。态度研究一直遇到一些比较关键的难题，其中一个就是态度和行为的关系。就是
说，就算你研究发现确实态度被影响了，但是这个态度真的会转化为实际的行动吗？ 这其
实是有争议的，心理学为此还专门做了研究。比如有很多人说他不喜欢某某演员，但结果
他消费了很多这个演员的电影等等。所以书上2用了麦奎尔的话，说态度和行为之间的低相
关性已经成为领域的一个耻辱。有兴趣的同学可以去看一些心理学教材，当中会有具
体介绍。换句话说，即便我们暂时知道了一个人的态度，也很难预测他的行为。（同学：真
香定律嘛）哈哈，这个原因比较复杂，因为人有时候对自己也不一定了解。所以心理学又
补充了可获得性，或者易得性，就是说如果问一个人的态度，他迅速给出答案，这个态度
一般比较可靠，可以预测行为，反之不一定。这是关于态度研究的一个背景，霍夫兰就是
在这个领域做出了比较重要的贡献。
他一开始做得是陆军实验，研究电影的说服效果。关于电影的说服效果，其实早就有项目研
究了，比如佩恩基金会。那么，霍夫兰这个研究跟佩恩基金会研究有什么区别？（同学回答：
背景不一样？陆军是二战，佩恩基金是电影繁荣，引起公众对儿童不良影响的担 忧。）其
实这个也比较好理解，佩恩基金会的研究思路比较简单，就是看电影有没有应发对儿童的不
良后果。但霍夫兰这个更加细致，考察不同的情况下，后果有什么不同。比如哪些因素下，
效果会更大。当然这次研究的结果，也有些让人意外。因为研究发现，主要影响的是士兵对
事件的认识，而不是看了之后是否会更想去战斗，这是早期的研究。
4. Q:后来霍夫兰在研究所，继续开展相关项目积累了大量成果，教材里一般都有总结
到，都有涉及对哪些因素的考量，有什么比较经典的结论？
A:（同学回答：因素考量：一面理信息与两面理信息、恐惧呼吁的影响、信源可信度的效果）
对，他的这些因素跟 5w很相似，也是从信源，信道等等角度分析概况的，书中 385页有列
出图表总结。（同学提问：像信息学习法、效果等级是不是可以作为一种结论呢？） 具体
结论，大家可以仔细看书。这里有一个疑问，就是很多书中提到霍夫兰的研究结合了行为主
义的学习理论，这怎么理解？对信息学习法可以作为一个大的概念，但具体的法， 或者说
结论还是具体要揭示出来。
这里涉及一个关键就是我们之前曾提过的学习。这里的学习不是说我们为了考试，专门去
看书。一度也有很多学者认为，传播跟心理学中的学习没太大关系，比如拉扎斯菲尔德就
这么认为，因为大家看大众传播的时候学习动机很弱，大众传播是可以随便进出的等等。
霍夫兰还是将其作为一种学习，认为这是因为学习的背景有所不同而已。他认为说服传播
的本质就是一种学习，假设观点和习惯一样，除非经历新的学习过程，否则就倾向于不变。
比如原本面对一个问题（刺激），可能有一种答案（语言习惯，反应）。但通过新的学习经
历，他产生了另一种反应或者答案。
所以这就是为什么说服研究中会出现学习的原因（同学提问：学习是指什么，不太明白）
这里的学习是心理学的概念，不是我们日常说的那种有目的的读书学习。行为主义认为，
人的行为，都是后天形成的，其中学习扮演了重要作用，类似于习得。比如经典的被饿了很
久的老鼠偶然碰到杠杆，吃到了落下的食物。那么之后再被放到这里，就会有更大的几率去
碰杠杆。反复下来，他就形成了这样一个新的习惯，或者说行为。（同学提问：所以， 刺
激—反应，其实就是一种习得（学习）的东西？；通过实践获取经验的一种学习？实验研究
本身就是一种学习？）对，大致可以这么理解。只不过条件反射有很多类型，有比较被动的，
也有主动的。巴甫洛夫的狗就比较被动，是经典条件反射，那个小老鼠是自己进行的，比较
主动，属于操作性条件反射。霍夫兰的信息学习，也是想进一步探讨相关问 题。老鼠的改
变，在于肌肉运用方式的改变，会动杠杆。而霍夫兰思考的是人的态度的改变。他的研究成
果，就是对许多变量如何影响态度，进行了细4致的考察。比如前面有同学提到的信源。再举
个例子，其实广告本身也是在利用条件反射。大家对某个形象有好感， 所以广告就会把这
个形象，比如明星和产品放在一起，这就是一种非常简单的联结。久而久之，大家对这个产
品也有好感。哪怕代言的明星换了，没有代言的明显了，下次看到这
个产品你还是比较亲切。所以霍夫兰的信息学习法，与这个有些类似，比如为什么高可信
度的信源说出的信息，更容易改变我们的态度，就可以理解成类似的作用。但如果没有反
复刺激，随着时间流逝记忆淡化了，导致联结没有那么突出，所以后面就只记得信息本身
了，信源的作用在后期就淡化了。大家可以结合刚刚广告的例子，来理解这个研究背后的
行为主义的逻辑。因此，就像行为主义者华生说，给我 100个（大意如此）婴儿，我能通
过行为主义的方法，将其塑造成任何你想要的类型。霍夫兰这个背后也有这样的可能，就
是掌握规律后，可以任意改变受众的态度，当然这个比较极端理想化。其实杨永信的电击
疗法治疗网瘾，就是类似的思路。通过电击让你恐惧，不仅导致你当时不敢乱来，以后要
玩游戏，也会想到恐惧的经历。就好像华生让一个小孩在碰到毛绒玩具时，同时发生不好
的经历，导致这个孩子患上了对毛绒玩具的恐惧症一样。当然霍夫兰的研究比较细致，他
看到了不同的人，会有不同的效果，比如智力的高低等等。尽管如此，他的研究还是受到
了质疑。
5. Q:罗杰斯为什么认为说服实验的研究外在有效性比较低？
A:罗杰斯就说研究的外在有效性比较低。这是什么意思？（同学回答：创造的不真实也限制
了实验结果应用于实际环境。）对，虽然在实验室里可以被后来的人重复验证，信度可能很
高。但在真实世界中，不一定是这样。（同学提问：所以这是个理想化的实验？）对。
6. Q:最小效果和有限效果的差异？
A:罗杰斯在书中还提到，说霍夫兰的研究发现了最小效果，跟拉扎斯菲尔德们的有限效果有
所不同，这该怎么理解？刚刚有同学关于上一个问题的回答也能解释这个问题。就是 说，
霍夫兰为了尽量避免复杂的影响，导致之后分析难度加大，他特地对实验进行了某些设计。
（同学提问：最小效果可以理解为理想的控制环境得到的效果吗？）比如参加实验的人，彼
此之间不能交流或者说尽量减少他们内部交流的机会。也尽量避免其他环境因素， 比如别
的大众媒体在期间影响他们。所以这样一来，拉扎斯菲尔德研究中的意见领袖之类的因素就
被削弱了。因此，霍夫兰的研究得到的效果或者说媒介造成的改变，比拉扎斯菲尔德们的研
究要更大些。书中 396页提到，三分之一到二分之一受到了影响。所以这就被称为最小媒介
效果，就是同学刚刚的提问解释。所以虽然不能完全适用于现实，但我们也要看到，他也的
确发现了一些人性的规律。
当然，霍夫兰的命运还是蛮令人唏嘘的。大家看教材的时候可能会有这样一个疑问，就是
其他奠基人和先驱研究成果都很多很丰富，但霍夫兰似乎比较单一。有个很重要的原因，
是因为他英年早逝。书中也提到了相关的情况，在 396页，他生命的最后期间，麦奎尔专
程过来陪他。所以这也非常可惜，霍夫兰本人在当时确实是个天才，年纪轻轻就在斯托弗
那里担任首席心理学家。但他开创的研究思路，后来还是被继承了，比如麦奎尔就继续把
这条信息学习的道路走了下去，总结出了更多的因素或者说维度。关于霍夫兰，主要就是
这些，、因为他采用的是实验方法，所以其观点都比较直接，相对好理解。
【同学提问】

5.4 胡师姐公益带读 Day11
今天我们要来讲解一下维纳和他的控制论。这部分的篇幅，相对于前面的四大奠基人而言，
并不是特别长，与传播直接相关的内容书中没有那么多。但一些地方不是特别好理解，比如控
制论到底跟传播有什么关系？就只是提出了一个反馈吗？可能同学们在看书和看教材的 时候
都有疑惑。我们看到，前言部分，罗杰斯对维纳的评价是很高的，将他也列为先驱，认为其贡献
并不比所谓的四大要低，这么高的评价，真的有道理吗？后半段，我们会重点讲一讲。
1.Q:维纳简介
A首先，还是来看看维纳的时空定位。维纳是美国人，犹太人。所以犹太人真的是占据了传播
学早期的大半个江山。时间的话，他是个 90后，射手座。大家可以算算，他比前面的霍
夫兰可是大了快 20岁。所以维纳也是有过一些一战经历的，实际上一战爆发的时候，他刚
好在欧洲游学中，后来立刻返回了美国，还服过兵役。
不过维纳的早年，跟前面几个先驱都很不一样。读过书的同学都知道，他是个神童。爸爸在哈
佛教书。大概 15岁就拿到了学士学位，18岁博士学位。好像是为了避免太引人注目，他本科
没去哈佛，而是去了离哈佛不远的一个学院。不过后来还是在下一阶段去了哈佛深造。然后
他跟拉扎斯菲尔德有点像，家中高朋满座，威廉詹姆斯、克鲁泡特金都是常客。而且他从小也
喜欢数学，当然实际涉猎了很多学科，因此主要成就都跟数学有关。他跟中国也有很多关联，曾
经在清华担任客座教授，还把华罗庚推荐给了西方学界。所以他的确是个非常厉害的学者。
2.Q:维纳怎么与传播研究发生关系的？
A书中提到了黄色险境，也就是关于改进高射炮火炮准度的研究。他从信息控制的角度，来探
索高射炮的准度问题，大家可以看书上 408页。后来，他又进一步写作了《控制论》这本书。
3.Q:怎么理解控制论？如何理解反馈——正反馈负反馈？
A【同学回答（1）控制论是关于自我控制系统的理论，它以“反馈”概念为依据，其定义是
通过关于一个系统以往运行情况的信息，来控制这个系统的未来行为。（2）在一个传播系统
中，反馈是一个接受者（信宿）对于信源（传播者）从前信息的回应，表明它的效果】
对，或者说就是系统在环境刺激下做出反应，这个反应本身又影响系统的下一个反应。
【同学回答正反馈，是有促进和加强控制的作用，负反馈，反之。】
这个反之的意思是？需要再具体和准确一些，是说以另一种方式控制？还是说是不控制？或者
说，正反馈造成输出变动持续加大，而负反馈则导致输出变动的持续变少。有哪些正反馈的例
子？
【同学回答：多米诺骨牌】
个人觉得，简单说多米诺骨牌的话可能还不是很准确。如果是一种特殊的多米诺骨牌，可能比
较合适，比如，最开始的骨牌很小，后来的很大，这样的话才能存在扩大。否则的话，只是一种
简单的力的传递。当然，我觉得多米诺骨牌就算这样设计的话，可能还不是非常符合原本的正反
馈的意思，因为原来的正反馈强调的是一个系统自身的输出的变化，而骨牌实际上不是一个系统
在输出。我觉得更合适的例子，是麦克风，麦克风从自身的扬声器中拾取声音，然后再次通过扬
声器发送，这就是一个自我扩大的情形，系统还是原本那个麦克风系统。多米诺骨牌的设计，以及
核爆炸那种，如果不那么严格来看，只看最后的效果，确实符合正反馈的放大效应。然后负反馈
就比较容易想到了，想家里空调的恒温系统，就是典型的负反馈。以及书中提到的人体体温的调
节。热了，就出汗；冷了，就起疙瘩皮，从而缩减、集聚表面区域。这就是说人体的控制系统能
够感知所谓的温度情况，从而进行调节，使得体温保持在一个比较合适的水平。
正反馈如果用在人类社会的例子上，其实也有大家比较熟悉的例子。比如网络经济所谓的集聚
效应，节点越多，效果越好，进一步吸引更多人加入。当然这些和前面提到的链式反应一样，我
个人觉得都是广义的正反馈。比较符合狭义的正反馈，可能是心理学上的，比如自我实现效应，
感觉自己好，然后做起来就自信，结果越来越好。这里的话，系统就是我们的心理，这跟前面
提到的麦克风很像。
【同学回答：那沉默的螺旋呢？】
很好，沉默的螺旋其实与这个也有关，我们后面也会继续提。其实沉默的螺旋之所成为一个正反
馈，很大程度上就在于整个群体作为系统，缺乏准确地反馈，或者说反馈是单向的。比如，大家
看到的反馈都是支持某一方的，所以就导致这一方面不断强化。这其实就是一个控制论问题。很
多与群体传播、公共空间讨论、群体极化相关的研究，其实就是在试图让系统变得更合理，可以
产生更多的，更真实全面的反馈，从而能够让作为整体的系统自我修正， 或者说成为一个具
有负反馈，能够保持平衡的系统。这也就是控制论思想为什么在传播学中其实很重要的原因之
一。大家看到的一般的教材，只是在讲传播模式论的时候，提到说 5w没有反馈，不好，然后
维纳的有反馈。需要补上。然后就没有然后了。其实这是对控制论思想的一种窄化。人类传播中
当然充满了反馈，但控制论的关键不是说存在反馈，而是要思考怎么合理的通过反馈来控制，来
达到目的。或者说，用反馈的眼光，来发现传播中存在的问题，并进行改进。
4.Q:帕洛阿尔托学派与控制论
A：那么这个学派为什么跟控制论有关？
【同学回答：（1）就是贝特森所在的学派；（2）影响了互动论；（3）互动论传播学；（4）反
馈存在于互动里面】
对，这个学派也谈互动，但是他们的角度不是芝加哥那种符号互动，而是有点系统内部互动的
感觉。也就是是说，比如在家庭里面，家庭本身的内部交流就构成了一个系统，很多家庭存在的
问题，就在于这个系统的运行出了问题，而之所以有问题，就在于互动本身的模式不对。可能每
个个体的行为，单独来看没什么，但跟他人发生互3 动，发生纠缠后，就产生了一些意想不到的后
果。比如某个特殊的家庭中，丈夫和妻子吵架，这似乎只是一种冲突，但实
际上双方各取所需，都在玩一个竞争的游戏。妻子从中获得优越感，丈夫则避免了与儿子的争
辩。而他们那个酗酒的儿子，则通过酗酒来逃避这个喜欢竞争的家庭文化。所以这个家庭才积
重难返，因为长期都是这么互动的。但是彼此之间没有 get到，或者说，他们没能接收到正确
的反馈，从而发现这个根本的问题。很多时候，有一个人似乎情况变好了，但连带着另一个人
又会变糟糕。没有尽头。比如，家中的女儿，则因为弟弟的颓废，有了成为英雄获得胜利的机会。
如果弟弟变好了，可能妹妹就会出现问题等等。因此瓦茨拉维克，也就是贝特森的学生，就认为，
想要治疗这个家庭，就必须让家人意识到现有规则的内生破坏的本质， 然后重构规则才行
个人觉得这其实就是一种系统论和控制论的结合。因为系统本身是复杂的，所以想要良好运行，
就更加需要获得正确的反馈，从而协调彼此。所以这就是帕洛阿尔托学派与控制论的一种联系。
当然这个学派比较复杂，还有其他方面的联系，因为他们也谈个体的精神病人，谈神经控制问题。
只不过，传统的传播学通常重点关注大众传播的效果，所以给人感觉，好像维纳的控制论，反馈
等等，只是被捧得比较高，实际上似乎跟传播研究关系不大。但其实不是这样，特别是在今天网
络化的时代，大家开始通过互联网集聚、交流，形成网络空间，控制论的意义就更大了。大众媒
体时代，受众相对比较被动和分散，所以所谓的“反馈”只是简单用来作为大众媒体的用户调
查等等，其实没有太多学术价值。而在今天，它则可以与网络社区的生态系统建设等等结合在
一起。

合适？
（我们书中最后提到了系统论。当然，严格来说的话，控制论、系统论都比较复杂，比如维纳
当年写的时候，好像就写了好多数学公式在里面。这些我们不用太关注。更主要是吸收其中的
思想。关于系统论，郭书里面也比较强调。因为当年，系统论，信息论，控制论，是影响了一代
中国学人的“三论”，所以那个年代出来的老师都对其印象深刻。郭书甚至专门把传播理解成社
会信息系统的运行。有兴趣的同学也可以进一步翻翻郭书。）
A：【同学回答：系统论是考察个体与其他人的网络和关系问题，系统思维认为相互作用的关系
是生命系统的本质部分。控制论直接促成了系统5论产生，系统论受控制论影响，两者直接关联
可以从生命系统在反馈上调节运行看出。】
这个大家其实也可以去参考郭书，郭书里面大意是在强调——想要理解传播，就要去思考传播
本身所处的系统，意识到它的复杂性，联系性。所以系统论实际上是对我们所处的世界、群体
等等给出了一个总体的认识和看法。
然后控制论，则更加具体的探讨如何实现对系统的控制，这种控制，也需要建立在对系统的正
确认知上，否则就无法合理控制。这是我个人的理解，比如说在互联网这个大系统内，存在各种
各样的“力”，所以一个传播内容最终会有什么结果，很多时候是不确定的。如果我们依然按照
过去的大众传播的观点，去控制信息，或者说去掌舵某个媒体，很多时候可能适得其反。管理
学上也有一些观点，认为当前要告别过去的思路，比如我做一个规划，以前可能就是一群人花
好久去涉及，然后以此来申请风险投资，或者企业内部的支持。但现在变化太快了，还按照以
前那个模式，计划出来之后，市场都变了，甚至都没了。所以应当像变色龙那样，先上去再说，
过程中不断接受反馈，灵活调整。

5.5 胡师姐公益带读 Day12
今天我们介绍书上提到的最后一位先驱——香农。上节课在讲维纳的时候，介绍了三论当
中的控制论和系统论。系统论提供了一个很好的世界观，让我们懂得要将很多现象和过程
置于系统中去考虑，并且系统本身涉及很多元素的互动，它通常不是我们想得那么简单，
不是线性的。比如上节课提到的一些复杂的互动例子生态系统也是一个很好的例子。大家
都听说过类似于捕狼捕多了，造成兔子泛滥之类的例子。控制论可以置于系统论的背景 下，

领域。那今天要讲的香农，则为我们贡献了第三论——信息论。
1. 关于香农
A：关于香农，他在先驱们当中属于典型的后浪，非常年轻。1916年才出生，比维纳小大概
20岁。但是就是这样一个后辈，日后却成了连曾经的神童维纳也为之嫉妒的存在。香农早
期的履历虽然厉害但是并没有维纳那么光鲜。他的崛起是在二战时期，作为贝尔实验室的成
员，参与战时密码学方面的研究，期间关于信息论的思想逐渐成熟，战后才把相关内容发表。
之后被洛克菲勒基金会的韦弗慧眼识珠，一下子看出了这些论文的学术价值，于是大力推广，
合写了一本书，就是《传播的数学原理》，然后一炮打响。香农不仅开创了一个新领域，而且
用后来很多人的话说，一个人单枪匹马，就把这个领域几乎所有核心的问题都给解决了，确
实非常厉害。
2. 他的信息论到底说的是什么？经常提到的信息熵，又是指什么呢？
A：（同学回答：传播模式，信息不确定性的程度；熵是一个系统的不确定性或无秩序的程度）
这里其实有一个非常容易误解的地方，就是关于香农所说的信息。很多同学会误以为就是我
们传播学里面经常说的那个信息，但其实不太一样。香农确实从通信的角度，描绘了一种基
础的传播模式，里面还涉及了对信息的编码解码等等。但是大家注意，这跟我们在教材里面
提到的，日后文化研究的编码解码不是一回事。香农的信息是不考虑所谓“意义”的。换句
话说，他这里的信息纯粹就是信号，不是我们后来文化研究编码解码过程中想要传递或解读
的意义。书上在第 440页有专门的区分。所谓三种层次的传播，香农的模式只跟第一层救赎
层面打交道。而香农所谓的信息，与其说是信息或者说符号，不如说是一种增量，或者意外。
比如有一个人讲话，都是老生常谈，之前关于六小龄童的一个事他经常在镜头前谈，是有小
朋友问他悟空有没有女朋友或者女朋友是谁，大家就来调侃怎么说来说去都是这个故事。用
信息论的角度，六小龄童虽然说了很多，但实际上没有提供“信息”，也就是我们所说的有
用的信息，因为他说的都是大家知道的，没有增量，没有意外。假如只要他一面对镜头，就一
定说这个故事，这个时候虽然表面上有很多内容，但信息实际上相当于 0，这是香农理解的
信息。我们再举个例子，比如抛硬币，猜是正面还是反面。由于我们不知道究竟是哪一个，
所以这个时候如果公布一个答案，比如正面，这就是一个真正的信息。这个信息的量是多少
呢？就是 1比特。这个 1比特，让我们能够在一次 yesorno的回答中得到答案，或者说通
过引入这 1比特的信息，我们能够知道情况。书中 427页也举了相关例子，不过更加复杂一
些，要从 16个胡桃里选 1个胡桃，那么要经过
4次yesorno，我们能确定是哪一个。所以，从 16种可能中选一个，所要的信息量就是 4
比特。而所谓熵，就是用来衡量“消除不确定性所需要的引入的量”，比如本来16个里面
会是哪一个，我们不知道不确定。但经过 4次提问后，就能消除不确定，得到答案。这就
是关于香农的信息，以及熵的基本含义，这是理解信息论的基础。
3. Q：如何评价香农的数学模式呢？
A:前面这些概念有什么意义呢？大家可能会有疑问。我们先从密码学谈起，香农一开始是
研究密码的。比如现在有一段用英语写的紧急电文：美国要求英国向北非增兵，几点几分
在哪里登陆。当然这是解读出来的文字，实际上编码的时候会用巧妙的方法把原文字替换
掉。比如简单一点的方法，我用字母 z替换字母e，这样就难以一下子看明白写的是什
么。但这就保险了吗？并不是。实际上根据研究英语当中最常用的字母就是e，所以只要
把电文或者类似的很多电文放在一起做个统计，看看频率最高的是哪个字母，该字母就有很
大的可能是e，如果不是换第二高的也差不太多，所以很快就能破解。比如发现 z 的频率最
高，所以z就是用来替换e 的。也就是说虽然英语 26 个字母，但不是每个字母出现的频率
都一样。换句话说，如果是我们做一个游戏，从 26 个字母里每次选一个写下来，那么现实
生活中，不同字母的熵是不同的。比如，e 的熵就很低，也就是说它被写下来的可能性非常
大。换句话说，如果一个地方写的是e，他的信息量其实就不太高。就好像我们听 到这样
“我爱X”这样的表达，通常那个 x 都是你，所以没有什么信息量。但如果突然有一个人不
按常理出牌，说“我爱他”，信息量就很高了，因为这个字出现的概率太低了。
香农研究密码的时候主要就是找到了一种数学方法来计算各种密码方案的安全性或者说保
密性。不管你用什么东西来做秘钥，是一套字母还是书本某一页的文字，香农都能算出 来，
这样可以更好地开发密码系统。否则大家不知道我发明了一个密码体系，到底可不可靠，
是不是比上次的强，敌人要多久才能破解。那么这种思路，同样可以用来思考一般的通信
问题，就是我们正常传输内容我也能算出这一段内容的信息量，也就是熵。
如果一段文字，字母的熵过于低，就说明什么呢？说明哪怕把它拿走或者空缺，大家差不
多也能猜出来是什么。大家可能都看过这样一个实验，就是一段英文，你读下来完全明白
意思，但仔细一看，很多单词都是缺胳膊少腿的。所以在这种情况下，这段文字就出现很
多冗余。Icnduo'tbvleieetahtIculodaulacltyuesdtannrdwahtIwasrdnaieg.比如上面这段
话。虽然字母是乱的，但不影响阅读。可能你会觉得这样岂不是说，英文是非常啰嗦的？
很多单词都可以再压缩压缩，何必打那么多字母？其实不尽然。冗余虽然啰嗦，但也有一
个好处，就是抗噪。如果传输过程中，英文中不少字母假设损坏了，但恰恰因为其冗余，
所以你依然看得懂可以还原出来。我们大家在网上下载东西下载电影的时候，看到的压缩
包大概就是这种方式。
所以香农的思想就很好地解决了长距离传输中信息损失的问题。比如你对别人喊话，因为
有噪音对方听不到。传统的方式是什么呢？在通信中以前的方式也差不多，就是加大音 量，
我每隔一段距离增强一下。但是这样还不行，长距离传输总归会导致信号损失，最后听不
出来。其实更好地方式比如比划，比划也相当于一种冗余，因为比划的内容和嘴里说的其
实差不多。我们更常见的就是说的时候多重复一些内容。所以这里很多人也引申出来一个
观点：为什么中国人喜欢大声说话？有很多解释，一种解释就是中文相对于英语的熵太高
了或者说冗余太少。
前段时有一个比较有趣的观点，就是为什么只有东亚，特别是中日，流行弹幕文化，而欧
美弹幕一直火不起来。网上也有人从信息论或者熵的角度解释，因为中文汉字的熵比较 高。
他们想说中文每个字的信息量比较大，所以效率高，弹幕看起来才有效率。否则英文写了
半天还没说完，自然弹幕就不尽兴。大家觉得这个说法对吗？其实这个说法有对的地
方，但关键的理论用错了。我们前面说过，香农所说的信息，信息量，不是我们日常语言
中理解的那个。香农是不考虑意义的，所以根据香农的方法算出来的信息量，跟意义无 关，
不是说熵高，就一定有很多意义。熵低，就没有多少意义，不是这样。根据香农的理论，
一段随机的英文字母排列，信息量都比正常的英语文字高。但在日常生活中，前者并没有
实际的意义。香农的信息量，只是在看一个选择的意外程度。如果是一段文字的话， 就是
看每一个文字选择的意外程度。我爱你，在香农理论看来，熵是很低的，信息量不 高。但
在现实中，它很有意义。所以不能用香农的理论以及熵的概念，来说明为什么欧美不流行
弹幕。
话又说回来，中文的书面文字，确实在有些地方比较高效，这个应当是成立的。个人觉得
这主要是因为我们的方块字的写法比较省空间。如果我们每个汉字，都像英文横排字母那
样，横排比划，中文读起来也会有些不那么畅快，写几个字可能屏幕就满了。比如“家”
字，从左到右分别是点，点之类的。所以英文有一点吃亏的是它是元素直线排列的。就好
比 DNA，如果拉成直线会非常长，但好在是卷曲的，所以才非常短。以及如果从熵的角度
来看的话，其实日文的熵也挺低的，可能比英文还低，但日本人照样流行弹幕。日语里面
有很多外来语就是根据英语的音直接用假名来对应。比如エスカレーター，汉语就两个 字，
电梯，但日语却很长。这个不一定准确但确实日文很多地方比较机械地根据英语来造词，
而不是用汉字，所以他们的每个字的熵也很低。但日本网友还是很喜欢弹幕，所以这里面
其实文化因素更大一些。
关于香农的信息论，核心的就是这些，大家要明白香农的信息指什么，熵是什么意思，以
及如何理解冗余的意义。所以从通信角度，要做到熵和冗余的平衡。熵不能太低，但也要
留一些空间给冗余，这样可以更好地削弱噪音的影响。所以香农的贡献，在某种意义上比
维纳让我们更加感同身受，大家只要上网用电脑，每次去看看文件大小，这其实就是香农
的功劳。无论是视频还是文字，都可以统一来计算。
（同学提问：熵和信息是等同概念，还是包含关系？）不是，准确说熵是对信息量的度 量。
可以简单理解信息就是意外，熵就是意外程度，这个可能不太准确但比较好理解。当然我们
这里说的熵，是指信息熵，还有一种熵，是物理意义上的，说的是系统内部的无序性。（同
学提问：程度是个比值，和讯息比吗？）程度就是需要引入多大的量的意思。比如2进制当
中，预测下一个各自是 0还是 1，需要 1次选择。所以二进制中的一位就是 1个比特。换句
话说，要知道信息量必须要知道它的整体的选择框和概率。比如英文之所以熵 低，字母本
身数量少也是一个原因，只有 26个。所以每一次相当于从 26个里面选一个。当然考虑到实
际的使用习惯和语法有些字母概率更高。而汉字的话不是这样，单个的汉字数量远远超过
26。所以学习汉字，比学字母要难得多。
4. Q:香农本人如何看待信息论？
A:其实这就是我们之前提到的，他本人其实非常强调不能随意延伸。但没办法，信息论的
革命性太强了，给很多学科都带来了新的视野，所以很多学科都热议信息论，包括当时初创
的传播学。书中 453页还提到，施拉姆的弟子泰勒受信息论启发，开发了有关可读性的信
息类型测量法，所谓完形填空法。这个跟我们前面提到的那个读英文的实验很相似。香农
的数学模式，更是被教科书纳入作为经典模型。由于香农本身的模型是用在通信上的， 所
以不能简单挪用，比如在哪些方面就需要注意？其中一个特别需要修正的是编码解码。
香农的编码解码是根据固定的格式进行的。但实际上人类传播中的编码解码，则有很强的
能动性。以及噪音不仅仅是存在于信道中，存在于传播的中间过程中，实际上在各个环节
都有。当然很多书里面还会提到反馈、互动的问题，以及社会系统、传播背景的复杂性等
等。所以大家要注意其中的差别。书中 451页也有提到一些。
5. 信息论对传播研究的影响
A:和维纳类似，香农的研究更多是启迪了传播学者的世界观，方法论，开辟了新天地，直
接被运用到自身研究中的并不太多。所以他更多是起到了一种先驱作用。包括香农的信息
和传播学里常说的信息也是有差异的。但是他刺激了学科的发展，也让传播的地位被抬 升，
让学科本身有了更多合法性。以上就是香农和他信息论的主要情况。
【同学提问】
Q：冗余度降噪，会减少信息吗？信息定义是意外的话
A：对，如果信道容量有限的话，就需要在二者间进行平衡。
Q：如果一个人从来没对我说过我爱你，只对别人说我爱你，而有一天忽然跟我说了我爱
你，那么这同样“我爱你”这三个字是不是只是有所谓意义上的信息量，而没有香农所说
的那种信息量？
A：如果结合情境的话，不一定。因为不同人说我爱你的概率是不一样的。就像同样是用字
母，有的语言中a的概率和英文也不同。所以我觉得如果一个人过去很少说我爱你，那么
他默认的情况下，说这个字的几率很低，因此一旦说出来，信息量就很高了。之前我们举
例子的时候，是用的社会的平均情况。如果专门分析某个人，就要结合他自身的情况、概
率来考察。香农本人就说过，如果你跟一个婴儿很熟，那么婴儿咿呀学语可能比大人说的
话更容易预测，但如果不熟，那就未必了。所以我的判断是，在提问所举的例子中，两种
意义上的信息量，都有的，而且都比较高。除非他说之前，已经有了表示比如送上了戒指。
Q:香农注重的是传播中的准确度，不涉及到反馈，这样理解对吗？另外，冗余在传播中有
作用吗？
A:对，香农关心的是怎么把信号准确从一端传递到另一端而不失真。它不涉及日常生活中
说的那个意义，所以本身不需要反馈。冗余在传播，或者通信中的作用就是抵抗噪音，使
得信号可以被更可靠地还原或者说解码。
Q:MB、KB、GB这些算是香农信息量的计算单位吗？
A:香农应该没有直接发明这些，但这些都基于比特 bit，可以去换算的。
Q:冗余度和熵是此消彼长的关系吗？
A:不能直接这么说，因为熵是一个总量，比如我写了 50 万字，字字珠玑，每个字的熵都很
高，根据前一个字测不出后一个字，这个时候当然熵（总量）高，冗余度低。但也可能虽
然我的东西很啰嗦，但我写了 100 万字，所以这个时候冗余度高，但熵（总量）也高。所
谓的此消彼长，更多是出现在单一的选择中，比如某一个位置，如果选了一个熵比较高
的，比如字母z，这个时候这个字母所带来的冗余就少。
Q:有的中文古诗句，表面一个意思（也就是字面意思），其实内里还有一个意思，算是熵高
吗？
A:这个不是，信息论不看实际日常语言中的意义的，它只看字面的信号本身的出现是否意
外。所以一串随机英文字母排列，信息量也可以很高。含义多样更接近日常用语中的能指
所指的问题。

=====《传播学史》/5.6Day13笔记.pdf=====
5.6 胡师姐公益带读 Day13
今天我们再次回到施拉姆那里，对传播学史进行收尾。大家可能还记得，我们第一章讲了施拉
姆早期和中期的各项活动。最后提到他从衣阿华大学，转入伊利诺伊大学。第十二章，就是从这
个时间节点开始的。总体上，施拉姆战后的学科历程，可以分为衣阿华，伊利诺伊， 斯坦福
三个阶段。当然斯坦福之后还有发展，但这三个比较主要。
1.Q：伊利诺伊时期的施拉姆
A：施拉姆在衣阿华时，已经开始尝试建设传播学学科，但可惜校方在资金等资源供给方面， 无法
满足施拉姆的要求。所以衣阿华虽然诞生了第一个传播学的博士课程，但没有能够走更远。这时
候，一个非常关键的人物站了出来，告诉施拉姆，跟着我走吧，我给你资源。这个人就是斯托达
德。同学们对他可能还有印象，我们早先也提到过。他原来也在衣阿华大学， 是著名的衣阿
华儿童福利研究所所长。
大家还记得这个福利研究所当时还有谁吗？
那个人就是勒温，大家可以再翻到 337页。勒温当时就是被斯托达德慧眼识珠，招到它的研究
所的，然后在这里做了著名的领导方式研究。所以斯托达德可以说是大佬背后的大佬。他直接影
响了勒温和施拉姆的学术轨迹。而在担任衣阿华儿童福利研究所所长前，斯托达德作为一个心理
学家，还指导过佩恩基金会的电影对儿童效果研究。总之，在斯托达德的支持下， 施拉姆同学就
去了伊利诺伊，然后当上了校长助理（后来实际工作内容相当于副校长）。斯托达德还支持施
拉姆创立了历史上第一个传播研究所，后来又推动其成为传播系主任。于是施拉姆的理想，就
在伊利诺伊开始实现了。当然，书上也强调，伊利诺伊当时恰好也有人想建立传播研究所，已
经做了一些基础工作。施拉姆起到了催化作用。接下来，施拉姆开始爆发，在参与管理工作之
余，还编写了大量先驱性的教材、著作。
2.Q：在伊利诺伊，除了施拉姆，还有谁也对传播研究做出了贡献？
A：这个人在传播学教材里面也被提过，郭书里就有。大家可以再去翻下郭书，郭书讲传播模
式论的时候，提到过一个循环模式，这个模式就是施拉姆在奥斯古德的基础上发展出来的， 奥斯古
德就是施拉姆在伊利诺伊的同事。所以书上把这个模式叫做奥斯古德-施拉姆的循环模式。传播学史
在 469页提到了他，介绍了奥斯古德的另一个贡献，就是语义差异量表。同学们在学研究方法
的时候，学到测量的时候，就会接触到这个量表了。奥斯古德在研究所的地位也很高，后来施拉
姆离开研究所后，所长之位就是由奥斯古德接任的。大家课后可以具体关注下。
3.Q：斯坦福时期的施拉姆
A：好景不长，施拉姆在伊利诺伊的大刀阔斧，是在斯托达德校长的支持下完成的。但后来斯
托达德由于改革太快，和原来学校里的一些老资格发生了矛盾，最后黯然下台。新校长不喜欢
施拉姆，于是施拉姆的很多职务被剥夺……总之，很有宫廷政治剧的味道。然后施拉姆就准备
离开了。所以大家从中也能看到，学术界也是有很多是是非非的。
好在有用一个重要人物伸出了援手，这个人叫做布什，是斯坦福大学传播与新闻系主任。布
什是前面提到了老爸布莱尔的弟子，大家可能还有印象。布莱尔是美国新闻学研究史上的重要
人物，也可以说是奠基性的。布什把施拉姆招过来，两年后还把传播研究所所长的位置让给了施
拉姆。在斯坦福，施拉姆培养了大批后进，其中很多人，在传播学历史上都做出了重要的贡献。
他们的许多研究都写入了我们今天的传播学教材，只不过教材里没说，这些人都是施拉姆的弟
子。
有同学知道都有谁吗？

斯研究媒体的额议程设置过程、G·C·丘研究国际传播问题；（2）太多了：473页】
对，很好。还有丹尼尔森，他和多伊奇曼一起进行了新闻扩散研究；查菲，提出了大众媒体终

以和施拉姆曾经同在衣阿华待过。所以正如书上所说，施拉姆所在的斯坦福，成为了美国传播学
的种子机构。当然，书上 474还提到了绿眼罩人和卡方人之争，大家可以关注下。
4.Q：施拉姆主流范式之外的传播研究情况
A：有两个比较著名的，英尼斯和麦克卢汉，他们已经是一般教材中的常客了。罗杰斯在书中
也进行了简单介绍。并对其中的一些思想进行了解说。比如麦克卢汉的热媒介和冷媒介。
5.Q：为什么麦克卢汉会把电视作为冷媒介？
A：【同学回答：参与度高？】
对，理由是参与度高，那为什么会参与度高呢？麦克卢汉的参与度是怎么得出的？
【同学回答：（1）因为电视收看的门槛低；（2）很多画面；（3）不需要读文字】
电视确实有这样的特点，但这个还不是麦克卢汉所指出的原因。因为这样一来，照片的观看门
槛也不高，都是画面，也不需要读文字，电影也是。其实关键在于清晰度。在麦克卢汉时代，电
视清晰度不高，显像管上的形象非常粗糙模糊。所以观众需要更多的参与，换句话说， 麦克卢汉
说的作为冷媒介的电视，是有时代性的，指的是当时的电视。同样如此的，还有漫画。有一本
很好看的书，叫做，理解漫画，这本书用漫画的方式来解读漫画。非常有意思。书中提到的观
点，就跟麦克卢汉很像。比如，书中问，为什么大家怎么喜欢看漫画，如此着迷？其中一个非常
重要的原因，我给大家截个图看下。这就有些类似于麦克卢汉的冷热，或者低高参与度问题
因为照片太清晰了，太真了，所以我们不太好想象，或者说没法再自由想象。而漫画的形象则
不那么清晰，一幅画越卡通化，他就越能代表更多人，反过来，看的人就可以更自由想象来填
补，甚至代入自己。
所以其实很多思想是共同的。当然，麦克卢汉提出冷热说，我觉得并不是让我们来照搬的，
而是提出一种比较的思路。当然随着时代的变化，一个媒介是冷还是热，是可能变动的。
罗杰斯在书上对冷热说的解读，我觉得是基本到位的。当然，因为时代和范式的关系，罗杰斯
可能对麦克卢汉还是有些误解。比如同样在 503页开头，他把媒介即讯息，说成是麦克卢汉的
许多被夸大了的探索之一，这里明显认可麦克卢汉的贡献，但又认为被扩大。包括我们很多比
较早的教材，也有类似的态度，倾向于批判麦克卢汉，有的说他是技术决定论，有的说他自相
矛盾等等，但其实这可能是对麦克卢汉的误读。有兴趣的同学可以去参考刘海龙老师书里对麦
克卢汉的介绍，可以有更清晰的认识。
6.Q：拉扎斯菲尔德为什么反对统计显著性检验？
在最后回顾发展历程的时候，罗杰斯提到这样一个情况，说拉扎斯菲尔德主要运用了定量的方
法，但反对后来被广泛使用的统计显著性检验。这里其实涉及研究方法，大家以后看研究方法
的时候，看到这块内容，可以联系罗杰斯提到的关于拉扎斯菲尔德的这段故事。拉扎斯菲尔德
之所以反对统计显著性检验，是因为他更喜欢做个案研究，比如跑到伊利县，做人民的选择调
查。然后从中找到某些影响传播效果的因素，比如发现原来存在意见领袖，存在两级传播。
【不关注从样本推论到总体吗？】
对的，他们不关注如何将伊利县的结果，经过科学论证，可以推广到全国。而统计显著性检验，
很大程度上就是在检验这方面的问题。比如，我们要做研究，先通过合理的方式选择样本，通
常是概率抽样，比如从 100 个人里随机抽取 20 个。然后收集这 20个人的数据，进行
分析，得出某些结果，比如这 20 个人的年龄，和阅读时长相关。但这个结论能不能推广到
100人呢？这个相关，是真的相关，还是仅仅是抽样误差导致的？比如我刚好抽到的这 20
个人，可以刚好相关？统计显著性检验就是来测这个的，看看这到底是不是抽样误差带来的巧
合。如果不是，那么恭喜，这个结论就能推广，就基本上（也不是绝对，只是非常高的几率）
代表总体
但大家想一想，拉扎斯菲尔德的研究本来就是定量的个案或者说案例研究，他做调查的时候， 根
本就没有去从某个总体或者说抽样框中，进行所谓的概率抽样。也就是说，他并不是从全国xxx
个人里随机抽 200个这样。而是直接选择了一个地点，比如伊利县，进行研究。所以他这种定
量，跟后面那种其实是有区别的。当然统计显著性检验，不只是用来比总体。还可以比较两个组
之间的差异。虽然书上没有具体交代，但个人猜测，霍夫兰可能就是使用过这种检验方法的。所
以虽然都是定量，但还是有区别。
大家如果目前不能理解的话，可以先记住，等之后学习研究方法的时候再结合起来理解，可能
会有比较好的效果。
好的，那么罗杰斯这本传播学史，我们就全部讲完了。就像我们最开始说的，这本书写的并不
是传播学真正完整的历史，实际上是学科的生成史。他非常详细地介绍了差不多 100年间传播
学关键人物如何对该领域进行推动的，非常详细。如果大家想了解这个时间段的人物和思想，
这本书是非常合适的。当然，传播学在之后还有不少新发展，这方面传播学史涉及的不多，这是
需要大家从其他书里面进行补充的。
总之，这是一本非常赞的书，可以让大家对传播学形成比较完整详细的谱系。从而更到位地把
握核心学者，核心思想的来龙去脉，从而更好地进行理解。在今后的学习中，大家也可以经常
再翻翻，配合主力教材进行补充。最好能够通过这本书，自己画出，或者总结出人物之间的各
种关系，影响的方向等等。通过这种方式，可以充分把散落的传播学知识，有机串联在这张大
网上，使得大家以后的知识提取，更加便利，就算考试的时候有些东西遗忘了，但这张网，可
以迅速帮大家重新想起关键概念和知识。
好的，那我们传播学史的带读就到此结束了。大家如果还有问题，可以继续留言！
《传播学史》带读人：非哥

=====《乌合之众》/5.9Day1笔记.pdf=====
5.9 胡师姐公益带读 Day1
1. 有关这本书本身、作者和背景的一些介绍
首先这本书可以说是社会心理学的奠基之作，和之前读的《传播学史》有些不同，这里面可
能没有那么多事实性的信息，更多是的观点的阐述，所以我们在带读的过程中也是着重去理
解勒庞的一些观点和想法。这里面说的理解就是我们先不说支持或者反对勒庞的一些说法，
因为他的说法确实存在很大的争议，我们先站在勒庞的角度去想为什么他会有这样的看法。
因为一个研究者在写一本书的时候 首先是基于一个时代，然后他发现了这个时代的一些问
题，他的目的也是要去分析或者解决这个问题。
那么我们首先来看勒庞这个人。勒庞是 1841年出生的，实际上他并没有尽力或见证 1789
年法国大革命的那个阶段，但是从 1789年之后的法国发展一直受到这一事件的影响。在勒
庞生活的 1841年-1931年，整整九十年的过程中，法国一直都处于一个动荡或者说在勒庞
看来是混乱的时期。这里面我们可以将法国和英国的革命形式以及后续两个国家的不同发展
路径进行对比，就会很清楚。所以勒庞在这个过程中是感受到了他认为的群体带来的整个法
国和整个时代的一个巨变，基于法国大革命他写了这本书。给大家看一张勒庞的照片
勒庞本身是个医学生，25岁就获得了博士学位，他自己也做过医生。但是后来他就开始在
世界各地到处旅游，开始从事人类学和考古学的研究。所以他曾经对不同的种族进行过考察，
也为他后来的人种论和心理学的研究奠定了一定的基础。乌合之众这本书是 1895年出
版的，当时勒庞是 54岁。其实勒庞在 40多岁的时候才刚刚开始转向社会心理学的研究。
这本书被称为是社会心理学的奠基之作，1895年距今已经一百多年了但是现在仍然再被不
停的再版，我们手里应该会拿着不同的出版社的版本，可见他的影响力之大。
但是这并不意味着没有争议，刚刚有同学提到勒庞的意气风发，其实如果以现在来看的话
勒庞可以说是一个独立研究者，或者说是编外研究人员，因为他一直是被正式的学术圈拒
之门外的，这一点从他自己的序言里也可以看到。当时有法国思想家会直接批评他的研究
不入流，因为他不属于任何一个学派，所以再看这张照片可能就有了一些放荡不羁的色
彩。乌合之众出版之后不仅引起了当时学界的争议，甚至是不满的攻击，但是不管怎样，
我们现在一想到勒庞还是会想到他这本书。1895 年的法国可以说是各种思想、观点、意见
分成的一个时代，当时的很流行的一个思想就是对种族和性别的偏见，这种偏见在这本书
里也时常可见。所以大家还是要去了解一下当时的法国社会可能会更好地理解书里面的内
容。
我拿到的版本是马晓佳翻译的版本，他在译序中直接提到的是这本书的有用性。那么这个
有用性就在于我们能够去理解和影响群体。如果我们回顾一下我们自己国家的发展历程，
再看一下当下社会上最近的一些现象，就知道能够影响群体是意见多么重要的事情。而勒
庞在原序中就提到他写这本书就是在描述群体的特征。这种群体的特征是和我们说的譬如
中国人的特征也就是我们说的民族性格是不同的。那为什么勒庞会去研究和关注这个群
体？因为在勒庞之前大部分学术研究关注的都不是我们说的群体或者大众，而是上层社会
和精英，这一点也是因为勒庞关注到群体力量的崛起，也就是群体的无意识行为完全取代
了个体的有意识行为。
2. Q:那么我们如何去看到群体力量在社会上发挥越来越重要的作用？
A:我们可以想一下启蒙运动时期，我们去批判封建专制 提倡自由、民主和平等。如果从这
个角度来看，这可能意味着人类文明的进步。但是面对这股力量，勒庞看到的是恐惧、方
案、愤懑以及悲伤，他觉得这是西方文明的一个衰落。所以他写下这本书去论证群体的力
量，这个力量不是进步的力量而是破坏力量。我们刚刚提到了勒庞一些观点带来的争议，
这本书还有一个争议就在于研究范式上的争议。大家在原序里应该看到了勒庞一直在强调
他在用纯科学的方式去研究群体现象，同时表现出了对于社会学家的不屑。但这本书本身
也常常被人认为是毫无论据，自说自话，通过断言、重复来不断说明自己的观点。而这种
做法也恰恰是勒庞提到的去操纵群体的方式之一。但是勒庞也提出自己的结论可能不完
善，因为除了看到的现象之外还有很多我们看不清楚甚至是看不到的现象，而这些可能会
更重要。这个也是我们以后在研究甚至是日常生活中需要去考量的问题。
在勒庞看来 19世纪末的法国就是我们说的群体时代，在这个时代由于科学和工业的发展，
由于正字制度、宗教和社会信仰的变化，人类的精神在发生巨大的变化。一方面旧的观念被
打破，但还在影响人们；另一方面，新的思想还未形成，所以群体的时代，也是过渡时代，
也是混乱的时代。但是无论如何民众的力量是越来越重要，譬如民众的声音进入到政治生活，
像普选等这些事情在勒庞看来是不好的事情。民众开始学会用自己的力量去追求自己的利益
和诉求，主要就体现在消灭一切上层阶级、实行国有化和平均分配等等。而且群体开始通过
蛮横的力量去实现这些诉求，带来了社会的混乱和动荡。民众所做的事情就是破坏和摧毁旧
的文明，在这里勒庞分别将民众对应野蛮，将知识贵族对应理性和文明， 这也体现了他是
保守的精英主义。所以勒庞提出，尽管我们对群体认识很少，但是他们又太重要了，所以我
们必须去研究它。研究它的目的是啥？说好听的是领导和支配，用勒庞自己的话，其实就是
骗，去诱惑和操控。操控群体对于统治者是非常重要的，所以我们可以看到后来的很多政治
家都熟读和十分偏爱乌合之众这本书，最著名的就是希特勒。
我拿到的这个版本将第一卷翻译为群体的性格，我看过的其他版本有将其翻译为群体的心
理、群体的灵魂、群体的思想等等，对应的是英文的 mind。今天我们要看的第一章和第二
章其实在介绍群体的特点。
3. Q:什么是群体？有什么总特点？
A:（同学回答：一些无意识的人的集合；聚集在一起的人；个人聚集在一起的团体）勒庞
在第一卷第一章的开始就交代我们这本书研究的群体，也就是心理学意义上的群体，和我
们日常使用的群体含义不同。我们所说的群体是在某些条件下若干群体带有一个目的集结
成群，表现出不同于个体的特点，这群人开始有特定的群体心理。就变成了我们说的组织
化的群体，也就是我们说的心理学意义上的群体。我们可以看从这个意义上说，平常我们
一起走在马路上的人群不算群体，但是在这条马路上游行的人就算。群体诞生之时就伴随
着自觉的个性消失以及思想感情的统一。所以群体的基本特点就是当个体融入群体之后，
会被群体的性格影响，使其变得与其单独相处不同。
4. Q:为何个体进入群体会发生巨大的变化？
A:在勒庞看来，个体进入群体之后，不仅仅是数量上的变化，而是质的变化，就像化学反
应一样，个体变得和之前完全不同。这其中既有无意识因素的影响、个体的理智降低、个
性被削弱的影响，同时当个体进入群体之后，人会莫名获得一种力量感，由于匿名和无责
任性，人会不再约束自己，这是现在很多研究在分析互联网上的乱象时经常使用的一个说
法。还有传染的重要性，这个是勒庞反反复复提到的，人在群体中很容易被传染和催眠。
在这个过程中，人甚至会为了群体利益牺牲个人利益，想想战争期间的人们就很好理解。
包括人进入群体之后会变的很容易接受暗示，个体的人格意识是消失了，人们独立的意志
和思考能力也消失。就像被催眠一样，只要接受指令就能够立刻采取行动。所以在勒庞看
来，只要你加入到群体之中就意味着你在攀登文明大楼的过程中掉下了几个台阶，哪怕是
勒庞眼中的文化中、精英和知识贵族都没有办法避免这种情况。那这是我们说的群体的最
根本的特点。
5. 群体的基本特点
无论是从何种群体中都能看到，有一些基本的特点，譬如冲动性、动态性、狂暴性、轻信性、易感
性、单向极化的情感以及排异、专制和保守，这些也都是群体常见的各种特点。在这里我们要注
意勒庞认为群体的这些特点是还处于生命的低级进化形态的人群中我们会经常看到的，而他认
为妇女、野蛮人和儿童就是这样的人。这在此反映了他的人种论，和法国社会存在的对特定人
群和种族的歧视。
冲动我们很好理解，动态则是说，群体不是固定不变的，而是处于动态之中，而且这种动态是极
端的，一会儿极其残暴，可能一会儿又非常宽容，所以群体反应就像动物本能，随着刺激不同在
不同的状态中来回切换，这就和我们早期的受众观联系起来了。另外就是群体的狂暴性，为了满
足自己的需求，群体可以去烧杀抢掠，不顾后果，这也和他的匿名性和复数力量有关。个体进行
群体之后失去了自己的意识、判断能力和思考意识就会变得轻信和易感， 这也和群体喜欢形
象思维，善于用想象力去编造故事和幻觉有关。在这个过程中，人的理性和判断力完全消失，交
互感染机制发挥重要的作用，使人愈加轻信和容易受人影响。由于群体很相信想象力和幻觉，所
以群体的观察是不值得被相信的。群体的见证也可以大错特错， 也就是群体的证言是不可信的，
毫无价值，需要被舍弃。另外，群体的情感表现出简单化和极端化的特点，这就意味着群体不会
怀疑也只喜欢夸张的兴趣，要通过断言和重复去影响他们，而不是理性。所以我们常常不是通过
证据和理性说服群体，而是通过唤醒他的热情，使其情感膨胀 、智商下降。排异、专制和保守
歧视也都很好理解，因为群体思想和感情的统一和简单，他不会再去质疑是非，保持着保守的
本能。最后我们要看的是道德，我们的思考题有一道是关于这个问题的。
6. Q：群体是否有道德净化的作用？
A:（同学回答: 群体的道德感觉会极端化，极端高尚或是残忍；群体的道德水平是低劣的）
这要看我们如何去理解道德，如果我们将道德理解为尊重传统、抑制自私和冲动，我
们看到群体必然是不具备的。但是我们也看到 一些群体甚至会为了群体利益去奉献和牺牲
自己，想想一些狂热宗教分子，他们的那种自焚的活动，有的人会为了群体拿出自己的全部
家当，我们看到群体可能会极端残忍，但是也会有一些崇高的表现。很多人加入群体之后不
再为个人利益行动，而是为群体利益服务，想象罢工的工人，还有士兵等等，鼓舞他们的都
是爱国主义和为全社会平等奋斗的口号。所以在勒庞看来，群体确实有道德净化的作用，尽
管我们不知道这种作用是否为常态，但是确实是常见的。从这个角度我们看到， 如果人类
社会的发展全都依靠理性人，依靠为自己的利益服务的人，可能就不会产生我们说的文明，
甚至是人类历史，但是我们也要知道勒庞这里说的道德 并不是我们传统意义上的道德，而
是一种为了信仰、理念奉献、甚至是献身的一种情况。
今天对于这本书的分享就是这些，像我们之前说的，这本书不是教材，也没有很多事实性

还有一些广告商、销售人员、管理者等等，都有理解群体和影响群体的需要，所以这本书是这
个意义上不仅是一本单纯的学术著作，也具有勒庞说的实践意义，这也是勒庞自身追求的。由
于群体本身没有判断力、观察力、思考力，但是他们却有很强的行动力，所以群体都需要有一
个领袖，而且群体中的个体会有服从领袖权威的一个本能。
2.Q：群体领袖可以借助群体的力量去实现自己的目的，那么什么样的人才能够成为群体领
袖？或者说如何成为群体领袖？
【同学回答：（1）有说服大众的能力；（2）有坚定的信念 能够产生一种专制的权威；（3）
拥有虔诚信念的人，能够激发起群众的信仰】
嗯嗯，看来大家都读书啦！
首先，领袖本身也是行动力极强的人。尽管他是领袖，但由于他也深处群体之中，所以也具有
鲁莽、极端简单的情绪。但是他们信念是很坚定的，也就是本身就要有强大的意志力，这也是
群体缺乏的，所以领袖能够产生影响。另外，群体领袖还非常会取悦群众，这其中可以是说好
话，也可以是满足人们的一些低级本能，譬如吃喝玩乐，使人听从领袖的指导，心甘情愿的成
为奴隶。
3.Q：这种观点有没有使大家想到我们传播学中的一个学派？
【同学回答：（1）法兰克福学派？（2）控制论？】
是的，这里可以尝试与法拉克福学派所说的文化工业相联系——群众是如何在低级需求的不断满
足中，丧失自己的思考能力，服从统治阶级统治的。但是阿多诺他们的目标指向是资产阶级，
但是勒庞不是，所以即使有相同点，但也有不同的语境。
控制论说的是，整个社会系统的运行有时并不能一直按照预定的目的发展，所以这个时候为了
让社会正常发展，我们需要以信息反馈为基础，进行干预，达到稳定和平衡。所以在维纳提出
的控制基本上是针对机器自动化的。但是随着这一理论在各个学科的应用，很多人也开始将其
理解为控制，当这种理论和勒庞的说法结合起来的时候，也可以说我们要去控制这些
群体，在当时很有用就是宣传、广告和公关等，所以这二者也是相关的。这反映的是你们应该
接触过的：传播是控制，而法兰克福学派恰恰是对此进行批判的。
4.Q：关于群体领袖
A：我们接着讲书中的内容
由于领袖具备如此能力，所以它可以很强的影响力，最重要的一点就是激发人们的信仰。领袖
大部分情况下是人，但是也有可能成为出版物，像书籍、报纸、广播等，都可能对人产生影响，
给人提供简单的思想，勒庞在书中只点到为止，但是作为新闻传播学的学生，我们要知道，出
版物背后仍然是人，尤其是学过控制研究的大家都知道，很多因素会对出版物的生产产生影响，
所以看到的是出版物，看不到的背后因素往往也是最重要的。
有一种领袖是激情澎湃的，比较粗暴、鲁莽，它能够从事一些突然性的行动，这种人的力量强
大，但是也很短，其实它本身也需要被领导。但是领袖的意志力更为持久，影响力更大也更持久，
所以我们看到，意志力是很重要的事情。那么领袖控制群体的方式，一般是依靠简单、纯粹的断
言，也就是简单的论述，像广告里的：送礼只送脑白金。还有就是去不断重复这些简单的话，类
似一种洗脑式的反复，还记得一种说法叫做谎话说了一千遍就成了真理， 就是这个道理。因为
长期的重复会使这些观念深入到人的无意识，从而对人的行为产生重要影响。
5.Q：群体中的“模仿”与塔尔德
A：在这种情况下，传染机制开始起作用，群体的思想观念、情感情绪可以具有强烈的传染
性被传染开来，这里面涉及到一个概念叫做模仿。大家看到模仿就想到了谁？
【同学回答：塔尔德】
很好～
在勒庞看来，模仿是传染的一个结果。塔尔德在专门针对模仿做过研究，二者都是属于同一
时期的心理学家，但是二者对与群体的案发是不同的。近些年，塔尔德的观点越来越被重视。勒庞称
群体为乌合之众，但是塔尔德则称其为公众。在勒庞看来，群体行为是由于群体的非理性和盲
目，但是塔尔德则认为这是因为人和人之间能够分享热情，从而形成一个共同体， 大家才会
一起去行动。其中大众报纸就是一个非常重要的因素。所以从勒庞出发，是一种理解，从塔尔
德出发，我们则看到了另一种可能，如果大家用了勒庞的视角去分析社交媒体上的一些现象时，
可能看到的是网民的无理性和狂暴，但是从塔尔德角度，可能会看到人和人通过信息和观念共享，
试图找到共同的身份认同和彼此理解。
6.Q：群体领袖与气场
A：群体领袖还需要具备一定的气场，这是一种比较神秘的力量，赋予人们敬畏感、权威感。一种
气场来自于外部环境。我们经常说，金钱打造气势，另一种气场则是因为人本身的力量， 气场可以
帮助领袖麻痹群体的判断力，使人无条件接受和服从领袖的思想情感。气场往往与成功相联系，
成功一旦消失，气场也会随之消失。而且有气场的领袖是需要和群众保持距离的，不能够打破自
己的神秘感。这一点我们可以看一下大众媒体普及后，一些英雄和政治领
袖的神秘感越来越少，人们也不再迷恋英雄故事。
7.Q：群体领袖和意见领袖之间的区别？
A：【同学回答：（1）群体重操纵，KOL重撒播；（2）群体领袖更是精神导师，KOL是某领域意
见上的建议者；（3）意见领袖，主要对受众对事件的看法转变起作用，理性占据更多些；而
群众领袖要具有很强的感染力，主观性更强些】
首先群体领袖是在群体传播中发挥作用，而意见领袖本来的概念是在人际传播中发挥作用。
另外我们说意见领袖一般是和被影响者是同级关系，但是群体领袖和群众则是上下级关系。
意见领袖和被影响者联系较紧密，可能是邻居、朋友等，但是群体领袖则要与群众保持距离， 保持
神秘感。意见领袖和群体领袖对人施加影响的方式也不同，这些都是大家可以去思考的角度，也
可以从意见领袖本身的特点出发，对应群体领袖去思考。与“牢固的观念”相对的则是我们说的
可变的观念，这种观念持续时间比较短，会经常发生变化，它更容易受到暗示和传染的影响，所
以它是动态的。在当时法国社会有很多这种动态观念在影响人们，一方面是因为共同观念的崩塌，
还有民众力量的影响，最后就是媒体的发展。
在勒庞看来，媒体也受到群体力量的影响，去迎合群体的需求。上面夹杂着大量的鸡汤、谣言
和留言，根本没有起到应有的指导群众的作用，报纸虽然很厚，但是思想性却很薄。

5.13 胡师姐公益带读 Day5
第三卷的内容我们将会分两次课的时间完成。我要提醒大家的是，咱们读书的过程中，一

在全国各大院校新传考研很喜欢考一些社会热点题目，如若考生能将一些学者的经典著作
的观点运用于你的答题，这会为你的答案增添不少亮点，也就意味着更能容易得高分。咱
们目前读书不是为读书而读书，就现在阶段而言，读书的直接目的就是让大家能成为研究
生。
我们看看本书的第三卷：群体的分类及各种群体的特点。本书的第一卷群体的性格和思想
观念，作者实际上做了不少批判。作者认为，群体毫无理性可言，最有智慧的人在群体中
也会变得失去理智。而在本书的第三卷中，作者又要继续对群体做批评，作者详细区分了
各类型的群体并对各类型的群体的特点进行分析。我们看第三卷第一章群体的分类。
1. Q:“如何区分同质性群体和异质性群体？”
A: 作者在书中提到“几百年间不断进犯罗马帝国的蛮族联军就是这种典型，它的成分非常
复杂”，这句话不禁让我们联想到当年的八国联军侵华。各国联军分属于各个国家不同的异质性
群体，但是联合起来有了共同的信仰和目标，就成为了同质性群体。如美国的共和党属于一
个同质性群体、民主党属于一个同质性群体。但是作者提到，本书不研究同质性群体。那什
么是异质性群体呢？我们先看一个小短片。
(视频 1)
这个视频是电影《黑镜》里的一段内容，女主人公背后遭遇歹徒的枪击，正在寻求帮助，
但是周围的人都忙着拍视频，没有人对她施加援助之手，我们可以把这群人视作乌合之 众，
放眼于现实社会，我们何尝又不是这些人呢？我们拿着手机拍摄我们周遭的一切，享受着
手机带给我们的拟态环境，而忽略了我们现实社会中的真实环境。于是，我们这种异质性
群体就成为勒庞的批评对象。我们做个延伸，手机这样一件东西到底对我们施加了什么影
响呢？比如说大家现在都处于自己的卧室里，卧室原来是满足人动物性的需求的场 所，带
有私密性，然后卧室中有了智能手机，在卧室中使用手机产生了被窝的经济学，而这就带
来了社交媒体的技术逻辑和社会影响。我们逐渐沦为资本主义文明的牺牲品，而我们依旧
享乐在其中。
法兰克福学派有一位学者马尔库塞写过一本书《单向度的人：发达工业社会意识形态研
究》，有同学读过这本书吗？这本书系统论述了人们在发达工业社会如何沦为工业社会的奴隶，
结合现实语境，我们也都在不同程度上成为了工业社会的免费劳动力。我们观看大量网络内
容，逐渐丧失了自己的理性思考能力和批判能力，经常容易被互联网上的内容带节奏，实际
上我们不仅成为了勒庞所批评的“乌合之众”，我们也都成为了马尔库塞笔下的 “单向度的
人”。涂尔干，社会学三大奠基人之一，又名迪尔凯姆，写过一本书《社会分工论》，这本书大
家读过吗，他的另外一本知名的著作是《自杀论》。在《社会分工论》中， 涂尔干区分了两种团
结方式，机械团结和有机团结。“机械团结”要求所有人必须服从群体利益至上，一旦个人违
背群体将会受到惩罚，个人的价值和利益完全忽略不计，这种团结往往体现在古代奴隶社会、
封建社会；“有机团结”要求个人的价值能得到体现，社会运转需要每个人发挥出自己的才智，
当然这种团结也要求每个人的利益与声音都能得到一定程度上的维护。
我们联系一下《乌合之众》，机械团结和有机团结怎么和异质性群体做比较。我们一直说“我
们社会是一个有机的结合体”，实际上就是涂尔干所言的有机团结，但是网络社会呢？我们用
这个理论分析一下社会热点话题。大家还记得《方方日记》嘛？一共有 60篇，刚开始这些
日记写出来的时候，方方是得到大量的赞许的，一旦有人辱骂方方，网民会就会攻击这个人。
但是随着中国抗疫局面的好转，尤其是《方方日记》要出版到西方国家后，我们听到的全都
是对《方方日记》和方方的辱骂声，而一旦有人继续赞扬方方，则会遭到攻击。大家怎么看
待《方方日记》？（同学回答: 主观性描述过多; 日记并不全部真实，没有多少证据; 信源不
可证;）实际上像大家所说的，这个日记里实际上有很多内容并不真实。但是为什么抗疫前
期大家是赞许她的？从赞扬到辱骂，网民们为什么会这样做，是什么原因？（同学回答：前
期，她处于信息前沿，后期报道跟进，人们全面了解了吧）是的，但还不够。网络社会颇具
机械团结的特征，个人的声音在互联网上是微弱的，而且个人的意志不可以违背网络上群体
的意志，否则就会遭遇大量网络攻击。网络上所形成的机械团
结，就是一群异质性群体。《方方日记》从赞扬到辱骂经历了网络上民粹主义到民族主义的转
向。
2. 关于民粹主义和民族主义
这两个主义相信大家都听说过，民粹主义又称为平民主义，与精英主义相对立，比如说法国
的“黄背心运动”。黄背心抗议者大多数来自法国一些经济发展缓慢、人口下降、社会服务设
施减少的地区，特别是乡村地区、山区等，他们的平均收入要低于全国水平、使用车辆的时
间更多、他们生活的地区就业率也更低。由此，一些学者称黄背心运动代表的是“农村法
国”、“边缘法国”，这是长期被人们忽视的另一个法国的抗议呼声，是长期被城市地区、高科技
工业中心所遮蔽的另一个偏僻、相对落后、生活水准相对较低、公共服务设施日益减少的法
国。当他们自发组织起来而来到巴黎进行抗议时，其力量更大、更难以得到控制。于是，真
的是“农村包围城市”了。大家想一下，我们国家有没有发生过类似于“黄背心运动”的民
粹主义？（同学回答；钓鱼岛事件的时候，抵制日货；萨德事件，抵制韩货）同样还有去年
爆发的香港暴力事件。典型的民粹主义运动，当然其背后还受到了西方一些政客的操纵。还
有钓鱼岛事件，中国人焚烧日本车辆、美国特朗普操纵民粹主义当选总统、法西斯操纵民粹
主义发动法西斯战争等等。民粹主义可能在我们身边就会发 生。那什么是民族主义，民族
主义就是过度爱国，缺乏理性的爱国。《方方日记》出版到国外，一些网民开始联想，以为
《方方日记》为外国人骂中国提供了口实。就区区一本日 记，西方人会关注吗，也许会关
注，但比起西方国家大量的辱华报道、西方人对中国人的刻板成见等等，《方方日记》可谓
是沧海一粟。而网民对方方疯狂的辱骂和攻击，成为了典型的民族主义。同样，中国人焚烧日
本车辆也是典型的民族主义。所以民粹主义和民族主义往往二者都有千丝万缕的联系。
其实我们经过这样分析后，会发现网络群体会很容易成为网络民族主义或者是网路民粹主义。
而这两种主义，最后又会形成两种媒介奇观：网络民族主义奇观和网路民粹主义奇 观。而
《方方日记》就成为了典型，同样的，在新冠疫情期间还有很多其他媒介事件也构成了媒介
奇观，比如说之前一篇文章《吹哨子的人》，这篇文章发表后不断被微信公众平台和谐，智慧
的网民们，将这篇文章做成了二维码形式的、全部倒过来的、火星文形式的等等，这篇文章
在不断被重新制作的时候，文本本身的意义已不再重要，而是这篇文章发表的形式成为了人
们议论的焦点。
3. 我们再用《乌合之众》分析其他热点事件
A:德阳女医生事件。德阳女医生事件中那个走廊上班的女医生，媒体有两种再现。存在舆论
博弈。真相到底如何？复盘的依据是什么？大家了解过这个事件嘛？现在很多新闻或者说平
台发布的一些信息，就无从去判断哪些是真相或者事实，哪些是谣言，最后会变成烂尾新闻，
复盘德阳女医生之后，网络暴力主体又转向男孩以及其家人，真相是什么好像也没有揭露出
来，情绪比事实更重要，很快又会重新被其他议题替代掉，真相就埋没在不确定的空间里。
大家想一下，“后真相”是怎么发生的？跟网民们有什么关系？德阳女医生自杀案中，网民已
经不只是参观，而是在残缺的事实中寻找情绪发泄的对象，将女医生置于舆论的悬崖边，最
终导致惨案的发生，舆论反转后又纷纷指责小男孩一家人恶意涂抹事 实。网民对事件的参
与脱离了事件本身，而转化成一种“群体式参与”的仪式狂欢，发表意见仅仅是为了象征性
的参与，对事件本身却毫不关心。后真相中，个人的情绪比真相更加重要。
这就触及了当下中国社会的现实问题，为什么这样说？首先，我们都认可“眼见为实”
Seeingisbelieving有图有真相。大家还记得周正龙老虎照片案吗？为什么一定要真相？因
为这牵扯到社会信任问题，两个舆论场的问题。对政府或媒体而言，牵扯到公信力问题。
政府要避免“塔西佗陷阱”（同学提问：后真相是缺乏社会信任的表现？）是的。真相出场
的过程却是民众一窝蜂关注的，是围观，这个过程在中国变成了一种狂欢仪式。大家想想李
文亮医生事件，网络上风起云涌，纷纷寻求真相，这可以说是中国特有的现象。为什么呢？
因为中国社会转型期社会矛盾激化，贫富差距越来越大，在民众心中产生了巨大的不满情绪。
这种不满情绪彼此影响，本来不相干的人就容易形成共情，至于真相是什么，渐渐变得不重
要了。任何事情中，强弱先区分开来，渐渐会同情弱者，这就是民粹主义倾 向。所以后真
相本身也联系着网络民粹主义（同学：不讲道理，讲情理）利用贴标签的方式，让普通民众
觉得，强者即他者。网络群体仇官仇富。（同学提问：这个议程是谁设置 的？）这个议程不
是谁设置的，你要联系中国的大背景，处于金字塔顶端的人物少之又 少，网络群体有典型
的三低特征：低学历、低龄、低收入。于是，共情效应之后，会强化认同，当大家都在追求
真相的时候，有人就利用这种共情来带节奏。当然还有孙杨事件， 网民的态度变化，大家
可以接着我这个思路自己去分析。
4. Q:犯罪群体的形成原因。
A:书中提到了“九月大屠杀”，大屠杀可谓就是犯罪，如二战中南京大屠杀、纳粹屠杀犹太人。
作为一个士兵，本身与这些人无冤无仇，但是为什么要去杀害这些无辜的人，这背后就是战
争作祟，战争的背后存在某种政治目的。之前我看过一部电影，电影名我实在想不起来了，
那里面有一句话直接提到“政治就是犯罪”。古代东西方的战争颇具马基雅维利主义，以至于
直到现代，这种政治操纵也依然被各国领袖所运用。在前文中勒庞为我们总结出领袖煽动信
众的三个最为重要的方法，即“断言法、重复法和传染法”，演说家往往出言不逊、信誓旦旦，
肆意煽动着群体的极端情感，通过一遍又一遍的重复，引来了大量信徒的加入，于是乎，这
类信徒“不惜牺牲自己的家庭、牺牲自己的利益——牺牲自己的一 切。自我保护的本能在
他们身上消失的无影无踪，在绝大多数情况下，他们孜孜以求的唯一回报就是以身殉职”。
但是我们并不能向勒庞所言及的那样，对于涉及战争中的个体就一棒子打死。譬如我们有些人
因为一些民族情绪和历史积淀，对只要是日本人、日本士兵就
十分憎恶。我们再看一个视频。
（视频 2）
是《辛德勒的名单》，在法西斯势力下，纳粹德国对犹太人赶尽杀绝，犯下了人类史上的滔天
大罪。虽然辛德勒也是一名纳粹分子，但是在二战中他却拯救大约 1200名犹太人。我们就会
发现，个人在群体中并非一定收到妥协。这是勒庞所没有提到的。以史为鉴，可以知兴替，
希望我们未来不要再出现战争。
5. Q:我们再看下一个问题：情绪如何影响法庭审判？
A: 勒庞在书中谈到“陪审团受情绪因素掌控，极少被证据打动”。大家了解在西方国家是陪
审团制度。我们举一个现实例子来佐证勒庞的观点。大家还记得克里斯森杀害章莹颖案嘛？
克里斯滕森如此丧心病狂的行为在美国都没有被判死刑。当然大家也会说美国没有死刑，其
实这个不一定，美国有些州仍然在沿用死刑。克里斯滕森的辩护律师向陪审团提交了大约
50 项“轻判”理由，包括他不幸的童年，曾经企图自杀的经历，酗酒抑郁，曾因精神健康
问题寻求帮助等等。辩护律师将其描绘成一个本性不坏，和内心恶魔斗争的人，比如告诉陪
审员，他有一次用零花钱买了一个妹妹想要的毛绒玩具。辩护律师还在 17 日的结
案陈词中试图说服 12名陪审员中至少有 1人坚决反对死刑，不要被支持死刑的多数派所左
右。辩护律师告诉陪审员，无论他们选择判处克里斯滕森无期徒刑还是死刑，他都将“躺在
棺材里”离开监狱，“唯一的问题是什么时候。”克里斯滕森的父母也出现在法庭上，呼吁陪审
团饶了他们的儿子，他们都说无条件地爱他。克里斯滕森的父亲迈克尔表示，他的儿子被判
死刑的想法无法忍受，这番话促使克里斯滕森动容，对这位被告而言是一种罕见的情感流露。
可以发现，被告的“苦肉计”似乎有一定成效。据报道，在审理量刑的两天时间里，陪审团
向法庭提出了多个问题，要求对辩方提出的“轻判”理由作出说明，以及他们是否应该只评
估克里斯滕森在监狱里的“潜在危险”。最后有 2名陪审员对是否给克里斯滕森判死刑的最
后裁定中选择了反对票，其中是否受到了情绪的感染呢，我们可想而知。这也佐证了勒庞的
观点
我们同样看张扣扣案，网上很多人对张扣扣抱不平，认为他不该判死刑。中国的司法量刑
不同于西方。最后张扣扣判了死刑，完全是站在法理角度，没有依照情绪。如此我们也可
以看到勒庞的观点也存在一些问题。
6. Q:分析近些年出现的媒介审判事件。
A:这个问题也是对书本内容做的延伸。什么是媒介审判？“媒介审判”是一个舶来词，最早
来源于西方新闻传播法。近年来，很多案件在法院尚未开庭审理之前，传统媒体如报纸、杂
志、广播电视等大众媒体就进行大量带有主观色彩的报道，用“罪犯”“杀人犯”等定性词
汇描绘当事人，由此引发了公众强烈的反响，这种不可忽视的民意给法官、案件审理人和陪
审员施加了各种有形或无形的压力，危及了司法独立。而在网络时代，尤其以微博为代表的
自媒体，由于其自身互动性强，即时传播，波及范围广等特点，在热点事件中能发挥强大的
信息传播和舆论功能，使得传统“媒介审判”在网络环境中不可避免地有了新的特点，也就
衍生出了“网络媒介审判”。
比如说李天一案，这个事件怎么复盘？网民在这个事件中担任了什么角色？媒介审判伴随着
的就是法律体系的不健全，还有之前 14岁男童杀害一名幼女，有人大代表建议降低刑事责
任的年龄，但是我们不能对媒介审判做过多褒奖，它在很大程度上影响了司法公正（同学:
重庆公交坠江女司机）是的，这个事件就很典型，当然也有一些媒体推波助澜，如中青宝和
新京报在事件未调查详全就报道这个事件原因是女司机逆行（同学提问：但是没有对女司机
进行法律审判吧？算舆论反转？）因为真相出来了，如果没有真相，女司机会成为网络暴力
的对象。我们回过头来看李天一案，“李天一案”中，当事实还处于侦查阶段，媒体已经开始
大肆地批判。短短数日之内，李天一的过往被翻了个“底朝天”，出现了如
《媒体称李双江之子李天一小学时将同学推下楼未受罚》、《李天一被曝曾在美打架·曾口出
狂言》、《李天一居所装修人员：李天一说话很横》等文章，谣言也随之而来，如《曝金铁霖是
李天一生父》等。最后李天一被判刑十年，这个普通的案子因为李天一是著名歌唱家李双江
之子的身份成为了各大媒体争相爆料的热点话题，网友们先后在网上发帖进行声讨，纸媒、
电视媒体、门户网站、移动媒体、论坛博客等共同参与。“李天一”案几乎变成了一场舆论的
“狂欢”。（同学：媒介审判不一定要对当事人进行法律上的审判才算吧?舆论或者道德上的
审判也是审判吧）是的，但是通过网络就不一定是“审判”了，更多的可能是人肉搜索、网
络暴力。
同样，刚刚还有同学提到了药家鑫案，药家鑫案中，药家鑫撞到了一个骑电动车的女子，
但害怕伤者日后会因赔偿问题纠缠不清，于是产生了杀人灭口的邪念，在对伤者张妙连捅
八刀致其当场死亡后，药家鑫驾车逃离现场。在逃逸过程中又将两人撞伤。从事件一发生
到药家鑫判处死刑，在这近一年的时间内，公众对这件事情的讨论没有停止过，媒体对这
事件的报道也没有停止过。在药家鑫案的审理过程中，媒体一直对其进行了大张旗鼓的宣
传和报道，尤其是各大媒体在没有进行实地调查取证的情况下报道、转载药家鑫是“富二
代”、“军二代”的猜测，对民众力主要求处死药家鑫的言论进行报道，这就在媒体和民众之间
造成了一个恶性的循环：媒体的报道在无意识之中催化着民意的愤怒，而民意的愤怒又进一
步为媒体提供了报道的素材。从而导致媒体营造的“拟态环境”更加深刻的影响着受众，影
响着司法的正常审判。
我们最后再分析一个案例，小凤雅案。她得了重病，后来网络上认为小凤雅的家人诈捐。
风雅的妈妈后来在采访中告诉记者，她的短信上受到了无数条辱骂的话语，还遭受生命威
胁，风雅妈妈几度想自杀。可见互联网暴力多么可怕，不过后来人民日报出来澄清了
社会公众的情绪容易激动甚至有时会失去理智，独立思考能力有所欠缺，容易随波逐流。
我们今天分析了好多热点事件，大家读书过程中可以像这次带读这样一边读一边思考我们
现实环境，这会给你的阅读带来不一样的体验。

5.14 胡师姐公益带读 Day6
我们首先看第四章：投票群体。勒庞在第四章和第五章更多的都是对西方国家政治制度的批评。
1.Q：投票群体是怎样的群体，他们有什么特点？
A：书中这样说的“它只表现且突出表现这些群体的特征：理性力缺乏、判断力丧失、易怒、轻信、
简单。”实际上在勒庞看来投票群体和一般群体并无太大差别，但是投票群体会容易收到领袖的
影响，投票群体由于其目标属性会表现出更明显的易受暗示性。
我们这里分析一下特朗普是如何当上美国总统的。
首先我们要区分一点的是，总统选举不像咱们班上班长的选举，有很多人喜欢拿班长选举和美
国总统选举作比较，这是完全错误的。总统选举更像是候选人对选民做一个劝服的过程， 而
班长选举，大家都知道这个人是什么样的人，他的为人处世如何，于是才去选某个人做班长。总
统选举，大家根本不知道候选人到底会是什么样的人。其实特朗普当选总统也狠狠给美国政界上
了一课。如有两个候选者竞选领导人，投票群体会把自己的选票投向带给大家个人感官更好的个
人。而这种竞选者的真实则永远被掩盖在演讲之下。美国总统的选举都是如此的，频繁的拉选票，
频繁的造势，频繁的舆论宣传，频繁的夺取投票群体的主题认知，让他们心甘情愿的把票投给自
己。大家想想特朗普和希拉里之间的竞争，学界认为特朗普能担任美国总统就是一次黑天鹅事件。
苏格拉底曾说“民主就是用修辞来煽动暴民，所以决不能把国家交给民众。”苏格拉底这句
话大家可以记下来，结合着《乌合之众》来思考，我们知道特朗普当时竞选总统最大的竞争对
手是希拉里，希拉里大家了解吗，美国前第一夫人，曾出任美国国务卿，其丈夫是前总统克林顿，
有 37年的从政经历，从政经验如此丰富，却败给了没有任何从政经验的特朗普， 特朗普实
实在在的只是一个商人，他有啥能力担任总统。显然，这明显反映了美国总统选举的弊端。
特朗普自年轻开始就表现出非常的自信满满，他的父亲也是一名商人，但是比较低调，而特朗
普不一样，他享受被其他人注目的感觉，他年轻的时候常常语出惊人，曾经有人问他“当你完
全破产了，你第二天回去干吗？”他回答：“我会去做美国总统”。这个人从来不怕别人通过舆
论攻击他，他只会忽视并且倒打一耙，反过来用舆论去诋毁对手，其实在他总统选举过程中，这
个手段他用的非常高明。不过特朗普之前在 90年代出过轨，被各大媒体报道， 也导致他的
商业帝国一段时间走向了下坡路。
我们刚刚讲到，特朗普面对的是具有从政经验十分丰富的希拉里。面对这样的对手，特朗普剑
走偏锋，成为了历史上最另类的总统候选人，他不走中间路线，旗帜鲜明地摆出自己的立场，他
反建制、反精英、反全球化、反自由主义、反政治正确，希拉里描绘了一个多元化的、开放的、充
满活力与创新的美国，但这是美国精英阶层的梦，不是普通人的梦。特朗普则指出，美国正在危
险的边缘，社会面临重重挑战，传统价值观遭到冲击，制造业外流，失业率升高，中产阶级和
低收入人群并未分享发展红利，他描绘的目是让美国再次伟大，这是一个对于普罗大众最熟悉
的梦，人们希望在这个梦中找回父辈曾经享有的特权和优越感，中产阶级的舒适生活以及作为
一个美国人的骄傲，在政治正确的大背景下，特朗普扛起了民族主义的大旗。
这里我们看到了特朗普和希拉里的选举观念都存有不同。此外，他把矛盾指向了全球化和外来
移民，这是很多人敢想不敢说的，面对传统媒体的大肆攻击，他开辟了新的舆论阵地，他利用推
特直接和选民对话，实行特推治国，疯狂输出自己的观点，在语言上用的单词或语法非常简单
直白易懂，同时它会出一个视觉化的概念，从而占领选民的视觉想象空间。在大选结果出来之
前，几乎所有的民调都显示希拉里更有优势，在电视上几乎看不到任何支持特朗普的消息，媒体
和精英们自以为把握了话语权，就可以决定大选的结果，但是最后沉默的大多数用手中的选票，
把特朗普推上了总统的宝座。
我们昨天讲到，特朗普操纵民粹主义担任美国总统，他在竞选前期就做过调查，发现普通民众对
政府并无太大好感，在竞选时，特朗普疯狂诋毁美国政府和上流社会，指出要让美国普通百姓过
上更好的生活。但实际上呢，就这次新冠疫情在美国爆发后，没有任何从政经验的他没有办法控
住疫情，美国失业率同时也一直在上升，他曾经所宣扬的“让美国再次伟大” 并未实现。此
时我们就会看到《乌合之众》作者早已指出，投票群体是容易收到领袖的操纵的。
彼得·伯格的《与社会学同游》有同学看过吗？
【此处一片寂静~】
书上第 85页谈到“人极其渴望被群体接受，无论周围的群体是什么样的群体。这种欲望可
以被有效操纵，众所周知，群体治疗师、蛊惑人心者和其他实施共识工程的专门化人才就善于操
纵人的欲望”。“在各种初级群体里，讥讽和闲话是社会控制的有力工具。”没有社会学功底的人
读了这本书，会被社会学迷住。用彼得·伯格书中这两句话形容特朗普当选美国总统再合适不
过了。
2.Q：议会群体。
A：其实勒庞对于议会群体的看法和投票群体一样“低智商化、易怒、易受暗示、情感夸张
和少数领袖的操控。头脑简单是议会的一大特点。”比如说谈谈英国的议会制度，英国的议会
制度起源最早，被称为“议会之母”。分为上议院、下议院和君主。英国君主实际上就是女王，
没有多大的权力，因为历史上英国实行过君主立宪制，所以几乎全部的王权均在首相及大臣的意
见下执行，首相及大臣则通过民选的下议院对人民负责。而上议院都是由贵族组成，这群人年龄
都很大，有人讽刺英国的上议院就是养老院，上议院权力也很小，现今对下议院行使有限的监
督和封驳权以及有限的立法权。下议院是通过平民的代表选举产生，所以英国的政治精英往往
都活跃于下议院，下议院的权力巨大，比如说英国脱欧的法案，需要下议院投票产生。
而勒庞在书中所批评的就是这类议会群体，其实现实中我们也可以看到，英国党内的不和谐现
象也时有发生。譬如去年，英国首相约尔逊一直遭到下议院的抨击。下议院中的反对党和保守
党议员已联手在国会推动立法案，一天之内把阻止无协议脱欧的方案送到了上议院，如果上议
院按照惯例走个过场通过的话，阻止硬脱欧便是以立法的形式通过，就成了英国的法律了而约
翰逊是想硬脱欧的。但是一旦法律通过，约翰逊就无能为力了，英国党内的留欧派和脱欧派之
间的严重撕裂，这种恶性循环式的党内内讧，是英国产生政治危机之根源。
大家可能会问我什么是硬脱欧，什么是软脱欧？
大致来说，“软脱欧”指的是英国不彻底与欧盟决裂，以便让英国继续留在欧洲单一市场和关税
同盟。英欧之间有很强的相互依赖，为了减少“脱欧”可能会带来的经济和社会动荡， 软脱
欧是很好的办法。 而与软脱欧相对应的“硬脱欧”则是指英国彻底脱离欧盟和欧洲单一市场，
让英国全面掌控边界、移民和司法政策。“硬脱欧派”希望能保证英国在“脱欧” 后的法律独
立，能自主地与其他国家进行贸易谈判、控制移民以及处理其他事务。
此外书中还谈到，议会有两大危险：一是不可避免的财政浪费；二是对个人自由的不断压缩。财政浪
费是必然的，其实政治就是有钱人的游戏。个人自由的不断压缩，说白了就是一方权力的增长导
致另一方权力的削弱。如英国上议院权力在不断被削弱，下议院权力一直在增长。
3.Q：概念延伸——“权力守恒定律”
A：比如说互联网环境下，我们时常说，新媒体技术赋权至受众，我们每个人掌握了话语权， 我
们可以随意发言，但真的是这样吗？伴随着我们在网络上注册的账号越来越多，意味着什么？大
家想想。昨天有同学提到了米歇尔·福柯的“全景敞视”理论，我们看一张图片。
这是一个全景敞视监狱，我们每个人坐在家里使用手机和电脑，在网络上可以随意的发言，
但实际上我们身处监狱当中，这个限制我们的枷锁就是我们所使用的智能设备。这只巨大的眼
睛无时无刻监视着我们，注视着我们的一切，而我们却甘愿被这只眼睛所注视。福柯的全景敞视
监狱告诉我们，我们的隐私一直处于泄露状态。我不知道大家有没有听说过这样一句话“最了解
你的人不是你的父母，也不是你，而是你的手机。”手机比你的闺蜜还闺蜜，走路捧着它，睡
觉抱着它。
4.Q：被遗忘权
A：个人的电子痕迹在网络上会永远存在，这里又要提到一个概念“被遗忘权”。什么叫被
遗忘权，说白了就是我要拥有“被遗忘掉的权力”。但是在互联网环境下，咱们的被遗忘权已
经丧失了，我们的一切隐私都会被互联网所记录。说到了这里你还觉得新媒体真的赋权给
受众了吗？一定程度上我们的发言渠道更宽阔了，我们的话语权提升了，但是所牺牲掉的是我
们的隐私权。
所以新媒体技术到底赋权给了谁？赋权给了处于金字塔顶端的人。所以我们谈新媒体赋权，
这种权力是被建构出来的同时也处于消解状态。建构了我们的话语权，消解了我们的隐私权、被
遗忘权。那么处于金字塔顶端的精英呢？他们拥有技术主导权，他们掌握了一切，像世界的一些
大财团，如阿里巴巴、腾讯、微软等等，他们才是新媒体技术的最大获益者。其背后是互联网环
境下庞大的商业帝国。
大家知道帕累托效应吗？
也称之为二八定律，世界上 20%的人掌握了 80%的社会资源。结合着所谓的新媒体赋权至受
众，大家可以好好思考一下。所以现在大家还觉得你是自由的嘛？你拥有无比的个人权利吗？
5.Q：读完《乌合之众》，你就不是乌合之众了吗？
A：其实很多人读完了《乌合之众》后，才恍然大悟，原来自己就是个乌合之众。你在网络
上是否有过非理性发言，别人在谩骂《方方日记》，你是否也在跟着一起骂？
如何避免成为“乌合之众”？咱们读完了这本书，就应该避免成为乌合之众，否则勒庞就要批
判你！最重要的就是两个字—“理性”。我想说的有以下几点。
第一， 你要保持独立思考的能力，咱们都是学习新闻传播学的，你要广泛学习相关知识，
不断提高自己的媒介素养。其实我们讲新媒体技术赋权，我个人认为这里面也存在一个矛盾。新媒
体技术赋权至受众与受众并不较高的媒介素养之间构成了一组矛盾。大家要不断提高自己的媒介
素养。
第二，不断总结自己过去犯过的错误，“夫以铜为镜，可以正衣冠；以史为镜，可以知兴替；以
人为镜，可以明得失”就是这个意思。
第三，时刻保持着批判性思维。但是批评不是乱批评。怎样才算是合理的批评？在中国的教育中，
老师经常和学生说，批判是一种品德，但却很少告诉学生，批判也需要讲究技术性。正确地批
判有着三个基本条件：事实、逻辑、修辞。用盖房子做比喻，事实是最基础的一块块的砖，逻辑
是撑起房子的骨架，而恰当的修辞是房子的外观。如果缺乏合理的事实，房子就是空中楼阁；而
当拥有事实却缺乏合理的逻辑和修辞的时候，虽然可能对房子“自我感觉良好”，但在别人看来，
一座“烂尾楼”并不值得深入了解，这大概率会让别人放弃对真相事实的追究。这不该是我们理
解世界、批判世界的方式啊。当然这段话不是我说的哈，但是我觉得很有道理，拿来和大家一
起共勉。
第四，避免低质量的社交，学会高质量的独处。考虫机构里有个老师叫李尚龙，也是一名青年
作家，他认为“超过六个人的聚会我不会去，因为这是低质量的社交，会浪费我的时间”。独处的
过程，如同大家现阶段考研考博，这是一个自我修炼的过程，也许过程会很痛苦，但是痛苦的背
后却是彼岸的繁华。
6. 考研知识点补充
我还想给大家补充一个知识点，突然想到的，可以直接为你未来的考研答题提供思路。是关于
新闻伦理的。南京大学新闻传播学院前任院长杜骏飞教授在其一篇论文中指出新闻伦理应具备
两个向度
理性向度：要求新闻报道的事实真实、客观、全面，观点、态度公正、中立，不带任何倾向性。
这是对新闻制作者自律性的要求，也是对其理解能力、知识及经验、观察及推演能力等做的规

责任向度：就微观层面而言，新闻报道需敞开事实真相，满足公众的知情权，为他们的现实生活
提供指导和帮助；就宏观层面而言，新闻报道应发挥正确的舆论导向及社会动员作用， 促进
整个社会的和谐发展。

function renderTopicNotes() {
  const introEl = document.getElementById('topic-intro-content');
  let introHtml = '';
  TOPIC_INTRO_NOTES.split(/=====/).filter(s => s.trim()).forEach(section => {
    const lines = section.trim().split('\n');
    // Extract book name from first line: 《xxx》 or just xxx
    const firstLine = lines[0].trim();
    const bookMatch = firstLine.match(/《(.+?)》/);
    const title = bookMatch ? bookMatch[1] : firstLine.replace(/[《》]/g, '').trim();
    const content = lines.slice(1).join('\n');
    if (title) introHtml += '<div class="book-header">《' + title + '》</div>';
    introHtml += formatNoteContent(content);
  });
  introEl.innerHTML = introHtml;

  const readEl = document.getElementById('topic-reading-content');
  let readHtml = '';
  // Split by book: 传播学史 vs 乌合之众
  const books = READING_NOTES.split(/=====/).filter(s => s.trim());
  let currentBook = '';
  books.forEach(section => {
    const lines = section.trim().split('\n');
    const firstLine = lines[0].trim();
    // Extract book name from separator title
    const bookMatch = firstLine.match(/《(.+?)》/);
    const bookName = bookMatch ? bookMatch[1] : '';
    if (bookName && bookName !== currentBook) {
      currentBook = bookName;
      readHtml += '<div class="book-header">《' + currentBook + '》逐日笔记</div>';
    }
    // Find the date/day line for sub-header
    const content = lines.join('\n');
    // Add Day sub-headers
    const daySections = content.split(/(\d+\.\d+\s*(?:胡师姐公益带读\s*)?Day\d+)/);
    daySections.forEach((seg, i) => {
      const dayMatch = seg.match(/(\d+\.\d+)\s*(?:胡师姐公益带读\s*)?(Day\d+)/);
      if (dayMatch) {
        readHtml += '<h3>Day ' + dayMatch[2].replace('Day','') + '（' + dayMatch[1] + '）</h3>';
      } else if (seg.trim()) {
        readHtml += formatNoteContent(seg);
      }
    });
  });
  readEl.innerHTML = readHtml;
}

function cleanNoteText(text) {
  return text
    // Remove ad lines
    .replace(/^更多新传考研\/保研\/考博辅导.*$/gm, '')
    // Remove standalone page numbers
    .replace(/^\s*\d{1,3}\s*$/gm, '')
    // Remove 胡师姐 branding lines
    .replace(/胡师姐.*?(?:蓝皮书|公益带读|团队|教研|带读结束|为各位).*/gm, '')
    .replace(/为各位坚持下来的小伙伴撒花.*/gm, '')
    // Clean Day title: remove 笔记.pdf suffix and date+胡师姐公益带读 part
    .replace(/笔记\.pdf/g, '')
    .replace(/\d+\.\d+\s*胡师姐公益带读\s*Day\d+/g, '')
    // Remove By署名 lines
    .replace(/^By\s+\S+.*$/gm, '')
    // Remove 【小打卡内容分享】lines
    .replace(/【小打卡内容分享】.*$/gm, '')
    // Remove 带读人署名 lines
    .replace(/^.*带读人：.*$/gm, '')
    // Fix OCR: mixed brackets (1）→ （1）
    .replace(/\((\d+）)/g, '（$1')
    // Fix OCR: double punctuation 。。→ 。
    .replace(/。。/g, '。')
    // Remove Q&A numbering prefix that got orphaned: "1.Q：" at end of line followed by content
    // Remove "附：" exam question lines
    .replace(/^附[：:].*$/gm, '')
    // Collapse multiple blank lines into single
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

function formatNoteContent(text) {
  let cleaned = cleanNoteText(text);
  // Pre-process: handle Q&A format for reading notes
  // Pattern: "1. Q：question" or "1.Q：question" or "1. Q:question"
  let html = cleaned
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    // Q&A format: make Q bold with highlight, A normal
    .replace(/^(\d+[\.\s]*)Q[：:]\s*(.+)$/gm, '<p class="qa-q"><strong>$1Q：</strong>$2</p>')
    .replace(/^(\d+[\.\s]*)Q[：:](.+)$/gm, '<p class="qa-q"><strong>$1Q：</strong>$2</p>')
    // A lines following Q
    .replace(/^A[：:]\s*(.+)$/gm, '<p class="qa-a"><strong>A：</strong>$1</p>')
    // Book separators: 第X篇/编/部分
    .replace(/^(第[一二三四五六七八九十百]+[篇编部分])\s+(.+)$/gm, '<h2>$1 $2</h2>')
    // Chapter headers: 第X章
    .replace(/^(第[一二三四五六七八九十]+章)\s+(.+)$/gm, '<h2>$1 $2</h2>')
    // Section headers: 第X节
    .replace(/^(第[一二三四五六七八九十]+节)\s+(.+)$/gm, '<h3>$1 $2</h3>')
    // Chinese numeral + 顿号 headers: 一、xxx
    .replace(/^([一二三四五六七八九十]+)[、．.]\s*(.+)$/gm, '<h3>$1、$2</h3>')
    // Numbered items: 1. xxx or 1、xxx (but NOT Q&A lines, already handled)
    .replace(/^(\d+)[.．、]\s*(?!Q[：:])(.+)$/gm, '<p class="num-item"><strong>$1. $2</strong></p>')
    // Bracket numbered items: （1）or (1) - only at line start
    .replace(/^[（\(](\d+)[）\)]\s*(.+)$/gm, '<p style="padding-left:1.2em;text-indent:-1.2em"><strong>($1)</strong> $2</p>')
    // Chinese bracket numbered items: （一）xxx
    .replace(/^[（\(]([一二三四五六七八九十]+)[）\)]\s*(.+)$/gm, '<h4>$1、$2</h4>')
    // Circled numbers: ①xxx
    .replace(/^(①)(.+)$/gm, '<p style="padding-left:1.2em;text-indent:-1em">$1 $2</p>')
    // 【同学回答/提问/讨论/补充】blocks
    .replace(/【(同学(?:回答|提问|讨论)|补充)[：:]?/g, '<span class="note-tag">【$1】</span>')
    // Collapse multiple blank lines
    .replace(/\n{2,}/g, '</p>\n<p>')
    // Single newlines to <br>
    .replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

function setMode(mode) {

  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));

    topicSection.classList.remove('active');

    graphCanvas.style.display = '';

    graphCanvas.style.display = 'none';
    topicSection.classList.add('active');
    gameArea.classList.remove('active');
    cardContainer.style.display = 'block';
    gameScoreEl.textContent = '';

    graphCanvas.style.display = '';
    topicSection.classList.remove('active');
    gameArea.classList.remove('active');
    cardContainer.style.display = 'block';
    gameScoreEl.textContent = '';

function generateQuestion() {
  const types = [
    'theory-scholar','scholar-theory','book-scholar','scholar-school',

  while (attempts < 30) {

    let valid = true;
    answers = [];
    answeredBlanks = {};

    switch (type) {

        const t = DATA.theories[Math.floor(Math.random() * DATA.theories.length)];

        q = '\u201C'+t.name+'\u201D是由<span class="blank" id="blank0">______</span>提出的。';

        hintType = '理论\u2192人物';

      case 'scholar-theory': {
        const s = DATA.scholars[Math.floor(Math.random() * DATA.scholars.length)];
        const ths = DATA.theories.filter(t=>t.scholar===s.id);
        if (!ths.length) { valid=false; break; }
        const t = ths[Math.floor(Math.random()*ths.length)];
        q = '\u201C'+s.name+'\u201D提出了<span class="blank" id="blank0">______</span>理论。';
        answers = [t.name]; blankCount=1; currentBlankIdx=0;
        hintType = '人物\u2192理论';
        break;
      }
      case 'book-scholar': {
        const b = DATA.books[Math.floor(Math.random()*DATA.books.length)];
        const s = scholarMap[b.scholar];
        if (!s) { valid=false; break; }
        q = '\u201C'+b.name+'\u201D的作者是<span class="blank" id="blank0">______</span>。';

        hintType = '著作\u2192人物';

        answers = [sc.name]; blankCount=1; currentBlankIdx=0;

      case 'theory-desc': {

        answers = [s.name]; blankCount=1; currentBlankIdx=0;
        hintType = '研究\u2192人物';
        break;
