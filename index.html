<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新传答题宝典 · 2026保研/考研</title>
<style>
:root {
  --primary: #6B5B95;
  --primary-light: #D0C3E8;
  --primary-dark: #4A3F6B;
  --accent: #8B7DB8;
  --bg: #F8F7FC;
  --card-bg: #FFFFFF;
  --text: #2D2D3F;
  --text-muted: #8888A0;
  --border: #E8E5F0;
  --success: #4CAF7D;
  --success-bg: #E8F5E9;
  --danger: #E07070;
  --danger-bg: #FFEBEE;
  --warning: #F0A040;
  --warning-bg: #FFF3E0;
  --shadow: 0 2px 8px rgba(107,91,149,0.1);
  --shadow-lg: 0 4px 20px rgba(107,91,149,0.15);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: -apple-system, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

#sidebar {
  width: 270px;
  min-width: 270px;
  background: var(--primary-dark);
  color: #E8E0F0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 20px 20px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
#sidebar-header h1 { font-size: 1.15rem; color: #FFF; font-weight: 700; letter-spacing: 0.5px; }
#sidebar-header p { font-size: 0.72rem; color: var(--primary-light); margin-top: 4px; }
#search-box { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
#search-box input {
  width: 100%; padding: 8px 12px; border: none; border-radius: 6px;
  background: rgba(255,255,255,0.1); color: #FFF; font-size: 0.85rem; outline: none;
}
#search-box input::placeholder { color: rgba(255,255,255,0.4); }
#search-box input:focus { background: rgba(255,255,255,0.15); }
#nav-tree { flex: 1; overflow-y: auto; padding: 8px 0; }
#nav-tree::-webkit-scrollbar { width: 4px; }
#nav-tree::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

.nav-section { margin-bottom: 2px; }
.nav-section-title {
  padding: 8px 20px 6px; font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--primary-light); font-weight: 600;
  cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px;
}
.nav-section-title:hover { color: #FFF; }
.nav-section-title .arrow { display: inline-block; transition: transform 0.2s; font-size: 0.6rem; }
.nav-section.collapsed .arrow { transform: rotate(-90deg); }
.nav-section.collapsed .nav-items { display: none; }
.nav-item {
  padding: 7px 20px 7px 36px; font-size: 0.82rem; color: #C8C0D8;
  cursor: pointer; transition: all 0.15s; border-left: 3px solid transparent;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: #FFF; }
.nav-item.active { background: rgba(255,255,255,0.1); border-left-color: var(--primary-light); color: #FFF; font-weight: 500; }
.nav-item .badge {
  display: inline-block; background: var(--primary); color: #FFF; font-size: 0.62rem;
  padding: 1px 6px; border-radius: 8px; margin-left: 4px;
}

#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#main-header {
  background: var(--card-bg); padding: 12px 24px; box-shadow: var(--shadow);
  display: flex; align-items: center; justify-content: space-between; gap: 16px; z-index: 10;
}
#main-header h2 { font-size: 1.1rem; color: var(--primary-dark); font-weight: 600; }
#content-area { flex: 1; overflow-y: auto; padding: 24px 32px; }
#content-area::-webkit-scrollbar { width: 6px; }
#content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

/* Home */
.home-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.home-card {
  background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s;
  border-top: 4px solid var(--primary);
}
.home-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.home-card .card-icon { font-size: 2rem; margin-bottom: 12px; }
.home-card .card-title { font-size: 1rem; font-weight: 600; color: var(--primary-dark); margin-bottom: 4px; }
.home-card .card-desc { font-size: 0.78rem; color: var(--text-muted); }
.home-card .card-count { font-size: 0.72rem; color: var(--primary); margin-top: 8px; }

.stats-bar { display: flex; gap: 16px; padding: 8px 0; margin-bottom: 16px; flex-wrap: wrap; }
.stat-item { background: var(--bg); padding: 8px 16px; border-radius: 8px; font-size: 0.78rem; color: var(--text-muted); }
.stat-item strong { color: var(--primary); font-size: 0.95rem; }

/* Quiz Card */
.quiz-card {
  background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 24px 28px; margin-bottom: 16px;
}
.quiz-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--primary-light);
}
.quiz-type {
  display: inline-block; background: var(--primary-light); color: var(--primary-dark);
  font-size: 0.7rem; padding: 2px 10px; border-radius: 12px; font-weight: 600;
}
.quiz-difficulty { font-size: 0.75rem; color: var(--text-muted); }
.quiz-difficulty .star { color: var(--warning); }
.quiz-subject { font-size: 0.72rem; color: var(--primary); margin-bottom: 8px; }
.quiz-question {
  font-size: 1rem; line-height: 1.7; color: var(--text); font-weight: 500; margin-bottom: 20px;
}

/* Options */
.options-list { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  text-align: left; padding: 12px 16px; border: 2px solid var(--border); border-radius: 8px;
  background: var(--card-bg); cursor: pointer; font-size: 0.9rem; line-height: 1.6;
  transition: all 0.2s; display: flex; align-items: flex-start; gap: 10px;
}
.option-btn:hover { border-color: var(--primary-light); background: var(--bg); }
.option-btn.selected { border-color: var(--primary); background: rgba(107,91,149,0.05); }
.option-btn.correct { border-color: var(--success); background: var(--success-bg); }
.option-btn.wrong { border-color: var(--danger); background: var(--danger-bg); }
.option-btn.disabled { cursor: default; opacity: 0.7; }
.option-letter {
  width: 26px; height: 26px; border-radius: 50%; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.78rem; font-weight: 600; color: var(--primary-dark); flex-shrink: 0;
}
.option-btn.correct .option-letter { background: var(--success); color: #FFF; }
.option-btn.wrong .option-letter { background: var(--danger); color: #FFF; }
.option-btn.selected .option-letter { background: var(--primary); color: #FFF; }

/* Analysis */
.analysis-box {
  margin-top: 16px; padding: 16px; border-radius: 8px; background: var(--bg);
  border-left: 4px solid var(--primary); display: none;
  max-height: 55vh; overflow-y: auto;
}
.analysis-box.show { display: block; }
.analysis-box .analysis-title { font-size: 0.85rem; font-weight: 600; color: var(--primary); margin-bottom: 8px; position: sticky; top: 0; background: var(--bg); padding-bottom: 4px; z-index: 1; }
.analysis-box .analysis-content { font-size: 0.85rem; line-height: 1.8; color: var(--text); white-space: pre-wrap; }

/* Judgment buttons */
.judgment-btns { display: flex; gap: 12px; }
.judgment-btn {
  flex: 1; padding: 14px; border: 2px solid var(--border); border-radius: 8px;
  background: var(--card-bg); cursor: pointer; font-size: 0.95rem; font-weight: 600;
  transition: all 0.2s; text-align: center;
}
.judgment-btn:hover { border-color: var(--primary-light); background: var(--bg); }
.judgment-btn.correct { border-color: var(--success); background: var(--success-bg); color: var(--success); }
.judgment-btn.wrong { border-color: var(--danger); background: var(--danger-bg); color: var(--danger); }

/* Quiz Controls */
.quiz-controls { display: flex; gap: 10px; margin-top: 20px; }
.quiz-controls button {
  padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.85rem;
  cursor: pointer; font-weight: 500; transition: all 0.2s;
}
.btn-primary { background: var(--primary); color: #FFF; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-success { background: var(--success); color: #FFF; }
.btn-danger { background: var(--danger); color: #FFF; }

/* Score Panel */
.score-panel {
  background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 20px; margin-bottom: 20px; text-align: center;
}
.score-number { font-size: 3rem; font-weight: 700; color: var(--primary); }
.score-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; }
.score-detail { display: flex; justify-content: center; gap: 24px; margin-top: 12px; }
.score-detail-item { text-align: center; }
.score-detail-item .num { font-size: 1.3rem; font-weight: 700; }
.score-detail-item .lab { font-size: 0.72rem; color: var(--text-muted); }

/* Essay */
.essay-answer {
  background: var(--bg); padding: 16px; border-radius: 8px;
  font-size: 0.85rem; line-height: 1.8; white-space: pre-wrap;
  color: var(--text); margin-top: 12px; display: none;
  max-height: 70vh; overflow-y: auto;
  border: 1px solid var(--border);
}
.essay-answer.show { display: block; }
.essay-answer .analysis-title { position: sticky; top: 0; background: var(--bg); padding-bottom: 4px; z-index: 1; }
.answer-scroll-hint {
  text-align: center; font-size: 0.7rem; color: var(--text-muted);
  padding: 4px; background: var(--bg); border-bottom: 1px dashed var(--border);
}
/* Scrollbar styling */
.essay-answer::-webkit-scrollbar, .analysis-box::-webkit-scrollbar { width: 6px; }
.essay-answer::-webkit-scrollbar-track, .analysis-box::-webkit-scrollbar-track { background: transparent; }
.essay-answer::-webkit-scrollbar-thumb, .analysis-box::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 3px; }
.essay-answer::-webkit-scrollbar-thumb:hover, .analysis-box::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* Progress */
#progress-bar { position: fixed; bottom: 0; left: 270px; right: 0; height: 3px; background: var(--border); z-index: 100; }
#progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); width: 0%; transition: width 0.3s; }

/* Filter tags */
.filter-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.filter-tag {
  padding: 4px 12px; border: 1px solid var(--border); border-radius: 16px;
  font-size: 0.78rem; cursor: pointer; background: var(--card-bg); color: var(--text-muted);
  transition: all 0.2s;
}
.filter-tag:hover { border-color: var(--primary-light); color: var(--primary); }
.filter-tag.active { background: var(--primary); color: #FFF; border-color: var(--primary); }

/* Notes */
.note-toggle {
  margin-top: 12px; padding: 6px 12px; background: var(--bg); border-radius: 6px;
  font-size: 0.78rem; color: var(--text-muted); cursor: pointer; display: inline-flex;
  align-items: center; gap: 6px; transition: all 0.2s; border: 1px solid transparent;
}
.note-toggle:hover { color: var(--primary); border-color: var(--primary-light); }
.note-toggle.has-note { color: var(--primary); background: var(--primary-light); }
.note-box {
  margin-top: 10px; padding: 12px; background: #FFFBF0; border-radius: 8px;
  border: 1px solid #F0E0C0; display: none;
}
.note-box.show { display: block; }
.note-input {
  width: 100%; padding: 10px; border: 1px solid #E0D0B0; border-radius: 6px;
  font-size: 0.85rem; line-height: 1.7; resize: vertical; min-height: 60px;
  font-family: inherit; background: #FFF; color: var(--text); outline: none;
}
.note-input:focus { border-color: var(--primary-light); }
.note-actions { display: flex; gap: 8px; margin-top: 8px; }
.note-actions button {
  padding: 5px 14px; border: none; border-radius: 6px; font-size: 0.75rem;
  cursor: pointer; font-weight: 500;
}
.note-actions .btn-save { background: var(--primary); color: #FFF; }
.note-actions .btn-save:hover { background: var(--primary-dark); }
.note-actions .btn-clear { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }

/* Wrong mark */
.wrong-mark-bar {
  display: flex; gap: 8px; margin-top: 12px; padding-top: 12px;
  border-top: 1px dashed var(--border); align-items: center;
}
.btn-wrong-mark {
  padding: 5px 14px; border: 1px solid var(--danger); border-radius: 6px;
  background: var(--card-bg); color: var(--danger); font-size: 0.78rem;
  cursor: pointer; transition: all 0.2s;
}
.btn-wrong-mark:hover { background: var(--danger-bg); }
.btn-wrong-mark.marked { background: var(--danger); color: #FFF; }
.btn-wrong-mark.marked:hover { background: #C05050; }
.wrong-badge {
  display: inline-block; background: var(--danger); color: #FFF; font-size: 0.65rem;
  padding: 1px 7px; border-radius: 10px; font-weight: 600;
}

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }

/* Responsive */
@media (max-width: 768px) {
  #sidebar { width: 60px; min-width: 60px; }
  #sidebar-header h1, #sidebar-header p, #search-box, .nav-item, .nav-section-title span { display: none; }
  #content-area { padding: 16px; }
}

/* === 添加题目模块样式 === */
.aq-container { display: flex; gap: 24px; flex-wrap: wrap; }
.aq-form-panel, .aq-list-panel { flex: 1; min-width: 360px; }
.aq-card { background: var(--card-bg); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px; }
.aq-card h3 { color: var(--primary-dark); margin-bottom: 16px; font-size: 1.1rem; }
.aq-label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
.aq-input, .aq-select, .aq-textarea {
  width: 100%; padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px;
  font-size: 0.9rem; font-family: inherit; background: var(--bg); color: var(--text);
  outline: none; transition: border-color 0.2s;
}
.aq-input:focus, .aq-select:focus, .aq-textarea:focus { border-color: var(--primary); }
.aq-textarea { min-height: 80px; resize: vertical; line-height: 1.6; }
.aq-row { margin-bottom: 16px; }
.aq-row-inline { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; }
.aq-row-inline .aq-row { flex: 1; min-width: 140px; margin-bottom: 0; }
.aq-type-tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 2px solid var(--border); }
.aq-type-tab { flex: 1; padding: 10px 8px; text-align: center; cursor: pointer; font-size: 0.82rem; font-weight: 500; background: var(--bg); color: var(--text-muted); transition: all 0.2s; border: none; }
.aq-type-tab.active { background: var(--primary); color: #fff; }
.aq-type-tab:hover:not(.active) { background: var(--primary-light); color: var(--primary-dark); }
.aq-option-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.aq-option-row .aq-input { flex: 1; }
.aq-option-remove { width: 32px; height: 32px; border: none; background: var(--danger); color: #fff; border-radius: 6px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
.aq-option-add { padding: 8px 16px; border: 2px dashed var(--primary); background: transparent; color: var(--primary); border-radius: 8px; cursor: pointer; font-size: 0.82rem; margin-top: 4px; }
.aq-option-add:hover { background: var(--primary-light); }
.aq-checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
.aq-checkbox-item { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
.aq-checkbox-item.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); }
.aq-checkbox-item input { display: none; }
.aq-btn-primary { padding: 12px 28px; background: var(--primary); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: background 0.2s; }
.aq-btn-primary:hover { background: var(--primary-dark); }
.aq-btn-secondary { padding: 10px 20px; background: var(--primary-light); color: var(--primary-dark); border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
.aq-btn-secondary:hover { background: var(--border); }
.aq-btn-danger-sm { padding: 6px 14px; background: var(--danger); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.78rem; }
.aq-item { background: var(--bg); border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; border-left: 3px solid var(--primary); }
.aq-item-q { font-size: 0.85rem; margin-bottom: 6px; word-break: break-all; }
.aq-item-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.aq-item-tag { font-size: 0.72rem; padding: 2px 8px; background: var(--primary-light); color: var(--primary-dark); border-radius: 4px; }
.aq-empty { text-align: center; padding: 40px; color: var(--text-muted); }
.aq-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.aq-import-area { border: 2px dashed var(--border); border-radius: 8px; padding: 24px; text-align: center; margin-top: 16px; cursor: pointer; transition: border-color 0.2s; }
.aq-import-area:hover { border-color: var(--primary); }
.aq-import-area input { display: none; }

/* === Toast样式 === */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
.toast { padding: 12px 20px; border-radius: 8px; color: #fff; font-size: 0.85rem; box-shadow: var(--shadow-lg); animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; max-width: 320px; }
.toast-success { background: var(--success); }
.toast-error { background: var(--danger); }
.toast-info { background: var(--primary); }
@keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

/* === 知识图谱模块样式 === */
.kg-wrapper { position: relative; width: 100%; height: calc(100vh - 120px); min-height: 500px; background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.kg-canvas { display: block; width: 100%; height: 100%; cursor: grab; }
.kg-canvas.dragging-node { cursor: grabbing; }
.kg-legend { position: absolute; top: 16px; left: 16px; background: rgba(255,255,255,0.92); border-radius: 8px; padding: 12px 16px; font-size: 0.78rem; box-shadow: var(--shadow); z-index: 2; }
.kg-legend-title { font-weight: 600; color: var(--primary-dark); margin-bottom: 8px; }
.kg-legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.kg-legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.kg-legend-line { width: 20px; height: 2px; flex-shrink: 0; border-radius: 1px; }
.kg-tooltip { position: absolute; pointer-events: none; background: rgba(74,63,107,0.95); color: #fff; padding: 10px 14px; border-radius: 8px; font-size: 0.8rem; max-width: 260px; z-index: 3; line-height: 1.5; box-shadow: var(--shadow-lg); }
.kg-tooltip-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
.kg-tooltip-type { font-size: 0.72rem; opacity: 0.7; margin-bottom: 6px; }
.kg-tooltip-relations { border-top: 1px solid rgba(255,255,255,0.2); padding-top: 6px; margin-top: 4px; }
.kg-controls { position: absolute; bottom: 16px; right: 16px; display: flex; gap: 8px; z-index: 2; }
.kg-ctrl-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.9); color: var(--primary-dark); cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
.kg-ctrl-btn:hover { background: var(--primary-light); }
@media (max-width: 768px) {
  .aq-container { flex-direction: column; }
  .aq-form-panel, .aq-list-panel { min-width: 0; }
  .kg-wrapper { height: calc(100vh - 160px); }
}

</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>新传答题宝典</h1>
    <p>2026保研/考研 · 多题型答题系统</p>
  </div>
  <div id="search-box">
    <input type="text" id="search-input" placeholder="搜索题目、概念...">
  </div>
  <div id="nav-tree"></div>
</div>

<div id="main">
  <div id="main-header">
    <h2 id="page-title">首页</h2>
  </div>
  <div id="content-area">
    <div class="loading" style="text-align:center;padding:40px;color:var(--text-muted);">加载中...</div>
  </div>
</div>

<div id="progress-bar"><div id="progress-fill"></div></div>

<script src="question_bank.js"></script>
<script>

let currentView = 'home';
let wrongQuestions = loadWrongQuestions();
let currentQuiz = null;
let currentQuestionIdx = 0;
let quizAnswers = {};
let quizScore = { correct: 0, total: 0, byType: {} };
let filteredQuestions = [];
let selectedOption = null;
let selectedOptions = [];

// === Cookie helpers ===
function setCookie(name, value, days) {
  const d = new Date();
  d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
  document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
}
function getCookie(name) {
  const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
  return match ? decodeURIComponent(match[2]) : null;
}
function loadHistory() {
  try { return JSON.parse(getCookie('quizHistory') || '[]'); } catch(e) { return []; }
}
function saveHistory(history) {
  setCookie('quizHistory', JSON.stringify(history), 365);
}

// === Wrong Questions ===
function getQuestionId(q) {
  return (q.question || '').substring(0, 40).replace(/\s+/g, '_');
}
function loadWrongQuestions() {
  try { return JSON.parse(getCookie('wrongQuestions') || '[]'); } catch(e) { return []; }
}
function saveWrongQuestions(wrongs) {
  setCookie('wrongQuestions', JSON.stringify(wrongs), 365);
}
function isWrongQuestion(q) {
  const qid = getQuestionId(q);
  return wrongQuestions.some(w => w.id === qid);
}
function toggleWrongMark(q, btn) {
  const qid = getQuestionId(q);
  const idx = wrongQuestions.findIndex(w => w.id === qid);
  if (idx > -1) {
    wrongQuestions.splice(idx, 1);
    btn.textContent = '\u6807\u8BB0\u4E3A\u9519\u9898';
    btn.classList.remove('marked');
  } else {
    wrongQuestions.push({ id: qid, question: q.question, type: q.type, subject: q.subject, time: Date.now() });
    btn.textContent = '\u5DF2\u6807\u8BB0\u4E3A\u9519\u9898';
    btn.classList.add('marked');
  }
  saveWrongQuestions(wrongQuestions);
  updateNavWrongCount();
}
function autoMarkWrong(q) {
  const qid = getQuestionId(q);
  if (!wrongQuestions.some(w => w.id === qid)) {
    wrongQuestions.push({ id: qid, question: q.question, type: q.type, subject: q.subject, time: Date.now() });
    saveWrongQuestions(wrongQuestions);
    updateNavWrongCount();
  }
}
function updateNavWrongCount() {
  const el = document.getElementById('wrong-count');
  if (el) el.textContent = wrongQuestions.length;
}

// === Notes ===
function getNoteKey(q) {
  return 'note_' + getQuestionId(q);
}
function loadNote(q) {
  return getCookie(getNoteKey(q)) || '';
}
function saveNoteForQuestion(q, text) {
  if (text.trim()) {
    setCookie(getNoteKey(q), text.trim(), 365);
  } else {
    setCookie(getNoteKey(q), '', -1);
  }
}

function renderNoteSection(q) {
  const noteText = loadNote(q);
  const hasNote = noteText.length > 0;
  return '<div class="note-toggle ' + (hasNote ? 'has-note' : '') + '" onclick="toggleNoteBox(this)">' +
    (hasNote ? '\u270E \u5DF2\u6709\u7B14\u8BB0 (' + noteText.length + '\u5B57)' : '\u270E \u6DFB\u52A0\u7B14\u8BB0') + '</div>' +
    '<div class="note-box" id="note-box"><textarea class="note-input" id="note-input" placeholder="\u5728\u6B64\u8BB0\u5F55\u4F60\u7684\u5B66\u4E60\u7B14\u8BB0...">' + escapeHtml(noteText) + '</textarea>' +
    '<div class="note-actions"><button class="btn-save" onclick="saveCurrentNote()">\u4FDD\u5B58\u7B14\u8BB0</button>' +
    '<button class="btn-clear" onclick="clearCurrentNote()">\u6E05\u7A7A</button></div></div>';
}

function toggleNoteBox(el) {
  const box = el.nextElementSibling;
  box.classList.toggle('show');
  if (box.classList.contains('show')) {
    const ta = box.querySelector('textarea');
    if (ta) setTimeout(() => ta.focus(), 100);
  }
}

function saveCurrentNote() {
  const q = filteredQuestions[currentQuestionIdx];
  const text = document.getElementById('note-input').value;
  saveNoteForQuestion(q, text);
  const toggle = document.querySelector('.note-toggle');
  if (toggle) {
    toggle.classList.toggle('has-note', text.trim().length > 0);
    toggle.textContent = text.trim() ? '\u270E \u5DF2\u6709\u7B14\u8BB0 (' + text.trim().length + '\u5B57)' : '\u270E \u6DFB\u52A0\u7B14\u8BB0';
  }
  alert('\u7B14\u8BB0\u5DF2\u4FDD\u5B58');
}

function clearCurrentNote() {
  document.getElementById('note-input').value = '';
  saveCurrentNote();
}

function addWrongMarkAndNote(q) {
  // 在已有的wrong-mark-bar中更新按钮状态
  const btn = document.getElementById('btn-wrong');
  if (btn) {
    const isW = isWrongQuestion(q);
    btn.textContent = isW ? '\u5DF2\u6807\u8BB0\u4E3A\u9519\u9898' : '\u6807\u8BB0\u4E3A\u9519\u9898';
    btn.classList.toggle('marked', isW);
  }
}

// === Quiz ===
function startQuiz(filter) {
  currentView = 'quiz';
  currentQuestionIdx = 0;
  quizAnswers = {};
  quizScore = { correct: 0, total: 0, byType: {} };
  const bank = QUESTION_BANK;
  if (filter === 'all') filteredQuestions = [...bank];
  else if (['essay','single_choice','multiple_choice','judgment','fill'].includes(filter)) filteredQuestions = bank.filter(q => q.type === filter);
  else filteredQuestions = bank.filter(q => q.subject === filter);
  filteredQuestions.sort(() => Math.random() - 0.5);
  if (filteredQuestions.length === 0) { document.getElementById('content-area').innerHTML = '<div class="empty-state">该分类暂无题目</div>'; return; }
  const titles = {all:'全部随机练习', single_choice:'单选题练习', multiple_choice:'多选题练习', judgment:'判断题练习', fill:'填空题练习', essay:'论述题练习'};
  document.getElementById('page-title').textContent = titles[filter] || (filter + '练习');
  renderQuestion();
}

function renderQuestion() {
  if (currentQuestionIdx >= filteredQuestions.length) { showQuizResult(); return; }
  const q = filteredQuestions[currentQuestionIdx];
  const total = filteredQuestions.length;
  document.getElementById('progress-fill').style.width = (currentQuestionIdx / total * 100) + '%';
  const typeLabel = {essay:'论述题', single_choice:'单选题', multiple_choice:'多选题', judgment:'判断题', fill:'填空题'}[q.type] || q.type;
  const diffMap = {'简单':1,'中等':2,'困难':3};
  const diffNum = diffMap[q.difficulty] || parseInt(q.difficulty) || 2;
  const difficultyStars = '\u2B50'.repeat(diffNum) + '\u2606'.repeat(Math.max(0,5-diffNum));

  let html = '<div class="quiz-card"><div class="quiz-header"><div><span class="quiz-type">' + typeLabel + '</span> <span class="quiz-subject">' + q.subject + '</span></div><div class="quiz-difficulty">\u96BE\u5EA6: <span class="star">' + difficultyStars + '</span> <span style="margin-left:8px;color:var(--text-muted);">' + (currentQuestionIdx+1) + '/' + total + '</span></div></div>';
  html += '<div class="quiz-question">' + escapeHtml(q.question) + '</div>';

  if (q.type === 'single_choice') {
    html += '<div class="options-list">';
    const letters = ['A','B','C','D','E','F'];
    q.options.forEach((opt, idx) => {
      html += '<button class="option-btn" data-idx="' + idx + '" onclick="selectOption(' + idx + ')"><span class="option-letter">' + letters[idx] + '</span><span>' + escapeHtml(opt) + '</span></button>';
    });
    html += '</div>';
    html += '<div class="quiz-controls"><button class="btn-primary" onclick="submitSingle()">提交答案</button><button class="btn-secondary" onclick="prevQuestion()">上一题</button><button class="btn-secondary" onclick="skipQuestion()">跳过</button></div>';
  } else if (q.type === 'multiple_choice') {
    html += '<div class="options-list">';
    const letters = ['A','B','C','D','E','F','G','H'];
    q.options.forEach((opt, idx) => {
      html += '<button class="option-btn" data-idx="' + idx + '" onclick="toggleMultiOption(' + idx + ')"><span class="option-letter">' + letters[idx] + '</span><span>' + escapeHtml(opt) + '</span></button>';
    });
    html += '</div>';
    html += '<div class="quiz-controls"><button class="btn-primary" onclick="submitMultiple()">提交答案</button><button class="btn-secondary" onclick="prevQuestion()">上一题</button><button class="btn-secondary" onclick="skipQuestion()">跳过</button></div>';
  } else if (q.type === 'judgment') {
    html += '<div class="judgment-btns"><button class="judgment-btn" id="btn-true" onclick="submitJudgment(true)">正确</button><button class="judgment-btn" id="btn-false" onclick="submitJudgment(false)">错误</button></div>';
    html += '<div class="quiz-controls"><button class="btn-secondary" onclick="prevQuestion()">上一题</button><button class="btn-secondary" onclick="skipQuestion()">跳过</button></div>';
  } else if (q.type === 'fill') {
    // 填空题：显示输入框 + 查看答案按钮
    html += '<textarea id="fill-input" placeholder="在此填写你的答案..." style="width:100%;height:120px;padding:12px;border:2px solid var(--border);border-radius:8px;font-size:0.9rem;line-height:1.7;resize:vertical;font-family:inherit;background:var(--bg);color:var(--text);outline:none;" onfocus="this.style.borderColor=\'var(--primary)\'" onblur="this.style.borderColor=\'var(--border)\'"></textarea>';
    html += '<div class="quiz-controls" style="margin-top:12px;"><button class="btn-primary" onclick="showFillAnswer()">查看参考答案</button><button class="btn-secondary" onclick="prevQuestion()">上一题</button><button class="btn-secondary" onclick="nextQuestion()">下一题</button></div>';
    html += '<div class="essay-answer" id="fill-answer"><div class="analysis-title">参考答案</div><div class="analysis-content">' + escapeHtml(q.answer) + '</div></div>';
  } else if (q.type === 'essay') {
    // 论述题：显示文本框 + 查看参考答案按钮
    html += '<textarea id="essay-input" placeholder="在此书写你的论述..." style="width:100%;height:200px;padding:12px;border:2px solid var(--border);border-radius:8px;font-size:0.9rem;line-height:1.8;resize:vertical;font-family:inherit;background:var(--bg);color:var(--text);outline:none;" onfocus="this.style.borderColor=\'var(--primary)\'" onblur="this.style.borderColor=\'var(--border)\'"></textarea>';
    html += '<div class="quiz-controls" style="margin-top:12px;"><button class="btn-primary" onclick="showEssayAnswer()">查看参考答案</button><button class="btn-secondary" onclick="prevQuestion()">上一题</button><button class="btn-secondary" onclick="nextQuestion()">下一题</button></div>';
    html += '<div class="essay-answer" id="essay-answer"><div class="analysis-title">参考答案</div><div class="analysis-content">' + escapeHtml(q.answer) + '</div></div>';
  }

  html += '<div class="analysis-box" id="analysis-box"><div class="analysis-title">解析</div><div class="analysis-content">' + escapeHtml(q.analysis) + '</div></div>';
  html += renderNoteSection(q);
  html += '<div class="wrong-mark-bar"><button class="btn-wrong-mark ' + (isWrongQuestion(q) ? 'marked' : '') + '" id="btn-wrong" onclick="toggleWrongMark(filteredQuestions[currentQuestionIdx], this)">' + (isWrongQuestion(q) ? '\u5DF2\u6807\u8BB0\u4E3A\u9519\u9898' : '\u6807\u8BB0\u4E3A\u9519\u9898') + '</button></div>';
  html += '</div>';
  document.getElementById('content-area').innerHTML = html;
  selectedOption = null;
  selectedOptions = [];
}

// === Single Choice ===
function selectOption(idx) {
  selectedOption = idx;
  document.querySelectorAll('.option-btn').forEach((btn, i) => { btn.classList.toggle('selected', i === idx); });
}
function submitSingle() {
  if (selectedOption === null) { alert('请选择一个选项'); return; }
  const q = filteredQuestions[currentQuestionIdx];
  const correct = selectedOption === q.answer;
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === q.answer) btn.classList.add('correct');
    else if (i === selectedOption && !correct) btn.classList.add('wrong');
  });
  document.getElementById('analysis-box').classList.add('show');
  updateScore(q.type, correct);
  if (!correct) autoMarkWrong(q);
  addWrongMarkAndNote(q);
  document.querySelector('.quiz-controls').innerHTML = '<button class="btn-secondary" onclick="prevQuestion()">上一题</button><button class="btn-primary" onclick="nextQuestion()">下一题</button>';
}

// === Multiple Choice ===
function toggleMultiOption(idx) {
  const pos = selectedOptions.indexOf(idx);
  if (pos > -1) selectedOptions.splice(pos, 1); else selectedOptions.push(idx);
  selectedOptions.sort();
  document.querySelectorAll('.option-btn').forEach((btn, i) => { btn.classList.toggle('selected', selectedOptions.includes(i)); });
}
function submitMultiple() {
  if (selectedOptions.length === 0) { alert('请至少选择一个选项'); return; }
  const q = filteredQuestions[currentQuestionIdx];
  const correct = JSON.stringify(selectedOptions) === JSON.stringify(q.answer);
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.add('disabled');
    if (q.answer.includes(i)) btn.classList.add('correct');
    else if (selectedOptions.includes(i)) btn.classList.add('wrong');
  });
  document.getElementById('analysis-box').classList.add('show');
  updateScore(q.type, correct);
  if (!correct) autoMarkWrong(q);
  addWrongMarkAndNote(q);
  document.querySelector('.quiz-controls').innerHTML = '<button class="btn-secondary" onclick="prevQuestion()">上一题</button><button class="btn-primary" onclick="nextQuestion()">下一题</button>';
}

// === Judgment ===
function submitJudgment(answer) {
  const q = filteredQuestions[currentQuestionIdx];
  const correct = answer === q.answer;
  if (answer === true) {
    document.getElementById('btn-true').classList.add(correct ? 'correct' : 'wrong');
  } else {
    document.getElementById('btn-false').classList.add(correct ? 'correct' : 'wrong');
  }
  // 标记正确答案
  if (q.answer === true) document.getElementById('btn-true').classList.add('correct');
  else document.getElementById('btn-false').classList.add('correct');
  // 禁用按钮
  document.getElementById('btn-true').style.pointerEvents = 'none';
  document.getElementById('btn-false').style.pointerEvents = 'none';
  document.getElementById('analysis-box').classList.add('show');
  updateScore(q.type, correct);
  document.querySelector('.quiz-controls').innerHTML = '<button class="btn-secondary" onclick="prevQuestion()">上一题</button><button class="btn-primary" onclick="nextQuestion()">下一题</button>';
}

// === Fill (self-judge) ===
function showFillAnswer() {
  document.getElementById('fill-answer').classList.add('show');
  document.getElementById('analysis-box').classList.add('show');
  // 不记录分数，只记录已答
  const q = filteredQuestions[currentQuestionIdx];
  const history = loadHistory();
  history.push({ type: 'fill', question: q.question, correct: null, time: Date.now() });
  saveHistory(history);
}

// === Essay (self-judge) ===
function showEssayAnswer() {
  document.getElementById('essay-answer').classList.add('show');
  document.getElementById('analysis-box').classList.add('show');
  const q = filteredQuestions[currentQuestionIdx];
  const history = loadHistory();
  history.push({ type: 'essay', question: q.question, correct: null, time: Date.now() });
  saveHistory(history);
}

// === Navigation ===
function prevQuestion() {
  selectedOption = null; selectedOptions = [];
  if (currentQuestionIdx > 0) { currentQuestionIdx--; renderQuestion(); }
}
function nextQuestion() {
  selectedOption = null; selectedOptions = [];
  currentQuestionIdx++; renderQuestion();
}
function skipQuestion() { nextQuestion(); }

function updateScore(type, correct) {
  quizScore.total++;
  if (correct) quizScore.correct++;
  quizScore.byType[type] = quizScore.byType[type] || { correct: 0, total: 0 };
  quizScore.byType[type].total++;
  if (correct) quizScore.byType[type].correct++;
  const history = loadHistory();
  history.push({ type, correct, time: Date.now() });
  saveHistory(history);
}

function showQuizResult() {
  const pct = quizScore.total > 0 ? Math.round(quizScore.correct / quizScore.total * 100) : 0;
  let detailHtml = '';
  const typeName = { essay:'论述', single_choice:'单选', multiple_choice:'多选', judgment:'判断', fill:'填空' };
  Object.entries(quizScore.byType).forEach(([type, score]) => {
    const tpct = score.total > 0 ? Math.round(score.correct / score.total * 100) : 0;
    detailHtml += '<div class="score-detail-item"><div class="num">' + score.correct + '/' + score.total + '</div><div class="lab">' + (typeName[type]||type) + ' ' + tpct + '%</div></div>';
  });
  // 加上填空/论述的答题数（从cookie读取）
  const history = loadHistory();
  const fillCount = history.filter(h => h.type === 'fill').length;
  const essayCount = history.filter(h => h.type === 'essay').length;
  const wrongCount = wrongQuestions.length;
  if (fillCount > 0) detailHtml += '<div class="score-detail-item"><div class="num">' + fillCount + '</div><div class="lab">\u586B\u7A7A\u5DF2\u7B54</div></div>';
  if (essayCount > 0) detailHtml += '<div class="score-detail-item"><div class="num">' + essayCount + '</div><div class="lab">\u8BBA\u8FF0\u5DF2\u7B54</div></div>';

  document.getElementById('content-area').innerHTML =
    '<div class="score-panel"><div class="score-number">' + pct + '%</div><div class="score-label">\u5BA2\u89C2\u9898\u6B63\u786E\u7387 \u00B7 ' + quizScore.correct + '/' + quizScore.total + '\u9898</div><div class="score-detail">' + detailHtml + '</div>' +
    '<div class="quiz-controls" style="justify-content:center;margin-top:20px;"><button class="btn-primary" onclick="startQuiz(\'all\')">\u518D\u6765\u4E00\u7EC4</button><button class="btn-secondary" onclick="showHome()">\u8FD4\u56DE\u9996\u9875</button></div></div>';
  document.getElementById('progress-fill').style.width = '100%';
}

// === Browse ===
function browseQuestions(filter) {
  currentView = 'browse';
  document.getElementById('page-title').textContent = filter === 'all' ? '\u5168\u90E8\u9898\u5E93' : filter + '\u9898\u5E93';
  let questions = filter === 'all' ? QUESTION_BANK : QUESTION_BANK.filter(q => q.subject === filter);
  const typeCounts = {};
  questions.forEach(q => { typeCounts[q.type] = (typeCounts[q.type]||0)+1; });
  let html = '<div class="filter-tags"><div class="filter-tag active" onclick="filterBrowse(\'all\', this)">\u5168\u90E8 (' + questions.length + ')</div>';
  const typeLabels = {essay:'\u8BBA\u8FF0', single_choice:'\u5355\u9009', multiple_choice:'\u591A\u9009', judgment:'\u5224\u65AD', fill:'\u586B\u7A7A'};
  Object.entries(typeLabels).forEach(([k,v]) => { if (typeCounts[k]) html += '<div class="filter-tag" onclick="filterBrowse(\'' + k + '\', this)">' + v + ' (' + typeCounts[k] + ')</div>'; });
  html += '</div><div id="browse-list">';
  questions.slice(0, 80).forEach((q, idx) => { html += renderBrowseCard(q, idx); });
  if (questions.length > 80) html += '<p style="text-align:center;color:var(--text-muted);padding:16px;">\u8FD8\u6709 ' + (questions.length-80) + ' \u9898\uFF0C\u8BF7\u4F7F\u7528\u7B5B\u9009\u67E5\u770B</p>';
  html += '</div>';
  document.getElementById('content-area').innerHTML = html;
}
function filterBrowse(type, el) {
  document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const filter = document.getElementById('page-title').textContent.includes('\u5168\u90E8') ? 'all' : document.getElementById('page-title').textContent.replace('\u9898\u5E93','');
  let questions = filter === 'all' ? QUESTION_BANK : QUESTION_BANK.filter(q => q.subject === filter);
  if (type !== 'all') questions = questions.filter(q => q.type === type);
  let html = '';
  questions.forEach((q, idx) => { html += renderBrowseCard(q, idx); });
  document.getElementById('browse-list').innerHTML = html;
}
function renderBrowseCard(q, idx) {
  const typeName = {essay:'\u8BBA\u8FF0', single_choice:'\u5355\u9009', multiple_choice:'\u591A\u9009', judgment:'\u5224\u65AD', fill:'\u586B\u7A7A'}[q.type]||q.type;
  let html = '<div class="quiz-card" style="cursor:pointer;" onclick="toggleBrowseCard(this)"><div class="quiz-header"><span class="quiz-type">' + typeName + '</span> <span class="quiz-subject">' + q.subject + '</span></div><div class="quiz-question">' + escapeHtml(q.question) + '</div>';
  html += '<div style="display:none;margin-top:10px;">';
  if (q.type === 'single_choice' || q.type === 'multiple_choice') {
    const letters = ['A','B','C','D','E','F'];
    q.options.forEach((opt, i) => {
      const isC = q.type === 'single_choice' ? i === q.answer : q.answer.includes(i);
      html += '<div style="padding:4px 0;font-size:0.85rem;'+(isC?'color:var(--success);font-weight:600;':'')+'">' + letters[i] + '. ' + escapeHtml(opt) + (isC?' \u2713':'') + '</div>';
    });
  } else if (q.type === 'judgment') {
    html += '<div style="font-size:0.85rem;color:var(--success);font-weight:600;">\u7B54\u6848: ' + (q.answer?'\u6B63\u786E':'\u9519\u8BEF') + '</div>';
  } else {
    html += '<div class="analysis-box" style="display:block;margin-top:8px;"><div class="analysis-title">\u53C2\u8003\u7B54\u6848</div><div class="analysis-content">' + escapeHtml((q.answer||'').substring(0,500)) + '</div></div>';
  }
  html += '<div class="analysis-box" style="display:block;margin-top:8px;"><div class="analysis-title">\u89E3\u6790</div><div class="analysis-content">' + escapeHtml(q.analysis) + '</div></div>';
  html += '</div></div>';
  return html;
}
function toggleBrowseCard(card) {
  const hidden = card.querySelector('[style*="display:none"]');
  if (hidden) hidden.style.display = 'block';
}

// === Wrong Questions Page ===
function showWrongQuestions() {
  currentView = 'wrong';
  document.getElementById('page-title').textContent = '\u6211\u7684\u9519\u9898\u96C6 (' + wrongQuestions.length + '\u9053)';
  setActiveNav('');
  if (wrongQuestions.length === 0) {
    document.getElementById('content-area').innerHTML = '<div class="empty-state"><div style="font-size:3rem;margin-bottom:16px;opacity:0.3;">\u2705</div><p>\u6682\u65E0\u9519\u9898\uFF0C\u7EE7\u7EED\u52A0\u6CB9\uFF01</p></div>';
    return;
  }
  let html = '<div class="stats-bar"><div class="stat-item">\u9519\u9898\u603B\u6570 <strong>' + wrongQuestions.length + '</strong></div><button class="btn-danger" style="padding:6px 14px;border:none;border-radius:6px;font-size:0.78rem;cursor:pointer;background:var(--danger);color:#FFF;" onclick="clearAllWrongs()">\u6E05\u7A7A\u5168\u90E8\u9519\u9898</button></div>';
  wrongQuestions.forEach((w, idx) => {
    html += '<div class="quiz-card"><div class="quiz-header"><span class="wrong-badge">\u9519\u9898</span> <span class="quiz-subject">' + escapeHtml(w.subject) + '</span> <span style="font-size:0.72rem;color:var(--text-muted);margin-left:auto;">' + (idx+1) + '/' + wrongQuestions.length + '</span></div>';
    html += '<div class="quiz-question">' + escapeHtml(w.question) + '</div>';
    // 查找原始题目显示答案
    const original = QUESTION_BANK.find(q => getQuestionId(q) === w.id);
    if (original) {
      if (original.type === 'single_choice' || original.type === 'multiple_choice') {
        const letters = ['A','B','C','D','E','F'];
        html += '<div style="margin-top:8px;">';
        original.options.forEach((opt, i) => {
          const isC = original.type === 'single_choice' ? i === original.answer : original.answer.includes(i);
          html += '<div style="padding:3px 0;font-size:0.82rem;' + (isC ? 'color:var(--success);font-weight:600;' : '') + '">' + letters[i] + '. ' + escapeHtml(opt) + (isC ? ' \u2713' : '') + '</div>';
        });
        html += '</div>';
      } else if (original.type === 'judgment') {
        html += '<div style="font-size:0.85rem;color:var(--success);font-weight:600;margin-top:8px;">\u7B54\u6848: ' + (original.answer ? '\u6B63\u786E' : '\u9519\u8BEF') + '</div>';
      }
      html += '<div class="analysis-box" style="display:block;margin-top:10px;"><div class="analysis-title">\u89E3\u6790</div><div class="analysis-content">' + escapeHtml(original.analysis) + '</div></div>';
      if (original.type !== 'judgment') {
        html += '<div class="essay-answer" style="display:block;margin-top:10px;"><div class="analysis-title">\u53C2\u8003\u7B54\u6848</div><div class="analysis-content">' + escapeHtml((original.answer||'').substring(0,800)) + '</div></div>';
      }
    }
    html += '<div style="margin-top:10px;"><button class="btn-wrong-mark marked" onclick="removeWrongById(this)" data-qid="' + w.id + '">\u53D6\u6D88\u9519\u9898\u6807\u8BB0</button></div>';
    html += '</div>';
  });
  document.getElementById('content-area').innerHTML = html;
}

function removeWrongById(btn) {
  const qid = btn.getAttribute('data-qid');
  const idx = wrongQuestions.findIndex(w => w.id === qid);
  if (idx > -1) {
    wrongQuestions.splice(idx, 1);
    saveWrongQuestions(wrongQuestions);
    updateNavWrongCount();
    btn.closest('.quiz-card').style.opacity = '0.5';
    btn.textContent = '\u5DF2\u53D6\u6D88';
    btn.disabled = true;
  }
}

function clearAllWrongs() {
  if (confirm('\u786E\u5B9A\u8981\u6E05\u7A7A\u6240\u6709\u9519\u9898\u5417\uFF1F')) {
    wrongQuestions = [];
    saveWrongQuestions([]);
    updateNavWrongCount();
    showWrongQuestions();
  }
}

function showStats() {
  const history = loadHistory();
  const objItems = history.filter(h => h.type !== 'essay' && h.type !== 'fill');
  const total = objItems.length;
  const correct = objItems.filter(h => h.correct).length;

  const fillCount = history.filter(h => h.type === 'fill').length;
  const essayCount = history.filter(h => h.type === 'essay').length;
  const wrongCount = wrongQuestions.length;
  let typeHtml = '';
  const byType = {};
  history.forEach(h => { byType[h.type] = byType[h.type] || {correct:0,total:0}; byType[h.type].total++; if(h.correct) byType[h.type].correct++; });
  const tn = {essay:'\u8BBA\u8FF0', single_choice:'\u5355\u9009', multiple_choice:'\u591A\u9009', judgment:'\u5224\u65AD', fill:'\u586B\u7A7A'};
  Object.entries(byType).forEach(([type, score]) => { const tpct = score.total>0 ? Math.round(score.correct/score.total*100) : 0; typeHtml += '<div class="score-detail-item"><div class="num">'+score.correct+'/'+score.total+'</div><div class="lab">'+(tn[type]||type)+' '+tpct+'%</div></div>'; });

    '<div class="score-panel"><div class="score-number">' + pct + '%</div><div class="score-label">\u5BA2\u89C2\u9898\u7D2F\u8BA1\u6B63\u786E\u7387 \u00B7 ' + correct + '/' + total + '\u9898' + (fillCount > 0 ? ' \u00B7 \u586B\u7A7A' + fillCount + '\u9898' : '') + (essayCount > 0 ? ' \u00B7 \u8BBA\u8FF0' + essayCount + '\u9898' : '') + '</div><div class="score-detail">' + (typeHtml || '<div class="score-detail-item"><div class="num">0</div><div class="lab">\u6682\u65E0\u8BB0\u5F55</div></div>') + '</div><div class="quiz-controls" style="justify-content:center;margin-top:20px;"><button class="btn-danger" onclick="clearHistory()">\u6E05\u7A7A\u8BB0\u5F55</button></div></div>';
}

let searchTimer;

function doSearch(query) {
  currentView = 'search';
  document.getElementById('page-title').textContent = '\u641C\u7D22: ' + query;
  const lower = query.toLowerCase();
  const results = QUESTION_BANK.filter(q => (q.question||'').toLowerCase().includes(lower) || (q.analysis||'').toLowerCase().includes(lower) || (q.answer||'').toLowerCase().includes(lower) || (q.tags||[]).some(t => t.toLowerCase().includes(lower)));
  let html = '<div class="stats-bar"><div class="stat-item">\u627E\u5230 <strong>' + results.length + '</strong> \u6761</div></div>';
  results.slice(0, 50).forEach(q => {
    const typeName = {essay:'\u8BBA\u8FF0', single_choice:'\u5355\u9009', multiple_choice:'\u591A\u9009', judgment:'\u5224\u65AD', fill:'\u586B\u7A7A'}[q.type]||q.type;
    html += '<div class="quiz-card" onclick="toggleBrowseCard(this)" style="cursor:pointer;"><div class="quiz-header"><span class="quiz-type">' + typeName + '</span> <span class="quiz-subject">' + q.subject + '</span></div><div class="quiz-question">' + escapeHtml(q.question) + '</div><div class="analysis-box" style="display:none;"><div class="analysis-title">\u89E3\u6790</div><div class="analysis-content">' + escapeHtml(q.analysis) + '</div></div>';
    if (q.type !== 'judgment') html += '<div class="essay-answer" style="display:none;"><div class="analysis-title">\u53C2\u8003\u7B54\u6848</div><div class="analysis-content">' + escapeHtml((q.answer||'').substring(0,300)) + '</div></div>';

  });
  document.getElementById('content-area').innerHTML = html;
}

}

function showToast(msg, type) {
  type = type || 'success';
  var container = document.querySelector('.toast-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;

    } else {
      html += '<div class="aq-row"><label class="aq-label">\u6b63\u786e\u7b54\u6848\uff08\u591a\u9009\uff09</label><div class="aq-checkbox-group" id="aq-answer-group">';
      for (var i = 0; i < aqMultiOptionCount; i++) {
        html += '<div class="aq-checkbox-item" onclick="toggleAqAnswer(this,' + i + ')" data-idx="' + i + '">' + letters[i] + '</div>';
      }
      html += '</div></div>';
    }
  }

  // 判断题答案
  if (aqCurrentType === 'judgment') {
    html += '<div class="aq-row"><label class="aq-label">\u6b63\u786e\u7b54\u6848</label><div class="aq-checkbox-group" id="aq-answer-group">';
    html += '<div class="aq-checkbox-item" onclick="toggleAqAnswer(this, true)" data-idx="true">\u6b63\u786e</div>';
    html += '<div class="aq-checkbox-item" onclick="toggleAqAnswer(this, false)" data-idx="false">\u9519\u8bef</div>';
    html += '</div></div>';
  }

  // 填空题答案
  if (aqCurrentType === 'fill') {
    html += '<div class="aq-row"><label class="aq-label">\u586b\u7a7a\u7b54\u6848\uff08\u591a\u4e2a\u7b54\u6848\u7528\u9017\u53f7\u5206\u9694\uff09</label>';
    html += '<input class="aq-input" id="aq-fill-answer" placeholder="\u7b54\u6848\u4e00,\u7b54\u6848\u4e8c"></div>';
  }

  // 论述题参考答案
  if (aqCurrentType === 'essay') {
    html += '<div class="aq-row"><label class="aq-label">\u53c2\u8003\u7b54\u6848</label>';
    html += '<textarea class="aq-textarea" id="aq-essay-answer" placeholder="\u586b\u5199\u53c2\u8003\u7b54\u6848..." style="min-height:150px;"></textarea></div>';
  }

  // 科目、难度、标签、解析
  html += '<div class="aq-row-inline" style="margin-bottom:16px;">';
  html += '<div class="aq-row"><label class="aq-label">\u79d1\u76ee</label><select class="aq-select" id="aq-subject"><option>\u4f20\u64ad\u5b66</option><option>\u65b0\u95fb\u5b66</option><option>\u7efc\u5408</option></select></div>';
  html += '<div class="aq-row"><label class="aq-label">\u96be\u5ea6 (1-5)</label><select class="aq-select" id="aq-difficulty">';
  for (var d = 1; d <= 5; d++) html += '<option value="' + d + '">' + d + '</option>';
  html += '</select></div>';
  html += '<div class="aq-row"><label class="aq-label">\u6807\u7b7e\uff08\u9017\u53f7\u5206\u9694\uff09</label><input class="aq-input" id="aq-tags" placeholder="\u68c0\u6848\u7406\u8bba,\u7ecf\u5178"></div>';
  html += '</div>';
  html += '<div class="aq-row"><label class="aq-label">\u89e3\u6790</label><textarea class="aq-textarea" id="aq-analysis" placeholder="\u586b\u5199\u89e3\u6790..." style="min-height:60px;"></textarea></div>';
  html += '<button class="aq-btn-primary" onclick="submitCustomQuestion()">\u6dfb\u52a0\u5230\u9898\u5e93</button>';
  html += '</div></div>';

  // ---- 右侧：我的题库 ----
  html += '<div class="aq-list-panel"><div class="aq-card"><h3>\u6211\u7684\u9898\u5e93 (' + cqs.length + '\u9898)</h3>';
  if (cqs.length === 0) {
    html += '<div class="aq-empty">\u8fd8\u6ca1\u6709\u81ea\u5b9a\u4e49\u9898\u76ee\uff0c\u5728\u5de6\u4fa7\u6dfb\u52a0\u5427\uff01</div>';
  } else {
    cqs.forEach(function(q, idx) {
      html += '<div class="aq-item"><div class="aq-item-q">' + escapeHtml(q.question.substring(0, 60)) + (q.question.length > 60 ? '...' : '') + '</div>';
      html += '<div class="aq-item-meta">';
      html += '<span class="aq-item-tag">' + (typeName[q.type] || q.type) + '</span>';
      html += '<span class="aq-item-tag">' + escapeHtml(q.subject || '') + '</span>';
      html += '<button class="aq-btn-danger-sm" onclick="deleteCustomQuestion(' + idx + ')">\u5220\u9664</button>';
      html += '</div></div>';
    });
    html += '<div class="aq-actions">';
    html += '<button class="aq-btn-secondary" onclick="exportCustomQuestions()">\u5bfc\u51fa JSON</button>';
    html += '<button class="aq-btn-danger-sm" onclick="clearCustomQuestions()">\u6e05\u7a7a\u5168\u90e8</button>';
    html += '</div>';
  }
  // 导入区
  html += '<div class="aq-import-area" onclick="document.getElementById(\'aq-import-file\').click()">';
  html += '<div style="font-size:1.5rem;margin-bottom:8px;opacity:0.4;">\u2b07</div>';
  html += '<div>\u70b9\u51fb\u5bfc\u5165 JSON \u9898\u76ee\u6587\u4ef6</div>';
  html += '<input type="file" id="aq-import-file" accept=".json" onchange="importCustomQuestions(event)">';
  html += '</div>';
  html += '</div></div>';
  html += '</div>';

  document.getElementById('content-area').innerHTML = html;
}

function switchAqType(tp) {
  aqCurrentType = tp;
  if (tp === 'multiple_choice') aqMultiOptionCount = 4;
  renderAddQuestionPage();
}

var aqSelectedAnswers = {};

function toggleAqAnswer(el, val) {
  if (aqCurrentType === 'single_choice') {
    document.querySelectorAll('#aq-answer-group .aq-checkbox-item').forEach(function(item) { item.classList.remove('selected'); });
    el.classList.add('selected');
    aqSelectedAnswers = { type: 'single', value: val };
  } else if (aqCurrentType === 'multiple_choice') {
    el.classList.toggle('selected');
    if (!aqSelectedAnswers.multi) aqSelectedAnswers = { type: 'multi', value: [] };
    var idx = aqSelectedAnswers.value.indexOf(val);
    if (idx >= 0) aqSelectedAnswers.value.splice(idx, 1);
    else aqSelectedAnswers.value.push(val);
  } else if (aqCurrentType === 'judgment') {
    document.querySelectorAll('#aq-answer-group .aq-checkbox-item').forEach(function(item) { item.classList.remove('selected'); });
    el.classList.add('selected');
    aqSelectedAnswers = { type: 'judgment', value: val };
  }
}

function addAqOption() {
  if (aqMultiOptionCount >= 8) { showToast('\u6700\u591a8\u4e2a\u9009\u9879', 'error'); return; }
  aqMultiOptionCount++;
  renderAddQuestionPage();
  // restore previously entered values
  restoreAqFormValues();
}

function removeAqOption(idx) {
  if (aqMultiOptionCount <= 4) return;
  aqMultiOptionCount--;
  renderAddQuestionPage();
  restoreAqFormValues();
}

function restoreAqFormValues() {
  // Restore question text
  var qEl = document.getElementById('aq-question');
  if (aqFormCache.question) qEl.value = aqFormCache.question;
  // Restore option texts
  for (var i = 0; i < 8; i++) {
    var optEl = document.getElementById('aq-opt-' + i);
    if (optEl && aqFormCache.options[i]) optEl.value = aqFormCache.options[i];
  }
  // Restore other fields
  if (aqFormCache.tags) { var t = document.getElementById('aq-tags'); if (t) t.value = aqFormCache.tags; }
  if (aqFormCache.analysis) { var a = document.getElementById('aq-analysis'); if (a) a.value = aqFormCache.analysis; }
  if (aqFormCache.subject) { var s = document.getElementById('aq-subject'); if (s) s.value = aqFormCache.subject; }
  if (aqFormCache.difficulty) { var d = document.getElementById('aq-difficulty'); if (d) d.value = aqFormCache.difficulty; }
}

var aqFormCache = {};

function cacheAqFormValues() {
  aqFormCache = {};
  var qEl = document.getElementById('aq-question');
  if (qEl) aqFormCache.question = qEl.value;
  aqFormCache.options = {};
  for (var i = 0; i < 8; i++) {
    var optEl = document.getElementById('aq-opt-' + i);
    if (optEl) aqFormCache.options[i] = optEl.value;
  }
  var t = document.getElementById('aq-tags'); if (t) aqFormCache.tags = t.value;
  var a = document.getElementById('aq-analysis'); if (a) aqFormCache.analysis = a.value;
  var s = document.getElementById('aq-subject'); if (s) aqFormCache.subject = s.value;
  var d = document.getElementById('aq-difficulty'); if (d) aqFormCache.difficulty = d.value;
}

function submitCustomQuestion() {
  var question = document.getElementById('aq-question').value.trim();
  if (!question) { showToast('\u8bf7\u8f93\u5165\u9898\u76ee\u5185\u5bb9', 'error'); return; }
  var subject = document.getElementById('aq-subject').value;
  var difficulty = parseInt(document.getElementById('aq-difficulty').value) || 3;
  var tagsStr = document.getElementById('aq-tags').value.trim();
  var tags = tagsStr ? tagsStr.split(/[,，]/).map(function(t){return t.trim();}).filter(Boolean) : [];
  var analysis = document.getElementById('aq-analysis').value.trim() || '\u6682\u65e0\u89e3\u6790';
  var q = { type: aqCurrentType, subject: subject, difficulty: difficulty, question: question, analysis: analysis, tags: tags };

  if (aqCurrentType === 'single_choice') {
    if (!aqSelectedAnswers || aqSelectedAnswers.type !== 'single') { showToast('\u8bf7\u9009\u62e9\u6b63\u786e\u7b54\u6848', 'error'); return; }
    var options = [];
    for (var i = 0; i < 4; i++) { var el = document.getElementById('aq-opt-' + i); options.push(el ? el.value.trim() : ''); }
    if (options.some(function(o){return !o;})) { showToast('\u8bf7\u586b\u5199\u6240\u6709\u9009\u9879', 'error'); return; }
    q.options = options;
    q.answer = aqSelectedAnswers.value;
  } else if (aqCurrentType === 'multiple_choice') {
    if (!aqSelectedAnswers || aqSelectedAnswers.type !== 'multi' || aqSelectedAnswers.value.length < 2) { showToast('\u591a\u9009\u9898\u81f3\u5c11\u9009\u62e9\u4e24\u4e2a\u6b63\u786e\u7b54\u6848', 'error'); return; }
    var options = [];
    for (var i = 0; i < aqMultiOptionCount; i++) { var el = document.getElementById('aq-opt-' + i); options.push(el ? el.value.trim() : ''); }
    if (options.some(function(o){return !o;})) { showToast('\u8bf7\u586b\u5199\u6240\u6709\u9009\u9879', 'error'); return; }
    q.options = options;
    q.answer = aqSelectedAnswers.value.slice().sort();
  } else if (aqCurrentType === 'judgment') {
    if (!aqSelectedAnswers || aqSelectedAnswers.type !== 'judgment') { showToast('\u8bf7\u9009\u62e9\u6b63\u786e/\u9519\u8bef', 'error'); return; }
    q.answer = aqSelectedAnswers.value;
  } else if (aqCurrentType === 'fill') {
    var fillAns = document.getElementById('aq-fill-answer').value.trim();
    if (!fillAns) { showToast('\u8bf7\u586b\u5199\u7b54\u6848', 'error'); return; }
    q.answer = fillAns;
  } else if (aqCurrentType === 'essay') {
    var essayAns = document.getElementById('aq-essay-answer').value.trim();
    if (!essayAns) { showToast('\u8bf7\u586b\u5199\u53c2\u8003\u7b54\u6848', 'error'); return; }
    q.answer = essayAns;
  }

  var cqs = loadCustomQuestions();
  cqs.push(q);
  saveCustomQuestions(cqs);
  aqSelectedAnswers = {};
  aqFormCache = {};
  showToast('\u9898\u76ee\u6dfb\u52a0\u6210\u529f\uff01', 'success');
  renderAddQuestionPage();
}

function deleteCustomQuestion(idx) {
  var cqs = loadCustomQuestions();
  cqs.splice(idx, 1);
  saveCustomQuestions(cqs);
  showToast('\u5df2\u5220\u9664', 'info');
  renderAddQuestionPage();
}

function clearCustomQuestions() {
  if (!confirm('\u786e\u5b9a\u8981\u6e05\u7a7a\u6240\u6709\u81ea\u5b9a\u4e49\u9898\u76ee\u5417\uff1f')) return;
  saveCustomQuestions([]);
  showToast('\u5df2\u6e05\u7a7a', 'info');
  renderAddQuestionPage();
}

function exportCustomQuestions() {
  var cqs = loadCustomQuestions();
  if (cqs.length === 0) { showToast('\u6ca1\u6709\u53ef\u5bfc\u51fa\u7684\u9898\u76ee', 'error'); return; }
  var blob = new Blob([JSON.stringify(cqs, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '\u81ea\u5b9a\u4e49\u9898\u76ee_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('\u5bfc\u51fa\u6210\u529f', 'success');
}

function importCustomQuestions(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) { showToast('JSON\u683c\u5f0f\u9519\u8bef\uff0c\u5fc5\u987b\u662f\u6570\u7ec4', 'error'); return; }
      var validTypes = ['single_choice','multiple_choice','judgment','fill','essay'];
      var validCount = 0;
      var cqs = loadCustomQuestions();
      imported.forEach(function(q) {
        if (q.question && validTypes.indexOf(q.type) >= 0) {
          if (!q.subject) q.subject = '\u4f20\u64ad\u5b66';
          if (!q.difficulty) q.difficulty = 3;
          if (!q.analysis) q.analysis = '\u6682\u65e0\u89e3\u6790';
          if (!q.tags) q.tags = [];
          cqs.push(q);
          validCount++;
        }
      });
      saveCustomQuestions(cqs);
      showToast('\u6210\u529f\u5bfc\u5165 ' + validCount + ' \u9053\u9898\u76ee', 'success');
      renderAddQuestionPage();
    } catch(err) {
      showToast('JSON\u89e3\u6790\u5931\u8d25: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// 修改 startQuiz 以包含自定义题目
var _origStartQuiz = startQuiz;
startQuiz = function(filter) {
  currentView = 'quiz';
  currentQuestionIdx = 0;
  quizAnswers = {};
  quizScore = { correct: 0, total: 0, byType: {} };
  var bank = getFullBank();
  if (filter === 'all') filteredQuestions = bank.slice();
  else if (['essay','single_choice','multiple_choice','judgment','fill'].indexOf(filter) >= 0) filteredQuestions = bank.filter(function(q){return q.type === filter;});
  else filteredQuestions = bank.filter(function(q){return q.subject === filter;});
  // shuffle
  for (var i = filteredQuestions.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = filteredQuestions[i]; filteredQuestions[i] = filteredQuestions[j]; filteredQuestions[j] = tmp;
  }
  if (filteredQuestions.length === 0) { document.getElementById('content-area').innerHTML = '<div class="empty-state">\u8be5\u5206\u7c7b\u6682\u65e0\u9898\u76ee</div>'; return; }
  var titles = {all:'\u5168\u90e8\u968f\u673a\u7ec3\u4e60', single_choice:'\u5355\u9009\u9898\u7ec3\u4e60', multiple_choice:'\u591a\u9009\u9898\u7ec3\u4e60', judgment:'\u5224\u65ad\u9898\u7ec3\u4e60', fill:'\u586b\u7a7a\u9898\u7ec3\u4e60', essay:'\u8bba\u8ff0\u9898\u7ec3\u4e60'};
  document.getElementById('page-title').textContent = titles[filter] || (filter + '\u7ec3\u4e60');
  renderQuestion();
};

// 修改 buildNav 以包含自定义题数
var _origBuildNav = buildNav;
buildNav = function() {
  _origBuildNav();
  var cqs = loadCustomQuestions();
  if (cqs.length > 0) {
    var addQNav = document.querySelector('[onclick="showAddQuestion()"]');
    if (addQNav && !addQNav.querySelector('.badge')) {
      var badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = cqs.length;
      addQNav.appendChild(badge);
    }
  }
};

function initKnowledgeGraph() {
  var canvas = document.getElementById('kg-canvas');
  var wrapper = document.getElementById('kg-wrapper');
  if (!canvas || !wrapper) return;

  var ctx = canvas.getContext('2d');
  var W = wrapper.clientWidth;
  var H = wrapper.clientHeight;
  var dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  var data = KNOWLEDGE_GRAPH;
  var nodeMap = {};
  var nodes = data.nodes.map(function(n, i) {
    var angle = (i / data.nodes.length) * Math.PI * 2;
    var r = 150 + Math.random() * 200;
    var node = {
      id: n.id, name: n.name, type: n.type, desc: n.desc,
      x: W / 2 + Math.cos(angle) * r,
      y: H / 2 + Math.sin(angle) * r,
      vx: 0, vy: 0,
      degree: 0
    };
    nodeMap[n.id] = node;
    return node;
  });
  var edges = data.edges.map(function(e) {
    nodes.forEach(function(n) {
      if (n.id === e.source || n.id === e.target) n.degree++;
    });
    return { source: nodeMap[e.source], target: nodeMap[e.target], relation: e.relation };
  }).filter(function(e) { return e.source && e.target; });

  // Node appearance
  function nodeColor(n) {
    if (n.type === 'theory') return '#8B6BAE';
    if (n.type === 'scholar') return '#5BAD7D';
    return '#E0A040';
  }
  function nodeRadius(n) {
    var base = n.type === 'school' ? 18 : (n.type === 'scholar' ? 14 : 12);
    return base + Math.min(n.degree * 1.5, 10);
  }

  // State
  var scale = 1;
  var offsetX = 0, offsetY = 0;
  var draggingNode = null;
  var dragStartX, dragStartY;
  var isPanning = false;
  var panStartX, panStartY;
  var hoveredNode = null;
  var selectedNode = null;
  var animId = null;
  var temperature = 1.0;

  // Physics params
  var kRepel = 5000;
  var kAttract = 0.005;
  var restLength = 100;
  var damping = 0.85;
  var centerGravity = 0.01;

  function applyForces() {
    if (temperature < 0.001) return;
    var i, j, n1, n2, dx, dy, dist, force, fx, fy;
    // Repulsion
    for (i = 0; i < nodes.length; i++) {
      for (j = i + 1; j < nodes.length; j++) {
        n1 = nodes[i]; n2 = nodes[j];
        dx = n2.x - n1.x;
        dy = n2.y - n1.y;
        dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 1) { dist = 1; dx = 0.01; dy = 0.01; }
        force = kRepel / (dist * dist);
        fx = (dx / dist) * force;
        fy = (dy / dist) * force;
        n1.vx -= fx * temperature;
        n1.vy -= fy * temperature;
        n2.vx += fx * temperature;
        n2.vy += fy * temperature;
      }
    }
    // Attraction
    for (i = 0; i < edges.length; i++) {
      n1 = edges[i].source; n2 = edges[i].target;
      dx = n2.x - n1.x;
      dy = n2.y - n1.y;
      dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) dist = 1;
      force = kAttract * (dist - restLength);
      fx = (dx / dist) * force;
      fy = (dy / dist) * force;
      n1.vx += fx * temperature;
      n1.vy += fy * temperature;
      n2.vx -= fx * temperature;
      n2.vy -= fy * temperature;
    }
    // Center gravity
    var cx = W / 2, cy = H / 2;
    for (i = 0; i < nodes.length; i++) {
      n1 = nodes[i];
      n1.vx += (cx - n1.x) * centerGravity * temperature;
      n1.vy += (cy - n1.y) * centerGravity * temperature;
    }
    // Update positions
    for (i = 0; i < nodes.length; i++) {
      if (nodes[i] === draggingNode) continue;
      n1 = nodes[i];
      n1.vx *= damping;
      n1.vy *= damping;
      n1.x += n1.vx;
      n1.y += n1.vy;
    }
    temperature *= 0.999;
  }

  function toScreen(x, y) {
    return { x: (x - W / 2) * scale + W / 2 + offsetX, y: (y - H / 2) * scale + H / 2 + offsetY };
  }
  function fromScreen(sx, sy) {
    return { x: (sx - W / 2 - offsetX) / scale + W / 2, y: (sy - H / 2 - offsetY) / scale + H / 2 };
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    // Background
    ctx.fillStyle = '#FAFAFE';
    ctx.fillRect(0, 0, W, H);

    var i, e, s, t, p, n, highlightIds = {};

    if (selectedNode) {
      highlightIds[selectedNode.id] = true;
      edges.forEach(function(e) {
        if (e.source.id === selectedNode.id) highlightIds[e.target.id] = true;
        if (e.target.id === selectedNode.id) highlightIds[e.source.id] = true;
      });
    }

    // Draw edges
    for (i = 0; i < edges.length; i++) {
      e = edges[i];
      s = toScreen(e.source.x, e.source.y);
      t = toScreen(e.target.x, e.target.y);
      var isHighlight = selectedNode && (highlightIds[e.source.id] && highlightIds[e.target.id]);
      var dimmed = selectedNode && !isHighlight;

      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(t.x, t.y);
      if (isHighlight) {
        ctx.strokeStyle = 'rgba(107,91,149,0.7)';
        ctx.lineWidth = 2;
      } else if (dimmed) {
        ctx.strokeStyle = 'rgba(200,195,210,0.2)';
        ctx.lineWidth = 1;
      } else {
        ctx.strokeStyle = 'rgba(107,91,149,0.25)';
        ctx.lineWidth = 1;
      }
      if (e.relation === '\u76f8\u5173' || e.relation === '\u53d1\u5c55\u81ea') {
        ctx.setLineDash([4, 4]);
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Draw nodes
    for (i = 0; i < nodes.length; i++) {
      n = nodes[i];
      p = toScreen(n.x, n.y);
      var r = nodeRadius(n) * scale;
      r = Math.max(r, 3);
      var dimmed = selectedNode && !highlightIds[n.id];
      var isHover = hoveredNode === n;

      // Shadow
      ctx.beginPath();
      ctx.arc(p.x, p.y, r + 2, 0, Math.PI * 2);
      ctx.fillStyle = dimmed ? 'rgba(150,150,170,0.05)' : 'rgba(107,91,149,0.12)';
      ctx.fill();

      // Circle
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      if (dimmed) {
        ctx.fillStyle = '#D0D0D8';
        ctx.strokeStyle = '#C0C0C8';
      } else if (selectedNode === n) {
        ctx.fillStyle = nodeColor(n);
        ctx.strokeStyle = '#2D2D3F';
      } else if (isHover) {
        ctx.fillStyle = nodeColor(n);
        ctx.strokeStyle = '#2D2D3F';
      } else {
        ctx.fillStyle = nodeColor(n);
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      }
      ctx.lineWidth = isHover || selectedNode === n ? 2.5 : 1.5;
      ctx.fill();
      ctx.stroke();

      // Label
      if (scale > 0.4 || n.type === 'school') {
        ctx.fillStyle = dimmed ? '#C0C0C8' : '#2D2D3F';
        var fontSize = Math.max(Math.round(10 * scale), 8);
        ctx.font = (n.type === 'school' ? '600 ' : '500 ') + fontSize + 'px -apple-system, PingFang SC, Microsoft YaHei, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(n.name, p.x, p.y + r + 4);
      }
    }
  }

  function tick() {
    applyForces();
    render();
    animId = requestAnimationFrame(tick);
  }

  // Mouse events
  function getMousePos(e) {
    var rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
  function findNodeAt(mx, my) {
    var pos = fromScreen(mx, my);
    for (var i = nodes.length - 1; i >= 0; i--) {
      var n = nodes[i];
      var dx = n.x - pos.x;
      var dy = n.y - pos.y;
      if (dx * dx + dy * dy < Math.pow(nodeRadius(n) + 5, 2)) return n;
    }
    return null;
  }

  canvas.addEventListener('mousedown', function(e) {
    var pos = getMousePos(e);
    var node = findNodeAt(pos.x, pos.y);
    if (node) {
      draggingNode = node;
      canvas.classList.add('dragging-node');
      dragStartX = pos.x;
      dragStartY = pos.y;
    } else {
      isPanning = true;
      panStartX = pos.x;
      panStartY = pos.y;
      canvas.style.cursor = 'grabbing';
    }
  });

  canvas.addEventListener('mousemove', function(e) {
    var pos = getMousePos(e);
    if (draggingNode) {
      var newPos = fromScreen(pos.x, pos.y);
      draggingNode.x = newPos.x;
      draggingNode.y = newPos.y;
      draggingNode.vx = 0;
      draggingNode.vy = 0;
      temperature = Math.max(temperature, 0.1);
    } else if (isPanning) {
      offsetX += pos.x - panStartX;
      offsetY += pos.y - panStartY;
      panStartX = pos.x;
      panStartY = pos.y;
    } else {
      var node = findNodeAt(pos.x, pos.y);
      hoveredNode = node;
      canvas.style.cursor = node ? 'pointer' : 'grab';
      // Tooltip
      var tooltip = document.getElementById('kg-tooltip');
      if (node && tooltip) {
        tooltip.style.display = 'block';
        tooltip.style.left = Math.min(pos.x + 16, W - 270) + 'px';
        tooltip.style.top = (pos.y + 16) + 'px';
        var typeName = {theory:'\u7406\u8bba',scholar:'\u5b66\u8005',school:'\u6d41\u6d3e'};
        var relHtml = '';
        edges.forEach(function(e) {
          if (e.source.id === node.id) {
            relHtml += '<div style="margin-bottom:2px;">' + e.relation + ' \u2192 ' + e.target.name + '</div>';
          }
          if (e.target.id === node.id) {
            var src = e.source;
            relHtml += '<div style="margin-bottom:2px;">' + src.name + ' \u2192 ' + e.relation + '</div>';
          }
        });
        tooltip.innerHTML = '<div class="kg-tooltip-title">' + node.name + '</div>' +
          '<div class="kg-tooltip-type">' + (typeName[node.type] || node.type) + ' \u00b7 \u8fde\u63a5\u6570: ' + node.degree + '</div>' +
          '<div style="font-size:0.78rem;opacity:0.9;margin-bottom:4px;">' + (node.desc || '') + '</div>' +
          (relHtml ? '<div class="kg-tooltip-relations">' + relHtml + '</div>' : '');
      } else if (tooltip) {
        tooltip.style.display = 'none';
      }
    }
  });

  canvas.addEventListener('mouseup', function(e) {
    var pos = getMousePos(e);
    if (draggingNode) {
      // If barely moved, treat as click
      var dist = Math.abs(pos.x - dragStartX) + Math.abs(pos.y - dragStartY);
      if (dist < 5) {
        selectedNode = selectedNode === draggingNode ? null : draggingNode;
      }
      draggingNode = null;
      canvas.classList.remove('dragging-node');
    }
    if (isPanning) {
      isPanning = false;
      canvas.style.cursor = 'grab';
    }
  });

  canvas.addEventListener('mouseleave', function() {
    draggingNode = null;
    isPanning = false;
    hoveredNode = null;
    canvas.classList.remove('dragging-node');
    var tooltip = document.getElementById('kg-tooltip');
    if (tooltip) tooltip.style.display = 'none';
  });

  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    var pos = getMousePos(e);
    var delta = e.deltaY > 0 ? 0.9 : 1.1;
    var newScale = scale * delta;
    newScale = Math.max(0.2, Math.min(4, newScale));
    // Zoom towards mouse position
    var factor = newScale / scale;
    offsetX = pos.x - factor * (pos.x - offsetX);
    offsetY = pos.y - factor * (pos.y - offsetY);
    scale = newScale;
  }, { passive: false });

  // Expose controls
  window.kgZoomIn = function() {
    scale = Math.min(4, scale * 1.2);
  };
  window.kgZoomOut = function() {
    scale = Math.max(0.2, scale / 1.2);
  };
  window.kgReset = function() {
    scale = 1; offsetX = 0; offsetY = 0;
    selectedNode = null; hoveredNode = null;
    temperature = 1.0;
    // Re-scatter
    nodes.forEach(function(n, i) {
      var angle = (i / nodes.length) * Math.PI * 2;
      var r = 150 + Math.random() * 200;
      n.x = W / 2 + Math.cos(angle) * r;
      n.y = H / 2 + Math.sin(angle) * r;
      n.vx = 0; n.vy = 0;
    });
  };

  // Handle resize
  kgState = { canvas: canvas, wrapper: wrapper, animId: animId };
  function handleResize() {
    W = wrapper.clientWidth;
    H = wrapper.clientHeight;
    dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window._kgResizeHandler = handleResize;
  window.addEventListener('resize', handleResize);

  tick();
}

</script>
</body>
</html>
