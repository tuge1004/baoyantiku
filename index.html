 新闻学和新闻工作的区别与联系：
1. 新闻学仅仅是一门专业学科，而新闻工作却是多种学科和新闻工作实践经验的综合
运用。
2. 新闻语言要求准确、简洁，让人一看（听）就懂；新闻工作涉及到经济学、政治学、
管理学、法学、文学、历史学、以及自然科学等；分析能力、判断能力是新闻工作
最重要的素质。
 报刊的四种理论：自由主义报刊理论、社会责任论、发展新闻学、党报理论。
1. 自由主义报刊理论
产生：起源于欧洲，盛行于北美，尤其是美国。
目标：确立维护和发展新闻自由；以理论的形式来阐述论证新闻自由的合理性与必然性。
主要内涵：探讨新闻自由与政府、社会、个人的关系。
主要观点： 1）报刊独立自主，不受政府的干涉。
2）报刊拥有对政府的监督权。
3）"意见自由市场"和"自我修正"理论。
4）对事实的信念。
评价：本理论把客观地向公众提供事实作为新闻报道的最高标准和新闻人的职业道德标
准。客观性报道是自由主义报刊理论在新闻实践中的具体体现。支配着西方报刊的不是
理想的理性至上，而是利润至上、金钱至上。
2. 社会责任论
产生：20世纪40年代由一批美国学者正式构建，50年代为西方所接受，逐渐取代自
由主义成为主导。其基础仍然是自由主义报刊理论。
对报刊的五项基本要求：1）新闻必须真实、全面；新闻报道必须理智。
2）新闻报刊要成为"交换评论"和"批评的论坛"。
3）报刊要供社会群体相互传递意见与态度。
4）报刊要提出和澄清社会目标和价值观。
5）报刊要"完全接近每日的信息"。
评价：在新的历史条件下，报刊并不能真正实行自律，公众对此有无能为力，社会责任
论者只能求助于政府来管束和制约新闻媒介。但它只能在一定程度上缓和西方新闻媒介
和公众、政府之间的矛盾，并不能从根本上消除新闻媒介和社会大众的对立。
3. 发展新闻学
产生：二战后盛行于发展中国家
核心内容：国家的发展尤其市经济的发展是一切发展中国家的首要任务，新闻媒介必须
服从服务、促进国家发展，尤其是经济的发展。
特征：程度不一地和政府保持一致，宣传政府的施政纲领；十分重视新闻媒介的守望、
整合和教育功能。
4. 党报理论
产生：起源于前苏联，后在各社会主义国家和部分发展中国家流行。
核心：新闻媒介是党和政府的喉舌即宣传工具，必须无条件的宣传党和政府的方针、政
策、法规、条令。
 学习新闻学理论的意义：
1. 指导新闻工作者自觉地从事创造性的工作；
2. 指导新闻事业不断进行正确的改革；
3. 指导我们以科学的态度对待国外新闻工作的理论和实践经验；
4. 指导我们正确地吸收其他学科的成果。
第一章新闻活动
 报纸、广播电视在新闻学上统称新闻事业，在传播学上总称大众传播媒介（大众传
媒）。
 新闻活动：是一种普遍的社会现象，从广义上说，新闻活动不仅限于和大众传播工
具的直接接触，还包括人们为沟通客观世界新近变动的情况所进行的一切活动。
 原始社会新闻活动
方式：1）借助一定信号（火）；2）借助于一定的符号（绘画）。
背景：人类的新闻活动起源于原始社会，新闻活动随着人类社会的产生而出现。
产生原因： 1）客观世界的变动关系到原始人的生存。在原始社会新闻活动纯粹服务
于人类的生存斗争。
2）社会新闻活动的产生是人类求生存图发展的需要，其目的是为了了解客观世界的变
动。
 奴隶社会新闻活动
社会背景变化： 1）产生了阶级和阶级斗争，出现了国家统治机器；
2）出现了社会分工（农业和牧业的分工、农业和手工业的分工、脑力劳动和体力劳动
社会关系更加复杂
的分工）；
3）生产力得到了较大的发展。
人们不但需要了解自然界的变动
还需要了解各种社会关系的变动
发展：奴隶社会生产比过去发达，社会有了剩余产品，有余力来养活一批采集、传递新
闻（情报）的专职人员（军事→政经）。春秋战国时期，由于社会变动频繁，新闻活动
活跃一时，各国都雇佣了一大批人来专门测探对方的政治、经济、军事情报，谁的消息
灵，谁就有克敌制胜的主动权。
发展原因： 1）统治集团为了运转国家机器，需互通消息使各部门协调一致；
2）统治集团为维护统治，得随时注意奴隶举动，以便镇压反抗；
3）社会分工出现后，从事不同产业的人们为交换产品的需要，尤其是商业
活动，需要大量的信息。
 封建社会新闻活动
社会关系变化是新闻活动发展的原因：
1）国家的形式更加完备，建立了中央集权制，其巩固需要与灵敏的情况反映相联系；
2）农民武装起义不断，双方都需要了解对方的情况，同时各自内部也需要大量新闻传
递工作，以便协调一致；
3）封建社会的农民有了一定的人身自由和自主权，需要了解一定的情况来维持自身生
活和生产，需要和外界发生联系来进行信息交流；
4）地主阶级除了用武装来统治，同时通过思想来麻醉农民，新闻成其宣传德威的工具
手段；
5）社会分工比过去更加明确，尤其是城镇的出现，城乡之间，城镇内部之间联系更加
频繁。
发展：1）规模越离开越大，且在产生一大批专门从事新闻活动的脱产专职人员；
2）内容大大丰富了。除了自然变动、部落战争，涉及到政治、经济、文化、军事等多
方面；
3）传递新闻的手段多样化了：符号、信号（原始）——手写文字（奴隶）——印刷品
（封建）。
 新闻活动与生产力发展之间的关系：
1. 变动产生新闻，关系决定需要；
2. 社会条件的改变，引起人类社会交往密切程度的提高，整个社会各个阶层对新闻需
求量增加，促进新闻活动规模和内容的增加、扩大，以及新闻传递手段的创新；
3. 社会对新闻的需求量决定了新闻活动的规模、方式和内容。社会对新闻的需求量又
是社会生产力水平决定的。
 新闻活动的传播渠道
1. 亲身传播
方式：语言传播（直接交谈、电话会谈）文字传播（信件、电报、传真、邮件）体态语
言传播（手势、眼神、表情）信号传播（暗记、旗号等）；
特点：信息传播有明确的对象。属于定向传播；
优点：信息传播的针对性强、反馈快、互动性大，可以迅速调整传播内容和方法；
缺点：传播面窄，传播速度慢，保真度差
2. 大众传播
方式：报纸、广播、电视、杂志、书籍、电影（中国只包括前三种）；
特点：面向全社会传播信息，没有明确的传播对象，属无定向传播；
优点：传播速度快、传播面广，保真度好；
缺点：反馈慢，互动性差
3. 群体传播
方式：集会、发布会、讲座、报告会、讨论会；
特点：既属于无定向传播又属定向，长处和不足节余二者之间。
第二章新闻
 新闻：
特点：真实；新鲜。
要求：真实；迅速及时。
对新闻工作者的要求：诚实、公正和严谨；有敏锐的反应判断能力。

2）新闻是新近事实变动的信息（新闻的实质）。
功能：反映世界的最新变动（变动产生新闻，变动是新闻之母）。记者应从事物的变动
去着手寻找新闻，这是新闻记者应具有的"新闻敏感"；要从人们看得见、摸得着的变化

 决定宣传效益的因素：
1. 宣传者（who）：其不是宣传活动的组织者，是一切宣传的信源，而且宣传者的自
身形象是决定宣传成败的重要因素，信任度和宣传效应成正比。
2. 宣传对象（whom）：其既是宣传效果的承担者，也是宣传效果的最后鉴定者。
3. 宣传内容（what）：起最后宣传作用的是宣传内容。
4. 宣传场合（where）：分封闭环境和开放环境。封闭环境下信息渠道单一，外界干
扰小，宣传容易取得预期效果。开放环境下，信息渠道多样，各种竞争性或敌对性
势力却设法争取受众，预期效果就困难。
5. 宣传时机（when）：宣传需要针对各个个体在不同时机的不同心理状态，才取得
预期效益。
6. 宣传动机（why）：动机不同，内容的选择也就不同，宣传的目的要十分明确。
7. 宣传方法（how）：宣传者要达到效果必须得当地运用一定的宣传手段、技巧和媒
介。
 新闻与舆论：新闻媒介与舆论相生相灭，互为依托。新闻媒介从舆论中吸取力量，
在西方各国号称除立法、司法、行政以外的第四势力；舆论借助新闻媒介作为公开
展示力量的舞台。
舆论
定义：是在特定的时空里，公众对于特定的社会公共事务公开表达的基本一致的意见或
态度。舆论是民意表达和民众力量的现实。
本质：舆论作为公共意见（公众意见）是社会评价的一种，是社会心理的反映；它以公
众利益为基础，以公众事务为指向。
特点：1）公共性。指向的公共性和作用目标的公共性。
2）公开性。在公开讨论中形成，又公开表达以实施干预。
3）急迫性。其涉及的都是近在眼前，需要破求解决的问题，指向与目标的显示迫切感
决定了舆论的社会急迫性。
4）广泛性。是指舆论存在范围的广泛性和影响范围的广泛性。
5）评价性。它是一种意见，不是一般的客观陈述，而是对事物做出判断，带有明显的
主观倾向。
社会功能：对国家政权、政府行为的监督；对公众行为的鼓舞或约束。
目的：使公共事务最大限度地符合公众共同的意志和要求。
舆论的两面性：舆论虽然是公众集中意识倾向的表达，但由于公众认识水平等自身条件
的限制和外杂器客观条件的制约，这种集中意志并不是任何条件下都是正确的。舆论是
一把双刃剑，其重用是正负双向的，它的质量存在高下之分，好坏之别。衡量舆论的标
准是舆论作用于社会实践的后果，包括直接与间接、短期与长期的结果等。
 新闻媒介与舆论导向之间的关系：新闻媒介即为舆论工具，新闻媒介与舆论相生相

第四章新闻事业的产生
 新闻传播工具的演进在一定程度上反映出人类文明的发展。从原始社会到封建社
会，新闻传播工具随着新闻活动规模的扩大而不断发展，随着生产力所能提供的日
益增多的物质手段而不断创新。新闻活动依赖于交通通讯工具和其他物质手段。
 中国古代主要传播方式：
传播方式 口头新闻 信号媒介（锣鼓） 书信新闻（风筝、信鸽） 印刷媒介（邸报）

其他传播方式：露布；牌报、旗报；悬书，揭帖。
 中国古代新闻活动的特点：
1. 古代社会始终没有停止过新闻活动，但无以此为职业的机构，所以古代只有新闻活
动而无新闻事业。
2. 其规模小，新闻基本上为定向传播，有明确的目的和具体的对象，而没有无定向的
大众传播。
3. 统治阶级内部新闻活动大大超过被统治阶级（主要是规模上）。
 西方报纸产生的社会历史背景：
1. 在封建社会的资本主义过度时期，产生出最早的新闻事业。
2. 资本主义商品经济的发展使社会规模、社会变动、社会生产分工都发生了巨大的变
化，由此人们对信息的需求量激增，需要信息的人也在激增。而古代社会狭小的新
闻活动不能适应新变化和新要求。
3. 资本注意商品经济不但使新闻事业的产生有了社会必要，而且为新闻事业的产生准
备了物质手段。
a) 大工业生产的发展客观上需要各类知识人才，并促进了各类学校的兴办，为报纸创
造了读者群。
b) 资产阶级创造了大量巨大城市，便利了新闻采集和报刊发行。报纸是城市的产物。
c) 交通通讯的迅速发展保证了新闻采集、发布的迅速及时。
d) 印刷纸张等工业的日趋发展，保证了报刊的物质需求。
e) 资本原始积累增加了资本集中速度，使资本家有可能合办和独办报纸，并刊登大量
广告，使报纸成为有利可图企业。
4. 报纸的出现是历史发展的必然结果，是不以人的意志为转移的。尽管它发轫于封建
社会末期并受到封建统治阶级的扼杀或控制，但最终伴随着资本主义上平经济的发
展，报纸最终成长发展起来。
 报纸产生发展的三个阶段：
第一阶段：手抄新闻的出现和盛行时期。14-15世纪在意大利威尼斯兴起，很快流行到
欧洲各地；17世纪初达到高潮，17世纪末逐渐消亡。
第二阶段：新闻书的出现。德国法兰克福最早出现新闻书，1588年奥地利人艾青氏印
刷新闻书每年两册，1620年荷兰人在阿姆斯特朗开始印刷新闻书。特点是不定期，间
隔时间长，新闻迟缓，无固定订户。
第三阶段：周报（周刊）、日报的勃兴。1609年德国奥格斯堡《德国观察周刊》、1616
年《法兰克福邮报》、1626《马德堡新闻》；17世纪上半叶欧洲各国几乎都有了周刊，
1631年《法国公报》、1641年英国《国内纪闻》等；日报：1663年德国莱比锡《莱
比锡新闻》、1665.11.16英国《牛津公报》（单页双面印）、1702年伦敦《英国每日
新闻》（四开单张双面印）。
 广播电台的发展：
 1895年，意大利马可尼和俄国波波夫同时发明无线电波。
 1899.3.28，马可尼成功地发了第一封电报（英国至法国）
 1906.12.25，范斯顿的马萨诸塞实验电台首次广播，从广播工程技术标准上看，
广播从此诞生。它最早是娱乐工具。
 1920.8.31，美国底特律8MK实验台广播了密执安州长初步获胜的新闻。（最早
的广播新闻）
 1920.10.27，美国匹兹堡KDKA电台正式成立，具有合法经营权的第一家电台。
它的播音标志着广播事业的正式诞生。
 1923.1.24美在华第一个电台正式开播，呼号为ECO，是中国第一家广播电台。
 1940.12.30，延安新华广播电台开播，呼号XNCR。中共创办的第一个广播电台。
 1940年12月30日被确定为中国人民广播事业创建纪念日。
 电视的发展：
 1930年，英国广播公司与贝尔德合作，成功开发了电视图象及传送。
 1940年，美国试制成功彩电；1953年NTSC（国家电视标准委员会）制式标准；
1954年美国开播彩电节目。
 中国1958.5.1成立电视台，1973年开办彩电业务，中国采用的是PAL制式。
彩电的三种制式：美国NTSC，德国PAL，法国SECAM。
 从报纸到广播再到电视，从印刷文字到声音再到声画合一，传媒朝着更迅速、更广
泛、更逼真的方向发展着。“更快、更广、更真”这是新闻的品格，也是传媒发展
的最基本要求。
 邸报：
1. 称呼：条报、条陈、除目、报状、状；邸抄、朝报、进奏院状报。
2. 内容：圣渝，法令，奏折。
3. 读者对象：官吏。
4. 存在原因：封建王朝用来宣传忠君封建纲常；通信息使国家机器可以协调一致运转
起来。
5. 特点：不由朝廷统一公布；内容不相同；无固定发布日期；无自己采写的新闻言论。
6. 结论：并非近代报纸的始祖，而是政府公报的始祖。
 近代中文报纸的产生：近代中文报纸是舶来品，是由由西方资本主义国家移植过来
的。第一批近代中文报纸是19世纪初由英国传教士创办：
《察世俗每月纪统传》1815——1821
《特选撮要每月纪统传》1833——1838
《东西洋烤每月纪统传》1833——1837
第五章互联网与新媒体
 网络新闻发展分为三个阶段：拷贝复制阶段、加工整个阶段、独家原创、综合发展
阶段。
 互联网传播新形态出现的意义：打破了传统新闻“店对面”的传播模式，代之以“面
对面”的方式，开创了“所有人向所有人传播”的新形态，使信息的接受者从被动
接收信息到主动创作信息，从单一获取信息到全面利用信息，从信息索取的孤立个
体变为信息交流的聚合群体，让普通个体拥有了属于自己的生活空间。
 传统媒介传播理念的转变：
报业——回归精英；
电视——主导娱乐；
广播——受众细分。
 传媒业业务上的调整：
1. 对所有传统媒介产品进行“数字化”；
2. 对不同媒介产品进行融合。
第六章新闻事业的发展及其基本规律
 政治、经济体制决定新闻体制
1. 私营媒介：完全由私人独资或集股兴办。西方报纸都是私营媒介，以美国为代表。
特点：董事会为最高决策机构；依托财团；盈利为目的；广告是主要收入来源；迎合受
众；监督政府有一定力度。
2. 公营媒介：大多数国家都有公营电台、电视台，还没有公营报纸，以BBC为代表。
特点：相对独立的管理机构；半官方机构；以视听费为主要收入来源；强调对公众负责；
不播广告。
3. 国营媒介：社会主义国家和部分发达国家为此种体制，以意大利国家电视台为代表。
特点：完全依赖政府；政府宣传机构；节目严肃呆板。
从国家制度上看：
以中国为代表的社会主义制度国家新闻媒介特点：
1) 新闻媒介国家所有；
2) 新闻媒介以有利于国家利益、人民利益为最高宗旨；
3) 新闻媒介自觉接受党的领导；
4) 党和国家从多方面支持和扶植新闻媒介。
西方发达资本主义国家新闻媒介特点：
1) 政府没有直接控制媒介；
2) 存在公营、私营并存局面，私营比例在上升；
3) 电台、电视台的创办需经过审查。
其他发展中国家新闻体制比较复杂特点是：
1) 多种所有制并存；
2) 新闻媒介大多有政府政党背景；
3) 新闻媒介支持国家发展。
 生产力水平决定新闻事业的发展水平：新闻事业随生产力水平发展而发展，生产力
水平高低直接影响新闻事业的发展速度和规模大小。从当今世界来看，发达国家有
发达和较为发达的媒介，第三世界国家的媒介整体较为落后
1) 产力水平提高，社会经济规模扩大，刺激了信息需求；
2) 生产力水平提高，社会受教育面扩大，读者群扩大；
3) 生产力水平提高，广告越来越多，媒介易于生存和发展；
4) 生产力水平提高，科学技术进步惊人，新闻手段日益现代化。
 传播工具的物理性能决定传播工具的特点
报纸：以刊登新闻为主的定期连续向大众发行的印刷品
特点：1）记录性好，便于思考；
2）选择性强，读者可以自由安排时间和内容来读；
3）材料运用自如，不受时空限制，便于深度报道；
4）制作程序多而繁杂，新闻时效差；
5）受文化水平限制大，受众基础不如广播、电视广泛；
6）不如图像和声音逼真有感染力。
广播：以无线电波（或导线）传送的声音为媒介的大众传播工具
特点： 1) 迅速及时，时效性强；
2) 无远弗届，渗透性强；
3) 对象广泛，群众性强；
4) 一瞬即过，不易保存；
5) 顺序接受，选择性差
电视：以无线电波（或导线）传送的声音和图像为媒介的大众传播工具
特点： 1) 现场感；
2) 亲切感；
3) 简洁明了；
4) 长于动态新闻，短于深度报道；
5) 电视新闻的采访、制作、传播、接收有较高的物质技术要求。、
互联网：
特点： 1） 传播上的快捷和时间上的自由性；
2） 传播的全球性和空间的无限性；
3） 传播的多样性和沟通的交互性。
通讯社：是适应各种报纸的共同需要而产生的，可以用来补充各报通讯网的不足。
 1835年，法国人哈瓦斯创办哈瓦斯社，即为现在的法新社；
 1850年，德国人路透创办路透社，后迁往英国；
 1848年，美国六家报纸联合采访欧洲船只，成立港口新闻社，后改为美联社；
 1932年，中共在江西瑞金成立红色中华报社，1937年1月更名为新华社，1949
年确立为国家通讯社。
 受众的多元需要促使媒体多样化
报纸：
1. 从办报方针分：政治性报纸、商业性报纸、政治性的企业报。
2. 以报纸内容分：中国——综合性报纸、专业性报纸；西方——严肃的高级报纸、
大众化的通俗报纸；。
3. 以阶级属性分：无产阶级报纸和资产阶级报纸。
4. 以发行范围分：全球性报纸、全国性报纸、地方性报纸。
5. 以出版时间分：日报、晚报和周报。
中国当前的报纸可以分为：党报机关报、晚报/都市报、专业性报纸。
电台电视台：专业化发展——新闻、财经、交通、影视、戏曲、音乐、生活时尚等。
结论：①传媒的多样化归根到底还是为适应各种各样受众的需要；②传媒的任何改革，
归根到底是传媒受众矛盾运动引起的，是受众需要这一客观存在作用于传媒意识的结
果。
 反映现实生活的需要决定了新闻体裁的多样化：
报纸内容构成：新闻、言论、副刊(专版)、广告
三大报纸文体：新闻、言论、杂交品种。
广播内容构成：新闻报道、文艺节目、服务性节目、教育性节目、广告
广播新闻文体：消息报道、现场直播新闻、人物访谈
电视内容构成：新闻报道、综艺节目、社教节目、电视剧、广告
电视新闻的主要样式：消息报道、现场新闻直播、纪录片、新闻述评、新闻特写。
新闻报道的要求：三真（真实、真相、真情），三公（公开、公平、公正），三度（速
度、广度、深度）。
新闻题材由简到繁的发展规律：①受到本民族文化传统和欣赏习惯的制约；②遵循大众
新闻传播工具的特点，沿着更真实、更迅速、更深刻地反应现实变动的方向发展。③沿
着便利于读者阅读（收听、收看），更吸引读者的方向发展。
 新闻教育适应新闻事业而产生、发展
美国——1878年美国密苏里大学开设新闻专业课
1908年美国密苏里大学开设新闻学院
1912年哥伦比亚大学开办新闻学院
英国——1919年成立伦敦新闻函授学院；伦敦大学开办新闻系
法国——1924年成立里昂大学高级新闻学院
中国——1918年北京大学成立新闻研究会，聘请徐宝璜、邵飘萍为教师
1920年上海圣约翰大学开设新闻系
1924年复旦大学设立新闻学科
1929年复旦大学设立新闻系
1949年新中国设立华东新闻学院、北京新闻学院
1978年我国招收第一批新闻学硕士研究生
第七章新闻事业的性质
 新闻媒介的共性：真实地（与文学比较）、及时地（与电影、戏剧、小说、诗歌比
较）反映世界新近变动（与历史比较）的大众（与书信、情报等比较）传播工具，
属于上层建筑。新闻媒体都拥有与生俱来的公共性。
 新闻媒体公共利益至上原则包括以下要求：
1. 保障法律所保护的公众私人利益不受传媒侵犯，这主要是对公众的隐私权及青少年
的保护，不伤害社会公德，不扰乱社会公共秩序。
2. 满足公民的知情权。
3. 普遍服务原则：不分民族、不分种族、不分地域、不分性别、不论贫富、不论地位
都应该享受传媒业同等的服务。尤其是，无论是强者还是弱者，都应该在媒体上有
平等表达的机会
 新闻媒介的特性
1. 所有制方面：私营、公营、国营。
2. 与政府与执政党关系方面——
独立新闻媒介：政治上标榜客观、中立，只以国家、公众利益作为是非标准；
官方新闻媒介：代表政府、政党立场，宣传政府的施政纲领；
半官方新闻媒介：名义上是独立运作，但在重大政治问题、重要时刻往往代表政府发言，
替政府宣传。
3. 阶级性方面：无产阶级新闻媒介和资产阶级新闻媒介。
4. 办报方针方面：商业性报纸、政治性报纸、政企合一型报纸。
5. 媒介内容：严肃的高级报纸（电台、电视台）、大众化的通俗报纸（电台、电视台）。
 个性：有鲜明个性的新闻媒介往往体现在以下几个方面——
1. 以新闻报道的真实、客观、公正取胜。
2. 以新闻报道的迅速见长。
3. 以发表具有独到见解的评论为世人瞩目。
4. 以编排的新颖活泼，具有独创性显得抢眼。
5. 以社区新闻或国际新闻、或煽情新闻来显示个性的。
 新闻媒介的双重属性：新闻媒介是精神产品，既属于上层建筑；又属于信息产业，
经济领域。“事业性质、企业管理”是我国新闻事业双重属性的外在表现形式。"
事业性质、企业管理"解放了我国新闻媒介的生产力，给新闻媒介带来去多积极的
影响：
1) 新闻媒介形成积极竞争态势；
2) 新闻媒介更加注重人才培养和设备更新；
3) 新闻媒介注重受众反馈；
4) 新闻媒介注重自身管理，开源节流，发展壮大。
但同时，也带来了一些问题：
1）有些新闻媒介为争取受众，不惜降低报格、台格，传播一些低级庸俗的煽情新闻和
格调低下的节目；
2）有些新闻媒介搞有偿新闻，甚至整个版面标价出售给一家企业。
 新闻媒介的产品的商品性是不以人意志为转移的客观存在。
认识媒介产品的商业性的积极意义：
1) 既然是商品，就要考虑读者需要；
2) 考虑营销，参与竞争；
3) 就必然有价值规律在起作用。
产生问题：但是，无论从历史还是现实看，以商业原则指导办媒体，既对媒体有促进作
用，也会带来消极的后果，甚至是严重的后果。事实证明：物质产品激烈的市场竞争，
一般会使产品越来越价廉物美，而精神产品激烈的市场竞争，却往往使产品的格调降低。
应对治理：如何对待传媒的商品性，发挥其积极面，抑制其消极面是传媒治理的中心课
题。在中国“社会效益第一，经济效益第二”是党和国家领导人反复强调，必须坚持的
媒体运行的基本方针。
第八章新闻事业的功能与效果
 新闻事业的一般功能
1. 沟通情况，提供信息。
2. 进行宣传，整合社会。
3. 实施舆论监督。
4. 传播知识，提供娱乐。
5. 作为企业，赢得利润
 新闻媒介的正效应和负效应
1. 新闻媒介提供了人们所需要的信息，把整个世界呈现在人们眼前，但是新闻失实、
信息污染也干扰误导了受众。
2. 新闻媒介连接了世界，却淡漠了人际关系。
3. 丰富了知识，却降低了思考能力。
4. 改变了人们的时空观，却诱发了人们无限的欲望。
5. 促进了人类文明的发展，却污染了社会空气。
 新闻媒介的功能定位
1. 信息+宣传+赢利型：即政企合一型新闻媒体。中国各级党委机关报属于此类型。
2. 信息+赢利型：
a) 提供各种各样全面信息的。<<参考消息》<<文摘报》等；
b) 提供某一类或几类信息为主。经济信息、文化信息、教育信息等。
3. 消闲+服务+赢利型：大众化通俗媒介和节目属于此。<<太阳报》等。
4. 知识+赢利型：我国的科技报纸属这类。
5. 纯宣传型：对外广播电台都属于此类。
 新闻媒介的传播效果：指的是新闻媒介所传播的信息对受者的思想、态度和行为所
产生的实际影响。
 第一阶段：40年代以前早期强效果理论，代表理论是“魔弹论”(“靶子论”)。
 第二阶段：40年代末期-60年代的中期的弱效果理论，代表理论是有限效果论。
 第三阶段：70年代开始的适度效果理论，英国批判学派为代表。
 我国新闻事业的主要任务：是江泽民提出的“以科学的理论武装人，以正确的舆论
引导人，以高尚的精神塑造人，以优秀的作品鼓舞人。”
1) 向人民群众宣传马列主义、毛泽东思想、邓小平理论，“三个代表”重要思想;
2) 宣传党的路线、方针、政策，宣传国家法律、法令;
3) 监督党和国家工作人员;
4) 成为党和人民之间的桥梁;
5) 传播知识，提供全方位信息，做好服务工作;
6) 做好对外报道和国际宣传。
第九章大众传媒与社会
 媒介的生态环境：媒介并不是孤立存在的，它也是一种社会子系统，是社会的有机
组成部分，它的存在与发展与其他子系统存在着密切的关系。这种关系的总和即媒
介的生态环境。
媒介生态环境对媒介发展意义：
1) 决定媒介制度。
2) 决定媒介发展水平。
3) 决定媒介的改革方向和改革力度。
4) 决定媒介的运作模式和操作方式。
5) 决定媒介的行业规范、职业理念和运作方式。
媒介系统在社会系统中的作用：
1) 开发和利用社会信息资源。
2) 实现社会系统总目标。
3) 实现个人的社会化。主要体现在理解、导向和娱乐方面。
4) 促进社会整合。
当代中国传媒业新的生态环境：
1) 全球化时代——信息传播最基本的问题是话语权的争夺，新闻舆论领域交锋不断
的背后是国家利益，意识形态之争。
2) 高风险社会——传统社会中的风险，主要是各种自然灾害对人们的威胁和现代社
会产生的新的风险，诸如环境污染，气候变化以及种种社会矛盾、冲突所带来的影
响集聚在一起，形成共生高发期。无论是化解社会风险还是当灾难发生时减轻损失，
传媒都有不可或缺的作用。
3) 多元社会——在社会主义市场经济逐步取代计划经济以后，利益格局在逐步改变，
区域利益、行业利益、单位利益、个人利益，不同利益群体逐渐冒头。在这样一个
多元社会里，我们既需要宣传国家医院要求，又需要有多元意见表达，两者不可偏
废。
 大众传媒与政治
政治对大众传媒的影响：集中体现于政治制度对新闻体制的影响。媒介所有制主要由三
种形式——国有制、私有制、公有制。
政府的政治活动对大众媒介的利用主要包括：
1) 发布政治信息
2) 宣传政治主张
3) 塑造政府和政治人物形象
4) 进行舆论导向
新闻媒介对政治的作用主要体现：
1) 维护政治权利的合法性；
2) 参与政治决策：大众传媒参与政治决策的方式两种——沟通信息和影响舆论；
3) 塑造政治文化：政治文化是指关于政治体系或体系之内人们的态度、信仰和感知，
也包括关于政治目标的知识和信息；
4) 进行舆论监督：对权力的监督应包括——权力的产生过程，权力的运行状况和权
利运用的结果。
 大众传媒与经济：政治体制、经济体制以及经济发展水平、文化传统是决定大众传
媒的体制、规模和运作方式的三个决定因素。在这三个决定性因素中，经济是其中
最为活跃，也最具活力的。
现代经济对大众传媒的决定性影响：
1) 经济体制制约着大众传媒功能的发挥。
2) 经济体制决定着大众传媒的运作方式。
3) 经济发展推动了大众传媒快速扩张。
4) 经济发展为大众传媒的发展提供了雄厚的物质力量。
大众传媒对经济的促进作用
1) 收集与发布经济信息，引导生产和消费；
2) 监督市场秩序，反映社会舆论，纠正经济生活中的不公正现象和其他偏差；
3) 刊载商业广告，激活和满足消费需求；
4) 大众传媒作为一种信息产业，其自身就是国民经济不可或缺的组成部分，为本国创
造大量利税，提供大批的就业机会。
 大众传媒与文化
主流媒体呵护主流价值观：文化的核心是价值观。任何国家的文化总是多元的。在这当
中，总有一种处于支配地位的价值观，称之为主流价值观。主流价值观反映出一个国家
意识形态和社会道德的基本取向，反映出一个国家主流社会的基本意愿。主流媒体在宣
扬一个国家的主流价值观中具有无可替代的作用。
大众传媒是大众文化的最佳载体：
1) 大众媒介和大众文化对象完全一致，都是大众。
2) 大众媒介的特性契合了大众文化的内容要求。
3) 大众文化的形式多追求感官刺激，也正是大众传媒所长，特别是电影、电视的优势。
大众传媒对文化的消极影响：
1) 大众媒介限制了受众选择文化享受的自由；
2) 大众媒介削弱了文化的社会功能；
3) 大众媒介影响并控制大众的需求；
4) 文化帝国主义现象也是现代大众文化传播中值得忧虑的现象。
文化帝国主义（20世纪60年代提出）：由于传播媒介在技术、规模、经济实力等方
面的巨大差异，发达国家与发展中国家之间传播地位不平等，发达国家（尤其是美国）
有意或无意地控制或极大地影响了发展中国家的媒介系统和文化生活，由此造成了发展
中国家消极、被动的后果。
 大众传媒与国际关系
新闻媒介的国际传播主要有两方面的内容：
1) 一是对外报道本国的政治，经济，文化等社会状况，输出价值观念；
2) 二是对本国公众报道他国的政治，经济等方面的情况，以及带有综合性的国际间重
大的变动等。
“软实力”：核心是文化，一般是指一个国家依靠政治制度的吸引力、文化价值的感召
力和国民形象的亲和力释放出来的对无形的影响力。
新闻媒介影响和作用于国际关系：
1）塑造国家形象；
2）影响对外政策；
3）影响吸引外资；
4）影响对外贸易。
第十章新闻自由和社会控制
 新闻自由：公民拥有出版权、采访权和发布权。
新闻自由不是完全的绝对的自由，其必定受到特定的、具体的社会环境的制约。
出版自由绝不仅仅是报刊的专利，它决定着人们的信仰、思想自由，信息交流的自由，
人身自由。
提出：英国著名的政治思想家弥尔顿在1646年出版的《论出版自由》中提出：言论出
版自由“是一切自由中最重要的自由。”这一思想在西方各国被视为新闻自由的圭臬。
 16世纪到19世纪争取出版自由的斗争的三个时期：
1）第一时期（16-17世纪）：封建王朝采取高压政策妄图扼杀出版自由。
2）第二时期（17-18世纪）：资产阶级革命时期；
3）第三时期（17-19世纪）：为反对资产阶级政府控制，争取出版自由的斗争。
a) 出版物事先检查；
b) 取代报刊的事先检查制，各国政府
先后制订煽动法、诽谤法遏制出版
欧美资产阶级革命胜利后，以不同形式宣布出版言论自由：
英国：1689年，《权利法案》——“国王不得干涉人民的言论自由“
美国：1791年，宪法第一修正案——“国会不得制定有关下列事项的法律…剥夺言论
自由或出版自由”
法国：1789年，《人权宣言》第11条——“思想与意见的自由交换，是人类最宝贵
的权利。因此每一个公民享有言论、著作和出版自由。”“但在法律限制内，须承担滥
用此项自由的责任”
德国：魏玛共和国时期，宪法第118条“每个德国人在一般法律内，都有权通过言论、
印刷品、图画及其他方式自由发表自己的意见。”
 新闻自由是一种权利，属于人民所有，在现实生活中真正实践新闻自由权的是新闻
媒介，争取新闻自由最努力的也是他们。
为保护公众的各种权利和国家利益，必
须对其进行有效的社会控制。
 对新闻媒介的社会控制有四种正规的途径：
1. 司法控制：国家以法律来监控新闻媒介；
2. 行政控制：行政部门以各种规定，税收来控制新闻媒介；
3. 资本控制：大公司垄断新闻市场，使新来者难以介入；
4. 媒介的自律。
 新闻法规：是国家对新闻媒介实施管理的主要依据。
世界各国的新闻法规有三种形式：
1) 以立法的形式正式颁布的《新闻法》（欧洲大多数国家都采取此种形式，其特点是
法院审理案件只能服从和依据《新闻法》）；
2) 以最高法院和上级法院的判例为标准来审理案件，即判例法，而没有成文的新闻法
（如美国和英国）；
3) 有些国家并没有单独成文的新闻法，而是把新闻法规的有关条文写入《宪法》，《民
法》，《刑法》以及其他的专用法律条款中。
新闻法规所要处理的核心问题：保护新闻自由，同时防止滥用新闻自由。从而在确保国
家利益、公众利益不受侵害的前提下，鼓励新闻媒体满足公众需要，促进国家需要。
为防止滥用新闻自由危害国家和公众，各国的新闻法规对新闻报道和评论作了一定的限
制：国家安全法，诽谤法和隐私法。
第十一章新闻媒介的运行体制与管理模式
 媒介管理：指国家对媒介的管理即媒介的宏观管理，也指媒介内部的管理即媒介的
微观管理。
 世界新闻媒体的三大运行体制
以美国为代表的以私有制为主体的完全商业化运作体制的特点：
1) 以赢利作为最终目标；
2) 以收视率作为节目制作和播出的直接目标；
3) 以迎合受众作为节目策划的基本原则；
4) 垄断竞争是美国整个广播电视业运作的基本模式。
以西欧各国为代表的公私并举的双轨运作体制：
实行原因：
1）在政治上，旨在防止极少数人或少数集团垄断，控制全国舆论，有助于保持政治上
的多元化，保护西方的民主制度；
2）在经济上，公私并存，相互竞争，但“分灶吃饭”，从不同的渠道获得收益，避免
在有限的广告市场上恶性竞争，自相残杀；
3）在文化上，旨在保护传乘本民族的文化传统，尤其是公营台的存在，对保护本民族
文化，避免外来文化和低俗的商业文化的冲击，具有重要作用。
初衷：把竞争引入电视业，一方面大大丰富电视节目，满足各层次观众的不同需求；另
一方面，又对本国的政治，文化以及电视业本身不造成伤害。
出现问题：
1) 私营台的商业化操作促使电视台的娱乐化倾向，这种娱乐化倾向又“引狼入室”，
让美国的电视片尤其是好莱坞的电视连续剧充塞西欧电视台；
2) 公营台在和私营台的竞争中渐处下风。长此以往，公营台的处境不妙。
以中国为代表的完全国有的有限商业运作模式的特点：
1）电视台的所有权完全属于国有；
2）电视台是党和政府的宣传机构，即党和政府的喉舌；
3）电视台义不容辞地承担着宣传党和政府的重大方针政策的职责；
4）电视台的经费在20世纪80年代以前都由政府直接拨款。
 有限的商业运作模式：从20世纪90年代中国新闻界重新界定电视业具有双重属
性，即既属于上层建筑，又属于信息产业，从而确定了电视业“事业性质，企业管
理”的运作模式，开始了电视业在经营管理上的商业运作。但这种商业运作是在一
定的控制范围内进行的，与美国的完全商业化相比，有以下不同：
1) 节目的制作和播出只能部分而不能完全按市场需求来执行。电视台首先必须完成党
和政府所赋予的宣传任务，而且所有节目都在不能违背党和政府的方针政策的前提
下才能考虑满足受众的信息和娱乐等方面的需要；
2) 各家电视台之间有着激烈的竞争，也有“优胜劣败”的现象，但迄今还未出现“优
胜劣汰”或“优胜劣并”的现象；
3) 由于上述两方面的条件，各电视台非常看中节目的收视率，因为这和广告收入紧紧
相连。但强调“社会效益第一，经济效益第二”。
出现的问题：
1) 电视业“散，乱”现象突出，出现争办电视台的热潮，重复建设，造成巨大的浪费；
2) 节目制作一味地追求受视率，出现低俗的节目。为增加收入，硬拉广告，对社会、
经济造成负面影响。
 国家对媒介的管理：
市场准入层面：出版播出许可证；
内容层面：法律法规严禁刊发的任何内容，比如煽动暴乱，泄露国家机密，隐私，侵权
等等；
结构层面：反垄断法，严禁几家公司垄断全国媒体市场，保护公平竞争，保持观点多元。
 媒介集团化：在激烈的市场竞争中，媒介要求得生存和发展，实行媒介集团化是必
然的选择途径。
优越性：
1) 有一个总体的设计，旗下各家公司各司其职，分工协作，协同作战，实行产供销一
条龙，以最快的速度向市场提供最新的产品；
2) 它以内部的关联交易来代替市场交易，规避了市场风险，同时又减少了市场交易的
成本。
媒介集团化对新闻媒介的好处：
1) 大大提高设备的利用率。办公楼、印刷厂等各方面的设施都能得到充分利用而降低
成本；
2) 人员可以合理流动、配置，调动新闻从业人员的积极性；
3) 资金可以合理调度，把资金投入到最急需、最有效的方面；
4) 在资料、稿件组织上共享。
 广播电视频道专业化：
频道专业化：频道专业化最早从美国开始。第一个真正成功的是美国媒体巨头特纳开设
的全新闻频道CNN。
电台的频率化：电台的频率专业化大致也在20世纪80年代开始。开始，频率化是电
台在受到电视台的挤压，听众大量流失的情况下的被迫之举。90年代，电台的频率化
受到听众的欢迎，收听率开始回升。
存在问题：“两高一低”
1) 同质化过高；
要改变目前的状况，需要采取一系列举措，从体制创新，理念
2) 节目回放率过高； 更新，赢利模式改变到频道的进一步整合等等。
3) 专业化程度低。
第十二章传媒业经营
 传媒业经营的基本原则：
1. 普遍服务的原则。
2. 编营分离原则。
3. 受众中心的原则。
 传媒业经营的基本目标：争取受众，赢得市场份额，获取足够的利润。
实现方法：传媒打造自己的核心竞争力
传媒受众心目中的公信力
核心竞争力：是一家传媒超越其竞争对手的强项，这个强项就使一家传媒能占得市场先
机，或稳固地占据市场相当份额。以通俗的话说，就是一家媒体的绝活，是他人难以超
越的独家武器。
媒体的公信力：就是公众对于一家媒体的信任度和忠诚度。
培养公信力的要素：1）新闻真实、及时
2）新闻有吸引力，满足受众的需求
3）说真话，反映公众的要求、愿望
4）敢担当，勇于揭露损害国家、公众利益的不良行为和不法之徒
5）有责任心，对受众服务到位
传媒业经营的基本路径：
1. 集约化。以最小的投入获得最大的产出，这是任何经营的基本原则。
2. 专业化。主要指广播电视针对特定受众设置特定的频道、频率。
3. 跨媒体、跨行业、跨区域经营。三跨经营可以壮大自身实力，迅速占领市场，为客
户提供全方位服务。“三跨”经营的另一个优势是打造一个完整的产值链。
第十三章新闻媒介的受众
 受众：是特定的传播学意义上的概念，泛指媒介信息的接受者，在大众传播领域里，
受众指的是大众传播媒介信息的接受者。其中最主要的，是指三大新闻媒介即报纸
的读者、广播的听众和电视的观众。受众是整个新闻传播活动中最活跃的决定性因
素，制约新闻传播活动，具有广泛性、混杂性和隐蔽性的特点。
 受众观：
1. 受众是学生：定位于教育者和被教育者的关系，媒介担当的是宣传和启蒙的作用。
在特定的历史时期基于特定的社会发展需要，这种教育引导功能显得尤为重要，尤
其是在激烈的社会变革期，先进的政党、先进的知识分子往往以媒介为启迪民智的
工具。但媒介的本质属性是社会的耳目，是社会信息、交流沟通的工具，报告社会
的最新变化，因此教育是其附属功能，而非第一功能，所以这一理念只有在特定历
史时期才适用。
2. 受众是接受指挥的芸芸众生：犹如不见面的指导员、司令员。传播的内容就是指令、
命令，媒介上的内容不仅生硬，简直就是杀气腾腾。受众被剥夺了最起码的自尊，
更谈不上自由和权力了。犹如无知的“阿斗”
3. 受众是消费者：这是一切商业性媒体最容易接受也最愿意信奉的受众观。媒介等于
企业，执行利润最大化的原则，通过争取消费者，争取广告，获取最终的利润。娱
乐化成为商业性媒体的共同取向。
4. 受众是公民：这是国有或公营媒介的受众观，强调的是一种权力。把受众看成公民
以维护公民权作为媒介责任和运营基础，是现代民主政治发展和市场经济内在运作
机制在媒介观上的折射和反映。（知情权的突出）
 受众并不是消极被动的接受者，他们是积极地参与者，是整个新闻传播活动最为活
跃的决定性因素。
 受众对新闻媒介的影响：
1. 决定着新闻媒介内容的取舍
2. 决定着新闻媒介的风格定位
3. 决定着新闻媒体改革的方向和进程
4. 受众是传媒财富之源，传媒权力之源
 受众的特点：
1. 广泛性。这是指受众成员组合和地域分布上的广泛性。新闻媒介的高度开放决定了
受众的广泛性。
2. 混杂性。因为新闻媒介的受众成员广泛地分布在全社会的各个角落，就相应造成了
受众成员的混杂性特征。受众彼此之间存在着很多明显的个体差异，如身份、地位
悬殊，贫富的差距，文化教育程度、价值观念的不同等。
3. 隐蔽性。总体上，受众对于新闻媒介来说是不见面的，是一种笼统的、隐蔽的存在。
新闻媒介执行的是宽泛的大众传播，媒介和分散的受众成员很难进行直接的双向交
流，媒体也很难确知具体的受众的特征。
 中国受众的群体和群体信息需求变化：
1. 在急剧的社会变动和开放的社会联系面前，受众表现出旺盛的信息需求。
2. 市场经济条件下决策主体增加，带来受众对硬性的决策参考性信息的需求增加。
3. 受众群体分化趋势明显，新增群体涌现，造成受众信息需求的多元与分化。
 新闻媒介的受众定位：确定媒介整体和所设栏目明确的传播对象，解决向谁传播，
为谁服务的问题。包括一家媒体的整体受众定位和各个版面、频道、栏目的特定受
众定位两部分内容。功能定位和受众定位是媒介经营策划的两大支点。新闻媒介的
受众定位最关键的步骤就是在正确定位的总体指导原则（宽窄适度，范围适中）下
确定核心受众群。
 核心受众的确定主要要考虑的是以下几方面的要素：
1. 受众区域定位。地域是第一位的因素。
2. 受众职业和身份定位。
3. 受众的年龄定位。
4. 受众文化教育程度定位。
5. 性别、民族等。
 受众的权利：
1. 知情权：指公民获取有关社会公共领域信息以及与本人相关信息的权利。具体包括
政治知情权、司法知情权、社会知情权和个人信息知情权。在新闻传播领域，特指
受众通过媒介获取上述信息特别是公共生活信息的权利。知情权是现代新闻媒介的
核心问题，也是新闻传播学所要研究的核心课题之一。知情权并不是无限的，在涉
及国家安全、国防机密等方面有限定。要求现代社会政府必须加大社会公共生活的
透明度，切实保障和实现公民的知情权。
2. 表达权：又称表达自由，是指公民通过口头或书面以及特定行为表达自己意见的自
由，包括言论自由、著作自由、出版自由、新闻自由等。在新闻传播领域，主要指
新闻媒介的表达自由和受众通过新闻媒介表达自己意见的权利和自由。对于受众而
言，则进一步细化为受众在媒介上的表达权。受众作为公民的表达权既有保障，又
有限制，任何表达自由须在法定范围内。媒介表达自由与受众表达自由有时也面临
极大冲突。
3. 批评建议和监督权：①受众通过和借助新闻媒介对政治、经济、文化等各公共领域
内的部门和各项活动依法形式批评建议和监督的权利，即受众借助媒介行使舆论监
督权。②受众针对新闻媒介的活动所行使的批评建议和监督的权利。
 受众地位的新变化：
1. 受者既是信息接收者，也是信息生产者、传播者。
2. 受众从被动接受信息到按需主动搜索信息
3. 受众从被传媒指导到传媒被受众指导
第十四章中国新闻事业的工作原则
 中国新闻工作五项基本原则：真实性原则、指导性原则、群众性原则、战斗性原则、
党性原则。
 新闻真实性：指的是在新闻报道中的每一个具体事实必须合乎客观实际。即新闻报
道中的时间(when)，地点(where)，人物(who)，事情(what)，原因(why)和经过(how)
都经得起核对。新闻报道的真与假的判断标准只有一个——是否符合客观存在。
坚持新闻真实性是新闻工作的起码要求，也是最高要求，是新闻工作的第一信条。
坚持新闻真实性的重要性
真实是新闻的生命。坚持新闻真实性是新闻工作的起码要求，也是最高要求，新闻必须
真实，这是新闻工作的第一信条。
 新闻失实
1) 无中生有，凭空捏造；
2) 添枝加叶，层层拔高；
3) 要件残缺，隐瞒事实；
4) 偷梁换柱，移花接木；
5) 因果不符。
新闻失实原因：
1) 非故意性失实（没有主观故意，原始材料失实）：在采、写、编新闻过程中、作者
并没有察觉到自己报道的事实与实际情况不符。——这种失实多半是由于记者在
采访中获得的原始材料失实造成的。有的采访不深入，以讹传讹，造成失实。
2) 故意性失实（主观失实）：明明知道自己所写的新闻与实际情况不符，却明知故犯，
造成新闻失实。——原因比较复杂，有新闻队伍内部的问题，也有社会原因：①
有些地方，有些部门党风严重不正，个别领导人想利用新闻来自我吹嘘，骗取荣誉；
或掩盖劣迹，欺上瞒下；②记者，编辑队伍中的作风问题是造成新闻失实的突出原
因。有些记者心浮气躁，急于成名，不惜弄虚作假博取知名度；有些记者怕苦怕累，
不深入实际，靠电话、道听途说、想象编造故事；③面对日趋严重的作假，无论是
党政主管部门还是新闻单位对此处理的轻描淡写，也助长了这股歪风；④这和传媒
业竞争逐年激烈有关。为了吸引更多的眼球，许多媒体不辨真假，以“新奇”新闻
刺激读者。同时，网络新闻的崛起也为新闻失实推波助澜。
新闻失实呈现的特点和趋势：一新闻失实趋向常态。二故意性失实的比例增大。三新闻
失实入侵公共领域。
 炒新闻：无中生有，小题大做，以假乱真，以耸人听闻的新闻混淆视听。炒新闻的
背后，必有个人或小团体的利益驱动。
 合理想象：是从已知的事实去推测记者没有采访到而可能发生的“事实”，并作为
事实来报道。（批判：新闻是事实的报道，以已经发生，正在发生的事实为依据，
不允许以可能发生，将要发生的事实为“依据”；以已知的事实去推测可能发生的
事实，这是逻辑推理的任务，而这种推测也只有在得到事实证明后才能成立；用想
象来写作是文学的创作方法，不能用在新闻上。如果“合理想象”可以成立的话，
记者就可以凭他的主观想象来写作，人们就无法核对事实，就很难保证新闻真实。
 扩大宣传效果：对新闻中的事实添油加醋，追求事实的“完美”，借以“扩大宣传
效果”，不管是处于天真的想法还是为弄虚作假作遁词，都是不能容许的。
后果：一是立即被揭穿，直接地败坏党的宣传工作的声誉；一是人们暂时被迷惑，收到
一时的效果。但隐瞒总不能持久的，一旦真相大白，上当受骗的人就会更加失望和愤慨，
人们只要上当受骗一次，就会对今后的宣传产生防范心理，这种戒心很难消除，千百次
次的真实就会被一次失实所败坏。所以靠弄虚作假来扩大宣传效果，其效果适得其反。
要收到真正的宣传效果，唯一的办法就是采取老老实实的态度，坚持真实，坚持真理，
才能赢得人心。
 新闻事业的群众性
1. 内容上：新闻事业应该尽量满足群众的需要；
2. 工作路线上：新闻工作应该走群众路线，坚持全党办报，群众办报；
3. 形式上：新闻和评论的表现形式应该尽量为群众所喜闻乐见。
第十五章新闻选择
 新闻选择：对现实生活中发生的事实加以鉴别，并选出新闻媒介值得传播的事实。
新闻的采、写、编、评都与新闻选择密不可分。新闻选择是新闻学全部知识、新闻
工作经验和其他社会科学、自然科学知识的综合运用，是新闻工作中最重要的工作
之一。
采访——是不断挑选事实的过程；
写作——是重新挑选事实的过程；
编辑——是再一次审视、挑选事实的过程。
 新闻敏感：就是迅速判断事实价值的本领和善于选择事实的本领。
 新闻选择的标准：新闻定义、新闻价值、宣传价值、新闻法则是新闻选择的四项主
要标准。该标准要和各新闻媒介的具体实践相结合。
新闻定义：新闻是新近发生的事实的报道。我们所选择的事实一要真实，二要新鲜，所
以要淘汰虚假的事实、陈旧的事实、人们司空见惯的事实、空话连篇的事实。
新闻价值：新闻价值就是事实本身包含的引起社会各种人共同兴趣的素质。
1) 时新性：事件发生离公开报道的时间越短，价值越高。
2) 重要性：事件和当前社会生活以及广大群众的切身利益有密切关系，势必引起人们
的关系。
3) 接近性：地理上的接近、心理上的接近
4) 显著性：名人胜地和著名团体单位的动态往往为世人所瞩目。
5) 趣味性：奇事趣闻，富有人情味和高尚的生活情趣、能引起人们感情上的共鸣。
注：一个事件只要具备了时新性再加其他任意一性，就有成为新闻的可能；一个事实具
备的素质越多，新闻价值就越高。
宣传价值：就是事实本身所包含的有利于传播者、能够证明和说明传播者主张的素质。
宣传素质内容包括：
1) 一致性：与新闻媒介所持的政治主张、价值标准的一致性；
2) 针对性：针对社会上的各种猜测，怀疑，歪曲，流言，选择事实进行有的放矢的宣
传。针对性越强，宣传价值越大；
3) 普遍性；事实中所包含的思想观点对广大受众具有普遍的教育意义、指导作用。
4) 典型性；
5) 时宜性。
新闻法规：是新闻选择的最后一道关口，目的是“去毒”即新闻的选择必须将危害国家
或者人民的利益的新闻卡下，不许公开传播。一般由国家立法机关制定，对新闻事业具
有强制性。
 新闻选择的过程：
新闻来源→新闻定义→新闻价值→宣传价值→新闻法规→新闻写作→版面组织→受众→社会效果
 新闻选择的标准要和各新闻媒介的具体情况相结合：
1．在一个国家内，新闻法规是同一的标准，各报台不准违背。
2．不同类型报、台出自各自情况，承担任务不同，宣传价值和新闻价值在运用时不同。
第十六章新闻从业人员的专业理念，职业道德和修养
 新闻业对现代社会的稳定、发展提供了强有力的支撑：
1. 新闻业为社会总系统的有效运作提供信息支持
2. 新闻业作为现有社会制度的一部分，倾向于维护既有的社会秩序
3. 新闻也还在促进整个社会系统进步和发展上发挥着重要作用
 新闻专业理念是确保新闻业对整个社会的稳定、发展发挥有效功能的一种保障，也
是新闻业赖以在整个社会系统中立足的保障。
新闻专业理念：新闻媒介必须以服务大众为宗旨，新闻工作者必须遵循真实，全面，客
观，公正的原则。
新闻专业理念的基本出发点是：新闻事业是社会公共事业，必须为公众服务，新闻从业
人员必须承担起社会责任。
对新闻专业理念干扰：政治压力、市场压力。
 新闻工作者的职业道德（自律）：
1. 职业理念——这涉及新闻工作的宗旨，即“为什么”，“为谁”从事新闻工作。
联合国《国际新闻道德信条》提出了为公众利益服务的理念。《中国新闻工作者职
业道德标准》则要求新闻工作者全心全意为人民服务。
2. 职业态度——新闻工作必须严肃，谨慎，认真，踏实。
3. 职业纪律。“只用公平的方法获得新闻、照片和资料”“对秘密获得的新闻来源，
将保守职业秘密”
4. 职业责任——竭尽一切努力，以确保新闻的真实，全面，客观，公正。
 中国新闻事业对新闻工作者的基本要求：
1. 热爱党和人民，热爱党和人民的新闻事业，有在新闻岗位上为宣传真理、捍卫真理，
为维护党和人民的利益忘我奋斗的献身的精神。
2. 有一定的马列主义理论水平，十分熟悉党的方针政策。在现阶段，新闻工作者要熟
知"三个代表"重要思想，自觉宣传"三个代表"重要思想。
3. 乐于深入实际，善于和群众打成一片，切实践行"三个代表"重要思想。
4. 有较宽广的知识面和一定的专业知识。
5. 熟练的新闻业务才能；
第十七章中国的新闻改革
第一次跨越（1979年——1982年）：高扬新闻规律的旗帜，否定“阶
级斗争工具”论，重新恢复报纸作为“新闻纸”的本来面目。
第二次跨越（从1983年开始）：引进信息概念，导致新闻媒介功能的重
 30年的四次跨越 新定位，从而引发新闻媒介的巨大变化。
第三次跨越（在1992年后开始）：重新认定新闻事业性质，带来了新闻
事业发展的新思路，这次是对新闻事业只属于上层建筑范畴的跨越——
“事业性质，企业管理”。
 新闻改革的基本特点
1. 从自发走向自觉——中央掌握改革主导权；
2. 从观念更新走向制度创新——制度创新成为新闻改革的主动力；
3. 从边缘突破走向中心突破——新闻报道成为新闻改革的主攻目标；
4. 从增量改革走向盘活存量——中国党报打造主流媒体。
 中国新闻媒介的走势
1、制度架构——从人治走向法治。
2、竞争格局——从相对自由竞争走向垄断竞争。
3、媒体运作——从传者为中心走向受者为中心。
4、受众兴趣——从雅俗共赏走向雅俗分赏。
6、媒体运作——从单一媒体走向媒介融合。
5、新闻理念——从新闻学走向大众传播学。

第一章 网络媒介的演化
第一节 连接的进化及其驱动的网络媒介升级
“媒介”一词通常有两个侧重点：一是强调传播主体，一般指传播机构；二
是强调大众传播属性。
互联网的本质是“连接”。
一、互联网诞生时期：机器-机器连接的实现
为达成计算机可以通过任一路由而不是固定路由发送信息，提升安全性与
稳定性，阿帕网采取“分布式”结构，为互联网成为一种“去中心化”的、分
权的新兴媒体奠定了基础，这种分权结构因此被蒙上了一层乌托邦的神秘色彩。
二、Web 1.0时代：内容-内容连接的实现与互联网的媒体化
搜素引擎的基本形式：1、网络蜘蛛型搜索引擎（简称搜索引擎），如，Google；
2、基于人工分类目录的搜索引擎（简称分类目录），如，Yahoo！
三、Web 2.0时代：人-人连接的发展与社会化媒体的兴盛
Web 2.0 指允许用户广泛参与网站的内容建设和交互的技术，整体指由用户
主导生成内容的互联网应用模式。以人为中心，而不是以内容为中心。
与Web2.0 相关的概念：自媒体（wemedia），UGC（user generated content），
公民新闻。
1. UGC （User Generated Content,用户生产内容）：也有人称为 UCC （User
CreatedContent）。那些由网民上传图片、视频、音频等内容的网站被通称为 UGC
网站。美国的 YouTube 网站被认为是 UGC 网站的早期代表。
2. 公民新闻：一是强调公众在新闻报道活动中的参与；二是强调新技术对于公
民新闻发展的作用。对于公民新闻活动的认识，不能局限于新闻的发布或传播这
个层面，而应该把公民的各种新闻信息生产行为综合在一起考察，包括新闻的采
集、发布、整合、传播，也包括与之相关的评论和其他活动。
3. 社会化媒体（social media）的主要特征：
1、内容生产与社交相结合。社会关系的需求促进了社会化媒体平台上的内
容生产，反过来，这些平台上的内容也成为联结人们关系的纽带。
2、社会化媒体平台上的主角是用户，而不是网站的运营者。
四、移动互联网时代：移动终端的发展及连接的升级
（一）从 1G到5G：手机通信技术的发展
1、1G时代——模拟手机时代
2、2G时代——GSM（global system mobile communication，全球移动通信系
统）数字网络时代
3、3G时代——宽带移动网络时代
4、4G时代——高速移动网络时代
5、5G时代——大连接时代
（二）从功能手机到智能手机：手机终端的发展
（三）从平板电脑到可穿戴设备：移动终端的多元发展
电子书、电子纸、眼镜式终端、头戴式终端、智能手表
（四）从通信工具到综合平台：移动应用的发展
（五）从二维到三维：移动体验的发展
VR、AR、3D技术
五、智能传播时代：人-物连接、人-机连接、虚-实连接共同推进
（一）万物互连与人-物互连
物联网（the internet of things）技术指通过射频识别、红外感应器、
全球定位系统、激光扫描器等信息传感设备，按约定的协议，把任何物品与互
联网连接起来进行信息交换，以实现智能化实别、定位、跟踪、监控和管理的
一种网络。IPv6和云计算是物联网的关键基础技术。
IPv6：是下一代互联网甚至下一代移动网络的基本协议，它将大大的提高下
一代互联网的地址容量。当地址资源不再是问题时，人们可以想象到的一些东西
被连在网上才成为可能，这也为万物互联提供了基础。
云计算指的是将庞大的计算处理任务自动分拆成多个较小的子任务，然后把
这些任务分配给由多部网络服务器所组成的系统进行处理，并将处理返回给用户。
目前的云计算进一步发展成了一种商业概念，它的目标是将网络中的服务器作为
一种共享的资源，用户可以随时获取按需使用这些资源；让网络中的某些功能强
大的服务器为用户共享。云计算可以将许多过去需要依赖个人终端完成的工作转
移到网络中，由网络提供的各种基础设施来完成，终端本身的性能要求由此下降，
这是万物联网的另一个基础。它也可以完成物联网中海量的数据处理和分析任务，
这也是物联网价值开发、服务模式开发的前提。
物联网的作用领域：
1、智能家居设备构建新传播系统
2、智能汽车与车联网构建新的移动传播
3、人-物互连建构新的用户系统
4、人-物互动创造新的传播
（二）人机协同、人机传播与人机共生
（三）虚实交互、虚实融合的“元宇宙”设想
元宇宙（metaverse）一词出自尼尔·斯蒂芬森 1992 年出版的科幻小说《雪
崩》，根据全国科学技术名词审定委员会的界定，元宇宙是人类运用数字技术
构建的、由现实世界映射或超现实世界、可与现实世界交互的虚拟世界。
第二节 传播渠道的变迁及其引发的模式变革
一、 网络公共信息传播渠道的变迁与扩展
（一）门户网站、资讯客户端：编辑把关+大众化推送
（二）搜索引擎：多元搜索+算法调度
（三）社会化媒体：人际网络+大众传播
（四）个性化推荐平台：个性分析+算法匹配
（五）视频和VR/AR平台：临场体验+社交传播
（六）服务类平台：生活场景+资讯推送
（七）智能助理：跨平台+场景化分发
二、 渠道变迁中的传播模式变革
（一） Web1.0 时代的“大众门户”模式
Web l.O 时代，以 Web 网站为主要平台、以网站的内容为核心的传播模式，
可以称为[大众门户模式]。这个模式是传统大众传播的“点对面”模式的延续。
特点：
1、 网站通过内容来聚集用户：网站扮演着互联网传播中心的角色。网站以内容
聚集用户，由此带来流量。
2、 网站是传播的控制者：网站与网民（传播者与受众）的地位是天然不平等的。
3、 网站提供的是无差异化服务
4、 网站内容的传播效果测量手段有限：网站的竞争主要体现为用规模的竞争。
5、 整个互联网传播呈现出越来越浓重的“中心化”倾向
整个互联网最终会集中在某几个强势的门户网站上，这些网站就是传播的中心。
（二） Web2.0 时代的“个人门户”模式
特点：
1、每一个节点成为一个传播中心：每个节点都具有内容生产的可能性，网络中
的内容生产可以是由多个节点共同参与的分布式生产。
2、 关系成为传播渠道：信息是沿着人们的社会关系网络流动的。节点的社会关
系（即“社会网络”）成为信息流动的渠道。传播是“以人为媒”的，关系渠道
的数量与质量直接影响着的流动广度。传播者之间的竞争，开始转向用户“关系”
的争夺。
3、 社交和分享为传播动力
4、 个性化信息服务得以实现：“与以往的信息解构与重构的思路不同，web2.0
着重点在用户群的解构与重构。经过现实社会过滤和筛选后，由真实的个人和真
实的社会关系组成的信息网络自动承担了网络信息的选择、过滤、传播和互动任
务，使得信息与用户之间的相互匹配过程更自然，更精准，更智能，更高效。”
5、传播路径易于观测
6、传播是多层级的：“裂变式”传播，每一次信息传播，都可能导致信息的变
形。
7、整个传播格局呈现出去中心化一再中心化的局面
去中心化：每一个传播者的起点是相对平等的。
再中心化：“个人门户”同样会加速网络话语权力的分化，最终出现新的权
力中心。
“个人门户”时代的到来，并不意味着“大众门户”或专业媒体价值的丧失。
尽管信息消费的个性化是一个趋势，但过分个性化的服务，会削弱大众媒体进行
社会整合的功能。“大众门户”未来的重要价值是传递社会的公共信息和公共价
值，成为个体间连接的纽带，成为整合社会的重要力量。因此专业媒体要在这样
的时代立足，就需要充分认识关系与社交在信息传播中的重要作用，并适应以关
系网络为基础的新的传播模式。
（三）智能时代的“算法分发”模式
在算法专家看来，算法是一种有限、确定、有效并适合计算机程序来实现的
解决问题的方法，是计算机科学的基础。通俗地说，算法可以看作是用计算机程
序实现的、基于数据分析、面向特定目标的一套指令或方案。
个性化推荐算法分类：
1、协同过滤，即根据用户兴趣的相似性来推荐资源
2、基于标签的方法，即通过分析用户的标签偏好、物品的标签特征，基于二者
的相似性为用户进行推荐
3、社会化推荐，根据用户之间的社会关系信息构建社会关系网络
4、基于深度学习的算法推荐，通过建模用户的历史序列来预测用户的下一个动
作、挖掘用户的背景信息以进行更全面的推荐
第三节 网络时代媒介观的多元化和媒介的新体现
一、万物皆媒：媒介观的多元化
万物皆媒意味着对“物”本身属性的重视。推动传播物质性转向的学术动力
主要来源：
以物为中心、以物为基础的哲学研究
以物为中心的心理分析
美学的视角
“具身”视角
辩证唯物主义和历史唯物主义视角
1、身体
具身传播逐渐成为研究热点，其核心是肯定身体在信息流动与接受过程中的
物质论地位。
2、空间
空间作为一种特殊的“物”，在今天也被赋予了更多媒介与传播的意涵：一
方面，空间是人与人相遇、交流的媒介，是连接各种社会活动、社会系统的媒介；
另一方面，空间（包括建筑等）本身也传达着符号意义。
二、新“中介者”与新“建构者”：新媒体时代媒介的新形态
（一）作为媒介的硬件
硬件不仅承担着连接的功能，也塑造着使用场景与使用行为。如，电脑、手
机、智能家居……
（二）作为媒介的软件
不同软件的功能、风格和定位会吸引不同的使用者，软件本身可以充当连接
相似人群的纽带，在此基础上形成的社区更会加深人群内部的互动。
（三）作为媒介的“链接”
超链接或人们通常简称的链接，是网络内容与内容中间的一种中介，实现了
内容的关联与重组，也在某些方面改变了内容呈现的方式。
链接将信息或知识体系网状化，在这种网状化体系的建构过程中，阅读者自
身的作用也在加强。
“链接”这一媒介，在一定程度上影响着人们的信息与知识体系构建，影响
着个人历史记忆的构建，也会影响到人们社会关系的构建。
（四）作为媒介的“码”
近些年出现的二维码，也成为各种对象的连接中介，特别是现实世界与虚拟
世界的连接。二维码也推动了货币的数字化。这些码的出现也反映出社会管理思
维与模式的变化。
（五）作为媒介的数据与算法
1、数据
数据可以连接起实体与他的虚拟映射对象，数据不仅是实体的虚拟化结果，
也体现着实体与虚拟对象的具体映射维度或模式。
数据也标识着各种对象的属性并以此“归类”，相同属性的对象被连接为“同
类”，对于人群也是如此。
数据勾连并外化各种关系，这种外化也使得各种关系原来所具有的丰富内涵
被简化。
2、算法
算法是人与人的媒介。
算法可以揭示那些隐藏的甚至人自己都没有意识到的关系，也可也进行关系
的延伸，与数据一样，算法也成为连接共同体的一种纽带。
算法是人与客观世界之间的媒介。
（六）作为媒介的智能交通工具
查尔斯·库利在1894年发表的博士论文《运输理论》中提出“传播作为观
念运输组织”的观点，并以时间-空间和物质-精神两个维度将传播分成四种机制：
物质空间传播，如交通运输；物质时间传播，如物品的储存；精神空间传播，如
手势、演讲、书写、印刷等；精神时间传播，如作为记录与保存手段的书写与印
刷。
（七）作为媒介的人
人的媒介意义可以从两个主要层面进行观察：一是身体，二是身体与思维、
行为等活动构成的人的整体。
身体作为基础设施媒介，是一种第一维度的媒介，是先于、支撑和揭示所有
其他媒介的“元媒介”（meta-medium）。
第二章 网络重构的传播
第一节 可供性视角下网络推动的传播变化
可供性（affordance）这一概念来自美国学者吉布森，指的是环境所能给
予动物的相对于其行为机会的信息，他主要用这一概念来讨论环境与动物之间
的关系。关于可供性的共识，即对可供性的研究不只是对环境单方面的考察，
而更多是对环境与动物关系的一种综合分析。
一、分权-再集权-权力中心更迭：权力维度的可供性变化及其影响
权力分化是新媒体环境下传播权力“可供性”变化的一个重要表现。
二、重构、新生产与冲突：空间维度的可供性变化及其影响
（一）信息消费与生产空间的重构
1、信息消费空间的重构
（1）从无差异的“广域空间”向流动的“微空间”的转变
（2）“共享性”空间被“私人化”空间逐步瓦解
2、信息生产空间的重构
信息生产空间既表现为生产者所处的空间，也体现为生产内容所涉及的空间。
网络促成了信息生产空间的开放与平民可达性，这是重构生产空间的首要表
现。
（二）多重数字空间的生产
1、作为赛博空间的数字空间
赛博空间起源于加拿大小说家威廉·吉布森的科幻小说《神经漫游者》，在
研究者眼中赛博空间的主要特点包括：
1）人们的直觉可以摆脱物质身体的束缚，在赛博空间独立存在和活动
2）赛博空间可以突破物理世界的限制而穿越时空
3）赛博空间由信息组成
4）人机耦合的电子人在赛博空间获得永生
2、现实与虚拟关系交织的数字化社交空间
网络中的社交很多也是淡化了空间概念的社交，在这样的社交平台，世界按
照拓扑关系——关于连接和节点的结构关系——而不是地点来理解。
3、作为“拟态”地理空间的数字空间
拟态空间也是一种空间再造，它不仅在数字空间中形成了不同地理空间的落
差，也反过来影响现实地理空间获得注意力与资源。
4、虚实空间相融的数字空间
虚实相融的新空间会进一步消解现实与虚拟空间的界限，使人们的空间感知与认
识、体验发生变化。
（三）空间交织下的冲突
空间冲突常见的表现之一是今天已经司空见惯的“在场的缺席”，网络带来
了公共空间与私人空间的界限模糊。
三、私人化、分化、交叠：时间维度可供性的变化及其影响
（一）私人化“媒介时间”出现
媒介广泛渗透到日常生活的现代社会中，人们往往会感受到两种时间：1、
现实时间 2、媒介空间在进行内容呈现时所建构的时间，这种人为安排的时间与
现实有关联，但未必是同步的。
（二）媒体时间与用户媒介时间的分化
主要体现：
1、信息生产与信息消费的“时态”分化
2、媒体的时间规程与用户的媒介时间规程的分化
（三）多重时间轴、多道任务与多种时间策略的交叠
来自移动终端的多道任务的并发处理，人们因此常处于“多线程”模式。
四、设备、数据、内容：资源维度可供性的变化及其影响
五、从连接到连通/断连：关系维度的可供性变化及其影响
（一）内容与内容的新关系：超链接的应用
（二）人与内容的新关系
内容成为人们建构自我，以及建构与他人、社会环境关系的重要方式，内容
促成了人与媒介、社会更广泛的连接。
“断连”的主要体现：
1、内容过载带来的人们对内容的抗拒，也就是人对内容的主动断连
2、碎片化内容造成的人对事实全貌或信息整体认知的缺失，这是一种被动
的认知断连
3、个性化信息分发带来的人与某些类型信息之间的断连，以及人们对他人、
其他群体或整体社会环境了解的缺乏，这种断连既具有被动性也兼具主动性。
（三）人与人的关系发展
网络中人与人的关系发展，需要以连接也就是关系链条的形成为基础。网络
中人与人连接关系的形成，不仅仅是人们主动选择的结果，有时也是技术建构的
结果。
（四）人与服务的新关系
在人与服务的关系中，数据成为一种重要的连接、匹配纽带，也成为提高服
务精确度的依据。另外，这种数据也会强迫人与平台、数据服务商接受他们不愿
意建立的连接。
六、文本-多媒体-沉浸式体验：体验维度的可供性变化及其影响
技术的发展有可能使沉浸式体验环境兴起，推动体验维度的创新，包括触觉、
位置感知甚至嗅觉等新的身体体验会被激发。
第二节 网络驱动的传播形态与要素变革
一、网络中人际传播的演变
（一）网络中人际传播的特点
1、传播的中介性及技术、平台依赖性
2、交流对象的广泛性与可控性
3、交流手段的多样性与可选择性
4、传播情境的虚拟性
5、传播策略的选择性与差异化的增强
6、传播过程的多线程可能
（二）网络中的人际传播对现实人际关系的影响
网络时代的一种社交现象是，人们越来越多地愿意以线上的方式进行交流，
包括与强关系的交流。
通过虚拟空间来和他人互动，可以选择性的接受对方的有用、有趣之处，将
其他自己不感兴趣的部分剥离出去。
线上交流也可以让人们动用各种方式进行表演和“印象整饬”，以更好地塑
造网络形象。
【印象管理(Impression Management，也译为“印象整饰”)】也是戈夫曼
提出来的一个概念，它是指个人试图影响他人对自己印象的现象与过程，也就是
对自我形象的管理。印象管理与表演，是一枚硬币的两面。
网络人际互动中的表演出于以下两个目的：
1. 在熟人关系互动中，打造有利于获得情感支持、社会信任与社会资本的
个人形象。
2. 在陌生关系互动中，塑造一种自己希望扮演的角色。
在网络人际传播中，人们用来进行表演与印象整饰的主要手段包括以下五种：
1. 头像与昵称设置
2. 角色设定与扮演
3. 自我披露策略
4. 交流手段选择
5. 情绪表达与控制
二、网络中群体传播的发展
（一）网络群体的两个层面：封闭性群体与开放性群体
群体的概念有广义与狭义之分。广义上的群体，指一切通过持续的社会互动与社会关系
结 合起来进行共同活动，并有着共同利益的人类集合体；狭义的群体，指由持续的直接的
交往联系起来的具有共同利益的人群。
群体的特征:(1)有明确的成员关系;(2)有持续的相互交往;(3)有一致的群体意识和规
范;(4)有一定的分工协作;(5)有一致行动的能力。
群体传播就是将共同目标和协作意愿加以连接和实现的过程。群体传播的过程形成群体
意识和群体结构，而这种意识一旦形成，又反过来成为群体活动的框架，对个人成员的态度
和行为产生制约。
群体意识就是参加群体的成员所共有的意识，它包含几个方面:(1)关于群体目标和群体
规范的合意;(2)群体感情;(3)群体归属感。
群体规范指成员个人在群体活动中必须遵守的规则，在广义上也包括群体价值，即群体
成员关于是非好坏的判断标准。
网络中的群体一般有两种。一种是在现实世界已经存在的，它通过网络来发展群体成员
间的关系。而另一种则是通过网络形成的新群体。
封闭性群体符合传统的侠义的群体界定，有持续的、直接的互动，有明确的成员关系，
有一致性的群体意识和规范，并且有一致行动的能力。
开放性群体成员未必有群体意识，但他们也会形成相互的影响，有时甚至产生一致的行
动能力。他们只是在某个目标或行动下被激活，一旦行动完成，群体也就消失。
（二）封闭性群体传播的影响因素
1、社区结构
圈式结构：使社区边界明确，社区成员有较明确的身份意识，社区成员作为
一个集体进行的交往比较多，成员对社区的归属感更容易形成，这种结构更有利
于群体的形成。
2. 成员关系
网络中的群体传播，往往是在一定的成员关系影响下展开的，个体对于某一
事物的态度与意见的形成，不单纯取决于个人的既有倾向，在很多时候还取决于
权力中心以及其他成员的态度。
网络群体的内部关系一种是自然选择机制形成的，一种是通过现实中群体权
力关系的集成或重新赋权形成的。
3. 群体认同与群体承诺
群体认同(Group Identity)也可称为“群体归属”，它是指群体成员从群体
活动中得到某种程 度的需求满足而对群体的认同。
群体承诺(Group Commitment) —般是指个体认同并卷入一个群体的强度。
它不同于任何人进入组织与组织签订的工作任务和职业角色方面的合同，而是一
种“心理合同”或“心理契约”。
群体承诺的取向：
（1）情感取向：对群体怀有强烈信念和价值认定；愿意为群体利益付出努
力；有强烈的保持群体成员资格的愿望（意愿、情感性承诺）
（2）工具取向（需要、继续性承诺）
（3）规范取向（应该、规范性承诺）
4. 群体心理
群体心理包括社会助长作用（增强简单行为，削弱复杂行为）、社会懈怠、
去个体化、群体极化等
网络群体成员的交流频率、交流深度往往高于传统的群体成员，这会使网络
群体成员间的相互影响加深。结构的因素、个体对群体的归属感的因素等，使网
络中的群体压力和群体心理对个体产生影响。
（三）开放性群体的传播要素
1、社会网络：群体传播的基础结构
链式结构：网络社区由关系链条或纽带生成，最终这些纽带编织出复杂的成员关系网络。
社区是动态的，可以不断扩展，呈现出多变的状态。
链式结构较为松散、灵活，群体意识较难形成。既有强关系链条，又有弱关系链条。
新型社区规模不是固定的，而是处于动态变化中的。不同的时机和条件下激活的节点数
量不同，形成的社区规模也就不同。
这样一种新的成员结构方式，可以用社会学的社会网络理论来解释与分析。
在社会学中，社会网络(Social Network)指的是社会行动者(SocialActor)
及其间关系的集合。也可以说，一个社会网络是多个点(社会行动者)和各点之间
的连线(行动者之间的关系)组成的集合。社会网络研究者正是通过分析行动者之
间的关系、网络结构对行动者及其关系的影响力来研究各种社会现象的。
社会网络是以个体即社会行动者为起点而形成的。这涉及两个要点：其一，
个体是如何形成与发展自己的关系网的，个体间的关系网是如何连接成一个复杂
的社会关系网络的;其二这种网络中的关系与结构是如何作用于个体的。
2、焦点议题：群体传播的起点
议题的形成环节：
1）公共议题出现
2）传播力量汇聚
3）共同“投票”
3、权力中心：群体传播中的关键节点
意见领袖对于群体传播的影响主要体现：
1）作为强势内容起源作用
2）作为信号放大器作用
3）作为流向调节阀起作用
4）作为意见气候营造者起作用
4、节点激活：群体传播的扩散
个体节点能否被激活，既与传播内容公共价值大小相关，也与内容与个体私
人化诉求的契合度相关。
5、自组织：群体传播的协同机制
从系统论观点来看，“自组织”是指一个系统在内在机制的驱动下，自行从
简单向负责、从粗糙向细致的方向发展，不断地提高自身的复杂度和精细度的过
程。网络平台中的自组织主要有常态性和临时性两种。
三、网络中组织传播的扩展
组织是指人们为了达到某种共同目标，将其行为彼此协调与联合起来而成立的社会团体，
组织是为了实现一定的组织目标而设置与成立的。
结构特点：(1)专业化的部门分工;(2)职务分工和岗位责任制;(3)组织系统的阶层制或
等级制。
组织传播是指组织所从事的信息活动，它包括组织内传播和组织外传播两种。
组织传播的功能包括内部协调、指挥管理、决策应变、达成共识。
组织传播的渠道包括以下三种：
(1)下行传播，即有关组织目标、任务、方针、政策的信息，自上而下地得到传达贯彻。
(2)上行传播，即下级部门向上级部门或部下向上司汇报情况，提出建议、愿望与要求的信
息传达活动。
(3)横向传播，指组织内同级部门或成员之间互通情况、交流信息的活动，其传播是为了相
互之间的协调和配合。
（一）网络与组织内传播
内联网传播是在一个组织内部使用互联网技术实现通信和信息访问的方式。内联网是组
织人员和信息的集成机制。
内联网传播的影响：
1. 内联网改变了传统的组织结构
内联网的最大优势是实现了信息的共享。使组织的结构从“金字塔式”演变成“网络式”。
主要目标是共享信息。
2. 内联网改变了组织成员的交流方式
3. 利用内联网或其他现金技术进行组织传播，有可能导致成员关系的变化
4. 利用内联网来实现组织传播，使虚拟办公成为可能
（二）网络与组织外传播
互联网是实现组织外传播的一种重要方式。组织外传播主要包括以下两种。
其一，组织的信息输人活动。组织的信息输人活动是组织为进行目标管理和环境应变决
策而从外部广泛收集和处理信息的活动。
其二，组织的信息输出活动。宣传活动是现代组织的信息输出活动中的一个主要内容。
宣传活动包括公关宣传、广告宣传和企业标识系统(CIS)宣传。
网络时代组织的对外传播特点：
1）组织拥有了对外传播的直接渠道与传播主动权
2）每一个组织成员都可能成为传播者
3）组织传播与大众传播的界限开始淡化
4）组织传播成为公共传播的重要部分
四、网络中大众传播的变革
1、传播者：职业性主体与非职业性主体的共存
2、传播内容：多元动机、多元价值内容的混杂
3、传播渠道：多重渠道、多重模式的复合
4、用户：异质性与能动性的凸显
主要表现：
1）用户在信息生产方面所表现的能动性
2）用户在信息消费方面所表现的能动性
3）用户作为信息传播渠道所表现的能动性
4）用户与内容生产者的互动所表现出的能动性。
5、传播效果：不确定性增加
五、多形态融合下的网络传播及其特征
（一）融合性：网络传播的新常态
各种传播形态与形式相互交织，使网络传播的具体过程与结构变得格外复杂：
传播既可以是点对面的，也可以是点对点的；既可以一级传播，也可以是多级传
播；既可以是同步传播，也可以是异步传播。
（二）网络传播的基本要素及特征
1、传播的基础结构：连通的网状结构
2、传播网络的权力中心：“枢纽”
3、传播的主体：动机多元、权力分层的节点
4、信息文本：具有“活生命”的内容
实现方式：
1）在动态的生产中，不断增补新的信息或修正错误信息
2）通过文本中的链接来与其他文本产生关联，因而形成意义的拓展
3）在用户的评论中被赋予新的意义
4）在各类节点的不断转发中，被修改、增删，文本意义也因此发生变化
5、信息流：多级、开放的漫延
第三章 网络传播形式的流变
第一节 网站传播：大众传播的延续
一、网站传播的主体及其目标
1.ISP（Internetserviceprovider）：互联网服务提供商
IAP（Internetaccessprovider）：互联网接入商
ICP（Internetcontentprovider）：互联网内容提供商
2. 媒体
3. 政府
政府利用web网络进行传播的目标：
（1）将政府网站作为政府信息公开的直接渠道；
（2）将政府网站作为塑造政府形象的窗口；
（3）将政府网站作为电子政务的平台
4. 机构与组织
机构与组织利用网站传播的目标：
（1）将网站作为机构或组织信息发布的直接渠道；
（2）将网站作为塑造机构或组织形象的窗口；
（3）将网站作为对外办公的平台；
（4）将网站作为内部办公的平台
5. 企业
6. 个人
二、网站传播的特点
1. 技术上的相对复杂性
2. 特定网站中传播主题的单一性与高控制权
3. 传播受众的相对不稳定性
4. 可互动性
第二节 论坛：“古老”、“封闭”的社会化媒体
网络论坛，通常指以各种话题讨论为主的BBS。它是利用网络手段开展多对多交流的平
台，也是网络中最早社会化的媒体之一。
一、网络论坛的形式
从组织方式上：专题式论坛、综合式论坛、专业式论坛
从管理方式看：有限制式论坛、半限制式论坛、无限制式论坛
二、网络论坛的作用
（一）网络论坛对网民的作用
网民使用社会化媒体的动机可以分为三个层面：第一个层面是自我表现层面，第二个层
面是社会互动层面，第三个层面是社会报偿层面，包括社会归属与社会资本获取等。
网民在论坛中的突出诉求表现在以下几个方面：自我表现与表达，获得社会归属感，获
得环境认知，获得社会认同
（二）网络论坛对网站的作用
1. 培育用户黏性
2. 了解与研究网民
3. 构建网站品牌
（三）网络论坛的社会意义
1. 公共信息的传播渠道
2. 民意表达与社会记录的重要渠道
3. 公共服务平台
4. 群体的培育空间
5. 网络文化的孕育地
（四）web2.0时代论坛的价值
论坛是以内容为中心的社会化媒体，而微博微信等是以人为中心的社会化媒体，并且人
们的信息互动受到社会关系圈子的影响，因此，当人们需要淡化个体中心或超越个人关系网
络，而围绕内容这个中心进行交流，是论坛仍有优势。与之类似，当人们需要针对某些话题
进行大规模的封闭讨论时，论坛仍然是一种理想的交流平台。
三、网络论坛的成员关系
论坛中的传播是一种“圈子+话题互动”的模式，其社区结构是圈式结构。
论坛成员的关系有两种：需求关系、权力关系
（一）成员的需求关系
论坛成员的内在需求是影响他们互动模式、频率以及互动效果的重要因素。成员需求达
到动态平衡，论坛就可能比较稳定。
论坛的成员可分为：
1. 追求成就者
2. 探索者
3. 社交活动者
4. 恶作剧者
（二）成员的权力关系
分为规定性权力关系和非规定性权力关系。规定性权力关系是网站的规则直接赋予的；
非规定性权力关系是论坛成员在互动中逐渐形成的一种权力的格局（如意见领袖的形成）。
论坛的权力关系影响论坛成员的意见表达，成为影响群体心理的重要因素，也可能影响
到论坛成员的行为。
第三节 博客：以个体为中心的社会化舞台
一、博客的基本含义
博客来源于英文Weblog。Weblog是在网络上的一种流水记录形式，也有人称其为“网
络日志”。人们可以用傻瓜式的方式，在一个专属于自己的网络空间发布文章或图片等，这
些内容都按照年份和日期倒序排列。
博客与个人主页的区别是：利用博客进行信息发布的技术门槛非常低，几乎可以认为是
零，只需要几个简单的操作就可以随时发布内容
博客的特点：它可以将博主的地位凸显出来，使它成为主角，其他人的留言评论是以博
主的帖子为中心的，可以说这是一种一对多的交流。
目前博客一词具有多重含义，它既指博客活动，又指从事博客活动的人，同时还指博客
活动的平台，几个人在网络中的信息发布平台，早期的博客以文字帖子为主。但随着技术的
发展，越来越多的人可以利用博客技术发布音频视频等内容，播客可以被看作博客的一种新
发展
博客代表着“新闻媒体3.0版”：旧媒体→新媒体→自媒体
博客的意义：博客平台集中体现了网络平台的各种特性，它突出了个体作为一种独立存
在的地位，使个人在信息传播及意见表达方面获得了更高的主动权，也使个体在记录社会影
响社会方面拥有了更大的力量。
二、博客的社会意义
（一）公民新闻、个人出版等推动去中心化传播
【公民新闻】是指没有专业媒体背景的普通公众通过各种媒介传播自己所搜集或撰写的
新闻信息或主动参与媒体的新闻生产过程的行为及现象。
除了推进公民新闻的发展，博客也提供了一种全新的个人出版方式。无论是公民新闻还
是个人出版，实质上都是一种大集市式的传播模式，它是对传统的大教堂式的，或者说中心
化的传播模式的冲击。本质上来说，公民新闻和个人出版是个人中心对过去的机构中心的冲
击，以多中心的方式削弱了传统的传播中心的影响力。
（二）博客构建新的知识生产与传播体系
途径有：
1. 研究者的个人研究成果分享
2. 整合者对知识体系的梳理
3. 机构博客进行知识生产或分享
（三）博客促进个体与社会间的能量交换
作为社会节点的博客，是个体拥有一个社会化的界面，它是个体吸纳与整合社会能量的
接收器，同时也是将个体能量放大为社会能量的转换器。
（四）博客民间记录成为官方历史记录的补充
（五）博客推动多元文化的发展
（六）博客生态系统与社会形态形成交互作用
话语权力的交互尤为突出，博客在挑战现实权力中心的同时，自身也在形成新的权力格
局。
三、博客的传播结构
“舞台表演”+“观众围观”模式
四、博客的传播特点
以个体为中心的非制度化传播，特点主要有：
1. 个体构成传播中心
2. 内容自由度较高
3. 传播手段相对单一
4. 传播节奏自由
5. 私人话语空间与公共话语空间界限模糊（渠道特点）
五、博客用户的使用与满足
（一）博客写作者的使用与满足
博客活动表现的三个层面的需求：内在的根本心理需求；对博客平台的直接使用需求；
对社会的报偿需求
深层动因：自我形象塑造
博客是个体进行印象管理的一个重要平台，借助媒介技术把自己的后台行为前移的倾向。
外在诉求表现为自我表达、历史记录、自我推介、个人信息传播、公共信息整合、知识整合
与分享、公共服务、娱乐诉求。
（二）博客读者的使用与满足
深层动因：寻找社会归属感。
外在诉求表现为：环境认知、自我表达、自我投射、自我推介、信息或知识获取及娱乐
诉求。
六、后博客时代的博客价值
博客的特长：
1. 博客更适合专业化的深度表达与交流
2. 在知识生产与传播领域，博客的作用不可代替
3. 博客是一个相对封闭的写作空间，它可以较好地保持写作者的独立性
4. 博客更适合用于个人资源与品牌的积累
第四节 维基：协作式知识生产系统
维基（Wiki）指的是一种超文本系统。这种超文本系统支持面向社群的协作式写作，这
是在互联网上支持多人写作的写作工具。在维基页面上，每个人都可以浏览、创建、更改文
本，系统可以对不同版本的内容进行有效控制管理，所有的修改记录都会保存下来，不但可
事后查验，也能追踪恢复至本来面目，这就意味着每个人都可以方便地对共同的主题进行写
作、修改、扩展或探讨。
维基百科（Wikipedia）是一个基于维基技术的多语言的网络百科全书的全球协作计划，
这是一部用不同语言写成的网络百科全书。维基百科的作用不仅在于对那些已有的知识进行
系统的整理，同样可以在新闻传播，尤其是突发新闻报道中发挥作用。
一、维基及其传播的基本特点
1. 维基是以内容为中心的多对多协同：维基的传播是以某个特定的内容为中心的多对多传
播，以内容为中介展开。维基提供的工具以促进共同协作为基本目标，使平等、沟通、合作
的互联网精神得以实践。“自组织”式协同。
2. 维基是一种去中心化的平等对话
3. 维基是“焦点”文化与“边缘”文化的结合
二、维基用户的使用与满足
1. 社会分享需求
2. 自我提升需求
3. 社会报偿需求：获得社会的认同和他人的尊重甚至实质性报偿
4. 自我表达需求
三、维基的主要应用方向
（一）基于维基的知识生产
目前维基最大的应用领域仍然是知识分享。
1. 维基百科等应用，使人类知识在一个单一的平台上以前所未有的规模汇聚起来，维基百
科的“目标及宗旨是为全人类提供自由的百科全书——用他们选择的语言所书写的全世界知
识的总和”。
2. 它还实现了另外一种突破，就是对某一事物的多元认识的集成
3. 维基的应用意味着知识不再是某些专家的专利，而是人类共同智慧的集成
4. 维基使知识的更新达到了前所未有的速度
5. 维基促进了知识的共享，使知识在各类人群中得以更自由的流动，人们也能从中获得平
等的接触知识的机会
6. 维基的模式也适用于其他的协同支持生产项目
（二）基于维基的新闻传播
维基强调多人协作，这一思想应用于新闻报道，任何人都可以成为新闻的发布者与加工
者，一些重大的新闻报道可以利用这种技术实现跨媒体、跨地区的合作。对于一个新闻事件
的报道，可以由不同的人根据自己所掌握的信息来进行补充更新，使报道始终处于一种动态
的状态，这会促使人们不断地探求事实的真相。
学者高钢认为，维基新闻的传播方式可以推动以下目标的实现：新闻价值的公众确认、
新闻信息的全程提供、新闻分析的多元展开。在同一个平台上，围绕同一个信息主题或为
实现同一个传播目标而展开的网际协作，将产生全新的信息传播模式。这种模式将使信息更
加丰富，解析更加多元，验证更加苛刻，讨论更加理性。
（三）基于维基的社会协作
维基经济：在协作基础上生成的“投入和共同创造”的经济模式。
第五节 SNS：小世界的映射
一、SNS的基本含义
SNS（socialnetworkingservice）是基于个人的社会关系网络构建的新的网络平台，这个
平台以个人为中心，以社交为出发点，但是在社交的推动下，也会产生大量的公共活动与公
共信息。
SNS以鼓励用户实名注册为前提，为用户提供建立自己朋友圈的服务，用户可以通过朋
友去认识他们的朋友，所有的用户的朋友圈相互交织，就扩展成了一个庞大的联系网络，“小
世界”也就得以实现。SNS网站也可以为人们提供以兴趣为基础的社群服务。SNS在很大程
度上印证了六度分隔理论，甚至进一步缩小了人们之间的分隔度数。维基百科对于SNS的
定义是一个构建人们的社会网络或社交关系的平台，人们由此来分享自己的兴趣与活动自己
的背景，或者建立实时的联系。
二、SNS的传播结构
（一）SNS的基本单元
基本单元：一个个用户中心
模式：“个人展示”+“多重关联”
人们的关联主要有：社交关联、内容关联、兴趣关联、时间关联、空间关联、活动关联
（二）SNS中的强连接与弱连接
从社会学角度看，社会化媒体中的人们的关系可以分为强关系与弱关系两大类，这主要
是从互动频率的角度进行分类；从社会网络的角度看，人们的关系可以分为强连接与弱连接。
【三度影响力原则】美国学者尼古拉斯·克里斯塔斯基和詹姆斯·富勒的研究认为，人
们在社会网络中的任何行为都会泛起涟漪，波及他们的朋友（一度连接）、朋友的朋友（二
度连接），甚至朋友的朋友(三度连接)，但超过三度分隔，影响力就会逐渐消失。
强连接指三度及以内的连接，弱连接则是指三度以上的连接。强连接的意义是引发行为，
而弱连接的作用是传递信息。SNS的一个意义是可以实现强连接与弱连接之间的自由转换，
构建动态的而非固定的社会网络。
三、SNS的传播特点
1. SNS是从虚拟互动向现实互动的转折
2. SNS突出了社会网络在公共传播中的作用
3. SNS确立了以个人为网络传播节点的地位（平衡的双向信息流动）
4. SNS拓展了表达与互动的维度和方式
四、SNS个体用户的使用与满足
（一）社会关系拓展：SNS用户的基本需求
社交需求是核心需求。拓展社交圈和熟人圈子的维系。
（二）展示与控制：SNS用户的基本社交策略
（三）互动：SNS的多重表演可能
（四）曝光过渡：SNS社交中的风险
1. 个人档案中私人信息泄露
2. 有意或无意的位置泄露
3. 个人及家人状态、行踪的过多暴露
4. 文件中隐含的元数据信息
（五）社交质量与生活质量：不确定的报偿
第六节 微博：大众传播的社交化
一、微博的社会意义
1、 公共信息系统
2、 公共沟通系统：(1) 从“纵向”来看，微博在上情下达与下情上达方面，起
到了疏通作用。(2) 从“横向”来看，微博为不同社会阶层、不同行业、不同群
体之间的相互了解和对话提供了可能。、、
3、 社会生态系统：人们在微博中形成的意见与态度，更是社会舆情、舆论的一
个“指征”。虽然微博舆情、舆论不等于网络舆情、舆论，更不等于社会舆情、
舆论，但是它使一个社会气候的风向标。
4、 服务系统
5、 公共知识系统：尽管个体用户提供的知识可能是零碎的、片面的，但是微博
中的协同机制有助于知识的丰富与系统化。
6、社会动员系统：尽管新浪微博等在发展中提供了越来越多的个人化服务功能，
但是从网民的需求偏向来看，它的公共性功能仍是其核心竞争力所在。
二、微博的传播结构
“个人中心” + “内容关联”
1、 社会关联网络的质量直接决定了个人对外发布的信息的传播广度，以及它们
获得的外界 信息的广度。
2、 其中一些用户可以借助其既有的社会地位或影响力在微博中很快赢得众多
的连接
3、 对于普通用户来说，强关系仍然是形成自己微博关系网的基础
三、微博的传播特点
1、 内容上的微型化
“微”的特点使个体参与信息传播的门槛进一步降低。除了文字的微型化外，
微博中的视频传播也趋向微型化。这一方面是为了适应移动终端对流量的限制，
另一方面是为了更方便短平快的传播。
2、 传播的移动化
某种意义上也提升了微博信息的专业性。
3、 交流结构上的开放性
微博既能保证以个人为中心，又可以将外界的信息随时随地吸收进来，更容
易形成持续刺激，使人们处于兴奋状态。这对于促进更多的人参与新闻传播而言
也是重要的。
微博的转发非常简单、方便，这是开放性的另一个表现：转发成为微博平台
上促进信息流动的 一个重要手段，转发使有公共价值的新闻可以轻易地实现“病
毒式传播”。
4、 传播的碎片化
微博在内容上的“微”与信息发布上的移动性，都使得它呈现出更多的碎片
化的特点。碎片化的信息反映的是某些时间或空间上的点的状态，当很多碎片被
以一种内在的逻辑拼贴在一起时，它反映的事物的面貌与深度，也许比某 一个
个体的长篇大论更为全面、深刻；碎片化的信息的确可能会带来信息消费的负担，
也可能带来某些误导。从文化的角度看，碎片化的文化反映了多元的、碎片化的
价值观和参差多态的文化个性。
5、 信息传播与社交有机结合
(1) 微博是一种基于社交的信息传播平台，人们的信息传播与社交活动是同一的，
社交是信息传播的目的，信息传播是社交的手段。
(2) 由于以人际关系网络为传播网络，传播结构开放，信息流动容易，因此，一
旦微博中出现了刺激性的或者与人们关联度很高的话题这个话题就很容易在整
个平台上“引爆”，以病毒式的扩散路径传播，迅速成为公共话题。
(3) 除了以上共同特点外，中国的微博还有聚焦度高的特点。与 twitter 不同
的是，中国的微博在一开始就设置了评论的功能，这使得 BBS式的围绕一个话
题的聚焦及深度讨论在微博中也能实现，评论成为微博的重要构成部分，在某些
时候，它们的影响甚至比事实性信息更大。
四、微博个体用户的需求
1、 公共信息获取：微博的信息传播有自己的特点，例如时效性方面、丰富性方
面。微博常常会比其他渠道更快地提供突发事件的信息，来自事件当事人或现场
的第一手资料，可以无中介地直接达到微博用户；微博可以使信息与意见并行传
播。
2、 自我记录与表达：自我表达也表现为个体的形象塑造。
3、 社会关系与社会资本：“围观”名人，与名人近距离对话，成为很多用户留
在微博的理由同时也是很多人扩展其社会关系的一种方式。另一方面，人们通过
名人这一个话题，可以和其他粉丝建立起更为多样的互动，粉丝之间的社会关系
也得以力加强。
4、 信息与知识的积累、归档
第七节 APP：移动时代的新“门户”
客户端主要指智能手机、平板电脑以及智能电视等设备的第三方应用程序，也称为APP。
一、新闻客户端的基本特点
客户端在一定程度上简化了获取信息的路径，降低了获取信息的成本，同时也有助于固
化用户的习惯。
客户端的整体信息呈现模式，是一种单线条的“信息流”，也构成了一种阅读的“时间
线”。在信息流上的信息安排顺序，也成为客户端最主要的“版面语言”之一。
二、新闻客户端的类型
（一）媒体开发的客户端
（二）商业门户网站转型的客户端
（三）新兴的聚合类客户端
第八节 微信：三个层级传播的贯通
一、微信平台的主要价值
1、 作为社交平台的价值
社交是其最核心的功能，也是支持其他功能的基础。
微信朋友间更多的是“强关系”，这也是强社交黏性的重要原因。微信中的私人关系，
对用户能产生更持续的吸引力。
即使用户活跃度不高，微信的基础通信功能也足以使其维系大多数用户，这是微信作为
入口的最大优势。
微信与微博的差异：
（1）微博的公共信息诉求与微信的私人关系诉求
（2）微博的媒体取向和微信的社交取向
2、 作为媒体的价值
【公众号】是微信中最具有媒体属性的应用，其传播特性在某些方面也与传
统媒体相似。但微信的媒体属性不只局限于公众号这个部分，公众号与朋友圈、
群等都是连通的。公众号内容价值的放大，需要朋友圈与群的助推。
3、 作为营销及服务平台的价值
在微信中，企业可以提供直接的产品销售。而这一新平台上的产品销售，还会延伸到用
户数据挖掘用户管理、个性化服务等一系列环节。微信也是一个个性化服务平台。它的重要
特点之一就是实现线上与线下的连接，因此它被当作O2O的一个重要渠道。
4、 作为移动互联网入口的价值
更广阔的合作领域是电子商务。而作为社交入口的微信，具有向生活服务平
台扩展的可能。
5、 作为互联网连接器的价值
互联网将更多地连接用户的需求，腾讯的使命仍然是成为互联网连接器，连接 一
切。
二、微信朋友圈及其影响
（一）微信朋友圈与微博传播模式的比较
1、 微博的“大圈子”与微信朋友圈的“小圈子”
一个微博平台，从整体上来说就是一个圈子。一个话题可以迅速传遍整个
大圈子，并且围绕这个话题形成多种信息与意见交流。在大圈子中，经过一定的
博弈，会形成话语权力的差序格局。博弈中产生的意见领袖在信息传播以及意见
表达中的作用更为突出，但这种权力结构是动态的，经常会因为各种因素的影响
而发生变化。
微信平台由难以计数的小圈子组成。虽然从理论上来说这些圈子之间都相互
关联，但毕竟圈子之间还有一道无形的“墙”。信息虽然可以越过这些“墙”流
入小圈子，但反向的信息与意见反馈却很难实现。因此信息流相对单一。在微信
的朋友圈交流中，话语权力相对平等。
2、 微博的“求异”与微信朋友圈的“求同”
在微博的大圈子里，用户要凸显自己的价值，需要的更多是表现个性与差异。
微信一个重要作用是维系小圈子中的关系，并谋求社会资本的回报。因此在
朋友圈中人们更倾向于关系的稳定与和谐。在观点表达上，人们更倾向于求同，
差异往往会被人们有意忽略或掩盖。
3、 微博系统的开放与微信朋友圈的封闭
微博：技术控制的传播机制更加开放。（1）从功能上保证了转发路径的公
开与清晰可辨，从原创到每一个转发的链条，都可以直观感知。(2) 微博的评论
内容是对所有用户公开的，不同用户的评论可以形成成参照，这为公开的社会交
流提供了基础。
微信：(1) 微信朋友圈虽然保留了转发功能，却隐去了转发路径。因此，一
条信息在朋友圈里的传播轨迹是难以辨识的。
(2) 微信提供的是一个封闭的评论系统，只有互为好友的用户才能看到到彼此在
同帖子下的评论。主要发挥的是私人社交的功能，而不是公共讨论的功能。
综上所述，微博中的信息传播是在一个开放的系统中进行的，信息在微博平
台上流动时，各方面的用户也在快速地展开对该信息的补充、对抗、辨识等。这
样一个系统给信息的真伪鉴别、价值判断、筛选过滤以及自我纠正带来了可能。
而微信是一个相对封闭的系统。朋友圈虽然也可以变化，但其结构是相对稳
定的。尽管人们在现实中有较大的差异，但朋友圈更多地强调了同质性。它也会
形成对异质信息与意见的排斥或抑制，成为相对封闭的信息系统。

第四章 网络传播的多重策略
第一节 社交化策略
一、社交化策略的三个层面
（一）社交化传播：用户成为渠道
（二）社交化生产：用户成为新生产力
（三）社交化运营：用户沉淀为持久资源
社交化运营的目标是：发掘对组织具有长远价值的用户及资源，并对其进行持续的维护，利
用用户资源来拓展品牌影响力，开发可能的盈利模式。
社交化运营的重点是：将松散的用户聚集为社区，甚至是社群。
社群的社会资本包括：结构资本，即个体之间的结构化连接程度；关系资本，即个体之间相
互关系的强度与性质，主要体现为承诺、信任等；认知资本，即共同的知识基础、术语及表
达方式等。
二、社会化媒体中内容生产与传播的一般策略
（一）社会化媒体中人们偏好哪些内容
社会化媒体的热门话题通常具有以下特点：
1、击中公众的敏感处或痛点
2、引发争议或冲突
3、传达某种价值观或生活方式
4、为用户做“代加工”
“代加工”主要表现为以下几类：
1）拼图式加工 2）盘点式加工 3）萃取式加工 4）翻译式加工
5、解决实际问题
6、满足人们的“八卦”心理
7、帮助人们解压
（二）社会化媒体需要什么样的语态
1、社交化传播语态的一般法则：一般用户更愿意看到平实、易懂、有趣、接地气、富有人
情味的表达方式。
2、“卖萌”的新语态能走得长远吗？
建立与用户的连接，只是传播的起点，新媒体账号更核心的任务是完成公共信息的有效
表达，这需要靠高度专业的内容。
3、“年轻态”语态一定能吸引年轻人吗？
年轻态语态的探索也在演进为媒体的“破圈”努力，这包含两种方向：一是试图让媒体
的内容打破各种次元壁，进入各种亚文化圈；二是将一些本属于亚文化圈的文化，引入到传
统媒体中。
4、如何理解“讲好xx故事”
这样一种新理念的提出，是对以往一些空洞、刻板、乏味的报道或宣传模式的反思的
结果，但也容易引起失实、套路化表达的问题。
5、语态变革中的深层问题
1）语态反差是否会导致机构形象的断裂
2）语态变革是否会滑向娱乐化
3）语态变革是否一定能打破新老媒体的文化隔阂
（三）社会化媒体如何做好“把关人”？
“把关人”这个概念最早由美国社会心理学家库尔特·劳因提出，他当时研
究的是家庭主妇对家庭食品的把关作用。1947年，他在《群体生活中的渠道》
一书中，再次论述这个问题，指出群体传播中需要一些把关人，只有符合群体规
范或把关人价值标准的信息内容才能进人传播的渠道。
1950年，传播学者怀特将这个概念引人新闻研究领域，明确提出新闻筛选过
程中的“把关”模式。他指出，社会上存在大量新闻素材，大众传媒的新闻报道
不是也不可能是“有闻必录”，而是一个取舍选择的过程。在这个过程中，媒介
组织形成了一道“关口”，通过这个“关口”传达到受众那里的新闻只是众多新
闻素材中的少数。
传媒组织“把关”，首先直接体现为对新闻素材“新闻价值”的判断。新闻
价值的标准，可以表现为业务标准和市场标准两方面。业务标准指事件适合于媒
介进行新闻处理的各种条件，而市场标准指的是事件能够满足受众新闻需求的诸
条件以及吸引受众兴趣的诸条件。
另一方面，把关活动最终还受到传媒的立场、方针和价值标准的影响。
美国学者休梅克和瑞斯的研究，更系统地阐明了哪些因素会影响媒介的内容，
他们提出的五个方面是:
(1)来自媒介工作者个人的影响。
(2)来自媒介日常工作惯例的影响。
(3)媒介组织方式对内容的影响。
(4)来自媒介之外的组织对媒介内容的影响。
(5)意识形态的影响（最顶端）。
社会化媒体中信息把关的主要方法包括：
1、多角度核对
核实来源与多源求证；要素核查；查看原文或原始出处；核对时间；知识性内容的核查；核
实名人名言真伪
2、逻辑判断
3、技术性分析
4、直接验证
（四）社会化媒体如何做好危机传播
1、危机传播原则与技巧的把握
1）主动公开，分秒必争 2）充分告知，如实告知 3）不打太极，不逃避责任
4）掌握表达与对话策略 5）持续对话，善始善终 6）坚守伦理底线
2、危机传播中的语态失态
1）丧失当作喜事办，将危机事件后的处理作为自我表扬、自我宣传的机会。
2）信息通报语焉不详，关键信息缺失，由此引发网民的猜测与质疑。
3）采用缺少人情味的工作式语态进行“通报”，不反思问题，而急于“择清责任”。
4）以警告性语言将用户推向对立面
第二节 移动化策略
一、移动传播中的场景思维
1. 含义：场景主要指基于特定时间、空间和行为及心理的环境氛围。
罗伯特•斯考伯和谢尔•伊斯雷尔所著的《即将到到来的场景时代》一书指出了与
场景时代相关的五种要素：大数据、移动设备、社交媒体、传感器、定位系统。
他们把这五种要素称为[“场景五力”]。
1. 分类：场景可以分为共性化场景与个性化场景两个方向。
共性化场景在一般人群具有需求共性与行为共性的场景。构成共性化场景的
基本要素包括空间 与环境、时间、行为共性等。
个性化场景健与个人特征和特定情境相关的场景，它的构成要素包括空间情
境、用户实时状态与需求、用户生活惯性、社交氛围等。
2. 作用：场景可以视作移动传播中一种新的时空描述维度，它也是移动产品的
一个新的构成要素。场景分析的最终目标是要提供特定场景下的适配信息或服务。
适配意味着不仅要理解特定场景中的用户，还要能够迅速地找到并推送出与他们
需求相适应适应的内容或服务。对相关信息或服务 的发现、聚合与推送能力，
也决定着适配的水平。
（一）共性化场景与个性化场景：场景应用的两个层面
共性化场景研究的是在某一特定场景下用户的共性需求与行为特征，其构成
要素主要包括时间、空间与情境、用户共性、体验环境。
个性化场景则需要考虑在每一个具体的情境中用户个体的即时处境与需求，
基本要素主要包括：空间与情境、用户实时状态、用户生活习惯、社交氛围、体
验环境。
（二）场景的构成要素
1、空间与情境
2、时间
3、用户的实时状态
4、用户生活惯性
5、社交氛围
6、体验环境

第五节 数据化与可视化报道策略
一、数据新闻、信息可视化、信息图表
（一）数据新闻
【数据新闻】在英文中也称 DataDrivenJournalism （数据驱动的新闻）。
《纽约时报》的阿隆•菲尔霍夫认为，数据新闻是一个概括性术语，它包括处于
持续发展中的一整套新闻叙事工具、技巧与方法，涵盖从传统的计算机辅助报道
（使用数据作为“信息源”）到最前沿的数据可视化和新闻应用等。
数据新闻涵盖新闻生产的一整套流程，数据可视化只是这个流程中的一个环
节。一切利用数据来发现新闻、呈现新闻要素、解释新闻的手段和形式都可以被
称作数据新闻。
【精确新闻】精确新闻是二十世纪七十年代初期出现在美国的一个概念，其
目标是将社会科学与行为科学的研究方法引入新闻采访报道中。这一概念的提出
者菲利普·梅耶认为，记者想要更好地保证新闻的客观性和真实性，就需要具备
更多的数据收集和分析的能力。
【计算机辅助报道】计算机辅助报道，主要是把数据的收集与分析，作为提
高报道能力的一种手段，而数据新闻则把主要注意力放在数据上，也就是把数据
作为一种核心要素，而不是一种附加手段。
优势：数据新闻提供了一种全新的叙事方式。传统媒体常用的文字、图片、
音视频等形式都有自己的特长，也适用于不同主体与对象的叙事。但是数据化的
叙事能提供新的认识和表现事物的角度。
1、 数据可以刻画事物的某些特征，也可以展现一个事物的动态变化过程，还便
于对相关事物进行对比。
2、 数据可以帮助人们更好地了解事物的整体面貌或深层表现，特别是大数据的
应用，能在一定程度上超越人的观察能力的局限，实现整体上对事物的描绘与把
握。（eg:2014年百度“百度迁徙项目”）
3、 数据可以帮助人们理解事物之间的内在联系。
4、 数据可以揭示某些事件发生的原因或提供相关证据。
5、 借助数据我们有可能触及某些现象或事物的内在模式或规律，或者预测某些
事物的趋势与走向。
二、信息可视化与数据可视化
【信息可视化】指的是用图形、图像等视觉符号方式来进行数据、知识或其他抽象信息的传
达。
【数据可视化（DataVisualization）】是信息可视化的一种。数据可视化需要
具备两个要素，一是可以被用于分析的数据，二是其形象化的呈现。数据可视化
既强调“可视化”，更强调这种可视化的基础是“数据”。但数据新闻并不等于
可视化。
在网络信息超载的情况下，可视化有助于提高信息获取的效率，可视化的信息图表也
更便于传播与分享。
三、信息图表
【信息图表】是信息可视化的结果。信息图表是一种将数据与设计结合起来的图片，它有利
于个人或组织简短有效地向受众传播信息。它是可视化的数据或概念，它把复杂的信息传递
给受众，使其快速消化和理解这些信息。

一、 算法对人的囚禁与人对算法的抵抗
【信息茧房】：美国学者桑斯坦提出。并非新媒体时代独有的，传统媒体时
代这一现象就表现了出来，可以用“选择新接触”理论解释。在一定程度上，社
会化媒体以及今天流行的个性化信息服务，会增强这种现象。当人们只选择自己
关注或符合自己需要的信息时，结果可能是“作茧自缚”，使自己失去对环境的
完整判断。公共信息的传播、社会意见的整合、社会共识的达成，就会变得日益

英国学者罗杰·希尔弗斯通看来，人对技术的驯化，既包括个人合理地利用

好地参与到公共空间活动之中。
人对媒介技术的驯化的四个阶段：占有、物化、融入、转化。
人对AIGC 的物化的可预见可能：
1、使其成为工作中的助手
2、在AIGC的应用中学习知识

【赛博格】这个词起源于20世纪60年代，赛博格（Cyborg）是cybernetics（控制

的生物，可以理解为半人半机械的生物。

人的实体数字化后也可以被拆解成一个个“元件”，如容貌、声音、肢体、动作，这
种拆解还可以进一步细化，因而对“元件”进行数字化重组越来越容易。

一、“后真相”迷雾的漫延
“后真相” （Post-truth），post意味着超越，即“真相”不再那么重要。
这个词反映的是当今的一种典型状态，那就是“客观事实的陈述，往往不如诉诸
情感和煽动信仰容易影响民意。”
2004 年，美国作家拉尔夫•凯伊斯出版了名为《后真相时代》的著作。在该
书中，他指出在后真相时代，我们面对的不只是真相和谎言，我们还面临着第三
种情形，那就是一种模糊的陈述，它不是确切的真相，但也不构成谎言，它可以
被称为放大的真相，新真相，软真相，人工真相，淡真相。
2010年，“后真相政治”一词在美国开始出现，并得到越来越多的关注。伦
敦大学戈德史密斯学院政治经济学教授戴维斯认为，在西方自由民主制度中，事
实一直被认为占有神圣位置，每当民主跑偏、选民被人操纵或者被政客欺诈时，
民众就会诉诸事实，但在今天的社会，事实似乎渐渐失去主导社会共识的力量，
这种普遍的感觉让人认为社会已经进入“后真相”的政治时代。2016年美国大
选期间，社会化媒体的表现更是进一步加剧了人们对后真相时代的担忧
后真相的成因：今天“后真相”的蔓延，与社会化媒体的传播机制不无关系。
社会化媒体是以个人为传播节点、以社交网络为传播渠道的平台。在这种每个个
体都参与的新机制中，诉诸情感的内容往往比诉诸理性的内容更容易得到传播。
人们在传播中还会不断加上带有个人情绪色彩的评论，评论往往比事实更容易引
起关注与呼应，意见、情绪、立场常常会凌驾于事实之上，同时又渗透到对于事
实的陈述中，事实与意见之间的界限日益模糊。
后真相不止与社会化媒体传播相关。专业媒体在今天追求事实真相的障碍越来越多，即使是
基于科学的数据分析，揭示的真相也可能与现实的真相相去甚远。在更深层面上，后真相时
代是因为“原来支撑真相的两大基础都崩溃了，即作为普适性原则的理性原则，以及作为经
验性数据收集、统计、分析的客观性结论”但在后真相时代，我们恰恰需要高举真相的大旗，
因为不是没有真相，而是以往我们接近真相的方式都出现了漏洞，需要在更宏大的背景下，
重建一个可以接近客观性标准的框架，而不是让主观性占据真
二、泛娱乐化与泛政治化的双向奔赴
三、科学传播的非科学化
【科学传播】广义来说是指科学知识、科学方法和科学精神在各类公众之间的传播。
科学传播的主要动机是提高国民的素质。
四、传播的圈层化
圈子是以情感、利益、兴趣等维系的具有特定关系模式的人群聚合。网络中“层”的形
成，既来源于现实的社会阶层，又与网络中的各种因素相关，最终形成话语权力层级、代际
层级、产品或平台层级等不同的层级落差。
第五节 无边界时代传媒业专业性的重塑
一、职业媒体人：专业精神的坚守与专业标杆的再树
二、公众：从信息消费者素养向生产者、传播者素养扩展
三、非媒体组织：在公共传播方向下构建新媒介素养
（一）政府机构及官员
1、对媒体及网络角色的认知及权利保障
2、信息公开渠道的建设与保障
3、与媒体及公众的对话能力
（二）企业等组织
1、品牌传播素养
2、危机传播素养
3、公共传播素养
