第四章 麦克卢汉
一、三大理论建构
(1) 媒介是人体的延伸
(2) 媒介即讯息
(3) 热媒介与冷媒介
实际上是探讨媒介技术与民主参与之间的关系问题。
麦克卢汉认为，使某一感觉器官作“高度定义”扩张的传播媒介，虽然提供大量的信息，
但只涉及一种感官；虽然有高度扩张，但却使人们的想象力和参与度都非常低，这样的
传播媒介就是“热媒介”。反之，“低度定义”涉及人类感官范围较广，但能提供的信息相
对较少，对任何事物都缺乏详细的描述，需要由人来补充，因而人的参与度较高，这样
的媒介称为“冷媒介”。
麦克卢汉推崇“冷媒介”，认为“冷媒介”具有包容性，“热媒介”具有排斥性。人们醉心于用
技术塑造“热媒介”，而在不知不觉中放弃了自己民主参与的阵地，不利于民主的发展。
二、地球村与内爆
(1) 地球村——时空消失的人类新部落
把地球视为村落的两层寓意：
1、是一个狭小的空间范围，人们可以快速交流并在第一时间里得知发生的事情;
2、共同社区：媒介创造的环境使整个人类生活在同一个家园中，民族、国家等概念遭
到瓦解和重构，人类获得在全球范围内感知的新能力。
(2) 重新部落化
以媒介技术的发展变化为依据，将人类社会划分为三个历史阶段：
前文字时代，也称部落阶段，口头语言和耳朵统治的阶段；
古登堡时代，部落被瓦解的阶段，文字语言和视觉占据统治地位；
电子时代，重新部落化阶段，所有感官深入参与。
(3) 媒介技术的力量
在推动人类社会三个阶段的发展中，媒介技术具有决定性的力量。
(4) 内爆
“内爆”就是内向的爆发和坍塌。事物内向的爆发往往会发出比外向更巨大的能量，导致
处于临界点的事物发生聚变。
麦克卢汉担忧的文化“内爆”是指电子化引起的后工业社会出现的文化裂变，这是由电子
媒介的迅捷性造成的。电子媒介重构了社会生活，使我们栖息在一个相互交叠的社会，
没有文化等级，也没有领域分工。地球在水平地、垂直地、瞬间地“内爆”，这个“内爆”
通过模糊公共领域和私人领域的界限终结了公共领域。在这个实际上更为有限的空间
里，传播的电子形式渗透到社会生活的各个领域，培育了一个更加互动的空间，但人类
的批判和理性思考实际上却在减少．
第五章 鲍德里亚
一、符号批判理论
1、消费社会与物/符号体系
二战后，西方社会由于科技进步和自身制度调整，逐渐步入了一个物质富裕、文化繁
荣的新时期。消费取代生产，成为整个资本主义社会体系运转的主导力量。鲍德里亚认为，
在这样的消费社会里，人们的消费活动更多的是在符号层面而非物质层面上，即消费物品的
意义。物/符号体系的中心，是物体即一种符号。
整个物/符号体系分为四个亚体系：功能型系统、非功能型系统、后设及功能失调体
系、物品及消费的社会意识形态体系。阐释了物向符号的转化。这四种模式也是物向符号转
化的四种模式.
2、符号消费中构建的消费文化
消费文化以资本主义商品生产增衍为前提。资本主义生产的扩张，提供了大量可供消
费的产品，建立了大量为消费而设的场所。
社会消费中普遍存在“零和博弈”的现象，人们通过社会差异的表现来取得某种社会认
可，显示自身。
消费文化所创造的影像以其直接、独特的方式给人以身体刺激和审美快感。
鲍德里亚把符号作为物与人之间的中介，把商品生产放在了符号意义、能指-所指结构
内，从而从更广阔的范围内破译了商品对文化的侵蚀。
3、符号价值与广告图腾
鲍德里亚认为商品除了使用价值和交换价值外，还拥有符号价值。而符号价值是消费
社会里的终极价值。
消费社会又是一个广告社会，广告让产品形成能够了边缘化差异,个性化,使消费者形
成自恋情节;它十分重视对消费者的行为心理调查,不段完善对消费者的渗透力.
鲍德里亚在广告的解构上比别人更进了一步,把广告不再视位资本或人的创造物,而是
独立的符号结构并能对主体施加决定性的影响.广告成为一种新的图腾形式，令消费者
顶礼膜拜。
二、后现代性媒介分析
1、仿真、超真实、内爆
这是鲍德里亚描述技术媒介运作规律的三个中心概念，也是电子媒介造成人的主体
性沦丧的重要手段。
所谓“仿真文化”，就是先进的电子媒介为大众建造了一个虚拟、幻象的世界，它是目前
的历史阶段被符号主宰的主要方式。仿真的对象不是某种物质，而是对人们在现实中
接触的物质现象的第一手感知和幻想的模拟，它通过一系列的仿真技术，让人们在缺
席于某种场景时，能获得临场的感官享受和神经快感。
仿真产生了一种普遍的“超真实”的幻境。超真实是仿真的特性，是许多类像共同组成的
一种新的现实次序。所谓“超真实”，就是真实与非真实之间的界限已经模糊不清，非真
实已经超过了真实。超真实的形成过程就是真实与非真实的内爆过程。
“内爆”概念来自于麦克卢汉，主要是相对于信息的“外爆”提出来的。内爆就是消除区别
的过程，政治领域、公共领域、商业领域相互渗透。鲍德里亚比麦克卢汉更加激进地
看待瞬间传播技术，如电视、因特网。他的内爆理论所描绘的是一种导致各种界限崩
溃的社会“熵”的增加过程，包括意义内爆在媒体中，媒体和社会内爆在大众中。他甚至
认为，“整个社会都已内爆。”
2、视觉媒体与电视
电视过多地产生了威胁我们真实地感知现实世界的影像和信息，把社会和人带入了后
现代时代。
1)电视具有仿真性 2)电视的去历史性 3) 单向度的电视和主体性的沦丧
斯图亚特·霍尔传播学思想分析
斯图亚特·霍尔,是英国文化研究学派的代表人物,是大众传播研究领域里程碑式的人物.
1964年,理查德·霍葛特在伯明翰大学创立了当代文化研究中心.斯图亚特·霍尔是第二
任主任.在他的领导下,当代文化研究中心发展成为国际学界最负盛名的文化研究机构,并且
形成了著名的伯明翰学派.
斯图亚特·霍尔的主要成就有:其编码/解码模式打开了受众研究之门;在他洞察了文化研
究中的文化主义范式和结构主义范式后,综合两者长处,开启了文化研究中的"文化霸权"的
研究.
斯图亚特·霍尔研究的理论来源：
1.结构马克思主义者阿尔都塞的意识形态理论.
阿尔都塞在<意识形态与意识形态国家机器>中指出,意识形态总是通过意识形态国家机器
表现出来.意识形态国家机器为个体在这架机器中提供了一个位置,唤出个体并赋予他一个
名称,然后提供给个人一种抚慰性的幻景.其目的是为了确保统治阶级在意识形态中的主导
地位.斯图亚特霍尔赞同阿尔都塞关于意识形态国家机器的叙述,也认为大众媒介,教育系统
主要通过意识形态产生作用.霍尔赋予大众媒介很高的地位,认为它形成了当代资本主义的
主要意识形态制度.媒介构建了"自然幻觉",让人以为它在反映现实.
霍尔批判性的吸收了阿尔都塞的主体构建理论:所有的意识形态都具有将具体的个人构成
主体的功能,所有的意识形态都对具体个人能否作为具体的主体提出赞成或质询.同时阿尔
都塞提出意识形态无意识理论.他认为,意识形态对于人的控制是隐蔽的,被内化了的,作为
主体的个体不能意识到它的存在和效果,意识形态是无意识的.意识形态从外部构筑我们的"
本质"自我,我们依赖于教育我们的语言和意识形态来看待自己的社会身份,我们对自身的看
法不是由我们自己产生的,而是由文化赋予的.因而我们是文化的"主体",但却不是它的创造
者.
霍尔认为阿尔都塞的这一理论太武断了,他用结构主义的观点否定了人的主体地位,个体
被意识形态强行的构建为主体.霍尔认为这具有浓厚的决定论的色彩,他认为阿尔都塞忽视
了意识形态与社会实践之间的关系,忽视了两者必然的辨证关系.在霍尔认为,意识形态包括
实践意识形态和推论意识形态.实践意识形态是主体在参与有意义的组织活动时所获取的理
所应当的认识,推论意识是主体对具体行为进行解释的能力.推论意识反映了主体的能动性,
它包括了对意识形态和文化关系的更为广泛的了解,它承认意义体系并非是"自然形成"的,
主体对现实存在具有推论式的洞察力,主体不同程度地拥有实践意识和推论意识.
同时霍尔也批判了阿尔都塞的功能主义.霍尔认为,阿尔都塞将意识形态等同于市民社会
的形式内容,就必然不可能对统治的意义结构进行批判,也无法解释社会抗争和多元意见的
社会现象.
由此可见,霍尔的理论是批判的继承了阿尔都塞的意识形态理论.
2.葛莱西的霸权理论
葛莱西最杰出的理论贡献就是他的文化霸权理论.他认为,文化霸权并不仅仅是一种简单
的,赤裸裸的压迫和支配的关系.霸权的获取,当然不排除意识形态的压抑,但是霸权的形成
更主要的需要依赖被统治者的赞同,依赖某种一致的舆论和意见的形成,而这总是一个过程
和斗争的结果.霸权概念指出,统治集团的支配权并不是通过排除其对立面,而是通过将对立
一方的利益接纳到自身来维系的.
霍尔将阿尔都塞的意识形态理论和葛莱西的霸权理论联系起来,认为霸权就是制造出来的赞
同.他认为,在资本主义国家和资本主义意识形态国家机器之间,存在着一种微妙的结构关系,
它能使传媒保持某种独立,又能遵守占支配地位的文化规则.传媒必须在普遍的范围内或者"
大家都赞同"的一致舆论的框架中生存下来.它使自己适应于这样一种一致的舆论,同时又试
图形成这样一种舆论,传媒成了生产"普遍赞同"的一个组成部分.
霍尔在<监控危机>中用葛莱西的霸权理论着重分析道德恐慌这一社会问题.
霍尔的成就
一.编码/解码模式
霍尔的传播思想着重体现在他的著名的编码/解码模式以及他对主导意识形态的论述中.
他的特殊贡献主要在于他将意识形态编码的文化形式和受众的解码战略联系了起来.
霍尔的著名论文<电视话语的编码与解码>打破了传统的传播研究模式,代表着伯明翰学派
在媒介研究方面的最高成就.
霍尔在这个模式中,运用了符号学,结构主义和葛莱西的霸权理论进行分析研究.并且借用
了马克思主义术语:生产,流通,使用,再生产来描绘电视话语的生产流通;利用了索绪尔对语
言符号由"能指"和"所指"组成的主张,由此说明意义是不稳定的,它依赖于在话语形式中的
构联;还吸收了罗兰巴特的语言学思想,认为意义由外延和内涵两个层面组成.
霍尔认为,信息编码环节完成以后,这些编了码的内容就开始进入了流通环节,而且这些编
码信息一经传送,编码者就对其失去了控制权.而社会是不同质的,由很多不同的团体和利益
所组成.电视观众不是单一的没有区别的群体,而是社会团体的混合物.每个团体都会按照自
己不同的方式将自己同主导意识形态的形式和意义联系起来.因此,生产和接受之间必然缺
乏一致性,在这个过程中会对信息产生误读甚至曲解.
而且霍尔认为,尽管有些符码早已经被深深的"自然化"了,似乎在语意上不会出现误读,但
是电视观众对电视话语的多种读解还包括了更深层次的社会,文化,历史的原因.
霍尔认为,生产者不能任意将主导意义加入信息中.如果这个意义受到大多数团体的偏好,
那么它的主导位置就可以得到确立.然而它还可能受到各方面的抵抗.
根据这个意义,霍尔将电视观众的读解分为三类:主导--霸权读解或称偏好读解,协商读解
以及对抗读解.霍尔认为,主导--霸权读解,表明解码和编码之间存在着意义的一致性,这种
形式在理论上可能存在,在实际中却不大可能发生.最多情况是协商式读解.霍尔用罢工者对
罢工报道的态度为例进行了说明.协商式读解承认主导意义但仍然声称在特定领域可以在主
导意义之外运作.而对抗式读解则是观众在另一个参照框架中将信息赋予了新的意义,这样
对编码者来说,这些观众的读解就和他们的初衷背道而驰,走到主导意义的反面了.
霍尔同时认为,这三种形式绝对不是分离的,它们之间是相互连接的,刻度的滑动就是编码
者同解码者之间的话语斗争----信息结构的多义性使得在任何时候的读解都是主导意义和
臣属意义之间的政治斗争.
编码/解码模式的意义:
霍尔的传播理论给我们最大的启示就是恢复了受众在传播中的本原位置.最初的传播学研
究多遵循实用主义和功用主义,力图了解受众控制受众,注重传播效果.传统的媒介研究运用
的是"主体--客体"思维模式,将传者作为传播过程中的主体,将受众作为客体,传播过程就是
主体作用于他者的活动过程.受众被直接或间接的对象化进而物化.这些模式将传播视为直
线传播,发送者和接受者之间只是一条单向直线.而霍尔认为,尽管编码和读解信息是确定的
环节,但是仍然会产生不确定的结果.传播学研究的不应该是主客对立意义上的单一主体,而
是一种主体间性,应当坚持主体间存在的差异性和多元性,也要强调交往.
霍尔认识到了受众的重要性,打开了受众研究之门.
缺陷:
解码/编码模式过于专注于文本研究.他的读解模式虽然破除了观众被动性的观念,但是这
些模式的运用仍趋向于构建受众,文本力量高于读者的观念仍然处于主导地位.而且这个模
式并没有试图去证明电视话语的主导意识形态编码是如何和社会结构发生联系的,夸大了意
识形态的力量,没有从实质性的政治经济视角研究大众传媒,忽视了由国家和经济提供的更
为广泛的结构关系.受阿尔都塞的影响,霍尔把大众传媒当做自治的意识形态机器,从而很少
评价经济和国家在文化生产中的重大作用.
同时霍尔对话语过于重视,反而忽视了物质构造和符号形式间的明确关系,也忽视了研究
制度结构和报纸内容之间的连续的关系,从而将真实和符号间的关系夸大了.对符号学的过
于关注也阻碍了他对媒介民主化的分析.
二.<文化研究:两种范式>
在<文化研究:两种范式>中,霍尔将文化研究进行了梳理,得出了主要的两种范式:文化主
义范式和结构主义范式.
霍尔认为以威廉姆斯为代表的文化主义范式过于强调文本分析和对个体经验的研究,高古
了人的创造性和能动性,赋予了"经验"在文化研究中的权威性地位.
霍尔肯定了结构主义在这些方面的强调:决定性条件,"抽象"与"整体"的概念,"经验"去中心
化.但是霍尔也指出,正是由于结构主义太强点所谓"结构整体"和这种整体的决定作用,牺牲
了"过程"和具体经验的复杂性,牺牲了人的主观能动性.
霍尔主张将文化主义和结构主义的有利因素结构起来,以更换的进行文化研究
第六章 女权主义
一、女权主义
1、是一种学术作品与实践体系，其中女权主义批评是最重要的组成部分。它反对自古
以来的“男性中心说”，主张将女性世界和女性话语作为研究对象，重新解读西方文
艺传统的实践，透视陈旧的社会文本和文化语境，向传统的文学史和文学理论挑战。
2、女权主义更是一个关于妇女遭受压迫和以何种方式赋予妇女权利的政治运动。
3、从哲学渊源来看，女权主义是西方父权制残余同西方社会个体化发展相互矛盾、相
互冲突的产物，是西方个体主义的一个分支。
二、流派1、自由派女权主义 2、马克思主义学派女权主义 3、激进派女权主义 4、后结
构主义的女权主义 5、后现代主义的女权主义
女权主义受众观
一.什么是女权主义
女权主义 ,也称女性主义,泛指为取消对妇女的歧视,争取男女平等而工作的人们的一切
实践活动和理论思想.女权主义是一种学术作品和实践体系,是一个关于妇女遭受压迫和以
何种方式,方法赋予妇女权力的政治运动,在哲学渊源上看,女权主义是西方父权制残余同西
方社会个体化发展相互矛盾,相互冲突的产物,是西方哲学思想----个体主义的一个分支.
二.女权主义流派
1.自由派女权主义.
自由派女权主义没有将妇女受压迫的原因归结到某种制度----资本主义制度或父权制度,
而是选择了一个新的视角,认为是男性对女性的偏见造成的,且这种偏见伸伸的扎根于法律
或是其他的意识形态中,或是通过将妇女排斥在某些特定的生活领域之外而体现出来的.
自由派女权主义认为解决妇女从属地位的方案应该从体制内部寻找而不是采取革命的手
段,力求在资本主义系统内获得平等的权利和自由.
2.马克思主义学派的女权主义
马克思主义学派的女权主义认为,女人受压迫的最终根源是资本主义制度,男人对女人的
统治可以看做资本家统治工人的必然结果.资本主义的社会结构和利益到乡，塑造了一整套
符合经济需要却置女性权利于边缘的女性概念.
马克思主义学派的女权主义认为解决的关键是要推翻资本主义制度.
3.激进派的女权主义
激进派的女权主义认为,女人受压迫是父权制度的结果,这种制度赋予了男人统治女人的
权利,使得女人处于"诗歌想象里占有最重要的位置,在历史中则全然缺席"的地位.女人被当
作物和商品,映衬着男人的主体地位和存在.中产阶级和核心家庭对父权制度的坚持和导引,
使得男性价值标准成为了整个社会的规范模式.长期浸染在父权文化中的妇女,逐渐把男性
做主导,强迫的男权意识内化为自身的价值取向而趋于沉默.
--------------------------------------------------------------------
以上的三个学派虽然存在明显的差异,但是他们都认定存在一个"与女性有关的真理
"----"女性"是一个区别于"男性"的独特群体;女性是根植于现实世界的积极因素,以自己的
清醒认识和仁慈,保护着自然和生命,并使其具有人的品格.因此,父权社会中的女性相比于
男性,更能够赋予人类更人性,更道德的生存模式,这种模式将引导着社会走向有益的目标.
--------------------------------------------------------------------
4.后结构主义的女权主义
后结构主义的女权主义受到后结构主义,精神分析和后结构主义精神分析的影响,主要议
题是女性在大众文化中进行自我确认的心理过程.
后结构主义的女权主义想要了解的是,在父权文化中,构建女性主体地位的过程,而不是"
女性特质"本身.后结构主义的女权主义认为,女性并非独立于父权社会之外,而是整合于父
权社会.
5.后现代女权主义
后现代女权主义主张解构由男性统治,主导的意义系统,构建一个突显女性主体性视角的
语言秩序,使女性的娱乐免受男权模式之虞.后现代女权主义提倡价值的多元化和界限的突
破.
三.女权主义的受众观
1.自由派女权主义----戴安娜 梅韩的受众观
梅韩的理论以量化的内容分析为主,通过计算电视节目中女性角色的种类和出现频率,揭
示了电视戏剧节目所反应的女性地位的变化.同时她又结合定性分析,批判电视不断以含有
性别歧视的女性形象奴化女性观众,主张电视应当宣扬正面的女性形象.
梅韩的论著<夜间女郎>集中体现了她的电视批判理论.1)基于"电视对女性角色的呈现,反
映了女性的生活,隐含了女性的信仰和价值观"的假设,她精确的描述电视中女性角色的行为
及变迁,以此说明现实生活中真实存在的情况.2)基于"观众会对电视形象照单全收,会利用
电视的经验来评价现实生活中他人行为是否适当"的假设,她对电视中的女性角色与真实社
会中的女性角色做比较分析.
她发现电视中女性的职业角色特点是:几乎全都是从事服务行业的,而男性从事的是控制
他人的行业.而且电视在告诉女性观众:职业女性只能从事服务行业,受男人的控制和领导,
因为女人天生不如男人;女强人会失掉幸福的家庭或不会有家庭,单身是他们的命运及生存
模式.
梅韩通过对20世纪50--80年代的一系列女性角色进行分析,得出结论:
1)电视中的种种女性角色综合表明,女人处于次等地位;女人应该是无私忘我的,完全为男
性奉献.
2)在天下太平的时候,女人是对世界秩序的扰乱的中断;在动荡不安的时候,女人是对世界
秩序的威胁和解构力量.
3)除了极少的例子,女性自主精神的表达,即使只是对性别意识的表达,都被视为有害和危
险的而被粗暴禁止.
归根揭底,电视以系列女性形象警告现实生活中的女性:女性的本分是无私,忘我,为男性
奉献,而不应该追求独立自主.
梅韩的理论不足:
1)她把所有的观众都看成是被动的,认为电视中的人物形象一定会深入观众心中.而实际
上一部分观众是有解读电视的主观能动性的,会从这些负面形象中滋生出反抗性别歧视的觉
醒意识.
2)她没有论及这些负面形象产生的背景和根源,这些形象究竟是如何影响女性观众的.
3)她没有认识到资本主义制度是造成电视中女性形象多为负面的主要原因.
2.马克思主义学派的女权主义----里丽安 罗宾逊的受众观
罗宾逊从真实的职业女性来检视电视中的女性形象,发现电视对女性形象的扭曲:电视形
象将女性的职业认同的工作情况归结为性别意识,而真实的职业女性视自身为一个具有独立
人格的人.
罗宾逊旨在揭露资本主义制度下父权象征的巨大威力,以及职业女性所受到的剥削.资本
主义最大的盈利机构----电视,采用各种策略(不惜扭曲女性形象)吸引观众,以达到一箭双
雕的目的:一是吸引观众为电视,广告商,资本主义企业带来更多的利润,另一方面是维护父
权秩序既而维护资本主义制度.
罗宾逊认为,女性可以对抗这种拨选，关键是从根本上推翻资本主义制度,使父权制度失
去为女性定位的社会基础和制度保证.
罗宾逊理论的缺陷:
制度的改变并不意味着女性的地位必然会为之改变,根深蒂固的父权秩序是压制女性的
现实执行者,不消除它,男女平等是不可能真正实现的.
3.激进派女权主义----卡诺尔 艾雪的受众观
艾雪的著作<日间电视:你永远不会想要出门>揭露了电视游戏节目和肥皂剧对女性的歧
视和奴化.她认为,肥皂剧和电视游戏之类的通俗节目,以贬低,抑制女性并竭力使父权家庭
理想化的方式,倡扬着父权秩序.这些节目把家庭生活描述为解决一切问题的灵丹.肥皂剧试
图向观众表明,家庭是女性的生活中心,甚至应该是女性的一切,女性不可以远离家庭,更不
能选择独居而发展真正的自我及主体性人格.它鼓吹所谓的理想的家庭模式,掩盖男性加在
女性身上的权利所产生的种种负面效应.在肥皂剧中,男性往往被塑造成完美的角色,却从不
展现男性具有的压抑,控制女性的主导权利.电视对家庭生活的描述,试图奴化女性观众,其
终极目标是维护男权统治,而女性因为在社会生活中长期处于缺席和沉默状态,逐渐把男权
秩序内化为自己的意识而丧失了自身全面发展的人权和个性,反过来却被男人嘲笑为天性愚
蠢,精神低下.
艾雪认为,女性特质有着无可比拟的优越性,女性完全可以脱离男性主导的秩序而建立起
女性群体主导的独立世界,以满足女性的特定需要和欲望.她认为女性应该发掘自我,脱离男
性,与其他女性团结起来,摆脱被男性贬低与歧视的处境.
艾雪理论的不足:
1)共同构成人类的男性,女性,二者是相互依存的,歧视女性是人类文明的缺陷,排斥男性

2)激进女权主义所依据的"泛姐妹情谊",漠视了女性之间的巨大差异,同时也过分夸大了

=====《传播学教程》=====

《传播学教程》笔记部分
胡师姐团队小贴士：下划线部分要求熟练背诵
第一编（1-2章）传播、传播学及其发展历史
一、传播学的概念
1、定义
1)库利（社会学角度）
2)皮尔士（符号学或语义学角度）
3)施拉姆
4)郭庆光:社会信息的传递或社会信息系统的运行
（共享说）信息的共享。
（劝服说）突出强调传播是有目的的。
（反映说）传播是一个有机体对于某种刺激的不同反应。
（交流说）用语言进行思想交流。
2、人类社会传播的基本特点:
①社会传播是一种信息共享活动；
②社会传播是在一定社会关系中进行的，又是一定社会关系的体现；
③从传播的社会关系性而言，它又是一种双向的社会互动行为；
④传播成立的重要前提之一，是传受双方必须要有共通的意义空间；
⑤传播是一种行为，是一种过程，也是一种系统。
二、传播与信息
1、信息的定义
①信息科学认为，信息是物质的普遍属性，是一种客观存在的物质运动形式；
②德国哲学家克劳斯指出，信息是由物理载体和意义构成的统一整体；
③我们把社会信息看做是物质载体和精神内容的统一，主体和客体的统一，符号和意义的统
一。
2、信息的特点和分类
信息分类:
根据信息系统和作用机制的不同，有的学者把信息分为两大类：非人类信息和人类信息。
有的学者将信息分为三类：物理信息、生物信息和社会信息。
社会信息及其传播的特点:
社会信息：指的是除人的生物和生理信息以外的、与人类的社会活动有关的一切信息。它是
物质载体和精神内容的统一，主体与客体的统一，符号和意义的统一。
三、传播学是研究社会信息系统及其运行规律的科学。
研究对象正是社会信息系统本身
1、社会传播的系统性
系统：指的是由相互联系，相互制约的若干部分结合在一起并且具有特定功能的有机整体。
2、社会信息系统的特点
①社会信息系统是一个开放性系统
②社会信息系统由各种子系统相互连结、相互交织而构成的整体。
③社会信息系统是一个具有双重偶然性的系统
双重偶然性：德国社会传播学家鲁曼提出的概念，指的是传播双方都存在不确定性，因此，
通过传播所做出选择有受到拒绝的可能。双重偶然性是人类社会信息系统所特有的属性，这
与它是以人为主体的活动有关。人类活动不仅受到生物运动规律的制约，而且受到精神和心
理运动规律的制约，这样影响社会信息系统运动极其结果的变量就更多、更复杂。双重偶然
性的存在说明社会信息系统是一个多变量的系统，这些变量如果处理不当，便会引起传播障
碍和传播隔阂。
④社会信息系统是一个自我创造、自我完善的系统。
3、社会信息系统的运行与社会发展
①传播障碍包括结构和功能障碍，如传播制度是否合理、传播渠道是否通畅、信息系统的各
部分功能是否正常等。
②传播隔阂包括个人之间的隔阂、个人与群体的隔阂，成员与组织的隔阂，群体与群体、组
织与组织、世代与世代、文化与文化之间的隔阂等。传播隔阂既包括无意的误解，也包括有
意的曲解。
③传播障碍和传播隔阂的存在会造成社会成员的认知、判断、决策和行动的混乱，带来一系
列的社会问题，这些问题如果不及时妥善地解决，必会影响社会的正常发展，严重的，甚至
会造成社会混乱和国家解体。
4、传播学的任务
四、马克思主义精神交往理论与传播学（这部分可以略过）
五、动物社会传递信息的常见信号就有以下几种：（这部分看一下就可以）
1、气味。（分泌特定气味的荷尔蒙－一般草食和肉食动物）
2、发光。（萤火虫求偶）
3、超声波。（蝙蝠）
4、动作。（灰雁动作信号，蜜蜂的“8字舞”）
5、声音。（鸟语）
动物传播的局限性：动物传播与人类传播不能同日而语的，两者之间有着本质的区别。表现
在：
①动物的信息行为是一种先天的本能行为，取决于体内的信息功能和遗传基因，而非后天的
系统学习；
②动物传递和接收信息的过程是基于条件反射原理的过程，而不伴随复杂的精神和思维活
动。
③总之，动物传播只是对自然界的一种被动的适应，而不能成为对自然界和自身进行能动的、
创造性改造。
六、人类传播活动几个发展阶段：（了解）
第一个阶段：口语传播时代人类传播活动，
重要意义：
①口语最初仅仅是一种将声音与周围事物或环境联系起来的符号，
②在人类认识和改造世界的社会实践中，逐渐提高了它的抽象能力，成了一种能够表达复杂
含义的音声符号系统。
③口语也大大促进了人类思维能力的发达。大大加速了人类社会进化和发展的进程，直到今
天，口语依然是人类最基本、最常用和最灵活的传播手段、——（符号系统思维社会）
局限性：
①口语是靠人体的发声功能传递信息的，由于人体能量的限制，口语只能在很近的距离内传
递和交流。
②口语使用的音声符号是一种转瞬即逝的事物，记录性较差，口语信息的保存和积累只能依
赖于人脑的记忆力。
③因此，口语受到空间和时间的巨大限制，在没有诸如电话等口语媒介的情况下、它只能适
用于较小规模的近距离社会群体或部落内的信息传播。——时空局限
第二个阶段：文字传播时代——文字是人类传播发展史上第二座重大里程碑。在结绳符号、
原始图画的基础上发展而来的。
人类传播的第一套体外化符号系统是什么?其产生有什么意义?
重要意义：
①文字克服了音声语言的转瞬即逝性，能把信息长久保存下来，使人类的知识、经验的积累、
储存不再单纯地依赖人脑的有限记忆力；
②文字能把信息传递到遥远的地方，打破音声语言的距离限制，扩展了人类的交流和社会活
动的空间；
③文字的出现使人类文化的传承不再依赖容易变形的神话或传说，而有了确切可靠的资料和
文献依据。
④总之，文字的产生使人类传播在时空两个领域都发生了重大变革。作为第一套体外化符号
系统，它的产生加速了人类利用体外化媒介系统的进程。大大推进了各地区经济、政治和文
化交流和融合。在统一的中华民族和中国文化形成和发展过程中发挥了巨大的作用。
局限性：手抄传播效率低、规模小、成本高。一部书抄写多册，耗费大量时日和人力。文字
信息的生产规模小，加上教育的普及程度低，文字传播基本上还属于政府、官吏以及统治阶
层的特权。
第三个阶段：印刷传播时代
重大贡献：（试述中国的印刷术发明对印刷传播发展的贡献）
①中国的造纸术和印刷术为推动世界文明和人类传播的发展作出了重大贡献。
②印刷术的发明标志着人类已经掌握了复制文字信息的技术原理，有了对信息进行批量生产
的观念。
③印刷机使文字信息的机械化生产和大量复制成为可能。
④在社会政治、文化和教育领域中带来的巨大影响，对社会经济也起到了巨大的推动作用。
第四个阶段：电子传播时代
贡献：实现了信息的远距快速传播。从人类社会信息系统的发展角度看，电子媒介还另具两
个里程碑式的意义：它形成了人类体外化的声音信息系统和体外化的影像信息系统。实现了
声音和影像信息的大量复制、传播及历史保存（后人－听观－音容笑貌）。使文化传承的内
容更丰富，感觉更直观，依据更可靠。一句话，它们使人类知识经验的积累和文化传承的效
率和质量产生了新的飞跃。
电脑的出现意味着人的大脑这一信息处理中枢也开始了体外化的进程。电子信号的传输也
实现了由模拟信号向数字信号的发展。电子传播技术的发展、使人类进入了全新的、前所未
有的信息社会。
这个过程，是人类使用的传播媒介不断丰富的历史，也是社会信息系统不断发达、不断趋
于复杂化的历史。
七、信息社会
信息社会：20世纪60年代末70年代初，日本、美国等发达国家最早提出。指的是“信息
成为与物质和能源同等重要甚至比之更加重要的资源，整个社会的政治、经济和文化以信息
为核心价值而得到发展的社会。”它是在农业社会和工业社会充分发展的基础上到来的，媒
介技术或社会信息系统的发达是其诞生的基本条件。
信息社会特点：
①产业：社会经济的主体由制造业转向以高新科技为核心的第三产业，即信息和知识产业占
据主导地位：
②主体：劳动力主体不再是机械的操作者，而是信息的生产者和传播者；
③交易：交易结算不再主要依靠现金、而是主要依靠信用；
④贸易：贸易不再主要局限于国内，跨国贸易和全球贸易将成为主流。
美国传播学家哈特对传播媒介系统的分类：
①示现的媒介系统。即面对面传递信息的媒介，如口语和表情、动作、眼神等非语言符号，
是由人体感官或器官本身来执行功能的媒介系统。传收二方都不需使用机器。
②再现的媒介系统。包括绘画、文字、印刷和摄影等。传方需使用机器。
③机器媒介系统。包括电信、电话、唱片、电影、广播、电视、计算机通信等。传收二方都
需使用机器。
三类媒介按先后顺序依次出现。从不依靠任何机器手段的“示现媒介”到部分依靠机器的“再
现媒介”，再到完全依靠机器的“机器媒介”，是一个人类传播媒介手段日趋丰富的过程，
也是人体的信息功能日益向外扩展、体外化信息系统逐渐获得相对独立性的过程。
体外化信息系统的发展过程——体外化信息系统经历了功能分化和多样化的过程，正在迎
来一个重新统合的时代。如何理解这个观点?
①体外化信息系统的发展经历了功能分化和多样化的过程，如视觉系统、听觉系统、保存和
记忆系统，处理和传输系统、私人信息系统和公共信息系统等；从媒介而言，则有信件、书
籍、报刊、电话、广播、电视、传真、计算机、人造卫星等。20世纪50年代后，这些分散
的媒介系统在各自的领域都得到充分发展，功能也越来越强。
②90年代以来一个最明显的变化，就是不同的媒介功能出现融合的趋势。过去由分散的媒
介系统所执行的不同功能，今后将会综合到信息高速公路这一综合的信息传播系统当中。可
以说，人类的社会信息系统已超越了高度分化和多元发展阶段，迎来了重新统合的时代。这
是社会信息系统演化中的一大飞跃，同时也意味这个系统规模更巨大，结构更复杂。
③麦克卢汉的“媒介是人的延伸”。认为不同的传播媒介是人不同感官和器官向外部世界的
“延伸”，这个过程不断扩大了人类征服自然和改造世界的能力。从另一角度看，媒介从人
体“延伸”出去的过程，也是媒介不断获得独立性和自主性的过程。任何一种媒介对我们来
说都是外在化的客观事物，它们会拥有自己的运动规律，以自己的独特方式反过来制约和影
响人类社会的发展，带来社会结构的变化，改变人类的观念和生活方式。以媒介为核心的社
会信息系统越巨大化，结构越复杂化，人类对它的控制就越间接、越需要在更大范围内的合
作。
二战后信息社会发展过程
①初级信息化阶段（50—80年代中期）：报刊、广播、电视等大众传播媒介得到高度普及，
个人媒介日趋多样化；
②高度信息化阶段（80年代末—今）：
a、大众传媒进一步发达，广播电视进入数字化多频道和卫星跨国传播时代；
b、微型电脑普及，成为个人综合信息处理的媒介；
c、以计算机、互联网和多媒体为代表的新传播发展，使不同媒介出现融合的新趋势。
第二编（第 3 章）传播中符号、意义及象征性社会互动
社会信息包括符号和意义
一、符号
符号：信息的外在形式或物质载体，是信息表达和传播中不可缺少的一种基本要素。
二、符号的分类
通常采用一种常见的、简要的二分法，即把符号分为信号和象征符两大类。
信号和象征符
信号的特点：
①信号与其表示的对象事物之间具有自然的因果性，从这个意义上说，一切自然符号都是信
号；
②信号与其表示的事物之间通常具有一对一的固定对应关系；
象征符的性质：
①象征符必须是人工符号，是人类社会的创造物；
②象征符不仅能够表示具体的事物，而且能够表达观念、思想等抽象的事物；
③象征符不是遗传的，而是通过传统、通过学习来继承的；
④象征符是可以自由创造的，这就是说象征符在与其指代的对象事物之间不需要有必然的联
系，它们的关系具有随意性。
非语言符号类型：①语言符号的伴生符，如声音的高低、大小，速度的快慢等；
②非语言符号是体态符号，例如动作、手势、表情等；
③非语言符号是物化、活动化、程式化的符号。
三、符号的基本功能:
①表述和理解功能：人与人之间的传播活动首先表现为符号化和符号解读的过程；
②传达功能：作为精神内容的意义只有转换为一定物质形式的符号才能在时空中得到传播和
保存；
③思考功能：即引发思维活动，思考首先要有对象及关于对象的知识，而这些都以符号形式
存在于人的头脑中。
四、人类传播中的意义交流
1、意义: 人对自然事物或社会事物的认识，是人给对象事物赋予的含义，是人类以符号形
式传递和交流的精神内容。这是一个极广义的概念，在这里，人类在传播活动中交流的一切
精神内容，包括意向、意思、意图、认识、价值、观念等，都包括在意义的范畴之中。
2、符号本身的意义及分类:
符号是意义的携带者，任何一种符号都有其特定的意义，我们也可以将之称为符号的意义。
①明示性意义与暗示性意义
②外延意义与内涵意义
③指示性意义与区别性意义
3、传播过程中-符号的意义 （2所讨论的是符号本身的意义）
①传播者的意义：在传播过程中，传播者通过符号来传达他所表达的意义，然而，传播者的
意义并不总是能够得到正确传达的。在这里，符号本体的意义与传播者的意义未必是一回事，
这是很明显的。
②受传者的意义：对同一个或者同一组符号构成的讯息，不同时代的人有不同的理解，同一
时代的不同个人也会有不同的理解或者解释，这说明符号本身的意义与受传者所接收到的意
义同样也未必是一回事。
③情境意义：著名语言学家曾经指出，语言符号不提供也不可能提供传播活动的全部意义。
交流所得，有相当一部分来自于语境。
传播情境：指的是对特定的传播行为直接或间接产生影响的外部事物、条件或因素的总称，
它包括具体的传播活动进行的场景，如什么时间、什么地点、有无他人在场等等。在广义上，
传播情境也包括传播行为的参与人所处的群体、组织、制度、规范、语言、文化等较大的环
境。
4、语言符号的暧昧性主要体现在：①语言符号本身意义的模糊；
②语言符号的多义性
五、象征性社会互动(象征行为、象征性社会互动、象征性文化)
1、 象征行为：指的是用具体事物来表达某种抽象概念或思想感情的行为。
2、 象征性互动理论：
（1）倡始人是20世纪初的美国社会心理学家米德，他去世后的论文和讲稿集《精神、社会
与自我》对这一理论的形成产生了重要影响。60年代以后，美国学者布鲁默等人进一步发
展了这一理论，象征性互动理论把人看做是具有象征行为的社会动物，把人类的象征活动看
做是一个积极的、创造性的过程，是人类创造出广泛的文化的一种活力，认为研究象征行为
不仅对提示人的本质，而且对理解现实的社会生活都具有重要的意义。
（2）根据布鲁默的说明，象征性互动理论的核心问题是考察以象征符为媒介的人与人之间
的互动关系。它的三个基本前提：
①人是根据“意义”来从事行动的；
②意义是在“社会互动”的过程中产生的；
③意义是由人来“解释”的。
意义、社会互动、解释是该理论的三个主概念。
3、象征性社会互动：指的是人与人之间通过传递象征符和意义而相互作用和相互影响的过
程。象征性互动，它提示的是传播这一社会过程的一个基本概念。
象征性社会互动过程：
①首先是一个互动双方通过象征符来交流或者交换意义的活动；
②通常具有赋予行为动机和确定行为取向的功能；
③它的意义交换有个前提，即交换的双方必须要有共通的意义空间；
④从唯物主义观点来看，它虽然交换的是精神内容，但它是建立在人类丰富的社会实践基础
之上的。
4、象征性文化与现代社会:（P55）
第三编（第 4章）人类传播的过程的模式
一、从传播过程考察传播模式（内部）
引：传播过程的构成要素
①传播者：即信源，信息发出者，个人、群体或组织皆可；
②受众：即信宿，信息接收与反应者，个人、群体或组织皆可；
③讯息：由一组相互关联的有意义的符号组成，能表达某种完整意义的信息，传、受双方社
会互动的介质；
④媒介：即传播渠道、信道、手段或工具，讯息的搬运者，连接传播过程中各种因素的纽带；
⑤反馈：受传者对接收到的信息的反应或回应，受传者对传播者的反作用。体现社会传播的
双向性和互动性。
结：传播过程的特点
①动态性：其运动特点在形式上体现为有意义的符号组合（讯息）在特定渠道中的流动，实
质是传播者和受众的意义（精神）内容的双向互动，即作用与反作用。
②序列性：各环节和因素的作用各有先后次序，按讯息的流向依次执行功能。
③结构性：传播过程的结构即各要素（环节）之间相互关系的总体。时间上的先后次序、形
态上的链式连接也是其结构特点，各环节（要素）本身还有各自的深层结构。
模式，是科学研究中以图形或程式的方式阐述对象事物的一种方法。这种方法具有双重性质：
①模式与现实具有对应关系，但又不是对现实事物的单纯描述，而具有某种程度的抽象化和
定理化性质；
②模式与一定的理论相对应，又不等于理论本身，而是对理论的一种解释或素描。因此，一
种理论可以有多种模式与之相对应。
1、传播过程的直线模式:
（1）拉斯韦尔5W模式
1948年，美国学者拉斯韦尔在《传播在社会中的结构与功能》的一篇论文中，首次提出了
构成传播过程的五种基本要素，并按照一定结构顺序将它们排列，形成了后来称之为“五W
模式”或“拉斯韦尔程式”的过程模式。
意义：在传播学史上有重要意义，第一次将人们每天从事却又阐述不清的传播活动明确表述
为五个环节和要素构成的过程，为人们理解传播过程的结构和特性提供了具体的出发点。实
际上，后来大众传播学研究的五大领域即“控制研究”、“内容分析”、“媒介分析”、“受
众分析”、和“效果分析”，就是沿着拉斯韦尔模式的这条思路形成的。
缺陷：还不是完全的，这主要表现在它们属于一个单向直线模式。拉斯韦尔虽然考虑到
受传者的反应（效果），却没有提供一条反馈渠道，因而，这个模式没有解释人类社会传播
的双向和互动性质。
（2）香农--韦弗模式
1949年，美国两位信息学者香农和韦弗在《传播的数学理论》一文中提出了一个过程模
式，称为传播过程的数学模式或香农－韦弗模式。
意义：它为传播的进一步研究提供了重要的启发。首先，这个模式导入噪音的概念，表
明了传播不是在封闭的真空中进行的，过程内外的各种障碍因素会形成对讯息的干扰，这对
于社会传播过程来说也是一个不可忽视的重要因素。其次，模式对一些技术和设备环节的分
析，提高了传播学者对信息科技在传播过程中的作用的认识，这种作用在现代信息社会中越
来越明显了。这个模式为文理结合的方法考察传播过程打下了基础。
缺陷：它描述的是电子通信过程，而且是一个直线单向过程，缺少反馈的环节，如果把
这个模式完全应用于人类的社会传播是不行的。

结:传播过程的特点:
①传播过程具有动态性；②传播过程具有序列性；③传播过程具有结构性
二、从社会系统角度考察传播结构 P65
1、赖利夫妇的系统模式（从社会学角度）
1959年，赖利夫妇在《大众传播与社会系统》一文中，提出了一个引人注目的系统模式。
这个模式告诉我们，任何一种传播过程都表现为一定的系统的活动，而多重结构是社会传播
系统的本质特点：
①从事传播的双方即传播者和受传者都可以被看做是一个个体系统，这些个体系统各有
自己的内在活动，即人内传播；
②个体系统与其他个体系统相互连接，形成人际传播；
③个体系统不是孤立的，而是分属于不同的群体系统，形成群体传播；
④群体系统的运行又是在更大的社会结构和总体社会系统中进行的，与社会的政治、经
济、文化、意识形态的大环境保持着相互作用的关系。
从这个模式中，可以看到，社会传播系统的各种类型，包括微观的、中观的和宏观的系
统，每个系统既具有相对的独立性，又与其他系统处于普遍联系和相互作用之中。这种结构
的多重性和联系的广泛性体现了社会传播是一个复杂而有机的综合系统。
2、马莱兹克的系统模式 （从社会心理学角度）
德国学者马莱兹克1963年在《大众传播心理学》一书中提出的系统模式。他把大众传播
看做是包括社会心理因素在内的各种社会影响力交互作用的“场”，这个系统的每个主要环
节都是这些因素或影响力的集结点，其中包括：
1、影响和制约传播者的因素：传播者的自我印象、传播者的人格结构等；
2、影响和制约受传播者的因素：受传者的自我印象、受传者的人格结构等；
3、影响和制约媒介与讯息的因素：两个方面，一个是传播者对讯息内容的选择和加工；
另一方面是受传者对媒介内容的接触选择。
该模式说明，社会传播是一个极其复杂的过程，评价任何一种传播活动，解释任何一个
传播过程即便是单一过程的结果，都不能简单地下结论，而必须对涉及该活动或过程的各种
因素或影响力进行全面的、系统的分析。
3、社会传播的总过程理论（宏观过程研究） P68
社会传播的总过程研究最早起源于日本，它是在对美国的主流传播学进行反思和批判的基
础上形成的。
把传播看做是一个与社会交往形态密切相关的重要范畴，从这个观点出发，他们在对人
类社会传播的总的历史发展过程进行分析的同时，也把现代社会中的传播特别是大众传播过
程与宏观的社会结构结合起来进行考察，因而称为“社会传播的总过程”研究。
从唯物观来理解社会传播的总过程：
1、信息传播属于与人类的精神生产相对应的精神交往活动的范畴；
2、信息传播既然属于与精神生产密切相关的范畴，那么，要考察信息传播，就不能不考察
社会的精神生产；
3、精神生产既然是一种生产，也必然会存在着生产力与生产关系的辩证运动；
4、传播学既然把考察人与人之间的传播关系作为自己的首要宗旨，那么就不能单纯考察狭
义的信息“交流”，而必须与宏观的社会精神生产和精神交往联系起来加以考察，否则便不
能提示这种关系的实质。
唯物史观是在与宏观社会结构的普遍联系上来把握社会传播过程的，社会传播过程是人类
社会总过程的一部分，传播的结构体现了人类社会的结构。
第四编（第 5 章）人内传播
一、人内传播
1、 定义: 也称内向传播、内在传播或自我传播，指的是个人接受外部信息并在人体内部进
行信息处理的活动。如果我们把个人看做是社会传播系统中的个体系统，那么人内传播便是
个体系统内的传播。社会是由作为意识和行为主体的个人组成的，从这个意义上，作为个体
系统之活动的人内传播也是一切社会传播活动的基础。
2、人内传播的环节及特点（唯物主义认为:人内传播是人的能动的意识和思维活动）
环节：①感觉、②知觉、③表象、④概念、⑤判断、⑥推理
除此之外，人内传播还伴随着人的感情和复杂的心理活动，它们在很多情况下对
人内传播的过程和结果产生重要的影响。
特点：①人内传播虽然是人体内部的信息处理过程，但这个过程不是孤立的，它的两端都与
外部过程保持着衔接关系；
②人内传播虽然与人体内部的生理机制密切相关，但在本质上是对社会实践的反映，
具有鲜明的社会性和实践性；
③人内传播对外部世界是积极能动的反映。这种能动性表现在人的意识和思维活动具
有生产性和创造性。
④人内传播是其他一切传播活动的基础，任何一种其他类型的传播都
必然伴随着人内传播的环节，而人内传播的性质和结果，也必然会对其他类型的传播产生重
要的影响。
3、人内传播的互动性:（从社会心理过程方面来讲，人内传播具有社会互动性和互动机制）
(1)人内传播有双向互动性:
人内传播不但具有鲜明的社会性，而且具有明确的互动机制。人内传播是个人体内的
信息传播活动，因此，不少人也将之称为“自我”传播。这说明，人内传播是自我意识主导
下的传播活动。人的自我并不是封闭的和孤立的，相反，它是在与他人的社会联系中形成的，
自我具有鲜明的社会性和互动性，而自我的社会性和互动性也体现了人内传播的社会性和互
动性。因此，考察人的自我意识的活动，应该是揭示人内传播之社会性和互动性的一把钥匙。
(2)米德的“主我客我”理论
美国学者米德在研究人的内省活动时发现，自我意识对人的行为决策有着重要的影响。
自我可以分解成相互联系、相互作用的两个方面：一方面是作为意志和行为主体的“主我”，
它通过个人对事物的行为和反应具体表现出来；另一方面是作为他人的社会评价和社会期待
之代表的“客我”，它是自我意识和社会关系性的体现。换句话说，人的自我是在“主我”
和“客我”的互动中形成的，又是这种互动关系的体现。
米德认为，人的自我意识就是在这种“主我”和“客我”的辩证互动的过程中形成、发
展和变化的。“主我”是形式（由行为反应表现出来），“客我”是内容（体现了社会关系
的方方面面的影响）。“客我”可以促使“主我”发生新的变化，而“主我”反过来也可以
改变“客我”，两者的互动不断形成新的自我。作为自我传播的人内传播的社会性、双向性
和互动性也就显而易见。人内传播是一个“主我”和“客我”之间双向互动的社会过程，互
动的介质同样是信息，用米德的话来说即“有意义的象征符”。“有意义的象征符”不但能
够引起他人的反应，而且能够引起使用者自己的反应，作为人内传播的思考活动，就是通过
“有意义的象征符”来进行的。
(3) 布鲁默的“自我互动”理论
现代象征互动理论的集大成者布鲁默在1969年出版的《象征互动论》中提出了这样一个
理论：人能够与自身进行互动，即自我互动。这一理论认为，人是拥有自我的存在，人在将
外界事物和他人作为认识和行为的对象的同时，也把自己作为认识和行动的对象。在这个过
程中，人能够认识自己，拥有自己的观念，与自己进行沟通与传播，并能够对自己采取行动。
他指出，这种自身的互动―――“自我互动”―――在本质上来说是与他人的的社会互
动的内在化，也就是与他人的社会联系或社会关系在个人头脑中的反映。不过，自我互动并
不是与他人的社会互动在头脑中的简单再现，而是具有独自的特点。换句话说，在自我互动
过程中，人脑中会出现善于他人期待的印象，这些期待具有一定的意义，个人会考虑这些期
待对自己意味着什么。但是，个人又不是原封不动地接受这些期待的，在人内传播的过程中，
个人会沿着自己的立场或行为方向对他人期待的意义进行能动的理解、解释、选择、修改、
加工，并在此基础上重新加以组合。经过这个过程的他人期待已不是原来意义上的他人期待，
它所形成的自我也已不是原来意义上的自我，而是一个新的行为主体。
这一理论有助于我们理解社会传播与个人的自我的关系。它告诉我们，人不但与社会上
的他人进行传播，而且与自己本身进行传播，即自我传播。
4、 人内传播的一种形式——内省式思考
(1)分类
一种是日常的、长期的自我反思活动，它以完善个人的品德和行为为目的，具有明显的
长期目标性和连贯性。
另一种是短期的，以解决现实问题为目的的自我反思活动，称为内省式思考。
(2)内省式思考的特点也是人内传播的特点。
①内省式思考并不是在日常生活的每时每刻都发生的，只有在一个人遇到困难、障碍等
新的问题状况，对既有的行为方式是否适用难以判断之际，才会活跃起来。
②它的过程并不是封闭的，而是与周围的社会环境，与周围的他人有着密切的联系。
③它不仅是一个横向的社会过程，而且是一个将过去和未来联系起来的、纵向发展和创
造的过程。
第五编（第5 章）人际传播
一、人际传播
1、定义：个人与个人之间的信息传播活动，也是由两个个体系统相互连接组成的新的信息
传播系统。它是一种最典型的社会传播活动，也是人与人社会关系的直接体现。
2、人际传播的动机:
(1)获取信息
(2)建立与他人的社会协作关系
(3)满足基于人的社会性的精神和心理需求，也是个人从事人际传播活动的一个基本动机。
(4)自我认知和相互认知。
a、客观的自我认知是使个人能力得到恰当发挥的前提。
b、库利“镜中我”1909《社会组织》
<1>镜中我:：库利在1909年出版的《社会组织》一书中提出 “镜中我”概念的。他认为，人
的行为在很大程度上取决于对自我的认识，而这种认识主要是通过与他人的社会互动形成
的，他人对自己的评价、态度等等，是反映自我的一面“镜子”，个人透过这面“镜子”认识和
把握自己。因此，人的自我是在与他人的联系中形成的，这种联系包括三个方面：
①关于他人如何“认识”自己的想象；
②关于他人如何“评价”自己的想象；
③自己对他人的这些“认识”或“评价”的情感。
库利认为:：“镜中我”也是“社会我”，传播特别是初级群体中的人际传播，是形成“镜
中我”的主要机制。一般来说，这种以“镜中我”为核心的自我认知状况取决于与他人传播
的程度，传播活动越活跃，越是多方面的，个人的“镜中我”也就越清晰，对自我的把握也
就越客观、越准确。
3、人际传播的分类及特点
一种是面对面的传播；另一种是借助某种有形的物质媒介的传播。
①人际传播传递和接收信息的渠道多，方法灵活；
②人际传播的信息的意义更为丰富和复杂；
③人际传播双向性强，反馈及时，互动频度高；
④与组织传播和大众传播相比，人际传播属于一种非制度化的传播；
4、人际传播的社会功能:
关于人际传播社会功能的研究领域:
(1)人际传播在个人社会化中的作用(如镜中我、主我、客我、塔尔德的社会模仿理论)
(2)对大众传播效果的影响。（意见领袖、两级传播、创新-普及）
5、人际传播与自我表达 P85
1、人际传播是真正意义上的“多媒体”传播
人际传播在本质上来说是个人之间相互交换精神内容（意义）的活动，精
神内容交换的质量如何，在很大程度上取决于经的媒体（符号载体）。在这里，媒体也可以
理解为任何能够传递信息的手段和渠道。人际传播是种高质量的传播活动，它的传播手段多，
渠道广，方法灵活，因此人际传播，是真正意义上的多媒体传播。
②姿态的传播功能：
体姿在狭义上指手势和身体各种活动姿势，在广义上也把面部器官活动构成的表情、神
色等包括在内。
功能：强调语言；补充语言；代替语言；控制语言；表达超语言的意义；
③外观形象与自我表达
④自我表达与社会价值规范
第六编（第 6章）群体传播与组织传播
一、群体传播
1、群体：指的是具有特定的共同目标和共同归属感、存在着互动关系的复数个人的集合体。
群体的成立、生存和发展需要一些条件，其中最基础的条件有三项：
①共同的目标和关心事项，这是群体凝聚力的核心；
②成员之间的协作意愿，也就是个人参加群体并愿意为之作出贡献的动机；
③群体与成员、成员与成员间的传播互动机制，即群体传播。
2、群体的特征：目标取向有共同性；具有以“我们”意识为代表的主体共同性。
3、群体的分类: 组织群体、非组织群体
4、群体的社会功能和意义
正面功能：群体具有重要社会功能，简言之，群体是将个人与社会相连结的桥梁和中间纽
带。群体是社会的中观系统，是社会的组成部分，或者说是“局部社会”。个人在参与社会
活动之际，首先是作为局部社会―――群体的一员出现的，一个人不能做个合格的群体成员，
同样也做不了合格的社会成员。群体帮助个人完成社会化过程，训练和分配社会角色，形成
社会规范和准则，调节和控制个人的行为。
因此，群体对社会的一个主要贡献，就是它有助于社会秩序的维持，使社会秩序的连续
性得到保证。不仅如此，群体还通过社会分工与协作，将分散的个人力量集结起来，能够完
成个人所不能完成的社会工作和事业。因此，群体同样是推动社会发展的重要力量。
另一方面，群体对个人成员也具有重要的意义：①群体是满足个人需求的重要手段；②
群体是个人的信息来源和社会安全感的提供者；③群体是个人表现和实现自我的场所与手
段。
负面功能：某些群体为实现一已目的而拒绝承担正当的社会分工，给社会秩序和社会生
活带来混乱的情况也是常见。对个人来说，群体在为个人带来利益的同时，又具有束缚和压
抑个性的负面作用。
5、群体传播与内部机制:
(1)群体传播：就是将共同目标和协作意愿加以连接和实现的过程。这个过程形成群体意
识和群体结构，而这种意识和结构一旦形成，又反过来成为群体活动的框架，对个人成员的
态度和行为产生制约，以保障群体的共同性。因此，群体传播是群体生存和发展的一条基本
的生命线。
群体意识：就是参加群体的成员所共有的意识。它包括以下几个方面的内容：
①关于群体目标和群体规范的合意；
②群体感情，这里不仅指由各成员的密切接触和协作而产生的成员间的个人感
情，更指群体成员主观境界的融合（精神上的一体化）所产生的“我们”感情；
③群体归属意识，即群体成员因从群体活动得到某种程度的需求满足而对群体
所产生的认同感。这几个要素越具备，群体意识就越高，越欠缺则群体意识越薄弱。
(2)群体传播对群体意识形成的影响，群体意识是群体信息在群体传播和互动中形成的)
(3)群体规范（群体意识的核心内容）对群体传播的影响:
群体规范：指成员个人在群体活动中必须遵守的规则，在广义上也包括群体价值，即群
体成员关于是非好坏的判断标准。一般认为，群体规范的功能包括以下几项：
①协调成员的活动、规定成员角色和职责以促进群体目标的达成；
②通过规范的共有来保证群体的整体合作；
③通过指示共同的行为方式以维持群体的自我同一性；
④为成员个人提供安全的决策依据。
它是群体意识的核心内容，它的主要作用在于排除偏离性的意见，将群体内的意见分歧和
争论限制在一定范围之内，以保证群体决策和群体活动的效率。
群体规范不仅对群体内的传播活动起着制约作用，而且对来自群体外的信息或宣传活动
的效果具有重要的影响。
(4)群体压力与趋同心理（在传播过程中，群体对个体的影响）
①群体压力，即群体中的多数意见对成员中的个人意见或少数意见所产生的压力。在面
临群体压力的情况下，个人和少数意见一般会对多数意见采取服从态度。
在群体内部，传播活动经常是在“一对多”或“多对一”、“少数对多数”或“多数对
少数”的场合下进行的。在这种情况下，无论是传播者还是受传者都会感受到某种程度的群
体压力。
“个人服从集体、少数服从多数”是群体活动的一个基本原则；但在不少场合，群体压
力也会带来错误的判断，形成对多数意见的盲目服从。
②信息压力，指的是一般人在通常情况下会认为多数人提供的信息，其正确性概率要大
于少数人，基于这种信念，个人对多数意见会持较信任的态度。
③趋同心理，也叫遵从性，指的是个人希望与群体中多数意见保持一致，避免因孤立而
遭受群体制裁的心理。在很多情况下，个人被迫接受多数意见，正是出于这种担忧。
6、集合行为中的传播机制:（非常态的群体行为）
（1）集合行为：指的是在某种刺激条件下发生的非常态社会集合现象。例如火灾、地震后
的群众骚乱，出于某种原因的自发集会、游行、种族冲突，物价上涨的流言引起的抢购风潮
等等。集合行为多以群集、恐慌、流言、骚动的形态出现，往往会造成对正常的社会秩序的
干扰和破坏。
集合行为虽然是一种自发的反常现象，但它产生是有条件的。一般认为，集合现象的发
生需要三个基本条件：
①结构性压力。例如在自然灾害、经济萧条、失业等危机状况下，社会上普遍存在不安
心理和紧张情绪，这些结构性因素是集合行为发生的温床。
②触发性事件。集合行为一般都是某些突发性事件或突然的信息刺激引起的。
③正常的社会传播系统功能减弱，非常态的传播机制活跃化。例如人们与其相信报纸、
电视等大众传媒的正式新闻报道，更倾向于相信来路不明的流言等等。
由上可以看出，在集合行为发生的三个条件中，至少有两个条件与信息传播有直接的关
系。即便是第一个条件，即人们感受到社会的危机状况和结构性压力，也是社会传播的结果。
因此信息传播贯穿于集合行为的始终，只不过它受到一些特殊传播机制的制约，说它特殊，
主要指它与人类正常的、有理性的传播行为相比，更具有非理性的特点。
（2） 集合行为的几种类型（特殊的传播机制）
①群体暗示与群体感染；
集合行为中的传播可以分为两个方面，一是信息本身的传播，二是与此相伴随的情绪或
感情的传播，这两种传播都摆脱不了暗示与感染机制的支配。
暗示指的是一种传播方式，即不是通过直接的说服或强制，而是通过间接的示意使人接
受某种观点或从事某种行为。集合行为中的暗示则不同，它更接近于临床医学中的催眠暗示。
换句话说，集合行为的参加者通常处于昂奋、激动的精神状态，这种状态使他对周围的信息
失去理智的分析批判能力，表现为一味的盲信和盲从。处于激动的人群中的个人具有很强的
“被暗示性”，周围人的话语、表情、动作乃至现场的氛围，对他都成为有力的暗示刺激，
使他的信念、思维和行为方式迅速与现场的人群融为一体。
在集合行为中，群体感染指的是某种观念、情绪或行为在暗示机制的作用下以异常的速
度在人群中蔓延开来的过程。其传播速度快，主要原因还是由于在现场昂奋的氛围中，成员
失去理性的自控能力，而对来自外部的刺激表现出一种本能的反应。经过这种群体感染过程，
一种情绪、一种观点会迅速支配整个人群，并迅速引发整个人群的激烈行动。
集合行为中的信息和情绪的传播，主要受到暗示和感染机制的制约。在这种机制下形成
的集合行为，往往会对政党的社会秩序造成破坏性的后果。
②群体模仿与“匿名性”；P97
③集合行为中的“信息流”
在集合行为中，信息的流动也呈现出一种异常状态。在这里，要辨认谁是信源、谁是
信宿是十分困难的，几乎每个人都是消息的发布者，同时也是消息的接受者。美国社会学家
布鲁默认为，集合行为的初步形态是“循环反应”。所谓“循环反应”，即一方的刺激成为
另一方的反应，而另一方的反应则又反过来成为这一方的刺激的循环往复过程。
流言，是一种信源不明、无法得到确认的消息或言论，通常发生在社会环境具有较高的
不确定性，而正规的传播渠道（如大众传媒等）不畅通或功能减弱的时期。集合行为中的主
要的信息形式是流言。
美国心理学家奥尔波特认为，在一个社会中，“流言的流通量与问题的重要性和涉及该
问题的证据暧昧性之乘积成正比。
这个公式指出流言发生的两个特点：
第一，流言通常是围绕人们比较关心的问题、涉及切身利益的重要问题发生的；
第二，来自正式渠道的有关证据的信息不足、状况的暧昧性增加，会推动人们去通过
流言渠道寻求信息。
流言分为非紧急事态下的流言和紧急事态下的流言。集合行为中的流言属于紧急事态下
的流言。这种流言的特点：
第一，流言信息的快速增殖；
第二，流言信息的奇异回流现象；
第三，流言中伴随着大量的谣言；
二、组织传播
1、组织：从广义上来说，任何由若干不同功能的要素按照一定的原理或秩序相组合而形成
的统一整体，都可以称为组织，如细胞组织、人体组织等。
从狭义上，组织指的是“人们为实现共同目标而各自承担不同的角色分工，在统一
的意志之下从事协作行为的持续性体系。”从这个定义而言，组织既是社会群体的一种，又
与一般的松散群体有明显的不同。这种区别是多方面的，一般来说，辨认一个群体是否属于
组织，主要看这个群体中是否有一个统一的指挥或管理系统。
2、 组织的结构特点：
①专业化的部门分工；②职务分工和岗位责任制；③组织系统的阶层制或等级制。
3、组织传播及其重要功能:
组织传播，就是以组织为主体的信息传播活动。包括两个方面：一是组织内传播；二是组
织外传播，这两个方面都是组织生存和发展必不可少的保障。
功能：组织传播的总体功能，就是通过信息传递将组织的各部分联结成一个有机整体，以
保障组织目标的实现和组织的生存与发展。它既是保障组织内部正常运行的信息纽带，也是
组织作为一个整体与外部环境保持互动的信息桥梁。
具体来说，组织传播的功能可分为以下几个方面：
①内部协调；②指挥管理；③决策应变；④形成共识
4、组织传播的过程与机制
（1）组织内传播的正式渠道:——体现了“组织人”的特点
它指的是信息沿着一定组织关系（部门、职务、岗位以及其隶属或平等关系）环节在组
织内流通的过程。
其传播形式分为两种：
1.横向传播：指的是组织内同级部门或成员之间互通情况、交流信息的活
动，其目的是为了相互之间的协调和配合。在横向传播中，传播双方不具有上下级隶属关系，
平等的协商与联络是传播的主要形式。横向传播是否活跃，对组织具有重要意义。如果横向
传播渠道不畅，轻则会带来各部门、岗位之间的相互推委、互不合作，严重影响组织的办事
效率；重则会造成各部门、各成员之间各自为政，形成种种隔阂、矛盾、冲突，甚至形成独
立王国，破坏组织的有机统一。因此，在一个组织内，横向传播也必须得到制度的保证。
横向传播双向性强，互动渠道畅通；
②纵向传播：有单向流动性质，根据信息流向，纵向传播又区分为下行传播和上行传播。
下行传播，即有关组织目标、任务、方针、政策的信息，自上而下得到传达贯彻的过程。
以企业组织而论，日本学者认为企业组织最常见的下行传播主要有五个方面的内容：关于工
作任务和内容的指示或说明
关于组织成员权利和义务的信息（例如工资、劳保等）；
关于部门和岗位的职责、权限及其相互关系的信息；
工作单位上司对部下工作的评价和奖惩信息；
关于组织的目的、理念以及社会作用或贡献的信息。
下行传播的作用，包括使组织成员适应组织环境，了解工作内容，熟悉自己的职责、权
利和义务，培养成员对组织的一体感等等，它是一种以指示、教育、说服和灌输为主的传播
活动。
上行传播，指的是下级部门向上级部门或部下向上司汇报情况，提出建议、愿望与要求
的信息传达活动。这个过程很重要的，它有三个方面的意义：
第一，上行传播是中枢指挥管理部门获得信息反馈的重要渠道。通过这个渠道，指挥
管理者可以了解组织目标或任务在第一线的贯彻落实情况，并据此对既定决策进行修改，使
之更符合实际；
（4）基层部门或第一线人员是组织的窗口，他们对外部环境的变化往往握有第一手信息，
这些新的信息反映上去，能够成为组织进行新的应变决策的重要依据；
（5）上行传播是把握组织成员的精神状态的重要渠道，指挥管理者可根据下面反映的情况
及时采取措施，把成员的情绪和士气调整到组织所需要的理想状态。
上行传播和上行传播是组织内传播的两个基本渠道，这两个渠道是否通畅，关系到组织
的统一性和运作效率。一般来说，影响这两个渠道畅通的主要因素是组织的层次和环节，因
为它们都是逐级进行的。
（2）组织内传播的非正式渠道:---体现了“社会人”的特点
它指的是制度性组织关系以外的信息传播渠道。主要有两种形式：一是组织内的人际传
播，如组织成员工作之余的交谈、单位内外的各种私人交往等；二是非正式的小群体传播，
如各种自发的革新小组、兴趣小组或联谊会中的信息交流等。它是一种摆脱了组织的制度性
结构压力的一种传播活动。
特点：①交流的信息广泛；
②交流的双向平等性；
③本意交流和感情交流的成分多；
（3）组织内传播的媒体形式:
①书面媒体；②会议；③电话；④组织内公共媒体；⑤计算机通信系统
组织传播中使用媒体还有许多，例如电传、复印设备等
5、组织外传播及其形态: P106
（1）组织的信息输入
信息输入，是组织为进行目标管理和环境应变决策而从外部广泛收集和处理信息的活
动。建设具有快速反应机制的高性能信息采集和处理系统，是传播技术的发展和社会的信息
化对包括企业在内的一切组织提出的时代要求，不能满足这个要求的组织体，最终是不能获
得成功的。
POS系统，是英文Point of Sales或Point of Service的简称。这个系统出现于20
世纪80年代的西方发达国家，最初只是一些大型商店用来统计商品销售数据的简单系统，
现在已经发展为商家和厂家联合使用的综合系统。其原理是在商场或超市的收款处安装具有
POS功能的电脑终端，通过输入商品的条形码和购买者的有关资料，来把握商品销售和市场
需求的变化。
POS系统的价值：
①首先，它提供的是准确的实际数据，其可信性远远高于概率性的问卷调查或市场
评估的结果；
②其次，它提供的最新数据和实时信息，最能反映市场的现状及其变化；
③不仅如此，POS数据还有更多的用途，例如用于产品定位或产品周期分析以及流
行趋势分析等。
（2）组织的信息输出: P107
组织有目的、有计划地开展的信息输出活动，即组织的宣传活动。其大致分为三
种类型：公关宣传、广告宣传、企业标识系统宣传
①公关宣传：指组织为了与其所处的社会环境建立和保持和谐关系而进行的各种宣传
活动。其形式多样，如捐助社会公益事业、发行宣传刊物等。它是组织对外传播的一种重要
形式，其作用包括使外界公众了解组织的宗旨、目的和社会意义，树立良好组织形象以及防
止和解决组织与周围公众发生的矛盾和冲突等。
②广告宣传，是一种以付费形式利用各种媒体进行的大面积宣传活动，也是社会组织
尤其是企业组织广泛采用的一种信息输出方式。现代组织从事广告活动大致可分为两类：一
类是非商业广告，如公益广告、意见广告等；另一类是商业广告，以企业为主体。
在现代市场经济条件下，广告是企业组织参与激烈的市场竞争的主要手段。广告不仅
可以提高企业和商品的知名度，扩大企业影响，而且具有直接的促销效果。
③企业标识系统宣传，是英语Corporate Identity System的对译词，简称CIS，有
时也称为企业表征系统。CIS活动指的是企业组织使用统一的象征符号系统来塑造、保持或
更新企业形象的活动，所采用的象征符号一般为具有独自特色的视觉图案（包括社名、社色
等），它可以印制在社旗、社微、制服、办公用具和各类产品及其包装上，以保持企业的视
觉形象统一。
企业标识系统一般由三个要素构成：一是企业理念与价值标识；二是行为规范标识，
三是视觉或听觉形象标识。
CIS活动是组织内传播和组织外传播的统一。一方面，创建企业标识系统需要经过企
业内部人员的广泛参与和讨论，围绕它的三个要素达成普遍的共识和合意；另一方面需要向
外界大力宣传这些标识，使之得到社会的认可和理解。
CIS宣传，主要是利用普遍接触和重复记忆来系统塑造企业形象的宣传活动，其效果
非常显著。
第七编（第 7 章）大众传播概论
一、大众传播:（定义、特点、社会功能）
1、定义：就是专业化的媒介组织运用先进的传播技术和产业化手段，以社会上一般大众为
对象而进行的大规模的信息生产和传播活动。
2、大众传播的特点：
①大众传播中的传播者是从事信息生产和传播的专业化媒介组织；
②大众传播是运用先进的传播技术和产业化手段大量生产、复制和传播信息的活动；
③大众传播的对象是社会上的一般大众，用传播学术语来说即“受众”；
④大众传播的信息既具有商品属性，又具有文化属性；
⑤从传播过程的性质来看，大众传播属于单向性很强的传播活动；
⑥大众传播是一种制度化的社会传播；
3、大众传播的社会功能:
（1）拉斯韦尔的三功能说
在传播学研究史上，最早对传播的社会功能作出较全面分析的是拉斯韦尔，他在1948
年发表的《传播在社会中的结构与功能》一文中，将传播的社会功能概括为三个方面：
①环境监视功能：传播对社会起着一种“瞭望哨”的作用。
②社会协调功能：传播正是执行联络、沟通和协调社会功能的重要社会系统；
③社会遗产传承功能：传播是保证社会遗产代代相传的重要机制；
意义：三项功能是包括人际传播、群体传播、组织传播在内的一切社会传播活动的基本功
能，大众传播不仅具备这些功能，而且起着突出重要作用。
（2）赖特的四功能说：
美国学者赖特在《大众传播：功能的探讨》（1959年发表）中，继承了拉斯韦尔“三
功能说”，并在此基础上围绕大众传播的社会功能提出了“四功能说”：
①环境监视：大众传播在特定社会的内部和外部收集和传达信息的活动；
②解释与规定：大众传播并不是单纯的“告知”活动，它所传达的信息中通常伴随着对
事件的解释，并提示人们应该采取什么样的行为反应。
③社会化功能：大众传播在传播知识、价值以及行为规范方面具有重要的作用。
④提供娱乐：大众传播中的内容并不都是务实的，其中相当一部分是为了满足人们的精
神生活的需要，如文学的、艺术的等。
（3）施拉姆对大众传播功能的概括:
对拉斯韦尔和赖特的观点，施拉姆在1982年出版的《男人、女人、讯息和媒介》一书
中，从政治功能、经济功能和一般社会功能三个方面进行了总结。
他把环境监视、社会协调和遗产继承归入政治功能范畴，而把社会控制、规范传递、娱
乐归入一般社会功能范畴。这种划分没有明确的标准，也不见得十分确切。他分类法的重要
贡献在于明确提出了传播的经济功能，指出大众传播通过经济信息的收集、提供和解释，能
够开创经济行为。大众传播的经济功能并不仅仅限于为其他产业提供信息服务，它本身就是
知识产业的重要组成部分，在整个社会经济中占有重要地位。他的这个观点已经为信息社会
和知识经济发展的现实所证实。
（4）拉扎斯菲尔德和莫顿的功能观:
①社会地位赋予功能
②社会规范强制功能
③作为负面功能的“麻醉作用”
二、大众传播的产生与发展过程
近代大众传播的起点：应该是以19世纪30年代大众报刊的出现为标志。
1、廉价报纸，即大众报纸。廉价的“便士报”的出现，以19世纪30年代＜纽约太阳报＞
和＜先驱报＞的创刊为标志，它除了价格低廉外，还具有以下特点：
①内容以新闻、信息和社会事件报道和娱乐为主，贴近普通大众的生活；
②发行量大，一般为几万乃至几十万份；
③读者不限于特定的阶层或群体，而是面向“分散的、异质的、不定量多数的一般大众”。
④广告收入成了报纸经营的主要财源。
2、电视媒介的特性：①电视集视听觉手段于一体，通过影像、画面、音声、字幕以及特技
等多方面地传递信息，给受众以强烈的现场感、目击感和冲击力；
②它不仅是人们获得外界新闻和信息的手段，而且是丰富多彩的文化生活和娱乐的主要提供
者。
三、大众传播的社会影响
1、大众媒介与现代人的生活:接触大众传媒，是现代人的重要生活内容。
受众的媒介接触动机:
2、大众传播社会影响的两种观点: P121
一种是“基于乐观主义期待”的肯定态度；二是“怀疑主义”的忧虑态度
3、大众传播对人及环境的影响
（1）人与环境互动过程发生了变化
（2）大众传播与现代信息环境
一、信息环境
指一个社会中由个人或群体接触可能的信息及其传播活动的总体构成的环境。日本学者
后藤和彦曾经下过这样一个定义：“信息环境，即在与自然环境相区别的社会环境中直接或
间接地控制社会成员之行为方式的符号部分，并且，它主要是通过非人际关系向社会提示的
环境。
信息环境的理解层面：
①构成信息环境的基本要素是具有特定含义的语言、文字、声音、图画、影像等信息符
号；
②一系列的信息符号按照一定的结构相互组合便构成完整意义的讯息，大部分讯息传达
的并不仅仅是消息或知识，而且包含着特定的观念和价值，它们不仅仅是告知性的，而且是
示性的，因而对人的行为具有制约作用；
③当某类信息的传播达到一定的规模时，便形成该时期和该社会信息环境的特色和潮
流；
因此，信息环境具有社会控制的功能，是制约人的行为的重要因素。
b、大众传播是信息环境的主要营造者。大众传播在形成信息环境方面的优势主要体现在
两个方面：
①大众传播通过信息的大量生产、复制、和大面积传播，能够在短时间内将同类信息传
遍整个社会，造成普遍的信息声势；
②这种优势，还与它所传达的信息的特性密切相关。大众传播的信息特性，简言之即公
开性、权威性、显著性和直达性。
c、现代社会中--信息环境的环境化:
1> 拟态环境:
也就是我们所说的信息环境，它并不是现实环境的“镜子”式的再现，而是传播媒介通
过对象征性事件或信息进行选择和加工、重新加以结构化以后向人们提示的环境。
2>“信息环境的环境化”，P126
大众传播具有形成信息环境的力量，并通过人们的环境认知活动来制约人的行为，这是
大众传播发挥其社会影响力的主要机制。
大众传播是具有社会控制功能的信息系统，但控制的性质和方向不完全取决于它自身，
而在很大程度上取决于更为复杂的社会机制和条件。
第八编（第8章）大众传播的控制研究---传播制度与媒介规范理论
一、传播制度与媒介控制:
1、传播制度：也就是社会制度中对大众传播活动直接或间接地起着制约和控制作用的部分。
它体现了全部社会结构和社会关系的复杂性。
2、对媒介的控制
（1）国家和政府的政治控制：它是媒介控制的主要方面，目的是通过规定大众传播体制、
制定有关法律、法规和政策，来保障媒介活动为国家制度、意识形态以及各种国家目标的实
现服务。主要包括以下几个方面：
①规定传媒组织的所有制形式；
②对传播媒介的活动进行法制和行政管理；
③限制或禁止某些信息内容的传播；
④对传播事业的发展制定总体规划或实行国家援助；
（2）利益群体和经济势力的控制:
(3)广大受众的社会监督机制
受众对媒介活动进行社会监督控制的手段分为四种：
①个人的信息反馈；
②结成受众团体，以群体运作方式对媒介活动施加影响；
③诉诸于法律手段；
④通过影响媒介的销售市场来制约媒介活动；
二、关于传播制度的几种规范理论:
1、极权制度下的媒介规范
基本特点：主张媒介必须一切以权力的意志为转移，一切为统治者服务。
主要内容：
①报刊必须对当权者负责，维护国王和专制国家的利益；
②报刊必须绝对服从于权力或权威，不得批判占统治地位的道德和政治价值；
③政府有权对出版物进行事先检查，这种检查是合法的；
④对于当权者有权或当局者制度的批判属于犯罪行为，给予严厉的法律制裁；
社会背景：15世纪近代印刷技术发明后，近代报刊的诞生对欧洲封建王朝的思想控制
造成了威胁，于是统治者相继制定了严厉的出版管理制度，限制新闻出版业
的发展。
主要表现：1586年英国政府颁布的《星法院法令》
评价：极大限制了现代新闻传播业的发展
2、自由主义媒介规范理论（报刊的自由主义理论）（资本主义制度下）
基本特点：核心反映了资产阶级自由主义的观点，即认为报刊应该是“观点的自由市场”，
是实行自律的自由企业；
社会背景：17、18世纪遍布欧洲的资产阶级革命，使资产阶级自由主义思想深入人心。
新兴的资产阶级政府废除了报业的清规戒律，自由主义报刊思想得以实现。
主要原理原则：①任何人都拥有出版自由而不必经过政府当局的特别许可；
②除人身攻击之外，报刊有权批评政府和官吏，这种批评是正当合法的；
③新闻出版不应接受第三者的事先检查，出版内容不能受到任何限制；
④在涉及观点、意见和信念的问题上，真理和谬误的传播必须同样得到保证。
主要表现：1644年，英国出版《论出版自由》一书等
评价：促进了现代新闻传播事业的发展，但并不能得到真正的实现，随着资本主义发展
到垄断阶段，自由主义理论本身也发生了蜕变，成为维护垄断资本利益的理论；在全球信息
化的今天，则进一步演变成个别传播大国在国际推行文化帝国主义的理论。
3、社会责任理论:（资本主义制度下）
基本特点：强调大众传播媒介对社会和公众应该承担一定的责任和义务，是对自由主义理
论的修正。
社会背景：①进入20世纪以后，传播媒介垄断程度越来越高，传播资源越来越集中于少
数人手中，所谓“观点的公开市场”的理论与实际的社会状况发生了尖锐的矛盾；
②自由主义理论强调的是传播者的权利，而没有涉及到作为公众的受传者的权利；
③在营利动机的驱动下，私有媒介越来越有浅薄化、刺激化、煽情化的倾向，严重危
害了社会道德规范，并带来了不少深刻的社会问题，这种状况引起了人们对自由主义
理论及其媒介制度的强烈不满；
主要表现：1947年美国“新闻自由委员会”出版《自由与负责任的报刊》一书。提出媒
介必须对社会负有责任。
主要原理原则：①大众传播具有很强的公共性，因而媒介机构必须对社会和公众承担和履
行一定的责任和义务；
②媒介的新闻报道和信息传播应该符合真实性、正确性、客观性、公正性等专业标准；
③媒介必须在现存法律和制度的范围内进行自我约束，不能煽动社会犯罪，不能传播宗教或
种族歧视的内容；
④受众有权要求媒介从事高品位的传播活动，这种干预是正当的。
社会责任理论提出的目的：
①为了防止由传播事业的高度垄断而引起的资本主义内部的社会矛盾激化；
②为了防止由传媒内容的浅薄化、煽情化、刺激化而引起的社会道德和文化的堕落。
评价：为人们对媒介的评价提供了一个参考标准，也为媒介组织的自律提供了道德准则，
在一定程度上防止了由于传媒内容的浅薄化、刺激化、煽情化而引起的社会道德和文化的堕
落。但由于社会责任理论寄希望于媒介自律，仍然难以从根本上解决媒介问题。
4、、民主参与理论:（受众参与理论）（资本主义制度下）
基本特点：要求大众传媒向一般民众开放，允许民众个人和群体的自主参与。民主参与
理论的核心价值是多元性、小规模性、双向互动性、传播关系的横向性和平等性。
社会背景：20世纪70年代后随着社会信息化的发展和媒介垄断程度达到新的高度，一
般民众要求自主利用媒介的意识不断提高，而现实中又缺乏可以利用的传播资源的矛盾状态
下出现的。
主要表现：美国学者巴隆1973年出版《媒介接近权：为了谁的出版自由》等。
主要观点：①任何民众个人或弱小社会群体都拥有知晓权、传播权、对媒介的接近和使
用权、接受媒介服务的权利；
②媒介应主要为受众而存在，而不应主要为媒介组织、职业宣传家或广告赞助
人而存在；
③社会各群体、组织、社区都应该拥有自己的媒介；
④与大规模的、单向的、垄断性的巨大媒介相比，小规模的、双向的、参与性
的媒介更合乎社会理想；
评价：其理论的提出及实施在一定程度上缓解了因媒介垄断到来的社会矛盾，但由于种
种原因，实施的力度非常有限。
5、社会主义媒介规范理论的渊源
①马克思和恩格斯关于无产阶级报刊思想和党报思想的观点P141
②列宁的媒介思想P141
③毛泽东等中国无产阶级媒介思想P142

7、我国社会主义制度和规范理论:
基本特点：新闻媒介属于国家，在政治上坚持党性原则，在经营实行企业化管理。
社会背景：改革开放后，我们新闻事业进入第三次新闻改革。
主要内容：①我们新闻传播事业实行社会主义公有制，这是防止私人和资本垄断，保障
传播媒介和传播资源掌握在全体人民手中的根本制度，也是实行社会主义新闻自由的重要基
础；
②我们社会主义新闻传播事业是中国共产党领导下的事业，必须坚持党性原则；
③社会主义新闻传播事业执行报道新闻、传递信息、引导舆论、提供娱乐等多方面的社会职
能；
④社会主义新闻传播事业具有重要的经济功能；包括两个方面：一是新闻传播事业通过沟通
生产、流通和消费对国民经济发展起着重要的服务作用；二是新闻传播事业本身也是社会主
义市场经济的重要组成部分，是新兴的信息和知识产业的骨干，新闻传播事业的发展可以带
动国家和社会的全面发展。
评价：极大促进了我们新闻传播事业的发展，提高了传播活动的质量；但企业化经营也
带来了媒介片面追求经济效益而不顾社会效益的倾向。
8、发展中国家的传播制度和媒介规范理论:
基本特点：维护信息主权，反对文化侵略
社会背景：20世纪70年代后，西方发达国家的文化产品涌入发展中国家，对当地的民
主文化及其产业产生了强烈冲击。
主要内容：
①大众传播活动必须与国家政策保持同一轨道，以推动国家发展为基本任务；②媒介的

⑤在事关国家发展和社会稳定的利害关系上，国家有权对传播媒介进行检查，干预、限

第九编（第 9章）传播媒介
第一部分作为工具和技术手段的传播媒介
（1、2、3）
一、作为工具和技术手段的传播媒介:
1、麦克卢汉媒介理论 （麦克卢汉部分内容应全部背诵）
（1）媒介即讯息
这是麦克卢汉对传播媒介在人类社会发展中的地位和作用的一种高度概括，其含义是：
媒介本身才是真正有意义的讯息。换个容易理解的说法，即人类有了某种媒介才有可能从事
与之相适应的传播和其他社会活动，因此，从漫长的人类社会发展过程来看，真正有意义、
有价值的“讯息”不是各个时代的传播内容，而是这个时代所使用的传播工具的性质、它所
开创的可能性以及带来的社会变革。
麦克卢汉所指的媒介不仅是传播工具，而是包括人们发明创造的一切使用工具。媒介在
人类社会发展中的地位和作用是如此重要，人类有了某种媒介才有可能从事与之相适应的传
播和其他社会活动。因此，媒介本身就代表着最重要的讯息。
媒介是社会发展的基本动力，每一种新媒介的产生，都开创了人类感知和认识世界的方
式，创造出新的社会行为类型。因此可以按照媒介发展地进程，将人类社会的发展区分为三
种类型：口语媒介对应的部落社会；文字印刷媒介对应的脱离部落化社会以及电子媒介对应
的重新部落化社会（地球村）。
（2）媒介：人的延伸（媒介的功能）一种思辨推论
任何媒介都是人的感觉和感官的扩展或延伸。文字和印刷媒介是人的视觉能力的延伸，
广播是人的听觉能力的延伸，电视是人的视觉、听觉和触觉能力的综合延伸。
在口语媒介对应的部落社会时代，人们的感觉能力是平衡的；在文字和印刷媒介对应
的脱落部落化时代，人们的视觉能力得到突出发展，造成了感觉分离。一方面推动了人们对
事物的抽象、深层的认识，另一方面使人的总体感觉能力下降。而电子媒介尤其是电视能改
变人们的受视觉支配的状况，重新回到一种感觉平衡状态。可见，麦克卢汉对电视媒介作出
了十分乐观的评价。
（3）“热媒介”与冷媒介
所谓“热媒介”是指传递的信息比较清晰明确，接收者不需要动员更多的感官和联想
活动就能够理解的媒介，它本身是“热”的，人们在进行信息处理之际不必进行“热身运动”；
而冷媒介相反，它传达的信息含量少而模糊，在理解时需要动员多种感官的配合和丰富的想
象力。
但这种区分标准是模糊的，不科学的。重要的是给我们的启示：不同媒介作用于人的
方式不同，引起的心理和行为反应也各具有特点，研究媒介应该把这些因素考虑在内。
（4）麦克卢汉媒介理论的意义与局限性:
意义：开拓了从媒介技术出发观察人类社会发展的视角，并强调了媒介技术的社会历史作
用。随着信息社会的到来，媒介工具和技术具有的推动社会前进和变革的巨大力量已经得到
证实；“媒介即人的延伸”的观点对我们理解不同媒介的作用机制富有启迪意义；而关于“地
球村”的预言也符合当代世界的发展趋势。
局限性：麦克卢汉是一位技术自然主义者，他的理论带有极端性和片面性，主要表现在：
①他把媒介技术视为社会发展和变革的唯一决定因素，而忽略了生产关系和社会关系
等各种复杂的社会因素的作用；
②过分强调媒介技术和工具的主宰作用，忽视了人的主体性和能动性；
③以媒介工具对中枢感觉系统的影响来解释人的全部社会行为，忽视了人的理性，这
是片面的。
2、媒介工具和技术的现实社会影响:
（包括1、媒介内容的影响:拟态环境等。2、媒介形式或工具的特性:本部分介绍）
（1）“电视人”和“容器人”
“电视人”，日本学者林雄二郎在《信息化社会：硬件社会向软件社会的转变》中，
将印刷媒介环境和电视媒介环境中完成社会化过程的两代人加以比较，明确提出了“电视人”
的概念。所谓“电视人”，指的是伴随着电视的普及而诞生和成长的一代，他们在画面和音
响的感官刺激环境中长大，是注重感觉的“感觉人”；同时由于收看的环境是在背靠沙发、
面向荧幕的狭小空间中进行的，这种封闭、缺乏现实社会互动的环境，使得他们当中的大多
数人养成了孤独、内向、以自我为中心的性格，社会责任感较弱。
“容器人”：日本学者中野收在《现代人的信息行为》一书中用“容器人”这一形象
说法描述现代人的行为特点，他认为，在大众传播特别是以电视为主的媒介环境中成长起来
的现代日本人的内心世界类似于一种“罐状”的容器，这个容器是孤立的、封闭的；“容器
人”为了摆脱孤独状态也希望与他人接触，但这种接触只是一种容器外壁的碰撞，不能深入
到对方的内部，因为他们相互之间都不希望对方深入自己的内心世界，于是保持一定距离便
成了人际关系的最佳选择。“容器人”注重自我意志的自由，对任何外部强制和权威都不采
取认同的态度，但却容易接受大众传媒的影响，他们的行为也像不断切换镜头的电视画面一
样，力图摆脱日常繁锁性的束缚，追求心理空间的移位、物理空间的跳跃，而现代社会中忽
起忽落、变幻不定的各种流行和大众现象正是“容器人”心理和行为特征的具体写照。
“媒介依存症”的特点：
①过度沉湎于媒介接触而不能自拔；
②价值和行为选择一切必须从媒介中寻找依据；
③满足于媒介中虚拟的社会互动而回避现实的社会互动；
④孤独封闭的社会性格；
（2）电视与人的充欲主义
日本学者佐藤毅提出，主要指电视唤起和引发了人们的欲望，刺激了人们对商品的占
有欲和享乐欲。导致人们的价值观转向了个人享乐主义和“充欲”价值。这种由媒介引发的
欲望主义导致了日本人的自私化。
3、新媒介发展趋势及其冲击:
（1）新媒介：
它是相对于铅字出版和报纸、地上波广播电视等传统媒介而言的，主要指伴随卫星
通信、数字化、多媒体和计算机网络等技术的发展而出现的新型传播媒介，包括跨国卫星广
播电视，多频道有线电视，文字、音像的电子出版以及作为信息高速公路之雏形的互联网络
等等。
（2）新媒介的特点
①传播过程的双向性的增强；
②多媒体化和媒介功能的融合
③媒介资源的丰富化
④信息传播的全球化
(3)新媒介的意义
①传播过程双向性增强将大大改善传统大众传媒过程中受众的被动地位，增加传受
的互动性；
②多媒体技术为人们进行信息的收集、处理和传输提供了空前便利的条件，有助于
提高传播活动的质量和效率；
③传播资源的丰富化将改变少数大众传播机构资源的状况，为更多的社会成员、群
体和组织成为能动的传播者提供了基础条件；
④全球传播技术的发展则把人类的传播范围扩展到整个世界，使人们的认知、判断
和行为受到更多变量的影响。
一句话，新的媒介技术和工具，正在使人类的传播活动发生重大的变革。
(4)防止幼稚的电子乌托邦思想 P154
电子乌托邦思想：这种观点对媒介技术的发展寄予无条件的乐观主义期待，认为新的传
播技术必将会把人类带入一个高度自由、民主和平等的理想国。
电子乌托邦思想是建立在对新媒介某些技术特性的期待的基础之上的。有的学者认为，
电子传播网络的双向性使每个人既是传播者又是受传者，它将改变传统的大众传播过程受到
传播者支配的局面，使传播过程变得更加平等，而这种平等也必然带来社会关系的平等；有
的学者认为，新媒介技术将保障每个人自主发表言论的权利和机会，并形成“真正的观点的
自由市场”；……
总结:
媒介技术或工具是中性的他们本身并不必然导致某种“社会善”或“社会恶”。媒介技
术是由人创造的重要的 是人如何使用，利用它来传播什么，达到什么样的目的。因此，传
播媒介的社会影响并不取决于媒介的技术或形式特性，而且取决于掌握和运作它的人和社会
组织，取决于它们生产和传播的信息内容。
第二部分作为社会组织的大众传媒 （4）
二、作为社会组织的大众传媒:
1、传播者和大众传媒:
（1）传播者：指的是传播行为的发起人，是借助某种手段或工具、通过发出信息主动
作用于他人的人。传播者处于传播过程的首端，对信息的内容、流量和流向以及受传者的反
应起着重要的控制作用。
（2）大众传媒：报社、电台、电视台等媒介机构是从事信息的采集、选择、加工、复
制和传播的专业组织，从其生产规模的巨大性和受传者的广泛性而言，我们又把它们称为大
众传播者，或称为大众传媒。
（3）大众传媒的特点:
①地位稳固；
②大众传媒是一种社会组织，具有自身的组织目标和组织结构；
③大众传媒是大众传播生产资料的直接控制者和使用者；
（4）大众传媒的优势：
①大众传媒是专业的媒介组织，其收集、加工、生产和传播信息的能力和效率是一般
个人和非专业组织所不能比拟的；
②大众传媒具有公开可靠的信源，其信息的可信性和可确认性要大大高于处于“匿名
性”或“半匿名性”状态的其他传播者；
③大众传媒在其百余年的传播实践中，尤其是在新闻传播领域形成了一套为社会所广
泛承认的行业规范和职业道德，并在此基础上形成了一套吸引和联系受众的有效机制。
2、大众传媒的组织目标和制约因素
大众传媒的组织目标：经济收益目标和非经济收益目标两者的结合。
（1）大众传媒的经营目标：争取受众市场，赚取广告收入。
（2）大众传媒的宣传目标：大众传媒在从事市场和经营活动的同时，还具有重要的非
经济收益目标，其中包括宣传某种思想、灌输某种意识形态、提倡某种信念、行使某种权利
或社会影响等。它主要通过两种活动得到实现，一是言论活动，二是报道活动。
(3)公共性与公益性
大众传媒除了一般的经营目标和宣传目标之外，还有自己的公共性和公益性，其活动
在很大程度上受到这种特性的约束。
大众传媒具有公共性和公益性的依据包括三个方面（原因）：
①大众传媒是现代社会必不可少的信息生产者和提供者，在满足社会的普遍信息需求
方面起着一种公共服务的作用；
②大众传媒的信息生产和传播活动对社会的政治、经济和文化道德具有广泛而强大的
影响力，这种影响力涉及到普遍的社会秩序和社会公共生活；
③大众传媒是某些“稀有”公共传播资源的受托使用者，作为公共财产的使用人，它
们必须对社会和公众承担相应的义务和责任。
这种公共性和公益性，也是大众传媒的权力的基础；一方面，大众传媒拥有最大限度的
采访权、言论权、编辑权和刊载权，并拥有广泛的舆论监督的权利；另一方面，公共性和公
益性也对大众传播产生了重要的制约作用，它要求媒介的活动必须符合社会公共利益。这些
制约，有的体现为法律形式，有的则作为受众监督和传媒自律的重要规范发挥作用。
3、传媒组织在信息生产中的作用
（1）把关理论: （把关理论应该全部背过）
美国学者卢因提出，指在传播过程中存在着一些把关人，只有符合群体规范或把关人
价值标准的信息内容才能进入传播的渠道。
（2）大众传媒的“把关”标准
①业务标准：指的是事件适合于媒介进行新闻处理的各种条件，如时间跨度、明晰性

②市场标准：指的是事件能够满足受众新闻需求的诸条件以及吸引受众兴趣的诸条件。

②现代资本主义传媒所采用的主要方法就是通过新闻或信息内容的选择，来潜移默

（3）把关的实质
新闻、信息的生产不是客观中立的，而是受到政治，经济和意识形态等因素的制约。
“把关”过程及其结果，在总体上是传媒组织的立场和方针的体现。
第十编（第十章）大众传播的受众
一、大众与大众社会理论（作为大众的受众）
受众：指的是一对多的传播活动的对象或受传者，会场的听众，戏剧表演、体育比赛的观
众，都属于受众的范畴。
1、大众：在大众社会理论中，“大众”是一个特定的概念。19世纪末20世纪初是人类进
入大众社会的一个分界点。由于工业革命、资产阶级革命以及传播发展，过去那种传统社会
结构、社会秩序和统一的价值体系被打破，社会成员失去了统一的行为参照系，变成了孤立
的、分散的、均质的、原子式的存在，一种新的未组织化的社会群体，即所谓“大众”。
2、大众的主要特点:
①规模的巨大性；
在人数上超过其他社会群体或集团；
②分散性和异质性；
广泛分布于社会的各个阶层，其成员具有不同的社会属性；
③匿名性；
成员之间互不面识，对试图进行大众操作的社会精英来说也是难以把握的对象；
④流动性；
大众的范围依对象问题而时有变化，其成员是流动的；
⑤无组织性；
大众缺乏明确的自我意识和自我约束，因而不能作为一个主体而自主行动，大众行为
主要在外部力量的刺激和动员下形成的；
⑥同质性；
大众成员虽然具有不同的社会属性，但又有同一的行为倾向，因而具有同质性，容易
受到外部力量的操作和影响。
3、受众的概念及理解
大众传播中的受众是指大众传媒的信息接受者或传播对象。受众是一个集合概念，最直观
地体现为作为大众传媒信息接受者的社会人群。例如书籍、报刊的读者、广播的听众或电影、
电视的观众等等。
传播学家克劳斯认为，受众按其规模可分为三个不同的层次：
第一个层次是特定国家或地区内能够接触到传媒信息的总人口，这是最大规模的受众；
第二个层次是对特定传媒或特定信息内容保持着定期接触的人；
第三个层次是不但接触了媒介内容而且也在态度或行动上实际接受了媒介影响的人，对
传媒而言这部分人属于有效受众，在他们身上体现了实质性的传播效果。

（4）大众社会理论的评价:
大众社会论并不是一个严格的理论体系，而是一种看问题的视角或方法。大众社会理
论的一个主要问题是精英史观。将精英看成是历史的主导者，而大众软弱无力、散沙式的
存在，这与“人民群众创造历史”的唯物史观是格格不入的。
大众社会理论的独特视角有助于我们理解现代社会。大众社会理论认为大众社会的成
立有六个基本条件：
①产业化的大量生产或大量消费的存在；
②社会的平权化和民主化的发展；
③大众传媒的发达和大量信息、娱乐产品的提供；
④生活水平的全面提高；
⑤传统的中产阶层的衰退和白领为主的“新中产阶层”的扩大；
⑥社会组织中的官僚化的发展；
这些条件是现代社会的普遍现象。在处于现代化和向市场经济转轨中的我国，除了第
六个条件尚不明显外，可以说也具备了其他五个条件。因此，客观的分析和研究这样一些社
会条件的意味及其对社会发展的影响，对推进我们的现代化建设无疑也具有重要的意义。

（6）大众社会理论对传播学研究的影响<主要提示了作为大众的受众的被动性> 拷
贝支配”的社会 P172
清水几太郎认为，现代社会是一个“拷贝支配”的社会，导致这种状况的原因是环
境的扩大和社会生活的间接化。环境的扩大和间接化意味着人们与大多数重要的“实物”不
可能保持实际接触，要了解他们只能依靠传媒提供的第二手信息―――拷贝；“拷贝”不是
“实物”本身，而人们又缺乏将之与“实物”相对照的手段，也只能把他们作为“实物”的
代替物，由于大众传媒的大量生产和提供，现代人每日处在拷贝的包围中，要躲避它们的影
响是不可能的。
另一方面，“拷贝的支配”也会转化为“心理的暴力”，这是因为在“拷贝”制作和
提供的过程中存在着两条“抽象的原理”：
第一条是利润原理，即拷贝的收集、制作和提供是作为营利活动来进行的。为了获得
利润，传媒必须争取最大多数的受众，而要做到这一点，就必须满足广泛的受众需求。传媒
一方面为特定受众提供特定的“拷贝”，另一方面，提供满足最广泛的普遍兴趣的“拷贝”，
因而传媒传播性爱、犯罪等内容来满足最广泛的受众需求，而人们对这些通常没有足够的抵
御能力，因此沉溺其中。
第二条是政治或宣传原理。大众传媒的“拷贝制作”和提供不仅受到利润原理的驱动，
而且受到政治和宣传原理的制约。大众传媒的宣传与政府或政党的直接宣传不同，主要是通
过“拷贝”的选择和加工活动来潜移默化地进行，更具有一种“麻醉”效果。
在“拷贝”带有心理暴力性质的强大支配力前，现代人已经屈服于大众传媒机构的庞
大规模和它们的垄断地位，对来自传媒的种种刺激已经放弃了严肃认真的态度，在玩世不恭
和无可奈何的心态的主导下而自甘于消极、被动的处境，无条件地放弃了自己的批判能力，
形成了无思想的划一主义。
二、几种主要的受众观
1、作为社会群体成员的受众:
受众并非孤立的存在，而是属于不同的社会集团或群体，有着不同的社会背景。受众
的群体背景或社会背景是决定他们对事物的态度和行动的重要因素，这种影响有时甚至超
过大众传播的影响。
①IPP指数，即既有政治倾向指数，是一个从社会经济地位、居住区域和宗教信仰三个方
面来显示受众在接触媒介宣传前已有的政治立场和态度的综合指数。
②政治既有倾向假说：拉扎斯菲尔德等人提出，指的是在人们就选举或其他政治问题作
出决定之际，这种决定并不取决于一时的政治宣传和大众传播，而是基本上取决于他们迄
今所持的政治倾向。
③选择性接触假说：拉扎斯菲尔德等人指出，受众在接触大众传播的信息时并不是不加
选择的，而是更愿意选择那些与自己的既有立场和态度一致或接近的内容加以接触，而对
与此对立或冲突的内容有一种回避的倾向。“选择性接触”并不仅仅存在于政治信息领域，
在消费、文化和娱乐信息领域，这种机制都是普遍存在的。这种机制的存在说明，受众在
大众传媒面前并不完全被动，而具有某种能动性，大众传媒并没有随心所欲地支配和左右
受众的力量。

2、作为市场的受众:
“受众即市场”的理解及批评
理解：①如果从市场的角度考虑，受众可以定义为特定的媒体或讯息所指向的、具有特定的
社会经济层面的，潜在的消费者的集合体；
②大众传媒是一种经营组织，必须把自己的信息产品或服务以商品交换的形式在市场
上销售出去；要做到这一点，就必须满足消费者的各种需求；传媒机构之间存在激烈的竞争
关系，竞争的对象就是消费者；
③目前许多传媒认为，大众市场已经饱和，因此定位、开拓“小众”市场是保证经济效
益的最佳选择。
批评：①容易把传媒与受众的关系固定为“卖方”与“买方”的关系；
②更多地着眼于受众的购买能力与消费特点相关的人口统计学属性，而不能反映受众
内部更深层的社会关系和意识形态；
③容易把“商品销售量”作为判断成功与否的唯一标准，而把公益性和社会效益放在
次要的位置上；
④把受众视为市场的观点只能是传媒一方的观点，只能使人从传媒的立场考虑问题，
而不是从受众的立场考虑问题。
3、作为权利主体的受众:
受众不仅仅是传媒信息的使用者或消费者，还是构成社会的基本成员，也是参与社会管
理和社会公共事务的公众，受众拥有各种各样的正当权利。
（1）传播权:
（2）知晓权:
（3）传媒接近权: 即一般社会成员利用传播媒介阐述主张、发表言论以及开展各种社会和
文化活动的权利，同时，这项权利也赋予了传媒应该向受众开放的义务和责任。这个新的权
利概念出现于20世纪60年代的美国，并在西方国家产生了普遍的社会影响。
媒介接近权的概念，反映了资本主义媒介制度下社会成员一表现自由或言论自由的权利
与媒介的私人占有制之间的巨大矛盾。
核心内容是要求传媒必须向受众开放，它至少在三个方面普遍的影响：
第一个方面是“反论权”即社会成员或群体在受到传媒攻击或歪曲性报道之际，有权要
求传媒刊登或播出反驳声明；
第二个方面是“意见广告”。为了争取受众的好感和信任，目前很多印刷媒介已经能够
在不同程度上以收费形式接受读者要求刊登的意见广告。
第三个方面体现在多频道有线电视领域，一些国家基于媒介接近权的原理，在发放有线
电视系统经营许可证之际，规定了必须开设允许受众自主参与的“开放频道”的附加条件。
三、“使用与满足”----一 一种受众行为理论（微观的） P180 全部背过
1、使用与满足（定义）
此研究把受众成员看做是有着特定“需求”的个人，把他们的媒介接触活动看做是基于
特定的需求动机来“使用”媒介，从而使这些需求得到“满足”的过程。
基本内容(日本学者竹内郁郞“使用与满足”过程模式)：
①人们接触传媒的目的是为了满足他们的特定需求，这些需求具有一定的社会和个人心
理起源；
②实际接触行为的发生需要两个条件，其一是媒介接触的可能性，即身边必须要有电视
机或报纸一类的物质条件，如果不具备，人们就会转向其他代替性的满足手段；其二是媒介
印象，即媒介能否满足自己的现实需求的评价，它是在以往媒介经验的基础上形成的；
③根据媒介印象，人们选择特定的媒介或内容开始具体的接触行为；
④接触行为的结果可能有两种，即需求得到满足或没有满足；
⑤无论满足与否，这一结果将影响到以后的媒介接触行为，人们会根据满足的结果来修
正既有的媒介印象，在不同程度上改变对媒介的期待。

3、制约受众接触传媒的社会条件:
他们完成社会化过程的环境，包括他们的现实的政治、经济和文化的背景、社会地位、
价值观、群体归属关系和人际关系等众多因素。
4、 对使用与满足研究的评价:
意义：开创了从受众角度出发考察大众传播过程的先河。把能满足受众的需求作为衡量

①它认为受众的媒介接触是基于自己的需求对媒介内容进行选择的活动，这种选择具有
某种能动性，这有助于纠正大众社会论中的“受众绝对被动”的观点；
②它提示了受众媒介使用形态的多样性，强调了受众需求对传播效果的制约作用，对否
定早期“子弹论”或“皮下注射论”的效果观起到了重要作用；
③使用与满足研究指出了大众传播对受众具有一些基本效用，这对40年代至60年代过
分强调大众传播的无力性的有限效果论也是一种有益的矫正。在这个意义上，一些学者把它
称为一种“适度效果”理论。
局限：①过于强调个人和心理的因素，行为主义和功能主义色彩较浓；
②脱离传媒内容的生产和提供过程，单纯考察受众的媒介接触行为，因而不能全面提
示受众与传媒的社会关系；
③指出了受众的某种能动性，但这种能动性是有限的，仅仅限于对媒介提供的内容进
行有选择接触的范围之内，因而不能反映受众作为社会实践的主体的，有着传播需求和传播
权利的主体所具有的能动性。
补充：六、关于受众的一些基本理论:
（1）枪弹论（中弹即倒的受众）:
（2）个人差异论（有限效果论之一）
（3）社会类别论（有限效果论之二）
（4）社会关系论（有限效果论之三）
（5）文化规范论:如:议程设置
第十一编（第 11、12章）传播效果研究 （效果研究全背）
第一部分:概论
1、传播效果的含义:
在传播学研究领域，传播效果具有双重含义：
①它指带有说服动机的传播行为在受传者身上引起的心理、态度和行为的变化。通常意
味着传播活动在多大程度上实现了传播者的意图或目的。
②指传播活动尤其是报刊、广播、电视等大众传播媒介的活动对受传者和社会所产生的一
切影响和结果的总体，不管这些影响是有意的还是无意的、直接的还是间接的、显在或潜在
的；
2、传播效果的三个层面:
传播效果依其发生的逻辑顺序或表现阶段可以分为三个层面：
①外部信息作用于人们的知觉和记忆系统，引起人们知识量的增加和知识构成的变化，属
于认知层面上的效果；
②作用于人们的观念或价值体系而引起情绪或感情的变化，属于心理和态度层面的效果；
③这些变化通过人们的言行表现出来，即成为行动层面上的效果。
以报刊、广播、电视为代表的大众传播的社会效果的三个层面：
①环境认知效果：大众传播制约着我们观察社会和世界的视野。
②价值形成与维护效果：大众传播包含着价值判断，通过舆论引导形成新的规范和价值，
通过舆论监督维护既有的规范和价值。
③社会行为示范效果：通过向社会提示具体的行为范例或行为模式来直接或间接地影响
人们的行动。大众传播具有地位赋予的功能。
3、传播效果的类型及研究课题:
①类型：
时间上考虑：短期效果、长期效果
从与传播者意图的关联上：预期效果、非预期效果
从效果的性质上：积极（正）效果、消极（负）效果、逆反效果
英国学者戈尔丁以时间和意图两个要素相组合，将大众传播的效果分为四种类型：
短期的预期效果：包括“个人的反应”和“对媒介集中宣传报道活动的反应”两种。前
者指特定信息在个人身上引起的认知、态度和行动的变化；后者指一家或多家媒介为达成特
定目标而开展的说服性宣传活动，如政治动员、促销广告等。
短期的非预期效果：这里也有“个人的反应”和“集合的自发反应”两类。前者指个人
接触特定信息后所发生的、与传播者意图无直接关系的模仿或学习行为，这些行为可能是有
利于社会的，也可能是反社会的；后者主要指社会上许多人在同一信息的刺激和影响下发生
的集合现象，如物价上涨后的抢购风潮等等。但也有一些健康有益的，但传播学者更关注前
者。
长期的预期效果：指就某一主题或某项事业进行的长期信息传播所产生的与传播者意图
相符的累积效果。如经常性的政策宣传等。
长期的非预期效果：这种类型指的是整个传播事业日常的、持久的传播活动所产生的综
合效果或客观结果，如大众传播对个人社会化过程的影响。
区分这些类型，有助于我们把握各种传播效果的不同形态和性质，在进行分析时做到概
念清晰，更有针对性。
②课题：(考察具体传播效果的环节和要素)
传播主体与传播效果；传播内容与传播效果；讯息载体与传播效果；
传播技巧与传播效果；传播对象与传播效果
4、传播研究的理论与实践意义:
理论意义：概括起来说就是通过对各类传播效果的性质、它们的产生过程和制约因素的
考察，来把握传播活动的一般规律和特殊规律，来加深我们对人类传播行为的科学认识。
实践意义：国家制定发展战略和传播政策，媒介制定报道方针和从事媒体经营，新闻工
作者采编新闻，企业进行公关广告宣传，个人从事社会交往活动，都要统筹考虑效果问题。
传播效果研究既包含了对媒介活动的宏观社会效果和影响的考察，又包含了对具体效果产生
过程与机制的分析，可以为丰富多彩的传播活动提供科学的依据。
5、关于大众传播的效果和影响的三种理论: （英国传播学者麦奎尔提出）
①常识理论：即公众通过日常接触和使用传播媒介的直接体验而形成的一些观点和看法，
例如对电视节目好坏的评价等。这种“理论”虽然是直观的和零碎的，但却以舆论的形式对
传媒的活动产生重要的影响。
②现场理论：在传媒内部工作的人所持的观点，包括他们对传播活动的目的与性质的理解、
信息选择与加工的标准、采编业务技术规程、职业道德规范。这种“理论”直接支配着大众
传媒的运营和日常的信息传播活动。
③社会科学理论：从个人、社会与媒介的三者关系出发，通过对媒介活动及其客观结果的
定量定性研究而获得的系统知识，它既避免了“常识理论”的直观性和零碎性，又与“现场
理论”的业务主义和商业主义倾向保持了距离。它影响的对象包含三部分：它影响公众，推
动对传媒活动的社会舆论监督；它影响传媒工作者，促使他们增强社会责任感；它又影响传
播的立法、司法与行政，为传播管理和有关法规政策的制定提供科学依据。总之，它的基本
观点是，在确保大众传媒发挥强大力量，推动社会发展的同时，又要对它实行社会制衡，最
大限度地防止其可能造成的负面效果。
第二部分传播效果研究的历史与发展
传播效果研究的发展三个阶段：20世纪初至30年代末为第一时期；40年代至60年代为
第二时期；70年代至现在为第三时期。
1、子弹论或“皮下注射论”
核心观点：传播媒介拥有不可抵抗的强大力量，它们所传递的信息在受传者身上就像子
弹击中躯体，药剂注入皮肤一样，可以引起直接速效的反应。传播媒介能够左右人们的态度
和意见，甚至直接支配他们的行为。
该观点产生的社会背景：
①20世纪初大众传媒的迅猛发展对社会产生了巨大的冲击力。大众传媒不仅成为人们获得
外界信息的主要渠道，而且深深渗透到个人、家庭和社会生活的各个方面，人们对传媒产生
心理上的敬畏。
②社会各界对传播媒介的利用达到空前的程度，人们处处感受到传播的力量。
③第一次世界大战期间，协约国的心理战的成功更加剧了人们对宣传力量的夸大。
该观点产生的理论背景：
①19世纪末20世纪初，本能心理学盛行，这种理论认为人的行为受到本能的“刺激－反
应”机制的主导；
②大众社会论观点盛行，认为受众是相互隔绝、孤立无援的，大众成员可以被媒介所左右；
评价：该观点是错误的。主要表现在它是一种唯意志论观点，过分夸大了大众传播的力
量和影响，忽视了影响传播效果的各种客观社会因素，并且否定了受众对大众传媒的能动的
选择和使用能力。它对传播过程做了过于简单的描述，认为一方是全能的媒介在发送信息，
另一方是分散的大众在等待着接受，其间别无他物。
2“传播流”研究与“有限效果论”（40年代-60年代）
主要研究领域是:传播流研究<有限效果论> ，说服性传播与效果研究 ，使用与满足研究<
适度效果论>
传播流研究三部曲 （《人民的选择》、《个人影响》和《创新与普及》）
传播流，指的是由大众传媒发出的信息，经过各种中间环节，“流”向传播对象的社会
过程。传播流研究就是指对传播效果产生的过程与机制进行实证考察。构成这项研究的代表
性成果有：拉扎斯菲尔德等人的《人民的选择》（1944年出版）、卡兹等人的《个人影响》
（1955年出版）、罗杰斯的《创新与普及》（1962年出版）以及克拉帕的《大众传播效果》
（1960年出版）。
《人民的选择》，是拉扎斯菲尔德等人在1940年美国总统大选期间，围绕大众传播的
竞选宣传，对选民投票意向的影响所做的一项实证调查的研究报告。这次调查在俄亥俄州的
伊里县进行，所以又称“伊里调查”。在调查中得出这样的结论：大众传播并没有直接左右
选民投票意向的力量，它只是众多的影响因素之一，而且不是主要的因素。对这一结论产生
了很多解释性假说：
①“政治既有倾向”假说：人们在就政治问题进行决策之际，这种决策的性质并不取决
于一时的政治宣传和大众传播，而是基本上取决于人们既有的政治立场和态度。
②“选择性接触”假说：受众并不是不加区别的对待任何传播内容，而是更倾向于“选
择”那些与自己的立场、态度一致或接近的内容加以接触。这种选择性接触的结构，更可能
在加强原有态度的方向上起作用，而不是导致它的改变。
③“意见领袖”和“两极传播”：大众传播并不是直接流向一般受众，而是要经过意见
领袖这个中间环节。
④对大众传播效果类型的概括：大众传播的效果是多层次的，分为五个层次：无变化、
小变化、强化、结晶和改变。强化效果是指大众传播对受众既有态度的巩固和加强效果；结
晶效果是指使原来意向未明、态度未定者的态度明确起来的效果。伊里调查证明，大众传播
的效果主要体现在“强化”和“结晶”两方面。
《个人影响》，是《人民的选择》的后续研究，其目的是为了验证《人民的选择》提出
的各种假说在政治选举以外的其他领域是否适用。它最重要的贡献是“中介因素”假说，卡
兹等人认为，制约和影响大众传播效果的中介因素主要有四种：
①选择性接触机制：包括选择性注意、选择性理解和选择性记忆三个层次。受众对某些
媒介或内容具有回避倾向，而被回避的媒介和内容很难产生效果；
②媒介本身的特性：讯息的媒介渠道不同，传播效果也不同；
③讯息内容：方法与技巧不同，效果也不相同；
④受众本身的性质：受众的既有立场和倾向、社会关系尤其是意见领袖的态度，会对大
众传播效果发挥重要的制约作用。
《创新与普及》，在1962年，美国农村社会学家罗杰斯在对农村中新事物的采纳和普
及过程进行深入调查的基础上，发表的他的研究报告。它对两极传播理论进行了重要的补充
和修正：
大众传播过程分为两个方面：一是作为信息传递过程的“信息流”，二是作为效果或影
响的产生和波及过程的“影响流”。前者可以是“一级”的，即信息可以由传媒直接“流”
向一般受众；而后者则是多级的，要经过人际传播中许多环节的过滤。这样，罗杰斯就把“两
极传播”模式发展为“多极”或“N级传播”模式。
有限效果论的五项一般定理: （根据传播流研究总结，提出）
《大众传播效果》，1960年，克拉帕在《大众传播效果》一书中对《人民的选择》、
《个人影响》以来的“传播流”研究进行了系统总结，并提出了关于大众传播效果的“五项
一般定理”：
①大众传播通常不是效果产生的必要和充分的原因，它只不过是众多的中介因素之一，
而且只有在各种中间环节的连锁关系中并且通过这种关系才能发挥作用；
②大众传播最明显的倾向不是引起受众态度的改变，而是对他们既有态度的强化，即便
是在这种强化过程中，大众传播也并不作为唯一的因素单独起作用；
③大众传播对人们的态度改变产生效果需要两个条件：一是其他中介因素不再起作用；
二是其他中介因素本身也在促进人们态度的改变。
④传播效果的产生，受到某些心理生理因素的制约；
⑤传播效果的产生，还受到媒介本身的条件以及舆论环境等因素的影响。
评价：传播流研究是以说服性传播的研究为主，这些研究都是具体的、短期的，针对受众
个人的直接研究，对传播改变受众态度的力量作出了保守的评价，强调了大众传播影响的无
力性和效果的有限性，因而被称之为“有限效果论”。
从60年末起，“有限效果论”开始受到人们的批评，批评的矛头并不是指向过去的实
证研究得出的具体结论，而是它的效果观和理论框架整体的缺陷：
在认知、态度和行动这三个效果层面上，有限效果论只探讨了后两者，而忽略了更早的
认知阶段――大众传播在人们对环境认知过程中的作用；
它只考察了具体传播活动的微观、短期的效果，而忽略了整个传播事业日常的、综合
的信息所产生的宏观的、长期的和潜移默化的效果。
过分强调大众传播效果的有限性会给传播实践带来某些消极影响，如降低传播人员的
社会责任感，为低俗有害的传播内容的泛滥提供“口实”等。
3、“说服性传播”的效果研究 (40-60年代的又一研究领域)
也称传播的说服效果，指的是受传者的态度沿传播者说服意图的方向发生的变化。在这
个意义上，它是一种“纯效果”。第二次世界大战期间，耶鲁大学心理学教授霍夫兰等人受
托，在军队里进行了一系列心理实验，这是关于“说服与态度改变”的最早的实证研究。
通过研究提示效果的形成并不简单地取决于传播者的主观愿望，而是受到传播主体、信
息内容、说服方法、受众属性等各种“条件”的制约。这些结论，同样是否定“魔弹论”效
果观的有力证据。
他的研究方法主要采用实验心理学方法，包括前后比较法和控制对照法等。
4、 70年代以来的宏观效果研究
第三部分 传播效果的产生过程及制约因素（从传播过程本身研究，微观）
制约传播效果因素是多种多样的，主要有传播主体、传播技巧和受众
1、传播主体与传播效果
（1）信源的可信性效果
信源的可信性包括两个要素：一是传播者的信誉，包括是否诚实、客观、公正等品格条
件；第二是专业权威性，即传播者对特定问题是否具有发言权和发言资格。这两者构成了可
信性的基础。
研究者霍夫兰，控制实验证明：信源可信性与说服效果之间存在密切关系。
霍夫兰等人提出了“可信性效果”的概念：一般来说，信源的可信度越高，其说服效果越大；
可信度越低，说服效果越小。对传播者来说，树立良好的形象争取受众的信任是改进传播效
果的前提条件。
（2）休眠效果
休眠效果是指低可信度信源发出的信息，由于信源可信性所造成的负影响，其内容本身的
说服力不能马上发挥，因而使得信息处于一种睡眠状态，经过一段时间，可信性所造成的负
影响减弱或消失以后，其效果才能充分表现出来。
这说明信源的可信性对信息的短期效果具有极为重要的影响，但从长期效果来说，最终起
决定作用的是内容本身的说服力。
2、传播技巧与传播效果
传播技巧指的是在说服性传播活动中为有效地达到预期目的而采用的策略方法。
(1)一面提示与两面提示（霍夫兰） “美国对日本的战争还要持续多久”
一面提示是仅向说服的对象提示自己一方的观点或有利的判断材料；
两面提示是在提示已方观点或有利材料的同时，也以某种方式提示对方一方的观点或不
利于自己的材料。
两种方法各有利弊，一般来说，一面提示能够对已方观点做集中阐述，论旨明快，简洁
易懂，但同时也会给人一种咄咄逼人的印象，使说服对象产生心理抵抗；两面提示由于给对
立观点以发言机会，给人一种公平感，可以消除说服对象的心理反感，但由于同时提示对立
双方的观点，论旨变得比较复杂，理解的难度增加，在提示对方观点之际如果把握不好分寸，
反而容易造成为对方做宣传的效果。
一面提示对原本就持赞成态度的、或文化水平较低的人比较有效；两面提示对原本持反
对态度或文化水平较高的人比较有效。
(2)两面提示的免疫效果（拉姆斯丁、贾尼斯）
拉姆斯丁、贾尼斯在1953年进行的实验增加了“反宣传”测验（使实验对象接触对立观
点的宣传），以比较两种提示法的说服效果的持续性和稳定性。结果证明，尽管从单纯比较
来看两者的效果并无优劣强弱之分，但对“反宣传”的抵抗力却有极大区别。也就是说，在
接触到“反宣传”后，原来接受“一面提示”实验的人几乎都受到了相反观点的影响，而那
些原接受“两面提示”实验的人态度却没有发生明显变化。
根据实验结果，拉姆斯丁等认为，“两面提示”由于包含着相反观点的“说明”，这种
“说明”就像事先接种牛痘苗一样，能够使人在以后遇到对立观点的宣传时具有较强的抵抗
力。“两面提示”的这种效果，被称为“免疫效果”或“接种效果”。
对此研究的还有麦奎尔，他认为，人们有许多没有经过考验的信念，这些信念在遇到对
立观念的挑战时往往是脆弱的，就像在无菌环境里成长的人体容易感染细菌一样。
补充：即在对人们进行正面宣传之前，先让他们接受到少量异已观点，就会使人们对该异
已观点产生一定的免疫能力，反而更加容易维护说服效果的持续性和稳定性。
(3)“明示结论”与“寓观点于材料之中”（霍夫兰、曼得尔）
一般来说，明示结论可使观点鲜明，读者易于理解作者的意图和立场，但同时也容易使文
章显得比较生硬而引起反感；而不做明确结论，仅仅提供引导性的判断材料、将观点寓于材
料之中的做法，则给读者一种“结论得自于自己”的感觉，可使他们在不知不觉中接受作者
观点的意图。
①在论题和论旨比较复杂的场合，明示结论比不下结论效果要好；
②在说服对象的文化水平和理解能力较低的场合，应该明示结论；
③让说服对象自己得出结论的方法，用于论题简单，论旨明确或对象文化水平较高、有
能力充分理解论旨的场合较佳。
（4）诉诸理性与诉诸感情（哈特曼）
诉诸理性，指通过冷静地摆事实、讲道理，运用理性或逻辑的力量来达到说服的目的；
诉诸感情，指主要通过营造某种气氛或使用感情色彩强烈的言辞来感染对方，以谋求特
定的效果。
两种方法的有效性因人、因事、因时而异，正确把握问题的性质并充分了解说服的对象，
是取得良好效果的基本前提。
（5）警钟效果(恐惧诉求)
通过“敲警钟”的方法唤起人们危机意识和紧张心理，促成他们的态度和行为向一定方
向发生变化。但应该把握分寸，恐惧过度容易招致自发的防卫性反应，对传播效果产生负面
影响。
从行为心理学的角度来说，“敲警钟”具有双重功效：一是它对事物利害关系的强调可
最大限度地唤起人们的注意，促成他们对特定传播内容的接触；二是它所造成的紧迫感可促
使人们迅速采取对应行动。
3、传播对象与传播效果
(1)意见领袖的作用
“意见领袖”，指在传播学中，活跃在人际传播网络中，经常为他人提供信息、观点或
建议并对他人施加个人影响的人物。他作为媒介信息和影响的中继和过滤环节，对大众传播
效果产生重要影响。这个概念最早由拉扎斯菲尔德等人在《人民的选择》中提出。
基本特征：
①与被影响者一般处于平等关系而非上下级关系；
②意见领袖并不集中于特定的群体或阶层，而是均匀地分布于社会上任何群体和阶层中。
③意见领袖的影响力一般分为“单一型”和“综合型”；
④意见领袖社交范围广，拥有较多的信息渠道，对大众传播的接触频度高、接触量大；
（2）群体归属和群体规范对传播效果的影响
考察群体对个人行为的影响的视角:
一是作为现实社会关系网络的群体；二是作为个人行为的精神依托点的群体
（3）受传者的个性和传播效果
个人的“可说服性”，指的是在传播研究中，有的人比较容易接受他人的意见或劝说，
有的人则固执已见，这种“容易”或“难以”接受他人劝说的个性倾向。根据日本传播学者
饱户弘的分类，可说服性包含以下几个方面：
①与特定主题相关的可说服性：说服的主题多种多样的，一个人在某些话题上可能容易
接受他人的意见，而在另一些话题上则可能容易产生拒绝或排斥的态度；
②与特定议论或诉求形式相关的可说服性：如有的人容易接受道理说服，而有的人则容
易接受场面或氛围的感染；有的人对“强加式”说服表现出自发反感，而对“诱导式”说服
则很容易接受等。
③一般可说服性：与主题或说服形式无直接关系，受个人性格和个性所规定的、对他人
意见容易接受或排斥的倾向。
贾尼斯的自信心假说：
1945年，贾尼斯采用临床实验的方法，以“社会不安感”、“委曲求全性向”和“感
情抑郁程度”为自信心强弱的三项指标，就自信心强弱与一般可说服性的关系进行了测试。
结果说明：对人际关系以及社会处境抱有较强不安感的人，做事委曲求全、尽可能避免
与他人发生冲突的人，以及情绪基调以忧伤、压抑为主的人（自信心较弱），表现出较高的
可说服性。相反，那些社会不安感、委曲求全性向以及感情抑郁程度较低的人，其可说服性
普遍较低，根据这个结果，贾尼斯认为，在自信心的强弱和可说服性的高低之间存在着密切
的相关，即自信心越强，可说服性越低，自信心越弱，可说服性越强。这一结论，被称为“自
信心假说”。
第四部分大众传播的宏观社会效果
大众传播与环境认知--议程设置功能
一、议程设置功能
美国传播学家 麦库姆斯和D、L肖 于1972年在 《舆论季刊》 上发表的题为 《大
众传播的议程设置功能》 的论文。
1、内容:
传播媒介的效果和作用在于引起人们的注意力。大众传播只要对一些问题给予重视、集
中报道，并忽视或掩盖对其他问题的报道，就能影响公众舆论。而人们则倾向于关注和思考
大众传播媒介注意的那些问题，并按照大众传播给各个问题确定的重要性的次序，分配自己
的注意力，大众传播通过调动受众的注意力来安排问题的轻重次序，从而间接达到影响舆论，
左右人们观点和思路的目的。
2、议程设置理论的特点:
①议程设置功能假说的着眼点是大众传播认知层面的效果，关注的是大众传媒对人们
“思考对象”上的影响，也就是以告诉人们“想什么”的方式来把他们的关心和注意力引导
到特定的问题上。
②议程设置功能理论所考察的，不是某家媒介的某次报道活动产生的短期效果，而是作
为整体的大众传播具有较长时间跨度的一系列报道活动所产生的中长期的、综合的、宏观的
社会效果；
③议程设置功能理论暗示了这样一种媒介观，即传播媒介是从事“环境再构成作业”的
机构。也就是说，传播媒介对外部世界的报道不是镜子式的反映，而是一种有目的的取舍选
择活动。
3、议程设置的作用机制:
①“0/1”效果或知觉模式，大众传媒报道或不报道某个“议题”，会影响到公众对该
“议题”的感知；
②“0/1/2”效果或“显著性模式，媒介对少数“议题”的突出强调，会引起公众对这
些议题的突出重视；
③“0/1/2***N”效果或优先顺序模式，传媒对一系列“议题”按照一定的优先顺序所
给予的不同程度的报道，会影响公众对这些议题的重要性顺序所做的判断。
4、议程设置的不同类型:
个人议题；谈话议题；公共议题
5、不同媒体的议程设置特点:
如报纸的“议程设置”对较长期议题的重要性顺序排列影响较大，而电视的热点化效果
比较突出；报纸的新闻报道形成议程的基本框架，而电视新闻报道则挑选出议程中若干最主
要的议题加以突出强调；电视的主要影响是提供谈话议题，而报纸则可以进一步对个人议题
产生较深刻的影响。
6、议程设置与受众属性的关系:
①受众对各种议题的经验程度（经验越是间接，受媒介的影响越大）；
②受众对媒介信息的接触量（接触量越大，受媒介的影响越大）；
③人际传播的频度（对媒介的议程设置效果有“抑制”和“强化”两种作用）；
④人口统计学上的属性（传媒的“议程设置”对知识水准高、政治关心程度高以及从事
较高层次社会职业的人影响较小）
7、议程设置理论的意义
①从考察大众传播在人们的环境认知过程中的作用入手，重新提示了大众传媒的有力影
响，为效果研究摆脱“有限论”的束缚起了重要作用。
②通过分析媒介议题的来源，深刻提示了媒介背后的控制问题，指出资本主义社会的媒
介议程设置过程，从本质上说是占统治地位的政治、经济和社会势力对舆论进行操纵和控制
的过程。议程设置功能理论的真正意义，正在于为研究这些资产阶级学者力图掩盖的问题提
供了一个重要的契机。
③议程设置功能理论对我们详细考察传媒的舆论导向过程具有一定的启发意义。
8、议程设置理论的不足
①只强调了传播媒介“设置”或形成社会议题的一面，而没有涉及到反映社会议题的一
面。无论在哪个国家和社会起源于民间、具有广泛社会关心的重要问题最终登上传媒“议程”
的情况是常见的；
②从一般意义上讲，媒介的议程设置功能是强大的，但也不能将它的效果绝对化。
9、与议程设置相关的研究: （补充）
“拟态环境”\ “环境监测功能”
报刊在告诉人们应该“怎样想”时并不成功，但在告诉人们“想什么”方面，却是惊人成功
的
不过将大众传播的环境认知影响明确概括为“议程设置功能”并进行实证考察的是麦库姆斯
和D、L肖
传播媒介的议程设置与受众的议程认知之间有高度的相关性。
大众传播、社会心理与舆论---沉默的螺旋
一、沉默的螺旋
德国学者诺依曼最早见于1974 在《传播学刊》上发表的一篇论文， 1980以《沉默
的螺旋：舆论-我们的社会皮肤》出版，对此理论进行了全面概括。
1、沉默的螺旋假说:（三个基本命题）
（1）个人意见的表明是一个社会心理过程
个人在表明观点前要对周围的意见环境进行观察，当发现自己属于“多数”或“优势”
意见时，便倾向于积极大胆地表明自己的观点，当发现自己属于“少数”或“劣势”意见时。
一般就会屈于环境压力而转向“沉默”或者附和。
（2）意见的表明和“沉默”的扩散是一个螺旋式的社会传播过程
一方的沉默造成另一方的意见增势，受群体压力而改变态度的人越来越多，使得优势
意见越来越强，迫使更多持不同意见的人继续保持沉默或者既而转变态度追随支配意见。
（3）大众传播通过营造意见环境来影响和制约舆论
对人们确定多数人的意见是什么，大众传媒起重要的作用。
2、传播媒介对人们的环境认知活动产生影响的因素：
①多数传媒的报道内容具有高度的类似性（产生共鸣效果）；
②同类信息的传达活动在时间上具有持续性和重复性（累积效果）；
③媒介信息的抵达范围具有空前的广泛性（产生遍在效果）；
3、沉默的螺旋理论的几个要点:重新提示了一种“强有力”的大众传播观
这个假说包含：
①舆论的形成是大众传播、人际传播和人们对“意见环境”的认知心理三者相互作用的结果；
②经大众传媒强调提示的意见由于具有公开性和传播的广泛性，容易被当做“多数”或“优
势”意见所认可；
③这种环境认知所带来的压力或安全感，会引起人际接触中的“劣势意见的沉默”和“优势
意见的大声疾呼”的螺旋式扩展过程，并导致社会生活中占压倒优势的“多数意见”―――
舆论的诞生。
4、沉默的螺旋理论的特点:
它是一种考察大众传播与社会舆论的关系的理论，这个理论在两个方面有着自己的特
点：一是它的舆论观；二是它的效果观
（1）舆论观
在此理论中，舆论与其说是“公共意见”或“公众意见”倒不如是“公开的意见”。只
有那些被认为是多数人共有的、能够在公开场合公开表明的意见才能成为舆论。一种意见一
旦成为舆论就具有强制力。公开与之唱反调就会陷入孤立状态。
该理论强调了舆论的社会控制功能。舆论是双重意义上的社会皮肤：是个人感知社会“意
见气候”的变化、调整自己的环境适应行为的皮肤；又在维持社会整合方面起着重要作用，
防止由于意见过度分裂而引起社会解体。
（2）效果观
强调大众传播具有强大的社会效果和影响。而且这种影响包括了“认知――判断――意
见――行动”的全过程。
传播媒介提示的意见环境未必是社会上意见分布状态的如实反映，而一般社会成员对这
种分布又处于多元无知的状态。因此，传媒提示和强大的即便是少数人的意见也会被人们当
作多数意见来认知，其结果也会引起沉默的螺旋过程的发生。传播媒介具有创造社会现实的
巨大力量。
5、对沉默的螺旋的理论的研究和评价:（不同观点）P223
争议的焦点主要集中在这个假说的理论前提上：
“沉默的螺旋”的重要理论前提之一是个人“对社会孤立的恐惧”，以及由这种“恐惧”
所产生的对“多数”或“优势”意见的趋同行为；
“沉默的螺旋”假说的另一个问题是，由于它在说明舆论的形成过程之际极力强调“多数”
或“优势”意见的压力，以至于忽略了舆论的变化过程和“少数派”的作用。
6、沉默的螺旋理论的意义:
①它把对舆论形成过程的考察从现象论的描述引向了社会心理分析的领域，强调了社会
心理机制在这个过程中的作用；
②它强调了大众传播对舆论的强大影响，并正确指出了这种影响来自于大众传播营造意
见环境的巨大能力。假说中对传播媒介的赋予地位功能、大众传播的公开性普遍性、报道内
容的类似性和累积性以及由此带来的选择性接触的困难性所做的分析，对重新评价大众传播
的影响和效果具有重要的启迪意义。
大众传播的潜移默化效果---培养理论
传媒对人们的现实具有什么影响？如何发生？传媒在提示“现实”之际有什么倾向性？
一、现代社会人们与三种现实发生密切联系:
客观现实；象征性现实；主观现实
二、培养理论: （也称为培养分析、教化分析、涵化分析）
1、背景：起源于20世纪60年代后期，当时，美国社会的暴力和犯罪问题十分严重，美国
政府专门成立了一个“暴力起因与防范委员会”来研究解决这些问题的对策。格伯纳主持的
“培养分析”就是在该委员会的支持和赞助下开始的。
2、着眼点：一是分析电视画面上的凶杀和暴力内容与社会犯罪之间的关系；
二是考察这些内容对人们的认识社会现实的影响。
3、培养分析：电视节目中充斥的暴力内容增大了人们对现实社会环境危险程度的判断，而
且，电视媒介接触量越大的人，这种社会不安全感越强。
根据调查和分析结果，格伯纳认为，在现代社会，大众传媒提示的“象征性现实”对人
们认识和了解现实世界发挥着巨大影响，由于大众传媒的某些倾向性，人们在心目中描绘的
“主观现实”与实际存在的客观现实之间正在出现很大的偏离。同时，这种影响不是短暂的，
而是一个长期的、潜移默化的、“培养”的过程，它在不知不觉当中制约着人们的现实观。
4、“培养分析”理论 关于社会与传播的基本观点:
①社会作为一个统一的整体存在和发展下去，就需要社会成员对该社会有一种“共识”，
也就是对客观存在的事物，重要的事物以及社会的各种事物，各个部分及其相互关系要有大
体一致或接近的认识。在此基础上，人们的认识、判断和行为才会有共通的基准，社会生活
才能实现协调。
②大众传媒在形成“共识”方面发挥了巨大作用，尤其是电视；
③由于倾向性等因素，大众传媒所提供的象征性现实与客观现实存在距离，而受众往往无
法分辨；
④大众传媒具有特定的价值和意识形态倾向，通过“报道事实”、“提供娱乐”等形式传
达给受众，从而潜移默化地形成人们的现实观、社会观；
⑤大众传媒的“培养效果”，主要表现在形成当代社会观和现实观的“主流”，而电视媒
介在主流形成过程中尤其发挥了强大的作用；
⑥人们在电视中看到的场景同现实生活中遇到的场景有重合时，会大大提高“培养”的
程度，即所谓的“共鸣”；
三、培养理论的外围:文化指标研究
1、制度分析：主要目的是分析大众传播的信息生产、传达和消费过程中的各种制度性
压力和制约因素，提示大众传播内容的特定倾向性形成的原因。
2、讯息系统分析：目的就在于提示媒介讯息系统的整体倾向性。
3、培养分析:是讯息系统分析的延伸，目的:考察大众传媒的特定倾向所造成的社会结
果。
“培养分析” 核心观点:传播内容具有特定的价值和意识形态倾向，这些倾向不是以说
教而是以 “报道事实”、“提供娱乐”的形式传达给受众的 ，它于潜移默化中形成人们的
现实观、社会观。
补充：四，对培养理论的评价：
①强调大众传播在形成社会成员对社会的“共识”中的巨大作用；
②指出大众传媒所提供的“象征性现实”与客观现实之间是有差距的，传媒的倾向会带
来或好或坏的社会效果；
③包含对资本主义大众传媒的批判和要求改革的观点；
④培养理论可能适合于特定种类的电视节目，但可能不支持总体上的电视内容，期待整
体的电视观看产生教养效果是不合理的。
大众传播与信息社会中的阶层分化---知沟理论
一、知沟理论:
1、背景：20世纪60年代，美国政府力图通过《塞萨米大街》（又名《芝麻街》)电视片来
缓解贫富儿童受教育机会不平等的状况，结果却证明失败了。
1970年，美国传播学者蒂奇诺等人在一系列实证研究的基础上，提出了理论假说：由于
社会经济地位高者通常能比社会经济地位低者更快地获得信息，因此，大众传媒传送的信息
越多，这两者之间的知识鸿沟也就越有扩大的趋势。
2、知沟假说内容：大众传播的信息传达活动无论是对社会经济地位高者还是低者都会带来
知识量的增加，但由于社会经济地位高的人获得信息和知识的速度大大快于后者，随着时间
的推移，最终的结果是两者之间的鸿沟不断变宽，差距不断扩大。
3、造成知沟扩大的原因：
①接触媒介和学习知识的经济条件；
②传播技能上的差异；
③已有知识储存量上的差异；
④社交范围的差异；
⑤信息的选择性接触、理解和记忆的因素；
⑥大众传播媒介的性质；
4、上限效果假说:
艾蒂玛和克莱因于1977年提出，主要观点是：个人对特定知识的追求并不是无止境的，
达到某一“上限”（饱和点）后，知识量的增加就会减速乃至停止下来。社会经济地位高者
获得知识的速度快，其上限到来得也就早；那些经济地位低者虽然知识增加的速度慢，但随
着时间的推移最终能够在上限上赶上前者。即大众传播的结果不是带来社会“知沟”的扩大，
而是缩小。
三条论据：
①信息源的性质决定的“上限”：大众传播的是某一范围、某种程度的一般知识，无论
是经济地位高者还是低者，都不可能从大众传播中得到超出这个程度或范围的知识。
②受众本身具有的“上限”：受众中的“先驱部分”(即社会经济地位高者)在感觉到自
己的某种知识已经充足的时候，就会自动减慢或停止对这种知识的追求；
③现有知识已经达到“上限”：如果受众的个人知识程度已经高于大众传播的内容，他
们便不会再通过大众传播去寻求知识。
5、信息沟理论:
卡茨曼1974年提出，主要观点是：
①新传播技术的采用将带来整个社会的信息流通量和信息接触量的增大，这对每一个社
会成员来说都是如此。
②新技术的采用所带来的利益并非对所有社会成员都是均等的，换句话说，现有的信息
水准较高或信息能力较强的人，能够比较弱的人获得更多的信息；
③与人的能力相比，电脑等机器的信息处理和积蓄能力要强大得多，既有的富裕阶层通
过早期采用和熟练使用这些先进机器，能够比其他人更拥有信息优势。
④新媒介技术层出不穷，更换周期越来越短，其趋势更可能是“老沟”未平，而“新沟”
不断出现。
知沟理论以及它的反命题“上限效果”假说，反映了人们对信息社会中阶层分化问题的重
视。
