<p><span class="kw-link" data-id="s1">经验学派</span>是传播学研究中以<span class="kw-link" data-id="e4-b1a">实证研究</span>方法为主导的主流范式。然而，学界惯于将其简化为"<span class="kw-link" data-id="e4-b0-3">5W模式</span>"的技术标签，或按照人物顺序逐一介绍——<span class="kw-link" data-id="e4-b1a">拉扎斯菲尔德</span>、<span class="kw-link" data-id="e4-b2a">拉斯韦尔</span>、<span class="kw-link" data-id="e4-b2b">卢因</span>、<span class="kw-link" data-id="e4-b2c">霍夫兰</span>——却难以回答一个根本问题：这些人为何同属一个传统？本文提出，<span class="kw-link" data-id="s1">经验学派</span>的统一性不在人物归属，而在于一条贯穿始终的核心线索——<span class="kw-link" data-id="e4-b0-1">传播产生了什么效果？</span>本文以<span class="kw-link" data-id="e4-b0-3">5W模式</span>为历史框架，系统考察<span class="kw-link" data-id="s1">经验学派</span>的<span class="kw-link" data-id="e4-b0-2">方法论基础</span>、传播者研究、内容分析、媒介研究、受众研究和<span class="kw-link" data-id="e4-b6">效果研究</span>的演进逻辑，揭示其从"<span class="kw-link" data-id="e4-b6a">魔弹论</span>"到"<span class="kw-link" data-id="e4-b6c">强大效果</span>"的三段式理论转向。</p>
<p>关键词：<span class="kw-link" data-id="s1">经验学派</span>；<span class="kw-link" data-id="e4-b6">传播效果</span>；<span class="kw-link" data-id="e4-b0-2">实证研究</span>；<span class="kw-link" data-id="e4-b0-3">5W模式</span>；<span class="kw-link" data-id="e4-b6">效果研究</span>演进</p>

<h2>引言</h2>
<p>在传播学的理论版图中，<span class="kw-link" data-id="s1">经验学派</span>占据着最为核心的位置。如果说法兰克福学派追问"资本如何操纵文化"，媒介环境学派追问"技术如何塑造环境"，芝加哥学派追问"社会如何通过互动生成"，那么<span class="kw-link" data-id="s1">经验学派</span>追问的则是一个更为具体、更具操作性的问题：<span class="kw-link" data-id="e4-b0-1">传播产生了什么效果？</span>这个问题的答案不是"文化被操控了""技术改变了环境"或"社会在互动中生成"，而是——通过可观察、可测量的<span class="kw-link" data-id="e4-b1a">实证研究</span>方法，揭示传播过程中各要素之间的因果联系。</p>
<p>然而，学界惯于将<span class="kw-link" data-id="s1">经验学派</span>简化为"<span class="kw-link" data-id="e4-b0-3">5W模式</span>"的技术标签，或按照人物顺序逐一介绍——<span class="kw-link" data-id="e4-b1a">拉扎斯菲尔德</span>的<span class="kw-link" data-id="e4-b1a">调查研究</span>、<span class="kw-link" data-id="e4-b2c">霍夫兰</span>的<span class="kw-link" data-id="e4-b1b">控制实验</span>、<span class="kw-link" data-id="e4-b2a">拉斯韦尔</span>的<span class="kw-link" data-id="e4-b1c">内容分析</span>——却难以回答一个根本性的问题：这些人为什么同属一个传统？如果只是介绍每个人的方法论贡献，就无法解释学派的内在统一性。</p>
<p>本文认为，<span class="kw-link" data-id="s1">经验学派</span>的统一性不在人物归属，而在于一条贯穿始终的核心线索：<span class="kw-link" data-id="e4-b0-1">传播产生了什么效果？</span>这一线索通过<span class="kw-link" data-id="e4-b2a">拉斯韦尔</span>的<span class="kw-link" data-id="e4-b0-3">5W模式</span>获得了完美的分析框架——"谁（Who）说了什么（Says What）通过什么渠道（Channel）对谁（To Whom）产生了什么效果（Effect）"——这五个问题分别对应传播者研究、内容研究、媒介研究、受众研究和效果研究，构成了<span class="kw-link" data-id="s1">经验学派</span>从宏观到微观的完整研究版图。</p>
<p>需要指出的是，<span class="kw-link" data-id="s1">经验学派</span>并非凭空出现。其思想来源有三：<span class="kw-link" data-id="e4-b0-2">实用主义</span>哲学强调知识来源于经验实践，<span class="kw-link" data-id="e4-b0-2">行为主义</span>心理学主张通过可观察的行为来研究心理过程，社会科学方法则提供了问卷、实验、统计等具体的工具。三者共同构成了<span class="kw-link" data-id="s1">经验学派</span>的<span class="kw-link" data-id="e4-b0-2">方法论基础</span>。</p>

<h2>一、方法论基础：三大实证方法的奠基</h2>
<p><span class="kw-link" data-id="s1">经验学派</span>之所以成为传播学的"主流范式"，首先在于它建立了一套完整、可操作的方法论体系。这套体系由三位奠基人各自贡献了一种核心方法，构成了传播学研究的"三大支柱"。</p>

<h3>（一）<span class="kw-link" data-id="e4-b1a">拉扎斯菲尔德</span>：<span class="kw-link" data-id="e4-b1a">调查研究</span>方法的引入</h3>
<p><span class="kw-link" data-id="e4-b1a">保罗·拉扎斯菲尔德</span>（Paul Lazarsfeld）是传播学<span class="kw-link" data-id="e4-b1a">调查研究</span>方法的开创者。他出生于奥地利维也纳，最初是一位数学家，后来转向社会科学。1940年代，他在哥伦比亚大学建立了"应用社会研究局"（Bureau of Applied Social Research），将定量<span class="kw-link" data-id="e4-b1a">调查研究</span>方法系统化地引入传播学研究。</p>
<p><span class="kw-link" data-id="e4-b1a">拉扎斯菲尔德</span>的核心贡献在于"定量化+抽样"的研究设计。他首创了"固定样本连续调查法"（Panel Study），即对同一批受访者进行多次追踪调查，从而揭示传播效果的动态变化过程。正是凭借这一方法，他在1940年的"伊里调查"（Erie County Study）中发现了<span class="kw-link" data-id="e4-b5b">两级传播</span>和<span class="kw-link" data-id="e4-b5b">意见领袖</span>现象，彻底颠覆了当时占统治地位的<span class="kw-link" data-id="e4-b6a">魔弹论</span>假设。</p>
<p><span class="kw-link" data-id="e4-b1a">拉扎斯菲尔德</span>的<span class="kw-link" data-id="e4-b1a">调查研究</span>方法的深远影响在于：它使得传播效果从"理论推测"变成了"经验可证"的研究对象。传播不再是哲学家们的思辨游戏，而变成了可以通过数据来检验的科学命题。</p>

<h3>（二）<span class="kw-link" data-id="e4-b2c">霍夫兰</span>：<span class="kw-link" data-id="e4-b1b">控制实验</span>方法的建立</h3>
<p><span class="kw-link" data-id="e4-b2c">卡尔·霍夫兰</span>（Carl Hovland）是传播学<span class="kw-link" data-id="e4-b1b">控制实验</span>方法的奠基人。他在耶鲁大学主持的"说服与态度改变"研究项目（1940s-1950s），将心理学实验室方法系统引入传播学研究。</p>
<p><span class="kw-link" data-id="e4-b2c">霍夫兰</span>的核心贡献在于"变量控制+因果推断"的研究逻辑。他通过精心设计的<span class="kw-link" data-id="e4-b1b">控制实验</span>，系统地检验了传播者特征（如可信度）、信息特征（如一面与两面提示）、受众特征（如个体差异）等因素对说服效果的影响。他的"耶鲁说服模型"至今仍是传播效果研究中最经典的框架之一。</p>
<p><span class="kw-link" data-id="e4-b2c">霍夫兰</span>的<span class="kw-link" data-id="e4-b1b">控制实验</span>方法的深远影响在于：它使得传播研究从"相关性观察"深入到"因果性解释"。研究者不再是仅仅描述"发生了什么"，而是能够回答"为什么会发生"。</p>

<h3>（三）<span class="kw-link" data-id="e4-b2a">拉斯韦尔</span>：<span class="kw-link" data-id="e4-b1c">内容分析</span>方法的奠基</h3>
<p><span class="kw-link" data-id="e4-b2a">哈罗德·拉斯韦尔</span>（Harold Lasswell）是传播学<span class="kw-link" data-id="e4-b1c">内容分析</span>方法的先驱。他在二战期间对纳粹宣传内容的系统分析，开创了用定量方法研究传播内容的先河。</p>
<p><span class="kw-link" data-id="e4-b2a">拉斯韦尔</span>的核心贡献在于将传播内容从"定性阅读"的对象转变为"定量编码"的对象。他提出的"<span class="kw-link" data-id="e4-b0-3">5W模式</span>"——"谁（Who）说了什么（Says What）通过什么渠道（Channel）对谁（To Whom）产生了什么效果（Effect）"——不仅是传播学最经典的定义，更是为<span class="kw-link" data-id="s1">经验学派</span>提供了一个完美的分析框架。</p>
<p><span class="kw-link" data-id="e4-b2a">拉斯韦尔</span>的<span class="kw-link" data-id="e4-b1c">内容分析</span>方法的深远影响在于：它使得传播研究不再仅仅关注"效果"，而是可以系统考察传播的"源头"和"内容本身"。传播研究由此获得了完整的分析链条。</p>

<h3>小结：三大方法构成经验学派的方法论基石</h3>
<p><span class="kw-link" data-id="e4-b1a">拉扎斯菲尔德</span>的<span class="kw-link" data-id="e4-b1a">调查研究</span>揭示了传播效果在真实社会情境中的复杂面貌，<span class="kw-link" data-id="e4-b2c">霍夫兰</span>的<span class="kw-link" data-id="e4-b1b">控制实验</span>揭示了传播效果的因果机制，<span class="kw-link" data-id="e4-b2a">拉斯韦尔</span>的<span class="kw-link" data-id="e4-b1c">内容分析</span>揭示了传播内容的系统特征。三者共同构成了<span class="kw-link" data-id="s1">经验学派</span>的方法论基石——传播由此成为一门可以用数据说话的科学。</p>

<h2>二、Who：传播者研究</h2>
<p>传播者是谁？传播者有什么特征会影响传播效果？这是<span class="kw-link" data-id="s1">经验学派</span>研究的第一个环节——"Who"。</p>

<h3>（一）<span class="kw-link" data-id="e4-b2a">拉斯韦尔</span>：<span class="kw-link" data-id="e4-b0-3">5W模式</span>的提出</h3>
<p><span class="kw-link" data-id="e4-b2a">拉斯韦尔</span>在《传播在社会中的结构与功能》（1948）中提出了著名的<span class="kw-link" data-id="e4-b0-3">5W模式</span>，这不仅是对传播过程的经典定义，更是将传播研究划分为五个领域的开创性框架。在传播者维度上，<span class="kw-link" data-id="e4-b2a">拉斯韦尔</span>的追问是：谁在传播？传播者是否有动机？传播者是否拥有权力？这些问题开启了<span class="kw-link" data-id="s1">经验学派</span>对传播者研究的序幕。</p>

<h3>（二）<span class="kw-link" data-id="e4-b2b">卢因</span>：<span class="kw-link" data-id="e4-b2b">把关人理论</span></h3>
<p><span class="kw-link" data-id="e4-b2b">库尔特·卢因</span>（Kurt Lewin）是<span class="kw-link" data-id="e4-b2b">把关人理论</span>（Gatekeeping Theory）的开创者。他最初研究的是食物消费中的"把关"行为——家庭主妇如何决定哪些食物进入厨房。后来这一概念被引入传播学研究，成为理解新闻生产过程的核心理论。</p>
<p><span class="kw-link" data-id="e4-b2b">把关人理论</span>的核心命题是：信息在传播过程中并非自由流通，而是必须经过一系列"把关人"的筛选。新闻编辑、记者、媒体管理者都是传播链上的<span class="kw-link" data-id="e4-b2b">把关人</span>——他们根据一定的标准（新闻价值、组织利益、意识形态等）决定哪些信息可以通过，哪些信息被过滤。</p>
<p><span class="kw-link" data-id="e4-b2b">把关人理论</span>的深刻之处在于：它揭示了传播过程中权力运作的微观机制。<span class="kw-link" data-id="e4-b2b">把关人</span>看似在做"技术性"的筛选，实际上却在无形中塑造着公众所能接触到的"信息环境"。这一理论至今仍是新闻传播学研究中最具解释力的框架之一。</p>

<h3>（三）<span class="kw-link" data-id="e4-b2c">霍夫兰</span>：<span class="kw-link" data-id="e4-b2c">传播者可信度</span></h3>
<p><span class="kw-link" data-id="e4-b2c">霍夫兰</span>在说服研究中系统考察了传播者特征对说服效果的影响，其中最核心的发现是<span class="kw-link" data-id="e4-b2c">传播者可信度</span>（Source Credibility）假说。</p>
<p><span class="kw-link" data-id="e4-b2c">传播者可信度</span>包含两个维度：专业性（Expertise）和可信赖性（Trustworthiness）。高可信度的传播者（如专家、权威机构）比低可信度的传播者更容易说服受众。但<span class="kw-link" data-id="e4-b2c">霍夫兰</span>还发现了一个有趣的现象——"休眠效果"（Sleeper Effect）：随着时间推移，传播者可信度的影响会逐渐减弱，而信息内容本身的影响力会逐渐增强。</p>

<h2>三、Says What：内容研究</h2>
<p>传播者说了什么？传播内容本身有什么特征和规律？这是<span class="kw-link" data-id="s1">经验学派</span>研究的第二个环节——"Says What"。</p>

<h3>（一）<span class="kw-link" data-id="e4-b2a">拉斯韦尔</span>：<span class="kw-link" data-id="e4-b1c">内容分析</span>方法的奠基</h3>
<p>如前所述，<span class="kw-link" data-id="e4-b2a">拉斯韦尔</span>不仅是<span class="kw-link" data-id="e4-b0-3">5W模式</span>的提出者，更是<span class="kw-link" data-id="e4-b1c">内容分析</span>方法的开创者。他在二战期间对纳粹宣传的系统<span class="kw-link" data-id="e4-b1c">内容分析</span>，证明了传播内容是可以被客观、系统地量化和分析的。这一方法论贡献使得传播学拥有了研究"说了什么"的科学工具。</p>

<h3>（二）<span class="kw-link" data-id="e4-b2c">霍夫兰</span>：<span class="kw-link" data-id="e4-b3b">一面提示</span>与<span class="kw-link" data-id="e4-b3b">两面提示</span></h3>
<p><span class="kw-link" data-id="e4-b2c">霍夫兰</span>在说服研究中对传播内容本身进行了精细化的考察，其中最具代表性的发现是关于<span class="kw-link" data-id="e4-b3b">一面提示</span>（One-sided Argument）与<span class="kw-link" data-id="e4-b3b">两面提示</span>（Two-sided Argument）的效果差异。</p>
<p><span class="kw-link" data-id="e4-b2c">霍夫兰</span>发现：<span class="kw-link" data-id="e4-b3b">一面提示</span>（只呈现支持自己立场的论据）对原本就倾向于接受该信息的人更有效；而<span class="kw-link" data-id="e4-b3b">两面提示</span>（同时呈现支持与反对的论据，但更强调支持立场）对持不同意见的人更有效，也更能抵抗反宣传。这一发现深刻地揭示了传播内容与受众特征之间的交互效应。</p>

<h2>四、Channel：媒介研究</h2>
<p>信息通过什么渠道传递？媒介本身有什么特征会影响传播效果？这是<span class="kw-link" data-id="s1">经验学派</span>研究的第三个环节——"Channel"。</p>

<h3>（一）<span class="kw-link" data-id="e4-b4a">香农</span>：<span class="kw-link" data-id="e4-b4a">信息论</span>的数学模型</h3>
<p><span class="kw-link" data-id="e4-b4a">克劳德·香农</span>（Claude Shannon）在《通信的数学理论》（1948）中提出了<span class="kw-link" data-id="e4-b4a">信息论</span>（Information Theory），为传播学研究提供了一个精确的数学模型。</p>
<p><span class="kw-link" data-id="e4-b4a">香农</span>模型的核心概念包括：信源（Source）、编码器（Encoder）、信道（Channel）、解码器（Decoder）和信宿（Receiver），以及信道中的"噪音"（Noise）。<span class="kw-link" data-id="e4-b4a">信息论</span>将"信息"定义为"不确定性的消除"，用"熵"来度量信息量，使得传播研究从模糊的哲学讨论进入了精确的数学领域。</p>
<p>虽然<span class="kw-link" data-id="e4-b4a">香农</span>的模型最初是为了解决工程技术问题（如电话线路的信息传输），但它对传播学的影响是深远的：<span class="kw-link" data-id="e4-b4a">信息论</span>的概念体系——信息、编码、解码、信道、噪音——至今仍是传播学研究的核心术语。</p>

<h3>（二）<span class="kw-link" data-id="e4-b4b">施拉姆</span>：<span class="kw-link" data-id="e4-b4b">双向循环模式</span></h3>
<p><span class="kw-link" data-id="e4-b4b">威尔伯·施拉姆</span>（Wilbur Schramm）被誉为"传播学之父"，他在<span class="kw-link" data-id="e4-b4a">香农</span>线性模型的基础上，提出了<span class="kw-link" data-id="e4-b4b">双向循环模式</span>。</p>
<p><span class="kw-link" data-id="e4-b4b">施拉姆</span>的核心贡献在于：将传播从"单向传递"重新定义为"双向互动"。在他的模型中，传播者与受众之间没有绝对的区分——双方都是"编码者"和"解码者"，传播是一个持续的、循环的互动过程。他还提出了传播的"<span class="kw-link" data-id="e4-b4b">或然率公式</span>"：传播效果 = 传播的报偿 / 传播的努力。这一公式揭示了受众选择媒介信息的基本逻辑——人们倾向于选择那些"性价比最高"的传播渠道。</p>

<h3>（三）<span class="kw-link" data-id="e4-b4c">维纳</span>：<span class="kw-link" data-id="e4-b4c">控制论</span>与<span class="kw-link" data-id="e4-b4c">反馈</span></h3>
<p><span class="kw-link" data-id="e4-b4c">诺伯特·维纳</span>（Norbert Wiener）在《控制论》（1948）中提出了<span class="kw-link" data-id="e4-b4c">控制论</span>（Cybernetics），为传播学研究引入了"<span class="kw-link" data-id="e4-b4c">反馈</span>"（Feedback）这一关键概念。</p>
<p><span class="kw-link" data-id="e4-b4c">控制论</span>的核心思想是：系统的运行不是单向的，而是通过<span class="kw-link" data-id="e4-b4c">反馈</span>机制来实现自我调节。<span class="kw-link" data-id="e4-b4c">反馈</span>概念的引入，彻底改变了传播学对传播过程的理解——传播不再是从A到B的单向传递，而是包含<span class="kw-link" data-id="e4-b4c">反馈</span>的循环过程。这一概念与<span class="kw-link" data-id="e4-b4b">施拉姆</span>的<span class="kw-link" data-id="e4-b4b">双向循环模式</span>形成了理论呼应，共同推动了传播模式从"线性"向"循环"的转向。</p>

<h2>五、To Whom：受众研究</h2>
<p>信息传递给了谁？受众是主动的还是被动的？受众有何差异？这是<span class="kw-link" data-id="s1">经验学派</span>研究的第四个环节——"To Whom"。</p>

<h3>（一）<span class="kw-link" data-id="e4-b6a">魔弹论</span>假设：<span class="kw-link" data-id="e4-b5a">勒庞</span>与<span class="kw-link" data-id="e4-b5a">塔尔德</span>的"大众被动"观</h3>
<p>在<span class="kw-link" data-id="s1">经验学派</span>发展的早期，占统治地位的受众观是"<span class="kw-link" data-id="e4-b6a">魔弹论</span>"（Magic Bullet Theory），又称"皮下注射论"（Hypodermic Needle Theory）。这一假设认为，大众是孤立、原子化的，对大众传播信息毫无抵抗力，媒介信息如子弹般直接"射入"受众的大脑，产生即时、一致的强大效果。</p>
<p><span class="kw-link" data-id="e4-b6a">魔弹论</span>的思想根源可以追溯到<span class="kw-link" data-id="e4-b5a">勒庞</span>的《乌合之众》和<span class="kw-link" data-id="e4-b5a">塔尔德</span>的模仿理论。<span class="kw-link" data-id="e4-b5a">勒庞</span>认为，个体一旦融入群体，就会丧失理性判断力，变成容易被情绪和暗示操控的"群氓"。<span class="kw-link" data-id="e4-b5a">塔尔德</span>则认为，社会行为的本质是模仿——人们像机器人一样模仿他人的行为。这些观点共同构成了<span class="kw-link" data-id="e4-b6a">魔弹论</span>对"被动受众"的理论预设。</p>

<h3>（二）<span class="kw-link" data-id="e4-b1a">拉扎斯菲尔德</span>：<span class="kw-link" data-id="e4-b5b">两级传播</span>与<span class="kw-link" data-id="e4-b5b">意见领袖</span></h3>
<p><span class="kw-link" data-id="e4-b1a">拉扎斯菲尔德</span>在1940年的"伊里调查"中，用固定样本追踪调查法发现了<span class="kw-link" data-id="e4-b5b">两级传播</span>（Two-step Flow of Communication）和<span class="kw-link" data-id="e4-b5b">意见领袖</span>（Opinion Leader）现象，彻底颠覆了<span class="kw-link" data-id="e4-b6a">魔弹论</span>的受众观。</p>
<p><span class="kw-link" data-id="e4-b5b">两级传播</span>的核心发现是：大众传播信息并不是直接从媒体传递给普通受众的，而是先传达到"<span class="kw-link" data-id="e4-b5b">意见领袖</span>"，再由<span class="kw-link" data-id="e4-b5b">意见领袖</span>通过人际传播传递给周围的人。<span class="kw-link" data-id="e4-b5b">意见领袖</span>是那些在特定领域拥有更多信息、更强解读能力的人——他们既接触大众媒体，又在自己的社交圈中充当信息中介。</p>
<p><span class="kw-link" data-id="e4-b5b">两级传播</span>的深刻之处在于：它揭示了受众不是被动的靶子，而是主动的、分化的。受众之间的差异（如教育程度、社会地位、兴趣领域等）决定了他们对信息的<span class="kw-link" data-id="e4-b5b">选择性接触</span>——人们倾向于接触与自己既有观点一致的信息。</p>

<h3>（三）<span class="kw-link" data-id="e4-b5c">卡茨</span>：<span class="kw-link" data-id="e4-b5c">使用与满足</span></h3>
<p><span class="kw-link" data-id="e4-b5c">卡茨</span>（Elihu Katz）是<span class="kw-link" data-id="e4-b5c">使用与满足</span>理论（Uses and Gratifications Theory）的代表人物之一。这一理论进一步深化了"主动受众"的观念。</p>
<p><span class="kw-link" data-id="e4-b5c">使用与满足</span>理论的核心命题是：受众不是被动的信息接收者，而是主动的"需求满足者"——人们使用媒介是为了满足自己的特定需求（如信息需求、娱乐需求、社交需求、身份认同需求等）。不同的受众有不同的需求，因此会选择不同的媒介和内容。</p>
<p><span class="kw-link" data-id="e4-b5c">使用与满足</span>理论将研究的焦点从"媒介对受众做了什么"转向了"受众对媒介做了什么"，从根本上颠覆了<span class="kw-link" data-id="e4-b6a">魔弹论</span>的权力关系假设——在<span class="kw-link" data-id="e4-b5c">使用与满足</span>的视角下，受众不再是媒介权力的被动承受者，而是具有能动性的行动者。</p>

<h3>（四）<span class="kw-link" data-id="e4-b2c">霍夫兰</span>：<span class="kw-link" data-id="e4-b5d">个体差异</span>与<span class="kw-link" data-id="e4-b5d">选择性理解</span></h3>
<p><span class="kw-link" data-id="e4-b2c">霍夫兰</span>在说服研究中还发现了<span class="kw-link" data-id="e4-b5d">个体差异</span>理论（Individual Differences Theory）的重要启示：不同受众对同一传播信息的反应是不同的，因为每个人的既有态度、价值观、人格特征、社会经验等存在差异。</p>
<p>与此相关的是<span class="kw-link" data-id="e4-b5d">选择性理解</span>（Selective Perception）现象——人们倾向于按照自己的既有立场来理解和解释传播信息。同样的信息，在不同人眼中可能意味着完全不同的东西。<span class="kw-link" data-id="e4-b5d">个体差异</span>和<span class="kw-link" data-id="e4-b5d">选择性理解</span>共同构成了<span class="kw-link" data-id="e4-b6b">有限效果</span>论的理论基础。</p>

<h3>（五）<span class="kw-link" data-id="e4-b5e">李普曼</span>：<span class="kw-link" data-id="e4-b5e">拟态环境</span></h3>
<p><span class="kw-link" data-id="e4-b5e">沃尔特·李普曼</span>（Walter Lippmann）在《公众舆论》（1922）中提出了"<span class="kw-link" data-id="e4-b5e">拟态环境</span>"（Pseudo-environment）概念，深刻地揭示了媒介与受众之间的关系。</p>
<p><span class="kw-link" data-id="e4-b5e">拟态环境</span>的核心命题是：现代人生活的"现实"在很大程度上是由媒介建构的。人们无法直接接触所有事实，而是通过媒介的"报道"来了解世界。媒介为公众构建了一个"拟态的"环境——它不是真实世界本身，而是经过选择、加工、过滤后的"二手现实"。公众对世界的认知、态度和行为决策，都是在这一<span class="kw-link" data-id="e4-b5e">拟态环境</span>中做出的。</p>
<p><span class="kw-link" data-id="e4-b5e">拟态环境</span>理论的深远意义在于：它揭示了受众的"被动性"不在于对信息的机械反应，而在于对信息环境的结构性依赖。人无法超越媒介提供的信息框架来认识世界——这一洞见深刻影响了后来的<span class="kw-link" data-id="e4-b6c1">议程设置</span>、<span class="kw-link" data-id="e4-b6c3">涵化理论</span>等效果研究。</p>

<h2>六、Effect：效果研究的"三段式"演进</h2>
<p>传播产生了什么效果？这是<span class="kw-link" data-id="s1">经验学派</span>的核心追问，也是其最为丰硕的研究领域。<span class="kw-link" data-id="s1">经验学派</span>的<span class="kw-link" data-id="e4-b6">效果研究</span>经历了三个阶段——<span class="kw-link" data-id="e4-b6a">强效果</span>、<span class="kw-link" data-id="e4-b6b">有限效果</span>、<span class="kw-link" data-id="e4-b6c">强大效果</span>——每一次转向都深刻地改变了传播学的理论面貌。</p>

<h3>（一）第一阶段：<span class="kw-link" data-id="e4-b6a">强效果</span>（<span class="kw-link" data-id="e4-b6a">魔弹论</span>）</h3>
<p>20世纪初至1930年代，传播效果研究的基调是"<span class="kw-link" data-id="e4-b6a">强效果</span>"——认为大众传播具有强大、直接、一致的说服效果。<span class="kw-link" data-id="e4-b6a">魔弹论</span>假设认为，媒介信息如子弹般射入受众大脑，受众如靶子般被动接受。这一假设得到了一战和二战期间宣传战"成功"案例的"支持"，成为当时学界和公众的普遍共识。</p>
<p>然而，<span class="kw-link" data-id="e4-b6a">魔弹论</span>并非严谨的学术理论，而更多是一种基于直觉的时代偏见。它缺乏系统的实证检验，对受众的复杂性做了过度简化的假设。随着<span class="kw-link" data-id="e4-b1a">拉扎斯菲尔德</span>等人的<span class="kw-link" data-id="e4-b1a">实证研究</span>的推进，<span class="kw-link" data-id="e4-b6a">魔弹论</span>很快被<span class="kw-link" data-id="e4-b6b">有限效果</span>论所取代。</p>

<h3>（二）第二阶段：<span class="kw-link" data-id="e4-b6b">有限效果</span>（<span class="kw-link" data-id="e4-b6b">有限效果论</span>）</h3>
<p>1940年代至1960年代，随着<span class="kw-link" data-id="e4-b1a">拉扎斯菲尔德</span>的<span class="kw-link" data-id="e4-b5b">两级传播</span>、<span class="kw-link" data-id="e4-b2c">霍夫兰</span>的说服研究和<span class="kw-link" data-id="e4-b2b">卢因</span>的<span class="kw-link" data-id="e4-b2b">把关人</span>理论的推进，学界逐渐认识到：大众传播的效果并非强大、直接、一致，而是有限的、间接的、有条件的。<span class="kw-link" data-id="e4-b6b">有限效果论</span>的核心观点包括：<span class="kw-link" data-id="e4-b5b">两级传播</span>中的<span class="kw-link" data-id="e4-b5b">意见领袖</span>中介、<span class="kw-link" data-id="e4-b5d">个体差异</span>导致的效果分化、受众的<span class="kw-link" data-id="e4-b5b">选择性接触</span>和<span class="kw-link" data-id="e4-b5d">选择性理解</span>、人际传播对大众传播的强化或抵消等。</p>
<p><span class="kw-link" data-id="e4-b6b">有限效果论</span>的贡献在于将传播效果研究从粗放的"强/弱"二分推进到了精细化的"条件分析"——效果的大小取决于传播者特征、信息内容、媒介渠道、受众特征、社会情境等多重因素的交互作用。然而，<span class="kw-link" data-id="e4-b6b">有限效果论</span>的局限在于过度强调了"有限性"，低估了大众传播在长期、累积和间接层面的强大影响。</p>

<h3>（三）第三阶段：<span class="kw-link" data-id="e4-b6c">强大效果</span>（<span class="kw-link" data-id="e4-b6c">强效果回归</span>）</h3>
<p>1960年代末至1980年代，一系列经典研究的出现，推动传播效果研究进入"强大效果"阶段。与<span class="kw-link" data-id="e4-b6a">魔弹论</span>不同，<span class="kw-link" data-id="e4-b6c">强大效果</span>论不再假设传播效果是即时、直接的，而是揭示了传播在认知层面、态度累积层面和社会文化层面的长期、间接而深远的影响。</p>

<p><strong>1. <span class="kw-link" data-id="e4-b6c1">议程设置</span>——<span class="kw-link" data-id="e4-b6c1">麦库姆斯</span>与肖</strong></p>
<p><span class="kw-link" data-id="e4-b6c1">麦库姆斯</span>（McCombs）与肖（Shaw）在1968年和1972年的查佩尔希尔研究及夏洛特研究中，提出了<span class="kw-link" data-id="e4-b6c1">议程设置</span>（Agenda Setting）假说：大众传媒不能决定人们"怎么想"，但可以决定人们"想什么"。</p>
<p><span class="kw-link" data-id="e4-b6c1">议程设置</span>理论的核心发现是：媒介报道中给予某议题的强调程度，与受众认为该议题的重要程度之间，存在显著的相关关系。媒介的"议程"（即报道重点）影响着公众的"议程"（即关注重点）。<span class="kw-link" data-id="e4-b6c1">议程设置</span>证明了大众传播在认知层面具有强大的、可测量的效果——它不改变人们的态度，但改变了人们关注什么。</p>

<p><strong>2. <span class="kw-link" data-id="e4-b6c2">沉默螺旋</span>——<span class="kw-link" data-id="e4-b6c2">诺依曼</span></strong></p>
<p><span class="kw-link" data-id="e4-b6c2">诺依曼</span>（Noelle-Neumann）在1974年提出了<span class="kw-link" data-id="e4-b6c2">沉默的螺旋</span>（Spiral of Silence）理论。</p>
<p><span class="kw-link" data-id="e4-b6c2">沉默的螺旋</span>理论的核心命题是：人们会本能地评估"意见气候"（即社会上的主导意见是什么），当发现自己的观点属于少数派时，为了避免社会孤立，人们倾向于保持沉默。这种"沉默"会反过来强化多数派意见的"声势"，使少数派更加沉默——由此形成一种螺旋式的效应。<span class="kw-link" data-id="e4-b6c2">沉默的螺旋</span>揭示了大众传播如何通过塑造"意见气候"来间接影响人们的表达行为和态度变化。</p>

<p><strong>3. <span class="kw-link" data-id="e4-b6c3">涵化理论</span>——<span class="kw-link" data-id="e4-b6c3">格伯纳</span></strong></p>
<p><span class="kw-link" data-id="e4-b6c3">格伯纳</span>（Gerbner）在1960年代末提出了<span class="kw-link" data-id="e4-b6c3">涵化理论</span>（Cultivation Theory），又称"培养理论"。</p>
<p><span class="kw-link" data-id="e4-b6c3">涵化理论</span>的核心命题是：电视等大众媒介在长期浸润中会"培养"（<span class="kw-link" data-id="e4-b6c3">涵化</span>）受众的世界观。尤其是大量收看电视的人，更容易产生一种"险恶世界综合症"（Mean World Syndrome）——他们倾向于高估现实世界中的危险和暴力。<span class="kw-link" data-id="e4-b6c3">涵化理论</span>揭示的不是短期的态度改变，而是长期的认知框架的塑造——媒介在不知不觉中"涵化"了我们对世界的认知。</p>

<p><strong>4. <span class="kw-link" data-id="e4-b6c4">创新扩散</span>——<span class="kw-link" data-id="e4-b6c4">罗杰斯</span></strong></p>
<p><span class="kw-link" data-id="e4-b6c4">罗杰斯</span>（Rogers）在1962年的《创新的扩散》中提出了<span class="kw-link" data-id="e4-b6c4">创新扩散</span>（Diffusion of Innovations）理论。</p>
<p><span class="kw-link" data-id="e4-b6c4">创新扩散</span>理论的核心命题是：新观念、新技术在社会系统中的传播遵循一个"S型曲线"——从少数创新者到早期采用者，再到早期多数、晚期多数和落后者。<span class="kw-link" data-id="e4-b6c4">创新扩散</span>理论揭示了传播过程在时间维度和社会维度上的规律性，证明了大众传播与人际传播的协同作用对"效果"实现的关键影响。</p>

<h2>七、传播的社会功能与制度</h2>
<p>传播效果不仅作用于个体层面，更在社会层面产生深远影响。<span class="kw-link" data-id="s1">经验学派</span>在考察"效果"的同时，也系统地研究了传播的社会功能和制度安排。</p>

<h3>（一）<span class="kw-link" data-id="e4-b2a">拉斯韦尔</span>：<span class="kw-link" data-id="e4-b7a">三功能说</span></h3>
<p><span class="kw-link" data-id="e4-b2a">拉斯韦尔</span>在《传播在社会中的结构与功能》（1948）中提出了大众传播的<span class="kw-link" data-id="e4-b7a">三功能说</span>：<span class="kw-link" data-id="e4-b7a">环境监视</span>（Surveillance of the Environment）、<span class="kw-link" data-id="e4-b7a">社会协调</span>（Correlation of the Parts of Society in Responding to the Environment）和<span class="kw-link" data-id="e4-b7a">文化传承</span>（Transmission of Social Heritage）。后来<span class="kw-link" data-id="e4-b4b">施拉姆</span>在此基础上补充了<span class="kw-link" data-id="e4-b7a">娱乐功能</span>，形成了<span class="kw-link" data-id="e4-b7a">四功能说</span>。</p>

<h3>（二）<span class="kw-link" data-id="e4-b7b">蒂奇诺</span>：<span class="kw-link" data-id="e4-b7b">知识沟</span></h3>
<p><span class="kw-link" data-id="e4-b7b">蒂奇诺</span>（Tichenor）等人在1970年提出了<span class="kw-link" data-id="e4-b7b">知识沟</span>（Knowledge Gap）假说。</p>
<p><span class="kw-link" data-id="e4-b7b">知识沟</span>理论的核心命题是：随着大众传媒信息量的增加，不同社会经济地位的人群之间的知识差距不是缩小了，而是扩大了。高教育水平、高收入群体能够更快、更有效地获取和利用新信息，而低社会经济地位群体则被"落在后面"。<span class="kw-link" data-id="e4-b7b">知识沟</span>揭示了传播效果的社会分化效应——传播不仅传递信息，也在复制和加剧社会不平等。</p>

<h3>（三）<span class="kw-link" data-id="e4-b7c">勒纳</span>：<span class="kw-link" data-id="e4-b7c">发展传播</span>学</h3>
<p><span class="kw-link" data-id="e4-b7c">勒纳</span>（Lerner）在《传统社会的消逝》（1958）中开创了<span class="kw-link" data-id="e4-b7c">发展传播</span>（Development Communication）研究。</p>
<p><span class="kw-link" data-id="e4-b7c">发展传播</span>学的核心命题是：大众传播是现代化进程的关键推动力。<span class="kw-link" data-id="e4-b7c">勒纳</span>认为，传播媒介的普及可以促进发展中国家人民的"移情能力"（Empathy），使其能够想象和理解自己文化之外的体验，从而推动社会变迁。这一理论在20世纪五六十年代的联合国发展项目中产生了广泛影响。</p>

<h3>（四）<span class="kw-link" data-id="e4-b7d">赛伯特</span>：《传媒的四种理论》</h3>
<p><span class="kw-link" data-id="e4-b7d">赛伯特</span>（Siebert）等人在1956年出版的《传媒的四种理论》中，将世界各国的传播制度划分为四种理想类型：集权主义理论、自由主义理论、社会责任理论、苏维埃共产主义理论。这一分类框架虽然后来受到广泛批评，但它奠定了传播制度比较研究的学术基础。</p>

<h3>（五）<span class="kw-link" data-id="e4-b7e">约瑟夫·奈</span>：<span class="kw-link" data-id="e4-b7e">软实力</span></h3>
<p><span class="kw-link" data-id="e4-b7e">约瑟夫·奈</span>（Joseph Nye）在1990年代提出了<span class="kw-link" data-id="e4-b7e">软实力</span>（Soft Power）概念。</p>
<p><span class="kw-link" data-id="e4-b7e">软实力</span>的核心命题是：一个国家的国际影响力不仅来自军事和经济等"硬实力"，还来自文化吸引力、价值观感召力和外交政策合法性等"<span class="kw-link" data-id="e4-b7e">软实力</span>"。大众传播和跨文化传播是<span class="kw-link" data-id="e4-b7e">软实力</span>的核心载体——电影、电视、音乐、新闻、社交媒体等传播内容，都是塑造国家形象和国际影响力的关键工具。<span class="kw-link" data-id="e4-b7e">软实力</span>概念将传播效果从国内社会层面扩展到了国际关系层面。</p>

<h2>总结</h2>

<h3>效果研究三段式演进</h3>

let currentTopicArticle = null;
let mmSvg = null;
let mmG = null;
let mmSimulation = null;
let mmZoom = null;
let mmNodeData = [];
let mmLinkData = [];

function initTopicList() {
  const list = document.getElementById('topic-list');
  list.innerHTML = TOPIC_ARTICLES.map(a => `
    <div class="topic-card" data-id="${a.id}" onclick="showArticle('${a.id}')">
      <div class="tc-title">${a.title}</div>
      <div class="tc-meta">${a.author} · ${a.date}</div>
      <div class="tc-summary">${a.summary}</div>
    </div>
  `).join('');
}


function switchTopicTab(tabId) {
  document.querySelectorAll('.topic-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabId));
  document.querySelectorAll('.topic-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tabId));
  if (tabId === 'reflection' && currentTopicArticle) {
    initTopicMindmap(currentTopicArticle.id);
  }
}

function showArticle(articleId) {
  const article = TOPIC_ARTICLES.find(a => a.id === articleId);
  if (!article) return;
  currentTopicArticle = article;

  // Update active card
  document.querySelectorAll('.topic-card').forEach(c => {
    c.classList.toggle('active', c.dataset.id === articleId);
  });

  // Render article
  const articleEl = document.getElementById('topic-article');
  articleEl.innerHTML = `
    <h1>${article.title}</h1>
    <div class="article-meta">${article.author} · ${article.date}</div>
    <div class="article-keywords">
      ${article.keywords.map(k => `<span onclick="jumpFromKeyword('${k}')">${k}</span>`).join('')}
    </div>
    <div class="article-content">${article.content}</div>
  `;

  // Bind kw-link clicks
  articleEl.querySelectorAll('.kw-link').forEach(el => {
    el.addEventListener('click', () => {
      const mmNodeId = el.dataset.id;
      highlightMindmapNode(mmNodeId);
      const node = article.mindmap.nodes.find(n => n.id === mmNodeId);
      if (node && node.graphId) {
        jumpToGraph(node.graphId);
      }
    });
  });

  // Init mindmap
  initTopicMindmap(articleId);
}

function jumpFromKeyword(keyword) {
  if (!currentTopicArticle) return;
  const node = currentTopicArticle.mindmap.nodes.find(n => n.label === keyword);
  if (node) {
    highlightMindmapNode(node.id);
    if (node.graphId) {
      jumpToGraph(node.graphId);
    }
  }
}

function initTopicMindmap(articleId) {
  const article = TOPIC_ARTICLES.find(a => a.id === articleId);
  if (!article) return;

  const container = document.querySelector('.topic-mindmap');
  const svgEl = document.getElementById('mindmap-svg');

  // Clear previous
  d3.select('#mindmap-svg').selectAll('*').remove();
  if (mmSimulation) { mmSimulation.stop(); mmSimulation = null; }

  const w = container.clientWidth;
  const h = container.clientHeight;
  if (w < 10 || h < 10) return; // container not visible yet

  mmSvg = d3.select('#mindmap-svg')
    .attr('width', w)
    .attr('height', h)
    .style('touch-action', 'none');

  mmZoom = d3.zoom().scaleExtent([0.3, 3]).on('zoom', (event) => {
    mmG.attr('transform', event.transform);
  });
  mmSvg.call(mmZoom);
  mmG = mmSvg.append('g');

  // ---- Build tree manually from flat data ----
  const rawNodes = article.mindmap.nodes;
  const rawLinks = article.mindmap.links;
  const nodeMap = {};
  rawNodes.forEach(n => { nodeMap[n.id] = { ...n, children: [], parent: null }; });
  rawLinks.forEach(l => {
    const s = nodeMap[l.source];
    const t = nodeMap[l.target];
    if (s && t) { s.children.push(t); t.parent = s; }
  });

  // Find root node dynamically (node with no incoming links)
  const hasParent = new Set(rawLinks.map(l => l.target));
  const rootId = rawNodes.find(n => !hasParent.has(n.id))?.id;
  const root = rootId ? nodeMap[rootId] : null;
  if (!root) { console.error('No root node found for mindmap'); return; }

  // ---- Compute positions: recursive radial layout ----
  const branchColors = ['#F07B6F', '#FF8C42', '#4ECDC4', '#9B59B6', '#E8A87C', '#85C1E9'];
  root._x = 0; root._y = 0; root._color = '#7C6FF0'; root._depth = 0;

  function layoutChildren(parentNode, startAngle, endAngle, radius, depth) {
    const children = parentNode.children;
    if (!children || children.length === 0) return;
    const n = children.length;
    const angularSpan = endAngle - startAngle;
    children.forEach((child, i) => {
      const angle = n === 1 ? (startAngle + endAngle) / 2 : startAngle + angularSpan * i / (n - 1);
      child._x = radius * Math.cos(angle);
      child._y = radius * Math.sin(angle);
      child._color = depth === 1 ? branchColors[i % branchColors.length] : parentNode._color;
      child._depth = depth;
      // Recursively layout grandchildren with narrower angular spread
      const childSpread = angularSpan / n * 0.75;
      layoutChildren(child, angle - childSpread / 2, angle + childSpread / 2, radius + (depth <= 1 ? 120 : 100), depth + 1);
    });
  }

  // Start: root at center, branches spread full circle
  const branchCount = root.children.length;
  layoutChildren(root, -Math.PI / 2, -Math.PI / 2 + 2 * Math.PI, 110, 1);

  // Collect all positioned nodes
  const allNodes = [];
  function collect(n) { allNodes.push(n); n.children.forEach(collect); }
  collect(root);

  // Collision avoidance: push apart nodes that are too close
  const allNonRoot = allNodes.filter(n => n._depth > 0);
  for (let d = 1; d <= 4; d++) {
    const depthNodes = allNonRoot.filter(n => n._depth === d);
    depthNodes.sort((a, b) => Math.atan2(a._y, a._x) - Math.atan2(b._y, b._x));
    for (let i = 0; i < depthNodes.length; i++) {
      for (let j = i + 1; j < depthNodes.length; j++) {
        const a = depthNodes[i], b = depthNodes[j];
        const dist = Math.sqrt((a._x - b._x) ** 2 + (a._y - b._y) ** 2);
        const minDist = 45;
        if (dist < minDist && dist > 0) {
          const push = (minDist - dist) / 2;
          const dx = (b._x - a._x) / dist * push;
          const dy = (b._y - a._y) / dist * push;
          a._x -= dx; a._y -= dy;
          b._x += dx; b._y += dy;
        }
      }
    }
  }

  mmNodeData = allNodes;

  // ---- Draw curved links ----
  allNodes.forEach(n => {
    if (!n.parent) return;
    mmG.append('path')
      .attr('class', 'mm-link')
      .attr('d', 'M' + n.parent._x + ',' + n.parent._y +
        ' Q' + ((n.parent._x + n._x) / 2) + ',' + ((n.parent._y + n._y) / 2) +
        ' ' + n._x + ',' + n._y)
      .attr('stroke', n._color)
      .attr('stroke-opacity', n._depth === 1 ? 0.5 : 0.35)
      .attr('fill', 'none')
      .attr('stroke-width', n._depth === 1 ? 2.5 : 1.5);
  });

  // ---- Draw nodes ----
  allNodes.forEach(n => {
    const g = mmG.append('g')
      .attr('class', 'mm-node')
      .attr('data-id', n.id)
      .attr('transform', 'translate(' + n._x + ',' + n._y + ')')
      .on('click', function(event) {
        event.stopPropagation();
        if (n.graphId) jumpToGraph(n.graphId);
        else highlightMindmapNode(n.id);
      });

    const r = Math.max(4, 14 - n._depth * 3);
    // Glow for root
    if (n._depth === 0) {
      g.append('circle').attr('r', 24).attr('fill', n._color).attr('opacity', 0.1);
    }
    g.append('circle')
      .attr('r', r)
      .attr('fill', n._color)
      .attr('stroke', n.graphId ? 'rgba(255,255,255,0.6)' : 'transparent')
      .attr('stroke-width', n.graphId ? 2.5 : 0);

    // Text placement based on angle from center
    const angle = Math.atan2(n._y, n._x);
    let anchor = 'middle', dx = 0, dy = 0;
    if (n._depth === 0) {
      dy = -r - 10; anchor = 'middle';
    } else {
      // Place text outward from center
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      if (Math.abs(cos) > 0.3) {
        dx = (cos > 0 ? 1 : -1) * (r + 15);
        anchor = cos > 0 ? 'start' : 'end';
        dy = sin * 6;
      } else {
        dy = (sin > 0 ? 1 : -1) * (r + 14);
        anchor = 'middle';
        dx = 0;
      }
    }

    const fs = Math.max(8, 13 - n._depth * 2) + 'px';
    const fw = n._depth === 0 ? '700' : n._depth === 1 ? '600' : '400';
    g.append('text')
      .attr('text-anchor', anchor)
      .attr('dy', dy)
      .attr('dx', dx)
      .style('font-size', fs)
      .style('font-weight', fw)
      .style('fill', 'var(--ink)')
      .style('font-family', "'Noto Sans CJK SC','WenQuanYi Micro Hei','Microsoft YaHei',sans-serif")
      .style('pointer-events', 'none')
      .text(n.label);
  });

  // Auto fit
  setTimeout(() => fitMindmap(), 150);
}

function fitMindmap() {
  if (!mmG) return;
  const bounds = mmG.node().getBBox();
  if (bounds.width <= 0 || bounds.height <= 0) return;
  const container = document.querySelector('.topic-mindmap');
  const w = container.clientWidth;
  const h = container.clientHeight;
  const padding = 80;
  const scale = Math.min((w - padding) / bounds.width, (h - padding) / bounds.height, 2) * 0.9;
  const tx = w / 2 - (bounds.x + bounds.width / 2) * scale;
  const ty = h / 2 - (bounds.y + bounds.height / 2) * scale;
  mmSvg.transition().duration(600).call(mmZoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function highlightMindmapNode(nodeId) {
  if (!mmG) return;
  mmG.selectAll('.mm-node').classed('highlighted', false);
  const target = mmG.select('.mm-node[data-id="' + nodeId + '"]');
  if (!target.empty()) {
    target.classed('highlighted', true);
    const nodeData = mmNodeData.find(n => n.id === nodeId);
    if (nodeData && nodeData._x !== undefined) {
      const container = document.querySelector('.topic-mindmap');
      const w = container.clientWidth;
      const h = container.clientHeight;
      mmSvg.transition().duration(400).call(
        mmZoom.transform,
        d3.zoomIdentity.translate(w / 2 - nodeData._x, h / 2 - nodeData._y).scale(1.5)
      );
    }
  }
}

function jumpToGraph(graphId) {
  setMode('graph');
  setTimeout(() => {
    const n = nodes.find(n => n.id === graphId);
    if (n) {
      focusNode(graphId, n.type);
    }
  }, 100);
}

类。它们会在了解用户信息需求的基础上帮助用户搜索信息、对信息进行分类等。
5.新式新闻：一方面将信息和娱乐结合起来，如总统候选人在谈话节目、音乐电视中出现，
并接受长时间的内容广泛的采访。这样的目的是希望将政治新闻做得有趣些；另一方面指候
选人直接面对面地接触受众而没有新闻记者在中间干预。
旧式新闻与新式新闻的区别：1）形式：旧式新闻主要在三个电视网晚间新闻播出，在三家
主要的新闻期刊以及普通日报上登载；新式则以电视节目方式出现。2）呈现给候选人不同
问题。3）新式在传送的时效性和报道的主动性上优于旧式。4）就人们从新闻中获取政治竞
选的信息并产生激动的信念而言，旧式比新式与此更加相关。
6.广告的变化：大众媒介广告正在向数据库市场营销方向转变，挨次过程中，广告商通过数
据库中的信息甄别潜在买主，然后施加直接的促销广告。（目标更明确，与传统广告四处撒
网的方式不同）
三、大众传播理论的目标
1.解释大众传播的效果：有意或无意的效果。效果研究的三个阶段：早期认为大众传播对受
众具有强大影响力，如子弹理论，皮下注射器理论；中期新的观点认为，大众传播消息的威
力比人们预料的要小得多，如有限效果模式；更新的研究恢复了大众传播的不分威力，如议
程设置假说、教养理论、适度效果、沉默的螺旋等。Eg传播效果阶级模式(P14：认知、情
感、意愿)
2.解释人们用大众传播来做什么：即大众传播的受众分析，这个思路承认受众扮演着更为
能动的角色。一个因素是认知信息和信息处理方法，另一个因素是传播技术的转变，转向较
不集中的、用户选择权更大的、传播内容更加多样的和个人使用者更能动地介入传播内容的
技术。
3.解释用大众传播学习的机制：如社会学习思想
4.解释大众媒介在形成人们价值观和观点方面所起的作用。
四、大众传播理论发生的变化
1.比以往更强调对大众传播媒介的使用。随着向更新型传播媒介的转化，受众行为的重要作
用将变得清晰。
2.向认知科学或信息处理思路的转变：
a.自变量由说服变量（如消息来源可信度）向表述概念（所用语言的本质）和结构概念（在
媒介中事件是怎样包装和表现的）转变。
b.因变量由态度（对一个对象或反对或支持的评价）向认知（关于一个对象的知识或信念）
转变。
c.对船舶结果的强调重点由改变（比如态度和行为改变）转向重构（包括我们建构关于事件
的图解或模型，或者对真实的社会建构）。
3.传播技术的改变要求研究者以超越特定媒介或技术细节的方式将传播理论公式化。
4.由强调传播的效果向考虑传播的社会影响转变。
五、媒介环境变化引起的理论性问题。【05年论述15分：试述当今的媒介环境发生了哪些
变化。提出了哪些理论课题？】
（1）新的传播媒介是怎样改变知识本性的？知识从存在于图书馆书架上和书本中变成
存在于电子空间中互相链接的一条条信息。这种超文本信息是一种可能产生重要后果的方
式，它改变了知识的基本结构。
（2）新的传播媒介是怎样改变人类思维本性的？网络传播有着微妙但却重要的效果：
新的媒介改变着我们，将我们带入一个高智能的社会。由于我们可以采用直接的、合作的方
式将我们的思想成果与其他人共享，这样，网络的人的智能生产率就将成倍增长，因为它是
与联网的其他人的智能生产率朴素增殖的。
（3）当我们离开报纸、杂志等独家印刷媒介时，我们可能正在失去印刷物，那么印刷
物的用处（或目的）是什么？我们用口语进行表达的能力会不会受到损害。
（4）网上报纸应该采用哪种形式？尽管一些作家认为，网上报纸并不是报纸转变的真
正方向，但它似乎是一个自然的不可避免的进程。
第二篇 大众传播的科学方法与模式
第二章 科学的方法
1、科学方法之前，建构真理的方法：
固守：认为总是持有的信念便是正确的。家庭、社会、和同伴的强化及经常的重复支持
了我们的固有信念。
权威：当我们对我们的信仰认同不再一致时，我们常常转向权威，求助于他们的支持。
我们认为他们比我们自己甚至其他所有人都要“有能力”而且“可信”。
直觉：无论我们求助的思想来源多么的权威，但它们个人意见往往是不一致的。于是，
我们转而依靠我们的直觉。直觉是建立在个人的价值观、早期的社会影响或“常识”的基础
之上的。
如果我们使用的研究方法不存偏见，如果我们采用的措施是可信而且有效的，如果我们
的发现是能够验证的，我们就比相信自己的直觉、依赖于权威的判断或凭借着固守的信念更
可能接近“真实”。
2、科学的累积性：
即科学的建立在前人所有工作的基础之上的。其本质是可传达性，即具有克服地理、语
言障碍和社会、经济、政治体制差异的能力。这部分是因为科学是将现实抽象化了的。任何
一种学科的特定语汇都是由这些抽象词语组成的。
为使累积现象发生，学者们必须共享研究的方法或方向，至少是拥有共同的学术价值观。
即“独立、客观、非情绪化及非伦理束缚的”。科学只解决“是什么”，而不关注价值观。
3、对真实的科学概括：科学家通过对有关真实的概括（假说）进行反复的检验，直到获得
足够的证据，可以把这些假说称为暂时性定律。对科学概括的检验是通过有控制的观察来完
成的。科学研究的可重复性和可证实性是监督欺骗和偏见的卫士
4、科学探索的过程：
归纳法：用观察到的特殊或特定例子得出一般性结论或通则的方法，也称经验论。
演绎法：开始于抽象的原理，并将其应用于特殊的例子，也称逻辑法或唯理论。
理论与模式：理论：为对经验性测试进行新观察而提出一套有序相关的概括系统。模式：
对真实世界理论化、简约化的一种表达方式。切记：模式不是一种用于概括和解释的工具。
两者区别：模式的作用是比较有限的，它通常试图指出在过程或现象中最紧要的部分。
建立理论一般是用来解释传播现象的，而建立模式不过用来描述传播现象。
5、经验资料的取得（重点）
（1）调查研究法：是对一部分人或特定“人口”样本的研究。根据统计学原理，从样
本中得出的概括可以推广到全体人口，并且具有一定程度的确定性和可信性。包括抽样调查
法和普查法。
抽样调查法比对所有人口进行的普查花费少，而且可以对任何所给样本进行统计计算，
但只能对一定程度和范围之内的可能发生性（叫做“置信区间”）做出概括。普查法可以根
据世纪人口参数作出判断。
对样本的调查法还通过相关统计对变量之间的相互关系进行比较。通常研究者不能在实
验中操纵自己感兴趣的变量。抽样调查法要考虑某一特征不同的人和他们不同的特定行为并
进行比较。
（2）内容分析法【03年名解】：是分析信息内容的一种系统方法，是对特定传播者的
信息进行分析的一种工具。是调查者对他们自己选择的某时某地的传播产品的信息内容进行
“客观化、系统化和数量化的描述”。
具体操作：在选出想要调查的问题或想要检验的假说后，做内容分析者必须确定想要嗲
差的对象主体。如果对象主体很大，就要像抽样调查一样进行取样。接下来必须确定分析信
息内容的范畴，并且根据客观的规则对样本的内容进行编码。经过编码的内容必须以某种方
法分裂等级加以区别，从而得出不同的分数。这些分数必须加以分析，并根据那些经过检验
的概念或理论解释得到的结果。
【（05年简答，10分）调研法和内分法的异同：】
同：一是都是客观的科学的经验资料取得的方法。二是都是通过对一定样本的研究、概
括得出一定结论再推广到全体的方法。三是都是主要采取的定量分析的方法，具有准确性。
异：对象不同：调法的对象是“人”，在传播学里主要是指报纸的读者、电视观众、杂
志订阅者等；而内法的对象是以传播者所传播的信息内容为研究对象。
方法不同：调法主要是通过对象对先前制定好的调查问卷的回答进行分析研究。而内法
主要是通过对选定的信息内容进行定量和定性的分析。
（3）实验设计（未考过，重视）：是处理因果关系问题的传统方法。实验包含了实验
者对变量的控制或操纵，以及用公正和系统的方法观察或测量的结果。经典的实验将回答一
种变量（自变量）是否或在什么程度上影响另处一个变量（因变量）的问题。
经典实验研究采用的最简单的形式，是从群体中随机抽出两个配对的组，其中一个组施
于实验变量，即为实验组，另一组就是不施任何实验变量的控制组。当实验组接受了需要测
试的变量后，再对两组进行观察和测量，他们之间发生的区别便可以认为是由实验处理所造
成的效果。
实验法的优点：允许实验者进行控制，并提供内在的严格逻辑。缺点：由于实验是人为
的，或设计的场景过于简化，有时与“真实”世界不符。以及其他一些综合因素，从实验设
计和从调查研究中得出的结论往往互相矛盾。因此在传播研究中，这两种方法都需要。
（4）个案研究法：对一个单一个体，如某个传播者、报纸、电视台等的很多特性。通
常设法了解有关特定个案一段时间内研究者感兴趣的“所有”事情。而抽样调查法是研究很
多受试者或单位的一种或几种特性。
个案研究通常无法概括出使用于其他类似情境的规律。由于大部分结果是根据单一例子
得出的，而且很少作出系统化的假说并进行检验。但是这种研究方法的确提供了很多观察、
很多见解，能用其他方法继续进行调查并得出概括性的结果。
6、对资料的推论
（1）统计：是用来对收集到的数据资料进行推论的一种工具。
抽样调查法或概率统计能让科学家推测总体的特征。统计的这种用法可以在一定可信性
水平上从数据中得出推论。使用试验法的调查者将受试者随机分成不同的组，随机法能确保
在分配受试者的过程中没有系统性偏差。当实验的一组或很多组接触到了所要调查的变量
后，就可对变量的效果进行观察和测量。所得的数据要用统计的方法来分析，以确定各组在
所实验变量影响方面的差异是否是偶然的，其可靠性的程度有多高。
【（04年简答15分）在对科学发现及从中得出的概括进行评价时，会涉及到研究的有
效性和可靠性问题（塞书原话），请解释一下“有效性”和“可靠性”的含义，并举例说明。】
（2）外在的有效性和内在的有效性
外在的有效性：是关于调查者所观察和测量的现象是否能代表这位科学家想要概括的真
实世界现象的问题。
内在有效性：是那些局外的或替代的变量，在研究设计中它们必须得到控制，以排除它
们成为造成任何可观察到的效果的原因。即：除了进行实验的变量或自变量以外，实验者希
望排除任何可以解释所得结果或成果的因素。
（3）可靠性：是测量一致性的问题。
外在的可靠性：是指在可接受的误差范围内，如果用于相同条件下的现象，每次测量都
提供相同的结果的能力。
内在可靠性：指一次测试的不同部分能否提出可资比较的数据的问题。
举例说明：
外在有效性：海特的《恋爱中的女人》，她寄出10万份大多针对妇女群体的问卷，回
收的4500份问卷，根据这4500份的回答写成此书。批评者说，抽样样本大多来自妇女群体，
具有同质性特点，而4。5%的回收率也嫌低，因而不是有效的抽样样本。
（4）假说的可操作性定义（未考过，重视）
把抽象的假说转换成确认真实世界现象的做法，就被称和假说的“操作性定义”。
例如：“较之那些与其生活的社区有紧密社会联系的人，一个孤立于社会的人使用大众
传播媒介的能力要差”对这个假说需要可测量的方式来定义。调查者对“社会孤立”和“社
会联系紧密”的定义可以通过用其被邻居、亲戚、同事和其他人访问的频度来表示，而“媒
介使用”的定义则用其人报告的大众传媒的时间来表示。然后，可以对那些报告很少与他人
有社会交往的人和那些与他人有相当多社会交往的人加以比较，并对两组受试者中花费在各
种媒介上的时间的报告加以分析。这时，有效性的问题就变成：对社会交往的测量是否确实
测量了研究中所定义的社会联系。
第三章 模式的功能
一、 模式的功能与评估
1、模式的四种功能：
组织：能对资料进行排序和联系，以显示事先没有看出来的资料之间的相似性和关系。
启发：模式可以成为引出新的未知事实和方法的手段。
预测：如果一个新模式解释了人们尚未了解的事物，那便几乎可以表示，它可以做出预测。
如果它具有可操作性，那就表示，一个模式可以通过实际的检测对预测加以证实。
测量：一个模式在一定精确度上容许我们对有关“何时或多少”的问题作完全量化的预测。
如果模式和被模式化的事物之间的联系过程是明白易懂的，则所得的资料在模式的帮助下便
可形成测量。
2、评估：模式的普遍性如何？——>它组织的材料有多少，有效性有多大？；模式的启发性
如何？——>它对发现新了联系、新的事实或新的方法有多大的帮助；由它得出的预测对研
究领域的重要性如何？在一个领域发展的阶段，这些预测掌握全局的作用如何？由模式发展
出来的测量的准确性如何？
二、传播模式（注：模式虽然概念不多，但要掌握每个模式的图及阐释）
1、拉斯韦尔模式：p46
谁提出了对信息的控制问题；说了什么是内容分析研究的主题；通过什么渠道是对媒介
作分析研究；对谁说的是对接收者和受众的分析研究；最后可视为效果研究。
优点：集中注意了传播中的基本方面。
批评：似乎暗示着存在一个传播者和一则有目的的信息存在；过于简单。
2、香农—韦弗模式：（注意此模式的图）p47
消息：由口头语、文字、音乐、图像等组成。
发射器：将信息转变为信号以适合传播渠道使用。
渠道：将信号从发射器传送到接收器的传送中介。
接收器：将信号重新恢复成消息。
信宿：消息想要传达到的人和或物，即接收者。
熵【综合03名解】：指一种情境的不确定性或无组织性。在信息理论中，它与一个人
在组成信息时选择自由度的大小有关。
冗余：不是熵或不成为信息的那部分消息我们就叫它冗余。冗余的定义是由使用权用符
号的控制规则所决定的、而不是由发送者自由选择的那部分消息。关键或重要的消息在传播
过程中的重复也是冗余的一种形式。
噪音：不是信源有意传送而附加在信号上的任何东西。噪音增加了不确定性，同时也增
加了信息。
传播渠道中噪音越多，就越需要冗余，这样就降低了信息中相对的“熵”值（例如，在
嘈杂的渠道传送无线电消息时，需要重复关键部分，以确保信息的接受）通过冗余来克服传
播渠道中的噪音，在特定时间内可传送的消息量就会减少。为达到有效的传播，熵和冗余之
间就应该保持平衡，以抵消传播渠道中的噪音。
渠道容量【05年简答题10分请举例说明渠道容量的含义】：不是指一个渠道能传送的
符号的数量，而是指渠道所能传达的信息的能力，或者说，渠道传送信源产生的信息数量。
所有渠道容量均有上限。例如在一定时间内人类眼睛所能分辩并传送的信息大大多于大脑能
处理及储存的信息。所有传播都是由其系统链组成的，它们的强度不会超过链中最弱的环节。
渠道容量还受制于新闻编辑或播音员可使用的空间和时间，以及接受新闻者用于媒介上的时
间。
反馈（feedback）：在大众媒介中，从信宿到信源的有很多反馈模式，可以帮助传播者
对后续的传播进行纠正。例如读者或听众的来信和电话是一种反馈形式。
香农的信息理论：对模型的阐释及实例
其本质是一种信号转发理论。这个传播过程开始于信源，它从所有可能的消息中选择一
个消息，这个消息可能由多种表现方式。发射器处理消息，将其变成适于在传播渠道传送的
信号。因此，消息只存在于信源与发射器之间、接收器与信宿之间。在发射器与接收器之间
传送的只有信号。发射器的功能是将消息编码，并且当它被接收时，接收器必须将该消息解
码，也就是将传来的信号变回消息并将其传至信宿。
这个模型最独特的贡献就是构成信息内容的途径。在信息理论中，信息成为我们在选择
信息中自由度的测量，与物理科学中的熵很相似。不是熵或不是信息的那部分消息被称之为
冗余，冗余是不必要的，因为即使它被遗漏，消息仍然是基本完整或者可以补充完整的。冗
余可以用来抵消传播渠道中的噪音，这些噪音可以有很多种形式，既可以是传播渠道内的，
如收音机中的静电干扰；又可以来自渠道外竞争性的刺激，如电影院中的窃窃私语等。噪音
增加了信息传播的不确定性，通常大众传播者希望在自身的消息传达过程中把噪音减到最
低，并预料接收消息时会有噪音出现。而信宿为了得到有用的信息，必须从接受到的信息中
删去假的消息（噪音）
实例：口语表达中，信源是大脑，发射器是人类的发音器官或声音系统，传播渠道是空
气，而信号则是从一个人的发生系统传达到另一个人耳朵的不同声压。信号传递过程中可能
会有噪音的干扰，比如来自第三者的声音。接收器即另一个人的耳朵接到通过空气传送的不
同声波，转为神经冲动，达到信宿，即大脑。
信息理论的直接成果：80年代变得常见的数字通讯技术，例如录制数字化音频信号的
激光唱盘和磁带。
3、奥斯古德模式：Osgood批评了香农的机械传播模式，他自己的模式是从他的意义理论和
一般心理语言过程中发展出来的。他提供了在一个个体内同时具有发射和接受功能的模式，
并且将符号的“意义”列入考虑范围。一个个体兼具信源和信宿的功能，同时作为发射者与
接收者，通过许多反馈机制对他或她的自己编码的消息进行解码。他重新调整了香农的模式，
把它变成他所称的一个既能发射消息又能接收消息的传播单位。
与香农模式的比较：对符号“意义”的考虑；反馈机制；人类传播的特点vs.机械传播
4、施拉姆三模式【03名解】：p56 香农+奥斯古德。阐释：第一个模式与香农的极为相似；
第二个模式的观念是，只有在信源与信宿经验范围内的共同领域，才是实际上传播的部分，
因为只有在那部分，信号才是信源与信宿共同拥有的；第三个模式将传播视为两个部分编码、
解释、解码、传送和接收信号的互动。在这里我们看到了反馈和共享信息的连续“循环”。
5、纽科姆的对称模式p58：该模式是关系人类之间的互动的社会心理学的方法。在该模式
中，一个人A传达信息X给另一个人B。假设A对B和对X的倾向（态度）是相互独立的，
这三者就构成了一个包含四个取向的系统：A对B，A对X，B对A,B对X。其中人与人之间
的倾向是正面或反面的吸引，人对信息的倾向是喜欢和不喜欢的态度。由该模式引申的主张
如下：当A与B对X的倾向越强，A倾向于与B就X对称的努力就越强；由于一方面或多方
面的传播行为，这种对称增加的可能性就越大。第二，A与B之间的吸引力越小，则他们倾
向对称的张力就越局限于对特定X的协同倾向，这是建立联系所必须的。
意义：任何一个特定系统都有力量平衡的特征，系统中任何部分的任何改变都会导致倾向平
衡或对称的压力，因为不平衡不对称就会造成心里上的不舒服并产生内在的压力以恢复平
衡。例如，人们所持态度需要社会和心理支持。当人们表示“同意存在不同看法时”就是不
对称。

第三篇 大众传播中的理解与语言争议
第四章 传播中理解的作用
理解：解释可感觉资料的过程。人们通过五种感官获得感觉资料，影响人们理解的两种方式：
结构式和功能式方式。前者来自人们接触的物理刺激；后者来自心理因素，这导致理解出现
了某种主观性。
选择性理解：人们的理解容易受愿望、需要、态度及其他心理因素的影响。它意味着不同的
人对相同的消息可以产生非常不同的反应，消息的意义取决于接收者对它的解释。经由感觉
获得刺激，然后处理得到的信息，即加以解释的过程被称为解码（decode）。因此，理解是
一种复杂的过程，并非与“外部的真实”具有相当一致的对应关系。
一、影响理解的心理因素
假定:理解的交易观点，即在理解的活动中，观察者与世界两者均为积极的参与者。理解经
常根据假定而来，而假定又是根据先前的经验而来。例如，单眼的扭曲房间。
文化期待、动机、情绪及态度。
二、理解与大众传播
大众传播媒介的消息通常被误解。例如反对成见的讽刺影片通常并不是减少成见的有效办
法。它们通常容易被成见低的人所理解，也很可能被成见高的人所误解，这是因为人们对这
类影片或节目的看法通常与他本身的态度一致。他们在节目中看到的都是强化既存态度的东
西。
三、选择过程
1、选择性接触：个人倾向于使自己接触那些与原有态度一致的大众传播，避免与己意不合
的传播现象。（联系费斯廷格的认知不和谐理论 第八章）
2、选择性注意：个人倾向于注意消息中那些与其现在态度、信仰或行为非常一致的部分，
而避免消息中那些违背现有态度、信仰或行为的问题。
3.选择性理解：见本章开头
4、选择性记忆：受愿望、需要、态度及其他心理因素的影响而回忆信息的倾向。人们对维
护现有态度和立场的信息都特别容易记得。
小结：选择的过程可视为四道围墙的防御，最外层的防御是选择性接触，接下来的是选择性
注意，然后是选择性理解，最里层是选择性记忆。
四、信息处理模式
1、概略理论：概略是一种认知的结构，它由组织好的从以往经验中抽象出的对情境及个人
的知识所组成。概略被用来处理新的信息，并追溯已有的信息。人类对处理复杂信息的有限
能力迫使他们形成简单化思维模式，比如在处理来自报纸或广播的新闻时，人们倾向于从证
据中得出结论，并将结论储存起来，而不是将证据本身储存起来。总之，人们通过很多不匹
配策略企图将一则新闻中的信息纳入某种现有的概略中。如果配合的策略可以找到，信息的
某些部分或者来自信息的推论便很可能以一种修改后的概略形式储存起来，如果配合的策略
不能找到，则该信息便很可能一闪而过，无法被吸收。
2.潜意识的理解：基于佛洛依德的理论，认为人们可能受他们自己未能意识到的刺激的影响。
然而，潜意识理解被认为发生于未能感知的意识区域，问题在于在潜意识和清醒意识之间并
没有一个明确的界限。很多研究已经显示人们能对潜意识条件下的刺激有所反应。
结论：潜意识理解的效果并不显著，难于应用于大众传播的环境，更适合应用于清醒的意识
技巧中。
3.对图像的理解：视觉语汇理论：对大众传播媒介图像的三种思考方式：作为对真实的透
明表现、作为情感或情绪的引发因素和作为组成修辞论辩集合符号的复杂系统。在大众传播
中，不同种类的图像可以在不同等级上采用这三方面不同的思路。例如，广告中图片的修辞
理论度通常很高，相比之下新闻图片的直观反应真实度通常很高。有时这两种图像可能更多
采用情感诉求的思路。
第五章 编码问题
一、 语言的特性：
1、语言是静态的，而真实是动态的：人类周围的世界充满了变化，因此真实是一种过程，
然而对这种过程的描绘我们只能使用固定的字眼和静态的语言。社会的改变比文字的改变快
得多，人们挂在口头的说话模式在某种程度上已经落伍，不能反映生活的这个世界。
2、语言是有限的，而真实是无限的：由于人类的知识和语言的局限性特点，语义学家认为
人们永远不能说的面面俱到。他们建议在任何叙述句子后放一个等字，以提醒自己对任何事
还能说出更多。
3、语言是抽象的：抽象是选择某些细节和舍弃其他细节的过程，抽象是语言最有用的特征
之一，它帮助我们进行概括，然而也带来问题。抽象词并不提出西安市中存在的某种东
西清楚的样子，而在人们心目中，对此却可以有很多不同理解。
4、语言中的假定：任何一种语言的结构和词汇都含有很多对真实现象的假定，比如性别歧
视。因此我们使用的语言不仅是说出的话语，还代表脑中的观念——大众传播者需要注
意的关键所在。
二、语言的误用：
1、固定层次抽象法：把语言的抽象固定在一个抽象阶梯上，分为两种情况：固定在高抽象
层次上，如政治修辞，它们缺乏低抽象层次的解释以确定其具体含义；固定在低抽象层次上，
如描述生活细节，它们通常不会产生概括的结论，很难看出消息的要点。有效的传播应该包
括所有各种层次上的抽象。例如，结论高度抽象抓住要点，举例低度抽象含义明确。
2、指认不当：无法分清同一范畴或类型中事物之间的区别，把同一类型中的不同成员视为
完全相同的个体。也称类别思维或过度概括
3、刻板偏见：由于语言的分类特征，加上人们又分不清个体间的差异，形成了这种刻板偏
见，例如一些次级群体被插上了懒惰等标签，嘲笑波兰人时忽略他们当中对人类文明做出巨
大贡献的伟人等。措施：使用索引数字来防止指认不当，时刻向导同一类事物虽然有共性，
但用许多其他方面的标准衡量它们又是迥然不同的。
4、二元价值观判断：非此即彼的思维方式，排斥了中间层次的极端想法。因为语言在描述
一种情况时通常只有两个相反的词可用，因此加强了这种趋势。措施，在每一句判断的末尾
都加上在我看来这几个字，或者时刻想到这几个字，以防止无意识投射。
三、三种陈述方式
1、报道：是一种可以证实的说法，排除推论和判断。
2、推论：是在已知的基础上陈述未知情况的说法。对别人看法和情感的任何结论都是一种
推断；任何有关未来的说法都是一种推论，因为未来是未知的。
2、判断：是对一次事件、一个人或一件物或赞同或不赞同的表达。
4、偏向：是选择对所描绘的事物有利或不利细节的方法。
小结：新闻记者（或其他传播者）可以尽量坚持客观报道，排除推论与判断，有意识地避免
偏向，而尽可能达到客观。
四、编码的含义
编码：将目的、意愿或意义转化为符号的过程。而语言特性则会造成编码困难。克服主观性
的最佳方法是坚持采用可证实的陈述，即报道的消息。
第六章 宣传分析：解码及效果的最初理论
一、宣传的定义
拉斯韦尔的定义：就广义而言，宣传是通过操纵表述以期影响人类行为的技巧。这些表
述可以采用语言、文字、图画或音乐的形式进行。
心理学家罗杰布朗的定义：说服与宣传的区别：断定一种说服行为是不是宣传并没有绝
对的衡量标准，那是某人判断的结果。就所使用技巧而言，两者如出一辙。只有当行为对信
源而不是对接收者有益时，这种行为或消息才被成为宣传。
根据这两个定义，宣传可以包括大多数广告行为，大多数政治运动，大多数的公共关系。
二、七种宣传策略：（注意：将宣传策略像研究方法一样考两者的异同。）
1、辱骂法：给某思想赋予一个不好的标签，使我们不检查证据就拒绝和谴责这种思想。 这
种策略不常用在广告中，普遍用于政治和其他领域的公开演讲中。例如，恐怖分子和恐怖主
义。对于某些人而言的恐怖分子可能对另一个人而言是自由战士，普通语义学指出，我们依
据自己的目的、主观印象和我们的评价来称谓别人，当我们更换标签时，这个人其实并无改
变。
2、光辉泛化法：（晕轮效应、光环效应）：将某事物与好字眼联系在一起，借好事物的光，
使我们不经证实就接受或赞同另一个事物。例如，产品名称与促销（有时广告中的光辉泛化
法有某种成都的欺骗性，以至引起法律纠纷）
3、转移法：将某种权威、约束力，某一令人尊敬和崇拜的事物的威信转移到其他事物上，
使后者受益。传播者的目标是将一种观念、产品或某项事业与人们赞赏的东西联系起来，通
常可以使用象征性的事物来进行转移，例如，万宝路香烟的广告中将粗犷而有男子气概的牛
仔和产品联系在一起。
4、证词法：要某些令人尊敬或使人讨厌的人说出特定的观念、节目或产品，或说人的好话
或坏话，这种策略在广告和政治宣传中广为应用。例如请明星代言广告产品，但实际上明星
可能根本不了解该产品，证词法的真实性有待考量。
效果：高可信度来源比低可信度来源更能改变态度，但是效果也有限。
5、平民百姓法：某讲话者企图让受众想念他或她的想法是好的，因为这些想法是“人民的”
想法。是“普通老百姓”的想法。例如克林顿在竞选时曾经努力塑造自己“只是普通人”的
形象。
6、洗牌作弊法：【04年名解8分】选择采用陈述的方法，通过事实或诺言，清晰的或糊涂
的，合法的或不合法的叙述，对一个观念、计划、人或产品做尽可能好或尽可能坏的说明。
洗牌作弊法与普通语义学的偏向技巧基本上相同。它选择支持某种立场的论点和论据，而忽
视不支持这种立场的论点和论据。例如引用电影评论的电影广告，它们所引用的都是对电影
有利的好听话，而评论家说过的负面评价则不会被选用。
效果：单方面消息基本采用该方法，只有争议中一方的意见被表达出来，在两方面消息中，
也可能简单提及反面意见。单方面消息对起初就倾向于赞同这种观点或教育程度低的人很有
效，双方面消息对起初就倾向于反对这种观点或教育程度高的人非常有效。
7、乐队花车法：表示每个人——至少我们所有的人都正在做它。宣传者用这种方法企图说
服属于团体中的我们所有成员接受他的计划，因此我们必须跟随大家“跳上乐队花车”。例
如百事可乐广告中的标语“百事可乐的时代”，暗示这一代人都在喝这种饮料。
效果：在群体压力下，多数人会选择顺从主流意见，但仍有人坚持己见。
第七章 易读性测量
易读性测量：对大众传播的定义要求它尽可能地接触最大数量的受众，所以它就必须尽可能
地采用人们容易理解的书写方式或表达方式。对文字容易理解还是难以理解的测量及其因素
分析的研究就是易读性测量。易读性：由写作方式导致的了解或理解的难易程度。
意义：它可能告诉我们一种方法，用以测量文字资料的易读性；寻找一个测量公式，能够提
供关于写作形式影响理解难易度的最重要的信息。
易读性公式：估量一位读者在阅读和理解一段文字时能否成功的一种测量方法。易读性公式
向人们提供了一些使得写作易于或难以理解的因素，最重要的两个是词汇量的大小和句子的
复杂性。
补漏程序测验法：易读性公式的弱点在于它肯能使得基本的假设之间可能相互矛盾。因为大
部分的公式假设，短词比长词容易理解，但实际情况并非如此。如果一个文字样本中有很多
像这样违背公式假设的例子，则由公式测得的分数将会误导易读性的测量结果。
由传播学者泰勒开发的另一种方式可以测量所有影响易读性的潜在因素，这种方法就是补漏
程序测验法，原理是人们有补充熟悉但尚未完成模型使其完整（即完形填空）的倾向。具体
方法是将文章删去一些词以空白代替，然后将文章交给测试小组，请受试者在空白中填入漏
掉的字，填空分数视填对的数目或比率而定。研究证明，一旦文章中的写法违背了易读性公
式中的假设，补漏程序对其阅读难度的认定便比易读性公式更符合实际。
第四篇 社会心理学的研究
第八章 认知一致与大众传播
一致概念的假设是，不一致产生于人类“心里的紧张”或不舒服感，而这种紧张和不舒服的
感觉可能导致人的内心压力，推动自己去排除和降低这种不一致的状况，如果可能的话，则
达到一致。
大众传播研究部分地关注个人是如何处理矛盾或不一致信息的，在提供这些信息时，传播者
通常表现出想要改变接收者态度的动机。态度改变是能使我们减轻或消灭不一致所带来的不
舒服感或心理压力的诸多方式之一。
四个主要理论：
海德的平衡理论p157
心理学家海德最早提出了一致理论。他关心个人在自己的认知结构中对彼此相关的人和事形
成态度时采用的方式。他假定，不平衡的状态产生紧张，并产生恢复平衡的力量。他说：“平
衡状态的概念是这样的：在这种状态中被感知的个体与所感觉的情绪无压力地共存。”
传播者对该研究感兴趣的原因，是因为它包含着一个态度改变和抗拒态度改变的模式。由于
不稳定，不平衡转台便容易向平衡状态改变。由于稳定，平衡状态便抵制改变。
纽科姆的对称理论（联系第三章对称模型）
纽科姆采用了海德关于平衡概念出于一个人头脑的假设，并将其应用于两人之间的传播行
为。他主张人们企图影响别人，借以维持这种对称。纽科姆的理论较倾向于人际间的吸引，
而不是态度的改变。对于双方均属重要的一个对象，如果我们不能经过传播达成对称关系，
则我们可能要么改变对对方的态度，要么改变对客体的态度。
具体阐释见p157
纽科姆不同与海德指出，是他强调传播。在对X的看法上A与B之间的对称越不足，则A
就X向B进行沟通的可能性就越大。
对称理论的预测：人们倾向于和自己看法一致的人交往或成为朋友；若使态度发生改变，人
们必须接触那些与他们现有态度不同的信息。A越是被B所吸引，A的意见月可能向B所持
的立场转变。
奥斯古德的调和理论p159
针对人们对信息来源及信息来源所主张的事物的态度。
不调和与传播媒介：不调和并不总是造成态度改变。选择性接触/选择性注意→选择性理解
→攻击传播者的可信性→选择性记忆
费斯廷格的认知不和谐理论【06年简答，08年名词】：单独考虑知识的两个要素，如果一
个要素的对应部分总是追随另一个部分出现的话，这两个要素便处于不和谐中。不和谐“由
于产生心理上的不舒服，会促使人试图减轻这种不和谐感，以达到和谐，并且除了试着去减
轻不和谐，人还将积极地避免接触会增加心理不和谐的情境及信息。
不和谐理论产生的后果：
做决定：只要被拒绝的选择包含了可能导致接受的特征，或被挑中的选择包含了可能导致拒
绝的特征，就会产生不和谐心理。越难做出的决定，越可能在决定后产生不和谐
被迫地顺从：当人被置于一种情境，在其中他必须采取公开的方式反对自己私下所持有的信
仰或态度时，便会产生不和谐。解决这种不和谐的方法，是改变自己私下的信仰与公开的行
为一致。
选择性接触、选择性注意：对制造不和谐信息的躲避。
例外情况：如果消息所包含的好处超出了它可能带来的不和谐感，人们就可能不回避这些消
息；如果个人的信仰、行为和选择不那么强烈的话，那么对有违于这些信仰、行为和选择的
材料更可能予以注意；对自己信念观点很有信心的人也不会回避与己矛盾的材料，因为他们
相信可以轻而易举否定它。
娱乐的选择：对娱乐的选择是冲动型的，在于一时高兴或自动做出，而不是深思熟虑的选择
性接触。人们似乎是根据自己的情绪，自觉地去选择那些能帮助他们从不满意的刺激状况中
有效地逃脱出来的节目。
选择性记忆：降低对过去所作决定的事后不和谐感。
第九章 说服理论
【03简答：什么是说服效果研究？代表学者和观点？】
一、 说服和态度的概念
（附：第6章中说服与宣传的区别：宣与说所使用的技巧同出一辙，但当行为对信源而
不是接受者有利时的行为或消息被称为宣传。）
说服：通过接受他人的信息产生的态度的改变。在民主社会里，说服可能成为生活的一部分，
因为在民主社会里，最可靠的控制手段可能便是对人们他态度的影响。
态度： 一种“既定的”或倾向或反对特定事物的方式。
二、学习理论/强化理论的态度研究（霍夫兰为其鼻祖）
学习理论（强化理论）：以霍夫兰为代表的，对态度改变研究的取向。认为态度是由学习得
来的，并且态度改变是在学习过程中同样进行的过程。
二战期间，美军开始大规模使用电影或其他大众传播模式进行宣传，用于训练美国战士
和鼓舞他们的士气。霍夫兰的陆军研究的基本形式：一是对现有电影的评估（更多地被采取）；
二是实验研究，即采用不同方法拍摄或制作的两个版本的同一部影片或消息进行比较。
研究结果表明，这些影片在达到其终极的鼓舞军心的目标方面是失败的。逐渐增加的证
据指出，单一的大众传播消息并不能强烈地改变已有的态度。
1、单方面消息（洗牌作弊法）和正反两面消息
霍夫兰及其同事又转向第二种形式的研究：同样的消息以两种不同的方式来制作，其不
同点仅在一个变量上，即给予单方面的消息或正反两方面消息。
（1）接收两种表达方式的人的意见都发生了明显的变化，但没有显示哪一种更有效。进一
步研究发现，单方面消息对最初赞同者更有效，对教育程度低者更有效。双方面消息对对最
初反对者更有效，对教育程度高者更有效。
结论：最有效的消息表现形式是根据受众特点而定的，这一结果说明了态度改变的复杂性—
—消息中的变量有时与其他变量相互作用，例如受众的个人特征。
（3）抵制反宣传：（拉姆斯丹&贾尼）两方面消息较之单方面消息的优点是：它对后来的说
服工作可以建立起更有效的抵抗力。拉姆斯丹&贾尼谈到，接受正反两方面信息的人成为经
过“预防接种”的人，这是尔&帕帕乔吉斯后来发展其“预防接种理论”的根据。
（4）预防接种理论（麦奎尔&帕帕乔吉斯）
滋养：原指医学上通过良好的饮食、运动锻炼、休息等等获得抵抗力。用在传理中，事
前滋养指事先对一个人基本信念给予支持的观点。
预防接种：即有计划地接触处于微弱状态下的细菌环境，从而刺激个体抵抗力的发展。
事前接种指事先将人暴露于微弱的、能刺激抵抗力形成的攻击其基本信念的反面环境中。
几个预测：作为支持信念的途径，事先滋养不如实现接种免疫效果好；在接受免疫信息
期间主动地参与不如被动地参与对后来的说服产生免疫的效果明显（因为受试者不习惯于积
极参与保卫基本信念的活动）；当人们接受对其基本信仰的攻击和对这些攻击的反驳后，可
以发展一种普遍化的疫力，使其基本信念即使遭到不同方式的攻击也不可能改变。因为1）
有了第一次攻击被反驳的经验，便会降低后来攻击的可信度2）事先将攻击暴露出来，可是
使人们知道他们所持的信念的确有弱点，从而推动他们去发展更多的支持观点。
2、信息来源可信度【04年简答15分：“消息来源可信度”与“人们对该消息的相关意见
的同意程度”之间具有怎样的关系；05年简答10分：你如何理解“信息来源可信度”与态
度改变之间的关系？】
（1）选择有效信息来源说出观点或推销产品的做法，其实就是采用证词法表示高可信度的
重要技巧。
（2）可信度来源：霍夫兰的试验证明：高可信度来源的确导致意见的更多变化。
（3）睡眠者效果：在霍夫兰等人的实验中，受试者在4周之后重新测验时，从高可信度来
源与低可信度来源得到的消息对意见的改变程度几乎相等。低可信度来源消息导致的意见改
变较4周前更加显著。这是由于经过一段时间之后，消息来源与观点具有分离倾向导致的，
被称为睡眠者效果。
（4）怀特海德认为除值得信赖之外，专业性或能力、活力和客观性也是来源可信度的重要
组成因素。
（4）其他结论：高可信度来源与其它一些消息相结合会影响其有效性，例如：支持过多的
东西会降低高可信度来源的有效性；同一信源对不同的受众成员是具有不同效果的。
3、诉诸恐惧（贾斯尼&费什巴赫）
诉诸恐惧对态度改变产生效果的根据仍是学习理论。学习理论预测，引起的恐惧感如果
很强，就会增加改变态度的效果，因为它会产生激励作用，引起更多的注意与理解，接受传
播建议的动机因而也将增加。另一方面，高度的情绪紧张可能会导致自发的抗拒反映和受众
歪曲所接受消息的意义。
（1）曲线理论：诉诸恐惧和态度改变之间的关系是曲线状的。一则消息中或高或低程度的
恐惧都将导致少量的态度改变；而中等恐惧的消息将导致最大量的态度改变。这种倒U形状
的曲线是诉诸恐惧与态度改变之间关系的主导观点。
（2）保护动机理论（罗杰斯）（注意考点）p188：罗建立一个模式，总结了在诉诸恐惧活
动中3个关键的因素：一是对所描绘事件的有害性加以夸大；二是那种事件可能发生；三是
所建议对策的有效性。（如果受众接受到一则诉诸恐惧的消息，通过认知判断，是否相信所
描述的危害性？该事件发生的可能性？所建议的措施对付威胁是否有效？将决定受众态度
改变的多寡。）
罗称他的模式为对诉诸恐惧和态度改变的保护动机理论。态度改变是受众在接收消息的过程
中由认知判断所激发起来的那部分保护动机的功能。
4、态度的经典条件作用理论(斯塔茨&斯塔茨)
经典的条件作用：在我们每天的日常生活经历中，某些字总是同时配以某些情感经验。
例如：愉悦、快乐等字词不达意通常配以正面的情感，而像愤怒、受伤等则配以反面的情感。
根据经典的条件作用，情感的刺激可以被视为无条件的刺激，诱导出情绪的反应。而当一个
字产生的刺激有计划地伴随着此种无条件的刺激时，这个字便会成会一种有条件的刺激，并
且也会引出情绪的反应。
所以，斯塔茨和斯塔茨认为，态度不过是这种建立在经典的条件作用上的对一个字的情
感意义。他们的研究为某些宣传技巧提供了理论性的解释，例如光辉泛化法，便是试图将人
或概念与道德性字眼联系在一起，以产生条件作用；或是诽谤，它企图将人或思想贴上坏的
标签。广告中的多数技巧也是如此，将产品名称与正面意义联系起来。
三、卡茨的功能取向p193
研究态度改变的主要理论取向有：一是学习理论取向，主要与霍夫兰的理论相联系；二
是一致理论取向，主要与费斯廷格（认知不和谐理论）、纽科姆（对称理论）、海德（平衡
理论）和奥斯古德（调和理论）及坦嫩鲍姆的理论相联系。三是卡茨从以上两种研究取向中
发展出的功能取向。（03年简答15分，什么是说服效果研究？其代表学者和主要观点有哪
些？）
1、理性的模式和非理性的模式：
非理性模式认为，人类是不爱思考的生物，其信念很容易受周围人的影响，并且人类对
现实的理解受到他们欲望的摆布。
理性模式认为人类是聪明的、具有批判力的思考者，只要给予充足的信息，便可对之作
出明智的决定。
功能取向研究试图把这两种不同的人类行为模式结合在一起。卡茨及其同事认为，要回
答人类既是理性的又是非理性的这一矛盾问题，要以环境和当时行为的动机等因素来说明。
他们还主张，对于理解态度改变而言，人类以不同思想方式采取行动的倾向具有重要意义。
功能取向：卡茨主张，对态度的形成与改变，都必须以态度服务于人格需要的功能来理
解。其关键论点是同样的态度可能基于不同人心中不同的动机。
2、卡茨提出的态度服务于人格的4种功能
（1）工具性的、调适用的、功利主义（调节）的功能。人们之所以会持某种态度，是因为
人们极力争取从外部环境中得到最高的奖赏，并将对己不利的惩罚降到最低。例如：认为赋
税太高的选举人可能拥护承诺减税的候选人。
（2）自我防卫的心理功能。人们之所以会持某种态度，是因为人们要保护自我免受伤害。
这种上海可能来自他们自己不认可的冲动，也可能来自自己对外部威胁力量的认知。某些人
对少数群体投注蔑视感情，以此作为支撑自我的方式。
（3）表达价值观的功能。人们之所以会持某种态度，是因为这些态度能使一个人向中心价
值观和该人认为同属一类人的正面表达。一位喜爱摇滚乐团的青少年会通过这种态度来表现
他的个性。
（4）知识的功能。人们之所以会持某种态度，是因为其能满足人们对知识的欲望，或对世
界提供结构与意义，否则这个世界将是无序的。很多宗教信仰具有这种功能，分享文化准则
的其他态度也是一样。
卡茨认为，如果不了解态度所服务的功能，而试图改变态度，便会导致相反的效果。
四、态度和行为
一个重要问题：通过说服性消息产生的态度改变是否伴随着任何有意义的行为改变。
费斯廷格认为，态度改变可能并不能自动带来行为改变，其中一个愿意，是造成原本态
度的环境因素在态度改变之后仍然在其作用。这样，在接触说服性消息之后，态度可能仍有
恢复其原有立场的趋势。
菲什拜因关于某一特定行为影响因素的模式：一个人表现某种特定行为的意图是一种功
能，这种功能（1）反映个人对表现这种行为的态度（2）反映个人对左右其行为的规范的理
解及个人顺应那些规范的动机。
五、说服的技巧【05年简答10分：举例说明说服有哪些技巧】
1、采用图像：在传播中，特别是在广告中，最常见的技巧的采用图像伴随文本消息的声音。
图像能以以下方式增强消息说服力：吸引注意；增进对消息的学习；引起正面情感反映
可以转移到消息的其他方面。
图像与说服消息的相关性和个人在消息处理过程中的投入水平相互作用，当接受者投入
的注意力较低时，不相关的图像会对态度改变产生最大的冲击力；而当接受者投入注意力较
高时，相关的图像会对态度改变产生最大的冲击力。
2、诉诸幽默：是一种很受欢迎的技巧。
但是，大部分研究表明，幽默对吸引注意力、产生对传播者的喜爱心情等方面比造成态
度改变或行为改变更为有效。
（了解）学习理论：由马基沃兹提出，幽默可能提供了强化作用，因而导向更大的态度
改变。
（了解）分心理论：由马基沃兹提出，幽默具有一种能使人分心的作用。所以，通过阻
止相反观点的说服作用，分心可能导致较大的态度改变。或者，通过干扰对消息的注意，分
心可能导致较少的态度改变。
3、诉诸性感：是广告中常见的技巧。
诉诸性感的功能：增加注意；引起冲动，在冲动条件下产生愉悦感觉可转移到消息所推
荐的产品上去，导致态度改变；推荐的产品、机构或方法与性感刺激的联系可以使它们性感
化，更易于为人所接受。
性感是一种迷惑人的诉求方法，也存在某些危险性。可能不被某些受众认同，可能被误
解为其他事物或被忽略掉，可能将另一些人的注意力分散，从而离开广告真正想要达到的目
的。
4、重复：很多大众传播的消息，特别是广告都重复得相当厉害。
一是因为不是所有的受众都在同一个时间看广告；二是它可能提醒受众记住获取消息的
某种高可信度来源，防止睡眠者效应。三重复也有利于受众记得消息本身
重复太多，也会产生不希望出现的效果，即在重复与传播效果之间的“曲线关系”。适
度的重复可以增加人们对传播者支持立场的认同，高度重复下则下降。
六、说服理论的新模式
1、特点：
（1）将态度的改变表现为一个过程，这个过程分成几个阶段，并且说服作用经过一段时间
才发生
（2）强调认知的作用，或者说信息处理的作用。
（3）它们赋予接收者更为积极的角色。
2、麦圭尔的信息处理理论
（1）信息处理理论：认为态度改变包含6个阶段或步骤，每一个阶段都成为下一阶段的必
要前提。
说服性的消息必须得到传播
→接收者将注意这个消息
→接收者理解这一消息
→接收者接受和服膺所陈述的观点
→新接受的立场得到维持
→期望的行为得到发生
麦倾向于处理的几乎全部是自变量，并将它们分得越来越多，一直到12个阶段。同时
他指出，对一个阶段的影响是这面的自变量，对另一个阶段的影响则可能是相反的。例如诉
诸恐惧可能引起对消息的注意，却干扰对消息的接受。
（2）启示：一是给予我们一个很好的思路，认识态度改变过程的全貌，麦指出，在态度改
变研究的大量文献中，多数可能仅仅针对接受和赞同阶段；二是提醒我们态度改变的困难，
许多自变量倾向在总的效果中相互抵消自己的作用。三是为要达到态度改变的成功，需要在
每一个阶段都取得规定的满意效果。
3、安德森的信息整合理论
信息整合理论：用以解释人类如何将不同的信息整合成为一体。信息整合理论认为将态
度改变描述为由说服性消息组成的新信息与由当前的态度组成的旧信息结合的过程。每一则
消息都有两个特征：一个是等级值：指接收者对那则信息的喜好程度；一个是重量值：指那
则信息对接受者的重要性或相关性。
对各则信息的评价可以由人在处理信息时以几种方法予以结合，通常有加法规则和平均
规则。
4、精心的可能性模式（佩蒂&卡西皮）
对于一个接收者来说，大量处理大众媒介的消息是不可能的。通常情况下，我们选择一
些消息仔细检查，而以更简单武断的方式对待其他的消息。
（1）对待态度改变的两种途径：一是抓住主要问题的路线：即接收者积极地处理信息，被
观点的理性所折服；二是考虑枝节问题的路线：即接收者不运用他们的智力处理消息中的信
息，而更多地是为枝节线索所左右。在对待说服的抓住主要问题路线其积极作用的时候，接
收者投入高度的心力；当对待说服的枝节线路其积极作用的时候，接收者投入较少的心力。
（2）说服发生在不同程度精心的情况：
说服发生于抓住主要问题的路线时，高质量的观点通常是是以一种有力的方式提出的。
两个因素起重要作用：一是接收者最初的立场与所主张的立场之间是否一致；二是论证的强
度。
说服发生于考虑枝节问题的路线时，说服依赖于接收者使用的简单决定规则或提示：可
信性提示：人们倾向于相信具有高可信度的信源；喜爱提示：人们倾向于同意他们喜爱的人
的意见；共识提示：人们倾向于同意很多人支持的立场。
（3）作用：一是有助于我们去调和说服理论中同一因素相互冲突的研究结果。二是给予态
度改变研究中接收者更主动的角色作用。
第十章 群体与传播
三种重要的群体形式（04年名解8分，“基本群体”和“参考群体”）
基本群体：这是两个或两个以上的人组成的长期、亲密、面对面联系的一种群体，如家
庭、工作群体、竞赛队伍、兄弟会和军队的单位。
参考群体：指的是提供了参考标准的群体，该群体是用作参考的，无需归属。例如某学
生想加入某兄弟会，可能开始穿得像他们并采取他们的态度。即使他并非兄弟会成员。
偶然群体：是人们临时组成的群体，在被聚到一起之前，人们彼此互不认识。例如人
们共搭一架电梯，共乘一辆汽车。
谢里夫的群体规范研究
规范：群体通常拥有某些规则或标准，而这些规则和标准即规范。
结论：在不确定的环境下，人们依靠别人的指导。同时，群体的影响一旦形成便能够超越群
体而存在，出现在没有群体的环境中。他的研究给人们以启示，群体对人们的态度具有极大
的影响力。
群体规范的形成（本特霍森&莫奈安）：在一个新的群体中，人们对适当的行为准则还不确
定。他们寻找在过去相似情况下的经验和标准，以此作为行动的指导。如果群体成员对新的
环境没有采取共同解释的话，他们就要发展一种建立在群体基础上的对新环境的理解。在群
体成员互动的过程中，他们分享了经验，并以此为基础，形成了对未来互动的期望。对正在
形成的规范的不同意见可能导致同意规范者修改他们的解释，或者他们试图说服群体接受他
们的解释。一旦规范形成，任何试图进一步改变规范控制的行为，都会遭遇制裁。
奥许对群体压力的研究【05年简答10分，什么是群体压力和趋同心理，注此题在郭书上p94】
研究课题：在明朗的环境下，群体压力的作用。
结论：有人情愿追随群体的意见，即使这种意见与自身信息相抵触。但是当群体中有一个人
始终支持，这种情形便足以消灭大部分的群体压力。即使是以前人们从未彼此见过的偶然群
体，仍会发挥很大的影响，基本群体中的群体力量看起来可能更大。
实例：基本群体的政治同质性，同一群体中的人政治态度倾向于相同。
社会认同模式（03年简答15分，何谓社会认同模式？如何用该模式来理解大众传播媒介在
舆论形成过程中扮演的角色）（要充分注意这道考题的意义！！！）
社会认同模式：指出社会群体的定义应该是拥有共同的社会特征的两个或两个以上的
人，或认为他们自己是同属于一个社会类型的成员。按照这种概念，群体的成员彼此之间不
需要有直接的关系，这个群体也不必有一个结构。对群体成员身份的认同主要是一种认知的
过程，这个过程通常是人们在回答“我是谁这样一个问题时产生的。”一个人从其赞赏和确
认归属的群体中获得一种社会认同感。这种社会认同感并不经常起作用，而是不时地在某种
特定情境中出现又从另一种情境中消失。一旦它出现，个人的言行会试图与他所属社会类别
的规范一致，并配合相关的情境行动。
该模式对群体看法的改变：第一，它认为群体成员重要的一种分类是根据认知的反应
而不是情感的反映；第二，它认为这种人对社会类别的自我定位不仅是一种微弱的联系，而
是他们自己心中认为重要的一种群体成员的感觉；第三，它认为，这种对社会类别的认同过
程可能产生重要的后果。
大众传媒在带来社会认同以支持舆论形成的过程中扮演着很重要的角色。第一，大众
传播媒介通过描述哪些群体对哪一特定议题存在争议，从而显示出哪些群体与议题有关；第
二，媒介通过描述各种群体是如何对该议题作出反应的，可能指出每一个群体所持的意见，
并且告诉认同该群体的人们什么是应该遵守的规范。第三，群体的意见规范在受众心目中的
感觉很可能被传播夸大。第四，人们自己承担起维护这种被认为是群体规范意见的责任，且
更可能去表达这种夸大的规范。正是在这个时候，对不同议题的舆论可能表现得更坚定更具
体了。
群体作为改变的工具：群体结构/群体动力/群体规范/群体压力/参考群体
群体与大众传播（广告中通常使用乐队花车法）
大众传播+群体影响→效果更大
大众传播+群体讨论→效果更大
受众分割【02名解】
一种将群体用于大众传播的方法。这种技巧最初是广告者发明的，被称为市场分割，并运用
于广告中。借助于将市场分割，也就是将受众分成许多小的群体，广告者可以针对不同的群
体规范不同的传播策略。电视节目的编排也会采用这个概念，来吸引具有确定人口特征的受
众。
公共关系中的应用：
积极反对者/积极支持者/不感兴趣的反对者/不感兴趣的支持者/潜在的意见转向者/未被卷
入者
只有积极支持者和潜在的转向者是消息的好顾客。让前者接受强化的信息保证支持不动摇，
让后者接受仔细设计的说服信息。
社会营销中的应用
措施：用特殊的消息针对各个群体；选择适用于各种不同群体的媒介。
第十一章 大众媒介与人际传播
一、 意见领袖及两级流动传播
1、两级流动传播：【01名解】来自媒介的消息首先抵达意见领袖，接着，意见领袖将其所
见所闻传递给同事或接受其影响的追随者。
意见领袖：【02名解】指在传播学中，活跃在人际传播网路中，经常为他人提供意见、
观点、或建议并对他人施加个人影响的人物。
散布：一个新观念经过一段时间后，在一个群体的社会结构内部得到广泛的传播。
2、关于意见领袖的研究成果：
(1)人际影响比任何一种媒介都更为经常、有效。意见领袖通常是一位革新者。
(2)在基本群体中，人际影响对保持群体内部意见和行动高度一致非常有效
(3)在决策过程中，不同的媒介扮演不同的角色。有些媒介告知或宣布某样事物的存在，另
外一些媒介则使某种行动方案变得合乎情理或使之获得认可。
(4)意见领袖的影响仅限于特定的时间和特定的话题。他们之所以有影响力，不仅与他们是
谁有关，而且与他们所属群体的结构和价值观念有关。某个领域里的意见领袖通常不太可能
是另一个与之无关领域里的意见领袖。
意见领袖和追随者的比较：
相同：同属一个社会阶层或群体
不同：（1）价值观的人格化体现：具有影响力的人是许多追随者学习消防的榜样。
（2）能力（其人的知识）：意见领袖在其具备领导资格的领域里必须被公认为是见多
识广或称职能干的人。
（3）可利用的社会位置：包括两种社会关系，一是意见领袖在本群体内认识的人；二
是在本群体之外认识的可以为本群体成员关心的话题提供信息的人。
（4）让对该领域有兴趣的人能够与其接触交往。
（5）比其追随者更多地接触与其影响范围有关的媒介。
小结：意见领袖的作用是通过一切合适的媒介将本群体与社会环境的相关部分连接起来。
3、人际环境
人际关系：不仅仅是人际交流的网络，它还是社会压力的源泉，促使人们遵循群体的规范；
也是社会支持的源，促使个人保持这些价值观和意见。个人的人际环境是了解他接触大众传
播媒介并对之作出反应的行为的基础。
二、 创新的散布
1、散布研究：就是对社会进程中创新（新的观念、实践、事物等）成果是怎样为人知晓并
在社会系统中得到推广的研究。（两级流动传播模式→多级流动传播模式。两级主要研究个
人任何接受信息并传递给他人；散布研究则集中关注采用或拒绝一项创新的最后那个阶段）
创新：一种被个人或其他采纳单位视为新颖的观念、实践或事物。
四种散布元素：一项创新；通过特定渠道传播；经历一段时间；在一个社会体系的成员之中
流通。
2、创新的特征：相对优越性；兼容性；复杂性；可试验性；可观察性
3、异质性与同质性：同质性：意见领袖与其追随者在许多属性方面的相似性。异质性：多
对相互交往的人在属性上的差异程度。在创新推广中，信源与接收者之间往往有高度异质性，
因为新观念通常来自迥异于接收者的人物。
4、创新的决定过程（02年名词解释；03年罗杰斯的创新扩散理论把个体采纳创新过程分为
哪几个阶段？他把创新的采用者分为哪几类？）
这个过程包括下面5个阶段：
（1）获知：接触创新并略知其如何动作
（2）说服：有关创新的态度形成
（3）决定：确定采用或拒绝一项创新活动
（4）实施：投入创新运用
（5）确认：强化哐撤回关于创新的决定
罗把创新的采用者分为5类：
（1）创新者：大胆热衷于尝试新观念，更见多识广的社会关系；
（2）早期采用者：地位受人尊敬，通常是社会系统内部最高层次的意见领袖；
（3）早期众多跟进者：深思熟虑，经常与同事沟通，但很少居于意见领袖的地位；
（4）后期众多跟进者：疑虑较多，通常是出于经济必要或社会关系压力；
（5）滞后者：因循守旧，局限于地方观念，比较闭塞，参考资料是以往经验；
后果：采用或拒绝一项创新后，给个人或社会系统带来的变化。
（1）满意和不满意的后果：取决于创新效果在社会系统内是建设性的还是破坏性的；
（2）直接的和间接的后果：取决于个人或社会系统的变迁是对创新的一种直接回应还
是创新直接后果产生的二级效果；
（3）预料之中后预料之外的后果：取决于变迁能否得到社会系统成员的公认以及是否
符合众人的期望；
不同媒介渠道的作用：
大众媒介可以迅速抵达广大受众，传播信息，改变立场不稳的态度；人际渠道则可以实
现信息的双向交流，在解决接收者对信息地址或冷漠的问题上比大众媒介更奏效。
大众媒介渠道和外地渠道在获知阶段相对来说更为重要，而人际渠道和本地渠道在说服
阶段更为得力。
5、变革代表
变革代表：是一种职业人士，在创新散布中，他们试图朝他们认为有得的方向影响人们采用
决定。常常起用地方意见领袖来协助某种创新的扩散，或者组织被视为有害创新的采用。他
们通常比其试图影响的人有着更好的教育背景和社会地位，从而异于影响对象。为了克服这
一障碍，他们经常需要从本地人那里获得帮助，因为本地人与边个代表竭力影响的人有更多
共同之处。
媒介论坛：是一种有组织的小群体，经常在一起接收大众媒介节目、广播或出版物，然后讨
论其内容。
6、新闻的散布（05年简答10分，新闻的散布与创新散布有何异同，此题较难，书上无答
案）
新闻的散步是散布研究领域的分支之一。德弗勒总结20世纪60年代是新闻散布研究最活跃
的时期，他根据从1940年伊利县研究以来的信息散步研究情况做出以下概括：
（1）美国不断进化的媒介技术给人们带来获知有关重大事件第一手信息的方式变化：电视>
广播>报纸（晚些时候提供细节），在某些情况下口头传播仍然很重要。
（2）绝大多数人是直接从媒介而非其他人那里获得大部分新闻的，两级模式并非日常新闻
传至公众的方式。
（3）与众人利益攸关的新闻事件（新闻价值大）在人口中传播的更快，也更广。
（4）真正紧迫的新闻会在各色人中广泛传播，并非两级模式描述的只从意见领袖到大众这
样一个过程。
第五篇 大众媒介的效果与使用
第十二章 议程设置
 议程设置：媒介的议程设置功能就是指媒介的这样一种能力：通过反复播出某类新闻报
道，强化该话题在公众心目中的重要程度。
 传媒研究思路的变化：态度改变→对认知的塑造
认知心理学：关注世界的重现，即人们在头脑中建构对世界的印象，以及这些印象是如何被
建构起来的。
议程设置：借助考察人们对哪些特定议题赋予显著性或重要性，这种议题的显著性又是如何
获得的。
 铺垫作用：电视新闻报道能以一种特殊的方式影响总统选举，通过为竞选活动设置议程，
媒介还为选民设定评估总统候选人的评价标准。铺垫作用就是指媒介专著某些问题而忽
略其他问题，从而改变选民对候选人的评估标准。选民对总统的评估是根据他们新近看
到的新闻报道强调的主题而定的。
 议程设置效果的产生条件
（1）议题的强制性接触和非强制性接触
并非所有的议题都可以引起议程设置的效果。在一个特定议题上，公众的直接经验越少，
他们为获取该方面
信息就越是被迫依赖新闻媒介，这是议程设置效果才可能产生。
强制性接触：有些议题，公众能够直接亲身体验的，如失业。对强制性接触议题的报道，
可能不会产生议程设置效果。
非强制性接触：有些议题，公众不能够直接亲身体验的，如污染，所以在这方面的信息
被迫依赖于新闻媒介。对非强制性接触议题的报道，可能会产生议程设置效果。
就非强制性议题而言，媒介的集中报道要先于该议题在民意测验中重要程度的提升；对
于强制性议题，媒介的报道和公众的重视是齐头并进的。
议程设置效果在接触新闻媒介和不接触新闻媒介的人身上都能体现出来。因为如果议程
设置效果大多数都出现在非强制性接触的议题上，那么人们感知其效果的唯一途径就是接触
媒介或与接触媒介的人交流。也就是说议程设置和两级传播交织在一起产生效果。
（2）议题的抽象度——一个议题难以理解或感受的程度
对于具体议题而言，媒介和公众议程之间存在显著关系；对于抽象议题媒介可能不具备为公
众设置议程的能力。
 议程偏颇：即媒介对议题进行的突出报道反映了它对一个特定思想喜爱与否的程度。
 时滞问题：【03年名解】
时滞：媒介对公众的影响从发生到产生效果需要多长时间。研究显示，一则新闻从媒介
议程转向公众议程似乎存在一个必然的时间差，这段时间大致是2-6个月。
最合适效果跨度：媒介议程和公众议程之间相关性最强的时间跨度。不同问题的新闻报
道可能需要不同长短的时间，以积累足够的声势并吸引公众的注意。
结论：电视新闻有很强的短期效果，报纸产生的持续更长的效果。人的记忆在议程设置
效果上有其独特作用。由于记忆力的自然衰减，议程设置效果会在持续一段时间后消失。
 议程建构：从议程设置出发，比议程设置复杂。认为一个问题从新闻报道到成为公众议
程的过程需要一段时间，并要经历数个步骤，并提出了一个媒介构造议程的方式。其中，
媒介使用的语言对人们对议程的重要程度感受有重要作用，名人对议题的评论尤其有重
要作用。
六个步骤：以水门事件为例
1）报纸突出报道某些事件或活动，并使其引人注目。
2）不同种类的议题需要不同种类、不同分量的新闻报道，才能吸引人们的注意。水门
非强制性议题，广泛报道引起注意。
3）处在关注焦点的事件或活动必须加以“构造”或给予一定范围的意义，从而使人们
便于理解。水门被定性为党派之争。
4）媒介使用的语言也能影响人们对一个议题重要程度的感受。恶作剧→丑闻
5）媒介把已成为人们关注焦点的事件或活动与政治图景中易于辨认的次级象征联系起
来。“找出事实真相的必要”“对政府的信心”
6）当知名且可信的人开始谈论一个议题时，议题建构的速度会加快。
 导向需求：影响议程设置效果产生与否的决定因素。导向需求基于两个因素：信息对个
人的相关性和有关对象的消息的不确程度。信息的相关性越大，事物的不确定性程度越
高，那么，人们对导向的需求就越大。人们对导向的需求越高，则受媒介议程设置效果
的影响越大。
 谁来设置媒介议程？
媒介间议程设置【04年名解】：媒介议程设置公众议程，那谁来设置媒介议程。影响媒介
议程的一支很重要的力量来自其他媒介的内容，特别是精英媒介，它常常能为其他媒介设置
议程。这一现象被称为媒介间议程设置。总体看来，是印刷媒介引导电视网的议程，而不是
相反。
5种影响媒介内容的因素：
（1）来自媒介工作者个人的影响：传播业者自身的特性、个人和职业背景，个人态度和职
业角色。
（2）来自媒介日常工作惯例的影响：
（3）媒介组织方式对内容的影响：媒介机构有许多目标，其中谋利就是多数媒介共有的目
标之一，媒介组织的这种目标以各种方式影响媒介的内容。
（4）来自媒介机构之外的组织对媒介内容的影响。比如：利益集团、政府的法规等。
（5）意识形态的影响。这是一种宏观层次的社会影响，可以多种多样的方式影响媒介内容。
意识形态处于影响因素等级结构的组顶端，其影响力通过各个层次向下渗透。
议程设置的应用
公众新闻和市民新闻：公民(非专业新闻传播者)通过大众媒介和个人通讯工具，向社会
发布自己在特殊时空中得到和掌握的新近发生的特殊的、重要的信息。而这种发布信息的公
民可以称为市民记者。这些新闻借助确认重要的问题和议题，并关注它们，强调的是更好地
服务于社群，可以看作是议程设置理论的实际应用。
先占权策略：记者应该挑战候选人及其顾问现有的假定，认为设置议程是他们的职责。
竞选的议程就由选民来决定。通过记者的第一手采访来收集民意。
十三章 知识沟假说
 大众媒介的作用：通过为人们提供所需要的信息，从而缓解他们因为缺乏信息的造成的
难题。大众传播有能力将信息传达到其他方式无法企及的地方，比如大城市及农村的贫
民，还有世界上很多落后国家里生活困难的人们。
 知识沟假说：【01年名解，02简答举例说明你对“知识沟理论”问题的看法与理解。】
随着大众媒介想社会传播的信息日益增多，社会经济状况比较好的人将比社会经济状况
较差的人以更快的速度获取这些信息。因此，这两类人之间的知识沟将成扩大而非缩小
之势。特别在人人都感兴趣的领域，比如公共事务和科技新闻，知识沟特别容易出现。
而在与某种兴趣有关的特定领域，如体育和园艺，知识沟出现的可能性较小。
作用方式：
（1）在一段时间内，当媒介已对某个话题做过大量宣传之后，文化程度较好的人将
比文化程度较差的人以更快的速度吸取该话题的知识。
（2）在特定时间内，较为未大量宣传的话题，在媒介大量宣传的话题上，所获知识
与教育程度应该有更高的相关。
导致因素：
（1） 传播技能上的差别：文化程度的差异导致如阅读、理解、记忆等需依靠教育打
下基础基本的信息处理工作的差异。
（2） 现存的信息数量或先前获得的背景知识等方面也存在差异。
（3） 社会经济状况良好的人可能有更多的相关社会联系。他们可能就某一问题与他
人展开过讨论。
（4） 选择性接触、接受和记忆的机制也可能在发挥作用。社会经济状况较差的人可
能找不到与他们的价值观和态度相协调的涉及公共事务或科技新闻的信息，于
是就对此类信息兴趣索然。
（5） 大众媒介系统自身的本性就是为较高社会阶层的人而用的。
扩大或缩小的条件：一个议题引起社会关切的程度；个人寻求信息动机的强烈程度。
假说的普遍性：人们之间的差距不仅体现在知识上，还体现在人的态度及外在行为上。
知识沟不单是大众媒介一家的力量所致，也应包括人际传播和大众传播的结合，它们也
都发挥着自己的作用。导致知识沟的最主要因素还不是社会经济状况和教育，而是受众
兴趣（个人利益：关心于己有用的新闻信息；社会利益：即管对对个人的人际环境或人
际网络有用的新闻信息，后者与知识获得的关系更密切）
 知识沟与新技术
由于费用的缘故，较为富裕的人就比不太富裕的人有更多的机会从新技术中受益。诸如
此类的原因致使传播科技革命有可能让知识沟进一步扩大。而致力于推动基层民主的政
治团体和机构也因为利用科技能力有限而力不从心。
改变：公共数据库
 研究新进展
信息寻求行为等级图：金字塔状，从上到下依次是存活和安全、维持和营养、知识追求、
充实与发展、随意浏览。一个人在等级中的位置决定着他的信息寻求行为，而且只有在
一个层次的信息需求得到满足后，人们才会致力于获取更高层次的信息。当指向人们的
某类信息在某些个人自己的需求等级位置看来无关紧要时，知识沟就出现了。
 填补知识沟
（1）让人们融入各种社会团体。（2）确定一次特定传播活动的多个目标受众，然后在
巧妙设计送往各个受众群体的消息。（3）记者应突出他们所提供信息的好处。（4）针
对不同语言的受众。
第十四章 大众传播的效果
一、 理论：
1、子弹理论：大众传播效果研究的早期理论之一，又称皮下注射论、刺激反应论等。它的
主张是，人们极易受大众传播消息攻击，如果消息“射中靶子”就会得到希望的效果。它的
出现源于一战后宣传的明显效果。但过于简单化了。
2、有限效果模式（04名解）【郭书P198】：从大众传播的效果研究一开始，就没有给子弹
理论太多的实证支持。相反，许多证据却支持了大众传播只有少量效果这一观点。其中霍夫
兰的陆军研究，拉扎斯菲尔德的大选研究都是这一观点中关键性的研究。克拉珀在《大众传
播的效果》一书中说大众传播一般不能成为产生受众效果的必要和充足的原因，而是处于各
种因素和影响中，并通过这些因素和影响共同起作用。有限效果传播的观点有时也被称后最
小后果定律。
3、教养理论/函化理论（03年名解郭书）：
主要内容：
(1)电视机成为家庭的中心成员，对于大量看电视的观众来说，电视实际上主宰和包容了其
他信息量、观念和意识的来源。所有接触这些相同消息所产生的效果就是教养作用。或者说
电视教导了共同的世界观、共同的角色观和共同的价值观的作用。
(2）在现代社会，大众传媒提示的"象征性现实"对人们认识理解客观世界发挥着巨大的影响，
这种印象不是短期的，而时一个长期的潜移默化的"教养"过程，它在不知不觉中制约着人们
的显示观
(3)传播内容具有特定的价值和意识形态倾向，这些倾向不是以说教而是以"报道事实""提供
娱乐"的形式传达给受众的它们形成人们的现实观社会观于潜移默化中
(4)电视媒介在形成当代现实观和社会意识的"主流"中，发挥着重要作用。主流化发生于不同
社会团体的大量看电视者，他们的意见趋同。但是这种"主流"作用并不是对所有人都有影响，
而且其效果也是因为传播的内容而异的。
(5)共鸣发生于人口中的特定族群，教养效果在那里非常突出。比如男性与女性中的大量看
电视者均认为犯罪是非常严重的社会问题。但是最赞同这个看法的是大量看电视者中的女
性，因为她们是现实世界中易受罪犯攻击的对象，因此与电视中呈现的高犯罪世界的描绘产
生了“共鸣”。
理论的新发展：
四重的教养可能效果模型：第一级信念：指对外在世界事实的信念。第二级信念：从
以上事实推论得出的关于期望与倾向的信念。这两种信念相互有联系，然而第一级信念受看
电视的影响，第二级信念则受观看电视和其他因素的诸多影响。第一级信念和第二级信念都
可能在个人和社会层次产生，从而创造出一种四重的教养可能效果模型。
扩展的教养假说：教养理论可能不支持总体上的电视内容，但可能适用于特定种类的电
视节目。
新闻折射假说：接触地方新闻内容可能强烈影响对罪行等问题的理解，因为这种消息具
有高度可感觉的现实性，其内容又“接近家园”。
文化制度模式：电视节目是高度一致的，电视内容的一致性来自电视节目制作的集中化
和追求大量观众的经济动机。
4、麦克卢汉的媒介决定论
媒介即讯息【01名解】：虽然技术的效果并未在意见或观念的层次上发挥作用，但却
逐渐地且不可避免地改变了“感观作用的比例”或理解的形式。传播媒介最重要的效果在于，
它影响了我们理解与思考的习惯。
感官比例：指我们各种感觉器官的平衡作用。原始人注重五种器官——嗅觉听觉视觉触
觉味觉——但是科技特别是传播媒介使得人只强调一种感官超过其他感官。
5、沉默的螺旋【01名解，05年简答10分，沉默的螺旋理论是否适用于解释网络论坛中的
舆论现象，为什么？】
前提：
大众传播的三个特质：积累性、普遍性及共鸣性。共鸣指对一个时间或一个议题的一致反映，
它能发展出一致性，而且这种一致性通常是由不同的报纸、杂志电视和其他媒介的报道共享
的。它可以克服选择性接触，而且造成这样的印象，即大部分人看待议题的方式与媒介表现
议题的方式是一样的。
大众传播媒介影响沉默的螺旋的三种方式：1）对何者是主导意见形成印象2）对何种意见
正在增强形成意见3）对何种意见可以公开发表而不会遭受孤立形成印象。
沉默的螺旋：诺利—纽曼认为，在具争议性的议题上，人们对民意的散布形成印象。他
们试图判断，自己的意见是否与大多数人站在一边，然后他们判断民意是否会朝赞同他们意
见的方向改变。如果他们觉得自己是站在少数人的意见这边，他们会倾向于对该议题保持沉
默。他们越是保持沉默，则其他人便越是觉得某种特定的看法不具代表性，而他们便越是继
续保持沉默。
大众传媒所表达的优势意见和对异常意见的人际支持逐渐减少，合并形成了沉默的螺
旋，其中表达优势意见或不表达异常意见的人数日益增加。沉默的螺旋在舆论的生成中起着
重要的作用。
6、第三者效果【03年简答15分何谓“第三者”效果？试举一个应用第三人效果概念可以
解释日常生活中的例子；08名解】
假设：人们倾向于夸大大众媒介消息对其他人态度和行为的影响。这个假设分为两部分，一
个与感受有关，假设提出，人们认为大众传播的消息对其他人会比对自己有较大的效果。另
一个部分与行动有关，因为有了这样的感受，人们会采取各种行动。
基本思想是：特定的消息“对你我这样的人没有什么效果，但是一般读者很可能受到很大影
响”人们其实比自己认为的更易接受大众媒介的影响。
实例：对特定种类的检查制。主张检查色情材料的人似乎更担心它对别人的效果而非对自己
的。显示了最多第三者效果的受试者最支持对色情材料立法限制。
7、媒介霸权：社会中统治阶级的意识形态成为整个社会的统治思想。大众媒介被视为受社
会统治阶级控制、帮助统治阶级控制社会其他人的工具。
三方面假设：1）新闻记者的社会化包括充满了统治意识形态的报道指南、例行工作规则和
导向。2）新闻记者倾向于报道保守的和维持现状的话题和消息。3）新闻记者倾向于表现亲
美国的报道和对他国、特别是第三世界国家的负面报道。
8、电视暴力的效果
有关电视暴利对人们行为可能带来的后果而提出的不同假设：1）净化作用假说：戏剧主人
公的侵犯行为替代性地表达了人们内心的暴力倾向，因而通过观看电视暴力，可以降低采取
实际侵犯行为的冲动。2）模仿假说：认为人们从电视上觉得了侵犯行为，然后再到处面去
照样模仿。3）免除抑制假说：认为电视降低了人们对侵犯他人行为的抑制。如果该假说成
立，电视暴力可能教导了一种普遍的规范，即暴力是一种与他人交往时可以被接受的方式。
建议措施：电视制片人发挥创造性，更多表现暴力行为受到惩罚和它们带来的消极后果，更
多表现不同于暴力方式的其他问题解决办法。
9、社会学习理论
强化理论：是学习理论早期形成的理论，当某种行为得到奖励而被强化时，学习的过程
就发生了。但如果这是唯一的学习方法，那么人们旧的自己尝试各种各样的行为，并坚持那
些得到奖励的行为而抛弃那些导致惩罚的行为。
社会学习理论：强化理论只是一种学习方法，效率较低，人们也可以靠观察和储存观察
所得的印象获得一些行为方法，并以此作为进一步行为的指南。这种学习也可以通过大众媒
介发生，一些人可以观看电视上的某些人在特定场合的行为，然后在实际生活中练习这些行
为。大众传播的许多效果可以通过社会学习的过程产生。
10、小结：媒介效果研究发展的历史（03年论述，传播效果经历了哪些历史阶段？为什么
过去效果研究一直占据在传播学研究中的主流位置）
20世纪20年代到40年代中期：子弹理论：关于大众传播最早和最简单的概念，认为大众
传播有相当大的效果。
40年代中期到60年代中期：有效效果模式
60年代中期到80年代：适度效果模式：认为有效效果模式矫枉过正太多，很多研究指出，
大众传播的效果比有效效果要大。这些研究包括知识沟、议程设置和电视暴力研究等。
80年代至今：强大效果模式：和子弹理论相似，但更为谨慎。强大的效果并不是普遍或容
易产生的，只有在正确的环境中使用正确的传播技巧才可能产生。
二、效果研究的新方向
1、对真实的社会建构
即一个人逐渐形成自己世界观的过程，包括三部分：客观真实（由事实组成，存在于个
人之外并被体验为客观世界的真实）、符号真实（对客观外界的任何形式的符号表达，包括
艺术、文学及媒介内容）、主观真实（由个人在客观真实和符号真实的基础上建构的真实。）
2、媒介的构造
构造：采取一种集中的思路，通过选择、强调、排除和精心处理等方式对新闻内容提供背景，
并提出中心议题。
媒介构造的概念提供了一个新的范畴以取代旧的研究媒介客观和偏见的范畴。对受众来说，
新闻报道的构造可能比新闻报道的偏见更具有有力的狡猾的影响。受众中的成员可能发现一
些报道对某个特定的候选人是有偏见的，但他们不可能轻易发现一次新闻事件是被包装为特
定新闻的。
高级组织者：基于这样的思想，即人们头脑中储存的信息是有层次地组织起来的，其中各类
特定的信息是被集中组合，置于一个更广的主题下。一个高级组织者提供了某种更普遍的结
构，也是各种特定的信息便可能在特定信息提出前已经组织有序了。例如，让人们接受一则
用伦理框架表述的有关保健问题的新闻。他们在后来更可能按照伦理争议的观点解释保健问
题，而非采用其他框架。不仅如此，当让他们解释完全不同的争议问题时，也倾向于采用伦
理的框架。
第十五章 大众传播媒介的使用
从大众传播的效果研究到使用与满足领域的研究：传播者→受众（积极解读者）
一、个人需求和媒介使用的分类
 使用与满足模式：
假设：
1）受众被设想为主动的，也就是说，对大众传播媒介的使用重要的一部分被认为是有目标
导向的行为。2）在大众传播的过程中，将需要的满足与媒介的选择联系在一起的主动权在
受众。3）媒介必须与满足受众需要的其他源泉相竞争。
模式：
（1）人们接触使用传媒的目的都是为了满足自己的需要这种需求和社会因素、个人的心理
因素有关。
（2）人们接触和使用传媒的两个条件: a 接触媒介的可能性；b媒介印象即受众对媒介满
足需求的评价，这种媒介印象或成为评价是在过去媒介接触使用经验基础上形成的
（3）受众选择特定的媒介和内容开始使用
（4）接触使用后的结果有两种:一种是满足需求，一种是未满足
（5）无论满足与否，都将影响到以后的媒介选择使用行为，人们根据满足结果来修正既有
的媒介印象，不同程度上改变着对媒介的期待
局限性及批评：【01简答 怎样评价使用与满足研究】
（1） 前提不够明确，究竟是人们处于自发的需求使用媒介还是媒介创造出了人类的需
求？
（2） 人类动机的复杂性和隐蔽性使得该研究注重自我报告来确定人们动机的方式失之于
简单和天真。
（3） 过于狭隘地集中对个人的研究而忽视社会结构和在该结构下媒介所处的环境。
（4） 受到媒介霸权主义者的批评：根据他们的理论，大众媒介的消息倾向与强化统治世
界的文化观点，受众很难回避这种媒介提供的偏向解读。
（5） 受众接触大众媒介并不总是高度精心或目的明确的行为。在大众传播的环境中，人
们似乎常常是以一种随波逐流的方式作出反应的。将其称之为仪式化或习惯性的行
为可能更合适。
 个人需求的分类：
（1）认知的需要（获得信息，知识和理解）
（2）情感的需要（情绪的、愉悦的或美感的体验）
（3）个人整合的需要（加强可信度，信心，稳固性和身份地位）
（4）社会整合的需要（加强与家庭朋友等的接触）
（5）舒解压力的需要（逃避和转移注意力）
二、使用与依赖模式：对使用与满足的一个批评是它过于狭隘地集中于对个人的研究。它依
赖心理学概念，如需求，而忽视社会结构和在该结构下媒介所处的环境。对于这种批评，提
出了一种使用与满足研究和依赖理论相结合的综合方法，即将个人置于社会系统之内，这些
系统帮助他们形成自己的需求。
三、新科技与主动的受众
频道保留目录：在线电视为受众提供了多样化的机会，频道增至100多个，为了应付选
择数目增加的情况，可以缩小定期收视的频道，从可收看频道中挑选与自己兴趣相符的子目
录，这部分自己感兴趣的频道被称为个人的频道保留目录。
有线电视为受众提供了新的多样化的机会，频道节目数大幅增加；录像机给使用者提供了看
电视时间的更大灵活性，还增加了对内容方面的选择机会。
四、理论的新发展
受众不再传统分为积极消极，而是认为媒介的使用者在处理媒介消息时有时是有选择的、理
性的；有时他们使用媒介则是为了轻松或逃避。受众行为在形式和程度上的差异可能也对媒
介的效果产生影响。
第六篇 媒介机构
第十六章 现代社会中的大众媒介
一、大众传播媒介的四种理论【01年论述：试论资本主义制度下媒介规范理论的演变过程
及其背景。】
分类依据：规范理论：即来源于观察、而非来源于利用社会科学方法对假说进行反复检验的
理论。
威权主义理论：
时代背景：君主集权统治时代。
观点：认为报业应支持和促进政府的权力，并听命于国家的管理。承印商应获得许可，在某
些情况下，为了出版，必须得到君主或政府的出版特许证。由于存在特许权、许可证、直接
检查制度以及来自出版业公会的自我约束，避免了个人对所在政府的批评。
所有制及用途：无论是集体所有还是私人所有的报业都被认为是加强政府统治的工具。
自由至上主义理论：
时代背景：启蒙运动（启蒙思想、理性主义、自然权利）。
观点：报纸的功能在于帮助人们了解真相、监督政府、同时报纸还具有告知、娱乐和销售的
功能。报纸主要是私有的，任何可以负担这项事业的人均可自由出版。媒介通过两种方式受
到控制。一种是通过多数人的声音，“思想自由市场”下“真理的自我修正过程”。另一种
是通过法律体系，法律对于诽谤、亵渎、无礼和战时煽动叛乱的行为进行规范。
所有制及用途：主要为私有报业，媒介是监督政府和满足社会其他需要的工具。
局限：工业革命后规模效益的驱动导致报业兼并，垄断，竞争减少→不同的声音减少；对人
类是理性的假设的质疑：理性化本身反而变成为非理性行为作出理性解释的一种努力。
社会责任理论：（联系全球的相关内容）
时代背景：20世纪美国媒介从业人员实践、媒介自律守则和哈钦斯委员会的工作中发展而
来。
观点：只有媒介是权利法案惟一保证了自由要的产业，因而媒介必须负起社会的责任。媒介
具有告知、娱乐和售销的功能，但是除此之外，它还必须承担讨论冲突的功能。任何人都应
得到表达重要意见的场合，如果媒介不能承担该义务，就应有人对其监督促使它承担义务。
媒介应受到社群意见、消费者行为、媒介职业道德的控制，对于媒介中的广播电视来说，可
占用的频道或频率数量有技术方面和政府立法机构的限制。此外还包括新闻记者的培训问
题，新闻记者在接受职业任务前的准备不足会导致一些基本事实的报道错误，从而引发人们
对媒介可信性的怀疑。
苏维埃——全权主义理论：媒介的主要目的在于巩固苏维埃制度。媒介受政府经济、政治行
为以及监督部门的控制，只有忠诚和正统的党员才可以有规律地使用媒介。政党的策略允许
批评，但党的宗旨和目标是不允许批评的。在苏维埃体制下，媒介都是国有的，并由国家掌
握的，媒介只是作为促进国家发展的一种有力助手而存在。
（主要目的、使用者、媒介控制、媒介禁忌、与其他理论的区别）
二、奥斯楚尔的三分法（p346表格：信仰条款、新闻目的、新闻自由的观点）【02年论述：
奥斯楚尔在《权利代言人》中如何总结当今的报业模式？你对此观点有何评价？】
代替上述四种理论贴标签和采用冲突语言的方法。他认为，完全独立的报纸不可能存在，在
任何提之中大众传播媒介都是那些掌握经济、政治、社会权力的人们的代言人。
市场模式、共产主义模式、进展模式
结论：1）任何报业体系中新闻媒介都是那些事实政治经济权力者的代言人，并非独立的行
为者。2）新闻媒介的内容总是反映资助报纸的那些人的兴趣。3）所有报业体系都依据以不
同方法定义的自由表达的原则。4）都赞成社会责任教义。5）都认为其他报业模式反常。6）
新闻院校传播该社会的意识形态与价值取向，他们帮助权势者继续控制新闻媒介。7）新闻
实践与理论总是不同的。
三、媒介的功能【01简答，05年考题论述15分，如何看待我国现阶段的媒介属性与媒介的
社会功能；07年简答：何谓大众媒介的功能分析？】
（一）拉斯韦尔——三功能说
监视周围环境：向受众提供并告知新闻。通常表现为向人们发出危险警报，例如极端的和危
险的天气情况或威胁人的军事情况。还包括媒介提供那些与经济、公众和社会生活密切相关
的重要新闻，例如股市行情、交通状况、天气预报等。
反面功能：1）过度强调危险和威胁，可能导致社会的恐慌 2）麻醉的负功能（拉扎斯菲尔
德和默顿）：即如果接受过多信息，便可能陷入一种对信息漠不关心的状态。3）过多地接
受那些不寻常、不正常的新闻，会导致受众毫不了解社会上平常、正常、普通的状况。
联系社会各部分以适应周围环境：它是对周围环境信息的选择和解释。发挥联系功能就是媒
介中那些社论和宣传性的内容。媒介通过对偏差行为的暴光来强化社会规范，帮助全社会达
成共识，通过突出选择的个人授予其社会地位，并作为对政府行为的检查。在实现联系功能
时，媒介可能组织对社会稳定产生的威胁，还可以经常反映并管理舆论及其表达。
反面功能：1）坚持灌输成见或培养众口一词，阻碍社会变革和创新，减少批评，以牺牲少
数人未发表意见的机会而强化多数人的观点，保护甚至扩张了那些需要控制的权力。2）假
事件：即制造“形象”或塑造“人格”——多出现在公共关系行业中。公司和产品被赋予某
种“形象”，个人通过设计在媒介制造的“事件”中露面表演，以塑造自己的公开“人格”。
一代代传承社会文化：将信息、价值观和规范一代一代地在社会成员中传递下去。传承文化
的功能使社会在扩展共同经验的基础上更加紧密地凝聚起来。媒介发挥传承文化的功能，使
个人在开始正规的学校教育之前以及学校教育结束以后，都能通过持续的社会化过程而融入
社会之中。它通过给个人一个使其认同的社会而减少了个人对社会的疏离感和漂泊不定的感
觉。
反面功能：1）造成社会中人的个性丧失，阻碍了传播中人际交往的机会。2）减少了社会中
亚文化群的多样化，使社会文化过分趋同，阻碍文化的生长。
娱乐（赖特补充）：媒介中的大部分内容旨在娱乐。旨在给人们每天的难题提供喘息的机会
和轻松的时间。
（二）拉扎斯菲尔德&默顿的功能说
赋予社会地位：一个人重要得足以突出于大众之外，这个人的言行重要得足以引起媒介的重
视。媒介使这样的个人和群体的地们合法化，赋予他们相应的社会地们和声望。
强化社会规范：大众媒介通过“暴露”那些偏离社会公认道德的情况重新确认并强化了社会
规范，公布的行为迫使社会的成员认识到发生了的这些违反公德的行为，并要求每个人对此
采取立场。公之于众的做法通过防止个人持续回避某个问题，从而带来压力，要求其采取单
一而不是双重的道德。大众媒介通过将偏离社会规范的情况公开暴露的方法而重新确认了社
会规范。
麻醉性的功能障碍：传播泛滥的结果可能只是一种表面化的关心，这种表面化的关心可能掩
盖了大众的冷漠。被告知并对其产生兴趣的人们可能了解一些社会问题，但他们并没有认识
到，自己未能对此做出决定，也未能采取行动。大众传播媒介是最有效的社会麻醉剂，逐渐
增大剂量的麻醉可以将我们的经历从主动参与转为被动获知。
四、媒介的其他相关因素及其受制条件
拟态环境/象征性现实【04名解】：真实环境太大、太复杂、太短暂，难以直接体验。为了
对周围的环境做出反映，我们首先必须再造一个简化了的这个环境的模式，然后才能对之进
行处理。这个简化的环境模式就是拟态环境。拟态环境即信息环境，是传播媒介通过对象征
性事件或信息进行选择和加工、重新加以结构化以后向人们提示的环境。在人与环境之间插
入了一个拟态环境，人的行为是对拟态环境的反应，而作用于行为实际发生的现实环境。
社会顺从理论：媒介由公司企业来支持。反过来媒介也支持这种体制。这种支持不仅表现在
广告上，也表现在媒介的节目内容上，这些节目通常都是肯定和赞同现存的社会结构的。经
济的压力迫使媒介遗漏那些敏感的争议性问题，顺从商界。
使媒介有效的条件：1）垄断：如果大众媒介缺少反面的宣传，垄断就会出现。许许多多构
成我们社会的假设从未受到过认真的质疑和挑战。2）引导而非改变基本的价值观：广告通
常试图对现存的种种行为模式和态度加以引导，使消费者变换他们已经习惯的产品的品牌。
一旦某种行为模式和态度建立之后，人们可以按照不同的方向对其加以引导，但是很难带来
根深蒂固的态度的改变。3）面对面接触：将大众传播媒介和强化型的讨论群体结合在一起
的方式。大众传播媒介和已经被社会文化同化的人们进行面对面接触，以加强占统治地位的
文化模式。
新闻中的持久价值观：这些价值观很少直截了当地表现出来，必须经过揄才能使人明白，因
为在多数情况下，新闻记者是不会将价值判断插入新闻报道的。持久价值观要通过很长一段
时间的观察，才能在各种不同的新闻报道中找到。
对真实的社会建构：制造新闻的行为，就是建构事实本身的行为。新闻是法定机构的同盟者，
同样使现状合法化。新闻是一种社会资源，对这种社会资源的建构限制了我们对当代生活的
分析性思考。
新闻和编辑政策：指体现在社论、新闻专栏、新闻标题中的取向。倾斜几乎从不意味着推托
搪塞，而通常是“省略、有差别的选择、带有偏向的安排”。每家报纸都有自己的政治原则。
政治、商业、劳工部分是集中体现报纸政策的地方，而这种政策通常很隐蔽，因为它违反了
新闻道德规范。
记者服从报纸政策的因素：所有者有权解雇或降职；年轻记者对那些雇佣了他们，给他们指
明了界限并提供了其他一些帮助的人心存感激；大部分的年轻记者渴望升职；缺少一个可以
效忠的对立团体；愉快的工作性质etc.
偏离政策的可能性：由于政策是隐蔽的，因此它的规范通常是不完全清楚的，所以通常记者
在一个未明确规定的范围内可以有一定自由度。
第十七章 媒介连锁企业和媒介集团
竞争性报纸急剧减少的原因：
1）缺乏有效的报纸市场分割，一家报纸无法将自己的目标受众同其他竞争者区分开来，为
此广告商不愿意投入足够的资金使报纸获利。2）来自广播电视媒介广告收入的竞争。3）家
庭中报纸读者的减少。4）大量多样化的城市人口从市中心转移至郊区，郊区人口更加同质
化，无需多样化的报纸。
媒介聚合增长的原因：
1）通过大量集中，可以获得大规模经营的优势。2）遗产税方面的法律规定，要支付大笔的
遗产税，使家族经营的媒介传给其继承人变得困难了。3）许多媒介实际和潜在的大量利润。
读者驱动的报纸：利用问卷调查、公共论坛、固定读者座谈和其他反馈方式，要求将报纸剪
裁得适合读者需要。这种由读者需要决定的报纸涉及通过读者参与整个新闻制作的过程，将
报纸与社会重新联系起来。
市民/公众/社区新闻学：新闻记者应该改变他们在某些问题上的中立态度，以使关于大众生
活的报道起作用。其含义是构造新闻，要便于人们了解解决问题的办法，而不是只摆出问题
和冲突。
市场驱动新闻学：这样的做法是为了多售出一些广告版面和时间，向受众提供一些能够吸引
他们的内容，以此保持和获得受众。（对市民新闻学的批判）
媒介交叉所有制（联合所有制）：一家报纸和一家电视台同时属于一个社区的一个所有者。
这会对关于地方事物的新闻和意见的多样性构成最大威胁，也就会威胁人们对真相的认知和
理解。
