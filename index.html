第十二编（第 13 章） 国际传播与全球传播
在传播学中，一个国家社会系统内部的传播称为国内传播，不同国家社会系统间的传播
称为国际传播，而将国内传播与国际传播融为一体，以整个地球世界为范围的传播则称为全
球传播。
第一部分:
1、国际传播
国际传播是以国家社会为基本单位，以大众传播为支柱的国与国之间的传播。（日本学
者鹤木真）
（1）国际传播的基本主体：
国家、国际机构、超国家机构、同盟或地区集团、跨国组织或运动、国内各种集团或
组织、个人
(2)特征：与政治有着极为密切的关系，它是一种由政治所规定的跨国界传播。它之所以具
有很强的政治性，是因为它与国家和民族利益紧密联系在一起。
（3）作用：沟通国际间的信息；执行本国对外宣传任务；
2、全球传播:
一般认为，全球传播是国际传播的扩大和发展，它既包括传统的国际传播的各个领域，
又拥有自己的全新课题
全球传播是研究个人、群体、组织、民众、政府以及信息技术机构跨越国家所传递的价
值观、态度、意见、信息和数据的各种学问的交叉点。包括：文化、国家发展、对外政策与
外交政策、控制与政策、人权与民权、战争与和平、宣传及其影响等人众多的争论领域。（美
国传播学者弗里德利克）
理解（特征）：
①全球传播的出现与跨国传播科技的发展和全球信息化的进程密切相关；
②在全球传播中，传播主体出现多元化趋势。
③从目前状态而言，全球传播的主要媒介依然是广播、电视、报刊等大众传媒，但具有
跨国传播功能的个人媒介，如传真、个人电脑等也正发挥着重要作用；
④在全球传播中，许多世界、全人类范围问题受到人们的重视；
⑤全球传播同样具有很强的政治性，国际政治和国际关系依然占据着核心地位；
3、全球信息化的影响和冲击（全球传播的前提条件是全球性信息传播系统的形成）
全球信息传播系统的形成，对人类世界的影响:
①经济全球化的发展；
②政治全球化的加速；
③文化的交流、融合、摩擦和冲突的全球化。
4、现代性和全球化的相互关系
吉登斯认为，当今世界的“现代性”具有四个突出的制度特性：信息管理与社会监控、
资本与市场经济、产业化（自然界变化和人工创造环境的发达）、以战争的产业化为特点的
“军事实力”（对危机状况的强制性管理）。现代世界的基本结构，就是由这四个特性及相
互关系所规定的。
吉登斯关于全球化的定义：
所谓全球化，就是某个场所发生的事物受到遥远地方发生的事物的制约和影响，或者反
过来，某个场所发生的事物对遥远地方发生的事物具有某种指向意义，以此种关系将远隔地
区相互连接，并在全世界范围内不断加强这种关系的过程。
第二部分世界信息传播秩序
1、世界信息传播秩序的现状:---信息的生产和流通失衡状况
2、新世界信息秩序论争:
背景：二战后，亚非拉美许多弱小国家脱离殖民统治获得解放。但由于长期的世界殖民体制
的影响，发展中国家与发达国家之间的差距巨大。与此同时，发达国家对新闻和信息生产、
流通的控制，依然维持着发展中国家对发达国家的依附关系。发展中国家逐渐意识到，要真
正改变受压榨、控制的局面，必须改变现行不平等的信息传播体制。
第一阶段:《阿尔及尔宣言》——1978年教科文组织发表《大众传媒宣言》
第二阶段 1978《大众传媒宣言》--1980“麦克布莱德委员会”《多种声音 一个世界》
第三阶段 从美英退出教科文组织直到现在
理解：“新世界信息秩序”论争，核心是如何看待信息的“自由流通”问题。少数发达
国家主张世界信息流通应该是绝对自由的，不应受到各国政府的人为干预。对此，发展中国
家并不一概反对信息自由，但主张首先应该表现为各国各民族的传播权利和机会的尊重和保
障；在信息的生产和流通结构不平等、少数发达国家对信息技术和媒介保持着高度垄断的现
状下，所谓自由流通业只能是少数传播大国的特权。因此，这场争论并不是单纯的理念上的
争议，它体现了国际传播和全球传播中政治、经济、文化和意识形态现实利益的尖锐矛盾和
冲突。
第三部分国际传播与全球传播的重要课题
新世界信息秩序之争的核心是如何看待信息的自由流通问题。
1、国际报道中的新闻价值问题 P248
2、信息与国家主权问题
（1）信息主权：简言之即一个国家对本国的信息传播系统进行自主管理的权利，这是信息
时代的国家主权的重要组成部分。包括三个方面的内容：
①对本国信息资源的进行保护、开发和利用的权利；
②不受外部干涉，自主确立本国的信息生产、加工、依存、流通和传播体制的权利；
③对本国信息的输出和外国信息的输入进行管理和监控的权利；
(2)信息主权产生的背景:
信息主权是在全球信息化的背景下，国家主权面临着新威胁因素的背景下提出来来的。
3、文化帝国主义
（1）背景:
（2）文化帝国主义研究:
文化帝国主义（媒介帝国主义）：它是20世纪60年代反对“新帝国主义”的国际环境下诞
生的。文化帝国主义并不是一个孤立的现象而是现代大帝国主义总过程的一部分。
苏利文曾经指出：帝国主义，是某些经济上居支配地位的国家以系统的方式强化和扩大
它们对其他国家的经济、政治和文化控制的总体过程。这个过程，在全球范围内形成拥有财
富和力量的发达资本主义国家与贫穷无力的发展中国家之间的支配、服从或依附关系。文化
帝国主义既是这个总体过程的组成部分，又是它的结果……它指的是来自发达国家、包含着
与支配者利益相关的文化价值或观点的商品、时尚或生活方式等流向发展中国家市场，创造
出某些特定的需求或消费形态，而发展中国家的民族文化在不同程度上受到外国文化的侵
害、取代或挑战，受支配程度越来越高的状况。
席勒认为，文化帝国主义就是“在某个社会步入现代世界系统过程中，在外部压力的作
用下被迫接受该世界系统中的核心势力的价值，并使社会制度与这个世界系统相适应的过
程。”
文化帝国主义特点:
①它是以强大的经济、资本实力为后盾，主要通过市场而进行的扩张过程；
②它是一种文化价值的扩张，即通过含有文化价值的产品或商品的销售而实现的全球性
文化支配；
③由于信息产品的文化含量最高，那么很明显，这种文化扩张主要是通过信息产品的传
播而得到实现的。
在文化扩张过程中，由于大众传播媒介是一种最有力的制度化手段，因此不少学者也把
文化帝国主义称为“媒介帝国主义”。
媒介帝国主义研究关注的两个现实问题 ：
一是跨国传播媒介的高度集中和垄断；
二是由这种垄断体制所形成的信息单向流通所产生的文化后果；
识记：
《阿尔及尔宣言》：
1973年，第四次不结盟国家首脑会议在阿尔及尔召开，会上通过了下述宣言：现存的
传播渠道不仅是罪恶的殖民地时代的遗产，而且阻碍着各国之间自由、直接而迅速的传播与
沟通；发展中国家必须共同采取行动，来改变现存的传播渠道。一般认为，《阿尔及尔宣言》
是“新世界信息秩序”之争明朗化的开端。
《塔罗瓦尔宣言》：
1981年，代表西方国家垄断大媒介利益的国际性院外活动集团――世界自由出版委员
会在法国的塔罗瓦尔召集了“自由之声”集会，发表《塔罗瓦尔宣言》认为，教科文决议将
会导致各国政府对新闻出版自由的控制，关于新世界流通秩序的论争“本身以报道自由和言
论自由的基本原则就是有害的”，西方国家在这个问题上付出了过于昂贵的代价，必须坚决
予以抵制和反对。
《麦克布莱德报告》（又名《多种声音 一个世界》）：要点：P246
1980年，西方国家和发展中国家经过多年的争论，麦克布莱德委员会以《多种声音 一
个世界》为题提出了报告，并在联合国教科文组织上通过。这份报告是隶属于教科文组织的
国际传播研究委员会对世界信息基础组织结构和传播资源进行多年调查研究而得出的成果。
该报告倡导建立世界信息传播新秩序，主张通过放松版权法规，促进信息传播技术自由交流，
鼓励第三世界国家出版业发展，及更多的传播资源共享等措施来改善发达国家和发展中国家
信息传播资源不平等的状况。该报告在很多方面反映了发展中国家的立场、观点、要求。通
过也意味着发展中国家在“新世界信息秩序”之争中取得胜利。
《大众传媒宣言》。
1978年，教科文组织第二十次大会以全票通过，这个宣言是发达国家与发展中国家妥
协的产物，它只规定了大众传媒活动的一般准则和规范，例如维护信息自由和人权、反对种
族差别和殖民主义、推进和平和国际理解等等，并没有解决任何实质性问题。因此，这个宣
言并没有引起各国重视，甚至在新闻传播学界也没有引起多大的反响。
《关于信息非殖民化的新德里宣言》内容P245
1976年不结盟运动在印度举行首脑会议，发布的。这个宣言在世界上产生了广泛的影
响，成为团结广大发展中国家的重要指针。
第I部分 传播学研究史和主要学派
一、传播学的起源、形成与发展
传播学形成于20世纪初40年代的美国，至50 年代形成自己的体系，我国的研究始于80
年代。
促成因素：
①从传播媒介的发展情况来说，在这个时期的西方国家，大众报刊和电影已经高度普及，作
为新的电子媒介的广播事业发展也十分迅速；
②从历史和社会环境来说，这是一个世界范围的战争与革命的时代；
③在这个时期，与传播学有着许多衔接点的一些社会科学，如新闻学、心理学等都已经充分
发展，为传播学提供了理论和研究方法的基础。
1、传播学的早期学术思想源流：
欧洲源流：法国的塔尔德（模仿理论）、德国的西默尔（网络理论）
美国源流：杜威、库利、帕克、米德、李普曼
李普曼的拟态环境和刻版成见
“拟态环境”是美国著名政治学家和新闻工作者李普曼提出的概念。所谓“拟态环境”，
也就是我们所说的信息环境，它并不是现实环境的“镜子”式的再现，而是传播媒介通过对
象征性事件或信息进行选择和加工、重新加以结构化以后向人们提示的环境。“拟态环境”
其实也就是经过“加工”后由媒介所展示的环境，它并不是完全真实的现实，而是对现实环
境的反映，这种反映或者较为真实，或者虚幻，也或者顿学歪曲。
“刻版成见”，指的是人们对特定事物所持有的固定化、简单化的概念和印象，它通常
伴随着对该事物的价值评价和好恶的感情。刻版成见可以为人们认识事物提供简便的参考标
准，也阻碍着对新事物的接受，个人有个人的刻板成见，一个社会也有其社会成员广泛接受
和普遍通行的刻板成见，因而它也起着社会控制的作用。
2、传播学的奠基者和学科开创者
四大奠基人：拉斯韦尔、卢因、霍夫兰、拉扎斯菲尔德
①拉斯韦尔的宣传与传播研究，美国现代政治科学的倡始人，1927年，他出版了《世界
大战中的宣传技巧》一书，对传播学的许多理论问题进行了研究。1948年发表的《传播在
社会中的结构与功能》一书，最早总结了社会传播的三项基本功能（环境监控、社会协调、
文化传承），并考察了基本过程，将其解析为五个环节或要素（即著名的“五W”：谁、说
什么、通过什么渠道、对谁说、产生了什么效果）。勾勒出了传播学研究的五个主要领域（控
制研究、内容分析、媒介研究、受众研究和效果研究），对形成传播学的理论体系的基本框
架具有重要意义。
②卢因与“把关人”研究，他对传播学重要贡献是提出了信息传播中的“把关人”的概念。
后来，这个概念被广泛应用到新闻和信息的选择、加工、制作和传达过程的研究当中，“把
关人”理论成为提示新闻或信息传播过程内在的控制机制的一种重要理论
③霍夫兰与说服效果实验，美国心理学教授，他对传播学的贡献，一是把心理实验方法引
进了传播学领域，二是他的研究提示了传播效果形成的条件性和复杂性，为否认早期的“子
弹论”效果观提供了重要的依据。
④拉扎斯菲尔德与经验性传播学研究。他是“两级传播”理论的提出者，认为大众传播
只有通过“意见领袖”的中介才能发挥影响。这项研究对否定“子弹论”起了直接作用，但
也开创了“有限效果论”的传统。
⑤施拉姆与传播学科的创立，施拉姆是人类历史上第一位传播学家，传播学学科创始人，
他巨大贡献在于：
⑴把美国新闻学与社会学、心理学、政治学等其他学科综合起来进行研究，在前人研究基
础上，归纳总结，修正使之系统化、结构化、创立传播学这是其最大功绩。1949年编撰其
第一本权威性著作《大众传播学》，标志传播学的创立。
⑵为断著书立说，推进传播学的壮大，主要有《大众传播学》、《报刊的四种理论》等
⑶大力推进传播学教育，扩大传播学在教育及学术界的影响培养众多知名学者，形成“施
拉姆学派“。
3、信息论和控制论对传播学的贡献（了解即可）
①香农的信息论与传播学
信息论是由香农提出的，它对于传播学研究的贡献在于，为传播学提供了一个具有普遍
意义的信息概念。1949年发表《传播的数学理论》中他和韦弗共同提出了传播学研究及模
式构成都发生了深刻的影响过程基本模式，著名的数学模式，给予传播学不少有益的影响，
开辟了以图解方式结构传播模式的先河，提出了如噪音以及由此产生的冗余信息等课题，给
予传播效果研究不断的启示，另外还解决了信息量度的问题，为传播学的定量研究提供了新
的方法。
②威纳的控制论与传播学
控制论是由威纳提出的，1948年他发表《控制论》一书，被称为“传播学的另一位伟大
的工程师”控制论在传播学中得到普遍运用。传播学的许多研究渗透控制论的观点，控制论
把反馈的概念引进传播过程研究，这对于认识人类的社会传播过程的双向性和互动性，具有
极为深刻的意义，“反馈”已经成为传播学的一个基本概念，它不仅指导着理论的研究，而
且指导着传播实践活动。
二、传播学的主要学派
1、经验学派：在广义上指的是主要以经验性方法来考察社会现象的社会科学流派，它与主
要以思辨性方法考察社会现象的流派相区别。在传播学中，经验学派尤其是以美国学者为代
表的主流传播学。
P267
经验性方法三个基本前提
经验性研究方法的主要原则
经验性方法的缺陷
美国的经验学派的特点：方法论上坚持经验性实证研究立场；实用主义的研究目的；多
元主义的社会观。
经验学派的研究成果P269
2、批判学派：它在社会科学的法兰克福学派的影响下，以欧洲学者为主形成和发展起来的
学派。
批判学派的特点：
第一，他们都对现行的资本主义制度持否定和批判态度，这也是他们之所以被称为批判
学派的最主要理由；
第二，他们更多地将传播理论和社会理论结合在一起，着重考察与社会结构和意识形态
相关的宏观问题，这些问题在经验学派的研究中大多有意无意地受到忽视和回避，但它们本
身的重要性和启发意义是不容置疑的；
第三，批判学派在方法论上以思辨为主，反对实证主义态度。但它们并不一般地排斥经
验调查和量化研究，近年来，辩证分析和经验调查相结合的方法，已
开始为不少批判学者所接受。
①政治经济学派：以英国的默多克和格尔丁为代表，该学派依据马克思关于一个阶级是
社会上占统治地位的物质力量，同时也是社会占统治地位的精神力量；支配着物质生产资料
的阶级同时也支配着精神生产资料的观点，从经济基础对上层建筑的决定作用出发来提示资
本主义社会大众传媒支配与控制的现状。
学派关心的一个焦点问题是现代媒介高度集中和垄断的趋势及其带来的社会后果。他们
认为，高度的独占和集中正是垄断资本控制着文化生产和流通的明证，大众传媒的活动最终
是为了维护垄断资本的利益、意识形态和统治权力。
学派主要从所有制关系和经济结构上来提示资本主义大众传播的内在矛盾和制度的非
合理性，对于传播内容本身没有给予更多的关注。
②文化研究学派（伯明翰学派）：以英国霍尔、莫利为代表。该学派继承了新马克思主
义的观点，反对简单的“经济基础还原”论，主张从上层建筑和意识形态的相对独立性出发
来研究资本主义社会的大众传播。
他们认为，大众传媒之所以能够作为“国家意识形态装置”从事“合意”的生产与再生
产，是因为它有一种“赋予意义”的独特功能。主要观点概括如下：
第一、大众传播是资本主义社会系统的一个重要组成部分，它在规定社会关系、行使政
治统治方面发挥着重要的意识形态功能，并具有相对的独立性。
第二、大众传播可以分为两个部分，一是文化产品的生产过程；二是文化产品的消费过
程。
第三、讯息符号是与一定的价值体系或意义体系结合在一起的。
第四、受众的版本号解读过程不是完全被动的，由于符号的多义性和受众社会背景的多
样性，受众可以对文本讯息作出多种多样的理解。
③意识形态“霸权”理论
意大利共产党创始人格拉姆西在《狱中笔记》最早作为社会分析的一个主概念加以使用。
他把现代国家的形成看作是作为“强制装置”的政治社会和作为“霸权装置”的市民社会的
融合，认为市民社会主要是通过“合意”或“同意”的组织化过程而维持统治的社会，随着
市民社会的发展，它将吸收政治社会而形成新型的国家。在现代资本主义社会，支配阶级不
再主要依靠国家、军队、法院等“强制装置”，而主要是通过意识形态“霸权装置”来维护
自身利益。
二、哈伯马斯的批判理论
哈伯马斯是德国学者，其代表作是1962年出版的《公共性的结构转换》和1968年出版
的《传播行为理论》。在这两种著作中，他提出通过改善“传播的合理性”来实现社会变革
的观点，他认为，近代以来的资本主义追求的是一种“工具合理性”的立场，提倡“综合的
合理性”，即主张通过扩展“没有支配和强制的传播关系”来改善社会，建立基于“理性合
意”的新型社会关系。
他主要以社会哲学和语言哲学的方法来探索传播与社会变革的问题，其中包含着对现行
资本主义社会的否定和批判，但也有不少学者指出，他的传播观中带有明显的“普遍主义”
和“伦理主义”的色彩。
3、批判学派和经验学派的区别：（补充）
①研究目的的差异：
经验学派主要为传播实践及其功能的充分发挥服务，维护现有的社会制度和传播制度，
实用性和经验性明显；
批判学派从哲学，社会学质化分析的角度探讨传播和社会结构要素的关系，目的在于通
过现状的研究，促进社会变革，因而要对现状进行分析与批判；
②研究焦点的差异：
经验学派的焦点在于传播效果和受众研究，批判学派重点在于宏观的传播体制研究；
③研究方法的差异：
经验学派主要采取量化的分析方法，注重实证，经验、微观；
批判学派主要采取哲学方法，强调定性分析的价值判断，注重思辨和宏观，不完全排斥
定量方法。
传播学界的五大先驱
（1）拉斯韦尔:五W模式
（2）拉扎斯菲尔德:意见领袖、二级传播、固定样本法、有限效果论
（3）卢因:守门人
（4）霍夫兰:个人差异论、军队
（5）施拉姆:开山鼻祖、传播模式


=====《社会学研究方法教程》=====

EquationChapter 2Section 1第一章：绪论
1、 社会研究：为了发现和解答社会领域中的各种问题而去收集资料、并对资料进行分析和
解释的过程。
2、科学研究方法体系三层次（北大2001<简>：简述社会调查研究的方法体系）：
(1)方法论：主要探讨研究的基本假设、逻辑、原则、规则、程序等问题，它是指导研究
的一般思想方法或哲学；
(2)研究方式：指贯穿于研究全过程的程序和操作方式，它表明研究的主要手段与步骤。包
括研究法与研究设计类型。 四种主要研究法：统计调查研究、
实地研究、实验研究和间接研究； 研究设计是对研究类型、研究程序
和具体方法加以选择并制定详细的研究方法。 研究设计分类：<1>根据研究目的：
描述性研究、解释性研究和探索性研究；<2>根据研究的时间性：横剖研究和纵观研究；<3>
根据调查范围：普查、抽样调查和个案调查；<4>其他分类：理论研究和应用研究；宏观研
究与微观研究。 (3)
具体方法与技术：包括资料收集方法（问卷法、访问法、观察法、量表法、实验法和文献法）、
资料分析方法（数据资料：统计方法、数理方法模拟法；文字资料：比较法和构造类型法）
和其他技术手段和工具。 三个层次相互联系：方法论影响研究者对研究
方式的选择，一定的研究方式又规定了一套与其相应得具体方法和技术。
3、科学：从确定研究对象的性质和规律这一目的出发，通过观察、调查和实验而得到的系
统的知识。
4、科学三任务：描述、解释和预测事物的产生、发展与变化。
5、科学研究：以系统的、实证性的方法获取知识
6、科学的性质：科学知识的性质：(1)系统性；(2)因果决定论；(3)普遍性；(4)开放性。科
学研究的性质：(5)实证性；(6)客观性；(7)明确性；(8)社会性。
7、科学的功能：技术、学术和社会功能。
8、 操作化：对假设中的概念作出具体定义。
9、 社会科学研究的特点：（１）研究对象复杂、异质性大；（２）研究更受个人因素的影
响；（３）研究对象的不确定性，偶然性和独特性更大。
10、 社会研究与社会调查：社会调查是一种了解客观事物的感性认识活动，而社会研究是
通过对感性材料进行思维加工来探索真理的理性认识活动。
11、 社会研究与社会学研究：社会研究泛指各种具体的、分门别类地对某一社会现象或社
会问题的研究； 社会学研究旨在探索人们的社会行动和社会关系，探索个人、群体和
社会三者之间及其内部各组成部分之间相互作用和相互影响的原因及结果。作为社会研
究之一的社会学研究更具综合性与实证性。
第二章：社会研究发展史
12、 实证主义方法论（北大92<详>：试说明在社会研究中实证主义与人文主义两种方法论
的主要观点；北大2003<简>：简述社会研究中实证主义方法论的主要观点）：（1）孔
德提出“观察优于想象”，“实证”含义：<1>现实的而不是幻想的；<2>有用的而不
是无用的；<3>可靠的而不是可疑的；<4>确切的而不是含糊的；<5>肯定的而不是否定
的。（2）孔德提出社会学研究方法：观察法、实验法、比较法、历史法。（3）马克思
方法论(复旦98<简>：马克思主义方法论的基本观点)：以经验事实为依据，以唯物辩证
法为分析手段，在具体的社会过程和社会联系中探求历史发展规律。主张通过直接考察
现实的“市民社会”来建立社会理论。（4）杜尔克姆：把社会事实作为事物来看待。(社
会事实（人大96<名>）: 在杜尔克姆看来,信仰体系、社会习俗和社会制度等现象是外
在于个人的客观地社会事实，个人对社会事实的反应就如同五支队外界刺激的反应一样)
（5）波普尔的证伪理论，“自由想象优于经验观察”：科学知识的起源不是像经验实
证主义所描述的那样起源于经验观察和归纳，而是从各种“问题”开始的。问题促使人
们的思索探究，促使人们作出各种假设式回答，然后通过事实证伪而形成知识。强调自
由想象的重要性，自由想象是科学创造中不可或缺的非理性因素。
证伪理论：波普尔认为不应通过肯定而应通过“否证”来构筑科学理论。
波普尔“假设检验法”或称“试错法”，是杜威的假设演绎法的修正与发展。
假设检验法公式：P1TTEEP2 式中P为问题，TT为试验性理论，EE
为排除错误。科学家遇到问题（P1）后先提出判断假说（TT），然后通过证伪检验来
排除假说中的错误（EE），形成理论后又会出现新的问题（P2），科学理论的发
展便照此公式循环往复的进行。（6）库恩的“范式”概念和“科学发展阶段论”：库
恩在对波普尔的假设检验法进行考察时发现，在研究的最初阶段既在“自由想象”
或“大胆假设”时，不同研究者可能会有不同的“想象”或“假设”，这是由于研究者
的知识结构，社会背景和历史背景等等不同。库恩使用“范式”这一概念来表示这一现
象。范式是指研究问题、观察问题时的角度、视野和参照框架。它是由一整套概念和假
定组成，它反映了科学家看待世界、解答问题的基本方式。科学研究的方法论规则并非
统一的、规范的，而是因人而异、随历史发展而变化的。各学科的发展都要经历下列阶
段： 前科学阶段常规科学阶段科学革命阶段新的常规科学阶段
<1>在前科学阶段,存在着各种研究范式的相互竞争与相互批判；<2>常规科学阶段，一
门学科开始成熟了，其标志是各个科学家集团统一在一种研究范式中，他们有共同的概
念体系、共同的假定和方法论原则；<3>当这门科学遇到无法解答的新问题，原有的研
究范式不适用时，就进入到科学革命阶段，科学家又分为不同的集团，他们求助于哲学
思辨和理论创新；<4>直到有重大的理论或方法的突破，才能使科学家们重新统一在新
的范式中，进入新的常规科学阶段。
库恩方法论思想的启示作用：<1>他把社会历史观和非理性因素引入科学和科学研究过
程，打破了“科学万能论”，完善了波普尔的科学发展观；<2>他的“科学发展阶段论”
说明：存在多种方法论或研究范式。一种“范式”只有当它能有效地解决某一学科领域
的所有新问题时，才能为大多数科学家所共同接受；<3>目前社会科学尚处在前科学阶
段或科学革命阶段。
13、 反实证主义的方法论（ 北大92<详>:试说明在社会研究中实证主义与人文主义两种方
法论的主要观点）:(1)狄尔泰：由于人具有自由意志，因此人的行为是无规律的，且无
法预测的。此外，社会历史事件都是独特的、偶然的，不存在普遍的历史规律。因此，
对人和社会不能用自然科学的方法来研究，而只能以人文科学的主观方法对具体的个人
和事件进行解释和说明。 （2）社会学现象学派：应当通过对社会环境和个人境遇的实
地考察，深入到行为者的意义与动机的领域，揭示出指导人们行动的内部逻辑。社会学
的主要任务是具体而微的描述实际的社会生活，而不是探求并不存在的社会规律。
上述观点根本否认社会规律和社会事实的存在，完全反对使用自然科学的方法研究社会
现象，他在批判实证主义的缺陷的同时又走到了另一个极端：即人文学科的主观方法论。
就此而言是不足取的。（3）韦伯既反对实证主义，也反对主观主义：<1>与实证主义不
同，他认为，自然现象与社会现象有本质的不同。后者含有社会成员对自己和他人行为
的主观理解，因此是社会事实是可理解的事实。必须首先观察行动者的主管思想状态，
并依靠研究者的直觉或“理解”对行为的意义作出判断。<2>与人文学派不同，韦伯指
出，由于人的社会行为是有意义、有目的的，因而是有规律的，对这种规律性的行为可
以采用自然科学的方法加以研究。但是，社会研究对人的行为的因果解释不是仅仅通过
外部表现和外部影响，而是还必须通过对人的行为动机的理解。<3>韦伯认为，独立于
人的主观意识之外的社会规律是不存在的，但是通过对理性行为的理解，就可以找出社
会现象的规律性，可以对人的行为作出预测。<4>韦伯“社会学”定义：对社会行为进
行解释性理解，以便说明行为的原因、过程和结果的科学。韦伯的方法论原则目前为许
多社会学家所接受。（4）历史社会学派：强调社会学与历史的密切联系。主张在社会
研究中发挥历史和哲学的想象力，运用思辨和比较等方法。 （5）评论：反实
证主义学派提出了许多令人深思的观点，他们对实证主义的批判动摇了孔德的实证体
系，但是却未能改变社会学的实证传统。实际上，对实证主义持怀疑或反对态度的社会
学家，大多数只是反对照搬自然科学方法或滥用数量分析方法，而并不反对以经验事实
为依据来建立和检验理论这一实证原则。]
第三章：社会研究的方法论问题
14、 社会研究的层次（北大2000<简>：举例说明社会学研究的主要研究层次；浙大2001<
简>:简述社会研究的层次）： （1）宏观层次：将社会视为一个有机整体，
侧重从文化和历史的角度来研究社会整体的性质和发展规律。主题有：<1>社会变迁研
究：是在文化层次上，即从历史演化的角度来发现并解释社会发展的规律（主要研究方
式：文献研究、历史-比较研究）；<2>社会结构研究：从社会系统的相互联系入手来分
析社会体制；（主要研究方式：文献研究、统计调查）<3>社会行为与态度的研究：将
许多个人的行为或态度视为一个整体，由此来分析、预测人们的社会行动。（主要研究
方式：统计调查）
（2）微观层次：微观研究是从个人或群体入手，通过观察人们的社会交往来发现社会
行动的意义、特点与其社会环境的复杂关系。主题有：<1>人的社会化；<2>人际关系
（主要研究方式：实地研究、实验）；<3>个人与社会环境的相互作用。（主要研究方
式：实地研究、统计调查） （3）社
会单位层次：是从群体结构和集体行为入手，直接考察实际的社会单位，如社会组织、
社会群体和社区：<1>社会组织研究（主要研究方式：实地研究、统计调查）；<2>社
会群体研究（主要研究方式：实地研究、实验）；<3>社区研究（主要研究方式：实地
研究、统计调查）。
15、 整体论与个人论：（1）整体论认为:社会的性质不是由其部分的性质决定的。社会整
体决定其各个部分的本质，由此推论出，社会研究的基本分析单位是社会整体，如社会
文化、社会制度、社会结构等，因为社会现象的存在与变化只能由整体特征或宏观变量
来解释，而不能归结为个人特性，即不能还原到个人心理或生理层次。（2）个人论认
为：社会研究的基本分析单位是个人，因为个人是有意义行为的唯一承担者，而国家、
团体、社会制度等整体概念都是表明人们互动的某种范畴，他们都可以还原为个个参与
者的行动。（3）二者分歧在于：个体论主张采用分析或分解的方法，并在基础层次上
对事物作出解释，而整体论主张通过解释整体的本质来解释各个具体事物。（4）整体
论（或系统论）是当代富有启发性的新思想。它正确地强调只有了解一个有机系统个部
分之间的相互联系，才能认识系统的本质属性。但他并没有提供一套研究有机整体的操
作方法。此外，从整体论推导出社会研究应当“从社会整体出发”也是不恰当的：<1>
从分析单位看，整体与个体是相互补充的。<2>在具体研究中要考虑社会整体的所有联
系，不仅难以做到，也没有必要。<3>实际上，社会现象既是综合的，也是可以区分为
各个特殊类型的，这就需要采用“具体问题具体分析”的原则，而不能实现将社会研究
限定在某一层次或某种分析单位上。
16、 研究范式（北大99<简>：简述社会学的三种研究范式；北大2002<名>；浙大99<简>：
里尔茨所区分的三种社会学研究范式；）：范式: 是指某一特定学科的科学家所共有的
基本世界观。里尔茨区分了社会学三种不同的研究范式：（１）社会事实范式（结构功
能学派、冲突学派、新马克思主义学派）。以杜尔克姆的方法论思想和现代的结构功能
理论为代表的，强调社会现象的客观性，认为社会现象是客观的事实，他们不能还原为
个人的事实。强调对宏观的社会结构、社会制度、文化规范进行研究，在社会结构层次
和文化层次探讨社会的本质属性。（２）社会定义范式（符号互动论、现象学、民俗方
法学）。以韦伯的思想为代表，强调社会现象的主观性质，认为一些宏观的社会现象（如
国家、制度、阶级等）都不是有形的实体，它们是由人们的主观定义建立的，因此社会
现象是不可能与个人的动机、态度和行为相分离的。这也是个体主义方法论的主要论点。
社会定义范式强调在微观层次研究人们是如何建立社会、如何在社会中行动的。（３）
社会行为范式（行为理论、交换理论）。以行为科学的方法论为代表，强调对个人的社
会行为进行客观精确地分析，主张用经验的或实证的方法研究社会现象。只有通过对人
的外部行为进行经验观察，才能认识社会现象的因果关系，才能像自然科学那样客观地
解释社会现象。（４）评价：以上几种研究范式都只是强调社会现实的某一侧面，但他
们对于全面认识社会都是必不可少的。尽管这几种范式使用的基本假设、概念和研究方
式各不相同，不过在实际研究中，他们又是相互联系的。各种范式都有其合理性和局限
性。
17、 社会规律：（１）社会总体的统计规律，他只是一概率的方式说明总体的状态或倾向，
而并不排除个别的特例。（２）由社会规范和社会制度所规定的相对持久的行为模式。
（３）适用于特定社会、特定历史时期的经验规则。
18、 投入理解法（北大2000<名>）：即研究者站到被研究者的立场，设身处地地理解行为
者的内在动机，主观的判断影响社会行为的内在原因。
19、 价值中立（价值无涉）（南大2000<名>）：研究的目的不在于判断好坏与善恶，而在
于判断真假或是否，因此研究者必须采取客观的态度，排除个人的价值观和主观偏好。
20、 社会理论的构造（北大95<问>：简述概念、变量、调查指标的定义、各自在社会调查
中的作用及三者的关系；南大98<简>：对社会学研究概念举例说明概念的来源；复旦
96<简>：什么是理论、假设、概念、变量、指标及它们之间的相互关系）：
（1）社会理论：是一套加以系统陈述的，以可靠的经验资料为基础并在逻辑上相互联系的
命题。
（2）理论的基本要素：<1>概念、<2>变量、<3>陈述、<4>形式。
（3）概念:它是对研究范围内同一类现象的概括性表述。 <1>实体概念和非实体概念。
<2>综合概念：由一些低层次的概念构成的概念。<3>概念组成：名词、抽象定义和经验内
含。名词是对同一类现象的概括，抽象定义界定这些现象的范围和主要特征，经验内含是由
名词所指示的那部分现象，它在经验层次上与名词和抽象定义相对应。
（4）变量：是概念的一种类型，它是通过对概念的具体化而转换来的。<1>变量作用：由
于变量具有明确性和可观测性，因此只有使用变量语言才能进行有效的经验研究。近几十年
社会研究科学化的主要表现之一就是不断改进其变量分析方法。<2>自变量(北大92<名>)：
在一组变量中 ，能够影响其他变量发生变化，而又不受其他变量影响的变量。自变量一般
是对所研究现象的一种解释。 <3>因变量：依赖于其他变量，而又不能
影响其他变量的变量。因变量一般是我们所希望解释的现象。
<4>变量间的关系(北大2003<问>:举例说明在变量关系解释中因果关系和相关关系的异同；
南大98<简>：结合具体命题，说明假相关与因果关系及相关关系的联系与区别；吉大2000<
简>：简述变量关系的类别；浙大2001<简>：简述变量间的关系):
 相关关系 (复旦96<名>):如果说变量x与变量y有相关关系，即若x有变化、y也有变
化，反之也一样。在相关关系中，一般无法区分哪个是原因，哪个是结果，两者是互为
因果的。正相关（直接相关）与负相关（逆相关）
 因果关系（南开2001<名>）：在具有相关关系的两变量中，如果明确说明了一个变量
的变化引起了另一个变量的变化，那么这种关系就可以称为因果关系。 因
果关系条件：（1）x和y有相关关系；（2）x、y之间的关系不是由其他因素形成的；
（3）x的变化在时间上先于y的变化。
 虚无关系:从某一个变量的变化很难预计到另一个是以怎样的方式发生变化的。即表明
两变量不存在共变关系。
(5)命题与假设（北大98<名>）：<1>命题是对现象之间的关系的陈述。 <2>
命题的类型：
 公理：处于理论的最高层次，它是高度抽象的陈述，可以作为理论的出发点，其他所有
的理论命题都可由公理推演出来。公理的正确性是由定义或假定而来的，他无法直接被
经验检验，而只能通过对他的逻辑推论的检验而得到部分证明。
 定理（人大98<名>）：是由公理推导出来的，它可被经验事实来检验。公理式的理论
是以演绎三段论为基本形式的。
 经验概括：不是由公理或定理推导来的，而是通过对大量事实的观察而归纳出来的，它
的经验色彩较浓，而抽象程度较低。
 假设（南开2001<名>：科学假设）：在研究之前提出的待检验的命题。对所要研究的
问题做尝试性回答，一般来自对某一理论的演绎推理。假设必须是可检验的，必须能够
以变量语言来表述。 假设的陈述方式：A函数式陈述；B条件式陈述；C差异式陈
述。 假设的作用：A指导研究：科学研究一般都以假设为起点，“大胆
假设，小心求证”； B 逻辑推导：科学研究就是运用不同抽象层次的假设，来完
成由抽象到具体或由具体到抽象的往返过程。C 发展理论：假设经过证实或证伪，可以
增进科学知识。
21、 理论的形式：特纳根据理论陈述的不同组织方式区分了当代社会理论的四种主要形式：
（1）思辨理论：并不关注于解释具体现象，主要从哲学角度探讨理论的核心概念和基
本假设。缺点：仅停留在哲学问题的争辩上会使社会理论的建设停滞不前。
（2）分析理论（人大９８<名>；人大９９＜名＞＝：侧重对人类社会做出类型学的划
分，试图建立一套概念体系和分类框架。其中，每一概念都用以指明人类社会的一种基
本现象；分类框架用于把社会分解，使每一经验现象都在分类体系中有一个确定的位置。
一个经验现象一旦被归入某一类型，就可以用这一类型的性质对它做出解释。
缺点：局限在抽象层次，很难对其理论陈述做出经验检验。（３）演绎理论：也称为“形
式理论”，是试图仿效自然科学的公理式理论而发展起来的。这种理论形式上是由一系
列不同抽象等级的命题构成的，从高层次命题中可推演出低层次命题，他们可用以解释
具体的经验现象。演绎理论与公理理论的区别：<１>演绎理论缺乏公认的公理或公设。
<２>演绎理论的逻辑推演不严格。<３>演绎理论的陈述往往不具有公理理论的普遍性。
（４）模型理论（人大98<名>;人大2000<名>）：一般是由经验概括而来的，抽象层
次较低，社会领域中大部分模型是依靠数学和统计学的方法通过对经验变量的因果分析
建立的。缺点：一般知识用于特定的经验现象或事件，很难上升到更高的理论层次。（５）
评论：社会理论的四种形式中，只有演绎理论最具有科学理论的特征，因为只有通过不
同抽象等级的命题的联系才能既具有高度概括性，又具有可证伪性。但是，演绎理论的
建立需要将经验研究所积累的大量数据资料与理论研究所发展的概念体系及分类框架
结合起来。而在目前的社会研究中，这两者往往是脱节的，这种状况导致了目前社会理
论的贫乏和落后。
22、 个性解释与共性解释： （１）个性解释：对某一独特事件或个人行
为的解释，即对其特殊性的解释。 类型：<１>发生学解释：多用于历史研
究，从历史根源或历史发展上说明事件的产生经过； <２>意向性解释：多用于
理解个人行为，通过对行为动机和目的的分析来解释这一行为；<３>倾向性解释：类似
于意向性解释，用于分析个人行为，但倾向性解释永个人的性格、态度、思想倾向来说
明； <４>多因素解释：在应用性研究或政策研
究中最常用，这种方式是例举各种因素。 （２）共性解释（人大2000<名>）：这
种解释方式是试图找出对某一类型的行为或现象都有影响的最主要的因素。旨在用最少
的原因变量去最大限度的解释因果关系的一般模式。<1>因果解释；<２>功能解释。
23、 因果解释(南大97<简>：试述因果分析的逻辑方法)：科学的解释是以系统的理论来说
明现象之间普遍的因果关系，科学哲学家亨佩尔指出，一个科学解释是由解释项和被解
释项组成的。被解释项是研究这要说明的现象，解释项是一组关于这一现象发生的先决
条件的陈述，即原因，由一定规律决定的，因果解释指出某些普遍规律，由于这些规律，
那些被称为原因的事项就成为被解释项出现的充分条件，因此，因果解释是演绎性的。
（１）英国哲学家穆勒总结出：归纳因果关系的方法：<１>求同法；<２>差异法；<３>
求同求异法；<４>共变法；<５>剩余法。（２）Ｗ．华莱士区分了探求因果解释的物种
策略：<１>原因解释；<２>结果解释； <３>内部构成解释；<４>外部背景解释；
<５>分类解释。
24、 功能解释（北大94<名>：结构－功能分析；人大99<简>：简述“功能解释的理论视
角及其缺陷；浙大2000<简>：如何评价功能解释）：（１）功能解释：不是说明变量
间的因果关系，而是通过发现一个现象对它所属的较大体系具有什么功能来解释该现象
的存在。（２）适用范围：功能解释适于说明一些独特的社会现象，如原始社会的独特
习俗，某种社会体制中的道德规范等，还适合于说明一个自我调节系统。（３）基本假
设：<1>任何社会都象有机体那样有其基本的功能需要（或功能先决条件），只有满足
这些基本需要，社会才能生存下去。<２>任何社会现象都是与一定的功能需要相联系的，
它们都是为满足基本功能需要这一目的而存在的。 （４）评论： <１>功
能解释是一种目的论解释，容易陷入循环论证或同义反复中。目的论解释以将来的结果
中所体现的目的或功能来解释现在或过去的现象。这不仅不符合逻辑，而且也不满足可
检验性这一科学要求。<２>还被指责为是为现存的社会制度辩护，因为它说明现存的一
切制度、机构都是必要的、合理的、都有助于维护社会正常运转和协调发展。
25、 中层理论：由于社会现象复杂多样，需要采用多种解释方式。个性解释是用于解释日
常的现象、独特的历史事件以及涉及主观动机的个人行为。但科学的社会研究主要采用
共性解释，其中演绎理论和功能理论是应用最广泛的解释方式。演绎理论能满足可检验
性和概括性的要求，能对社会现象做出科学的解释。但是由于很难将社会现象的因果联
系概括为一些普遍的规律，因而他们的适用范围是很有限的。而功能解释尽管能有效的
说明许多社会现象，但它本身存在很多问题和局限。目前，许多理论家致力于发展一种
具体的、中型的理论，他与经验层次和抽象层次都有较密切的联系，能系统的解释范围
较小的社会领域或社会层次中的现象，这就是默顿所倡导的“中层理论”所指示的方向。
第四章：社会研究的过程
26、 科学环：社会学家华莱士1971年提出社会研究的逻辑模型，即“科学环”。在这一
模型中，华莱士用方框表示五个知识部分：（１）理论，（2）假设，（3）经验观察，
（4）经验概括，（5）被检验过的假设。 用椭圆表示研究各阶段中使用的六套方
法：（1）逻辑演绎方法，（2）操作方法，（3）量度、测定与分析方法，（4）检验假
设的方法，（5）逻辑推论的方法，（6）建立概念、命题和理论的方法。各个知识部分
通过各种方法转换为其他形式。箭头表示知识形式转换的阶段。中心线的右边是理论演
绎的过程，即把理论应用到现实中，在这一过程中使用演绎法。中心线的左边是理论建
构的过程，它首先是运用归纳法有经验观察概括出研究结论，然后再上升到抽象的概念
和理论。在横剖线的上方属于理论研究，处于抽象层次。下方属于经验研究。这一模型
是对社会研究中各种逻辑过程的概括，表明了社会研究是从理论假设观察概括或
检验新的理论，这样一个周而复始，无限循环的过程。他的优点在于没有始点也
没有终点，研究工作可以从任何一点开始。华莱士的逻辑模型可作为社会研究的“指南”，
可是我们了解各种研究在整个科学过程中的位置和作用。
27、 归纳与演绎：（1）归纳：是从经验观察出发，通过对大量现象的观察概括出具有普遍
性或一般性的结论。（2）演绎：从一般原理或理论出发，通过逻辑推理来解释具体的
事件或现象。（3）关系：历史上，归纳逻辑与演绎逻辑往往是对立的，直到20世纪，
由于波普等人的贡献，而这才在假设检验法（试错法）中结合起来。归纳是从特殊到一
般、从个性到共性、从具体到抽象、从经验到理论，而演绎则相反。（4）归纳逻辑的
局限： <1>由一些个别事例概括出的一般性结论并非是可靠的，它有可能被其他未
观察到的事例所推翻。<2>由归纳不可能逻辑的推论出一般原理，因为由归纳得到的结
论指示对一些具体的、个别的经验现象的概括，它只适合于一定的时间、地点、场合、
范围，它仍停留在经验层次。<3>可以说，归纳逻辑的主要作用是发现经验事实之间的
联系，而不是发现一般原理。（5）演绎逻辑的局限：由于演绎的大前提，即一般原理
或公理有可能是错的，所以有它推演出的命题也可能是错的，这样的命题不可能有效的
解释具体现象。此外，单纯靠演绎也不可能发现理论的错误。
28、 假设检验逻辑：（1）假设检验法（复旦97<名>：假设演绎法；复旦98<名>：假设检
验）：是从理论推导出研究假设，然后通过观察来检验假设，假设如果被证实，就可以
对被观察到的具体现象作出有效的理论解释；假设如果被证伪，就要对理论作出修正或
推翻原有理论、发展新理论。（２）假设检验法包括演绎和归纳两种逻辑，演绎只是从
一般原理推导到具体现象，而假设检验则需要完成一个循环，即再从具体观察返回到理
论，在返回过程中是运用归纳逻辑。这样，一般原理才有可能在实践中得到应用和检验。
（３）假设检验法比归纳法多了一个理论演绎的过程，其优越之处在于：<１>如果没有
理论假设的指导，那么经验观察就有可能是盲目的且缺乏系统性；<２>单纯归纳法只能
得出经验现象的概括，而不能检验理论结论是否正确。假设检验法则可以将经验概括与
假设进行比较来检验理论的真伪。
29、 经验概括：经验资料可分为案例资料和统计资料。（１）案例资料的归纳方式： <
１>列举归纳：通过简单枚举建立经验概括。<２>排除归纳（人大2001<名>）：即在
许多命题中，排除不符合客观事实的命题，保留违背事实所反驳的命题以建立经验概括。
<３>区别：“列举归纳”一般是得出一种普遍现象的概括，而不涉及这一现象的产生原
因；“排除归纳”则试图概括某一现象的普遍原因，它以 现象之间的必然的因果关系
为根据，因此，它也称为科学归纳法。（２）统计资料的归纳方式：“统计概括”，它
也是一种经验概括，依据概率原则，它说明，只要样本是从总体中随机抽取的，那么在
样本中发现的现象或变两件关系也可以在总体中观察到。（3）统计规律（具有普遍性
的经验概括）与定律的区别：统计规律是孤立的经验命题，它还没有结合到一个理论体
系中，而定律则与许多抽象的理论命题相联系，它能系统的解释现象。（4）经验概括
的作用：能为新理论提供事实根据，能够检验原有理论中的错误。更重要的是，它能使
研究者从预料不到的事实中或偶然发现中得到启发与顿悟，从而提出一些新的概念或想
法，以此为线索来建立新的理论。
30、 从经验概括到理论（浙大2001<简>:简述从经验概括到理论的步骤）波普指出:不存在
任何获得新思想的逻辑方法或逻辑改建过程,任何科学发现都包含非理性因素或”创造性
的想象”,正如爱因斯坦所说,没有任何逻辑途径可以直接导致定律的发现,只有依靠直觉、
依靠研究者的专业酷爱才能得到定律。 （1）建立理论解释步骤：<1>建立解释
项的概念，这一抽象概念包含经验概括中的各种变量得共同属性或特征；<2>建立被解
释项的概念，他在更抽象、更普遍的层次上表明所研究的具体现象；<3>建立解释项与
被解释项相联系的命题，它以原有的经验概括为基础；<4>建立多个命题，它们包含上
述的解释项或被解释项，然后将这些命题组织在一个逻辑上相互联系的理论体系中，有
理论可推导出新的可被检验的假设。（2）抽象的策略：理论建构的关键是从具体的经
验事实中抽象出社会现象的普遍意义或本质特征，这需要创造性的想象力。策略有：<1>
列举共同因素；<2>利用现有的理论和抽象概念作出解释；<3>探寻背景联系；<4>询问；
<5>内省。 （3）扎根理论（GroundedTheory）(人大99<名>)：
由经验资料建立的理论，其主要特点不在于它的经验性，而在于它从经验事实抽象出了
新概念和新思想。 它的建构程序是：<1>
未经研究假设而直接从实际观察入手；<2>从观察资料中归纳出经验概括；<3>由经验
概括上升到理论。 评论：<1>它是一种事后解释，即它是在收集到
事实之后所作出的主观解释，尽管这种解释与观察到的事实相一致，但它不是唯一的，
从同一事实或同一经验概括中可以跳跃出不同的理论解释；<2>它的缺陷在于，无法从
众多可能的理论解释中判断或检验哪一种更真实可信，这也是有经验观察出发的社会研
究的共同缺陷；<3>这种理论缺乏必然的可信性，因为它所依据的经验证据是由不完全
归纳提供的。经验研究的四种功能（北大<问>：调查研究对于理论的四种功能）：经验
研究并不局限于检验理论，默顿写到：“经验研究远远超出检验理论的被动功能，它不
仅仅是正是或反驳假设。研究在发展和形成理论方面至少发挥着四种主要的积极功能：
创造、改进、反思和澄清理论。”
31、 理论检验研究：研究的最终目的是要更真实、更有效、更合理地解答所要研究的现实
问题或理论问题。这种以假设为开端的研究称为理论检验研究。在科学环中：它包括理
论假设经验观察经验概括接受或拒绝假设理论五个阶段。（1）理论推演研
究假设的方法：<1>逻辑推演：从公理推演出定理（或理论假设），也称为命题逻辑推
演。 作用：从无法被检验的公社中推导出可被检验的理论假设。特点：公社与推
导出的假设都处于同一抽象层次，这样就能使经验观察与理论有一致的逻辑联系，理论
假设如果被证实就可以直接证实理论。缺陷：在社会科学中，概念的定义于对概念的测
量并不像自然科学那样完全一致，因此这种严格的逻辑推演是无意义的。因此，有些社
会学家（如霍曼斯等人）主张用定义逻辑推演，它的特点是，由理论推演出的假设是较
低抽象层次的理论命题，它可应用于具体的时间地点，还可指导观察资料的收集工作。
<2>经验推演（北大93<名>）：把理论假设中的概念与经验变量和指标联系起来，然后
再经验层次上建立工作假设。在社会研究中，经验推演是与逻辑推演相结合的。 工作
假设：作出理论概念的操作定义之后，就可以选择一些可被检验的、可直接观测的、具
体的测量指标，用它们来重新陈述理论假设。
概念操作化：由理论概念到工作假设的过程。操作化是对理论概念作出解说和抽象定义。
说明在何种范围、何种意义上使用这一术语，然后建立概念的操作定义，选择和制定测
量概念的指标和方案，最后用可被观测的变量和指标来重新表述理论假设。
经验推演的作用：把抽象的理论概念转化为可以观测的指标，是理论可以在实践中得到
检验。能使研究者明确地认识到，要收集何种经验资料，在何种范围进行调查等等。
经验推演的缺陷：由于概念、变量和指标处于不同的抽象层次，概念与变量、变量与指
标、概念与指标之间的联系不是通过严格的逻辑推导建立的，而是主观假定的，因此它
们有可能不一致；变量有可能未界定出概念的本质属性，指标有可能反映不出概念的真
实内涵或只反映其中一小部分内涵。因此，工作假设被正式并不能直接证实理论假设，
理论假设被验证也并不能直接证明理论的有效性和真实性。（2）假设的检验：<1>研究
假设与虚无假设：研究假设通常是陈述两个现象之间有相关关系，主要检验方法：直接
检验（就是收集大量经验资料去直接验证假设）和间接检验（提出一个与研究假设相反
的虚无假设）。间接检验的前提：调查样本是从总体中随机抽取的。间接检验的作用：
（A）收集经验资料以反驳虚无假设，从而证明研究假设是正确的；（B）说明研究假
设不仅在调查样本中成立，而且在总体中也成立；（C）说明研究假设中变量之间联系
的有效范围。 <2>研究假设与理论解释：反驳研究假设
的方法：（A）简单证伪法：寻找否定研究假设的经验证据，这些证据可说明，在什么
条件下研究假设部成立，并说明理论解释的局限和缺陷所在。简单证伪法需要在不同地
点、不同历史时期、不同社会条件中收集反例，并以这种反例来怀疑或否定某一理论解
释的真实性。（B）理论证伪法：是对多种理论解释进行检验，以便选择一种更有说服
力的解释。在许多个假设的检验中，如果某种理论解释比另种解释得到越来越多的支持，
那么后者将逐渐失去可信任和解释力，最终可能被证伪。一般说来，一种理论不会轻易
被完全推翻，由他推演出的研究假设即使被否定，常常是促使理论作出修改或补充；只
有它在多次或多个假设检验中都受到怀疑时，才有可能陷入无法挽救的境地。这是由于，
一般理论是抽象的、普遍的，而研究假设则是经验的、具体的，研究假设是由理论通过
经验推演而得出的指标（或变量）构成的，指标只反映概念中的部分内容，因此指标见
得不相关并不一定证明概念之间不存在关系。此外，研究假设是在具体的时间、地点对
某些样本作调查来检验的，他在某些条件下被否定并不说明理论解释在其他条件下也不
成立。由于同样的原因，研究假设被证实也不能证明理论解释是真实的、有效的，这种
证实只是在某一方面提供了支持理论解释的证据，而不是作出普遍的、全面的验证。
<3>检验的步骤：（A）确定研究课题、选择理论解释，明确表述所要检验的理论。 （B）
运用逻辑推演从理论推导出一组理论命题（称为理论假设）。（C）运用经验推演将理
论假设专署为具体的研究假设（也称为工作假设）。（D）收集有关资料。（E）整理分
析资料。（F）检验与评判理论。
32、 研究步骤（北大98<简>：简述科学研究的一般程序；）：（1）研究步骤：<1>准备
阶段；<2>设计阶段；<3>调查阶段；<4>资料整理与分析阶段；<5>总结阶段。
（2）确定研究课题：<1>研究问题的提出（人大99<简>：简述“研究问题”在科学研
究中的意义）：（A）科学研究始于问题。问题可以指出研究的目标和方向；（B）可以
指导观察资料的收集工作。（C）提出新的问题，新的可能性，从新的角度去看旧的问
题，需要有创造性的想象力，它们标志着科学的真正进步。从这个意义上说，正确地提
出一个问题，往往比解决一个问题更重要。 <2>研究问题的选择（浙大
2001<简>：确定研究课题的因素有哪些；南大2000<简>：怎样选择调研课题）：（A）
理论意义。学术界公认的重要题目或必要题目。（B）应用价值。能解决社会现实问题，
包括对社会长远发展有价值的问题。（C）迫切性。当前迫切需要解决的理论和实际问
题。（D）可行性。能够得到社会及各有关部门的重视和支持，在研究力量、经费、人
员配合、资料提供、被调查者协作等方面得到较可靠保证。（E）研究者的主客观条件。
研究者本人的兴趣、学识、能力、精力、时间、研究条件等等。 （3）
选择研究类型：<1>应用研究；<2>理论研究。<3>描述性研究（人大99<名>）：目的
是系统了解某一社会现象的状况及发展过程，它通过对现状的准确、全面地描述来解答
社会现象“是什么”的问题。
解释性研究（人大98<名>）：试图对社会现象作出普遍的因果解释，以解答“为什么”
的问题。 探索性研究：也称先导研究，是对某一课题或某一现象进
行初步了解。它既可以作为一项独立的研究，也可以为进一步周密、深入的研究工作做
准备。 （4）探索性研
究的内容：<1>查阅文献： 作用：（A）了解以往研究成果；（B）了解与研究课题
有关的各种理论观点和研究方法；（C）了解研究对象的社会历史背景。 查
阅文献方法（人大96<简>：简述如何查阅文献）： 查阅文献应当有目的、有选择。研
究这可以首先利用图书馆检索工具找出与研究课题有关的文章、论文、书籍和调研报告，
如百科全书、辞典、出版年鉴或报刊文摘、《新华文摘》上有关专题目录索引、社会科
学刊物（如《中国社会科学》、《社会学研究》、《社会调查与研究》、《政治学研究》、
《经济学研究》等杂志）的目录索引、专业书籍索引等等。除国内理论文献外，有条件
的话，还应查阅国外和其他专业领域（如哲学、历史学、心理学等）的理论文摘。然后
经过浏览筛选出重要的、有参考价值的文献，对这些文献要详细阅读、作摘要或资料卡
片。收集研究的背景资料，可利用各类“统计年鉴”、“统计报表”、政府部门的调研
报告、有关法律法规、省（市）与地区概括、县志史等。另外，还可结合实地观察，收
集当地的社会经济等方面的文献以及私人的传记、信件、回忆录等。 <2>请教专
家：所谓专家，指熟悉这一研究题目的人；<3>实地考察：时到研究现场去观察、询问，
以增加感性认识，明确调查内容，确定研究方法。
（5）提出研究假设：社会学家古德等人提出，假设必须满足以下几个条件：<1>以明确
的概念为基础；<2>具有经验的统一性（即能被经验检验）；<3>对假设的适用范围要
有所界定；<4>与有效的观测技术相联系；<5>与一般理论相关联。
假设的来源：<1>可通过查阅理论文献而得出；<2>可从实地考察或访谈中得到；<3>有
些研究中，假设的建立市结合了上述两种方式假设先行与观察先行：有人对从自然科学
引入的假设先行的方式提出了异议。他们认为，由于假设是一研究者选择的抽象概念对
现象之间的关系所作的尝试性或推测性的判断和解释，因此“假设先行”会严重的歪曲
客观事实。<1>首先，从方法论的观点看，抽象概念是研究者主观设定或选择的，他不
同于从经验资料中概括出的概念，他只代表研究者所偏好的理论或研究范式，这就会是
研究者仅局限在他的特定角度或眼界中去观察问题，而且有可能会有意无意地收集对他
的假设有利或不利的证据（视他想验证或否证假设而定）。 <2>其次，
从技术角度看，事先建立假设会排除许多可能有影响的变量，这就不仅使观察带有框框，
而且会忽略许多未预 想到的经验事实。由于这些弊端，他们主张“观察先行”，即不
带假设进行客观的调查。 反驳：<1>假设并非是完全主观
的猜测或臆想，它们是建立在以往的经验和理论之上的；<2>任何研究都是受一定理论
或方法论的指导的，都基于一定的理论前提，即便是“观察先行”也要以一定的理论框
架来概括经验资料。<3>假设所选择的变量是从实际上活中筛选出来的，这一筛选过程
实际上跟“观察先行”的方式是一致的（如探索性研究）。<4>任何研究都要以一定的
假设或设想为指导，否则观察就会是盲目的，当然，这种设想的清晰程度是不同的
第五章：社会研究的设计
33、 描述性研究：同探索性研究一样都没有明确的假设，也是从观察入手来了解并说明研
究者感兴趣的问题。但进入观察阶段之前必须有一些初步的设想，以避免观察的盲目性：
（1）研究的时间性：在横剖研究与纵贯研究之间做出选择；（2）研究的空间范围：以
确定观察的地点和对象；（3）研究的主题和内容：明确本次研究究竟要描述什么；（4）
研究层次和角度：经验层次还是抽象层次；宏观层次还是微观层次；（5）具体化与操
作化：对所使用得概念作出具体定义。（6）调查对象的选取，若为抽样调查，还要确
定选取的方法与程序。
34、 解释性研究：主要运用假设检验逻辑，在研究之前需要建立理论框架（理论假设）并
提出一些明确的研究假设，然后将这些假设联系起来，构成一个因果模型。建立这些模
型的三种方式：（1）列出现象的原因或结果；（2）详析两变量间的关系：与上一种方
式不同，他不是在研究之前就列出各种原因或后果，只选择一个最主要的自变量建立研
究假设，然后用各种资料来检验这一假设，并在深入详细地分析了这两个变量于其他变
量之间的关系之后再建立因果模型；（3）深入分析变量件作用的机制。
35、 横剖研究（浙大99<名>;浙大2001<名>;南大2000<名>）：是在某一事件对研究对象
进行横断面的研究。所谓横断面是指研究对象的不同类型在某一事典所构成的全貌。人
口普查和民意测验多采用横剖研究的方式。横剖研究并不等于静态研究，他也可以进行
动态分析。此外，许多理论检验研究都采用横剖设计来探寻因果规律。
横剖研究的特点：调查面广、多办采用统计调查的方式、资料的格式比较统一且来源于
同一时间，因而可对各种类型的研究对象进行描述和比较。但资料的深度和广度较差。
36、 纵贯研究(南开2000<名>；复旦98<简>：纵贯研究及其四种类型)：是在不同时点或
较长的时期内观察和研究社会现象。 纵贯研究类型：（1）趋势研究（北大2004<简>：
趋势研究和同期群研究的异同；复旦97<名>；人大2000<名>）：是对研究对象随时间
推移而发生的变化进行研究。 （2） 同期群研究（北大97<名>；
人大2001<名>）：是对同一时期同一类型的研究对象随时间推移而发生的变化的研究。
同期群研究注重的是某一类型，而不是某一个体的特征。所以在不同时间可以调查不同
的人，只要他们都属于同一类型。但每次调查的抽样都应当是随机的，以保证被调查到
的样本可以代表这一类型的人。（3）追踪研究（复旦96<名>）：是对同一批研究对象
随时间推移而发生的变化的研究。追踪研究注重个体特征，因此要求在各次调查中都调
查同一批对象。 （4）纵贯研究的特点：<1>能够了解现象的
发展过程，能比较不同时期的变化，此外，由于各种变量的时间顺序清楚，因此容易做
出逻辑上的因果判断。<2>但纵贯研究的调查范围较小，难以进行不同类型的比较。
37、 普查、抽样调查和个案调查：（1）普查：是对较大范围的地区或部门中的每一个对象
都进行调查。 <1>普查的作用：能够对
现状作出全面、准确的描述，其目的是了解国情，把握整体的一般状况、得出具有普遍
性的概括。 <2>普查的特点：资料的标准化程度很高，可统计汇
总和分类比较，调查结论具有很高的概括性和普遍性，可精确反映总体的一般特征。但
调查内容较有限、缺乏深度。普查的工作量很大，所花费的时间、人力和经费很多，因
此，除统计部门和政府部门外，一般社会研究很少采用这种设计。
（2）抽样调查（人大99<简>：简述抽样调查与个案调查的区别）：从研究对象的总体
中抽取一些个体作为样本，并通过样本的状况来推论总体的状况。
抽样调查的特点：比普查要节省时间、人力和经费，资料的标准化程度较高，可以进行
统计分析和概括，能了解总体的一般状况和特征，调查结果具有一定的客观性和普遍性。
但他的调查内容不如个案调查那样深入、全面，工作量也较大，在资料处理和分析上需
要运用较复杂的技术。 （3）
个案调查（北大99<名>）：是从研究对象中选取一个或几个个体进行深入、细致的调
查。 <1>
主要作用：是详细描述某一具体对象的全貌，了解事物发展、变化的全过程。
<2>特点：与抽样调查相比，个案调查不是客观的描述大量样本的同一特征，而是主观
的洞察影响某一个案的独特因素。 <3>典型调查（北大2001<
名>；北大2002<简>：简述典型调查的优缺点）：也是从研究对象中选取若干具有代表
性的个体，对他们进行深入调查。它试图通过深入的“解剖麻雀”，以少量典型来概括
或反映总体，从特殊性中发现一般性。 <1>典型调查的作用：真实、迅速地了解全
局情况。<2>典型调查的特点：与个案调查不同，它要求被调查的对象具有典型性，因
此，选取典型是这种方法的关键。典型调查试图解决有个别推论一般，有个性概括出共
性的任务，在这一方面它有很大的独创性和应用价值。局限在于：研究者所选择的典型
是否具有代表性是很难判断的，因此有这种主管选择的典型而得出的研究结论并不一定
能适用于总体或全局。<3>个案调查和典型调查的共同点：它们能够详细地解剖某一个
案，能够在实际生活中体验到当时、当地的情景和气氛，能够深入了解社会行为的背景
和发展过程。但调查资料难以标准化，只能依靠主观判断得出研究结论，结论的客观性
和普遍性难以检验。
38、 研究方法（北大94<简>：社会研究包括哪几种方式？它们的主要原则是什么？）：（1）
区分研究法的主要标准：<1>资料的类型；<2>收集资料的途径或方法；<3>分析资料的
手段和技术。 （2）统计调查：<1>社会
研究资料分类：（A）直接调查得来的数据资料；（B）直接调查得来的文字资料；（C）
文献资料。 <2>应用：统计调查法不仅可以用于描述性研究和解释性
研究，也可用于探索性研究。 <3>特征：（A）使用结构式调查方法收集资料；（B）
在对大量个案作分类比较的基础上进行统计分析。（C）由于这两个特点，他成为理论
检验研究的最主要的方法，并且通常与抽样调查相结合。
（3）实地研究（北大92<简>：试述实地研究（或实地调查）的优缺点及适用范围；浙
大2000<名>；南大2000<名>）：是不带假设直接到社会生活中去收集资料，然后依靠
研究者本人的理解和抽象概括从经验资料中得出一般性的结论。
特点：（A）得到的资料通常是无法统计汇总的文字资料；（B）是一个较长期的过程；
（C）通常集中关注于某一个案。（D）资料收集方法主要是无结构的观察和访问。（E）
资料分析主要运用定性分析和投入理解发。 （4）实验：通过实验而收集到
的资料与统计调查资料很相似，它们都可以分类汇总和统计。二者区别是：<1>统计调
查是在自然环境中，而实验是在人为控制的环境中观测或询问；<2>统计调查所得到的
不同变量只是调查对象本身固有的，而实验则是人为施加某种刺激，使调查对象的属性
和特征发生某种程度的变化。
（5）文献研究：是历史学的主要方法，它利用现存的第二手资料，侧重从历史资料中
发掘事实和证据。 特点：
<1>不直接与研究对象接触，不会产生由于这种接触对研究对象的干扰，因而不会造成
资料的失真。因此，也被称为间接研究或非接触性研究。<2>它的资料收集方法是与分
析方法相联系的，研究者一般是确定了分析方法之后，再去查找某种类型的文献。
文献分析的三种方式：<1>统计资料分析；<2>内容分析；<3>历史-比较分析。
39、 社会学八种“理论群”：美国社会学家将当代社会理论区分为八种不同的理论群：（1）
结构功能理论；（2）新因果论；（3）社会预言理论；（4）小群体理论；（5）符号互
动论；（6）结构主义；（7）新马克思主义（批判理论）；（8）民俗方法学与现象学。
各种理论群都有自己的方法论和研究范式。在研究方法上，新因果论、社会预言理论主
要依靠大规模统计调查的资料；符号互动论、民俗方法学与现象学偏重实地研究；小群
体理论通常使用实验方法；其他三种理论则偏重文献研究，但他们也在不同程度上依靠
经验调查的资料。上述分歧实际上是自然科学的定量方法、人文学科的定性方法与韦伯
的“理解社会学”方法三者分野的延续。它也反映了对社会“科学”和社会研究的不同
看法。
40、 定量方法与定性方法（北大2003<简>：简述理论分析与定性分析、定量分析的关系；
复旦97<简>：现代社会调查方法有哪些特点）：（1）定量方法的共同特点：它是从一
组单位中收集各单位的可对比的信息。只有对这种信息才有可能进行计算，并进而对资
料做出更广泛的定量分析。运用定量方法就是要对多少可比较的一组单位进行观察，这
些单位可以使个人，也可以使群体或机构。（2）定性方法则无法对不同单位的特征作
数量上的比较和统计分析，只是对观察资料进行归纳、分类、比较，进而对某个或某类
现象的性质和特征作出概括。（3）统计调查与实地研究（个案调查）对比（北大93<
详>：是说明统计调查与实地研究的具体程序。两者的主要区别有哪些？它们的逻辑推
理过程是什么？北大2004<论>：统计调查与实地研究的异同，并每个各举三个研究题
目，注意适用）：<1>统计调查范围广泛，涉及大量单位；而实地研究涉及少数个案。
<2>统计调查从一个单位中选取少数侧面；而实地研究选区多数侧面；<3>统计调查客
观的统计和量度总体特征；而实地研究主观地洞察性的把握个体特征。<4>统计调查用
相关分析等客观方法得出普遍化的结论；而实地研究用主观洞察性方法得出普遍化的结
论。（4）定量方法的优点：标准化和精确化程度较高，逻辑推理比较严谨，因而更客
观、更科学。定量方法还能大大推进理论的抽象化和概括性，促进对现象之间普遍的因
果关系得精确分析。（5）定量方法的局限：<1>由于是对大量样本的少数特征作精确的
计量，因而定量方法很难获得深入、广泛的信息，容易忽略深层的动机和具体的社会过
程。<2>由于社会现象错综复杂，影响因素众多且难于控制，因此要确立两个变量之间
的因果关系也并非易事。可以说，所研究的现象越复杂，统计分析或相关分析也就越不
可靠。<3>由于许多社会现象都是独特的，无法得出普遍的经验概括，因而也无法依赖
数量分析。<4>还有人认为：统计调查只能得到表面的、浮浅的信息，而不能抓住事物
的本质特征。他们推崇实地研究法，认为只有通过对日常生活的直接观察，才能获得有
关社会生活的有效知识，因为社会是由活生生的任何具体的社会活动组成的，对它必须
根据社会成员的动机和主观意义来理解。在他们看来，统计调查、问卷、测量这类方法
会肢解和歪曲社会现实，它们实际上是把研究者本人对现实的看法强加于社会世界。他
们并不认为主观洞察的方法是非科学的，相反，认为它是获取科学知识的重要手段，他
们指出，“日常生活的各个基本方面还是能够直觉地被掌握的，因此而产生的创造性的
见解总有一天将成为客观知识。”（6）定性方法的局限：<1>它是依据典型的或少量个
案的资料得出结论，这种结论不一定具有普遍性。<2>主观洞察法的分析既有可能获得
真知灼见，也有可能导致荒谬的结论，这是因人而异的。由于对这种主观性的分析或结
论缺乏客观的评价标准，因此人们也无法对不同的研究结论进行检验。（7）理想的调
查研究方法：<1>涉及大量个案；<2>选取多个侧面并且与整体相联系；<3>通过客观计
量和统计把握共性；<4>尽可能客观分析并结合主观洞察和理解得出普遍化的结论。
评论：这一设想曾受到系统论和拉扎斯菲尔德的“多变量分析”方法的启发和鼓舞，但
近几十年的实践中，由于研究经费和操作化技术的限制，这一理想未能实现。目前，社
会科学家所能做到的也只是在资料收集和分析中结合主观洞察的方法。当前的主要发展
趋势是：定量方法的应用领域越来越大，同时人们也越来越深刻地认识到定性方法在社
会研究中的特殊意义并尽可能使它系统化。目前看来，排斥一种方法或将两者统一起来
的努力都是徒劳的。
41、 资料的可靠性和有效性：信度指资料的真实可信程度；效度指资料是否准确有效的说
明了索要研究的问题。<1>一般来说，实地研究的资料的可靠性不如统计调查。实地研
究依靠个人感官，很难保证调查资料的客观性。而统计调查可靠性真实性较高。<2>统
计调查资料的有效性不如实地调查。统计调查往往会导致这种倾向，即把时间和精力花
费在收集越来越多的数据资料上，并设计了越来越复杂的分析资料的方法，却忽略了资
料的有效性问题。假如资料是琐碎的、枝节性的，那么不管他的数量有多大，分析技术
有多精密，也仍然不能有效地说明事物的主要特征和本质属性。<3>对调查研究来说，
影响资料信度和效度的因素还包括研究本身对被调查者的干扰。这种干扰表现为：（A）
被调查者由于对访问员或问卷措辞的误解等原因，不自觉或无意识的做出错误的不真实
地回答。（B）被调查者由于顾虑、反感、不耐烦等原因，而有意识地隐瞒或改变自己
真实的行为和态度。<4>尽管客观性和科学性是社会研究追求的目标之一，但完全客观
的、不受个人价值观念影响的研究室很难达到的。越来越多的社会学家认识到：“一个
调查者的价值观不仅影响他选择的研究课题，而且也影响他研究这些课题的方法和他所
应用的资料的来源。”这意味着，不存在判断资料有效性的固定标准或绝对标准。但这
并不能否认社会科学的科学性和客观性。因为：（Ａ）从认识论的观点看，人们的思维
能否与客观世界相一致是一个实践的问题。此外，自然科学和社会科学都以同样的方式
来解决“思维与存在”的关系问题，它们都是假定理性认识与经验证据之间存在着逻辑
一致性。尽管社会研究更容易受主观因素的影响，但研究者的基本出发点是：“他们能
够通过操作化过程来领悟和描述现实，能够依赖科学验证的绝对标准去评价他们的研究
成果，除此之外的唯一选择只能是不搞研究”。当然，所谓判断知识真理性的“绝对标
准”是随科学实践的发展而变化的。（Ｂ）近几十年来，社会科学为了使理论与证据据
有一致性，越来越多地采用更客观，更有信度的方法，统计调查正是在满足这一要求的
方向上发展的，他试图最大限度地消除主观因素的影响，但目前，他还未能有效的解决
资料的效度问题。
42、 分析单位（北大93<名>；北大2004<名>；复旦98<名>）：是研究者所要调查和描
述的对象,它是研究的基本单位,研究的最终目的是将这些分析单位的特征会及其赖以描
述由它们组成的较大集合体或揭示某种社会现象。（1）一般来说，分析单位等同于抽
样单位；但有时，分析单位可能与抽样单位不一致。（2）分析单位不一定是研究结论
中所要揭示的单位。（3）社会研究中分析单位的类型：<1>个人：个人是社会科学中最
常用的分析单位；<2>群体：指具有某些共同特征的一群人；<3>组织：指由具有共同
目标和正是分工的一群人所组成的单位；<4>社区：是按地理区域划分的社会单位；<5>
社会产物：指各种类型的社会活动、社会关系、社会制度和社会产品。（4）可以说，
分析单位是研究者所要了解的一些个案。选择分析单位是应注意：<1>一项研究课题可
以采用多种分析单位；<2>在研究中，如果以某一种分析单位进行调查所收集的资料不
能完满的解答研究课题的话，就应当增加或改变分析单位。
43、 研究内容：是指分析单位的属性和特征，它们是研究者所要调查和描述的具体项目或
指标。（1）研究内容的类型：<1>状态：是一些客观指标，通过他们可以描述分析单位
的基本状况。<2>意向性：是分析单位的内在属性，它是一种主观变量。包括态度、观
念、信仰、个性、动机、偏好、倾向性等。<3>行为：是一种外显变量，研究者可直接
观察到的各种社会行为和社会活动。（2）根据理论和方法论偏好，研究者可在下列几
个方面进行选择：<1>研究层次；<2>抽象程度；<3>解释的方式；
44、 层次谬误和简化论（北大2003<问>：举例说明在推论中容易发生的、与分析单位有关
的两类错误）：（1）层次谬误（或生态谬误、区位谬误）（北大94<名>；北大97<
名>;人大96<简>：简述什么是层次谬误）：是指用一种高层次的分析单位做调查，却
用另一种低层次的分析单位作结论。层次谬误就是这种将社区特征与群体特征、群体特
征与个人特征相混淆的错误。在用统计资料分析时很容易出现这类“层次谬误”。当然，
这种推论偶尔也是符合实际的，但它的推理方法则是完全错误的。（2）简化论（或还
原论）：在社会研究中是指局限于用某类特征来分析和揭示各种复杂的社会现象。实际
上，并没有一种普遍适用的分析单位，一项研究应考虑到各种分析单位和各种特征，然
后依据理论假设和初步考察来确定较适当的分析单位和研究内容。
45、 研究方案的设计（北大95<问>：设计一个调查研究方案主要考虑哪些方面？复旦97<
简>：设计一个调查研究方案主要考虑哪些方面？南开2000<简>：影响调研方案设计的
主要因素是什么？南大95<简>：怎样编制调研提纲？南大97<名>：调研程序）：（1）
研究方案：它是对研究的具体程序和操作方式的规划，即制定研究计划，分解研究课题，
然后将所要研究的概念具体化、操作化，并说明研究的各种细节以及所采取的各种策略。
研究方案相当于一项工程的设计图和施工方案，如果事先有比较周密和精细的规划，考
虑各种问题就比较全面。那么实施过程就会比较顺利。（2）研究方案的内容：<1>阐明
研究课题和研究目的；<2>确定研究类型和研究方法；<3>确定分析单位和研究内容；
<4>制定抽样方案；<5>制定问卷、观察表格或访问提纲；<6>确定调查的场所和时间计
划。并对调查员的任务和工作进度作出安排。<7>研究经费和物质手段的计划、安排。
第六章：测量
46、 测量的概念：（1）测量（复旦96、97<名>；人大96<名>）：对所确定的研究内容
或调查指标进行有效的观测与量度。具体地说，是根据一定的规则将数字或符号分派与
研究对象的特征（即研究变量）之上，从而使社会现象数量化或类型化。（2）研究变
量：是通过对概念的界定和具体化而转化来的，在研究中，它是分析单位所具有的特征
或属性。在一具体研究中，每个变量都有特定的测量指标。（3）数字（符号）：测量
时得到的一定数值可作为某一现象或事件特征的代表符号。（4）分派规则：确定分派
数字的规则是测量中最基本、最困难的工作。测量是将各个分析单位与它们的特征或属
性用数字分派规则联系起来。所谓规则是指操作的方法或索引，它指导研究人员如何实
施测量。（5）有效的测量规则必须满足三个条件（复旦98<名>：测量三要素）：<1>
准确性：指所分派的数字或符号能真实、可靠、有效地反映调查对象在属性和特征上的
差异，用数学概念表述，如果真是状态与符号系统在结构上具有一致的关系，那么两者
就具有同构性，同构性越高，所观测的资料就越准确有效；<2>完备性：是指分派规则
必须能包括研究变量的各种状态或变异；<3>互斥性：指每一个观测对象（或分析单位）
的属性和特征都能以一个而且只能以一个数字或符号来表示。（6）测量的作用：在于
作出准确的分类，以便比较研究对象的各种差异，这些差异有些是以等级区分的，有些
是以数量区分的。研究对象的差异都是由一定原因造成的。因此通过对差异的比较和分
析就能找出现象之间的因果联系。
47、 测量尺度（北大92<简>：举例说明四种测量尺度的特点及区别；北大2001<简>：是
举例说明４种测量尺度及其数学性质；复旦98<简>：简述变相的测量层次及其划分意
义）：（１）定类尺度或名义尺度：测量定类变量的尺度，它是测量尺度中最低的一种，
大多数定性测量都适用定类尺度。其严格的区分可分为：<1>标记：可作为一个识别的
记号，当数字被用作标记时，它并不表示数量的多少，也不能对它做数量运算；<２>类
别：可作为对变量的不同状态的度量，类别区分可说明观测对象的某些本质特征．类别
也可用数字表示，这种数字仅用于区分而不能运算。 （2）定
序尺度或等级尺度：一个变量如果能够依操作定义所界定的明确特征或属性而排列等级
大小、高低、先后的次序，这是就适用于定序尺度进行测量。
定序测量程序：<1>等第顺序法，它要求被试者对一组刺激依某种属性由高到低或由多
到少的次序予以排列。<2>配对比较法：要求被试者在一定时间内就所有可能的配对，
排列出每对刺激中的大小或多少的顺序。<3>恒常刺激法：这种方法与配对比较法相类
似，唯一不同之处是它以一种标准刺激连续地与一组恒常刺激的各个成员相配对地进行
比较。<4>连续性类别法：要求被试者把一群刺激分为若干不同的类别，这里的类别已
按指定的属性而予以顺序排列。
注意：它们使用的数字仅仅显示等级顺序而已，除此之外，别无其他意义。这些数字并
不显示属性的真正量值，并且等级之间的间隔也不一定相等。
（3）定距尺度或等距尺度：具有定类尺度和定序尺度的特征，此外，它还要求尺度上
的间距代表所测量的特征的量的间距。即每一等级之间的间距是相等的，它们可以用来
加减。但定居尺度上没有绝对的零点，所以不能乘除。 （4）定比尺度或比例尺度：是
测量中的最高层次，具有实在意义的真正零点，定比尺度下的数字是可以进行加减乘除
的，运算的结果都具有实在的意义。一个变量能否以定比尺度测量，关键在于零点是否
是绝对的，最好的检验办法是：零是否可被认为是测量“一无所有”的。（5）四种测
量尺度比较（南大2000<简>：定距变量可以变为定序变量吗？反之如何？请举例说明）：
从数学性质上看，高层次尺度都具有低层次尺度的一切特征，反之则不然。选择测量尺
度须注意：<1>社会现象大多只能以定类或定序尺度测量，但有时也可将某些现象近似
的视为定距或定比变量，如“智力测验”。这是要注意这种近似计算的合理性和可能出
现的偏差。<2>高层次尺度可能获得更多、更精确的信息，但调查和分析的工作量更大，
而低层次尺度则相反。因此选择尺度要结合课题要求与研究条件。 <3>用较低尺度收集
的资料不能用较高尺度的数学运算来处理，反过来则可以。因此许多研究都是尽量先收
集更多、更精确的信息，但在分析时却只作一些简单的运算，这虽然会造成很大的浪费，
不过当需要今后作补充分析时，这种策略还是有必要的。<4>一个变量可能适合用各种
尺度来测量，选择何种尺度取决于研究所要求的精确度。
48、 概念的具体化与操作化（北大93<简>：是说明概念与假设的操作化过程；北大97<简>：
试说明研究课题具体化与操作化的主要内容；北大2000<简>：简述一项调查研究课题
的具体化与操作化；南大96<名>：课题操作化；南大95<简>：怎样具体确定测量的尺
度；复旦98<简>：课题具体化和操作化的主要内容）：因为社会生活中使用的概念通
常是模糊的或含义不清的，社会研究如果不对这些概念作出定义和具体化，也就无法对
现象进行观察和度量。（1）概念的具体化（浙大2000、2001<简>：试述拉扎斯菲尔
德的概念具体化；南大94<简>：如何从概念中引出指示项；北大95<问>：简述概念、
变量、调查指标的定义、各自在社会调查中的作用及三者的关系；南大98<简>：对社
会学研究概念举例说明概念的来源；复旦96<简>：什么是理论、假设、概念、变量、
指标及它们之间的相互关系）：<1>概念的形成：概念是在日常生活中通过感性认识和
互相交流形成的。是人们对许多现象的复杂而又具体的感受，并以一个名字对这些感受
作出整体的、含混的概括。概念是人们思维的产物，它是抽象的，无法直接观察的，因
为它本来并不存在，是人们创造了它。<2>概念的界定：使用抽象定义将概念所指的现
象于其他现象区分开来。（A）界定的第一步是将概念分解：即从不同角度或维度对概
念所表示的现象进行分类，对有些高度抽象的概念要逐步分解；（B）第二步是作出抽
象定义：通过分解可大致了解一个概念的基本内容和各种分类，根据分类就可以抽出各
种类型的共同属性和特征对概念下定义。在社会研究中，抽象定义的作用是对在何种范
围、何种含义上使用这一概念作出精确的说明，因为概念包括许多方面和不同维度。经
过严格界定的概念称为变量，变量具体指概念内涵的各种类型或各种状态，它们对应于
各种实际存在的事物，因此变量是可以观察和量度的。概念转换为变量形式之后就可以
进入科学研究的领域了。<3>选择测量指标：确定如何测量变量，选用那些指标来测量。
指标是概念内涵的指示标志，它们直接表示经验层次的现象。指标可以量度现象的不同
状态和不同程度。由经验现象的量度就可以说明抽象层次的概念。但指标指标是概念内
涵的某一方面或某一部分内容，因此要更有效的测量概念就需要用多个指标。对概念（变
量）的具体量度的方案也称为概念的操作定义。<4>编制综合指标：对简单的概念可以
用一两个指标来测量，而对复杂的概念，则要用多个指标来测量。<5>概念的具体化过
程就是一步步从抽象层次下降到经验层次，使概念具体化为可观测的事物。
（2）操作定义（复旦98<名>；南大98<名>：古典操作定义）：就是建立一些具体的
程序或指标来说明如何测量一个概念。<1>操作定义的功能：（A）澄清概念在研究中所
选用的意义；（B）说明测量变量的操作方法；（C）使一些陈述变量间关系的假说获得
验证的机会；（D）使今后同样的研究有所根据，以便比较彼此的结果。（3）测量指标
（北大2003<名>；北大93<名>：变量与指标）：指标是反映社会现象变异特征的范畴。
是对社会范畴的变异方面的规定性加以具体化。它把现象的质的方面与量的方面密切的
结合起来，以便精细描述社会现象的某一特征。测量时首先要说明指标，任何一个变量
都有许多不同的指标，这是因为测量所依据的事实可以不一样。当一个变量有多个指标
时，可以从中挑选若干个来测量变量，挑选指标的原则是方便与适当。各项指标可以分
别研究，但有时需要将各项指标综合起来，以提高变量的抽象程度。建立综合指标的方
法：类型法、指数法和量表法（4）建立综合指标：<1>类型法：将各指标交互分类，然
后建立新的类型，以形成一个新的指标；<2>指数法：是用简明合理的公式综合各指标，
以建立一个新的指标。
49、 量度化方法：通过测量而得来的资料可分为三种纬度：（1）物理纬度:可以用客观的
标准来测量,而不涉及主观判断。这些量度一般都属于定距或定比尺度。但这种量度只适
合于某些社会现象。如事物的状态特征和行为特征。（2）心理物理纬度：包含物理纬
度和心理纬度。一般认为，测量心理属性最多可达到定序尺度，而无法使用定距尺度。
（3）心理纬度：是利用主观判断所制定的计量标准。缺点是：它们缺乏一套完善的测
量理论，即缺乏公理和定理的系统。
50、 观测值的分解：测量理论的基础是数理统计中的误差理论或变异理论。测量理论建立
在“任何观测值（测量分数或测量结果）都有误差”这一假设之上。（1）它认为，观
测值（X）是有四个部分组成的：<1>真实值T。<2>其他变量的影响值O。<3>系统偏
差B。<4>随机误差E。 （测量分数）
X=T+O+B+E （2）随机误差(E)是非系统的变异，它是由于
一些无法预料的因素引起的，如被测者的疏忽，粗心等。但是这种影响有正有负，所以
要消除或减少随机误差，通常采用多次测量或抽取大量样本的方法，使正负误差相互抵
消。（3）系统偏差(B)（南开2001<名>）是有规则的变异，它是由于测量工具、评分
标准等直接与测量方法有关的因素引起的。消除或减少系统偏差的方法是采用标准化的
测量工具；在测量之前将测量工具与标准尺度相互校对，以修正偏差。但有些系统偏差
很难用标准化消除。（4）其他变量的影响(O)：也是一种有规则的变异，这种因素不是
偶然的，而是内含在测验的题目或量表之中的。这种影响并不能通过多次测验而消除，
它是内含在测量指标之中的。消除或减少这种影响主要通过对所研究的变量进行严格的
操作化。（5）在评价社会研究中所使用的测量方法时必须考虑以下三个问题：<1>这一
测量有没有系统偏差？这种系统偏差会不会影响研究的有效性？一般来说，任何测量都
会有一定的系统偏差，因此，测量的主要任务就是使系统偏差控制在最小程度。<2>这
一测量是不是可靠的？即随机误差对测量的可靠性有没有影响？假如测量受偶然因素
影响很大，观测值就会在较大范围内起伏，在这种情况下，观测是不可靠的，测得得观
测值其可信性很低。<3>这一测量是不是有效的？即所测得得数值是否正式向要研究的
变量值，其他变量的影响值是否控制为最小？
51、 信度（南大98<名>；北大2004<名>）：指测量数据（资料）与结论的可靠性程度，
即观测工具能否稳定地测量到它要测量的事项的程度。也就是说信度是指测量的稳定性
与一致性而言的。（1）信度系数：信度可以看作系统性变异在观测到的总变异中所占
的比率，系统性变异越大，则信度系数越大，表明测量的信度越高；信度也可以看成是
在观测到的总变异中，不是因随机误差所造成的变异所占的比率。（2）信度的检查（南
开2000<名>）：信度通常以相关系数表示。由于测量中误差变异的来源有所不同，故
各种信度系数分别说明信度的不同层面而具有不同的意义。在实际应用中，信度系数有
如下类型：<1>重测信度：用同一份问卷的问题，对同一群被测者前后调查两次，在根
据调查的结果，计算其相关系数，就得到重测信度。这种信度能表示两次调查结果有无
变动，反映了测量的稳定程度，故又称作稳定系数。它可以检查出被测者是否能正确理
解所提的问题，并作出真实稳定的回答。这是一种测量信度的较好方法，但须注意两次
调查相隔的时间要适当，如果时间太短，被测者还记得上次答案，所以测量的是他的记
忆，而不是他此时的真实态度。如果间隔时间太长，可能会发生一些变故，影响到被调
查者的态度。<2>复本信度：对一项调查的问题，让被调查者接受问卷测量，并同时接
受这份问卷的复本的调查，然后根据调查结果计算其相关系数，就得到复本信度。使用
复本求取信度可以避免重测信度的缺点，但使用的复本必须是真正的复本，即在题数、
形式、内容、难度及鉴别度等方面都与原本一致，仅只在问法与用词方面与原本不同。
复本调查可连续或相距一段时间进行，连续实施的复本信度又称等值系数；相聚一段时
间实施的复本信度又称稳定与等值系数。<3>折半信度：将调查来的结果，按题目的单、
双数分成两半记分，在根据各个人的这两部分的总分，计算其相关系数，就得到折半信
度。<4>评分者信度（人大2001<名>）：在测量工具标准化程度较低的情况下，不同评
分者的判分标准也会影响到测量信度，要计算评分者信度，可计算一个评分者的一组评
分与另一个评分者的同一组评分的相关系数。（3）影响信度的因素：在结构化标准化
程度较高的测量中，信度主要受随机误差的影响，随机误差越大，信度越低。随机误差
的来源主要有：<1>被调查者：如是否耐心、认真、专注、不受情绪波动影响。一般来
说，调查时间越长，提出的问题越多、越复杂，信度越低。<2>调查者：是否按规定程
序和标准，是否有意或无意的对被调查者施加影响，纪录的认真程度等。<3>测量内容：
如提问的措辞含糊不清，不易理解，各种题目内部一致性低，题数少等。<4>测量环境
和时间：如研究人员对被调查者有较大“干扰”，他人在场的影响，两次测量的时间间
隔太长等等。
52、 效度（南大96、97、2000<名>：测量效度；浙大2000<名>：测量的效度）：就是正
确性程度，即测量工具确能测出其所要测量的特质的程度。效度越高，即表示测量结果
越能显示其所要测量的对象的真正特征。测量的效度可以决定所建立的理论解释的正确
程度。对效度的检验可以保证不同的研究人员对某一研究变量的意义与内涵有一致的理
解。（1）效度的基本原理：从测量分数变异的观点来看，效度就是测量得分的总变异
量中，由所要测量的特质所造成的变异量所占的百分比。（2）效度的检查（复旦96、
97<简>：效度测定的三种类型是什么？内在联系如何？）：<1>内容效度（表面效度）
（北大97<名>）：考察内容效度旨在系统的检查测量内容的适当性，并依据我们对所
研究的概念（变量）的了解去鉴别测量内容是否反映了这一概念的基本内容。内容效度
实质上是个判断问题。检查内容效度就是检查有概念到指标的经验推演是否符合逻辑，
是否有效。在科学研究中，需要以大多数科学家所接受的概念定义为标准。 <2>准则
效度（效标效度）（南大95<名>：标准效度）：准则是被假设或被定义为有效的测量
标准，符合这种标准的测量工具可以作为测量某一特定现象或概念的效标。对同一概念
的测量可以使用各种测量工具，其中每种测量方式与效标的一致性称为准则效度。
（A）如果效标或准则是依据将来实际发生的情况而建立的，那么这种准则效度可称为
预测效度。预测效度是将已经得到的测量结果与未来实际发生的情况进行比较，以检查
两者的一致性。 （B）
如果效标识于某种测量方式同时被证明为有效的，则称之为共变效度。共变效度是用来
判断其他的测量工具是否可以取代作为效标的测量工具。
（C）如果效标是以实际经验判断为准的，则称为实用效度。实用效度通常用来检查测
量工具的实际效果。由于对某些现象的测量过去并没有一定的标准，所以只能依据实际
经验来检验测量工具的有效性。 实用效度与
共变效度有些近似，如定量化的干部测评方法就是以组织部门传统的考察干部的方法为
效标，当它具有较高的效标效度时，由于它省时间、简便易行，所以就能取代过去沿用
的老方法。 准则效度的局
限：有些作为效标的测量工具只是假定有效的，它本身是否真正有效并没有理论根据，
这一缺陷是心理量度化方法所共有的<3>建构效度（南大99<名>；复旦97、98<名>）：
是要了解测量工具是否反映了概念和命题的内部结构。它通常在理论性研究中使用。由
于它是通过与理论假设相比较来检查的，因此也称为理论效度。测量同一个概念可以用
多个指标，当用X和Y的多个指标来测量两个概念之间的关系时，如果不同指标的测量
都反映出理论所假设的关系，那么这些测量就具有建构效度。<4>内在效度与外在效度
（北大2003<名>：内在无效度）：测量都是在具体的时间、地点对具体的调查对象所
作的观测。如果在一项具体研究中，对上述三种效度（内容效度、准则效度、建构效度）
的检查都没有发现问题的话，就可以认为这一研究具有内在效度，它的资料和结论可以
有效的解答所研究的问题。可以说，内在效度是指一项研究的资料和结论的有效性。而
外在效度是指这种研究结论的普遍有效性。对外在效度的检查要考虑样本的代表性和特
殊性，以及研究时间、地点、情境和研究内容的普遍意义。
53、 信度与效度的关系（北大93<名>；北大96<问>：说明测量的信度与效度及其相互关
系）：（1）信度低效度不可能高。如果收集的资料不可信、不可靠，那么它肯定不能
有效地说明所研究的对象。（2）信度高，效度未必高（效度有可能很低）。（3）效度
低，信度有可能很高。（4）效度高，信度必然也高。如果有效地说明了各种现象，那
么它的资料和结论都必然是且必须是可信的。（5）测量的信度是效度的必要条件，但
不是充分条件，无信度必然无效度，但有信度未必有效度。反之，效度是信度的充分条
件但不是必要条件，有效度必然会有信度，但无效度却未必无信度。（6）效度=信度
-222 /2，由此可知，效度系数等于信度系数减去2 /2。由于其他变量的影响是
x o o x o x
内含在测量工具之中，因此很难测出他们的变异量（2），而信度系数则可由相关系数
o
计算。所以在一些研究中，研究者常用信度系数来近似的说明效度，但这是有缺陷的，
因为在社会研究中，其他无控制的变量对资料的效度有很大影响。所以还是应当通过对
内容效度、准则效度和建构效度的检查来说明研究的有效程度。（7）由信度和效度的
关系可知，所有影响信度的因素也必然影响效度。此外，除随机误差外，效度还受到系
统偏差和其他变量的影响。对这些影响课主要考虑两个方面：<1>测量工具；<2> 样本
的代表性。
第七章：抽样
54、 抽样与抽样调查（北大2004<简>：抽样调查的基本原理）：抽样调查：从研究对象的
整体中选出一部分代表加以调查研究，然后用所得结果推论和说明总体的特性。这种从
总体中选出一部分的过程就是抽样，所选出的这部分代表称为样本（人大2000<名>）。
（1）与整体调查相比，抽样调查的优越性：<1>调查费用较低；<2>速度快；<3>应用
范围广；<4>可获得内容丰富的资料；<5>准确度高。（2）抽样成功的依据（假设）：
<1>部分是包含于整体之中的；<2>部分与整体有同样的特征、现象、关系及过程；<3>
部分能够为研究者提供一个有关群体生活、群体态度、价值和意见的更为清晰的脉络。
55、 抽样术语：（1）个体与抽样单位（人大97<名>：抽样单元）：个体是收集信息的基
本单位，即分析单位。个体与抽样单位在有些研究中是相同的，但在实际抽样中，抽样
单位往往是多层次的。（2）研究总体和调查总体（复旦97<名>：研究圈；人大2000<
名>：总体）：研究总体是在理论上明确界定的个体的集合体，它必须受几个方面的限
定：内容、单位、范围、时间。实际上，样本式从调查总体而不是研究总体中抽取的。
调查总体是研究者从中实际抽取调查样本的个体的集合体。它往往是对研究总体的进一
步界定，即对时间、范围作更进一步规定。（3）抽样框（北大2002<名>；复旦97<
名>；南开2000<名>；南大99<名>）：又称抽样范畴，是从中抽取样本的抽样单位名
单。在一次抽样中，抽样框的数目是与抽样单位的层次相对应的。（4）参数值与统计
值（人大97<名>：参数、估计量；）：参数值是关于总体中某一变量的综合描述。统
计值则是关于调查样本中某一变量的综合描述。抽样调查的重要内容之一就是通过样本
的统计值推算总体的参数值，从而达到由部分认识总体的目的。（5）抽样误差（北大
99<名>；复旦96<名>）：总体的异质性和样本与总体范围的差异性，在用样本的统计
值去推算总体的参数值时总会有偏差，这种偏差就是抽样误差。（6）置信水平与置信
区间：置信水平是指总体参数值落在样本统计值某以正负区间内的概率。而置信区间是
指在某以置信水平下，样本统计值与总体参数值的误差范围。
56、 抽样的基本程序：（1）界定研究总体和调查总体。对研究总体的界定过程也就是对他
的基本构成单位，所包含的内容以及空间与时间的范围等作出规定的过程，同时也是确
定调查对象，及它的内涵、外延及数量的过程。（2）确定抽样单位，编制抽样框。即
将总体案抽样单位划分为各部分，这些部分必须互不重叠且能合成总体，然后毫无遗漏
的编号排列成表，每个抽样单位唯一的与表上的一个号码相对应。抽样框是概率抽样一
个最基本的要求，它的质量关系着抽样的质量。（3）设计和抽取样本。包括确定样本
所包含个体的数目，选择抽样的具体方法。（4）评估样本于对总体进行估计。样本对
于总体的代表性问题始终是抽样中关注的中心问题。
57、 样本准确性与精确性（北大95<问>：抽样调查中的误差份哪两类？其来源是什么？如
何减少两类误差？北大2002<简>：简述影响调查样本代表性的主要因素）：
（1）样本准确性：指样本没有偏差。偏差也称系统误差，其来源主要有：<1>抽样程
序的缺点，即未能遵守随机原则；<2>无回答，无回答是样本偏差的主要来源之一。事
实上，一个包含比初始选定的单位少于80%的样本几乎肯定是有偏差的，在这种情况下
应通过二访、三访或其他手段提高回答率。（2）样本精确性：指抽样误差的大小。抽
样误差是抽样这种方法所固有的误差，是随机误差。抽样误差可以定量进行估计，因此
研究人员对于抽样误差的估计具有很大的主动性。（3）样本评估：样本评估分两阶段，
正式调查前和结束后，后者是计算抽样误差并由样本统计值推论总体参数值等。在确定
了样本规模和抽样方法抽出样本后，应先对抽出的样本进行评估，目的是初步检查样本
对于总体的代表性，以剔出那些偏差太大的样本，重新抽样。评估可以采取收集若干容
易得到的资料，例如年龄、性别、文化程度等作为样本于总体之间的比较的方法。一般
地说，比较的变量越多，杨本越可靠。
58、 概率抽样（北大93<简>：试说明概率（随机）抽样得主要方法；人大97<简>：简述
概率抽样的随机化原则；吉大2000<简>：简述概率抽样的类型及特点）：（1）概率抽
样：是总体中每一个体都有一个已知不为零的被选机会进入样本。概率抽样分为等概率
抽样（随机抽样）和不等概率抽样。（2）简单随机抽样（纯随机抽样）：是一种特殊
的等概率抽样方法，总体中每一个体均有同等被选机会，而且样本中每一个体是被单独
得选出的。他是一种元素抽样。分重复抽样和不重复抽样。（3）随机数字表（南开2000<
简>：利用随机数表抽样的基本程序是什么？ ）：随机数字表是由数字0-9组成的表，
由电子计算机编制而成。下面举例说明如何用随机数字表进行抽样：假定研究总体
N=528，即总体中有528个个体，我们欲抽选一个由10个个体组成的样本，因为N是
个三位数，因此首先从表中的50列数字中随机抽取三列，例如我们选中了第25-27列，
然后由上到下从这三列中选出头10个001-528之间的不同的数，当然，不一定非要从
这三列的第一行数字开始，可以从任意行开始，直到抽够10个数字为止。如果从这三
列抽出的符合要求的数字不足时，就要另外随机抽取三列，从中继续抽取。如果N是四
位数，则抽样时首先从表中的50列中抽取四列，再依上法抽出样本。（4）分层抽样（北
大96<简>：说明分层抽样与定额抽样的特点及区别；北大97<简>：分层抽样与整群抽
样的分类原则有何不同？为什么？北大98<简>：分层抽样与配额抽样有何异同？浙大
99、2000<名>；南大2000<名>）：分层抽样就是先将总添一种或几种特征分为几个子
总体（类、群），每一个子总体称为一层，然后从每一层中随机抽取一个子样本，将它
们合在一起，即为总体的样本，称为分层样本。<1>分层抽样的优点：（A）当一个总
体其内部分层明显时，分层抽样能够克服简单随机抽样的缺点。由于它是按群体的特征
分布从不同层获得尽可能均衡的样本数，使样本与总体更相似。（B）分层抽样可以提
高总体参数估计的精确度。由于它可以将一个内部差异很大的总体分成一些内部比较相
似的子总体，从而每一个子总体内抽出一个小样本就能较好的代表总体。（C）有些研
究不仅要了解总体的情形，而且还要了解某些类别的情形，分层抽样可以同时满足这两
个要求，因为我们可以将每一类看作一个总体。（D）便于行政管理。
（5）系统抽样（或等距抽样，机械抽样）（复旦98<名>；南大94<简>：等距抽样的
基本步骤；南大<简>：等距随机抽样的抽样方法）：<1>系统抽样是简单随机抽样的一
个变种，具体做法是：（A）将总体的所有个体前后排列起来。（B）计算抽样距离。
抽样距离K=N/n（N为总体包含个体数；n为样本所含个体数）；（C）在头K个个体
中，用完全随机的方式抽取一个个体，设其所在的位置的序号是k。（D）自k开始，
每隔K个个体抽取一个个体，即陆续抽取的个体所在位置序号为k，k+K，k+2K…k+（n-1）
K。 <2>系统抽样的优点：（A）与简单随机抽样相比，更易实
施，工作量较少；（B）样本在总体中的分布更平均，故而抽样误差小于或至少等于简
单随机抽样，即较其更精确。（C）系统抽样可看成是分层抽样，它等于将总体分为几
层，每K 个分子为一层，也就是说可以看作是每层只抽一个个体的分层抽样。两者不
同的是，系统抽样的样本个体在每一层的相对应位置上，二分层抽样则是由每层随机抽
取的。系统抽样在总体中分布更均匀，精确度叫分层抽样更好。<3>系统抽样是以总体
的随机排列为前提的，如果总体的排列出现有规律的分布时，就会使系统抽样产生很大
误差，降低样本的代表性。 <4>系统抽样适用于同质性较高的群体。当总体内不同类别
之间所含个体的数目相差过于悬殊时，采用此法样本的代表性可能较差。这种情况一般
使用分层抽样。 （6）整群抽样（聚类抽样）（北大94<简>：试述分层抽样、
整群抽样的抽样误差的来源，及他们对这两种抽样分层原则的影响）：整群抽样是将总
体按某种标准划分为一些子群体，每一个子群为一个抽样单位，用随机的方法从中抽若
干子群，将抽出的子群众所有个体合起来作为总体的样本。<1>整群抽样与分层抽样异
同：（A）它们在第一步都是根据某种标准将总体分为一些小群（B）但两者的抽样方式
不同。分层抽样中所有子群均要抽取一个子样本，作为总体样本的一部分，即总体样本
在各层中均有分布。而整群抽样则不然，它是抽取若个子群并将抽出子群的全部个体和
起来作为样本，因此，总体样本分布在部分子群众。（C）由于抽样方式的不同，导致
两者间划分子群的原则也不同。在分层抽样中，层的划分依据的是层之间异质性高，层
内则尽可能同质的原则。整群抽样因仅抽取某几个子群作为整体的代表，如果子群间差
异显著，且每个子群内同质性很高，那么这种情况下抽取的几个子群显然无法代表总体。
因此，整群抽样得分群原则应与分层抽样不同，它是使得群体间异质性低，群内异质性
高，因此，分层抽样适用于界质分明的群体，而整群抽样适用于界质不清的总体。<2>
整群抽样的优点：（A）它可以通过转换抽样单位扩大抽样的应用范围；（B）它可以节
省人财物力；（C）许多调查往往很难得到总体的所有个体的可靠名单，有时即使可以
得到，所需费用也十分昂贵，这就限制了抽样的应用范围。这种情况下，使用整群抽样
获得抽样框就容易得多。（D）整群抽样通过将抽样单位由个人转换成群体，使由简单
随机抽样和分层抽样所不能进行的抽样调查成为可能 ，扩大了抽样的应用范围。<3>
整群抽样的缺点：（A）样本分布不均匀，样本的代表性较差，与其他抽样方法相比，
相同样本数，抽样误差较大；（B）分析整群样本的资料，如抽样误差，统计推断，假
设检验要比前面几种抽样方法复杂；<4>分类：分为等规模整群抽样和不等规模整群抽
样，前者总体内所有的群规模都相等，而后者总体内各群大小不一，这种情况下，往往
出现样本规模随机变动的问题，为了解决此问题，往往采用子抽样的方法，即从抽出的
样本群中再抽一次样，得到所需样本。（7）多阶段抽样（多级抽样）：在整群抽样中，
当子群数或子群内部个体数目较多，彼此间的差异不太大时，常采用更经济方法，即不
将样本子群众的所有个体作为样本，而是再从中用前述各种随机抽样的方法抽取样本，
因而最终样本的获得经过两次抽样，我们称其为二阶段整群抽样，同样可做三阶段、四
阶段…即多阶段整群抽样。对于群体规模不等的多阶段整群抽样，通常使用概率比例抽
样法：是根据每一群的规模分配样本容量。在将总体划分成子群时，每个子群中个体的
含量常常不同，在这种情况下，二阶段抽样由于第一次抽取子群大小不同，只有在第二
阶段抽样是采取措施，才能使总体中每个分子具有同等进入样本的概率。
多阶段抽样的特点：多阶段抽样通过采用由高级抽样单位过渡到低级抽样单位的方法，
解决了低级抽样单位不易获得的抽样框的问题，并且可以使样本的分布较为集中，从而
大大降低调查所费人财物力。此外，多阶段抽样由于在各阶段抽样时可根据具体情况灵
活选用不同抽样方法，故能综合各种抽样方法的优点，提高样本质量。因此，它特别适
用于调查范围大、单位多、情况复杂的调查对象。多阶段抽样由于每阶段抽样都会产生
误差，因此经多阶段抽样得到的样本的误差也相应增加，这是它的不足。
59、 非概率抽样（人大96<名>）：（1）非概率抽样是根据研究任务的要求和对调查对象
的分析，主观地、有意识地在研究对象的总体中进行选择，因此每个个体进入样本的概
率是未知的，而且由于排除不了调查者的主观影响，因而无法说明样本是否重现了总体
的结构，用这样的样本推论总体是极不可靠的。（2）偶遇抽样（方便抽样）：是指研
究这将在一定时间、一定环境里所能遇见到或接触到的人均选入样本的方法。优点是方
便省力，但样本代表性差，有很大偶然性。 （3）主观抽样（判断抽
样，立意抽样）（南大98<名>）：主观抽样中的“主观”有两种含义：<1>主观判断的
意思，这时，主观抽样又称为立意抽样或判断抽样，即研究者依据主观判断选取可以代
表总体的个体作为样本；<2>第二种含义是有目的地选择样本的意思。 （4）定
额抽样（配额抽样）（北大96<简>：说明分层抽样与定额抽样的特点及区别；北大98<
简>：分层抽样与配额抽样有何异同？北大2003<名>；南大95、96、97、99<名>）：
它与分层抽样中的比例抽样相似，也是按调查对象的某种属性或特征将总体中所有个体
分为若干类或层，然后在各层中抽样，样本中各层（类）所占比例与他们在总体中所占
比例一样，但不同的是，分层抽样中各层样本是随机抽取的，而定额抽样中各层样本是
非随机抽取的。定额抽样是以代表总体为目的的，因此它必须对总体的性质有充分的了
解，定额抽样假定：<1>只要类型划分较细，那么同一类型中的每一个个体都是同质的，
因而无需采用随机抽样。<2>只要类型划分合理，而且分配给各类的名额符合总体中各
类人员的分布，那么样本就可以准确地反映总体。（5）滚雪球抽样（北大92、93<名>）：
是先从几个适合的调查对象开始，然后通过他们得到更多的调查对象，这样一步步扩大
样本范围。当调查总体的个体信息不充分时，常采用此种方法。但是，用这种方法抽样
最后仍有许多个体无法找到，还有些个体因某些愿意被提供者故意漏掉不提，这两者都
可能具有某些值得注意的性质，因而可能产生偏误。（6）空间抽样：是针对一个变动
的总体，如游行队伍、集会等进行抽样的方法，这种总体虽然是变动的，但在空间上是
有限的。空间抽样最重要的是要在同一时间对整个总体进行抽样，以防止它的组成经历
太大的变化。
60、 样本容量的确定（北大2002<简>：简述影响调查样本代表性的主要因素；人大2001、
浙大1999<简>：简述影响样本容量的因素）：（1）样本容量：又称样本大小、样本规
模，指的是样本内所含个体数量的多少。（2）影响样本容量的因素：<1>研究的精确度
要求：在研究目的是由样本得到对总体的估计时，首先要依研究的目的对这种估计所允
许的误差大小做出规定，即确定抽样的精确度。允许误差（精确度）等于抽样误差与概
率度t的乘积，t值取决于研究所要求的置信水平。由重复简单随机抽样的误差公式
/ n 可知，抽样误差与样本大小密切相关，样本越大，越接近总体，抽样误差越小。
因此，对样本的精确度要求越高，所允许的误差则越小，样本就应越大，反之亦然。<2>
总体性质：在一定精度要求下，总体越大其样本要求亦应越大；总体内部异质性程度越
低，所需样本容量越小。<3>分析要求：在确定样本大小时，应估计一下在分析时样本
需作哪些分类，并保证每个类别有一个能够统计分析的子样本，相关分析和其后的检验
方法要求每个小类的子样本容量不小于10。<4>抽样方法：在选定抽样方法后，须分别
考察和计算这一方法所需样本数。<5>无回答；<6>经费。
第八章：问卷法
61、 问卷的基本结构：（1）封面信（南大98<名>）：即一封致被调查者的短信，其作用
在于向被调查者介绍和说明调查者的身份、调查目的等内容。内容：<1>调查的主办单
位或个人的身份；<2>调查的内容和范围；<3>调查的目的；<4>调查对象的选取方法。
（2）指导语（南大97<名>：问卷指导语）：即用来教被调查者如何正确填答问卷，教
访问员如何正确完成问卷调查工作的一组陈述。卷头指导语：一般以“填表说明”的形
式出现在封面信之后，正式调查问题之前。作用：对填表的要求、方法、注意事项等做
一个总的说明。卷中指导语：一般是针对某些较特殊的问题所作出的特定指示。总之，
问卷中每一个可能使回答者不清楚、不明白、难理解的地方，一切有可能成为回答者填
答问卷的障碍的地方，都需要给于某种指导，而对于编写指导语来说，最主要的标准，
就是简明易懂。 （3）问题和答案：开放式问题：就是不为回答者提供具体的答
案，而由回答者自由回答的问题。优点：允许回答者充分自由的按自己的方式发表意见，
不受限制，因而，回答往往是最自然的。所得资料也往往比封闭式问题丰富生动。缺点：
<1>要求回答者有较高的知识水平和文字表达能力，限制了调查的范围和对象。<2>要
求回答者花费较多的时间和精力。<3>得到的资料难于处理，尤其难于定量的分析和处
理。封闭式问题：就是在提出问题的同时，还给出若干个可能的答案，供回答者根据自
己的实际情况从中选择一个作为回答。 优点：<1>回答方便，对文字表达能力无特
殊要求。<2>回答者花费时间精力较少。<3>所得资料集中，便于进行统计处理和定量
分析。缺点：<1>所得资料失去了开放式问题的那种自发性和表现力。<2>回答中的偏
误难以发现。
问卷内容三个基本方面：<1>有关行为方面的问题；<2>有关态度或看法方面的问题；
<3>有关回答者个人背景的问题。 （4）其他资料：如问卷的名
称、编号、问卷发放及回收日期、调查员、审核员姓名、被调查者住址、问题的预编码
等。
62、 问卷设计的基本原则（人大2000<简>：简述问卷设计的原则和基本步骤）： （1）
把为被调查者着想作为问卷设计的出发点。主要错误有：<1>问卷设计得很长，问题太
多，需要填答的量太大。<2>问卷中要求被调查者进行难度较大的回忆和计算。
（2）对阻碍问卷调查的因素有明确地认识。问卷调查实质上是调查者与被调查者之间
的一种社会互动过程。 有以下障碍：<1>主观障碍：即由被调查者
心理上和思想上对问卷产生各种不良反应所形成的障碍。包括：（A）畏难情绪；（B）
顾虑重重；（C）漫不经心；（D）毫无兴趣； <2>客观
障碍：指被调查者受自身的能力、条件等方面的限制所形成的障碍。包括：（A）阅读
能力的限制；（B）理解能力的限制；（C）表达能力的限制；（D）记忆能力的限制；
（E）计算能力的限制。 （3）从多个不同角度来考
虑问卷的设计工作：<1>调查目的的影响；<2>调查内容的影响；<3>样本性质的影响；
<4>资料处理分析方法的影响；<5>问卷使用方式的影响；<6>调查经费和时间的影响。
63、 问卷设计的主要步骤： （1）探索性工作：最常见的方式，是问卷设
计着亲自进行一定时间的非结构式访问。（2）设计问卷初稿：<1>卡片法：（A）根据
设计者在探索性工作中的记录、印象或认识，把每一个问题及答案单独写在一张卡片上。
（B）按照卡片上问题的主题内容，把问题卡片分成若干堆。（C）在每一堆中，按日
常询问的习惯与逻辑，排出问题的先后顺序。（D）根据问卷的逻辑结构排出各堆的前
后顺序，是全部卡片连成一份完整的问卷。（E）从回答者阅读和填答问卷是否方便，
是否会造成对回答者心理的影响等不同角度，反复检查问题的前后连贯性及逻辑性，对
不当之处逐一调整，并可补充一些新的问题卡片。（F）把调整好的问题依次写在纸上，
形成问卷初稿。 缺点：在第一阶段些具体问题时，由
于缺乏总的结构，所以常常漏写某些方面的问题。 <2>框图
法（北大2000<名>）：（A）根据研究假设和所需资料的逻辑结构，在纸上画出整个问
卷的各个部分及前后顺序框图。（B）从回答者回答是否方便，是否会形成心理压力，
问题内容前后是否符合逻辑等方便反复考虑这些部分的前后顺序。（C）具体的写出每
一部分中的问题及答案，并安排好它们在该部分中的顺序和形式。（D）最后对全部问
题的形式、前后顺序等方面从总体上进行修订和调整，然后将结果抄写在另一纸上，形
成问题初稿。
缺点：修改调整问题不如前者方便。
<3>两种方法的区别：前者是从问题开始，由部分到整体，后者相反，先从总体结构开
始，由部分到具体问题。 （3）
试用和修改：<1>客观检验法：将设计好的问卷初稿打印几十份，然后在正式调查的总
体中选择一个小样本来试用。检查项目：（A）回收率；（B）有效回收率：即除掉各种
废卷后的回收率；（C）对未回答的问题的分析；（D）对填答错误的分析。
<2>主观评价法：将设计好的问卷初稿抄写或复印若干份，分别送给该研究领域的专家、
学者、研究者的同行以及典型的被调查者等，请他们根据自己的经验和认识，从各个不
同的角度和不同的方面直接对问卷进行评论，指出各种缺陷和错误。
64、 问卷设计的具体方法（北大92<设>：某项问卷调查要了解群众对“社会治安状况”、
“物质生活状况”和“经济发展前景”的看法、意见或态度。试针对这三个方面，各设
计两项问题（一项是封闭式，一项是开放式）；北大96<设>：试设计一份简单的问卷，
并说明你的研究目的，研究假设，主要变量和设计问卷的框图；北大99<设>：试设计
一份调查问卷（8-12个问题），并说明你的研究目的，研究假设和问卷设计的框图（变
量关系图））： （１）问题的形式： <1>填空
式：这种形式常用于那些对回答者来说既容易回答，又方便填写的问题（通常只须填写
数字）。<2>是否式：即答案只有肯定和否定两种，回答着根据自己情况选择其一。弱
点：得到的信息量太少，类别太粗，不能了解和分析回答者中客观存在的不同层次。
<3>多项选择式：即给出的答案至少在两个以上，回答者选择其一。<4>矩阵式：当询
问若干个具有相同答案形式的问题时，可以将其设计成矩阵形式。优点是：节省空间，
问卷显得紧凑。也节省了回答者阅读和填答时间。 <5>表格式：和矩阵式十分
相似。除了具有矩阵式特点外，还显得更为整齐醒目。注意不宜多用，以免呆板单调。
（2）答案的设计要求：<1>保证答案具有穷进行和互斥性。<2>根据研究的需要来确定
变量的测量层次。<3>当有些问题的答案如果要将他们全部列出，即使不是不可能也是
十分困难的，可以采取列几个主要答案，然后加上一项其他。如果问卷回收后选择“其
他”一类的回答者非常多，那就说明所列举的那几类还不恰当，还有更重要的类别没有
单列出来。 （3）问题的语言和提问方式（南大95<简>：设计问卷是怎样艺术
地提出问题。）：规则：<1>尽量用简单的语言；<2>问题要尽量简短；<3>避免双重含
义问题；<4>问题不要带倾向性。人们对问题的回答在一定程度上很受问题措辞所表现
出来的倾向性，也称诱发性的影响。<5>不用否定式提问。<6>不问回答者不知道的问
题。<7>不直接问敏感性问题。<8>问题的参考框架要明确。参照框架：是指问题相对
于什么背景而言，在什么范围内或对什么方面而言。
（4）问题的数目和顺序：问卷不宜太长，问题不宜太多，一般以回答者能在30分钟内
完成为宜。
安排问题顺序的规则（南大2000<简>：在问卷中，问题的排列应遵循怎样的原则）：
<1>被调查者熟悉的、简单易懂的问题放在前面，比较生疏、比较难回答的问题放在后
面。<2>把能引起被调查者兴趣的问题放在前面，把容易引起被调查者紧张和顾虑的问
题放在后面。<3>把开放式问题放在问卷的结尾部分。<4>先问行为方面的问题，再问
态度方面的问题，最后问个人的背景资料。<5>按一定的逻辑顺序排列问题。
（5）相倚问题：在问卷中，有些问题只是用于样本中的一部分调查对象，而且某个调
查对象是否回答这一问题，常常要依据他对前面某个问题的回答结果而定。这样的问题，
称之为相倚问题，而前面的那个问题则叫做过滤问题或筛选问题。
65、 问卷设计的常见错误（北大95<简> 简述问卷设计中常见的错误，为避免这些错误，
问卷设计是应遵循何种原则）：（1）问题含糊：即问题的含义不清楚，不明确或有歧
异。（2）概念抽象。（3）问题带有倾向性。（4）问题提法不妥。（5）双重含义问题。
（6）问题与答案不协调。（7）答案设计不合理。（8）语言中的毛病。（9）其他方面
的问题：表格设计过于复杂、问题太多、不正确等；封面信介绍不够、过于简单、或过
于罗嗦、不简明扼要；校对检查不够，出现一些印刷错误等。
66、 问卷法的特点及运用（北大93<简>：试说明个案研究、社区研究与问卷调查的主要区
别。北大94<论>：试比较问卷调查与个案研究的特点及优缺点）：
（1）问卷法的优点：<1>节省时间、经费和人力。<2>具有很好的匿名性。<3>可以避
免偏见、减少调查误差。<4>便于定量处理和分析。（2）问卷法的缺点：<1>对被调查
者的文化水平有一定要求。<2>回答率往往难以保证。<3>不能保证填答问卷的环境和
填答的质量。（3）问卷法的应用：在实际社会研究中，问卷法作为一种主要的资料收
集方法，常常与大规模的抽样调查以及资料的定量分析相联系。可以说，抽样-问卷-定
量分析三者的结合体，是现代社会学定量研究中最常见，也是最重要的一种方式。问卷
法要求被调查对象有一定文化水平。其适用范围还受到调查对象总体构成情况的影响，
在成分单一的总体中比在成分混杂的总体中适用。
第九章：访问法
67、 结构式访问（北大2004<名>；南大95<名>：标准化访谈）：（1）结构式访问又称
标准化访问，它是一种对访问过程高度控制的访问。这种访问的对象必须按照统一的标
准和方法选取，一般采用概率抽样。访问的过程也是高度标准化，即对所有被访问者提
出的问题，提问的次序和方式，以及对被访问者回答的记录方式等是完全统一的。为了
使这种统一性得到保证，通常采用实现统一设计、有一定结构的问卷进行访问。访问中
所有调查员都必须严格按问卷上的问题发问，不能随意对问题作解释，当被调查者表示
不明白时，只能重复一边问题或按统一的口径进行解释。通常这种类型的访问都有一份
访问指南，其中对问卷中有可能发生误解问题的地方都有说明，这些说明规定了访问者
对这些问题解释的口径。 （2）结构式访问的优点：<1>访问结果便于
量化，可作统计分析，它是统计调查的一种。<2>能够控制调查过程，从而可以最大限
度的降低来自被调查者方面的误差，提高调查结果的可靠程度。<3>与自填问卷相比，
回收率高，而且回收了的问卷的应答率也高。<4>应用范围更广范，可以问一些比较复
杂的问题，并可选择性地对某些特定问题作深入调查，因而大大扩大了应用范围。<5>
能在回答问题之外，对被访问者的态度行为进行观察，结构式访问能获得自填问卷无法
获得的有关访问对象的许多非语言信息。
（3）结构式访问的缺点：<1>与自填问卷相比，费用高，时间长，因而往往使调查的规
模受到限制。<2>对于敏感性、尖锐性或有关个人隐私的问题，它的效度不及前者。<3>
对访问员的要求更高。<4>由于结构式访问采用统一的问卷和表格进行调查，这种统一
的问卷和表格显然无法包括时间的全部，故而只能选区几个方面调查，这就是这种类型
的访问很难触及到社会生活的深层及其变化过程，难于综合性的多层次的把握问题，使
研究流于表面化。对某些统计结果，由于不知道有关的社会背景情况，而无法进行恰当
深入的解释。
68、 无结构式访问：又称非标准化访问，它是一种被控制或无控制的访问。事先
不预定问卷、表格和提问的标准程序，只给调查者一个题目，有调查者与被调查者就这
个题目自由交谈，调查对象可以随便得谈出自己的意见和感受，而无需顾及调查者的需
要，调查者事先虽有一个粗线条的问题大纲或几个要点，但所提问题是在访问过程中边
谈边形成，随时提出的。
（1）无结构式访问优点：<1>弹性大，能充分发挥访问者与被访问者的积极性。<2>访
问者能对问题作全面、深入得了解。<3>能获得有关研究对象生活与行动与其中的环境
的生动地感觉。 （2）
无结构式访问缺点：<1>比较费时，其规模受限制。<2>对访问员素质要求更高。<3>结
果难与定量分析。 （3）重点访问：又称集中
访问，是集中于某一经验及其影响的访问。 具
体做法：<1>选择一定的情境，并把调查对象安排到这一预先设置好的情境中去，或者
是选择那些曾经经历过这种情境的人做访问对象。<2>然后对他们进行访问，调查他们
在情境当中的主观经验，即个人对情境的认识与解释，这种主观经验及时重点访问的重
点所在。重点访问的假设：透过某种刺激，可是调查对象在情境上产生特殊的反应。研
究中从这些反应获得信息，再加以解释。
重点访问严格地说应当是半结构的，而不是完全无结构的，因为访问问题及时措辞没有
事先确定，但问题的内容是事先确定了的。 应用：<1>重点访问在分
析特殊经验所引起的态度变迁上，效果较大，因此常常被社会心理学家用来研究大众传
播的效果。<2>由于重者访问总是以一个预先的假设为基础的，因此还常常被用于正是
以前有关人类情境行为假说的正确程度。
特点：由于这种类型的访问中往往收集到的是许多不可比较的材料，因而分析解释工作
难度较大。此外这一方法的运用需要高度的技巧与想象力。
（4）深度访问（北大92<名>；北大97<名>；人大97<简>：简述深入访谈的基本类型；
浙大99、2000<名>）：又称临床式访问，它是为搜集个人特定经验的过程及其动机和
情感资料所作的访问。对个人生活是的访问是个人生活史研究中获得资料的主要方法之
一。生活史研究是一种对人们的生活经历进行详细了解和分析的研究方法，它采用访问、
观察或由被研究者自己写自传等方式，对某一社区或某一群体中的全部或部分个体的生
活经历进行详细地了解，如实记录下研究对象生活经历中各方面的情况，然后将不同个
体的生活史进行统一的整理和归纳，找出共同点和不同点，并找出其中典型的个案作为
描述和解释的例证，以此来反映这一群体的社会生活状况以及他们的心理、思想、态度
和观念等。 深度访问特点：<1>与重点访问
相似，也是一种半结构式访问，它选区研究问题的某些方面向研究对象提问题，访问是
机动的或结构松散的，但重点与焦点是有的。<2>允许在访问中对以外的因素充分探索
和深究，研究人员可能由此而获得某种重大发现，这种偶然重大发现往往带来研究问题
的突破。 （5）客观陈述法（北大98<名>）：
又称非引导式访问，最大特点是让调查对象对他自己和他周围的社会先做一番考察，在
客观的陈述出来，即调查者鼓励调查对象把自己的信仰、价值观念、行为以及他所生活
的社会环境客观地加以描述。
（6）座谈会：也就是调查会，是一种无结构式集体访问，即将调查对象集中起来进行
共同讨论。
座谈会特点：访谈过程不仅是调查者与被调查者的社会互动过程，也是调查对象之间的
社会互动过程。要求调查者有更熟练的访谈技巧及组织会议的能力。容易产生一种“团
体压力”，是个人顺从多数人的意见，而不敢表示异见。因此，对一些敏感的问题，不
宜采用这种方法。与个别访问相比，更难做深入细致的研究。
座谈会应用：这一方法常被用于验证或调查集体行为与群体关系的倾向，以及心理治疗
和企业及组织诊断。典型调查业常用这种方法。 座谈会要求：根据长期实践经验，调
查会人数以5-7人为宜，最多不要超过十人。参加调查会的人员一般应具有代表性，了
解情况，敢于发言，并且最好是相互信任，有共同语言的人。访谈前应将访问的具体内
容、要求和到会人员的名单告诉参加调查会的全体调查对象。正式访问前，访问者应做
好充分的准备、拟定好访问提纲。
座谈会的两种方式：<1>头脑风暴法（复旦96、97<名>）：即会议主持者不说明会议
的明确目的，而只就某一方面的总议题，请到会者自由发表意见，会议主持者不发表意
见，更不对别人的意见内容提出评论。<2>反向头脑风暴法：即会议首先列出某方面的
问题，参加这不仅自己发表意见，而且必须针对别人的意见展开批评与评价，以寻求解
决问题的途径。注意事项：调查会上要避免让某些权威人士的发言左右其他人的发言，
或受调查会主持人的意见左右，而要使各种意见都能得到充分发言。
（7）无结构式访问与个案研究（北大92、2003<名>；北大93<简>：是说明个案研究、
社区研究与问卷调查的主要区别；北大94<论>：是比较问卷调查与个案研究的特点及
优缺点）：<1>主要特点：处理问题深入全面细致。是一种从整体上处理问题的方法，
也就是从事务的多个方面和整体情况，从各个层次间生动联系以及从历史发展状况把握
问题。 <2>将个人作为个案研究单位时，研究资料的来源有：（A）个人文献资料；
（B）访问资料；（C）观察所的资料。 <3>个
案研究的形式：（A）描述和解释个案，提供有关当前的状况和它不断运行的动力的信
息。这种分析可称作列举性分析。他是利用一般规律或规则进行特殊个案的分析，机用
一个以及的概括作出一个特殊的分析。（B）通过对单个个案的分析，发展出经验的概
括或理论，不是以个案去发现它作为一个系统的有关的一切，尔是把它作为理论建构的
经验基础，使用特殊个案发展一般陈述。 <4>应用：（A）作为和社会
状况及文化背景相关的东西，要进行具体详细地研究时。（B）要研究某个对象、某人、
某种状况的自然发展或生活史时。（C）如果不能确保整个社会状况或有关因素的复合
关联的事实，技术社会过程的分析就不能进行时。（D）要研究个人生活及社会需求、
冬季或者生动的存在、文化背景下的群体行为时。 <5>
特点与作用：（A）能从个案的详细描述和分析中，发现影响事物的主要因素及其作用，
从而导致假设的形成，并找出群体或类型的详细资料。（B）很多场合下，个案研究亦
被认为是完成一个正式研究的必要的结束手续，即研究的结果可用个案研究印证是否正
确。（C）它的最大优点是对于个案的社会背景进行深入全面地把握。
69、 访问的程序与技巧（南开2000<简>：访问时应特别注意那三个环节的问题）：
（1）访问准备。（2）进入访问。（3）访问的控制：<1>提问控制：（A）题目转换；
（B）对问题的追问；（C）合适的发问与插话；（D）提问注意事项。<2>表情与动作
控制。（4）结束访问。（5）访问纪录。
70、 访问员的挑选与训练（复旦96<简>:挑选访问员的标准是什么）：（1）特殊
条件：<1>性别；<2>年龄；<3>教育；<4>地区。（2）一般条件：<1>诚实与精确；<2>
兴趣与能力；<3>勤奋负责；<4>谦虚耐心。
71、 访问法的特点（南大96<简>：试述访谈法的特点）：
优点：（1）它是一种面对面的社会交往过程，访问者与被访者的相互作用，相互影响
贯穿调查过程的始终，并对调查结果产生影响。因此，能获得自填问卷无法获得的有关
访问对象的许多非语言信息。（2）访问具有很强烈的个人色彩，即它在很大程度上取
决于访问者个人的人际交往能力，访问技巧的熟练程度以及对访谈过程的有效控制。因
此更复杂而难于掌握。（3）与其他调查方法相比，访问可以获得的资料更丰富，实行
起来也更灵活、弹性更大，应用范围更广泛，且有利于对问题进行更深入的探索。（4）
环境可控是访问法的另一大优点。（5）访问法还可以充分发挥研究人员的主动性和创
造性，训练和培养他们的想象力、人际交往能力以及对事物的洞察力，激发他们对问题
的新的认识和解决问题的新思路。
缺点：（1）无法做到完全客观；（2）对敏感型问题、尖锐问题和隐秘问题，被访问者
一般不愿当面回答，或者不做真实回答，一般不宜用访问法。（3）无法用语言表达的
经验情感过程，以及许多人的互动资料、心理经验、身体的动作以及场所和速度的变化
等社会测量的资料都不宜或无法用访问法获取。（4）与其他访调查方法相比，费用较
高，费时较长，需要的人力较多。
72、 量表与测验法（北大94<简>：试比较问卷和量表的异同；北大96<简>：试
说明调查量表、社会计量法、民意测验的特点及各自的运用范围）：？？
73、 量表的概念（浙大2001<名>;南大2000<名>）：
（1）量表与维度：维度属于理论范畴，它表示现象的某一层次或某一方面，或者说，
它在抽象层次上表示从某一角度看待现象时的某种连续统一体。维度与理论分量的概念
常常被看作是同义的。与维度不同，量表与指标都是用来捕获和再现理论维度的经验工
具，即对理论维度的一种代表。可以说，量表和指标是用在经验层次上对现象的连续统
一体的测量。（2）量表与指标（北大2004<简>：指标和量表的主要不同点）：<1>社
会研究中，量表的概念最经常地用来表示包括着判断或主观判断的测量。在社会科学中，
某些测量仪器也不称作量表，因为他们也不包括判断。<2>量表通常是由多项测量内容
综合而成的。每一项内容都可看作是经验变量的一个指标或指示标志。而一个量表就可
有两个或更多个指标所构成。因此，我们也可以把量表视为衡量概念（或变量）的综合
指标，它不同于一个单项指标。 （3）量表和指数：在社会研究中，两者区分不严
格，但不完全相同。指数也可由一组指标综合而成。这组指标分别对一个复杂概念的不
同部分进行测量，然后对这组指标的树枝进行累加或其他运算就可综合为一个指数。而
这主要区别：量表必须由一套问卷问题所构成。指数则可以依据其他的资料。一般来说，
指数是由几个数量指标的运算综合而成的。而量表则由对一组问题的回答“计分”综合
而成的，他常用于测量人们的态度。 （4）量表
作用：相当于一把尺子，作用在于精确度量一个较抽象的或综合性较强的概念，特别是
度量态度和观念的不同程度或差异。（5）量表缺点：设计比较复杂，测量的信度和效
度还不太高。
74、 量表的类型（北大2002<简>：为什么要区分调查量表和测验量表）：量表
可分为调查量表和测验量表。它们分别用于问卷调查和测验中。在问卷调查中，使用量
表的主要目的是要精确了解总体的状况。它的分析重点是群体而不是个人。而在测验中
通常是要精确的观测个人的某一特征，他的分析重点是个人，因此量表设计要严格、精
确且具有较高的信度和效度，这就需要设计大量题目。与此相反，问卷调查中的量表题
目较少，效度不要求很高。研究目的不同，量表的设计也不同；对于目前尚不能精确量
度的事物，可以通过大量题目，也可以通过大量样本的主观判断来间接的近似的反映。
75、 总加量表（北大93<详>：试说明总加量表的制作程序，并设计一个量表（包
含5个语句）来测量“十四大”以后群众的政治态度）：目前使用最广泛的总加量表是
利克特量表，它是由美国社会心理学家利克特于1932年在原有的总加量表基础上改进
而成的。该量表由一组陈述组成，每一陈述有“非常同意”、“同意”、“不一定”、
“不同意”、“非常不同意”五种回答，分别记为1，2，3，4，5，每个被调查者的态
度总分就是他对各道题的回答所的分数的加总，这一总分可说明他的态度强弱或她在这
一量表上的不同状态。（1）总加量表的制作程序：<1>根据所要测量的内容或变量收集
大量与这一内容有关的问题，然后初步筛选出一组问题作为量表草案。<2>确定问题的
类别和计分标准。<3>试调查。从调查对象中找一些人尝试回答量表草案，以便发现量
表设计中有什么问题，是否会引起误解。更重要的是检查每道题的分辨能力。分辨能力
是指一个题目是否能区别出人们的不同态度或不同程度。<4>计算个题目的分辨力，删
去分辨力不高的题目，保留分辨力较高的题目组成正式量表。利克特量表检查分辨力的
方式是：将试调查中的分最高的25%的人与得分最低的25%的人进行比较，然后计算
出每道题的分辨力。 （2）利克特量表的优点：
<1>容易设计；<2>使用范围比其他量表要广，可以用来测量其他一些量表所不能测量
的某些多维度的复杂概念或态度。<3>通常情况下，利克特量表比同样长度的量表具有
更高的信度。<4>利克特量表的五种答案形式使回答者能够很方便的标出自己的位置 。
（3）利克特量表的缺点：<1>相同的态度的分着具有十分不同的态度形态。因为利克特
量表是一个项目总加的分代表一个人的赞成程度，它可大致上区分个体间谁的态度高，
谁的低，但无法进一步描述他们的态度结构差异。
76、 累积量表（南大95、96<名>：累积量表法；南大98<名>：古特曼量表）：
累积量表又称格特曼量表，它是格特曼（L.Guttman）1944年设计使用的。它也是目前
使用较为普遍的一种量表。格特曼量表是单维的，即量表自身结构中存在着某种由强变
弱或由弱变强的逻辑。因此也不会像利克特量表那样形成分数相同而态度结构形态不同
的现象，它的每一个量表总分，都只有一种特定的回答组合与之对应。（1）社会距离
量表：又称鲍格达斯量表，它是美国社会心理学家鲍格达斯于1925年创用的。这种量
表过去一直广泛用于测量人们对种族群体的态度，现在，它也被用来测量人们对职业、
社会阶层、宗教群体等事物的态度。鲍格达斯量表由一组表示不同社会距离或社会交往
程度的陈述组成。它要求被调查者根据自己的看法对这些陈述表态。在这一组问题中，
实际上蕴含着一种超强的逻辑结构。除了某些例外情况外，量表本身的逻辑结构使我们
能够得出这样的结论：即当一个人拒绝了量表中一项关系，那么它也必将拒绝这一关系
后面所有更强的关系。鲍格达斯量表测量所得到的结果，既可以用来比较具有不同特征
的人们对某一群体的社会距离的大小，也可以用来比较具有相同特征的人们对不同群体
的社会距离的大小。特别是将结果绘成统计图后，更便于进行分析。
（2）累积量表的制作：<1>研究人员围绕它所希望测量的某一事物或概念编制一组陈述，
这些陈述应该是单维的，即具有某种趋强结构。<2>然后用一个小样本对这些陈述进行
检验。<3>将检验的结果，按最赞成的陈述道最不赞成的回答者，从上到下排列<4>然
后从中去掉那些不能很好区分赞成的回答者与最不赞成的回答着的陈述。<5>按公式：
（再现系数=1-误差系数/回答总数）计算出再现系数。如果再现系数大于或等于0.90，
我们就称该量表是单维度的。每个人的态度的分就是他回答赞成的项目总数。
（3）格特曼量表的优点：可以直接根据被测者所同意的陈述的数目及他的量表分数，
来决定他对这一概念或事物的赞成程度，这也正是格特曼量表的最大优点。
（4）格特曼量表的缺点：<1>我们对一组陈述具有单维性的假设是有局限性的，这种单
维性往往只是某一部分人的态度模式，一组特定的陈述可能在某一群体中表现出单维模
式。同样，在一个时期中是单维的模式，但到了另一个时期却不一定还是单维的。<2>
单维的领域往往难于找到。
77、 语义差异量表（北大99<名>；南大99<名>）：是用一组意义相反的陈述或
形容词构成一份评价量表，以用来测量人们对某一特定概念或事物的不同意识和感受。
78、 测验（北大2000<简>: 试述测验法与民意测验的异同）：测验是以间接的方
式收集个人的态度、人格结构和心理行为等方面资料的方法。它是一种标准化了的程序，
在这个程序里，受测人对一组预先设计好了的刺激做出反应，这些反应能够使得测验者
能够以一个数或一组数来描写受测者，并有这个数或一组数推论受测者拥有这个测验所
想测量的心理行为的状况。（1）测验方式：<1>直接测量：对于行为的测量，通常是直
接测量。<2>间接测量：对于心理特征，测验是通过对反应的测量而间接的测定与其对
应的心理特性。测验通过刺激-反应的联结关系将个体内在的人格、心理与外在的行为联
系起来，从而达到通过对外在行为的观察测量而推论它所联结的内在人格、心理特征的
目的。测验中，作为刺激的，可以是：一个或一组量表，一件工作，一个模糊不清的信
号等。（2）能力测验：<1>一般智力测验；<2>特殊能力测验；（3）成就测验：目的
在于测量某个人对某项工作已经知道多少货能够完成某种程度。主要测量：<1>工作知
识或见闻；<2>工作技能；<3>还可通过对他人施测，以了解他的工作效绩。（4）人格
与兴趣测验：<1>自陈式测验；<2>投射测验。
79、 社会计量法（北大96<问>:试说明调查量表、社会计量法、民意测验的特点
及各自的适用范围；北大99<简>：简述社会计量法的特点和分析方法；复旦96<名>；
人大2001<名>；浙大99、2001<名>）： （1）社会计量法：也称社会交往
计量，是评量某一群体、组织中的人际吸引或拒斥关系的工具，或更进一步说是：用以
决定个人在群体与组织中被接受的程度，发现群体内人与人之间的现存关系，并解释组
织本身的结构特征的工具。社会计量法是美国心理学家莫雷诺等人1930年所创用的，
主要用于小整群体的人际关系与群体结构的研究。
（2）社会计量法常用的方法：<1>准绳法。采用问卷收集资料，对群体实施整体调查。
在设计问卷时要确定以什么为准绳来测量所要了解的人们之间的关系。准绳通常是一个
问题，回答这可以在群体内选择若干人来回答这一问题。准绳的选择关键是要准确反映
出所要测量的关系；其次要具体而切实，易于被调查者了解和回答，切忌空泛模糊，一
般情况下不使用消极的准绳。<2>量表法。即使用量表，让回答者对群体中每个成员的
素质、个性或有关行为作出评判。<3>群体偏好记录法。即直接要求回答这对群体内每
个成员表示“喜欢”“不喜欢”或“关心”“不关心”等态度。 <4>“猜是谁”
技术。即给出一些表述，要求回答者找出群体中最符合这些表述的人。 （3）社
会计量法的分析技术： <1>社会矩阵法：是一个n*n方形表
格，n是被测群体人数，左方的一列数字为选择者的代号，上方的一行数字为被选择者
的代号，表中的1、2、3表示第一、第二、第三选择，表的底部数字为每人所获选择的
总数。为了解选择的分布、互选数量及小整群体成分，可将社会矩阵转化成各种统计表，
获得更多有意义的资料。<2>社群图法：社群图（北大98<名>；南大96<简>：同心圆
式社会关系图制作方法；南大2000<简>：社会关系图是怎样形成的）：是以图形综合
群体成员间的选择，图中每一个圆圈中的数字表示一个工人，它们之间发生选择用箭头
连接，箭头指向被选择者，如果是互选则用双箭头。绘图时应当注意通常是将受选数最
多的放在中间位置，次多者置于他的周围，受选数极少或无人选择者置于最外围。此外
在绘图时还应尽量避免线条交叉。 社群图分析：（A）孤独者数量；所谓孤独者指的是
既不选择他人又不为他人所选的人。（B）意见领袖的数量。在群体中被10%以上成员
提名的人被称为意见领袖。如社群图中缺乏意见领袖，且图又显得散乱时，表明群体结
构松散。（C）对偶数量。一对互选的成员称作一个对偶。愈是团结的群体，其对偶数
也愈多。（D）串联的数量。这是指3人以上的连锁关系。串联是群体团结的要素，串
联数愈多，愈长，群体关系就越紧密。如果社群图中互选的对偶数多而且有较多的长而
重叠的串联时，显示群体或组织有相当完整的结构与良好的沟通网络，成员之间相互比
较了解且关系融洽。（E）小群体的数量。小团体由3个以上成员组成，每个人至少选
择一个小团体中的成员，并至少被一次，小团体构成一种封闭的连锁关系。在一个群体
或组织中的这些小团体为非正式团体，多由兴趣、爱好、工作等原因形成。如果社群图
中这种非正式小团体明显存在并且小团体之间又很少沟通时，则群体容易产生摩擦。（F）
主要联络点与次要联络点的数量。在群体中那种当他一旦离开将会使群体至少分成两个
小群体的人，成为主要联络点。那种当他连同另一个人同时离开将会使群体至少分成两
个小群体的人称为次要联络点。如果社群图中孤立者和联络点多，则会增加群体内信息、
意见与情感沟通的困难。 指数分析：即通过社会
计量指数分析个人在群体中的地位，比较同一群体内不同情境下每个人的社会地位，且
对不同群体的特征进行比较。
常用到的指数有：（A）社会地位指数：表明个人在群体中受重视的程度；（B）首选
地位指数：表明个人在群体内所受支持的程度。（C）高和低选择者：受选择数在平均
选择数一个标准差以上者，低选择者是在其以下者。（D）吸引率：表明群体内吸引作
用发生的程度；（E）团结指数：表明群体的团结程度。（F）调和指数：表明团体中调
和的程度。（G）内群亲近率和外群亲近率。前者显示群体成员对本群体向心的程度；
后者显示成员的离心程度。
社会计量法的作用：运用社群图和指数分析，我们可以直观地得到群体性质的概貌，即
有关群体的下列信息：（A）群体的结构类型；（B）群体内信息沟通方式；（C）群体
的内聚力；（D）群体内人际关系；（E）群体中的领袖人物；（F）群体间的关系。
（4）社会计量法的应用：<1>领导才能的评价与干部选拔；<2>工作分配；<3>士气的
考察；<4>组织诊断和治疗；<5>评价。
80、 民意测验（北大93、94、2004<名>；北大96<问>:试说明调查量表、社会
计量法、民意测验的特点及各自的适用范围；北大2001<简>：试述测验法与民意测验
的异同）：也称民意调查、舆论调查，是一种了解公众对某些政治、经济、社会问题的
意见和态度的调查方法，其目的在于通过对大量样本的问卷调查来精确反映社会舆论或
一般民意动向。
（1）民意测验的作用：<1>客观及时地反映社会舆论和大众心理的一般状况和变化情况。
<2>为制定或评价政策、措施提供依据。<3>对大众心理进行分析和预测。
（2）民意测验的程序：<1>确定调查课题；<2>确定调查对象和抽样方案；<3>设计调
查问卷；<4>发放和回收问卷；<5>对调查资料进行统计分析。
（3）民意测验的优缺点：<1>盖洛普认为，只要采用科学的抽样方法，那么当样本数量
达到一定规模后，就能较好的反映总体，这时样本在增加样本并不能提高多少精确度。
对美国一亿人的民意测验，抽取1500-2000人的样本就可以达到足够的精确度。<2>其
次，他指出：“通过近五十年的民意测验，我们发现，公众的集体判断是极为可靠的，
特别是在那些他们熟悉的问题上。公众实际上常常比它们选出的领导人更早的接受创新
和社会变革。” 缺点：<3>由于民意测验是用简化的方式来了解公众的一般态度，他
对不同含义、不同程度的意见、态度都用是或否、赞成或反对者两种答案来概括，因此
它很难做出深入地分析和理论解释。<4>民意测验只限于询问一些公众熟悉、易于回答
的问题，它获得的信息较为表面化、简单化、缺乏深度。此外，对于公众不熟悉或缺乏
了解到问题，回答的信度和效度有可能较低。
优点：<5>能迅速的了解群众对某些问题的看法，及时反映社会舆论的变化情况；<6>
调查结果能推论总体的一般状况，具有较高的代表性。<7>只需抽取较少比重的样本就
能了解总体和全局的情况。
第十一章：观察法
81、 观察的类型：（1）按场所：<1>实验室观察。<2>实地观察。（2）按观察
者角色：<1>局外观察。<2>参与观察。（3）按观察程序不同：<1>结构式观察。<2>
非结构式观察。事先并不专注于某些特定的行为和特征，在观察过程中也不知是期待这
种行为的出现。他们只是当行为发生时进行全面的观察并记录下来。因此，非结构是观
察的资料通常不能像结构是观察所的资料那样进行定量处理。（4）按观察对象分：<1>
直接观察。即对那些正在发生、发展和变化着的人们的行为所进行的观察。即研究者当
时亲眼目睹人们的行为举止。目睹正在发生的各种事件和过程。<2>间接观察。
82、 实验室观察：常常是为了了解人们某些具体的、细微的行为特征，这些行为
特征则是作为命题中概念（或变量）的指标被观察的。常常采用结构式观察的形式。也
可以是无结构的，它预先不建立一套分类系统；而是涉及一种情景让观察者自由活动，
通常是设计一些游戏，然后观察者在观察孔或单向镜后面进行观察，并采用投入理解发
分析游戏过程中的一系列行为。这种观察在于详细地了解行为的过程和特征，理解被观
察者的行为动机和价值规范。
83、 局外观察（南开2000<名>：非介入收集资料方法）：由于社会研究的对象
是有思想、有感情的人，所以许多研究方法都不可避免地会引起研究对象的各种反应，
从而影响到研究结果的客观性和准确性。为了克服这种现象，十分重要的一点就是要使
被研究的人意识不到他们正在被研究，同时又要保证他们在一种极其自然的、不受研究
人员干扰环境中行动。局外观察就是观察者置身于所观察的现象之外，冷眼旁观研究对
象的活动和表现。
84、 结构式观察：事先要对观察的范畴详细分类，对各项内容的观察和记录方法
逐一规定。常将注意力 集中到若干具体的、明确的、许多还是可以计数的行为和特征
上。这样，结构式观察的结果通常可以象问卷调查的结果那样进行定量的处理和分析。
（1）观察的范畴和分类。（2）观察的记录和分析。结构式观察预先都制定专门的观察
卡片，卡片上明确列出各种观察范畴和分类，观察者只需在相应的格内标记，而不作出
自己的评价。观察卡片设计的原则：简单、易行、可靠、准确。
85、 参与观察（北大93、94<名>；北大2000<论>：试举例说明参与观察的实施
过程和方法论意义）：指观察者亲自投身到所观察的社会现象和社会生活中去，在自身
成为社会生活中各种活动的一员的同时所进行的观察。（1）特点、应用及目的：多采
用无结构式观察。是人类学和民族志最常用的研究方法。它们的研究对象多是原始社区
或特殊的文化与亚文化群体。近几十年，人类学和社会学也将这种方法运用到对现代社
会某些特定群体和社区的研究中。
全面深入地描述某一特定的文化现象。它预先并没有什么具体的理论假设，也很难通过
其他方法获得所需要的资料，因此需要在研究领域内部进行长期观察，从大量现象中概
括出研究对象的主要特征。研究目的和特点决定了观察者要有较高的参与程度。在实地
研究中，研究人员努力忘却他们自己的文化，试图在当地的文化环境中再社会化。
（2）参与观察的类型（南大94<简>：使用观察法时调查者可以哪些角色出现）：<1>
完全的观察者：即局外观察者。<2>作为参与者的观察者：研究者的身份是被所研究和
观察的群体知道的，即人们都知道他是一个研究人员。它是以这种公开的身份参与到被
研究群体或社区中进行观察的。<3>作为观察者的参与者：他要求观察者既能够成为群
体的一员，又能在不暴露研究者身份的情况下询问问题。这是一种要求研究者采取虚伪
的角色的情形。<4>完全的参与者。实际上就是间谍的类型。在整个观察的过程中，被
观察群体的成员都相信他就是这一群体中的一个普通成员，一点也不知道他是一个观察
者。（3）参与观察法的优点：研究者生活在所研究的对象群体及社区中间，对许多现
象都能够得到生动具体的感性认识。同时，他还能公开询问想了解的任何问题，可收集
到许多采用其他方法难以得到的资料。（4）参与观察法的不足：被观察的人们会十分
现实的感觉到他们正在被观察，从而有可能改变他们的行为方式。也就是说，参与观察
者在客观上必然会影响到被观察对象的行为。（5）参与观察的主要问题：<1>进入现场。
<2>观察内容。<3>观察的时间地点。<4>与被观察者的关系（人大96<简>：简述在观
察中如何控制观察者与被观察者的社会距离）。观察者首先要确定自己担任哪种角色，
然后根据这种角色的要求确定与被观察者的关系。在实地参与观察中，与被观察者建立
良好关系是顺利开展研究的一个必要条件。观察者应当遵守当地的风俗习惯，学习他们
的语言、参与他们的活动。要使被观察的群体或社区接受，建立相互信任的关系，可采
取不同的策略：（A）一种是要表现出谦虚、谨慎的态度，使被观察者认为你不会危害
他们的生活。（B）借助上级机关和领导人的支持，显示出自己的重要地位，是当地的
人认识到你的研究的重要性 。（C）取得当地关键人物的支持，是他们意识到你的研究
也与他们的某些利益相一致。 <5>观察的准确性。
（6）无结构参与观察中的理论指导：<1>在进入现场前要查阅理论文献，了解前人的研
究和理论观点，从而选取一定的研究角度和观察角度。<2>在观察过程中要注意所观察
到的事实是否验证或推翻了过去的理论。<3>通过对观察资料的分析建立新的理论。
86、 间接观察（北大92、97、2000<名>；复旦96<名>）：其对象通常不是正在
活动着的人们，不是人们当时的行为和表现，也不是正在发生的事件和活动，而主要是
人们行为以后、事件发生以后所留下的各种痕迹。 （1）物质痕迹观察：是指人们
的行为所留下的迹象。<1>腐损测量：腐损是指人们在活动时有选择性的使用某类物体
所造成的腐蚀和腐损。<2>累积物测量：对人们遗留下来的物质进行观察，来推测人们
的行为特征。 （2）行为标志观察：这种观察是通过一些表面的或无意识的现
象来推测人们的行为方式和价值观。它假定，这些现象是人们行为或态度的间接反映。
（3）间接观察的优点：对被观察者没有任何影响，不会使他们产生反应，因此可以收
集到真实行为的资料。 （4）间接观
察的缺点：很难对效度进行检验，无法知道所观察的标志和迹象是否真正反映了所要调
查的行为或现象，即使能够反映的话，也很难断定这种行为-指标的关系是否具有普遍性。
所以间接观察一般都作为辅助手段，用以对其他方法进行补充和检验。
87、 观察的信度和效度：（1）观察的步骤：准备阶段：<1>确定研究目的；<2>
制定观察计划；<3>理论准备和物质准备； 实施阶段：<4>进入观察现场（或
实验室）；<5>与观察对象交往（或与被试者交谈）；<6>进行观察（或测量），作出
现场记录； 资料处理阶段：<7>整理和分析观测记录，进行统计分类，得出观察结
论；提出理论解释。<8>撰写调查报告。 （2）
观察的效度： 在观察的准备阶段：
<1>要选择适当的观察方法，然后根据这种方法，对研究者角色的规定来确定观察方案。
<2>在观察地点的选择上应考虑他是否适合研究目的。<3>对观察对象的选择也要考虑
研究目的和观察者角色的影响。<4>对内在理论效度影响较大的理论准备过程，即观察
范畴的选择和操作化。
在观察的实施阶段，影响内在经验效度的因素较多，主要来源于：<1>被观察者的反应。
<2>观察者本人的价值观和期望的影响。<3>观察者本人感官和记忆力的影响。
结构式观察只要在各个阶段上注意消除干扰因素的影响，就可以达到较高的内在效度。
无结构的观察和间接观察的内在效度不易检验，但它们的外在效度较高，而且具有其他
方法所不及的优点。
（3）观察的信度（北大95<问>：以无结构观察法为例说明实地研究中误差的主要来源
及其防范措施）：
观察的信度包括三种类型：<1>不同观察者的相关度；<2>稳定系数，计统一观察者在
不同时间观察的符合度；<3>信度系数：即不同观察者在不同时间内观察的符合度。
无结构观察的信度很难信赖，也很难检验，除非对一切都进行录像。因为无结构观察主
要依靠具体观察者的感官和主观描述，这种主观描述不是以数量表示的，也不是标准化
的，很难相互对比。观察的信度是随时间递增的，而且有较多记录的行为类别其信度也
较高。 提高观察信度的方式：<1>通过在不同时间的重复观察；<2>增加
观察者的人数。但前一种方法更为可信一些。
88、 观察法的作用和特点： （1）观察法的作用：观察法可以
提供有关社会行为的详细的、第一手的资料，可以对社会情景有直接的感性认识。观察
法还用来搜集用其他方法很难获取的信息。特别是当研究者与被研究者无法进行语言交
往或处于不同文化背景的情况下，常采用观察法。观察也是提出理论假设的基础。
（2）观察法的优点：<1>它可以当时当地观察到现象或行为的发生，从而掌握第一手资
料；<2>观察一般是在自然环境中进行的，因此，它对研究对象得扰动较小，从而可以
得到自然条件下真实行为的资料。<3>观察法特别适用研究无语言文字沟通的调查对象。
<4>可以弥补其他方法的缺陷。社会调查中，经常遇到调查对象不愿接受访谈，拒绝回
答以及不交回调查问卷的情况。此外，即使回答或填写问题，也有可能有意歪曲真实情
况或因记忆不清等愿意产生较大的误差。采用观察法可以避免上述局限性。
（3）观察法的特点：<1>观察的直接性和自然性；<2>观察者本人的主观意识和价值取
向更多介入到观察对象和观测资料中；<3>观察具有广泛性，观察法使用的场合更多，
观察者的范围更广，甚至未经多少专业训练的人也可以采用这种方法。
（4）观察法的缺点：<1>难以控制环境变量和时间变量，很难进行数量分析和统计判断；
<2>观察资料会受到观察者的价值观和感情因素的影响。<3>通过记录而得到的大量观
察资料很难整理分析。<4>在实际研究中，要做到科学的观察是非常困难的。这主要在
于社会过程与自然过程有某些本质区别：（A）社会过程受大量偶然因素的影响，很少
会出现完全相同的社会现象。因而很少显示出严格的规律性，只有通过多次，详细的观
察才能得到比较可靠的资料。（B）对社会过程的观察和理解要受观察者本人的价值观，
情感因素和知识结构的影响。（C）观察者的在场会影响研究对象的习惯行为和行动的
正常进程。
第十二章：实验法
89、 社会科学研究现象之间相互关系的方法有两种：实验法和相关分析法。后者
主要限于对过去的统计资料进行处理，它一般对研究环境很少控制。实验法则是在研究
现场中进行，资料搜集与研究过程同步，它对研究环境实行一定的控制，因此实验不仅
可以根据原因去预测结果，而且还可以通过控制原因去发现预期的结果。（1）实验法
的主要特征就是控制情景和变量来研究社会行为和社会现象的变化，以建立变量间的因
果关系。（2）实验分类：<1>实验室实验：它限于在有专门设备的实验室中进行，并对
实验的条件、控制以及实验设计都有严格的规定。<2>实地试验：它一般在实际场所中
进行，它的实验设计并不很严格。
90、 实验法的基本原理：实验研究的目的是建立变量间的因果关系。实验法的基
本原理：首先以一个理论假设为起点，这个假设一种因果关系的陈述，它假定某些自变
量会导致某些因变量的变化。然后进行如下操作：（1）在实验开始时对因变量进行测
试；（2）引入自变量，让它发挥作用或影响；（3）在实验结束前在测量因变量；（4）
比较前测与后测的差异值就可以检验假设。如果没有差异，就说明自变量对因变量没有
影响，从而推翻假设。如果有差异，则可证实原假设，即自变量对因变量有影响。为了
排除其他因素的影响，通常将受试者分为两个组：实验组与控制组。这两个组是随机选
派的，他们的所有特征和条件都相同，只不过在实验中，实验组收到自变量的影响；而
控制组为受到这种影响。分两个组进行试验的目的是要考察自变量x引起的变化E。因
为即使不引入自变量，由于某些其他外部因素的影响，在一定时间后（几小时、几天或
一年）后测的数值也肯定不会与前测的数值相等。外部因素的影响由U表示。实验组所
收的影响，实际上是有两部分组成的：一部分是由于外部的因素，另一部分是由于新引
入的自变量，即de=U+E。由于实验组和控制组的构成是采取随机分派的原则进行的，
因此实验组所受到的外部因素的影响与控制组所受的影响相等（即都等于U）。这样，
实验组真正受到的自变量的影响E应该为：E=de-U。
91、 实验的主要组成部分：（1）自变量与因变量：自变量是实验中的刺激因素，
是有待检验的、引起因变量变化的原因。因此，自变量应该是能够引起某种变化的。同
时，必须经过严格定义和操作化，这样，才便于在实验中进行测量。因变量是一种应该
有自变量所引起的状况，它是研究的关键点，是要被解释的现象。这种因变量应该在状
况上与实验前有所变化，也应该在接受自变量刺激的对象和未接受这种刺激的对象之间
有所不同。实验者应该尽量让自变量处于一种自然的状态中被观察和测量。（2）实验
组和控制组（北大2004<名>；南开2000、2001<名>；南大2000<名>）：在实验中，
我们把接受自变量刺激的一组对象叫做实验组；而把不接受自变量刺激的一组叫做控制
组。设置控制组的主要目的，是为了将研究本身对实验对象的影响，与实验刺激的影响
区分开来。为了达到这一目的，就要求在实验开始前，实验组与控制组成员的各方面条
件和状况都相差无几，即基本上不存在大的差别。（3）前测与后测：在实施实验刺激
以前对实验对象进行的测量称为前测。而在实施实验刺激后对他们的测量成为后测。
92、 实验的基本程序：（1）准备阶段：<1>确定研究问题和研究目的；<2>提出
理论假设和工作假设；<3>进行实验设计。（2）实施阶段：<4>选取实验对象；<5>实
施实验；（3）资料处理阶段：<6>整理分析资料；<7>撰写研究报告。
93、 实验的三项基本内容：（1）变量的选择和分类：在用实验法研究某个问题
时，首先要把与研究课题有关的各种因素挑选出来，然后分析这些因素之间的关系，建
立因果模型（2）变量的控制：对自变量的控制就是要有计划地、系统地安排实验刺激
的情景和程度，是其作用于因变量。控制外部影响的方法：<1>随机法：这是最常用的
方法，在理论上也是最有效的控制影响变量的方法。<2>配对法：这种控制变量的方法
是找出两个各种条件都完全相同的人，对其中一人分派到实验组，另一人分派到控制组。
<3>排除法：在实验之前把其他影响因素排除在外。<4>纳入法：把其他主要的影响变
量也当作自变量引入到实验中，同时对几个自变量进行操作、测量和检验。（3）变量
的测量。
94、 简单实验设计：是对单项假设进行验证，即考察一个自变量与一个因变量之
间的因果关系。此外，它只分为一个实验组和一个控制组，或仅有一个实验组。
多组实验设计则有三个以上的组，它可以考察多个自变量于因变量之间的关系。
简单实验设计的几种模式： （1）单组前后测实验设计：没有
控制组。这种设计一般在研究人员能够确定外部因素不会对实验产生影响即U=0的情况
下采用。否则，它无法区分因变量的改变有多少是自变量引起的，有多少是其他武官变
量引起的。 （2）典型实验设计（北大98<名>；南大96<
简>：一控制组实验设计方法）：两组前后测实验设计。主要优点：<1>比较实验组和控
制组前测与后测的差异值，不仅可以确定自变量的影响，而且还可以排除外部因素的影
响。<2>可以排除前测造成的某些干扰因素。 主要缺点：受试者经过一
次前测，所以可能会对自变量的引入产生敏感，这样，虽然不会影响内在效度，但会影
响和降低实验的外在效度。在前测会引起受试者敏感的情况下，应考虑采用无前测的实
验设计。 （3）两组无前测实验设计：这一设
计中，实验对象一般是随机抽取和随机分派的。在实验组引入自变量之后，同时在两个
组测量因变量。
（4）简单实验设计的特点：只考虑一个因变量与一个自变量的关系，因而操作容易，
简单易行，可以检验和建立明确的因果关系。但是，他将现实生活中错综复杂的关系简
化为单一的因果关系，这就大大降低了实验结论的概括能力和外在效度。因为现实事物
往往是“多因多果”的。另一个缺点：他将所有的其他影响因素都作为无关变量加以控
制和排除，忽视了各种因素间交互作用的效用，因而降低了实验的内在效度。
95、 交互作用效应：是指实验刺激（自变量）的影响（用E表示），外部因素的
影响（U）与前测干扰因素的影响（P）三者之间相互作用所产生的影响。实验刺激与前
I I
测干扰的交互作用用 表示；实验刺激与外部因素的交互作用 表示；前测与外部
PE EU
I I
因素的共同作用用 表示；这三类因素的共同交互作用效应用 表示。单组前后
PU PEU
测实验设计由于假定前测和外部因素影响很小，且将这些因素的交互作用忽略不计，因
此他的测量结果误差较大，效度较低。典型实验设计通过控制组排出了前测和外部因素
的影响，只有一些交互作用效应影响它的实验效度。两组前后测实验设计由于无前测，
因此效度最高。但事物前测也有一定局限性，它无法比较不同时间的变化，而且无法检
验在实验开始时两个组的特征值是否相等。
96、 多组实验设计：（1）所罗门四组设计：这种设计精确测量干扰因素和交互作
用效应的影响，它综合了典型设计和无前测设计的优点：该设计可以测量自变量、外部
变量和测量干扰这三类因素各自对因变量的影响。所罗门四组实验设计的实验效度较
高，可以区分出外部因素和测量干扰的影响。缺点：<1>设置四个组，必然要增加受试
者人数，从而增加了实验的困难；<2>所的结果必须经过复杂的统计检验。<3>它只能
判断其他外部因素对因变量有否影响，但无法确定哪些变量与因变量间还存在着因果关
系。
97、 多因素设计：可以检验多个自变量对因变量的影响。这种设计是典型设计的
扩充，它有三个实验组，各个组的自变量强度有明显差异。多因素设计的另一形式是考
察两个以上的自变量对因变量的影响以及自变量之间交互作用对因变量的影响。一般也
称为因子设计。它假定外部因素的影响等于零。因子设计为消除前测引起的敏感影响并
减少工作量，一般都运用无前测的设计。有两个自变量，每个自变量有两个值，分为四
个组，这样的通常称为（2*2）因子设计。因子设计可以同时包括多个自变量，每个自
变量也可以有多个取值。但是，随着自变量的增加，实验组的数目也要相应增加。
98、 重复测量设计：不是对不同组的受试者施以不同的实验刺激，而是对每个组
都给以不同的试验刺激。实验效果不是以不同组的观测值差异值来表示，而是通过每个
组对不同刺激的差异来反映。它是一种轮换的方法，即每个组都先后接受不同的测量，
然后通过比较每一组不同测量的平均值就可以检验不同刺激造成的不同差异。优点是：
（1）不用随机抽取实验组和控制组，而只需选取几组实验对象让他们参加各种项目的
测验，因此，不必担心组间特征之随机误差的影响。（2）只需较少的受试者就可以达
到实验目的。（3）它的实验假设可以有多个，即一个实验可以同时检验几个假设。重
复测量的局限是：对有些易于引起受试者敏感或产生较大交互作用效应的实验变量不能
进行重复测量。这种设计一般在无法进行随机抽样而只能进行整群选择时采用。
99、 拉丁方格设计：也是一种多因素设计，但是与因子设计不同，它不是考察多
个自变量与因变量的关系，而是考察多个自变量的引入顺序对因变量的影响。这种设计
可以引入多个不同自变量，这些自变量只有一个取值。实验组的数目取决于引入的自变
量，有多少个自变量就分派多少个实验组。每个实验组都依次引入各个自变量，但引入
的顺序各不相同。一般来说，拉丁方格设计无法测量出交互作用效应，它只能检验实验
顺序对因变量的影响，并判断自变量之间是否存在交互作用。拉丁方格设计的缺点是：
（1）它必须保证各组成员的特征相同，不会影响实验结果。（2）各种自变量是共同发
挥作用的，因此，无法区分每一个自变量对因变量的单独影响。这种设计一般在特殊场
合才采用，即检验自变量的组合方式对因变量的影响或找出最佳组合方式时才采用。
100、 准实验法（北大96<简>：准实验与实验室实验有何区别？准实验的主要设
计方法是什么？）：就是没有严格的进行指派和严格控制实验刺激的实验方法。它通常
不是在纯粹的实验室环境中，而是在研究现场进行，他们常常依据现场的条件和可能性
来设计实验方案，并对纯粹的实验设计加以简化。 （1）准实验法
的特点：<1>它的实验假设并不一定是因果关系的假设，也可能是相关关系的假设。
<2>它很少采用严格的随机抽样。<3>它通常缺乏前测和控制组。
（2）有人认为，这种实验没有严格执行实验方法的准则，因此，它不是科学的实验。
但更多社会工作者认为：<1>科学并不是一春试验为起点和目的的，科学的发展必须利
用现实所能提供的手段和技术，而不能等待完美的方法产生以后再进行研究。<2>同时，
实验设计本身也是一个从无到完美的不断发展过程。而目前，社会科学的实验已基本具
备了科学方式所要求的条件。尽管它并不总是能检验或建立因果关系，但这种“准实验”
至少是能检验相关关系并能发现新的事实的。
（3）相关设计：通常指交互分类设计，这是社会学研究中最常用的分析方法之一。它
的形式近似于两组无前测设计。但是，试验组和控制组不是随机分派，而是根据试验变
量的要求选取的。 相关设计缺点：<1>由于对个试验对象没采取控制，所以无法排除其
他变量的影响，因而，他的内在效度较低。<2>相关设计的另一缺点是缺少前测，无法
进行时间序列的比较。解决这一缺陷的一种方法是，增加一个事后回溯设计，即在引入
试验刺激并加以后测之后，在询问被试者过去的状况。以此与因变量的后测值比较。
（4）时间序列设计（北大2002<名>）：也称趋势研究，一般用于研究较长时期内人们
的态度和价值观念的变化。是对相关设计的扩充，它也是一种交互分类设计，不过，它
的前测和后测包括多个时点，由此组成一个较长时间序列的观测值，从这些因变量的变
化趋势中可以发现自变量的影响程度和影响过程。 时间序列设计有多个
观察点，而且在每一时点都对试验组和控制组加以测量，因此，从它的差异可以发现因
变量的变化趋势，由此可以预测未来的发展变化，并在实际发展过程中检验这种预测。
时间序列设计的缺点：（1）无法判定所假设的自变量是否对因变量由主要影响，因为
在很长的时期内，会有许多其他因素导致因变量的变化。（2）测量态度和价值观的变
化是很困难的，由于趋势研究是要不断的观测社会发展变化和新的社会现象，它很难利
用现有的量表和标准问卷，因此无法确定测量工具的效度。
（5）非等组前后测设计：这种设计的形式与典型设计相似，但是，它的试验组与控制
组是不等同的。其优点：<1>不仅可以得到后测的差异，而且还可以知道前测的差异。
<2>可以得到更多的信息。 其缺点是：由于两组是不等同的，因此无法推论x与y的因
果关系，因为y的变化很有可能是不同的试验对象所固有的，没有控制实验对象的固有
特征就不能检验出x的真正影响，最多只能说明所假设的自变量与因变量之间存在着相
关关系。 （6）现场试验设计：准实验一般都是在自然环境
中进行的，研究人员虽然不能对自然场所的变量加以严密的控制，而且很难采用随机抽
样方法是试验组和控制组完全保持一致，但他们可以结合研究目的对试验变量和现场环
境加以一定的控制，这种实验也称为实地实验或现场试验。 其特点
是：隐蔽性、真实性和概括性都较高。因此，具有较高的实用性。 其
缺点：对实验变量和外部变量缺乏严格的控制。为了弥补这一缺陷，应当尽可能的在相
似状况下重复同一项实验，以提高实验的效度和信度。
（7）准实验与纯实验在原理上没有严格的区别，准试验只是由于现场和研究条件的局
限不得不将纯试验设计加以简化。当然，当条件许可时，应尽可能采取交严格的试验设
计，以提高实验的效度。但是，目前社会学试验大部分还不具备采用严格设计的条件，
他们通常只能成为准试验，而在纯试验设计或实验室研究中，大多是研究社会心理学和
教育学的课题。准实验和纯实验均有其优缺点和局限性。此外，在多种形式的实验设计
之间，也没有绝对的优劣之分，他们都适用于某些特定的研究目的和研究领域，研究人
员应依据研究目的之要求来选择最适当的实验设计。
101、 实验的信度和效度：（1）信度：与其他搜集资料的方法相比，实验法的信度
和内在效度较高。对信度的检查一般是通过重复试验的方法，观测实验的前测和后测也
可以检验信度。另一种方法是在多组设计的情况下，通过各个组在同一次试验中的差异
来检验信度。（2）效度：实验目的是检验变量间的因果关系，并使实验结果具有概括
性。但这两个目的是很难同时达到的，要精确测量自变量的影响，就要严格控制情景和
外部变量，但这会使实验环境人工化并缺乏代表性，从而降低外在效度，而如果提高情
景的真实性和样本的异质性以使实验能概括广泛的现象，则很难控制其他外部因素的影
响，因而降低了内在效度。大部分试验设计都面临着这两种困境，若提高内在效度则有
可能降低外在效度，或者相反。这也是纯试验与准试验的不同之处，前者内在效度较高，
外在效度较低，后者则相反。 影响外在效度的因素主要是：<1>实验情
景的人工化；<2>实验样本缺乏代表性。 影响内在效度的因素主要
是：<1>社会现象和社会行为的因果关系很复杂，影响因素很多，对这些变量很难实施
控制。<2>对社会因素很难明确界定和测量。
为了提高内在效度，我们可以从以下方面来考虑各种危害实验内在效度的问题，并尽可
能减少和控制他们的潜在影响。<1>有关实验对象方面的问题：（A）对象选择：即用
来进行比较的两个群体之间是否本身存在差异。（B）对象的丧失：即是否所有的对象
都一直在研究中。（C）实验与控制组的竞争。<2>有关试验程序的问题：（A）测量的
影响。（B）器械操作。（C）实验处理的模仿。<3>有关时间的问题：（A）成熟的影
响。（B）历史的影响。
102、 实验法的优点和缺点：（1）实验法的优点：<1>能够确立因果关系。<2>花
费较少。<3>易于重复。<4>控制能力强。（2）实验法的缺点：<1>缺乏“现实性”。
实验室中的社会过程往往也不能代表现实世界中的社会过程。<2>样本的缺陷。实验结
论所依据的那些实验现象与现实世界中的人们往往大不相同。<3>实验人员的影响。<4>
伦理及法律上的限制（人大97<简>：简述实验方法中的社会伦理问题）：由于社会研
究的对象是人，因而实验所能操纵的自变量常常受到现实生活中伦理或法律的限制。比
如，我们不能为了进行有关人口密度和侵犯行为间关系的实验，而让众多的实验对象长
时间禁闭在拥挤的室内，也不可能让他们之间发生各种暴力侵犯的行为。
第十三章：文献法
103、 文献法（南大2000<简>：通过分析历史文献，可以建立社会骚乱、经济衰
滞、政治腐败之间的关系。请给出一例）：在严格意义上文献法并不是一种资料收集方
法，而是一种研究方式---------即既包括资料的收集方法也包括对这些资料的分析方法。
它不是直接从研究对象，即人那里获取研究所需要的资料，而是去收集和分析现存的、
以文字形式为主的文献资料。
104、 文献的类别及来源：（1）文献：指的是包含我们希望加以研究的现象的任何
信息形式。（2）类别：根据文献具体来源的不同，分为个人文献（主要指个人的日记、
信件、回忆录及自传等）、官方文献（主要指政府机构和有关组织的记录、报告、统计、
计划、信函等）及大众传播媒介（主要指报刊、电影、电视等）三大类。也可以分为原
始文献（或第一手文献。指的是有亲身经历某一事件或行为的人所写的资料）和第二手
文献（文献学上称二次文献。是利用别人的原始文献所编写或产生出的新的文献资料）
两大类。 （3）利用官方统计资料应注意：<1>应该对统计资料的内容、对象、
范围、特点等等都具有清楚明确的认识。<2>对于各种统计指标、比率和数字的实际含
义、他们的计算方法等等应十分清楚，不能含糊。否则就会出现错用资料的情况。
（4）历史文献：往往是指那些再形成的时间上举目前较远并且文献的作者以及所记述
的时间和运动的当事人都已去世的资料。在通常情况下，历史文献更多的为历史学家所
运用。
105、 第二手分析：（1）定义：也称二手分析，指的是对那些由其他人原先为别的
目的收集和分析过的资料所进行的新的分析。<1>一种是从别人为研究某一问题而收集
的资料中，分析与该问题所不同的新的问题。即把同一种资料（已有的，别人的研究所
收集的资料）用于对不同的问题的分析和研究中。<2>另一种类型则是用新的方法和技
术去分析别人的资料，以对别人的研究结果进行检验。即用不同的分析方法处理同一种
资料，看看是否能得出同样的结论。（2）第二手分析的步骤：<1>选择研究主题：适用
于第二手分析的主题可以使相当大的，它有时仅仅只能采用那种在一个国家规模上所得
到的数据资料。通常，在研究设计中，要留有一定余地，以便一旦发现相关的资料中并
不具备你所想要得各种特征时，就可以稍微修改你的研究设计，以保证与可用资料的一
致性。在主题与资料的关系上，第二手分析往往要求主题去适应资料，而不是相反。这
主要是因为数据资料是已定的，无法变动的，研究者只能在处理和分析资料的方法上、
技术上动脑筋。而研究主题则是可以随时调整的。<2>寻找合适的资料。最好的途径是
阅读一份相关的研究。当发现一组对你似乎十分有吸引力的数据资料时，你可以仔细地
阅读论文的资料部分对资料的内容、收集方法等等的描述。如果是在一本著作中发现这
组资料的，那么，书中一般都有介绍资料的收集方法和过程的专门章节。此外，在书后
的附录中，还可以找到诸如问卷、指数计算方法等详细的信息。<3>对资料的再创造。
首先，必须从资料中寻找或重新定义所要研究的变量。其次，应该仔细地研究这些变量。
最后，你也可以掷去样本中的一部分作为分析的对象。<4>分析资料。第二手分析的最
主要也是最大量的工作，就是对资料的重新分析。 （3）第
二手分析的优点：<1>省时省钱又省力。<2>特别适合于比较研究和趋势研究。（4）第
二手分析的缺点：其缺点主要在于资料的准确性和适用性。某个研究者为其特殊的目的
所收集的数据资料不一定与另一研究者的研究旨趣相符；而二手分析研究这所需要的资
料有可能完全搞不到。实际上，这样的资料对于第二手分析研究人员来说，效度是较低
的。即原始问题所测量的并不是二手分析研究这所希望测量的变量。
106、 内容分析（人大97<名>；南大97<名>）：是这样一种研究技术，它对各种
信息交流形式的明显内容进行客观的、系统的和定量的描述。所谓“各种信息交流形式”
指的是各种书面材料、宣传品和艺术品。所谓“明显的”是指这些形式外在的东西。“进
行客观的、系统的”描述，意味着内容分析是一种规范的方法。它要求研究这根据预先
决定的计划，采取一定的规则，按照一定的步骤来进行。而“定量的”描述则说明内容
分析方法的基本性质。它意味着，在内容分析中，其主要目标通常是决定内容中某一项
目的频数，或者决定某一类别在整个内容中所占的比例等。此外，还对这些定量的结果
进行分析。 （1）内容分析的步骤：<1>抽样：通过抽取有代表性的样
本的方法，来达到研究全部对象的目的。<1>编录：即根据特定的概念框架，对信息-----
无论是口头的、文字的、画面的或是其他形式的------作分类记录。与编录有关的问题有
两个：（A）选择编录单位：即选择具体的观察和点算单位。要注意把它与分析单位加
以区别。（B）制定一份编录单：编录单是对文献材料进行观察和记录的工具，在某种
程度上，它同结构式观察所用的记录但十分相似。它的形成和结构将主要依赖于编录单
位的选择。一旦选定了编录单位，研究这就要为他们制定和赋予数值。分类的基本要求
是要满足互斥性和穷尽性。 （2）
内容分析的类型（？北大2000<简>：简述比较研究法的主要类型）：<1>计词法：是内
容分析中最简单、最常用的方法。这种方法是，首先确定与研究问题有关的关键词（记
录单位），然后统计这些关键词在各个样本（分析单位）中出现的频数和百分比，最后
进行比较。<2>概念组分析：有时，使用主题作为记录单位不易划定主题的界限。此时，
可以利用概念组分析。它是将与研究内容有关的关键词分成小组。每组代表一个概念，
同时也是理论假设中的一个变量。这种方法记录的单位仍然是单词，但分析时的变量却
是概念组。 <1>语义强度分析：首先是给出词汇的“强度权”，已显示他们在
使用时的差别。强度权是由词汇的语义所决定的，如“爱”比“喜欢”的加权数高。（3）
内容分析的优点：<1>省钱省时。<2>保险系数大。<3>允许我们研究在一个长时期中所
发生的过程。<4>是一种非干扰性的研究方法，不会打扰我们的研究对象，不会对这些
研究对象发生影响。（4）内容分析的缺点：<1>只局限于对记录下来的信息进行分析和
研究。<2>资料的效度也存在一定的问题。
107、 现存统计资料分析：（1）步骤：<1>选择合适的资料。许多研究常常要求大
量的聚集资料与此相适应。<2>处理资料。我们通常所能做的，是比较那些基于较小的
单位。<3>说明资料来源。以使得这种资料能够被理解。否则别人就会对你的证据的可
靠性和准确性产生怀疑。（2）效度和信度：逻辑推理和重复验证这两条科学的原则，
对于保证现存统计资料分析的消毒来说是极其重要的。现存统计资料的信度在很大程度
上依赖于统计资料本身的质量。
108、 文献法（南大98<简>：文献分析法与闻讯方法相比有那些突出的特点）：（1）
文献法的优点：<1>具有无反应性的优点。<2>费用较低。<3>可以研究那些无法接触的
研究对象。<4>适于作纵贯分析。（2）文献法的缺点：<1>许多文献的质量往往难以保
证。<2>资料不易获得。<3>许多文献资料由于缺乏标准化的形式，因而难于编录和分
析。
第十四章：资料整理
109、 资料分析（复旦96<简>：理性分析与统计分析有什么关系与区别）：资料分
析不仅决定着收集到的资料是否有价值，而且能够很好的检验假设和理论，或者适当地
回答所研究的问题，还能够以可以理解和令人信服的形式描述研究成果。通过分析，研
究者可以将认识从具体提高到抽象、从个别提高到一般，并可从中发现新问题、提出新
假设，将研究引向深入。在某种意义上来说，分析的水平决定着整个研究的水平。（1）
社会统计学：是有关社会资料收集、整理、分析和推论的一整套方法，它不仅包含全部
抽样理论、统计检验理论和大部分的社会测量法，而且使分析技术获得极大的发展，主
要是多元统计方法的发展，如路径分析、因素分析等。
110、 资料整理：就是对收集到的原始资料进行检查、分类和简化，使之系统化、
条理化，以为进一步分析提供条件的过程。因此，资料整理既是资料收集工作的继续，
又是资料分析的前提。
111、 定性资料的整理： （1）资料的审查：
目的是消除原始资料中的虚假、差错、短缺、余冗等现象，以保证资料真实、可信、有
效、完整、合格，从而为进一步整理分析打下基础。对定性资料的审查主要集中在真实
性、准确性和适用性上。<1>真实性审查：也称信度审查，即看资料是否真实可靠的反
映了调查对象的客观情况。方法：（A）根据已有的经验和常识进行判断。（B）根据材
料的内在逻辑进行核查。（C）利用资料间的比较进行审核。（D）根据资料的来源进
行判断。 <2>准确性审查：也就是效度检查，一方面是审查收集到的资料符合
原设计要求及对于分析所研究的问题有效用的程度。另一方面是审查资料对于事实的描
述是否准确，特别是有关的事件、人物、时间、地点、数字等要准确无误，切忌事实资
料含混不清，模棱两可，数据资料笼统模糊。<3>适用性审查，也就是考察资料是否适
合分析与解释。主要包括：资料的分量是否合适、资料的深度与广度如何、资料是否集
中紧凑是否完整等。<4>对于文献资料的分析评价，首先是进行所谓的“外在批判”，
即审查：是在什么地方、什么时间、什么人、为什么目的、用什么方法编写这些文献的。
<5>还要进行“内在的批判”，即了解资料的编写者表达的什么内容，在什么条件下编
写这些资料，内在批判要注意：（A）对作者适用的词，特别是多义词，价值语进行反
复的推敲。（B）在文笔的表现上特别要区分“事实”和“对事实的解释与推论”。（C）
要进行多方面的研究，看作者是否真实的反映了客观事实，资料的叙述是否正确，有无
夸张扭曲，或偏执于一家之言；叙述是否准确，叙述者写作上的表现能力如何等。<6>
实地审查：是在搜集资料的过程中进行的，边搜集边审查。<7>系统审查：是在资料收
集完毕后集中进行的审查。<8>测不准效应：指由于观察者的参与，改变了被观察对象
的自然状态，被观察者或单位可能做出种种假象来掩饰事实的本来面目，使真实状态的
测定不可能了。 <9>棱镜效应：指社会现象的感知和解释都要通过观察者这面
棱镜，通过它的价值标准和以往的经验再折射出来，从而使观察资料不准确。
（2）资料的分类：分类是将资料分门别类，使繁杂的资料条理化系统化，为找出规律
性的联系提供依据。<1>确定分类标准：分类的关键在于选择和确定分类标准。分类标
准的选择往往是基于某种假设或理论，本身就是对所研究问题的一种分析和认识。分类
标准可分为：（A）品质标准：就是反映事物属性差异的标准。例如性别、民族、企业
所有制等。 （B）数量标准：就是反映事物数量差异的标准。例如以人口作为划分大
中小城市的标准。<2>确定分类标准的原则：（A）有效性原则：（a）这一分类方式对
于研究目的是有效地。（b）这一分类能有效的反映现实社会现象。（c）为此，分类必
须服从于研究目的，必须能反映现象的本质特征。（B）互斥性原则：指分类标准应当
互斥，以使同一条资料只能归于一类。（C）完备性原则：指分类标准的确定应当使每
一份资料都有所归属。（D）各类别必须处在同一分类层次。
<3>资料分类的方法：（A）前分类：指收集资料前就已定下分类标准，然后按分类指
标收集和整理资料。（B）后分类：指在资料收集完成后，在根据资料的性质、内容和
特征分类。定量资料一般采用前分类，定性资料一般采用后分类。
<4>分类的功用：<1>指出社会现象或社会单位的类型。<2>反映总体的内部结构。<3>
分析社会现象之间的依存关系。 （3）资料的
汇总和编辑：基本要求：<1>完整和系统；<2>简明集中；<3>拉扎斯菲尔德提出以下操
作步骤：（A）定义对个案进行分类的标准。（B）决定在各个个案记录的指标中登载于
这一分类标准上的项目或与这一分类有关的项目。（C）根据各指标在标准上的位置，
给予数值和符号。（D）为了决定表示各个案位置的最终指数，要汇总各个案记录的分
数。
112、 定量资料的整理： （1）资料的审查：
<1>完整性审查：（A）资料总体的完整性。（B）每份资料的完整性。<2>统一性审查：
首先是检查所有问卷、报表登记填报方法是否统一；其次要检查对同一指标的数字所使
用的量度单位是否一致，以及不同表格对同一指标的计算方法是否统一等。对于统计资
料的统一性审查包括：（A）审查指标的定义和分组的标准是否与自己研究的分类相一
致。（B）审查指标统计总体范围是否一致。 <3>合格性审查：（A）提供资料者的
身份是否符合所规定的调查对象的身份。（B）所提供的资料是否符合填报要求。（C）
所提供的资料是否正确无误。方法：（a）判断检验。就是根据已知情况判断资料是否
真实正确。（b）逻辑检验。即从资料的逻辑关系来检验其是否正确真实。（c）计算检
验。通过各种数字运算来检验各项数字的正确性。<4>整个审查要经历三阶段：（A）由
调查员进行审查。（B）有现场专职的检查员进行检查。（C）调查结束后由调查组织机
关的检查员进行检查，重点是检查回答登记错误，计算错误及调查员是否对英调查对象
均进行了调查，有无作弊等。 （2）资料
的分类和编码：<1>编码（复旦98<名>）：就是将文字资料转化为数字形式的过程。编
码的目的使用一组变量表示各项调查问题，用每一变量的不同取值表示对这一问题的不
同回答，从而使文字资料转化为数字形式。<2>编码步骤：（A）对回答进行分类。（B）
建立回答类别与变量数值之间的对应关系。（C）注意：（a）对于开放性问题，因实现
不能预料到答案的情况，故无法在设计问卷时事先分类，这时，编码就要从对问题的回
答进行分类开始。（b）一般的讲，开始时分类可细一些，当分析不要求过细的分类时
可以将某些类别进行合并。分类的多少还要考虑统计分析方面的问题。（c）任何调查
都不免有一些回答这对一个问题不做任何回答的情况，为此对问卷中的每个提问要增加
一个无回答编码。对无回答编码的原则是明确区分无回答与其他回答，通常的习惯是用
9或几个9来代表无回答。对无回答的项目，不能一概简单地认为是缺失数值或回答率
低。统计缺失数据时，应结合回答人的情况分析。如行政人员不回答“技术职称”是正
常的。 <3>编码项目：问卷编
号、问卷所属区域或部门、其他要进行统计的分类标准。 <4>
编码方法：（A）预编码：方法是在设计问卷时对回答的每一个种类都指定好其编码值，
并印在问卷上。预编码主要限于回答类别事先已知的问题，这些问题主要是封闭性问题，
或回答已经是数字而不需要做转换的问题。优点：处理资料时比较简单，省时省力。缺
点：无法用于开放性回答，因为我们无法事先知道回答的种类。（B）后编码（南大2000<
名>）：是指对问卷的编码过程是在问卷回收之后进行的，而不是与问卷设计同时进行
的，多用于对开放性问题的编码。比较费时费力。（C）边缘编码：实际上是一种预编
码方法，它与一般预编码的不同之处在于，这种方法不仅指定了编码值，而且给出了每
个项目记录回答的空间，现在应用得最多。边缘编码是在问卷上每个调查项目旁边的空
白处标明填写编码的位置。问卷回收后，将每份问卷上的回答变成指定位置上的编码。
（D）编码簿：用以指示每个编码的意义和变量的位置。作用是建立变量和调查内容、
变量值与回答类别的一一对应关系。它可以（a）作为编码工作的指南。（b）使研究者
在分析过程中便于查找变量及各种编码所代表的意义。（E）编码簿的主要项目：（a）
问题号码。是在调查表或问卷上的问题的题号，有了题号就可以知道这一题目在资料卡
片上的哪几列。（b）变量号码。有了变量号码，研究者可以知道变量的代号，方便分
析计划的拟定，在分析时直接饮用变量号码而不必提及变量名称。（c）项目名称。又
称变量名称，用概括性语言表明项目的含义。（d）编码的内容说明。即给出每一项目
问题答案的分类以及分配给每一类别的数字。（e）列序号。即每一项目应当占哪几列。
（3）资料的登录：<1>个案登录：即将各个调查对象的全部数据资料以编码的形式记录
在一张张卡片上，即建立个案档案。<2>总体登录：即将所有调查对象的全部数据记录
在一张资料卡片上，这种方法适用于为电子计算机处理作准备。
（4）资料的汇总：就是根据研究目的，对分类后的各种数据进行计算和加总，汇集到
有关的表格之中，以集中系统地反映调查资料总体内部的数量情况。汇总的目的：<1>
初步了解数据的分布情况。<2>为编制次数分布表作准备。<3>为深入的统计分析作准
备。<4>便于保存调查资料。
113、 计算机处理资料的一般过程。（1）输入前的准备：<1>资料的审查。<2>资
料的分类与编码。<3>登录，即将问卷中的回答转录到资料卡片上。一般将编码、登录
与数据输入过程结合起来，为此，越来越多地采用也边编码的方式。（2）输入数据：
指通过对计算机输入设备的操作，将资料卡片中的资料送入计算机贮存起来，以备调用。
输入方式：<1>键盘输入；<2>卡片输入；<3>光电输入。（3）资料的净化（复旦98<
简>：对录入的数据进行检查的主要方法）：<1>幅度检查（北大99<名>）：使用一个
自编的简单程序或者已有的统计软件可以将某一变量的分布显示出来，这样就可以检查
出一部分错误。例如，变量性别的取值只有两个-----1（男）、2（女），因此，5和8
是违规数字。这样，我们首先了解到，性别这个变量的数据有错误。然后，我们可以变
出一个程序列出含有性别变量的违规值的学生的编号，通过核对问卷，就可以知道这些
违规值是如何出现的，以及如何修正了。<2>逻辑检查：利用变量之间的逻辑关系来净
化资料。（4）数据的处理。
