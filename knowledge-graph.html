  theories: [
    // === Existing theories (t1-t53) ===
    { id:"t1", name:"两级传播理论", year:1944, scholar:"p1", desc:"信息从媒介到意见领袖，再由意见领袖传递到普通受众。" },
    { id:"t2", name:"有限效果论", year:1948, scholar:"p1", desc:"大众传播的效果是有限的，受到人际传播和选择性心理的制约。" },
    { id:"t3", name:"5W模式", year:1948, scholar:"p2", desc:"谁(Who)->说什么(Says What)->通过什么渠道(In Which Channel)->对谁说(To Whom)->产生什么效果(With What Effect)。" },
    { id:"t4", name:"三功能说", year:1948, scholar:"p2", desc:"大众传播的三大功能：环境监视、社会协调、文化传承。" },
    { id:"t5", name:"把关人理论", year:1947, scholar:"p3", desc:"信息在传播渠道中流动时，会经过'把关人'的筛选和过滤。" },
    { id:"t6", name:"群体动力学/场论", year:1940, scholar:"p3", desc:"个体的行为受其所处群体环境和'场'的影响。" },
    { id:"t7", name:"说服效果理论", year:1953, scholar:"p4", desc:"研究信源可信度、信息结构、受众特征等因素对说服效果的影响。" },
    { id:"t8", name:"休眠效果", year:1949, scholar:"p4", desc:"低可信度信源的信息，随着时间推移，其说服效果可能反而增强。" },
    { id:"t9", name:"一面提示与两面提示", year:1949, scholar:"p4", desc:"仅提供单方面信息（一面提示）vs同时提供正反两方面信息（两面提示）对说服效果的影响。" },
    { id:"t10", name:"施拉姆双向循环模式", year:1954, scholar:"p5", desc:"传播是一个双向循环的过程，强调编码者与译码者的互动。" },
    { id:"t11", name:"选择最大概率公式", year:1960, scholar:"p5", desc:"受众选择媒介的概率 = 报偿的保证 / 费力的程度。" },
    { id:"t12", name:"议程设置理论", year:1972, scholar:"p6", desc:"媒介虽然不能决定人们怎么想，但可以决定人们想什么。媒介议程影响公众议程。" },
    { id:"t13", name:"沉默的螺旋理论", year:1974, scholar:"p8", desc:"人们因害怕被孤立，倾向于隐藏少数派观点，导致优势意见越来越大声，劣势意见越来越沉默。" },
    { id:"t14", name:"使用与满足理论", year:1974, scholar:"p9", desc:"受众是主动的，根据自己的需求选择媒介和内容来获得满足。" },
    { id:"t15", name:"涵化理论/培养分析", year:1969, scholar:"p10", desc:"长期接触电视暴力内容会使受众对现实世界产生比实际更暴力的认知(污浊世界综合征)。" },
    { id:"t16", name:"创新扩散理论", year:1962, scholar:"p11", desc:"新事物在社会中的传播呈现S型曲线，采纳者分为创新者、早期采纳者、早期大众、晚期大众、落后者五类。" },
    { id:"t17", name:"知识沟假说", year:1970, scholar:"p12", desc:"随着大众媒介信息量的增加，社会经济地位较高者比社会经济地位较低者以更快的速度获取信息，两者之间的知识差距有扩大的趋势。" },
    { id:"t18", name:"拟态环境", year:1922, scholar:"p13", desc:"大众媒介创造了一个介于客观现实与主观现实之间的'虚拟环境'，人们通过这个环境来认识世界。" },
    { id:"t19", name:"刻板印象", year:1922, scholar:"p13", desc:"人们对特定群体的固定化、简单化的认知图像，媒介在塑造和强化刻板印象中扮演重要角色。" },
    { id:"t20", name:"认知失调理论", year:1957, scholar:"p14", desc:"当个体持有两种或多种相互矛盾的认知时，会产生心理不适感，从而驱使个体改变认知或行为来减少失调。" },
    { id:"t21", name:"第三人效果", year:1983, scholar:"p15", desc:"人们倾向于高估大众媒介信息对他人的影响，而低估对自己的影响。这是一种认知偏差。" },
    { id:"t22", name:"文化工业理论", year:1947, scholar:"c1", desc:"资本主义将文化生产标准化、商品化，文化产品丧失了批判性和艺术性，成为麻痹大众的工具。" },
    { id:"t23", name:"单向度的人", year:1964, scholar:"c3", desc:"发达工业社会中，技术理性创造虚假需求，使人们丧失否定性和批判性思维，成为单向度的人。" },
    { id:"t24", name:"公共领域理论", year:1962, scholar:"c4", desc:"资产阶级公共领域是介于国家与私人领域之间的理性讨论空间，但在商业化背景下被'再封建化'。" },
    { id:"t25", name:"交往行动理论", year:1981, scholar:"c4", desc:"以语言为媒介的交往行动是达成社会共识的基础，强调交往理性。" },
    { id:"t26", name:"编码/解码理论", year:1973, scholar:"c5", desc:"传播过程分为编码和解码两个环节，受众有三种解码立场：主导-霸权式、协商式、对抗式。" },
    { id:"t27", name:"受众商品论", year:1977, scholar:"c6", desc:"资本主义媒介的本质是将受众注意力打包成商品卖给广告商。" },
    { id:"t28", name:"文化霸权理论", year:1930, scholar:"c7", desc:"统治阶级通过文化和意识形态的'同意'而非单纯暴力来维持统治。" },
    { id:"t29", name:"意识形态国家机器", year:1970, scholar:"c8", desc:"学校、媒体、家庭等是意识形态国家机器，通过日常实践再生产资本主义生产关系。" },
    { id:"t30", name:"拟像与超真实", year:1981, scholar:"c9", desc:"在后现代社会，符号和影像取代了现实本身，形成'拟像'，人们生活在比真实更真实的'超真实'世界中。" },
    { id:"t31", name:"场域理论", year:1996, scholar:"c10", desc:"社会由多个相对自主的'场域'组成，新闻场域受到经济场域和政治场域的双重压力。" },
    { id:"t32", name:"日常生活实践", year:1980, scholar:"c11", desc:"消费者并非被动接受，而是通过'战术'和'盗猎'在日常消费中进行创造性的抵抗。" },
    { id:"t33", name:"文化盗猎/文本盗猎", year:1992, scholar:"c12", desc:"粉丝通过挪用、改编和再创作媒介文本，成为积极的'文本盗猎者'和参与式文化生产者。" },
    { id:"t34", name:"文化帝国主义", year:1976, scholar:"c13", desc:"西方发达国家通过媒介产品和文化输出来控制发展中国家的文化认同和价值观。" },
    { id:"t35", name:"情绪劳动", year:1983, scholar:"c14", desc:"服务业工作者需要管理自己的情绪以符合组织要求，这种情绪管理是一种劳动形式。" },
    { id:"t36", name:"时空偏向理论", year:1950, scholar:"m1", desc:"媒介可分为时间偏向型（持久但难以传播，如石头）和空间偏向型（易于传播但不持久，如纸张）。" },
    { id:"t37", name:"媒介即讯息", year:1964, scholar:"m2", desc:"媒介本身才是真正有意义的信息，媒介的形式决定了社会的结构和人类感知世界的方式。" },
    { id:"t38", name:"媒介是人的延伸", year:1964, scholar:"m2", desc:"任何媒介都是人体感官的延伸，如印刷是眼睛的延伸，广播是耳朵的延伸。" },
    { id:"t39", name:"冷/热媒介", year:1964, scholar:"m2", desc:"热媒介信息清晰度高、受众参与度低；冷媒介信息模糊、需要受众高度参与。" },
    { id:"t40", name:"地球村", year:1962, scholar:"m2", desc:"电子媒介使世界重新部落化，人与人之间的距离被缩短，世界成为一个'地球村'。" },
    { id:"t41", name:"童年的消逝", year:1982, scholar:"m3", desc:"电视媒介模糊了成人与儿童的信息边界，导致童年概念的消逝。" },
    { id:"t42", name:"娱乐至死", year:1985, scholar:"m3", desc:"电视媒介将一切严肃话题娱乐化，导致公共话语的衰退和社会理性的丧失。" },
    { id:"t43", name:"技术垄断", year:1992, scholar:"m3", desc:"技术从工具演变为文化的主导力量，使人类丧失了自主判断能力。" },
    { id:"t44", name:"媒介情境论", year:1985, scholar:"m4", desc:"电子媒介打破了物理场景与社会场景的界限，创造了新的社会情境和行为模式。" },
    { id:"t45", name:"媒介进化论", year:1979, scholar:"m5", desc:"媒介遵循人性化趋势不断进化，新媒介是对旧媒介的补救和改良。" },
    { id:"t46", name:"镜中自我", year:1902, scholar:"ch1", desc:"个人的自我认知是通过想象他人对自己的评价而形成的，如同在镜子中看到自己。" },
    { id:"t47", name:"初级群体理论", year:1909, scholar:"ch1", desc:"初级群体（家庭、邻里、同伴）在个人社会化过程中发挥着基础性作用。" },
    { id:"t48", name:"符号互动论", year:1934, scholar:"ch2", desc:"人类通过符号（语言、表情、手势）进行互动，社会是在符号互动中建构的。主我(I)与客我(Me)的对话是自我形成的基础。" },
    { id:"t49", name:"拟剧理论", year:1959, scholar:"ch4", desc:"社会交往如同戏剧表演，人们在'前台'扮演角色，在'后台'展现真实自我。" },
    { id:"t50", name:"框架理论", year:1974, scholar:"ch4", desc:"人们通过特定的'框架'来组织和理解经验，框架决定了人们如何定义和解释社会情境。" },
    { id:"t51", name:"互动仪式链", year:2004, scholar:"ch7", desc:"社会由一连串的互动仪式构成，成功的互动仪式产生情感能量和群体团结。" },
    { id:"t52", name:"数字鸿沟", year:1995, scholar:"p12", desc:"不同群体在信息技术的接入、使用和效果上存在分层差距，分三个层次：接入沟、使用沟、知识沟。" },
    { id:"t53", name:"媒介事件", year:1992, scholar:"p9", desc:"由媒介策划或呈现的重大仪式性事件（如奥运会、皇室婚礼），使受众集体参与并产生社会整合效果。" },

    // === NEW: Press Theories (t54-t56) ===
    { id:"t54", name:"报刊的四种理论", year:1956, scholar:"p55", desc:"将世界报刊体系分为威权主义、自由主义、社会责任和苏联共产主义四种模式，是新闻体制研究的经典范式。" },
    { id:"t55", name:"发展传播学", year:1958, scholar:"p56", desc:"研究大众媒介在发展中国家现代化进程中的角色和功能，强调媒介对国家发展的促进作用。" },
    { id:"t56", name:"媒介体制比较", year:2004, scholar:"p52", desc:"比较不同国家媒介体制的差异，提出三大分析维度：国家角色、政治平行性、职业化程度。" },

    // === NEW: Journalism Theory (t57-t64) ===
    { id:"t57", name:"新闻价值", year:1965, scholar:"p18", desc:"新闻工作者选择和衡量新闻事实的标准，包括时效性、重要性、显著性、接近性、趣味性等要素。" },
    { id:"t58", name:"新闻真实性", year:1940, scholar:"p25", desc:"新闻必须反映客观事实，真实性是新闻的生命和根本原则，是新闻工作的基本要求。" },
    { id:"t59", name:"新闻客观性", year:1920, scholar:"p13", desc:"新闻报道应独立于记者个人立场和情感，提供事实而非意见，追求公正平衡的报道原则。" },
    { id:"t60", name:"新闻专业主义", year:1930, scholar:"p5", desc:"新闻工作者应遵循职业伦理规范，以服务公众为核心价值，追求独立、客观、公正的职业理念。" },
    { id:"t61", name:"党性原则", year:1942, scholar:"p25", desc:"新闻媒体必须坚持党的立场，在政治上与党中央保持一致，是社会主义新闻工作的根本原则。" },
    { id:"t62", name:"马克思主义新闻观", year:1848, scholar:"p25", desc:"以马克思主义立场、观点和方法认识和指导新闻传播活动的理论体系，强调新闻的阶级性和党性。" },
    { id:"t63", name:"正面宣传为主", year:1948, scholar:"p25", desc:"新闻报道应着重宣传积极、正面、建设性的内容，发挥鼓舞和引导作用。" },
    { id:"t64", name:"舆论监督", year:1980, scholar:"p21", desc:"新闻媒体对政府行为和社会不良现象的公开批评和监督，是保障公民知情权和参与权的重要机制。" },

    // === NEW: Political Communication (t65-t68) ===
    { id:"t65", name:"政治传播学", year:1950, scholar:"p2", desc:"研究政治信息传播过程、政治说服、政治宣传与舆论形成的交叉学科，是传播学与政治学的交叉领域。" },
    { id:"t66", name:"宣传的七种技巧", year:1937, scholar:"p2", desc:"包括辱骂法、光环法、转移法、证词法、平民法、堆牌法和乐队花车法，是宣传分析的经典框架。" },
    { id:"t67", name:"框架竞争", year:1980, scholar:"p23", desc:"不同社会行动者围绕同一议题争夺公众认知框架的博弈过程，影响公众对议题的理解和评价。" },
    { id:"t68", name:"议程融合", year:1999, scholar:"p6", desc:"个体有意识地选择媒介议程以融入特定社会群体的过程，弥补了议程设置理论对受众能动性的忽视。" },

    // === NEW: Intelligent Communication (t69-t74) ===
    { id:"t69", name:"算法推荐", year:2010, scholar:"p28", desc:"基于用户数据和算法模型，向用户个性化推荐信息内容的机制，是智能传播的核心技术逻辑。" },
    { id:"t70", name:"算法新闻", year:2015, scholar:"p28", desc:"利用算法自动生成新闻内容的生产方式，包括机器写作、数据新闻和自动化报道。" },
    { id:"t71", name:"平台化", year:2015, scholar:"p40", desc:"社会机构和文化实践逐渐被数字平台的基础设施和逻辑所重塑的过程，平台成为新的社会权力中心。" },
    { id:"t72", name:"数字劳动", year:2014, scholar:"p31", desc:"用户在数字平台上无偿或低偿进行的生产性劳动，如内容创作、数据标注和算法训练等。" },
    { id:"t73", name:"人机传播", year:2018, scholar:"p28", desc:"人与智能机器之间进行的传播活动，涉及AI作为传播主体的新范式，挑战传统传播定义。" },
    { id:"t74", name:"ChatGPT与AIGC传播", year:2022, scholar:"p29", desc:"生成式AI对传播生态的根本性变革，包括内容生产范式、人机交互模式和信息生态的转型。" },

    // === NEW: International Communication (t75-t79) ===
    { id:"t75", name:"软实力", year:2004, scholar:"p32", desc:"通过文化吸引力、意识形态和国际制度而非强制手段影响他国意愿的能力，是国际传播的核心概念。" },
    { id:"t76", name:"文化折扣", year:1988, scholar:"p33", desc:"文化产品在跨国传播中因文化差异而导致的价值减损，影响国际传播效果。" },
    { id:"t77", name:"文化接近性", year:1991, scholar:"p34", desc:"受众倾向于选择与自己文化背景相近的媒介产品，影响国际文化贸易流向。" },
    { id:"t78", name:"东方学", year:1978, scholar:"p33", desc:"西方对东方的系统化知识建构是权力话语的体现，东方被'他者化'和刻板化。" },
    { id:"t79", name:"人类命运共同体", year:2015, scholar:"p34", desc:"中国提出的全球治理理念，强调各国在全球化时代共同利益和共同责任，引领国际传播新秩序。" },

    // === NEW: Media Economics (t80-t84) ===
    { id:"t80", name:"注意力经济", year:1971, scholar:"p48", desc:"在信息爆炸时代，注意力成为稀缺资源，媒介竞争的核心是争夺用户有限的注意力。" },
    { id:"t81", name:"二次售卖", year:1950, scholar:"p35", desc:"媒介先将内容卖给受众获得注意力，再将受众注意力打包卖给广告商的双重市场模式。" },
    { id:"t82", name:"长尾理论", year:2006, scholar:"p49", desc:"数字时代，低需求或小众产品的集合市场份额可与热门产品相匹敌，改变传统二八定律。" },
    { id:"t83", name:"网络外部性", year:1985, scholar:"p35", desc:"产品或服务的价值随用户数量的增加而增加的网络效应，是平台经济的核心特征。" },
    { id:"t84", name:"平台经济", year:2015, scholar:"p40", desc:"以数字平台为核心组织经济活动的模式，依靠数据驱动、网络效应和双边市场运作。" },

    // === NEW: Health Communication (t85-t88) ===
    { id:"t85", name:"健康信念模型", year:1950, scholar:"p4", desc:"个体健康行为取决于其对疾病威胁的感知、行为收益评估和自我效能感等心理因素。" },
    { id:"t86", name:"社会营销", year:1970, scholar:"p3", desc:"运用商业营销原理推广社会公益行为，如健康促进、环境保护和公共安全宣传等。" },
    { id:"t87", name:"恐惧诉求", year:1953, scholar:"p4", desc:"通过唤起受众的恐惧感来改变其态度或行为的说服策略，需平衡恐惧强度与效能感。" },
    { id:"t88", name:"风险传播", year:1980, scholar:"p10", desc:"在风险事件中向公众传递风险信息和决策依据的沟通过程，强调公众参与和信任建设。" },

    // === NEW: Intercultural Communication (t89-t91) ===
    { id:"t89", name:"高语境/低语境", year:1976, scholar:"p54", desc:"高语境文化中信息高度依赖语境和默契，低语境文化中信息高度外显化、编码化。" },
    { id:"t90", name:"跨文化适应", year:1950, scholar:"p34", desc:"个体进入新文化环境后心理和行为调整的过程和策略，包括U型曲线和跨文化沟通能力。" },
    { id:"t91", name:"文化认同", year:1970, scholar:"p33", desc:"个体对特定文化群体的归属感和认同感，在全球化背景下呈现复杂多元和动态特征。" },

    // === NEW: Public Opinion (t92-t94) ===
    { id:"t92", name:"螺旋模式", year:1974, scholar:"p8", desc:"沉默螺旋的动态过程模型，描述意见气候感知、孤立恐惧和自我审查的循环反馈机制。" },
    { id:"t93", name:"舆论的两种形式", year:1922, scholar:"p13", desc:"舆论分为理性舆论和感性舆论，前者基于理性讨论和公共辩论，后者受情绪和偏见影响。" },
    { id:"t94", name:"公众舆论", year:1901, scholar:"p37", desc:"舆论是现代社会中公众讨论和理性交流的产物，受媒介传播和人际网络的双重影响。" },

    // === NEW: Advertising & PR (t95-t100) ===
    { id:"t95", name:"USP理论", year:1950, scholar:"p38", desc:"独特销售主张：广告必须向消费者提供独特的、有说服力的购买理由，强调产品差异化。" },
    { id:"t96", name:"品牌形象", year:1960, scholar:"p38", desc:"广告应塑造和维护品牌形象而非侧重短期促销，品牌形象是长期资产。" },
    { id:"t97", name:"整合营销传播(IMC)", year:1993, scholar:"p45", desc:"整合所有营销传播工具和渠道，传递一致品牌信息，实现协同效应。" },
    { id:"t98", name:"4P/4C理论", year:1960, scholar:"p38", desc:"营销组合四要素：产品Product、价格Price、渠道Place、促销Promotion(4P)；客户需求Consumer、成本Cost、便利Convenience、沟通Communication(4C)。" },
    { id:"t99", name:"定位理论", year:1981, scholar:"p44", desc:"在消费者心智中为品牌建立独特位置，而非在产品本身寻找差异，是营销战略的核心。" },
    { id:"t100", name:"公共关系卓越理论", year:1984, scholar:"p39", desc:"公关应追求组织与公众之间的双向对称沟通，建立互信关系，实现长期共赢。" }
  ],

  researches: [

    { id:"r2", name:"罗威格调查", year:1943, scholar:"p1", desc:"针对人际影响和消费决策的研究，进一步证实了两级传播的普遍性。" },

    { id:"r4", name:"家庭主妇购买习惯研究", year:1943, scholar:"p3", desc:"研究如何劝说主妇购买牛杂等战时副食品，发现群体规范对个人行为的制约，并提出'把关'概念。" },

    { id:"r8", name:"查普尔希尔研究", year:1968, scholar:"p6", desc:"将媒体对竞选议题的报道量与选民心中的核心议题交叉对比，证实媒介议程与公众议程的高度相关性。" },
    { id:"r9", name:"阿伦斯巴赫民意调查", year:1965, scholar:"p8", desc:"对德国大选期间选民态度长期追踪，配合'列车测试'，发现沉默的螺旋效应。" },
    { id:"r10", name:"广播肥皂剧听众研究", year:1942, scholar:"p9", desc:"赫佐格调查女性为什么喜欢听广播剧，发现获得情感释放、逃避现实和获取信息等心理满足。" },
    { id:"r11", name:"报纸罢工研究", year:1945, scholar:"p9", desc:"贝雷尔森在纽约报纸罢工期间调查人们缺少报纸后的感受，发现报纸的日常维系功能。" },
    { id:"r12", name:"文化指标研究", year:1967, scholar:"p10", desc:"对美国电视暴力节目进行长达数十年的内容分析，发现重度电视受众产生污浊世界综合征。" },
    { id:"r13", name:"好莱坞电影工业分析", year:1944, scholar:"c2", desc:"阿多诺与霍克海默流亡美国期间对好莱坞电影和流行音乐进行批判性分析，提出文化工业概念。" },
    { id:"r14", name:"欧洲近代沙龙研究", year:1962, scholar:"c4", desc:"哈贝马斯对18-19世纪资产阶级沙龙和咖啡馆的历史文献分析，还原公共领域的形成与衰落。" },
    { id:"r15", name:"Nationwide受众研究", year:1980, scholar:"c5", desc:"大卫·莫利对不同阶层观众观看同一档电视节目的实证访谈，验证了霍尔的编码解码理论。" },
    { id:"r16", name:"佩恩基金会研究", year:1933, scholar:"ch3", desc:"布鲁默通过质化访谈和自传分析法研究电影对青少年行为的影响，为符号互动论提供土壤。" },
    { id:"r17", name:"精神病院田野调查", year:1955, scholar:"ch4", desc:"戈夫曼伪装成助理在精神病院进行参与式观察，研究病人前后台行为，滋养了拟剧理论。" },
    { id:"r18", name:"认知失调实验", year:1959, scholar:"p14", desc:"费斯廷格通过经典实验证明，当人们的行为与态度不一致时，会产生心理不适并主动调整认知。" },

    // === NEW: Researches (r19-r24) ===
    { id:"r19", name:"谢里夫群体规范研究", year:1936, scholar:"p3", desc:"谢里夫通过自动移动光效实验（暗室光点实验），证明群体规范在不确定情境中形成并影响个体判断。" },
    { id:"r20", name:"阿西群体压力实验", year:1951, scholar:"p3", desc:"阿西通过线段判断实验，证明在群体压力下个体倾向于做出与多数人一致但明显错误的判断，揭示从众行为。" },
    { id:"r21", name:"斯坦福监狱实验", year:1971, scholar:"p3", desc:"津巴多在斯坦福大学模拟监狱环境中，研究权力结构、权威服从和情境力量对个体行为的塑造。" },
    { id:"r22", name:"拉扎斯菲尔德迪凯特研究", year:1945, scholar:"p1", desc:"在伊利诺伊州迪凯特市针对消费决策和公共事务意见领袖的访谈研究，深化了两级传播理论。" },
    { id:"r23", name:"延安《解放日报》改版研究", year:1942, scholar:"p25", desc:"陆定一等在延安整风期间推动《解放日报》改版，确立党报的党性原则和群众路线，是马克思主义新闻观的重要实践。" },
    { id:"r24", name:"新闻框架研究", year:1980, scholar:"p23", desc:"运用框架理论分析新闻媒体如何通过选择、强调、排除和阐述来构建特定议题的认知框架。" }
  ],

const nodes = [];

  // Connect topic to its theories

// ===== D3 FORCE GRAPH =====
const container = document.getElementById('graph-canvas');
const svg = d3.select('#graph-canvas').append('svg');
const width = () => container.clientWidth;
const height = () => container.clientHeight;
svg.attr('width', width()).attr('height', height());

const g = svg.append('g');

// Zoom

});

// Filter out invalid links (source or target not in nodes)
const validNodeIds = new Set(nodes.map(n => n.id));
const validLinks = links.filter(l => validNodeIds.has(l.source) && validNodeIds.has(l.target));
console.log('Nodes:', nodes.length, 'Links:', links.length, 'Valid links:', validLinks.length);

// Build link-to-node map for fast lookup
const linkNodeMap = new Map();
validLinks.forEach((l, i) => { linkNodeMap.set(i, { src: l.source, tgt: l.target }); });

// Initialize node positions to random values to prevent stacking
const w = width(), h = height();
nodes.forEach((d, i) => {
  const angle = (i / nodes.length) * Math.PI * 2;
  const radius = 80 + Math.random() * 120;
  d.x = Math.cos(angle) * radius + w/2;
  d.y = Math.sin(angle) * radius + h/2;
});

const simulation = d3.forceSimulation(nodes)
  .alpha(1.5)
  .alphaDecay(0.015)
  .force('link', d3.forceLink(validLinks).id(d => d.id).distance(d => {
    if (d.type === 'belongs') return 100;
    if (d.type === 'topic') return 130;
    if (d.type === 'proposed') return 75;
    if (d.type === 'conducted') return 65;
    return 55;
  }))
  .force('charge', d3.forceManyBody().strength(d => {
    if (d.type === 'school') return -800;
    if (d.type === 'topic') return -600;
    return -300;
  }))
  .force('center', d3.forceCenter(width()/2, height()/2))
  .force('collision', d3.forceCollide().radius(d => {
    if (d.type === 'school') return 30;
    if (d.type === 'topic') return 26;
    if (d.type === 'scholar') return 18;
    return d.r + 8;

// ===== COLOR MODE SWITCHING =====
let currentColorMode = 'default';
const typeColorMap = { school: '#7C6FF0', scholar: '#FFD166', theory: '#06D6A0', research: '#118AB2', book: '#EF476F', topic: '#FF8C42' };

function setColorMode(mode) {
  currentColorMode = mode;
  document.querySelectorAll('.cm-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  
  if (mode === 'default') {
    // Restore original colors
    node.select('circle').transition().duration(400).attr('fill', d => d.color);
    node.filter(d => d.type === 'topic').select('rect').transition().duration(400).attr('fill', d => d.color);
  } else if (mode === 'school') {
    // Color all nodes by their school/topic
    node.select('circle').transition().duration(400).attr('fill', d => {
      if (d.type === 'scholar') return schoolMap[d.data.school]?.color || '#888';
      if (d.type === 'theory') return schoolMap[scholarMap[d.data.scholar]?.school]?.color || '#888';
      if (d.type === 'research') return schoolMap[scholarMap[d.data.scholar]?.school]?.color || '#888';
      if (d.type === 'book') return schoolMap[scholarMap[d.data.scholar]?.school]?.color || '#888';
      return d.color;
    });
    node.filter(d => d.type === 'topic').select('rect').transition().duration(400).attr('fill', d => d.color);
  } else if (mode === 'type') {
    // Color all nodes by their type
    node.select('circle').transition().duration(400).attr('fill', d => typeColorMap[d.type] || d.color);
    node.filter(d => d.type === 'topic').select('rect').transition().duration(400).attr('fill', d => typeColorMap[d.type]);
  }
}

// Simulation tick
simulation.on('tick', () => {
  link.attr('x1', d => d.source && d.source.x != null ? d.source.x : 0)
    .attr('y1', d => d.source && d.source.y != null ? d.source.y : 0)
    .attr('x2', d => d.target && d.target.x != null ? d.target.x : 0)
    .attr('y2', d => d.target && d.target.y != null ? d.target.y : 0);
  // Update link label positions
  linkLabelSelection.each(function(d) {
    const sx = d.source ? d.source.x || 0 : 0;
    const sy = d.source ? d.source.y || 0 : 0;
    const tx = d.target ? d.target.x || 0 : 0;
    const ty = d.target ? d.target.y || 0 : 0;
    this.setAttribute('x', (sx + tx) / 2);
    this.setAttribute('y', (sy + ty) / 2);
  });
  node.attr('transform', d => {
    if (d.x == null || d.y == null) return 'translate(0,0)';
    return 'translate('+d.x+','+d.y+')';
  });
});

// Helper: render adjacent node pills
function adjPill(id, type, label) {
  const typeClass = type;
  return '<span class="adjacent-item '+typeClass+'" onclick="focusNode(\''+id+'\',\''+type+'\');event.stopPropagation();">'+label+'</span>';
}

// Helper: find all neighbors via links
function findNeighbors(d) {
  const neighbors = [];
  const seen = new Set();
  validLinks.forEach(l => {
    const srcId = typeof l.source === 'object' ? l.source.id : l.source;
    const tgtId = typeof l.target === 'object' ? l.target.id : l.target;
    if (srcId === d.id && !seen.has(tgtId)) {
      seen.add(tgtId);
      const n = nodes.find(n => n.id === tgtId);
      if (n) neighbors.push({ id: tgtId, type: n.type, label: n.label, rel: l.type });
    }
    if (tgtId === d.id && !seen.has(srcId)) {
      seen.add(srcId);
      const n = nodes.find(n => n.id === srcId);
      if (n) neighbors.push({ id: srcId, type: n.type, label: n.label, rel: l.type });
    }
  });
  return neighbors;
}

function showCard(d) {
  const container = document.getElementById('card-container');
  const data = d.data;
  let html = '';
  const typeMap = { school:'学派', topic:'专题', scholar:'人物', theory:'理论', research:'研究', book:'著作' };
  const typeName = typeMap[d.type] || '';
  const color = d.color;
  const neighbors = findNeighbors(d);

  html += '<div class="card" style="border-left:3px solid '+color+'">';
  html += '<div class="card-type" style="color:'+color+'">'+typeName+'</div>';
  html += '<div class="card-title">'+(data.name || data.label)+'</div>';

  // === TOPIC ===
  if (d.type === 'topic') {
    html += '<div class="card-sub">'+data.en+'</div>';
    html += '<div class="card-section"><div class="label">专题简介</div><div class="value">'+data.desc+'</div></div>';

    const srs = (data.scholars || []).map(sId => scholarMap[sId]).filter(Boolean);
    if (srs.length > 0) {
      html += '<div class="card-section"><div class="label">相关学者 ('+srs.length+')</div><div class="adjacent-list">'+
        srs.map(s => adjPill(s.id, 'scholar', s.name)).join('')+'</div></div>';
    }
    const ths = (data.theories || []).map(tId => theoryMap[tId]).filter(Boolean);
    if (ths.length > 0) {
      html += '<div class="card-section"><div class="label">相关理论 ('+ths.length+')</div><div class="adjacent-list">'+
        ths.map(t => adjPill(t.id, 'theory', t.name)).join('')+'</div></div>';
    }
  }

  // === SCHOLAR ===
  else if (d.type === 'scholar') {
    html += '<div class="card-sub">'+data.en+' &middot; '+data.nationality+' &middot; 生卒：'+data.birth+'</div>';
    html += '<div class="card-detail">';
    html += '<div class="detail-row"><span class="detail-key">所属学派</span><span class="detail-val">'+(schoolMap[data.school]?.name || '未知')+'</span></div>';
    html += '</div>';

    // Topics
    const tpRel = DATA.topics.filter(tp => (tp.scholars || []).includes(d.id));
    if (tpRel.length > 0) {
      html += '<div class="card-section"><div class="label">所属专题 ('+tpRel.length+')</div><div class="adjacent-list">'+
        tpRel.map(tp => adjPill(tp.id, 'topic', tp.name)).join('')+'</div></div>';
    }

    // Theories with descriptions
    const ths = DATA.theories.filter(t => t.scholar === d.id);
    if (ths.length > 0) {
      html += '<div class="card-section"><div class="label">理论贡献 ('+ths.length+')</div>';
      ths.forEach(t => {
        html += '<div class="card-detail" style="margin-bottom:6px;padding:8px;background:var(--bg);border-radius:6px;">';
        html += '<div style="font-weight:600;color:var(--theory);font-size:0.8rem;">'+t.name+' ('+t.year+')</div>';
        html += '<div style="color:var(--muted);font-size:0.75rem;margin-top:2px;">'+t.desc+'</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    // Researches
    const rss = DATA.researches.filter(r => r.scholar === d.id);
    if (rss.length > 0) {
      html += '<div class="card-section"><div class="label">核心研究 ('+rss.length+')</div>';
      rss.forEach(r => {
        html += '<div class="card-detail" style="margin-bottom:4px;">• <strong>'+r.name+'</strong> ('+r.year+')：'+r.desc+'</div>';
      });
      html += '</div>';
    }

    // Books
    const bks = DATA.books.filter(b => b.scholar === d.id);
    if (bks.length > 0) {
      html += '<div class="card-section"><div class="label">代表著作 ('+bks.length+')</div>';
      bks.forEach(b => {
        html += '<div class="card-detail" style="margin-bottom:4px;">• <strong>'+b.name+'</strong> ('+b.year+')：'+b.desc+'</div>';
      });
      html += '</div>';
    }

    // Neighbors from graph links
    if (neighbors.length > 0) {
      html += '<div class="card-section"><div class="label">图谱关联 ('+neighbors.length+')</div><div class="adjacent-list">'+
        neighbors.map(n => adjPill(n.id, n.type, n.label)).join('')+'</div></div>';
    }
  }

  // === THEORY ===
  else if (d.type === 'theory') {
    html += '<div class="card-sub">提出时间：'+data.year+'</div>';
    const author = scholarMap[data.scholar];
    html += '<div class="card-detail">';
    html += '<div class="detail-row"><span class="detail-key">提出者</span><span class="detail-val">'+(author?.name || '未知')+'</span></div>';
    html += '<div class="detail-row"><span class="detail-key">所属学派</span><span class="detail-val">'+(schoolMap[author?.school]?.name || '未知')+'</span></div>';
    html += '</div>';

    html += '<div class="card-section"><div class="label">理论内容</div><div class="value">'+data.desc+'</div></div>';

    // Topics
    const tpRel = DATA.topics.filter(tp => (tp.theories || []).includes(d.id));
    if (tpRel.length > 0) {
      html += '<div class="card-section"><div class="label">所属专题</div><div class="adjacent-list">'+
        tpRel.map(tp => adjPill(tp.id, 'topic', tp.name)).join('')+'</div></div>';
    }

    // Same scholar's other theories
    if (author) {
      const otherThs = DATA.theories.filter(t => t.scholar === data.scholar && t.id !== d.id);
      if (otherThs.length > 0) {
        html += '<div class="card-section"><div class="label">同学者其他理论 ('+otherThs.length+')</div><div class="adjacent-list">'+
          otherThs.map(t => adjPill(t.id, 'theory', t.name)).join('')+'</div></div>';
      }
    }

    // Neighbors
    if (neighbors.length > 0) {
      html += '<div class="card-section"><div class="label">图谱关联 ('+neighbors.length+')</div><div class="adjacent-list">'+
        neighbors.map(n => adjPill(n.id, n.type, n.label)).join('')+'</div></div>';
    }
  }

  // === RESEARCH ===
  else if (d.type === 'research') {
    html += '<div class="card-sub">'+data.year+'</div>';
    const author = scholarMap[data.scholar];
    html += '<div class="card-detail">';
    html += '<div class="detail-row"><span class="detail-key">研究者</span><span class="detail-val">'+(author?.name || '未知')+'</span></div>';
    html += '<div class="detail-row"><span class="detail-key">所属学派</span><span class="detail-val">'+(schoolMap[author?.school]?.name || '未知')+'</span></div>';
    html += '</div>';

    html += '<div class="card-section"><div class="label">研究内容</div><div class="value">'+data.desc+'</div></div>';

    // Same scholar's other researches
    if (author) {
      const otherRs = DATA.researches.filter(r => r.scholar === data.scholar && r.id !== d.id);
      if (otherRs.length > 0) {
        html += '<div class="card-section"><div class="label">同学者其他研究 ('+otherRs.length+')</div><div class="adjacent-list">'+
          otherRs.map(r => adjPill(r.id, 'research', r.name)).join('')+'</div></div>';
      }
    }

    if (neighbors.length > 0) {
      html += '<div class="card-section"><div class="label">图谱关联 ('+neighbors.length+')</div><div class="adjacent-list">'+
        neighbors.map(n => adjPill(n.id, n.type, n.label)).join('')+'</div></div>';
    }
  }

  // === BOOK ===
  else if (d.type === 'book') {
    html += '<div class="card-sub">'+data.year+'</div>';
    const author = scholarMap[data.scholar];
    html += '<div class="card-detail">';
    html += '<div class="detail-row"><span class="detail-key">作者</span><span class="detail-val">'+(author?.name || '未知')+'</span></div>';
    html += '<div class="detail-row"><span class="detail-key">所属学派</span><span class="detail-val">'+(schoolMap[author?.school]?.name || '未知')+'</span></div>';
    html += '</div>';

    html += '<div class="card-section"><div class="label">内容简介</div><div class="value">'+data.desc+'</div></div>';

    // Same scholar's other books
    if (author) {
      const otherBs = DATA.books.filter(b => b.scholar === data.scholar && b.id !== d.id);
      if (otherBs.length > 0) {
        html += '<div class="card-section"><div class="label">同作者其他著作 ('+otherBs.length+')</div><div class="adjacent-list">'+
          otherBs.map(b => adjPill(b.id, 'book', b.name)).join('')+'</div></div>';
      }
    }

    if (neighbors.length > 0) {
      html += '<div class="card-section"><div class="label">图谱关联 ('+neighbors.length+')</div><div class="adjacent-list">'+
        neighbors.map(n => adjPill(n.id, n.type, n.label)).join('')+'</div></div>';
    }
  }

  // === SCHOOL ===
  else if (d.type === 'school') {
    html += '<div class="card-sub">'+data.en+'</div>';
    html += '<div class="card-section"><div class="label">学派特点</div><div class="value">'+data.desc+'</div></div>';

    const srs = DATA.scholars.filter(s => s.school === d.id);
    if (srs.length > 0) {
      html += '<div class="card-section"><div class="label">代表人物 ('+srs.length+')</div><div class="adjacent-list">'+
        srs.map(s => adjPill(s.id, 'scholar', s.name)).join('')+'</div></div>';
    }

    // Aggregate theories, researches, books from scholars in this school
    const sIds = new Set(srs.map(s => s.id));
    const schThs = DATA.theories.filter(t => sIds.has(t.scholar));
    if (schThs.length > 0) {
      html += '<div class="card-section"><div class="label">该学派理论 ('+schThs.length+')</div><div class="adjacent-list">'+
        schThs.slice(0, 15).map(t => adjPill(t.id, 'theory', t.name)).join('')+(schThs.length>15?' <span style="color:var(--muted);font-size:0.7rem;">+'+(schThs.length-15)+'...</span>':'')+'</div></div>';
    }

    if (neighbors.length > 0) {
      html += '<div class="card-section"><div class="label">图谱关联 ('+neighbors.length+')</div><div class="adjacent-list">'+
        neighbors.map(n => adjPill(n.id, n.type, n.label)).join('')+'</div></div>';
    }
  }

  html += '</div>';
  container.innerHTML = html;
}

// ===== SEARCH =====
function doSearch(query) {
  const results = document.getElementById('search-results');
  if (!query || query.length < 1) { results.style.display = 'none'; return; }
  const q = query.toLowerCase();
  const matches = allItems.filter(item => {
    const searchStr = (item.name || item.label || '') + (item.en || '') + (item.nationality || '') + (item.schoolName || '') + (item.scholarName || '') + (item.desc || '');
    return searchStr.toLowerCase().includes(q);
  }).slice(0, 10);
  if (matches.length === 0) { results.style.display = 'none'; return; }
  results.innerHTML = matches.map(m => {
    let color = '#06D6A0';
    if (m.type === 'school') color = m.color;
    else if (m.type === 'topic') color = m.color;
    else if (m.type === 'scholar') color = schoolMap[m.school]?.color || '#ccc';
    else if (m.type === 'theory') color = '#06D6A0';
    else if (m.type === 'research') color = '#118AB2';
    else if (m.type === 'book') color = '#EF476F';
    return '<div class="sr-item" onclick="focusNode(\''+m.id+'\',\''+m.type+'\')" style="border-left:3px solid '+color+'">' +
      '<span style="color:'+color+';font-size:0.7rem">['+m.category+']</span> '+(m.name || m.label)+
    '</div>';
  }).join('');
  results.style.display = 'block';
}

function focusNode(id, type) {
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('search-input').value = '';
  const n = nodes.find(n => n.id === id);
  if (!n) return;
  showCard(n);
  highlightNode(n);
  const transform = d3.zoomIdentity.translate(width()/2 - n.x, height()/2 - n.y).scale(1.5);
  svg.transition().duration(600).call(zoom.transform, transform);
}

function setMode(mode) {

// ===== FILL-IN-THE-BLANK GAME =====
let gameHistory = []; // history of questions
let gameIdx = -1;
let blankCount = 0; // number of blanks in current question
let currentBlankIdx = 0; // which blank is active
let answeredBlanks = {}; // { blankId: answer }

function generateQuestion() {
  const types = [
    'theory-scholar','scholar-theory','book-scholar','scholar-school',
    'theory-year','research-scholar','scholar-nationality','theory-topic',
    'dual-scholar-theory-year','dual-theory-scholar-book','dual-scholar-school-theory',
    'book-year','research-desc','school-scholars','topic-theory-count'
  ];
  const type = types[Math.floor(Math.random() * types.length)];
  let q = '', answers = [], hintType = '';
  let attempts = 0;

  while (attempts < 30) {
    attempts++;
    let valid = true;
    answers = [];
    answeredBlanks = {};

    switch (type) {
      case 'theory-scholar': {
        const t = DATA.theories[Math.floor(Math.random() * DATA.theories.length)];
        const s = scholarMap[t.scholar];
        if (!s) { valid=false; break; }
        q = '\u201C'+t.name+'\u201D是由<span class="blank" id="blank0">______</span>提出的。';
        answers = [s.name]; blankCount=1; currentBlankIdx=0;
        hintType = '理论\u2192人物';
        break;
      }
      case 'scholar-theory': {
        const s = DATA.scholars[Math.floor(Math.random() * DATA.scholars.length)];
        const ths = DATA.theories.filter(t=>t.scholar===s.id);
        if (!ths.length) { valid=false; break; }
        const t = ths[Math.floor(Math.random()*ths.length)];
        q = '\u201C'+s.name+'\u201D提出了<span class="blank" id="blank0">______</span>理论。';
        answers = [t.name]; blankCount=1; currentBlankIdx=0;
        hintType = '人物\u2192理论';
        break;
      }
      case 'book-scholar': {
        const b = DATA.books[Math.floor(Math.random()*DATA.books.length)];
        const s = scholarMap[b.scholar];
        if (!s) { valid=false; break; }
        q = '\u201C'+b.name+'\u201D('+b.year+')的作者是<span class="blank" id="blank0">______</span>。';
        answers = [s.name]; blankCount=1; currentBlankIdx=0;
        hintType = '著作\u2192人物';
        break;
      }
      case 'scholar-school': {
        const s = DATA.scholars[Math.floor(Math.random()*DATA.scholars.length)];
        const sc = schoolMap[s.school];
        if (!sc) { valid=false; break; }
        q = '\u201C'+s.name+'\u201D属于<span class="blank" id="blank0">______</span>。';
        answers = [sc.name]; blankCount=1; currentBlankIdx=0;
        hintType = '人物\u2192学派';
        break;
      }
      case 'theory-year': {
        const t = DATA.theories[Math.floor(Math.random()*DATA.theories.length)];
        q = '\u201C'+t.name+'\u201D理论提出于<span class="blank" id="blank0">______</span>年。';
        answers = [String(t.year)]; blankCount=1; currentBlankIdx=0;
        hintType = '理论\u2192年份';
        break;
      }
      case 'research-scholar': {
        const r = DATA.researches[Math.floor(Math.random()*DATA.researches.length)];
        const s = scholarMap[r.scholar];
        if (!s) { valid=false; break; }
        q = '\u201C'+r.name+'\u201D研究由<span class="blank" id="blank0">______</span>完成。';
        answers = [s.name]; blankCount=1; currentBlankIdx=0;
        hintType = '研究\u2192人物';
        break;
      }
      case 'scholar-nationality': {
        const s = DATA.scholars[Math.floor(Math.random()*DATA.scholars.length)];
        q = '\u201C'+s.name+'\u201D的国籍是<span class="blank" id="blank0">______</span>。';
        answers = [s.nationality]; blankCount=1; currentBlankIdx=0;
        hintType = '人物\u2192国籍';
        break;
      }
      case 'theory-topic': {
        const tps = DATA.topics.filter(tp=>tp.theories&&tp.theories.length>0);
        if (!tps.length) { valid=false; break; }
        const tp = tps[Math.floor(Math.random()*tps.length)];
        const tId = tp.theories[Math.floor(Math.random()*tp.theories.length)];
        const t = theoryMap[tId];
        if (!t) { valid=false; break; }
        q = '\u201C'+t.name+'\u201D属于<span class="blank" id="blank0">______</span>专题方向。';
        answers = [tp.name]; blankCount=1; currentBlankIdx=0;
        hintType = '理论\u2192专题';
        break;
      }
      case 'book-year': {
        const b = DATA.books[Math.floor(Math.random()*DATA.books.length)];
        q = '\u201C'+b.name+'\u201D出版于<span class="blank" id="blank0">______</span>年。';
        answers = [String(b.year)]; blankCount=1; currentBlankIdx=0;
        hintType = '著作\u2192年份';
        break;
      }
      case 'research-desc': {
        const r = DATA.researches[Math.floor(Math.random()*DATA.researches.length)];
        q = '<span class="blank" id="blank0">______</span>（研究名称）'+r.desc.substring(0,40)+'...';
        answers = [r.name]; blankCount=1; currentBlankIdx=0;
        hintType = '描述\u2192研究名';
        break;
      }
      case 'school-scholars': {
        const sc = DATA.schools[Math.floor(Math.random()*DATA.schools.length)];
        const srs = DATA.scholars.filter(s=>s.school===sc.id);
        if (srs.length<3) { valid=false; break; }
        q = '\u201C'+sc.name+'\u201D的代表人物不包括：\nA. <span class="blank" id="blank0">______</span>\n（请填入不属于该学派的人名）';
        const otherSrs = DATA.scholars.filter(s=>s.school!==sc.id);
        if (!otherSrs.length) { valid=false; break; }
        const wrong = otherSrs[Math.floor(Math.random()*otherSrs.length)];
        answers = [wrong.name]; blankCount=1; currentBlankIdx=0;
        hintType = '学派\u2192排错';
        break;
      }
      case 'topic-theory-count': {
        const tps = DATA.topics.filter(tp=>tp.theories&&tp.theories.length>0);
        if (!tps.length) { valid=false; break; }
        const tp = tps[Math.floor(Math.random()*tps.length)];
        q = '\u201C'+tp.name+'\u201D专题涵盖约<span class="blank" id="blank0">______</span>个理论。';
        answers = [String(tp.theories.length)]; blankCount=1; currentBlankIdx=0;
        hintType = '专题\u2192理论数';
        break;
      }
      // ===== DUAL BLANK QUESTIONS =====
      case 'dual-scholar-theory-year': {
        const t = DATA.theories[Math.floor(Math.random()*DATA.theories.length)];
        const s = scholarMap[t.scholar];
        if (!s) { valid=false; break; }
        q = '\u201C'+t.name+'\u201D由<span class="blank" id="blank0">______</span>于<span class="blank" id="blank1">______</span>年提出。';
        answers = [s.name, String(t.year)]; blankCount=2; currentBlankIdx=0;
        hintType = '双空：理论\u2192人物+年份';
        break;
      }
      case 'dual-theory-scholar-book': {
        const s = DATA.scholars[Math.floor(Math.random()*DATA.scholars.length)];
        const ths = DATA.theories.filter(t=>t.scholar===s.id);
        const bks = DATA.books.filter(b=>b.scholar===s.id);
        if (!ths.length||!bks.length) { valid=false; break; }
        const t = ths[Math.floor(Math.random()*ths.length)];
        const b = bks[Math.floor(Math.random()*bks.length)];
        q = '\u201C'+s.name+'\u201D提出了<span class="blank" id="blank0">______</span>理论，著有\u201C<span class="blank" id="blank1">______</span>\u201D。';
        answers = [t.name, b.name]; blankCount=2; currentBlankIdx=0;
        hintType = '双空：人物\u2192理论+著作';
        break;
      }
      case 'dual-scholar-school-theory': {
        const s = DATA.scholars[Math.floor(Math.random()*DATA.scholars.length)];
        const sc = schoolMap[s.school];
        const ths = DATA.theories.filter(t=>t.scholar===s.id);
        if (!sc||!ths.length) { valid=false; break; }
        const t = ths[Math.floor(Math.random()*ths.length)];
        q = '<span class="blank" id="blank0">______</span>（学派）的<span class="blank" id="blank1">______</span>（人物）提出了\u201C'+t.name+'\u201D理论。';
        answers = [sc.name, s.name]; blankCount=2; currentBlankIdx=0;
        hintType = '双空：学派+人物\u2192理论';
        break;
      }
    }
    if (valid) break;
  }

  return { q, answers, hintType, type };
}

function renderQuestion(qData) {
  currentGameQ = qData;
  document.getElementById('game-hint-type').textContent = qData.hintType;
  document.getElementById('game-question').innerHTML = qData.q.replace(/\n/g,'<br>');
  document.getElementById('game-feedback').textContent = '';
  document.getElementById('game-answer').value = '';
  currentBlankIdx = 0;
  answeredBlanks = {};

  // Highlight current blank
  updateBlankHighlight();
  document.getElementById('game-answer').focus();

  // Update progress
  const total = gameHistory.length;
  document.getElementById('game-progress').textContent = '第 '+(gameIdx+1)+' / '+total+' 题';
}

function updateBlankHighlight() {
  for (let i = 0; i < blankCount; i++) {
    const el = document.getElementById('blank'+i);
    if (el) {
      if (i === currentBlankIdx && !answeredBlanks[i]) {
        el.style.borderColor = 'var(--accent)';
        el.style.color = 'var(--accent)';
        el.style.borderBottomStyle = 'solid';
      } else if (answeredBlanks[i]) {
        el.style.borderColor = answeredBlanks[i].correct ? 'var(--correct)' : 'var(--wrong)';
        el.style.color = answeredBlanks[i].correct ? 'var(--correct)' : 'var(--wrong)';
      } else {
        el.style.borderColor = 'var(--rule)';
        el.style.color = 'var(--muted)';
        el.style.borderBottomStyle = 'dashed';
      }
    }
  }
  // Update placeholder
  const input = document.getElementById('game-answer');
  if (currentBlankIdx < blankCount && !answeredBlanks[currentBlankIdx]) {
    input.placeholder = '填写第'+(currentBlankIdx+1)+'个空...';
  } else {
    input.placeholder = '已完成';
  }
}

function nextGameQuestion() {
  const qData = generateQuestion();
  // Trim history if we went back
  if (gameIdx < gameHistory.length - 1) {
    gameHistory = gameHistory.slice(0, gameIdx + 1);
  }
  gameHistory.push(qData);
  gameIdx = gameHistory.length - 1;
  renderQuestion(qData);
}

function prevQuestion() {
  if (gameIdx > 0) {
    gameIdx--;
    renderQuestion(gameHistory[gameIdx]);
  }
}

function showHint() {
  if (!currentGameQ || currentBlankIdx >= currentGameQ.answers.length) return;
  const answer = currentGameQ.answers[currentBlankIdx];
  const hint = answer.substring(0, Math.ceil(answer.length * 0.4)) + '...';
  document.getElementById('game-feedback').textContent = '提示：'+hint;
  document.getElementById('game-feedback').style.color = 'var(--accent)';
}

function toggleGameSearch() {
  const box = document.getElementById('game-search-box');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  if (box.style.display === 'block') {
    document.getElementById('game-search-input').focus();
  }
}

function doGameSearch(val) {
  const results = document.getElementById('game-search-results');
  if (!val.trim()) { results.innerHTML = ''; return; }
  const v = val.toLowerCase();
  let html = '';
  DATA.scholars.forEach(s => {
    if (s.name.toLowerCase().includes(v) || (s.en&&s.en.toLowerCase().includes(v)))
      html += '<div style="padding:3px 0;border-bottom:1px solid var(--rule);">👤 '+s.name+' ('+s.school+', '+s.nationality+')</div>';
  });
  DATA.theories.forEach(t => {
    if (t.name.toLowerCase().includes(v)) {
      const s = scholarMap[t.scholar];
      html += '<div style="padding:3px 0;border-bottom:1px solid var(--rule);">📖 '+t.name+' ('+t.year+', '+(s?s.name:'?') +')</div>';
    }
  });
  DATA.books.forEach(b => {
    if (b.name.toLowerCase().includes(v)) {
      const s = scholarMap[b.scholar];
      html += '<div style="padding:3px 0;border-bottom:1px solid var(--rule);">📚 '+b.name+' ('+b.year+', '+(s?s.name:'?') +')</div>';
    }
  });
  DATA.schools.forEach(s => {
    if (s.name.toLowerCase().includes(v) || (s.en&&s.en.toLowerCase().includes(v)))
      html += '<div style="padding:3px 0;border-bottom:1px solid var(--rule);">🏫 '+s.name+' ('+s.en+')</div>';
  });
  DATA.topics.forEach(t => {
    if (t.name.toLowerCase().includes(v) || (t.en&&t.en.toLowerCase().includes(v)))
      html += '<div style="padding:3px 0;border-bottom:1px solid var(--rule);">📌 '+t.name+' ('+t.en+')</div>';
  });
  results.innerHTML = html || '<div style="padding:4px 0;">未找到结果</div>';
}

function checkGameAnswer() {
  if (!currentGameQ) return;
  const input = document.getElementById('game-answer').value.trim();
  const feedback = document.getElementById('game-feedback');

  // Find next unanswered blank
  let targetIdx = -1;
  for (let i = currentBlankIdx; i < blankCount; i++) {
    if (!answeredBlanks[i]) { targetIdx = i; break; }
  }
  if (targetIdx === -1) return;

  if (!input) { feedback.textContent = '请输入答案'; feedback.style.color='var(--muted)'; return; }

  const correct = currentGameQ.answers[targetIdx];
  const isCorrect = input.toLowerCase()===correct.toLowerCase() || correct.includes(input) || (correct.length>3&&input.length>1&&correct.includes(input));

  const blankEl = document.getElementById('blank'+targetIdx);
  if (isCorrect) {
    gameScore += (blankCount > 1 ? 15 : 10);
    gameScoreEl.textContent = '\u2B50 '+gameScore+'\u5206';
    answeredBlanks[targetIdx] = { correct: true, answer: correct };
    if (blankEl) { blankEl.textContent = correct; blankEl.classList.add('correct'); }
    feedback.textContent = '✅ 正确！';
    feedback.style.color = 'var(--correct)';
  } else {
    answeredBlanks[targetIdx] = { correct: false, answer: correct };
    if (blankEl) { blankEl.textContent = correct; blankEl.classList.add('wrong'); }
    feedback.textContent = '❌ 不对，答案是"'+correct+'"';
    feedback.style.color = 'var(--wrong)';
  }

  // Move to next blank
  currentBlankIdx = targetIdx + 1;
  document.getElementById('game-answer').value = '';

  if (currentBlankIdx >= blankCount) {
    // All blanks answered
    feedback.textContent += ' (本题完成)';
    setTimeout(nextGameQuestion, 1800);
  } else {
    updateBlankHighlight();
    document.getElementById('game-answer').focus();
  }
}

// ===== INIT =====
setTimeout(() => {
  const bounds = g.node().getBBox();
  if (bounds.width > 0) {
    const scale = Math.min(width() / bounds.width, height() / bounds.height, 1.5) * 0.85;
    const tx = width()/2 - (bounds.x + bounds.width/2) * scale;
    const ty = height()/2 - (bounds.y + bounds.height/2) * scale;
    svg.transition().duration(800).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }
}, 1200);
</script>
